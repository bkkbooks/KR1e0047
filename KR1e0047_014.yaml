body:
  text: 春秋集義卷十一宋李明復撰莊公程頥曰莊公名同桓公子莊王四年即位莊諡也勝敵克壯曰莊元年春王正月謝湜曰君父被難其位不得受之先君故不書即位胡安國曰不書即位內無所承上不請命也或曰莊公嫡長其為儲副明矣雖內無所承上無請命獨不可以享國而書即位乎曰諸侯之嫡子必誓于王莊雖嫡長而未誓安得為國儲君副稱世子夫為世子必誓於王為諸侯可以內無所承上無請命擅有其國即諸侯之位耶春秋絀而不書父子君臣之大倫正矣三月夫人孫于齊又見綱領中謝湜曰桓公之禍齊襄為之也非文姜也然禍之發由文姜所致則文姜先君之首惡也魯國大義在所棄絶故于孫黜其姜氏以明為天吏者可得而誅也雖然文姜莊公之母也使文姜親謀肆逆則母恩于此絶矣然文姜不與逆謀其於莊公母子之恩未絶也母恩未絶則文姜吾君之母也君以為母則魯之臣子安得而絶之哉故于孫不奪其夫人以明魯國當以夫人待之也文姜之惡大義已在所絶矣惟魯人緣莊公母子未絶之恩復有不可絶之義春秋緣恩義以明王法故既去姜氏復稱夫人孫退避之辭內諱奔故稱孫胡安國曰夫人文姜也桓公之弒姜氏與焉為魯臣子者義不共戴天矣嗣君夫人所出也恩如之何狥私情則害天下之大義舉王法則傷母子之至恩此國論之難斷者也經書夫人孫于齊而恩義之輕重審矣梁人有繼母殺其父者而其子殺之有司欲當以大逆孔季彥曰文姜與弒魯桓春秋去其姜氏傳謂絶不為親禮也夫絶不為親者即凡人爾方諸古義冝以非司寇而擅殺當之不得以逆論也人以為允故通于春秋然後能權天下之事矣孫者順讓之辭使若不為人子所逐以全恩也哀姜出而弗返文姜即歸于魯例以孫書何也與聞弒桓之罪已極有如去而弗返深絶之也然則恩輕而義重矣河廣之詩其辭何取而聖人録于國風者明宋襄公之重本亦此義也其垂訓遠矣朱熹曰穀梁夫人孫于齊始人之也猶言始以人道治莊公也命猶名也猶曰若于道若于言天人皆以為然則是吾受其名也臣子大受命謹其所受之名而已夏單伯逆王姬程氏雜說曰天子之女下嫁于諸侯以尊卑不敵不可以為主也必使其親之為諸侯者主之蓋周之姻禮以周公懿親為之主自此因以為常故魯常主之他公不書而獨莊公書者其他常事不書故也榖梁曰仇讐之人非所以接婚姻衰麻非所以接辨冕也夫莊公有父之喪其讐在齊義不可以共戴天天王不能為之誅而俾之主婚姻之禮天王之非可知也莊公在寢苫枕土之中其義為不可受而使單伯逆于京師莊公之罪亦可知也知其不可而為之故為之築館于外也不書來逆而祗書歸者齊侯不可與吾為禮也十一年王姬歸于齊者亦猶是矣榖梁曰單伯者吾大夫之命乎天子者也謝湜曰王將嫁女于齊故魯使單伯送之單伯命大夫故不名天子諸侯尊卑不敵故王姬下嫁使同姓諸侯主之周之先嘗以周公懿親為之主故魯國襲以為常胡安國曰單伯者吾之命大夫也逆王姬使我為之主也其不言如者榖梁子以為義不可受于京師桓弒于齊使之主婚姻與齊為禮其義固不可受也此明忘親釋怨則無以立人道矣秋築王姬之館于外程頥語録或問逆王后亦使魯為主如何曰如築王姬之館單伯送王姬之類皆是魯為主蓋只是王姬下嫁則同姓諸侯為主矣如逆后恐無使諸侯為婚主之禮謝湜曰齊有大惡于魯魯有大喪于國命魯為王室主昏天王之失也外忘不共戴天之讐內忘寢苫枕土之戚莊公之失也然則王姬之適齊也王當以他國同姓為之主魯當以大義辭王命禮不可使而王使之義不可受而魯受之故王姬館禮失常而改館之變興矣王姬之至也館之于內禮也今乃築館于外者仇讐不可以相親衰麻不可以相接故也夫過不知而為其罪輕知而為之其罪大知禮之不可行于內而更為外館以待焉是知其不可為而為之也奉仇讐棄哀戚外王室惡之大者也一舉不謹而三大惡兼焉則改館之敗禮惟小損哉胡安國曰魯于王室為懿親其主王姬亦舊矣館于國中必有常處今特築之于外者榖梁子以為仇讐之人非所以接婚姻也衰麻非所以接辨冕也知其不可故特築之于外也築之于外得變之正乎曰不正有三年之喪天王于義不當使之主有不戴天之讐莊公于義不可為之主築之于外之為宜不若辭而弗主之為正也是以君子貴端本焉或曰天王有命固不可辭使單伯逆于京師上得尊周之義為之築館于外下未失居喪之禮奚為不可曰以常禮言之則可今莊公有父之讐方居苫塊此禮之大變也而為之主婚是廢人倫滅天理矣春秋于此事一書再書者其義以復讐為重示天下後世臣子不可忘君親之意故雖築館于外不以為得禮而書之也呂祖謙曰天子以女嫁于諸侯何以使魯主婚而不自主蓋天子不當與諸侯為敵况魯是周之同姓乃使之主婚莊公之父既為齊所殺乃是讐人父之讐不與共戴天而又主婚莊公築館于外非不知此理去不得乃至力弱不能自强告于天子以絶之方欲不從又恐為齊所侵伐所以顧利害只得從之大抵為人如此設辭作事最是害人寧是不知義理人一旦覺悟尚有改變時節榖梁謂主王姬者必自公門出注謂公門朝之外門主王姬者當設几筵于宗廟以俟迎又曰于廟則已尊于寢則已卑為之築館于外變之正也仇讐之人非所以接婚姻也衰麻非所以接辨冕也又曰莊公之立桓公見殺于齊則莊公之于齊有不共戴天之讐而不能以復讐為念前輩論之詳矣然又須識得莊公之要領王姬歸于齊魯絶之而不與主婚義也而魯則畏齊之强而不敢絶欲與之主婚內則畏清議而不敢與外則畏齊之見討而不可絶其君臣之間宛轉商量一箇兩不相妨底道理欲築王姬之館于外三傳之說不一然皆未必是凡天下之事不知夫不共戴天之讐義不可與者未足為憂既知之而求所以委曲避就者深可憂蓋其不知者良心一朝頓回則其發不可禦既知之而欲立一名字求所以避就亦終于此而已矣父子之間天屬之恩莊公報齊之心宜如火之必熱如水之必寒如手足之必捍頭目安可委曲安排避就使之兩不相妨至如伐郕一假亦然莊公本自畏齊而曰我實不德齊師何罪皆是要立箇名字文飾之此其所以終于不振冬十月乙亥陳侯林卒王使榮叔來錫桓公命謝湜曰錫桓公命王以褒嘉之命追命而錫之也杜氏謂如今之哀榮是已背逆之人王法在所誅絶乃反生而來聘死而錫命逆天之大也來聘稱天王以明王者當若天道也錫命稱王以明周王弗克若天也憲天理物王之德也臣不能相之于始王不能若之于終由是所為背天而天理不復見矣故王之聘錫桓公也始則名其宰終則去其天始名其宰者以宰不能相王于始也終去其天者以王不能若于天終也錫命稱王與王使榮叔歸含王使召伯㑹葬稱王同意胡安國曰啖助曰不稱天王寵篡弒以瀆三綱也春秋書王必稱天所履者天位也所行者天道也所賞者天命也所刑者天討也今桓公弒君篡國而王不能誅反追命之無天甚矣桓無王王無天非小惡也與葬成風引為夫人使妾並嫡何以異故其文一施之范寧乃以出居于鄭來聘求車三事為證而謂非義之所存誤矣王姬歸于齊謝湜曰王姬下嫁必得賢君以為配齊襄禽獸其行豺狼其心人倫所共棄者也王室以女歸之王姬不得其歸見矣胡安國曰魯主王姬之嫁舊矣在他公時常事不書此獨書者以歸于齊故也逆于京師築館于外而不書歸于齊則無以見其罪之在也書歸于齊而後忘親釋怨之罪著矣春秋復讐之義明矣齊師遷紀郱鄑郚謝湜曰齊將滅紀故遷其三邑而有之三邑之衆而齊師迫脅遷之齊人威力之盛可知也不書滅者方其遷時國未滅也然其國邑自是滅矣胡安國曰郱鄑郚者紀三邑也邑不言遷遷不言師其以師遷之者見紀民猶足與守而齊人強暴用大衆以迫之為已屬也凡書遷者自是而滅矣春秋興滅國繼絶世則遷國邑者不再貶而罪已見矣二年春王二月葬陳莊公夏公子慶父帥師伐于餘丘謝湜曰慶父莊公庶兄胡安國曰按二傳于餘丘邾邑也國而曰伐此邑爾其曰伐何也志慶父之得兵權也莊公幼年即位首以慶父主兵卒致子般之禍于餘丘法不當書聖人特書以志亂之所由為後戒也魯在春秋中見弒者三君其賊未有不得魯之兵權者公子翬再為主將專會諸侯不出隱公之命仲遂擅兵兩世入紀伐邾㑹師救鄭三軍服其威令之日久矣故翬弒隱公而蒍氏不能明其罪慶父弒子般而成季不能遏其意公子遂殺惡及視而叔仲惠伯不能免其死夫豈一朝一夕之故哉春秋所書為戒逺矣秋七月齊王姬卒謝湜曰齊告王姬之喪魯莊公為之服大功故書卒或曰由魯嫁故為之服姊妹禮者稱情而為之文也親非姊妹而為之服其服非禮也齊吾之世讐也其始為之主其婚其終為之服其喪非孝也胡安國曰內女嫁為諸侯妻則書卒王姬何以書比內女為之服也故檀弓曰齊告王姬之喪魯莊公為之大功或曰由魯嫁故為之服姊妹之服稱情而為之節者也莊公于齊王姬厚矣如不共戴天之念何此所謂不能三年之喪而緦小功之察也特卒王姬以著其罪冬十有二月夫人姜氏㑹齊侯于禚乙酉宋公馮卒楊時曰齊人惡魯公微弱不能防間文姜使至淫亂為二國患而詩序以刺文姜者蓋是詩齊人作也雖惡魯公不得不以文姜為主其從如雲其從如雨言從之者衆也其從如水言從之者順也許穆夫人思歸唁其兄許人尤之終以義不得而止使魯公剛而有制使魯人無肯從者如許人焉則文姜雖欲適齊尚可得乎言從之者衆亦以見魯公之微弱也問文姜與齊侯淫詩人以不能防間其母刺莊公固當深罪乎曰固可罪也觀載驅之詩言魯道有蕩則魯之君臣蕩然無以禁止之也夫人之出入其威儀物數盛矣其曰齊子發夕又何其易乎禮婦人幼從父兄嫁從夫夫死從子既曰從子子乃不能防間之恣其淫亂于誰責而可乎謝湜曰夫人出會亂之道也猗嗟刺莊公不能以禮防間其母失子之道于此見矣胡安國曰婦人無外事送迎不出門見兄弟不踰閾在家從父既嫁從夫夫死從子今㑹齊侯于禚是莊公不能防間其母失子道也故趙子曰姜氏齊侯之惡著矣亦所以病公也曰子何以制母乎夫死從子通乎其下况于國君君者人神之主風教之本也不能正家如正國何若公者哀痛以思父誠敬以事母威刑以督下車馬僕從莫不俟命夫人徒往乎夫人之往也則公威命之不行哀戚之不至矣三年春王正月溺㑹齊師伐衛謝湜曰溺魯卿不氏未賜族衛專立公子黔牟溺㑹齊伐衛謀納朔也溺後不書卒不為卿也春秋之初公子未有以族世官觀柔溺生不賜族死不書卒而先王任官擇賢其遺風見矣胡安國曰榖梁子曰此公子溺也其不稱公子何也惡其㑹仇讐伐同姓故貶而名之也有父之讐而釋怨罪大矣況與合黨興師伐人國乎夏四月葬宋莊公五月葬桓王謝湜曰天子七日而殯七月而葬禮也王室以大喪赴諸侯諸侯畢㑹于周以奉臣子之職也周自東遷命令不行于邦國故平王崩不㑹葬桓王葬以七年其葬也武氏子來求賻毛伯來求金胡安國曰左氏曰緩也天子七月而葬同軌畢至諸侯五月同盟至大夫三月同位至士踰月外姻至王崩至是蓋七年矣先儒或言天子不志葬又以為不言葬者常也夫事孰有大于葬天子者而可以不志乎死生終始之際人道之大變豈以是為常事而不書也秋紀季以酅入于齊謝湜曰齊師一日遷紀三邑威力固可畏矣然國君死社稷大夫死衆人臣之義也為紀季者率衆守邑效死勿去可也今乃齊兵未涉疆境而以紀之封邑外附于齊為臣如此何以責死義之忠哉春秋書以􅈶入齊罪之也入外辭􅈶非齊邑故書入胡安國曰大夫不得用地公子不當去國盜地以下敵棄君以避患非人臣也故春秋之義私逃者必書奔有罪者必加貶今季不書奔則非竊地也不書名則非貶也諸族兄弟貶則書名宋辰秦針之類是也紀季所以不書奔者有紀侯之命矣所以不書名者天下無道强衆相凌天子不能正方伯不能伐屈已事齊請復五廟其亦不得已而為之者非其罪也所以無貶乎入云者難辭也呂祖謙曰紀侯不能下齊以與紀季紀侯能全身逺害為宗社計固亦賢矣其與銜璧靣縳者異矣冬公次于滑謝湜曰駐師于外曰次聖人愛民憂國故春秋不以王事次舍于外皆書罪其非法也謀事而㑹要言而盟結好而朝報怨而伐諸侯罪已大矣其棄政勞民出入無度則又有邂逅之遇遷延之次也書遷延之次而莊公怠荒之心基于此矣胡安國曰榖梁子曰次止也有畏也欲救紀而不能也春秋紀兵伐而書次以次為善救而書次以次為譏次于滑譏之也魯紀有婚姻之好當恤其患于齊有父之讐不共戴天茍能救紀抑齊一舉而兩善并矣見義不為而有畏也春秋之所惡故書公次于滑以譏之也或言夫子意在刺無王命若譏其怯懦則當褒其勇者春秋乃鼓亂之書為此言者誤矣易于謙之六五則曰利用侵伐師之六四則曰左次無咎進退勇怯顧義如何爾豈可專以勇為鼓亂而不與乎春秋集義卷十一

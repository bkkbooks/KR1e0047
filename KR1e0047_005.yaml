body:
  text: 春秋集義卷二宋李明復撰隱公秋七月天王使宰咺來歸惠公仲子之賵程頥曰王者奉若天道故稱天王其命曰天命其討曰天討盡此道者王道也後世以智力把持天下者霸道也春秋因王命以正王法稱天王以奉天命夫婦人倫之夲最當先正春秋之時嫡妾僭亂聖人尤謹其名分男女之配終身不變者也故無再配之禮大夫而下內無主則家道不立故不得已而有再娶之禮天子諸侯內職具備后夫人亡可以攝治無再娶之禮春秋之始尚有疑焉故仲子羽數特異僖公而後無復辨矣春秋用其竊號而書之以志僭亂仲子繫惠公而言故正其名不曰夫人曰惠公仲子謂惠公之仲子妾稱也以夫人禮賵人之妾亂倫之甚也然春秋之始天王之義未見故不可去天而名咺以見其不王王臣雖微不名况於宰乎程氏學曰王之所以稱天王者以其所履者天位所行者天道而下之所以事上亦所以事天也書曰天敘有典勑我五典五惇哉天秩有禮自我五禮有庸哉天命有德五服五章哉天討有罪五刑五用哉然則王之所行無非天也一失其道則冠履顛倒名器溷淆人倫亂而天理滅矣春秋之時據有其事聖人所書其可不嚴以為萬世法乎夫仲子者惠公之妾也以天王之尊而下賵諸侯之妾壞法亂紀莫斯為甚王者公卿有爵者例書爵無爵者例書字咺者王之宰也書而名之所以著其貶也文五年成風之喪亦妾母也王使榮叔歸含且賵王使召伯來會葬俱不稱天者以明無天道也前之所以書天者蓋不如是無以見王者當奉若天道後之所以去天者不如是無以見弗克若天也一則名其宰而見貶一則去其天以示譏桓四年天王使宰渠伯紏來聘莊元年王使榮叔來賜桓公命義亦同此桓公弒君之大逆既不能行天討以正王法反生而來聘歿而鍚命故名其宰以正其始去其天以正其終春秋謹嚴大法可見楊時曰以傳考之則仲子者惠公之妾桓公之母也説者皆以為惠公之母其曰惠公仲子者以别惠公之母爾謝湜曰先王制禮其位有上下其數有多寡其文有升降所以别名分而正人倫也名分正則卑不得以僭尊小不得以間大庶不得以亂嫡故名分者人倫之夲也侯國夫人與君同體以事宗廟社稷者也故祭祀之禮君立於阼夫人立於東房君牽牲夫人奠盎君獻户夫人薦豆以明君與夫人猶日之與月也故諸侯及夫人歸葬則天王遣臣致賵所以哀恤而助之也所以尊其體而送之也仲子者惠公之妾也妾也者承事君夫人而不可與君同體者也平王以賵禮加惠公之妾而哀恤焉是以夫人待妾而尊之也是以小君之禮送妾而安之也天王者别名分以理人倫者也天王倒易名分於上則下國化之而嫡妾之分亂矣故春秋書仲子之賵以示平王尊賤妾而匹夫人也其歸賵也貶宰咺而名之以示平王之失禮也王室公卿有爵者書爵無爵者書字尊王命也宰輔相之官也輔相王室者貶而稱名則天王之失見矣名王臣以示賵之非宜則春秋退妾而崇嫡嚴閨閫而窒亂源其意顯矣夫緑衣之傷白華之怨其源皆起於貴賤之不明上下之不正此春秋所以謹名分而繩之也胡安國曰上古應時稱號故其名三變春秋以天自處創制立名繫王於天為萬世法其義備矣冢宰稱宰咺者名也王朝公卿書官大夫書字上士中士書名下士書人咺位六卿之長而名之何也仲子惠公之妾爾以天王之尊下賵諸侯之妾是加冠於履人道之大經拂矣天王紀法之宗也六卿紀法之守也議紀法而修諸朝廷之上則與聞其謀頒紀法而行諸邦國之間則專掌其事而承命以賵諸侯之妾是壞法亂紀自王朝始也春秋重嫡妾之分故特貶而書名以見宰之非宰矣或曰僖公之母成風亦莊公妾也其卒也王使榮叔歸含且賵其葬也王使召伯來會葬下賵諸侯之妾而名其宰榮召何以書字而不名也於前賵仲子則名冢宰於後葬成風王不稱天其法嚴矣餘見綱領中朱熹曰歸賵於魯天王正以此厚魯古人却不諱死九月及宋人盟于宿程頥曰惠公之季年敗宋師于黃公立而求成焉盟于宿魯志也稱及稱人皆非卿也謝湜曰春秋之法公及會則書爵卿及會則書名微者及會則書人降殺之次也內微者不書內不可稱魯人故也微者稱人春秋之常也諸侯奪爵稱人卿去名稱人春秋之變文也凡盟以國地而不書其君者其君亦與盟及宋人盟于宿會陳人蔡人楚人鄭人盟于齊是也元年及宋人盟十年伐宋敗宋師盟不足以固結鄰國可知也故人君務修政刑以服四鄰胡安國曰內稱及外稱人皆微者其地以國宿亦與焉微者盟會不志于春秋此其志者有宿國之君也凡書盟者惡之或曰周官有司盟掌盟載之法詛祝作其詞玉府共其器戎右役其事太史藏其約蘇公亦曰出此三物以詛爾斯夫盟以結信出於人情先王猶不禁也而謂凡書盟者惡之可乎曰盟以結信非先王所欲而不禁逮德下衰欲禁之而不克者也春秋之時會而歃血其載果掌於司盟猶不以為善也又况私相要誓慢鬼神犯刑政以成傾危之習今魯既及儀父宋人盟矣尋自叛之信安在乎故知凡書盟者惡之也冬十有二月祭伯來程頥曰祭伯畿內諸侯為王卿士來朝不與其朝也當時諸侯不修朝覲之禮失臣之義王所當治也祭伯為王臣不輔王正典刑而反與之交又來朝之故不與其朝以明其罪先儒有王臣無外交之説甚非也若天下有道諸侯順軌豈有內外之限其相交好乃常禮也然委官守而逺相朝無是道也周禮所謂世相朝謂鄰國爾程氏學曰列國相與盟誓其謀必有先後其事必有善惡其罪有輕重凡事有善者則闕天子之大夫而國於畿內者其來于魯不以王命故書之以示譏也不曰朝非朝也不曰奔非奔也不曰使非命也榖梁曰寰內諸侯非有天子之命不得出會諸侯不正其外交也聘弓鏃矢不出境場束修之問不行境中有至尊者不二之也此為知所譏也夫為人臣者無以有已禮所以不正其外交也禮載縣子之言曰古之大夫束修之問不出境今之大夫交政於中國然則祭伯來于後又書祭伯來聘莊二十三年內之公子友如陳葬原仲外之莒慶來逆叔姫其為臣可知矣謝湜曰安上尊君莫大於敬敬不行於邦國則擅命自專作慝自肆小大干法亂紀而勤王之禮廢矣故諸侯有述職之朝時問之聘所以興邦國之敬也消爭弭亂莫大於和和不行於邦國則肆暴相侵報怨相伐災不相救禍不相恤而修睦之禮廢矣故諸侯有繼世之朝中年之聘所以興邦國之和也諸侯朝聘如是而已及周之衰也朝聘之禮大壞諸侯述職不修時問不至大國恣橫小國畏恐於是有非事之朝非時之聘交通於邦國之間非獨諸侯為然也王臣受封於內者僭禮犯分營私立黨亦比外諸侯以朝聘與列國相通方是時私交行於上下而臣子之職廢矣故祭伯之朝魯也春秋止書曰來而不曰來朝奪其朝而貶之也春秋首奪祭伯之朝而王臣擅命私交之罪著矣故榖梁曰聘弓鏃矢不出境場束修之問不行竟中有至尊者不二之也胡安國曰按左氏曰非王命也祭伯畿內諸侯為王卿士來朝于魯而直書曰來不與其朝也人臣義無私交大夫非君命不越境所以然者杜朋黨之原為後世事君而有二心者之明戒也惟此義不行然後有藉外權如繆留之語韓宣惠者有交私議論如莊助之結淮南者倚強藩為援以脅制朝廷如唐盧擕之於高駢崔胤之於宣武昭緯之於邠歧者矣經於內臣朝聘告赴皆貶而不與正其夲也豈有誣上行私自植其黨之患哉又曰人臣義無私交君子正而不黨按春秋書祭伯來不言朝祭叔來聘不稱使譏外交戒朋黨也餘見綱領中公子益師卒程頥曰諸侯之卿必受命於天子當時不復請命故諸侯之卿皆不書官不與其為卿也稱公子以公子故使為卿也惟宋王者後得命官故獨宋卿書官卿者佐君以治國其卒國之大事故書於此見君臣之義矣或日或不日因舊史也程氏學曰君之卿佐是謂股肱股肱或虧何痛如之故春秋卿卒必録法所當爾也春秋不以日月為例而左氏謂公不與小斂故不書日杜氏曰所以示薄厚也斯為可取蓋君於卿佐篤於恩禮則史册所載日月益詳仲尼從而書之意自見矣周室東遷之後禮法既壞而春秋之始猶為近古故無駭挾惟秪書名無駭之卒傳有羽父請諡與族之文是無姓而賜族者又柔溺之卒皆不見於經蓋上世置卿選賢與德不必以公子公孫之貴既不世官則有老而不為卿者矣此其所以不書乎自是以還斯道並棄官人以世無賢德之選故無致其事於朝者矣其尤者則有生而賜族者矣季友仲遂叔肹是也季友貴親而有寧魯之功叔盻寵弟則有私親之愛襄仲弒逆在宣公有援立之力皆生而賜之氏俾世其卿先王之禮泯然無見矣故聖人於其卒各書其族以志夫變法亂紀之端而貽權臣執命之禍可不戒哉謝湜曰卿佐君之股肱其卒人君所當致哀書卒謹其終也益師公子之為卿者也其得位以公子之親而已卒書公子志其以公子專國之政也王者不以官假人故宗室之間有富之以祿無私之以位有貴之以爵無寵之以政後世私勝而害公恩過而害義官為寵錫之具而公子公孫以親戚得政于君此所以權歸私室而亂亡隨之也益師孝公子字衆父其後為衆氏胡安國曰凡公子公孫登名於史册貴戚之卿也不書官者故侍講程頥以謂不與其以公子故而自為卿也古者諸侯大夫皆命於天子卿卒必書此春秋貴大臣之意其不日公羊以為逺然公子彄逺矣而書日則非逺也榖梁以為惡然公子牙季孫意如惡矣而書日則非惡也左氏以為不與小斂然公孫敖卒于外而公在內叔孫婼卒于內而公在外不與小斂明矣而書日左氏之説亦非也其見恩數之有厚薄歟二月春公會戎于潛程皓曰與之和好亂華之道程頥曰周室既衰蠻夷猾夏有散居中國者方伯大國明大義而攘斥之義也其餘列國慎封守可也若與之和好以免侵暴非所謂戎狄是膺所以容其亂華也故春秋華夷之辨尤謹居其地而親中國與會盟者則與之公之會戎非義也謝湜曰禮時見曰會則會無非時者會以訓上下以正班爵以敘長幼則會無非事者春秋之世強陵弱小役大講好無節出師無義搆事者旁午交興畏命者奔走不息故列國欲相親則為會欲報怨則為會欲求盟則為會欲合衆則為會以至勞民蠧財棄國弛政紛然會于郊境之間凡書會以罪諸侯非法也結之以恩懷之以德綏戎之道也亂則治之危則持之暴橫弗率則征之殘之御戎之道也人君懷服四夷以此而已又曷嘗屈辱於戎哉隱公欲修好而與戎出會于郊弱邦國之勢啓夷狄之心適以招患而已春秋書會戎于潛以示諸侯御戎之失道也治政中國為善人材中國為強甲兵中國為利修此以待彼而四夷莫敢不服况於一戎之小乎故有國家者患內不修不患外不順患內不強不患外不畏胡安國曰戎狄舉號外之也天無所不覆地無所不載天子與天地參者也春秋天子之事何獨外戎狄乎曰中國之有戎狄猶君子之有小人內君子外小人為泰內小人外君子為否春秋聖人傾否之書內中國而外四夷使之各安其所也無不覆載者王德之體內中國而外四夷者王道之用是故以諸夏而親戎狄致金繒之奉首顧居下其䇿不可施也以狄而朝諸夏位侯王之上亂常失序其禮不可行也以外服而居塞內無出入之防非我族類其心必異萌猾夏之階其禍不可長也為此説者其知內外之旨而明於馭戎之道正朔所不加也奚會同之有書戎譏之也夏五月莒人入向程頥曰莒子娶于向向薑不安莒而歸莒人入向以薑氏還天下有道禮樂征伐自天子出春秋之時諸侯擅相侵伐舉兵以侵伐人其罪著矣春秋直書其事而責嘗在被侵伐者蓋彼加兵於已則當引咎或自辨喻之以禮義不得免焉則固其封疆告于天子方伯若忿而與戰則以與戰者為主處已絶亂之道也書莒人微者也凡將尊師衆曰某帥師將尊師少曰某伐某將卑師衆曰某師將卑師少曰某人不知衆寡將帥名氏亦曰某人書入入其國也侵人之境固為暴况入人之國乎謝湜曰兵以安民而已救災恤患謂之仁去亂除害謂之義進退以時謂之禮誅釋視天謂之順其道可謂正矣故古者征伐其命一出天子所以防暴橫而安邦國也周衰諸侯專征伐之柄出不以時行不以正或貪利以爭田土或報忿以殘都邑內外結怨連禍攻討日興由是天下陷於干戈而生民有糜爛之患矣故春秋書伐書侵書戰書圍書入書取書滅罪諸侯用兵之虐也以兵圍城邑曰圍以兵入國都曰入古者方國有罪不服然後有舉師入國之討其入國非以害民誅其亂法者而已莒子以向薑之故以兵入向而還書入罪其殘人之國也春秋之法諸侯將兵則書爵卿則書名兵衆則書師寡則書人胡安國曰左氏曰莒子娶于向向薑不安莒而歸莒人入向以薑氏還此所謂案也春秋書曰莒人入向此所謂斷也以事言之入者造其國都以義言之入者逆而不順莒稱人小國也無駭不氏未賜族也其書帥師用大衆也非王命而入人國邑逞其私意見諸侯之不臣也擅興師而征討不加焉見王之不君也據事直書義自見矣吕祖謙曰莒人入向以薑氏還向薑不安莒而歸莒子因之而入向而夫婦之恩自此漸壞此皆係天下之盛衰且人之三綱天下之所以治者君臣父子夫婦而已無駭帥師入極程頥曰古者卿皆受命於天子春秋之時諸侯自命已賜族者則書族不書者未賜也賜族者皆命之世為卿也謝湜曰師大衆極小國以大衆入小國殘虐之大者也方是時天王無討罪之威方伯連帥無致伐之義故莒人無駭肆虐而弗能正向極小國被害而弗能救也觀莒人入向無駭入極而上下不知治罪由此見矣無駭不氏未賜族也無駭之卒也公始命以字為展氏然則春秋之初先王遺法猶在國卿未有生而賜族者也無駭挾皆卿也無駭挾書卒不書氏以明未有族也柔溺皆卿也柔溺書會不書卒以明既老而不為卿也卿輔相公侯者也一國安危繫之故先王置卿必選賢德老而倦政則以禮致其事於朝未有生賜氏族以世其官也魯自季友仲遂叔盻以寵愛賜氏世爵而權臣執命之禍由此熾矣國卿賜氏世爵諸侯之變禮也觀二卿卒不書氏二卿老不書卒諸侯壞法亂紀由此見矣秋八月庚辰公及戎盟于唐程頥曰戎好亂而與之盟非義也程氏學曰諸侯與中國盟誓已曰不可况與戎人歃血要言哉謝湜曰戎人嗜好無厭其有求也不正以義不詰以威彼將肆其所欲則吾將有所不堪隱公既與戎出會于潛又與戎出盟于唐其不能制戎可知也會與之相見而已盟則以事相要非特相見也與戎歃血要言則非特不能制戎也又將受制於戎矣故戎不難治也中國自輕然後戎見陵中國自強然後戎不為冦胡安國曰按費誓稱淮夷徐戎此蓋徐州之戎久居中國在魯之東郊者也韓愈氏言春秋謹嚴君子以為深得其旨所謂謹嚴者何謹乎莫謹於華夷之辨矣中國而夷狄則狄之夷狄猾夏則膺之此春秋之旨也而與戎狄歃血以約盟非義矣是故成於日者必以事繫而前此盟于蔑則不日盟于宿不日後此盟于密則不日盟于石門則不日獨盟于唐而書日者謹之也後世乃有結戎狄以許婚而配耦非其類如西漢之於丐奴約戎狄以求援而華夏被其毒如肅宗之於回紇信戎狄以與盟而臣主蒙其恥如德宗之於尚結贊雖悔於終亦將奚及春秋謹唐之盟其戒逺矣九月紀裂繻來逆女程頥曰非命卿皆書名以君命來逆夫人也在魯故稱女內女嫁為諸侯夫人則書逆書歸明重事也來逆非卿則書歸而已見其禮之薄也先儒皆謂諸侯當親迎親迎者迎於所館故有親御授綏之禮豈有委宗廟社稷逺適他國以逆婦者乎非惟諸侯卿大夫而下皆然詩稱文王親迎于渭未嘗出疆也或問紀裂繻為君逆女如何曰逆后是國之重事使卿逆亦無妨儒説親逆甚可笑且如秦君取於楚豈有越國親迎耶所謂親迎者迎于館耳文王迎於渭亦不是出疆逺迎周國自在渭傍先儒以此雖泥於親迎之説直至謂天子親迎况文王親迎之時乃為公子未為君也又曰紀裂繻來逆女伯姬歸于紀裂繻卿來逆女而伯姬歸于紀逆者微也故不書而譏可見矣謝湜曰女子以柔靜為體以正順為德故昏姻必行親迎之禮雖然諸侯主社稷人民及親迎亦視勢之所宜而已其迎也以宗廟之命遣卿以國之貴卿將命其至也國君出迎於館御輪於庭禮之情文斯盡矣又何必去國越境然後為禮哉文王以莘女為配其迎也親至于渭而已則文王未嘗至莘也韓侯以蹶女為配而蹶為王室卿士其迎也于蹶之里則韓侯因入覲至周而迎之也諸侯親迎不必逺適他國於此見矣紀裂繻卿也諸侯逆女使卿正也卿國之股肱也逆夫人以卿將命尊敬之道也春秋之法或著是以見非或貶失以明正若裂繻逆女所謂著是以見非者也若宰咺歸賵所謂貶失以明正者也由裂繻觀之則杞宋逆女非卿靈王逆后以劉夏其為不敬可知矣榖梁曰逆女親者也公羊曰書外逆女譏不親迎也二傳固以諸侯躬適他國然後為親迎失先王制禮之意矣胡安國曰按榖梁子逆女親者也使大夫非正也魯哀公問冕而親迎不已重乎孔子對曰合二姓之好以為宗廟社稷主君何謂已重乎文定厥祥親迎于渭造舟為梁不顯其光則世子而親迎也韓侯娶妻蹶父之子韓侯迎止于蹶之里則諸侯而親迎也有夫婦然後有父子有父子然後有君臣夫婦人倫之夲也逆女必親使大夫非正也入春秋之始名宰咺歸賵以譏亂法書裂繻逆女以志變常衆妾之分定矣大昏嚴矣餘見綱領中冬十月伯姬歸于紀程頥曰送子者雖公子公孫非卿則不書謝湜曰女子以夫為家一於從夫而已故女子謂嫁曰歸夫婦人倫之夲也昏姻失禮則亂生故逆女歸謹而書之紀子帛莒子盟于密程頥曰闕文也當云紀侯某伯莒子盟于密左氏附會作帛杜預以為裂繻之字春秋無大夫在諸侯上者公羊榖梁皆作伯謝湜曰啖氏謂闕文非兩會胡安國曰凡關文有斷以大義削之而非闕者有夲據舊史因之而不能益者亦有先儒傳授承誤而不敢增者如隱不書即位桓不書王賵葬成風王不書天吳楚之君卒不書葬之類皆斷大義削之而非闕也甲戌己丑夏五紀子伯莒子盟于密之類或曰夲據舊史因之而不能益者也或曰先儒傳受承誤而不敢增者也闕疑而慎言其餘可矣必曲為之説則鑿矣十有二月乙卯夫人子氏薨程頥曰隱公夫人也薨上墜之聲諸侯國內稱之曰小君夫人從夫者也公在故不書葬於此見夫婦之義也程氏學曰夫人子氏薨夫人從夫者也故國人稱為小君而薨夫人之義從君而君不可以從夫人也先君而後夫人則夫夫婦婦人之大倫所謂順也謝湜曰子氏隱公夫人也榖梁曰隱之妻是也夫人與君同體故歿稱薨薨必書葬子氏不書葬者夫婦先後之義也夫婦憂戚之情也妻從夫者也夫人先君而薨義不可以先君書葬夫人之葬從君者也君在夫人不書葬而夫婦先後之義明矣隱之薨也以賊不討不成葬公不成葬則夫人雖葬亦不能安夫人患難與君一體故也公不成葬夫人亦不書葬而夫婦憂戚之情見矣朱熹曰夫人子氏薨只是仲子左氏豫凶事之説亦有此理胡安國曰按榖梁子曰夫人子氏者隱之妻也卒而不書葬夫人之義從君者也邦君之妻國人稱之曰小君卒則書薨以明齊也先卒則不書葬以明順也有夫婦然後有父子有父子然後有君臣夫婦人倫之夲也入春秋之始於子氏書薨不書葬明示大倫茍如其義則夫夫婦婦而家道正矣鄭人伐衛程頥曰聲其罪曰伐衛服故不戰衛服可免矣鄭之擅興戎王法所不容也謝湜曰林木為人害者在所刋伐以兵伐罪如之伐討罪之辭也侵則以彼犯此此犯彼而已故春秋之兵執言討罪為伐無名攻掠為侵雖然以義罪不義者治國之伐也以不義伐不義者亂國之伐也春秋以義行伐者寡矣若夫彼善於此惡有重輕則觀乎其事而得失見矣公孫滑鄭之叛臣也衛既失於為鄭翦除且又助之為虐以取廪延故鄭人討滑之亂而伐衛也觀鄭人之伐而衛之不道其惡見矣胡安國曰按左氏鄭共叔之亂公孫滑出奔衛衛人為之伐鄭取廪延至是鄭人伐衛討滑之亂也凡兵聲罪致討曰伐濳師入境曰侵兩兵相接曰戰環其城邑曰圍造其國都曰入徙其朝市曰遷毁其宗廟社稷曰滅詭道而勝之曰敗悉虜而俘之曰取輕行而掩之曰襲已去而躡之曰追聚兵而守之曰戍以弱假強而能左右之曰以皆志其事實以明輕重內兵書敗曰戰書滅曰取特婉其詞為君隱也征伐天子之大權今鄭無王命雖有言可執亦王法所禁况於修怨乎不書戰者程氏以為衛已服也衛服則可免行此義施於伐而不書戰皆可通矣春秋集義卷二

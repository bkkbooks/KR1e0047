body:
  text: 春秋集義卷三十六宋李明復撰成公七年春王正月鼷鼠食郊牛角改卜牛鼷鼠又食其角乃免牛謝湜曰鼷鼠食郊牛角改卜牛鼷鼠又食其角養牲不敬可知也牛為鼠食不稱牲傷則不可以為牲也乃免牛不郊也以鼠食牛角而廢郊不敬之大也書大室屋壊而事親之禮怠矣書鼠食牛角而事天之禮怠矣人君能用其敬則施於事物之間者安有不治哉故孔子曰明乎郊社之禮禘嘗之義治國如示諸掌胡安國曰榖梁子曰郊牛曰展斛角而知傷展道盡矣其所以備災之道不盡也改卜牛鼷鼠又食其角則亡乎人矣非人之所能也所以免有司之過也有司免過即變異也其應云何許翰曰小害大下賊上食而又食三桓子孫相繼之象也宣公有虞三桓之志至成始弗戒矣理或然也吳伐郯謝湜曰吳始入中國稱吳狄之也郯微國胡安國曰稱國以伐狄之也吳本太伯之後以族屬言則周之伯父也何以狄之為其僭天子之大號也按國語云命圭有命固曰吳伯不曰吳王然則吳本伯爵也後雖益熾親與中國會盟進而書爵不過曰子亦不以本爵與之故紀於禮書曰四夷雖大皆曰子此春秋之法仲尼之制也而以為不敢擅進退諸侯亂名實者誤矣夏五月曹伯來朝不郊猶三望謝湜曰免牛則不郊可知再言不郊為猶三望書胡安國曰呉郡朱長文曰禮天子有四望諸侯則祭境内山川而已魯當祭太山太山魯之境也禮所得祭故不書三望僭天子禮是以書之其説是矣楚子軫言三代命祭祀不越望而曰江漢沮漳楚之望非也楚始受封濵江之國漢水沮漳豈其境内哉此亦據後世并兼封略言之耳秋楚公子嬰齊帥師伐鄭公會晉侯齊侯宋公衛侯曹伯莒子邾子把伯救鄭八月戊辰同盟于馬陵程頤曰諸侯同心病楚謝湜曰景公以蟲牢之盟率諸侯救鄭同盟之信義行於列國矣書救鄭善之也景公慮列國之復貳於楚也故又為馬陵之盟鄭不受楚而從中國諸侯皆同心外楚故書同盟胡安國曰楚人軍旅數起頻年伐鄭以其背已而從諸夏也與莊之欲討徵舒而入陳亦異矣書大夫之名氏書帥師書伐而無貶詞者所謂不待貶絶而罪自見者也晉合八國之君親往救鄭則攘外冦安中國之師也欲著其善故特書救鄭以美之言救則楚罪益明而鄭能背夷即華善亦著矣前此晉遣上將諸國不與焉此則其君自行而㑹合諸侯則楚人暴横慿陵諸夏之勢益張可見矣故盟于馬陵而書同盟者同病楚也公至自㑹吳入州來謝湜曰申公巫臣自晉使吳始通吳于晉巫臣教吳乗車戰陳故吳初伐郯又入州來冬大雩衞孫林父出奔晉謝湜曰林父孫良夫子孫氏父子専國久矣故林父得罪出奔八年春晉侯使韓穿來言汶陽之田歸之于齊程氏學曰汶陽者魯國之舊也嘗為齊所取二年六月季孫行父等會晉郤克及齊侯戰于鞌齊師敗績秋七月齊侯使國佐如師己酉及國佐盟于袁婁於是晉命歸侵田故我復得之魯以師伐齊取不以道故春秋書曰取汶陽田歸之于齊歸之者歸之不以道也魯國分地豈晉侯所得制哉晉侯之罪明矣其曰來言者緩辭晉侯使韓穿來言而魯遂以天子之命先祖之田與人魯罪亦可知也謝湜曰汶陽田魯之分地受之天子者也齊之害我封境也晉命歸我侵田齊之聽命于晉也晉復命我田歸齊以汶陽與齊為不順故晉使韓穿來言者諭魯之辭也以汶陽與齊非魯所欲故魯歸之于齊歸之于齊者不得已之辭也歸于直辭以其歸以其道也歸之于曲辭以其不得已而歸之也魯之分地天子所封也或取或歸一出於晉則天子予奪之柄晉國専之矣書來言書歸之于齊著景公之罪也汶陽田魯之舊也袁婁之盟齊歸我田也書曰取罪魯得之非其道也得之非其道者以其假兵力也馬陵之盟齊取我田也書曰歸者罪魯與之非其道也與之非其道者以其不能辯也始以争奪取于齊而終以其地歸之齊前書取後書歸著魯之失也胡安國曰汶陽之田本魯田也魯人恃大國之威以兵力脅齊得其故地而不正疆理於天王則取之不以其道也郤克戰勝令於齊曰反魯衛之侵地齊既從之今復有命俾歸之齊則歸之不以其道也而齊人貪得晉有二命穿也列卿無所諫止皆罪矣來言者緩詞也歸之于者易詞也為國以禮者無憚於强而魯侯微弱遂以歸齊而不能保罪亦見矣晉欒書帥師侵蔡謝湜曰晉以蔡從楚故侵蔡公孫嬰齊如莒宋公使華元來聘謝湜曰宋為共姬來聘夏宋公使公孫夀來納幣程頤語録或問宋共姬書首尾最詳何故曰賢伯姬故詳録之昔胡先生嘗説共姬是婦人中伯夷為其不下堂而死矣謝湜曰逆女使卿禮也納幣使卿非禮也以共姬有賢行詳録其禮重之也胡安國曰納幣不書此何以書公孫夀卿也納幣使卿非禮也禮不可略亦不可過惟其稱而已矣略則輕大倫過則溺私愛宋公之請伯姬魯侯之嫁其女皆致其厚者也而不知越禮逾制豈所以重大婚之禮哉經悉書之為後法也吕祖謙曰宋華元來聘共姬左氏載共姬始終叙得甚詳蓋縁其有後來一節晉殺其大夫趙同趙括謝湜曰趙莊姬譖同括將為亂晉討其罪殺之然則同括之死皆非其罪也書晉殺罪其國也胡安國曰按左氏趙莊姬為趙安之亡譖于晉侯曰原屏將為亂欒郤為證晉討趙同趙括以其田與祁奚韓厥言於君曰成季之勲宣孟之忠而無後為善者懼矣乃立武而反其田然則同括無罪為莊姬所譖而欒郤害之也故稱國以殺而不去其官以見晉之失政刑矣秋七月天子使召伯來賜公命謝湜曰天子天王王者之通稱也天王者言能奉天以行王道天子者言能繼天而為之子方是時簡王三年喪畢以王命寵錫諸侯故以天子言之以明繼天而臨天下也胡安國曰諸侯嗣立而入見則有賜已修聘禮而來朝則有賜能敵王所愾而獻功則有賜成公即位服喪已畢而不入見既更五服一朝之嵗矣而不如京師又未嘗敵王所愾而有功也何為來賜命乎召伯者縣内諸侯為王卿士者也來賜公命罪邦君之不王譏天子之僭賞也臨諸侯曰天王君天下曰天子蓋一人之通稱冬十月癸卯把叔姬卒謝湜曰叔姬絶於把矣魯猶以把夫人為喪書把叔姬卒著其失禮也吕祖謙曰把叔姬卒魯之女亦多惟書把叔姬最詳五年書叔姬來歸九年書來逆叔姬之喪以歸晉侯使士燮來聘叔孫僑如會晉士燮齊人邾人伐郯謝湜曰郯事吳故伐郯士燮以禮來聘修鄰好也以禮修好而反率三國伐郯罪其以聘興兵也胡安國曰按左氏士燮來聘言伐郯也以其事吳故公請緩師不可吳初伐郯季孫固曰中國不振旅蠻夷入伐而莫之或恤亡無日矣當其時既不能救及其既成豈獲已也而又率諸國伐之何義乎前書來聘下書會伐晉侯之為盟主可見矣魯既知其不可從大國之令而不敢違其不能立亦可知矣衞人來媵程頤曰媵小事不書伯姬之嫁諸侯皆來媵之故書以見其賢女子之賢尚聞於諸侯况君子乎或曰魯女之賢豈能聞於逺乎曰古者庻女與非敵者則求為媵固為之擇賢小君則諸國之賢女當自聞也又語録或問成八年九年三書來媵皆以伯姬之故書否曰然又問媵女之禮如何曰古有之程氏學曰八年夏宋公使公孫夀來納幣十月衞人來媵九年二月伯姬歸于宋夏季孫行父如宋致女晉人來媵十年五月齊人來媵伯姬有賢徳故始終之禮皆遇於厚使公孫夀來納幣季孫行父如宋致女俱使卿皆非禮也三國來媵亦非禮也宋災伯姬卒襄三十年守禮而卒於火也當是之時天下大亂夫婦之道不明男女之徳不正能全婦道受死不回見於春秋者宋伯姬一人而已在家有賢行故其婦之禮特厚既嫁能死義故送終之禮益篤書曰叔弓如宋𦵏宋共姬噫伯姬之賢雖當亂世魯國猶能嘉之獨遣卿佐會其𦵏而聖人特冠以夫諡所以異乎佗國也謝湜曰嫡夫人有左右媵媵各有姪娣凡九女媵為二國三國媵非禮也媵惟一姓所以致親睦也同姓不足然後以義起胡安國曰媵者何諸侯有三歸嫡夫人行則姪娣從二國來媵亦以姪娣從凡一娶九女所以廣繼嗣三國來媵非禮也夫以禮制欲則治以欲敗禮則亂而諸侯一娶十有二女則是以欲敗禮矣備書三國以明逾制為後戒也吕祖謙曰同姓媵凡嫁女適女為正庻女皆為媵九年春王正月把伯來逆叔姬之喪以歸謝湜曰叔姬已為把出矣把伯復迎其喪者為魯以把夫人卒之也逆書以歸者魯不絶而反之把不絶而逆之故也叔姬於把生不可以奉祭死不可以祔姑魯復反之把復逆之二國之過也胡安國曰凡筆於經者皆經邦大訓也把叔姬一女子爾而四書於䇿何也有男女然後有夫婦有夫婦然後有父子故春秋謹男女之配重大婚之禮以是為人倫之本也事有大於此者乎男而賢也得淑女以為配則自家刑國可以移風俗女而賢也得君子以為歸則承宗廟奉祭祀能化天下以婦道豈曰小補之哉夷攷把叔姬之行雖賢不若宋共姬亦不至如鄫季姬之越禮也把伯初來朝魯然後出之卒而復逆其喪以歸者豈非叔姬本不應出故魯人得以義責之使復𦵏乎魯在春秋時内女之歸不得其所者有矣聖人詳録其始卒欲為後鑒使得有終而無弊也其經世之慮逺矣吕祖謙曰把逆叔姬喪此段杜預注恐未穏當從左氏解叔姬已絶於把今把來迎喪見魯是一大國所以為魯來也公會晉侯齊侯宋公衞侯鄭伯曹伯莒子把伯同盟于蒲程頤曰諸國患楚之强同盟以相保鄭既盟復叛深辠其反復謝湜曰景公欲固結諸侯故馬陵之盟未乆又盟于蒲諸侯同心從晉故書同盟春秋班序以强弱為先後故晉以侯先宋莒以子先把胡安國曰按左氏為歸汶陽之田故諸侯貳於晉晉人懼會于蒲以尋馬陵之盟夫盟非固結之本也衞獻公言於甯喜求復國喜曰必子鮮在不然必敗小邾射以勾繹來奔曰使季路要我吾無盟夫信在言前者不言而自喻誠在令外者不令而自行晉能下令於齊反魯衞之侵地而齊不敢違者以其順也齊既從之魯君親往拜其賜矣復有二命俾歸諸齊一與一奪信不可知無惑乎諸侯之解體也晉人不知反求諸已惇信明義以補前行之愆而又欲刑牲歃血要質鬼神以御之是從事於末而不知本也特書同盟以罪晉也公至自會二月伯姬歸于宋謝湜曰逆者非卿故不書夏季孫行父如宋致女程頤曰女既嫁父母使人安之謂之致女古者三日而廟見始成婦也伯姬賢魯國重之使卿致也謝湜曰逆女使卿禮也致女使卿非禮也女嫁三月隨加聘問謂之致女書致女詳其禮也吕祖謙曰致女何休釋公羊古者婦人三月而後廟見父母使大夫操禮而致之此亦然晉人來媵胡安國曰致女者何女既嫁三月而廟見則成婦矣而後父母使人安之故謂之致也常事爾何以書致女使卿非禮也經有因褒以見貶者初獻六羽之類是也亦有因貶以見褒者致女來媵是也伯姬賢行著於家故致女使卿特厚其嫁遣之禮賢名聞於逺故諸國争媵信其無妬忌之行程氏以為一女子之賢尚聞於諸侯况君子哉或曰魯女雖賢豈能聞於逺乎曰古者庻女與非敵者則求為媵固為之擇賢小君則諸侯之賢女自當聞矣秋七月丙子齊侯無野卒晉人執鄭伯晉欒書帥師伐鄭謝湜曰蟲牢之盟馬陵之盟蒲之盟鄭伯皆同盟鄭之從晉久矣其於晉未有背叛之實也晉侯以反側疑鄭一日執其君伐其國非所以服諸侯也景公貶爵稱人罪其違同盟也古之長人者其為心公其立志逺待之以信而不疑其詐也懐之以徳而不憂其變也執鄭伯以晉之失徳也為天下盟主而失信失徳君子疾之胡安國曰按左氏楚人以重賂求鄭鄭伯會公子成于鄧秋鄭伯如晉晉人討其二於楚執諸銅鞮欒書伐鄭鄭使伯蠲行成晉人殺之楚子重侵陳以救鄭稱人而執者既不以王命又不歸諸京師則非伯討也殺伯蠲不書者既執其君矣則行人為輕亦不足紀也楚子重侵陳與處父救江何異削而不書者鄭亦有罪焉耳夫背楚即晉正也今以重賂故又與楚會則是惟利之從而不要諸義也故鄭無可救之善楚不得有能救之名冬十有一月𦵏齊頃公楚公子嬰齊帥師伐莒庚申莒潰謝湜曰易曰王公設險以守其國言備之不可廢也莒城惡而不修國陋而不備一日楚師加國民衆不守而奔書莒潰罪莒之取禍也莒子既同盟于馬陵又同盟于蒲楚之伐莒也諸侯無一出救以致莒人潰焉書莒潰罪晉之不能衞同盟也胡安國曰七月伐鄭而十月楚公子伐莒至庚申而莒潰師出有名也楚人入鄆謝湜曰鄆屬莒又屬魯胡安國曰按左氏楚子重自陳伐莒圍渠丘城惡衆潰楚師圍莒莒城亦惡庚申莒潰楚遂入鄆孟子曰鑿斯池也築斯城也與民守之效死而民不去是則可為也夫鑿池築城者為國之備所謂事也效死而民不去為國之本所謂政也莒恃其陋不修城郭浹辰之間楚克其三都信無備矣然兵至而民逃其上不能使民效死而不去則昧於為國之本也雖降宫之城何益乎故經於莒潰特書日以謹之者以明城郭溝池重門擊柝皆守邦之末務必以固本安民為政之急耳秦人白狄伐晉謝湜曰晉嘗導白狄伐秦故秦復導白狄伐晉胡安國曰經所謹者中外之辨也晉嘗與白狄伐秦秦亦與白狄伐晉族類不復分矣其稱人貶詞也武王伐商誓師牧野庸蜀羗髳微盧彭濮皆與焉豈亦不謹乎除天下之殘賊而出民於水火之中雖逺在異國以義驅之可也亦慮其同惡相濟貽患於後也中國友邦自相侵伐已為不義又藉狄之强以求勝焉不亦甚乎昔既失信復聽婦人䜛説殺其世子而諸侯皆貳秦狄交伐比事以觀可謂深切著明矣吕祖謙曰如秦晉初間同圍鄭秦從燭之武之言遂與鄭盟此是秦曲至晉為令狐之盟而又召狄與楚伐晉諸侯是以睦於晉此秦最曲鄭人圍許城中城謝湜曰蟲牢馬陵蒲三盟許皆不與鄭人圍許將以解國難也胡安國曰經世安民視道之得失不倚城郭溝池以為固也榖梁子謂凡城之誌皆譏其説是矣莒雖恃陋不設備至使楚人入鄆茍有令政使民效死而不潰冦亦豈能入哉城非春秋所貴而書城中城其為儆守益微矣王公設險以守其國非歟曰百雉之城七里之郭設險之大端也謹於禮以為國辨尊卑分貴賤明等威異物采凡所以杜絶陵僭限隔上下者乃體險之大用也獨城郭溝池之足恃乎十年春衞侯之弟黑背帥師侵鄭謝湜曰黑背定公母弟以同母之愛得位専政故稱弟公孫剽黑背之子也其後孫林父背君立剽亦以君寵弟子致之也然則黑背稱弟著其兆禍與公子年來聘稱弟同意胡安國曰按左氏衞子叔黑背侵鄭晉命也其曰衛侯之弟者子叔黑背生公孫剽孫林父甯殖出衞侯衍而立剽亦以其父有寵愛之私故得立爾此與齊之夷仲年無異其特書弟以為後戒可謂深切著明矣夏四月五卜郊不從乃不郊謝湜曰免牲免牛皆不郊也有牲而不用則書免牲非牲不善也以卜郊不從而免之也牛不可用則書免牛免牛非郊不從也以鼷鼠又食牛角而免之也牲物未有則書不郊宣公之不郊以牛死無牛可免而謂之不郊也自宣公不郊推之則成公襄公之不郊皆以牲牛未具而直書不郊可知也五月公會晉侯齊侯宋公衞侯曹伯伐鄭謝湜曰欒書伐鄭不服於是衛黑背侵鄭黑背侵鄭不服於是諸侯伐鄭同盟之國其離心至於如此者以晉執鄭伯不道致之也大國所以結邦國者信而已信不足故小國不從有如此者自鄭伯見執之後再書伐鄭一書侵鄭以明不信之生禍也齊人來媵謝堤曰二國媵矣齊人又媵非禮也同姓不患不足而齊以異姓來媵非禮也丙午晉侯獳卒秋七月公如晉謝湜曰公如晉弔喪且會𦵏也晉景公不書𦵏者天王在上不與公㑹𦵏晉侯絶之也景公絶不書𦵏而公之惡著矣胡安國曰此𦵏晉侯也而不書諱之也天子之喪動天下屬諸侯諸侯之喪動通國屬大夫公之𦵏晉侯非禮也惟天子之事焉可也𫝊以晉人止公送𦵏諸侯莫在焉魯人辱之故諱而不書非矣假令諸侯皆在魯人不以為辱而可書乎冬十月十有一年春王三月公至自晉謝湜曰公留晉凡九月晉侯使郤犨來聘己丑及郤犨盟謝湜曰厲公使郤犨來聘魯又與盟以堅好也夏季孫行父如晉謝湜曰報郤犨聘秋叔孫僑如如齊謝湜曰鞌戰以後魯始聘齊以靈公會伐鄭又且來媵故也冬十月春秋集義卷三十六

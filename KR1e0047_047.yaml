body:
  text: 春秋集義卷四十四宋李明復撰昭公十有三年春叔弓帥師圍費謝湜曰季氏家臣南蒯以費叛故叔弓圍費不書叛者書圍則邑叛可知也家邑而至於圍之則上失制御由此見矣末大必折尾大不掉物之常理也下之不率上之所以弱也故周之衰也其始諸侯制天子其次大夫制諸侯又其次家臣制大夫胡安國曰費內邑也命正卿為主將舉大衆圍其城若敵國然者家臣强大夫弱也語不云乎有一言而可以終身行之者其恕矣乎已所不欲勿施於人所惡於下者無以事上也所惡於上者無以使下也然後家齊而國治矣季孫意如以所惡於下者事其上而不忠於其君以所惡於上者使其下而不禮於其臣出乎爾者反乎爾宜南蒯之及此也春秋之法不書內叛反求諸已而已矣其書圍費欲著其實不沒之也夏四月楚公子比自晉歸于楚弒其君䖍于乾溪謝湜曰楚靈勞師逺伐國人厭苦內外離心故公子比乘楚空虛挾晉之力入有其國比以惡入而書曰歸楚者罪楚靈之失人心也比之歸也內襲楚子之位以令國人外攝師徒以擕楚子之衆由是楚靈以千乘之勢不得返國而死於乾溪䖍非遇弒而書曰比弒者著比入為首惡而致君於難也胡安國曰楚師伐徐楚子䖍次于乾溪為之援公子棄疾君陳蔡主方城之外有觀從者率羣失職以棄疾命召比于晉既至脅比而立之令于乾溪曰先至者復其田里師潰而歸楚子經而死或曰昭元年楚䖍弒立比出奔晉十三年比歸而䖍縊于棘園則比未嘗一日北面事䖍為之臣䖍又弒立固非比之君矣而書曰比弒其君䖍何也曰凡去國出奔而君不以為臣則晉於欒盈是也臣不以為君則公子鱄於衛是也若去國雖久而爵祿有列於朝出入有詔於國不掃其墳墓不收其田里不係纍其宗族即君臣之分猶在也比雖奔晉而晉人以羇待比以國底祿固楚之亡公子也楚又未嘗錮之如晉之於欒盈比又未嘗不向楚而坐如子鮮之於衛安得以為比非楚臣而䖍非比之君乎春秋書比弒其君䖍明於君臣之義也或曰䖍弒郟敖以立比之獲罪豈其無討賊之心而徒貪夫位歟曰春秋罪比不明乎君臣之義不責其無討賊之心夫比雖當次及之序而棄疾亦居楚國之常以取國言之比具五難而棄疾有五利此事之變也為此者宜乎效死不立若國有所歸為曹子臧魯叔肹不亦善乎不然身居令尹都貴戚之卿為社稷鎮亂不自已亦可也今乃脅於勢而忘其守怵於利而忘其義被之大惡欲辭而不可得矣為人臣而不知春秋守經事而不知其宜遭變事而不知其權者若此類是也悲夫聖人垂戒之意明矣吕祖謙曰楚靈在當時最號强暴無道然當時得以威行於中國雖終於滅亡然飛揚强大尚至於十四年蓋靈雖是無道其間亦有一二件好處且如穿封戌為陳公曰城麋之役不諂當楚靈為王子時與穿封戍爭囚鄭皇頡戌操戈欲逐王子圍可謂仇讎之人今既即位不惟不報其讎及滅陳又封之為陳公如此等事正如齊桓公忘射鉤之讎而用管仲晉文忘斬祛之讎而用寺人披異世一揆此皆與桓文暗合處若是他全不是無道時雖凶威惡熖足以慿陵諸侯如何過得十四年惟其間有一二件與賢君暗合處故當時雖以無道行之猶可以支持十餘年大抵天下之道最不可須臾離如穿封戌事固可取至於陳無宇執人於王宫在靈之虐宜若必誅而無赦今乃寬假慰遣之蓋十事中有一二事暗合所以過得十四年故當時雖以凶威虐熖加於天下而不至於亡者由此故也若專恃凶熖暴虐以無道行之只如州吁數月便亡大抵暴不可恃若專以無道必不能久歷考篡弒之大粗能支持後世之君却謂天道難知而不知天道本不難知也楚公子棄疾殺公子比謝湜曰比國之逆臣也殺以不討賊之辭棄疾與比同惡相濟者也比既據國害君棄疾復爭位殺比二人者其逆同其罪均故棄疾殺比不以討賊之辭與之也比䖍之弟棄疾比之弟棄疾比皆稱公子以明楚靈之禍起於宗族也胡安國曰棄疾立比為王而已為司馬固君比矣而又殺之則宜書曰棄疾弒其君比而曰殺公子比何也初子干歸自晉觀從假棄疾命而召之來則來坎牲加書而强之盟則盟帥四族衆而使之入楚則入殺太子祿而立之為王則王周走而呼於國中謂衆怒如水火而逼之自殺則自殺其行止遲速去就死生皆觀從與國人所為而比未嘗可否之也安得為棄疾之君乎然比兄也黑肱弟也棄疾其季弟也立比為王肱為令尹疾為司馬蓋國人以長幼之序立之也則宜書曰楚人殺比而春秋變文歸獄棄疾者誅其本意在於伐比而非討之也所謂輕重之權衡曲直之繩墨而懷惡者亦無所隱其情矣秋公㑹劉子晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯把伯小邾子于平丘程頥曰楚棄疾立諸侯懼之故同盟公不與盟晉自辭公不使與盟雖欲辱公然得不與同盟之罪實為幸也謝湜曰諸侯自夷儀之㑹怠棄國政不復出㑹者二十年由是楚子陵暴中國殺陳行人殺公子招以滅陳殺蔡侯用蔡世子以滅蔡及楚䖍之遇難也楚國大亂公子爭國於是晉昭假王命復㑹諸侯盟于平丘將以謀楚也平丘之盟雖無討亂之功然亦足以振中國久萎之氣故陳蔡已絶之封賴之以復其國也是盟也王臣亦與盟故書同盟胡安國曰按左氏晉成虒祁諸侯朝而歸者皆有異心齊侯往朝于晉燕而投壺曰寡人中此與君代興晉人知其亦將二也叔向曰諸侯不可以不示威乃並徴㑹治兵于邾南甲車四千乘遂合諸侯于平丘方是時楚人暴橫陵蔑中華在宋之盟爭晉先歃及虢之㑹仍讀舊書遂召諸侯為申之舉遷賴於鄢縣陳滅蔡此乃敵國外患臨深履薄恐懼省戒之時其君當倚於法家拂士以德修國政其臣當急於責難陳善以禮格君心內結夏盟外攘冦亂復悼公之業若弗暇也今乃施施然安於不競無憤恥自强之志惟宫室臺榭是崇是飾及諸侯皆二顧欲示威徴㑹而以兵甲耀之不亦末乎春秋之法制治于未亂保邦于未危貴事之預恥以茍成而不要諸道者也是以深惡此㑹如下文所貶云明其義者然後知仲尼作經於一臺囿之築一宫室門觀之作必謹而書以重民力其弭亂特危固結人心之慮遠矣八月甲戌同盟于平丘胡安國曰按左氏晉將尋盟齊人不可叔向曰諸侯有間矣不可以不示衆辛未治兵建而不斾壬申復斾諸侯畏之辭諸魯曰寡君有甲車四千乘雖以無道行之猶必可畏牛雖瘠僨於豚上其畏不死南蒯子仲之憂庸可棄乎若奉晉之衆間其二憂何求而弗克請君無勤魯人聽命甲戌同盟于平丘其書同盟者劉子與盟同懼楚也會與盟同地再書平丘者書之重詞之復其中必有美惡焉見行事之深切著明故詞繁而不殺也是盟蓋或善之而以為惡何哉盟雖衰世之事然有定人道之大倫者矣有備天子之明禁者矣有束牲不歃相命而信自喻者矣有納斥候禁侵掠誠格而不復叛者矣其次猶以載書詞命相爭約於大神而不敢越者則未聞主盟中國奉承齊犧而矜其威力恐迫諸侯又信邾人之訴絶兄弟之歡求逞私憤間其憂疑如此盟者流及戰國强衆相誇恫疑恐喝恣行陵暴死者十九積習所致有自來矣春秋禮義之大宗也曽是以為善乎詞繁而不殺則惡其競力不道為後世鑒也公不與盟胡安國曰臣子之於君父隱諱其恥禮也十二國㑹于平丘公獨見辭不得與盟斯亦可恥矣曷為特書其事而不隱也晉主此盟德則不競而矜甲兵之威肆脅持之術以諸侯上要天子之老而歃血以中國同惴荆蠻篡立之主而結盟無禮義忠信誠慤之心而以威詐涖之具此五不韙者得不與焉幸也聖人筆削春秋凡魯君可恥者必為之隱諱至㑹于沙隨而公不得見盟于平丘而公不得與自衆人常情必深沮喪以為辱矣仲尼推明其故自反而縮雖晉國之嚴不可及也彼以其威我以其理彼以其勢我以其義夫何歉乎哉直書其事示後世立身行已之道也其垂訓之用大矣晉人執季孫意如以歸胡安國曰稱人以執非伯討也自文以來公室微弱三家專魯而季氏罪之首也宿及意如尤為强逼元年伐莒疆鄆十年伐莒取鄆中分魯國以自封殖而使其君民食於家其不臣甚矣何以為非伯討乎晉人若按邾莒所訴有無之狀究南蒯子仲奔叛之因告於諸侯以其罪執之請於天子以大義廢之選於魯卿更意如之位收斂私邑為公室之民使政令在君三家臣順則方伯之職修矣今魯與邾通好亦不朝夕伐莒而鄆郠之故又非昭公意也徒以邾莒之言曰我之不共魯故之以遂辭魯君而執意如則是意在貨財而不責其無君臣之義也何得為伯討乎稱人以執罪晉之偷也公至自㑹謝湜曰平丘之㑹晉侯以邾莒之訴責魯以昭公不立故不使與盟以季氏專國故執之以歸㑹諸侯所以協邦國也㑹而屈人之君執人之臣非主盟之道也晉昭之不足與有為於此見矣取怨者不可以逺患出㑹諸侯而君見屈臣見執積怨之所至也魯人之不知慮患於此見矣晉責魯不與公盟而書曰公不與盟婉辭而為之諱也蔡侯廬歸于蔡陳侯吳歸于陳程氏學曰十三年蔡侯廬歸于蔡陳侯吳歸于陳楚滅陳蔡至此而復之聖人舉王法以治蓋陳蔡者先王之建國非楚可滅而非楚可復也故書爵歸言二國之嗣位其所固有國其所宜歸也二君名者素非諸侯至此始立也謝湜曰楚平即位封陳蔡而復之所以結人心也陳蔡先王所封之國也非楚可得而復也故隱太子之子反于蔡悼太子之子反于陳書爵書歸以明位乃其位國乃其國以正楚人之罪也二嗣前非諸侯至此始立故書名如衛人立晉書名是也胡安國曰楚䖍遷六小國於荆山又滅陳蔡而縣之及棄疾即位復諸遷國封蔡及陳隱太子有之子廬歸于蔡悼世子偃師之子吳歸于陳曰歸者順詞也陳蔡昔皆滅矣不稱復歸者不與楚䖍之得滅也其稱歸于者國其所宜歸也廬與吳皆亡世子之子也而棄疾封之可謂有奉矣不言自楚者不與楚子之得封也其稱侯者位其所固有也陳列聖之後蔡王室之後見滅於楚䖍而諸侯不能救復封於棄疾而諸侯不能與是以楚人制諸夏也聖人至是懼之甚蓋有不得已焉制春秋為後法大要皆天子之事也其義則以公天下為心興滅國繼絶世異於自私其身欲擅而有之者也故書法如此為天下國家而不封建欲望先王之治難矣冬十月葬蔡靈公謝湜曰廬歸而國復國復而葬靈於此安焉故書葬公如晉至河乃復謝湜曰晉人辭之乃復吳滅州來謝湜曰州來附庸國十有四年春意如至自晉胡安國曰按左氏季孫猶在晉子服惠伯私於中行穆子曰魯事晉何以不如夷之小國土地猶大所命能具而非有不能救蔡為夷執親之悔也然則晉人喜怒皆以利發其勸沮皆以利行違道甚矣故平丘之㑹深加貶斥自是而後諸侯不合二十餘年至于召陵又以賄敗十有八國之諸侯而書侵楚以譏之於是晉日益衰外攜內叛不復振矣利之能敗人國家乃如此春秋之深戒也三月曹伯滕卒夏四月秋葬曹武公八月莒子去疾卒胡安國曰卒自外録者也莒人來赴故魯史書其卒葬自內録者也魯人不往是以闕自昭公以來雖薛杞微國無不㑹其葬者何獨於莒則不往乎方是時意如專政而莒嘗訴其疆鄆取郠之罪于方伯而見執矣為是怒莒故獨不㑹其葬也夫怨不棄義惡不忘親怒不廢禮在桓公時雖與衛戰而宣公卒則往葬之不以私故絶吉凶慶吊往來施報之常禮也以此見意如之專恣矣若意如者其傲狠修怨敢施于昭公與莒子及其在晉聞除館西河則恐懼逃歸如一匹夫何也小人無禮喜怒勇怯不中節皆若是耳茍不逺之其能國乎冬莒殺其公子意恢十有五年春王正月吳子夷末卒二月癸酉有事于武宫籥入叔弓卒去樂卒事程氏學曰禮曰衛有大史曰柳莊寢疾公曰若疾革雖當祭必告然則當祭而卿佐卒不當告也告則不能祭而禮不成矣夫宗廟之祭盡誠敬而已以聞臣佐之喪而不能成豈禮也哉且籥已入矣至于不得已而去樂卒事皆由告故也故書以示譏也謝湜曰籥入叔弓卒君祭在廟羽籥既陳以叔弓喪入告也去樂卒事君聞喪祭不得以樂終也宗廟之祭惟誠然後能盡其敬惟敬然後能盡其禮聞卿佐之喪則哀戚二其心而禮不得成矣武宫不得已而去樂卒事者以叔弓喪入告故也古者祭不告喪祭而告喪非禮也衛栁莊寢疾公曰社稷之臣也疾革雖當祭必告然則祭而告喪非古也衛人之變禮也祭享重事也告喪則國之重事廢矣書叔弓卒去樂卒事著其失禮也禮者因人情而為之節也后世子與卿佐異矣然則祭而告喪惟后世子之喪可也胡安國曰左氏曰禘于武宫叔弓蒞事籥入而卒去樂卒事有事於宗廟聞大夫之喪則去樂而祭可乎按曾子問君在祭不能成禮者夫子語之詳矣而無有及大臣者是知祭而去樂不可有事於宗廟遭大夫之變則以聞可乎按禮衛有大史柳莊寢疾君曰若疾革雖當祭必告是知祭而以聞不可也禮莫重於當祭大夫有變而不以聞則內得盡其誠敬之心於宗廟外全隱恤之意於大臣是兩得之也然則有事於宗廟大臣蒞事籥入而卒於其所則如之何禮雖未之有可以義起也有事於宗廟大臣蒞事籥入而卒於其所去樂卒事其可也緣先祖之心見大臣之卒必聞樂不樂緣孝子之心視已設之饌必不忍輕徹故去樂而卒事其可也宗廟合禮者常事不書茍以為可則春秋何書乎此記禮之變而書之者也夏蔡朝吳出奔鄭謝湜曰朝吳蔡大夫公子之比入公子棄疾之亂皆朝吳為之主亂國之臣難安其上故朝吳不保其位出奔胡安國曰朝吳蔡之忠臣雖不能存蔡而能復蔡其從於棄疾者謂蔡滅而棄疾必能封之也棄疾以其忠於舊君而信之使居舊國可謂知所信矣則曷為出奔費無極害其寵也無極楚之讒人去朝吳出蔡侯朱喪太子建殺連尹奢屏王耳目使不聰明卒使吳師入郢辱及宗廟讒人為亂可不畏乎為國有九經而尊賢為上勸賢有四事而去讒為首志朝吳出奔而入郢之師兆矣然朝吳身居舊國處危疑之地茍有譛之者則王不能無動也能以忠信自任而杜讒諂之謀則善矣而費無極乃語之曰子亦長矣而在下位辱也欲為之請以名利纍其心而莫之覺不智亦甚矣故特書其出奔以罪吳為後戒也六月丁巳朔日有食之秋晉茍吳帥師伐鮮虞胡安國曰晉滅潞氏甲氏及再伐鮮虞皆用大夫為主將而或稱人或稱國或稱其名氏何也以殄滅為期而無矜惻之意則稱人見利忘義而以鷙賊欺詐行之則稱國以正兵加敵而不納其叛臣則稱名氏夫稱其名氏非褒之也才免於貶耳而春秋用兵禦狄之略咸見矣吕祖謙曰晉到此時多伐鮮虞何故蓋當時晉公室衰而大夫各自做家計多去伐他以有其地冬公如晉謝湜曰雖至河乃復雖不與盟然且如晉以難故也十有六年春齊侯伐徐楚子誘戎蠻子殺之程氏學曰春秋之世强陵弱衆暴寡故殺諸侯者有矣而楚恃其詔僞復誘以殺人之君者二焉昭十一年楚子䖍誘蔡侯般殺之于申及此是也甚乎天下無王楚之不道也謝湜曰誘蔡侯般殺之楚靈之狄行也誘戎蠻子殺之楚平之狄行也楚平殺蠻子不名者以詐相誘相殺楚俗之常也外域以詐殺外域不名著其常也以其為行彼此一也然則䖍名所以著其惡於前棄疾不名所以著其常於後著其惡以明在所絶著其常以明在所賤胡安國曰楚子之誘一也或名或不名者䖍欲滅中國而棄疾討蠻氏謹中外之辨也蔡侯與蠻子之見殺一也或名或不名者蔡般弒父與君蠻氏亂而無質其罪之輕重亦差矣吕祖謙曰晉到得昭公以後諸侯各自為政不復禀霸王之命所以齊楚交兵於中國到得齊侯伐徐徐人行成賂以甲父之鼎叔孫昭子具言諸侯無霸之害魯莊公以前是時霸者未興自昭公以後霸權已失當霸者未興以前若魯衛宋鄭更相侵伐無所顧忌自桓公一霸晉文繼興方有所統百餘年間敗王法滅小國雖曰侵天子之權摟諸侯以伐諸侯其罪固多然一時維持中夏使諸侯有所畏懼遵守王度亦不為無助及霸權既失之後晉文公既卒昭公即位天下無霸齊之伐徐楚之取蠻肆行無憚甚至於吳越入中國㑹之有成而還莫之亢也當時諸侯大夫慨然反思有霸之時自此後中外無辨吳楚于越交兵中夏陵夷至於戰國之際終至强弱相吞成周所封千七百國所存僅七八百國皆為强大諸侯所吞并若論敗王法滅小國摟諸侯以伐諸侯其罪固多殆夫先王之政掃地無餘爭地以戰殺人盈野爭城以戰殺人盈城到此之時反觀霸者維持之功雖一時上僣王法然止霸者一國而已天下諸侯不敢自肆不至如戰國之甚霸者之功不可厚誣故夫子稱管仲之功而以為如其仁如其仁分明是如此當時管仲雖有此功非夫子不能知也自後世觀之以為戎狄自强弱如此後來如劉石弄兵懷愍之時中國天子反為劉曜驅之青衣行酒使當時有管仲决不至此以此知孔子之稱美管仲是灼知管仲之功如此也夏公至自晉胡安國曰左氏曰公如晉平丘之㑹故也至是始歸者晉人止公其不書諱之也昭公數朝于晉三至于河而不得入兩得見晉侯又欲討其罪而止旃其困辱亦甚矣在易之困曰困亨者因困窮而致亨也夫困於心衡於慮而後作徴於色發於聲而後喻此正憤悱自强之時而夏少康衛文公越勾踐燕昭王四君子者由此其選也今昭公安於危辱無激昻勉勵之志即所謂自暴自棄不可與有為而人亦莫之告矣不亦悲乎諱而不書深貶之也秋八月己亥晉侯夷卒九月大雩季孫意如如晉冬十月葬晉昭公十有七年春小邾子來朝夏六月甲戌朔日有食之秋郯子來朝八月晉荀吳帥師滅陸渾之戎謝湜曰陸渾戎散居伊雒之川胡安國曰林父之於潞氏士㑹之於甲氏荀吳之於陸渾戎皆滅之也而林父士㑹稱人荀吳舉其名氏何哉晉為盟主陸渾之戎密邇王室而縱之雜處則非尊周室别內外之義也與闢土服逺以圖强霸則異矣然舉其名氏非褒詞也才得無貶耳則窮兵於逺虛內事外者可知矣冬有星孛于大辰謝湜曰孛非常星故書有星其星赤光悖逆當大辰之次故書孛于大辰胡安國曰大辰心也心為明堂天子之象其前星太子後星庶子孛星加心象天子適庶將分爭也後五年景王崩王室亂劉子單子立王猛尹氏召伯立子朝歷數載而後定至哀十三年有星孛于東方不言宿名者不加宿也當是時吳人僣亂慿陵上國日敝於兵暴骨如莾其戾氣所感固將壅吳而降之罰也故氣祲所指在於東方假手越人吳國遂滅天之示人顯矣史之有占明矣楚人及吳戰于長岸謝湜曰吳潛兵入楚故二國戰于長岸勝敗不分故不書敗吳不稱人狄之也胡安國曰言戰不言敗勝負敵也楚地五千里帶甲數十萬戰勝諸侯威服天下本非吳敵也惟不能去讒賤貨使費無極以讒勝囊瓦以貨行而策士竒才為敵國用故日以侵削至雞父之師亡國皆敗柏舉之戰國破君奔幾於亡滅吳日益强而楚削矣是故為國必以得賢為本勸賢必以去讒賤貨為先不然雖廣土衆民不足恃也考其所書本末强弱之由其為後世戒明矣十有八年春王三月曹伯須卒夏五月壬午宋衛陳鄭災謝湜曰天火所及故四國同日災胡安國曰按左氏鄭災子産臨事而備至于書焚室而寬其征與之材三日哭國不市使行人告於諸侯宋衛皆如是陳不救火許不弔災君子以是知陳許之先亡也初禆竈言於子産宋衛陳鄭將同日火若我用瓘斝玉瓉鄭必不火子産弗與及鄭既災竈曰不用吾言鄭又將火鄭人請用之子産不可曰天道逺人道邇非所及也何以知之亦不復火禆竈所言蓋以象推非妄也而鄭不復火者子産當國方有令政此以德消變之驗矣是知吉凶禍福固有可移之理古人所以必先人事而後言命也六月邾人入鄅謝湜曰鄅妘姓國秋葬曹平公冬許遷于白羽謝湜曰許又自夷遷白羽十有九年春宋公伐邾謝湜曰邾人入鄅故宋伐邾胡安國曰按左氏宋公伐邾圍蟲取之而經不書圍與取何也初鄭人藉稻邾人襲鄅盡俘之鄅子曰余無歸矣從帑於邾邾子反其夫人而舍其女夫人宋向戌之女也故向寧請師圍蟲取之盡歸鄅俘此所謂聲罪執言之兵歸鄅之俘其善意也故書伐邾而釋其取邑之罪此亦善善長惡惡短之義夏五月戊辰許世子止弒其君買程頥語録或問趙盾弒其君夷皋許世子止弒其君買曰皆從𫝊說謝湜曰許悼公瘧世子止以進藥之誤悼公飲藥而卒春秋原情定罪遂以弒惡加之者以悼公之死由世子止所致故也臣之事君子之事父其心所宜敬慎也藥則死生所繫一失倫理則君親由此受患矣臣子尤宜致敬致慎也是以臣之養君子之養父雖過失法所不容欲其無所不用其極也然則許止以藥物不慎而春秋以大逆處之者所以責臣子敬慎之至也律於君親雖藥封題誤亦為大不敬蓋得春秋敬慎之微意矣胡安國曰按左氏許悼公瘧戊辰飲世子止之藥卒書曰弒其君者止不嘗藥也古者醫不三世不服其藥夫子之所慎者三疾居其一季康子饋藥曰丘未逹不敢嘗敬慎其身如此也而於君父可忽乎君有疾飲藥臣先嘗之父有疾飲藥子先嘗之蓋言慎也止不擇醫而輕用其藥藥不先嘗而誤進於君是有忽君父之心而不慎矣自小人之情度之世子弒君欲速得其位而止無此心故曰我與夫弒者不立乎其位哭泣啜飦粥嗌不容粒未逾年而卒無此心故被以大惡而不受自君子聽之止不嘗藥是忽君父之尊而不慎也而止有此心忽君父之尊而不慎此篡弒之萌堅冰之漸而春秋之所謹也有此心故加以大惡而不得辭書許世子止弒君乃除惡於微之意也而或者顧以操刃而殺與不躬進藥及進藥而不嘗三者罪當殊科疑於三傳之說則誤矣必若此言夫人而能為春秋奚待於聖筆乎墨翟兼愛豈其無父楊朱為我豈其無君孟軻氏辭而闢之以為禽獸逼人人將相食後世推明其功不在禹下未有譏其過者知此說則知止不嘗藥春秋以為弒君之意矣己卯地震秋齊髙發帥師伐莒冬葬許悼公程頥曰蔡般許止疑同故書葬謝湜曰春秋賊不討不書葬許悼公書葬者許止非弒也以其進藥不慎害及君親而加之弒也然則悼公書弒所以誅止之不孝也悼公書葬以明止無害君親之心也由是觀之蔡世子之於景公也前書弒後書葬其事蓋與許世子類矣胡安國曰何以書葬穀梁子曰不使止為弒父也其說曰子既生不免乎水火母之罪也羇貫成童不就師傅父之罪也就師學問無方心志不通身之罪也心志既通而名譽不聞友之罪也名譽既聞有司不舉有司之罪也有司舉之王者不用王者之過也許世子止不知嘗藥纍及許君也觀止自責可謂冇過人之質矣乃至以弒君獲罪此為人臣子而不知春秋之義者也古者太子自其初生固舉以禮有司端冕見之南郊過闕則下過廟則趨為赤子而其教已有齊肅敬慎之端此春秋訓臣子除惡於微積善於早之意也二十年春王正月夏曹公孫㑹自鄸出奔宋謝湜曰鄸㑹所治邑自鄸出奔宋者恃鄸共力背國出奔也胡安國曰奔未有言自者此其言自何劉敞曰待放也古者大夫有罪待放於其境三年君賜之環則復賜之玦則去逾境則為位向國而哭素衣裳冠不說人以無罪此去國之禮曹無大夫其曰公孫賢之也待放而從出奔臣子常禮免於貶足矣而何以賢之為公子喜時之後賢之也喜時者曹之社稷鎮公子能以國讓不取乎為諸侯所謂子臧是也春秋之義善善也長惡惡也短善善及子孫惡惡止其身以其賢者之後茍可善焉斯進之矣此舜典罰弗及嗣賞延于世之意也後世議者有乞録用賢者之類功臣之世蓋得春秋之㫖矣秋盜殺衛侯之兄縶謝湜曰兄弟人之至親也君之兄為盜所殺則靈公遇親之不厚察姦之不嚴可知也胡安國曰左氏以為齊豹殺之也齊豹為衛司冦守嗣大夫其書為盜所謂求名而不得者也若艱難其身以險危大人而有名章徹攻難之士將奔走之臣竊以為仲尼書斷此獄罪在宗魯宗魯孟縶之驂乘也於法應書曰盜非求名而不得者也天下豈有欲求險危大人之惡名而聖人又靳此名而不與者哉然則齊豹首謀作亂宗魯雖與聞行事又以身死之矣今乃釋豹不誅而歸獄於宗魯不亦頗乎曰豹之不義夫人皆知之也若宗魯欲事豹而死於公孟蓋未有知其罪者故琴張聞其死將往弔之仲尼曰齊豹之盜孟縶之賊汝何弔焉非聖人發其食姦受亂蓋不義犯非禮之罪書於春秋則齊豹所畜養之盜孟縶所見殺之賊其大惡隱矣冬十月宋華亥向寧華定出奔陳謝湜曰宋元公失御臣之道故三卿構亂出奔十有一月辛卯蔡侯廬卒二十有一年春王三月葬蔡平公夏晉侯使士鞅來聘宋華亥向寧華定自陳入于宋南里以叛謝湜曰華向之入非獨求復職位而已據南里與君為敵故書叛國內附從者衆故入宋南里華向權重於宋久矣三卿雖以大罪出奔然華氏蟠據要職者皆在費遂為大司馬貙為少司馬多僚為卿士皆華氏之內應也華向之奔也上無討賊之師下有援賊之黨欲使奔者不復為亂難矣此三卿所以鬬於腹心之地也胡安國曰按左氏初宋元公無信多私而惡華向三大夫謀曰亡愈於死先諸乃誘羣公子殺之公如華氏請焉弗許遂劫公取太子及其母弟以為質公怒攻之華向奔陳至是入于南里以叛凡書叛有入于戚者而不言衛有入于朝歌者而不言晉有入于蕭者而不言宋此獨稱宋南里何哉戚與朝歌及蕭皆其所食私邑也若南里則宋國城內之里名也傳稱華氏居廬門南里以叛而宋城舊鄘及桑林門以守是華氏與宋分國而居矣故其入其出皆以南里繫之宋以深罪叛臣逼脅其君已甚之詞也秋七月壬午朔日有食之八月乙亥叔轍卒冬蔡侯朱出奔楚謝湜曰左氏謂費無極以楚脅蔡人出朱而立平公之弟秉國公如晉至河乃復謝湜曰晉人以鼓叛辭公故復春秋集義卷四十四

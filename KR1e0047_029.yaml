body:
  text: 春秋集義卷二十六宋李明復撰文公程頥曰文公名興僖公子襄王二十六年即位文諡也慈惠愛民曰文元年春王正月公即位謝湜曰君薨未踰年雖葬嗣子不稱君一年不可二君故也已踰年雖未葬嗣子亦稱君歲已更始不可無君故也胡安國曰即位者告廟臨羣臣也國君嗣世定于初喪必逾年然後改元書即位者終始之義一年不二君緣臣民之心不可曠年無君按書載舜禹終傳位之事在舜則曰月正元日格于文祖在禹則曰正月朔旦受命于神宗率百官若帝之初夫于文祖神宗則告廟也率百官若帝之初則臨羣臣也自古通喪三年其以凶服不可入宗廟其以吉服則斬焉在衰絰之中不可既成而又易之也如之何而可子張問于孔子高宗諒隂三年不言何謂也子曰何必高宗古之人皆然君薨百官總已以聽于冢宰三年則告廟臨羣臣固有攝行之禮矣按商書稱太甲元年伊尹祠于先王則攝而告廟之證也百官總已以聽冢宰則攝而臨羣臣之證也其曰祇見厥祖者言伊尹以奉嗣王之事祗見太甲之祖也至三祀十有二月伊尹以冕服奉嗣王則免喪從吉之證也然顧命康誥記成王之崩其君臣皆冕服何也當是時成王方崩就殯猶未成服故用麻冕黼裳入受顧命已受命誥諸侯而後釋冕反喪服者于是成服而宅憂也或以為康王釋服離次而即吉則謬矣朱熹曰胡安國說春秋公即位終是不通且踰年即位凶服如何入廟安國却說是冢宰攝行他事可攝即位豈可攝且如十一月乙丑伊尹以冕服奉嗣王惟十有三祀却是除服了康王之誥蘇軾道是召公失禮處想古時是這般大事必有箇權宜如借吉之例二月癸亥日有食之天王使叔服來㑹葬謝湜曰諸侯薨天王遣大夫會葬明君父之恩也明君父之恩所以責臣子也胡安國曰凡崩薨卒葬人道始終之大變也不以得禮為常事而不書其或失禮而害于王法之甚者聖人則有削而不存以示義者矣夏四月丁巳葬我君僖公天王使毛伯來錫公命謝湜曰諸侯嗣位必請命于王王錫之命然後繼世守國文公請命之禮不行而襄王反使毛伯以命來錫責魯失臣子之道也毛伯諸侯為王卿士者以禮曰錫以恩曰賜胡安國曰諸侯終喪入見則有錫歲時來朝則有錫敵王所愾則有錫韍冕圭璧因其終喪入見而錫之者也禮所謂喪畢以士服見天子已見賜之黻冕圭璧然後歸是已車馬衮黻因其歲時來朝而錫之者也詩所謂君子來朝何錫豫之雖無豫之路車乘馬又何豫之𤣥衮及黼是已彤弓玈矢因其敵愾獻功而錫之者也詩所謂彤弓弨兮受言藏之我有嘉賔中心貺之鐘鼓既設一朝饗之是已今文公繼世喪制未畢非初見繼朝而獻功也何為來錫命乎故榖梁子曰禮有受命無來錫命來錫命非正也餘見綱領中吕祖謙曰此毛伯恐不在畿內大抵諸侯即位必禀命于天子而後立劉氏權衡此假論得好晉侯伐衛謝湜曰衛成怨晉不朝故晉襄伐衛叔孫得臣如京師謝湜曰王使叔服㑹葬王使毛伯錫命然後得臣修聘于王不恭之大也衛人伐晉謝湜曰晉之伐衛也衛人有辭不服故衛復伐晉秋公孫敖㑹侯于戚謝湜曰戚衛邑㑹于戚左氏謂疆戚田大夫以君命出㑹諸侯臣子之職也大夫以權勢之盛出㑹諸侯臣子之不道也文公以後列國政在大夫故大夫出㑹諸侯自敖始吕祖謙曰晉侯疆戚田故公孫敖㑹之想欲以其地與魯故公孫敖㑹之冬十月丁未楚世子商臣弒其君頵謝湜曰有父之親有君之尊而商臣背之天下大惡未有甚于此者也商臣書世子著其絶尊親之道也州吁不稱公子無知不稱公孫者黜其親而誅其惡以杜公孫恃寵之心也商臣稱世子商人稱公子者顯其親而著其逆以示大禍發于骨肉之間春秋或立例于初以示法或變例于終以起義州吁無知去公子公孫所謂立例于初也商臣商人存世子公子所謂變例于終也子之愛父臣之愛君天性也為世子為公孫者耳不接善言目不親善行友順日消凶忍日積由是良心化為逆惡而德性沈于豺狼之域矣禍害之發豈復顧君父之重哉故商臣書世子以為君父之戒也胡安國曰書世子弒君者有父之親有君之尊而至于弒逆此天理大變人情所深駭春秋詳書其事欲以起問者察所由示懲戒也唐世子𢎞受左氏春秋至此廢書嘆曰經籍聖人垂訓何書此耶郭瑜對曰春秋義存褒貶以善惡為勸戒故商臣千載而惡名不滅𢎞曰非惟口不可道故亦耳不忍聞願受他書瑜請讀禮世子從之嗚呼聖人大訓不明于後世皆腐儒學經不知其義者之罪爾夫亂臣賊子雖陷穽在前斧鉞加于頸而不避顧謂身後惡名足以係其邪志而懲于為惡豈不謬哉持此曉人可謂茅塞其心意矣若語之曰為人君父而不通于春秋之義者必蒙首惡之名為人臣子而不通於春秋之義者必陷篡弒誅死之罪聖人書此者使天下後世察于人倫知所以為君臣父子之道而免于首惡之名誅死之罪也則世子𢎞而聞此必將戄然畏懼知春秋之不可不學矣學于春秋必明臣子之義不至于奏請拂㫖而見鴆矣傳者案也經者斷也考于傳之所載可以見其所由致之漸豈隱乎嫡妾必正而楚子多愛立子必長而楚國之舉常在少者飬世子不可不慎也而以潘崇為之師侍膳問安世子職也而多置宫中降而不憾憾而能眕者鮮矣乃欲黜兄而立其弟謀及婦人宜其敗也而使江芉知其情是以不仁處其身而以不孝處其子也其及宜矣楚頵僣王慿陵中國戰勝諸侯毒被天下然昧于君臣父子之道禍發蕭墻而不之覺也不善之積豈可掩哉君不君則臣不臣父不父則子不子春秋書世子弒其君者推本所由而著其首惡為萬世之大戒也然則商臣無貶曰弒父與君之賊其惡猶待于貶而後著乎呂祖謙曰楚太子商臣弒成王其所以見弒之故亦必有由商臣既是蜂目豺聲之人當須擇賢師以教之可也今却用潘崇以傅之崇曰能行大事乎商臣初間亦未敢有此意却是崇教之崇之惡又浮于商臣矣師傅之不得其人此成王之見弒一也太子在成周時或有事用兵亦不過所掌之國子今楚太子之宫却自有兵甲所以啓其篡弒之禍此成王所以見弒二也成王之見弒亦有數端其他常在少者之類左氏之言分明今不復論觀僖三十三年太子商臣譖子上王殺子上至文元年商臣弒成王以子上之死成王之弒皆以初間謀立太子訪諸令尹子上之故易曰君不密則失臣臣不密則失身二者必居一於此公孫敖如齊二年春王二月甲子晉侯及秦師戰于彭衙秦師敗績程頥曰越國襲人秦罪也忘親背惠晋惡也晋經人之國以襲雖憤無以為詞矣故其來不稱伐晉不諭秦而與戰故書晉及忿以取敗故書敗績謝湜曰秦以殽之役出師伐晉故晉襄禦之戰于彭衙忿兵任力不可以取勝故秦師敗績晉為戰主罪其以戰為事也秦出師乃報殽役故不書伐胡安國曰及秦師戰于彭衙秦戰而言及者主乎是戰者也夫敵加于已不得已而起者謂之應兵爭恨小故不忍忿怒者謂之忿兵按左氏秦孟明帥師伐晉報殽之役此所謂忿兵疑罪之在秦也而以晉侯主之何哉處已息爭之道逺怨之方也然則敵加于已縱其侵暴將不得應乎曰敵加于已而已有罪焉引咎責躬服其罪則可矣已則無罪而不義見加諭之以詞命猶不得免焉亦告于天子方伯可也若遽然興師而與戰是謂以桀攻桀何愈乎故以晉侯為主者處已息爭之道寡怨之方王者之事也吕祖謙曰孟明之罪也是三子皆往何故獨說孟明之罪如前不以一眚掩大德可見丁丑作僖公主謝湜曰親既葬孝子逆神而反諸室乃立木主以依亡者之神而承事之是故既葬之後有虞主既期之後有練主上以附祖考之神而下以繫子孫懷慕之心也禮曰先王既葬設虞祭必于是日也接不忍一日未有所歸也僖之葬十有一月公始作主而安之失孝子寧親之道矣書作僖公主著其緩也胡安國曰作主者造木主也既葬而反虞虞主用桑期年而練祭練主用栗用栗者藏主也何以書僖公薨至是十有五月然後作主慢而不敬甚矣夫慢而不敬積惡之原也以為無傷而不去至于惡積而不可掩所以謹之也又曰春秋尊嚴廟制而謹于祀禮夫祀國之大事也故緩作主世室壞則書于䇿以貶不䖍三月乙巳及晉處父盟謝湜曰公朝于晉晉使陽處父盟公以恥之處父晉大夫也朝聘禮事之吉者也君在而使大夫盟公恥之大者大喪未畢而出朝惡之大者盟不書公公如晉不書諱之也盟為公諱朝為公諱而公之恥惡由此見矣莊公未釋哀而求婚文公未釋哀而朝晉其惡一也高傒處父盟不書公其諱一也春秋之義不以强陵弱不以枉勝直修朝禮魯之義也以大夫辱諸侯晉之不義也故處父貶族不書所以屈晉而伸魯也胡安國曰及處父盟者公也其不地于晉也諱不書公者抑大夫之抗不使與公為敵正君臣之分也適晉不書反國不致為公諱恥存臣子之禮也凡此類筆削魯史之舊文衆矣吕祖謙曰晉人使陽處父盟公以恥之古者公侯不與伯子男㑹經書處父去氏以貶損處父不能正君之失夏六月公孫敖㑹宋公陳侯鄭伯晉士縠盟于垂隴謝湜曰垂隴之盟晉為盟主謀伐秦也士縠晉卿卿不可先諸侯故列鄭伯下魯以晉恥公故公孫敖㑹盟呂祖謙曰書士縠堪其事也杜注非卿蓋晉有大司馬又有司馬如司馬子魚是小司馬不是正卿子魚為左師已自是卿了但兼為司馬耳如大司馬固乃是卿此即是大司馬自十有二月不雨至于秋七月謝湜曰不雨凡八月田苖損傷盡矣文公上不慮天時下不恤民政非若僖公逐時以不雨為念也直書十有二月不雨至于秋七月著其無恤民之心也隂陽和則雨不雨以隂陽不交也隂陽不交及一年則隂陽之氣絶矣隂陽不交及八月則隂陽之氣于此幾絶矣隂陽無絶之道故春秋書不雨止于八月胡安國曰書不雨至秋七月而不曰至于秋七月不雨者蓋後言不雨則是冀雨之詞非文公之意也夫書不雨至于秋七月而止即八月嘗雨矣然而不書八月雨者見文公之無意于雨不以民事係憂樂也其怠于政事可知而魯衰自此始矣八月丁卯大事于太廟躋僖公程頥曰大事即是祫言大事于太廟躋僖公即合食閔僖二公之義程氏學曰大事于太廟躋僖公大事謂禘也為躋僖公大其事也僖公閔公庶兄而立位在閔下而躋之紊亂宗廟顛倒禮經莫此為大三傳同云逆祀非禮明矣故定公八年冬從祀先公著復正也從祀者順祀也彼順則此逆尤可知矣謝湜曰魯人奉閔為君則僖公嘗為閔之臣矣奉僖繼閔之後則僖公嘗為閔之子矣僖雖閔庶兄以兄繼弟其始雖不順然國人奉以繼閔則閔為之父僖為之子其位不可易也文公恭修大事而升僖公位于閔上是乃以子先父以臣先君以閨門之私恩廢朝廷大義也父子易位而尊畢失序矣書曰躋僖公正其亂也躋越次之詞也自下而躋之上自卑而躋之尊昭穆之序亂矣大事禘也祭事莫大于禘故禘為大事書曰大事而不曰禘著其亂大事也葬十有一月而作主喪二十有一月而大事緩于主速于大事不孝之大也胡安國曰有事者時祭大事祫也合羣廟之主食于太廟升僖于閔之上也閔僖二公親則兄弟分則君臣以為逆祀者兄弟之不先君臣禮也君子不以親親害尊尊故左氏則曰祀國之大事而逆之可乎子雖齊聖不先父食久矣公羊則曰其逆祀先禰而後祖也穀梁則曰逆祀則是無昭穆也無昭穆則無祖也閔僖非祖禰而謂之祖禰者何臣子一例也夫有天下者事七世諸侯五世說禮者曰世指父子非兄弟也然三傳同以閔公為祖而臣子一例是以僖公父視閔公為禮而父死子繼兄亡弟及名號雖不同其為世一矣朱熹語録或問諸家多謂躋僖公故夫子不欲觀禘此說如何熹曰禘是于始祖之廟推所自出之帝設虛位以祀之而以始祖配即無昭穆之序王者有禘有祫故周禘帝嚳以后稷配之諸侯有祫而無禘此魯之所以為失禮也呂祖謙曰大事于太廟如禴蒸嘗是常祭止謂之事如禘祫非常祭則謂之大事又曰禮無不順凡是禮事事無不順况祀是國之大事豈可不順今而逆之豈可謂之禮又曰湯不先契文武不先不窋契與不窋不是不肖但較之湯文武少劣耳宋祖帝乙鄭祖厲王猶上祖也如帝乙與厲王雖不肖猶尊而上之以為祖此處最要看知得子不以己之貴而恥其祖之賤冬晉人宋人陳人鄭人伐秦程頥曰秦以憤取敗晉可以已矣而復伐秦報復無已殘民結怨故貶稱人謝湜曰襄公既敗秦師于殽又敗秦師于彭衙今又合四國之衆伐秦著其連禍也胡安國曰按左氏四國伐秦報彭衙之役則皆國卿也其貶而稱人者晉人再勝秦師在常情亦可以已矣而復興此役結怨勤民是全不務德専欲力爭而報復之無己也以致濟河焚舟之師故特貶而稱人公子遂如齊納幣程氏學曰二年冬公子遂如齊納幣四年夏逆婦姜于齊卿佐納幣微者逆之固為失禮而未為重者也春秋之義微顯闡幽其在乎此文公禫未除而納幣違禮而隱者也女在其父母家之所稱也故逆皆稱女以未成婦也文公之圖婚也以既禫為喪終以納幣為未成理固幽而難辨也非聖人誰眀之特書曰逆婦姜于齊言納幣則已成婦矣不書至者不告廟也娶夫人所以奉宗廟而不告之其不恭也大矣若宣元年公子遂如齊逆女遂以夫人婦姜至自齊謂不侍貶絶而惡見者也先儒謂婚姻不當使公子而不述其所以蓋公子公孫于國事皆惟臣禮而已惟婚姻之禮則于家人有尊卑之序若俾尊者從事則非順也卑者行之何有于不可哉謝湜曰不待既祥而大事于廟不待釋禫而納幣于齊忘哀之早也胡安國曰婚烟常事不書其書納幣者喪未終而圖婚也夫娶在三年之外矣則何譏乎春秋論事莫重乎志志敬而節具與之知禮志和而音雅與之知樂志哀而居約與之知喪非虛加之謂也重志之謂也此皆使人私欲不行間邪復禮之意呂祖謙曰襄仲是莊公子文公叔此是至親者所以委之春秋集義卷二十六

body:
  text: 春秋集義卷三十三宋李明復撰宣公十有二年春葬陳靈公謝湜曰楚子以義討賊與本國臣子討賊無異故書葬胡安國曰討賊者非臣子也何以書葬天下之惡一也本國臣子或不能討而上有天王下有方伯又其次有四隣有同盟有方域之諸侯有四夷之君長與凡民皆得而討之所以明人倫存天理也徴舒雖楚討之臣子亦可以釋怨矣故得書葬君子詞也楚子圍鄭謝湜曰辰陵既盟之後鄭懼難復事晉故楚子圍鄭圍鄭之役楚已入鄭矣不書入者以楚子叛而伐之服而舍之退三十里而許之平不為鄭國患故也胡安國曰按公羊傳例戰不言伐圍不言戰入不言圍滅不言入書其重者楚子縣陳盖滅之矣而經止書入其于鄭也入自皇門至于逵道盖即其國都矣而經止書圍曷為悉從輕典不書其憑陵中夏之罪乎上無天王下無方伯天下諸侯有臣弑君子弑父諸夏不能討而夷狄能討之春秋取大節畧小過雖如楚子憑陵上國近造王都之側猶從末減于以見誅亂臣討賊子正大倫之為重也夏六月乙卯晉荀林父帥師及楚子戰于邲晉師敗績謝湜曰邲之戰不書伐楚者楚來圍鄭而晉荀林父帥師戰之也戰由晉起故以林父主戰而罪之楚莊暴橫久矣修正令合諸侯明大義然後可以懲强楚之縱而建中國之功也林父以力鬭楚以一國之衆當强楚之鋒其進也計慮不明上下不協非獨不足以解鄭而安之也適以益晉之禍而已書晉師敗績罪林父戰楚之失其道也胡安國曰戰而言及主乎是戰者也按左氏晉師救鄭經既不以救鄭書矣又不言楚晉戰于邲而使晉主之何也陳人弑君晉不討賊而楚人能討之楚人圍鄭亦既退師與鄭平矣而又與之戰則非觀釁之師也故釋楚不貶而使晉主之獨與常詞異乎按邲之役六卿並在大夫司馬皆具官不欲𠞰民者三師也違命濟師者先縠也而獨罪林父何也尊無二上定于一也古者仗鉞臨戎専制閫外雖君命有所不受况其屬乎欒書救鄭軍師之欲戰者八人武子遂還衆不敢遏偪陽之舉匄偃二將皆請班師荀罃令曰七日不克必爾乎取之遂下偪陽林父既知無及于鄭焉用之矣諸帥又皆信然其䇿先縠若獨以中軍佐濟者下令三軍無得妄動按軍法而行辟夫豈不可既不能令乃畏失屬亡師之罪而從韓獻子分惡之言知難而冒進是棄晉師于誰責乎故後誅先縠不去其官此稱敗績特以林父主之也朱熹曰荀林父邲之役先縠違命而濟或謂與其専罪六人同之是何等見識當時為林父者只合按兵不動召先縠而誅之又曰當時楚孫叔敖不欲戰伍參争之若事有合争處須當力争不可茍徇人情也吕祖謙曰宣成之間正是楚莊霸業强盛之時舉邲之戰晉楚之强弱可知當是時晉景公但循常襲故政事少怠楚莊方厲精為治政事修明晉楚之强弱大綱在此楚之所以强盖得叔孫敖整齊軍政訓教卒伍細大本末無不具舉兵威所嚮雖中國亦不敢當其鋒楚之盛不特兵之不可敵亦在善能持勝何故既縣陳又復封之既而克鄭鄭伯肉袒牽羊以逆又復其社稷夫楚用兵以取兩國而又復封其社稷此見楚有其功而不居其功齊桓晉文以來未之有也當邲之戰晉楚正欲争衡荀林父欒書之徒一見楚師便欲斂軍避楚則其强弱又易曉要之邲之敗其罪固在先縠然林父亦不能無罪以縠之剛複不仁固不可信用林父以晉之名臣統元帥之權而不能制一先縠者盖其新進之徒威徳未孚于人故如此以楚嬖人伍參之言觀之謂晉之從政者新此言論林父最切當大抵賢才處事或至于敗事者未必不由于新進處事之不審特其素望之未熟于人也此其所以敗事古之人所以四十而仕五十而為政者盖欲涵養積習使威望在人已熟然後可以任用若是養之無素驟然居人上鮮有不敗事者良以此也故邲之敗雖是彘子之罪然荀林父亦有不是處觀彘子以中軍佐濟及林父不得已而從之此彘子之罪也使趙括更行人失辭是以惡言激楚之怒此彘子之罪不設備而為楚所乘三者雖彘子之罪然荀林父乃元師至于魏錡趙旃以不得官職挾憾而往楚欲敗晉師是人皆知其不可用獨林父不察焉一請往乃許之遂致于敗國事此乃林父之罪先縠先濟而林父亦從之此亦林父之罪及後為楚軍所乘鼔於軍中曰先濟者有賞遂致中軍下軍争舟舟中之指可掬此亦林父之罪原邲之敗皆是晉羣帥浮躁不協遂至于敗師自邲敗之後大率規模與前不同故當厚蓄自養不敢有事乎他師還之後不敢加忿兵于楚但使解揚致命而已亦不敢加兵當時之諸侯如伐鄭但示之整而已惟其如此所以有鞌之勝夫以滅狄數者之事觀之林父之謀慮亦可謂明矣至於邲之戰何如此之昏亂盖人心最不可昏當邲之戰緣先縠强狠必欲先濟林父又不得己勉强從之惟其自相矛盾自相攻奪如此故林父方寸精明都昏亂了其從先濟之時心已不在軍事是以舉措乖錯邲之戰縠曰由我失霸不如死欒書從旁而止之至鄢陵之戰欒書為元帥乃曰不可以當吾世失諸侯反蹈先縠之覆轍而不自知范武子從傍而止之何智于前而昏于後也盖天下之事傍觀之時無不精審及自臨事時利害切於己私心難克所以如此秋七月冬十有二月戊寅楚子滅蕭謝湜曰蕭宋附庸國胡安國曰假於討賊而滅陳春秋以討賊之義重也未減而書入惡其貳已而入鄭春秋以退師之情恕也未減而書圍與人為善之徳宏矣至是肆其强暴滅無罪之國其志已盈雖欲赦之不得也故傳稱蕭潰經以滅書斷其罪也孟子曰以力假仁者霸霸必有大國楚莊盖以力假仁不能久假而遽歸者也建萬國親諸侯者先王之政興滅國繼絶世者仲尼之法今乃滅人社稷而絶其祀亦不仁甚矣蕭既滅亡必無赴者何以得書于魯史楚莊縣陳入鄭大敗晉師于邲莫與校者不知以禮制心至于驕溢克伐怨欲皆得行焉遂以滅蕭告赴諸侯矜其威力以恐中國耳孟子定其功罪以五霸為三王之罪人春秋史外傳心之要典推此類求之斯得矣晉人宋人衛人曹人同盟于清丘程頤曰晉為楚敗諸侯懼而同盟既而背渝故書人以貶之程氏學曰同盟之例有三一則主臣在㑹而書同盟者王臣亦與盟也柯陵鷄澤平丘是也以見尹子單子劉子亦同盟也首止葵丘臯鼬之㑹曰諸侯盟于某則王世子宰周公劉子不同盟也故止書諸侯又如㑹王人盟于洮于翟泉及蘇子盟于女栗直以魯㑹及盟而書更無伐㑹日月之隔其勢自不須云同耳嗚呼王者御諸侯王臣將王命必惇信明義而後可以表正乎天下諸侯守邦必尊王奉法而後可以保其社稷周衰一切反是王臣下與諸侯約誓諸侯亦敢上與王臣要言斯大亂之道也然則首止葵丘臯鼬之㑹猶為有善者矣凡諸侯之盟皆大國率之小國不得已而從焉者也其有小國與之同欲亦書同盟于幽鄭伯欲盟故也同盟于新城衛侯之所同願也同盟于斷道魯衛曹同欲伐齊故也同盟于虚朾謀救晉協謀而為此盟也同盟于重丘欲以討齊俱志在于定亂也考其前後之文皆諸侯同欲而書同盟者也有惡其反覆而書同盟者夫盟以不信而為之者也又况不信之尤乎盖有既盟而復背之者言已嘗同盟所以深責其不然也如莊十六年同盟于幽及清丘蟲牢馬陵蒲戚戯亳城北之盟是也考其前後之文皆既同盟不旋踵而遂相執伐則又惡其反覆而書同盟者也謝湜曰楚日强盛四國欲恤病討貳協力相維故晉原縠宋華椒衛孔達曹人同心為盟卿不名者同盟之後四國反覆背盟故清丘之盟卿皆奪節稱人以著四國之惡也凡盟既盟而背之者猶以其盟出于不得已也同盟而違之則其惡大矣清丘之盟是也胡安國曰書同盟志同欲也或以惡其反覆而書同盟非也春秋不貴盟誓自隠公始年書儀父盟蔑宋人盟宿已不實言矣奚待清丘然後惡其反覆乎清丘載書恤病討貳口血未乾敗其盟好所謂不待貶而惡自見者也又奚必人諸國之卿然後知反覆之可罪乎楚既入陳圍鄭大敗晉師伐蕭滅之憑陵中國甚矣為諸侯計者宜信任仁賢修明政事自强于為善則可以保其國耳不是圖而刑牲㰱血要質鬼神蘄以禦楚謀之不臧孰大于是故國卿貶而稱人譏失職也原縠違命喪師乃晉國罪人而主茲盟約所信任者皆可知矣宋師伐陳衛人救陳謝湜曰陳以衛為好而宋師伐之宋以陳為貳而衛人救之同盟之後二國背戾相違書伐書救罪其失信也胡安國曰陳有弑君之亂宋不能討而楚能討之雖曰縣陳尋復封之其徳于楚而不貳未足責也宋人不能内自省徳遽以大衆伐之非義舉矣衛人救陳背盟失信而以救書者見宋師非義陳未有罪而受兵為可恤也且謀國失圖妄興師旅無休息之期則亂益滋矣其以救書意在責宋也若衛叛盟則不待貶絶而惡自見矣十有三年春齊師伐莒謝湜曰莒小國以齊國之力而不能服莒服之不以其道也夏楚子伐宋謝湜曰楚子既滅蕭于是伐宋以宋師伐陳故也楚之伐宋也晉衛曹畏楚無一出救者背清丘之盟也胡安國曰楚人滅蕭將以脅宋諸侯懼而同盟為宋人計者恤民固本輕徭薄賦使民効死親其上則可以待敵矣計不出此而急于伐陳攻楚與國非策也故楚人有詞于伐而得書爵秋螽冬晉殺其大夫先縠謝湜曰先縠剛愎不仁邲之敗起于先縠故晉以國法殺之凡大夫有罪而書國殺善其國之行法也凡大夫無罪而書國殺罪其國之失道也觀大夫有罪無罪而國殺之當否見矣胡安國曰先縠違命大敗晉師元帥不能用鉞已失刑矣今又重有罪焉晉人治其罪而戮之義也曷為稱國以殺而不去其官夫兵者安危所係有國之大事也將非其人則敗雖得其人使親信間之則敗以剛愎不仁者參焉而莫肯用命則敗凡此三敗君之過也河曲之戰趙穿獨出而臾駢之謀不用濟涇而次欒黶欲東而荀偃之令不行今林父初將中軍乃以先縠佐之使敵國謀臣知其從政者新未能行令誰之過與故稱國以殺不去其官罪累上也十有四年春衛殺其大夫孔達夏五月壬申曹伯壽卒謝湜曰晉以楚伐宋討衛救陳衛之背盟救陳達之謀也故衛以國法殺之胡安國曰殺大夫而書名氏義不繫于専殺也孔達棄信以危社稷衛人按其罪而誅之可也何以稱國而不去其官用人謀國干犯盟主至于見討誰之過與稱國以殺不去其官罪累上也春秋端本澄源故書法如此吕祖謙曰晉討衛前後小國貳大國亦多未嘗必欲殺其二謀者至此必欲討衛孔達何與盖晉經邲一敗之後欲張綱紀晉國不如是震威則不足以服諸侯晉侯伐鄭謝湜曰鄭即晉則楚圍鄭胡安國曰按左氏傳為邲故也比事以觀知其為報怨復讎之兵詞無所貶者直書其事而義自見矣秋九月楚子圍宋謝湜曰伐宋圍宋以宋伐陳且不服也胡安國曰宋人要結盟誓欲以禦楚已非持國之道輕舉大衆𠞰民妄動又非恤患之兵特書救陳以著其罪明見伐之由也國必自伐然後人伐之凡事其作始也簡其將畢也必巨易于訟卦曰君子以作事謀始始不謀必至于訟訟而不竟必至于師若宋是矣始謀不臧至于見伐見圍幾亡其國則自取之也春秋端本故責宋為深若蠻夷圍中國則義亦明矣葬曹文公冬公孫歸父㑹齊侯于糓胡安國曰夫禮别嫌明微制治于未亂自天子出者也列國之君非王事而自相㑹聚是禮自諸侯出矣以國君而降班失列下與外臣㑹以外臣而抗尊岀位上與諸侯㑹是禮自大夫出矣君若贅旒陪臣執命豈一朝一夕之故其所由來漸矣故易于坤之初六曰馴致其道至堅氷也易言其理春秋見諸行事若合符節可謂深切著明矣春秋集義卷三十三

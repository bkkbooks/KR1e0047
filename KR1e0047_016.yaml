body:
  text: 春秋集義卷十三宋李明復撰莊公九年春齊人殺無知謝湜曰殺於齊故不地齊人討其逆而殺之故不書爵胡安國曰殺無知者雍廪也而曰齊人者討賊之詞也弑君之賊人人之所惡夫人之所得討故稱人人者衆詞也無知不稱君已不能君齊人亦莫之君也公及齊大夫盟于蔇謝湜曰公子糾在魯齊大夫來謀立糾故公及齊大夫盟胡安國曰及者内為志大夫不名者義繫于齊而不繫于大夫之名氏也曰公及齊大夫盟者譏公之釋父怨親仇讐也或曰以徳報怨寛身之仁何以譏之也曰徳有輕重怨有深淺怨莫甚乎父母之仇而徳莫重乎安定其國家而圖其後嗣也有父之讐而不知怨乃欲以重徳報之也則人倫廢天理滅矣然則如之何以直報怨以徳報徳夏公伐齊納糾齊小白入于齊程頤曰春秋書公伐齊納糾而不稱子不當立者也又曰桓公兄也當立子糾弟也不當爭考之春秋可見桓公之入也書曰齊小白入于齊魯之納子糾也書曰公伐齊納糾左氏誤多子字公榖之言是也後書齊人取子糾殺之言子者盖罪齊人已盟立之而取殺之也齊人非以其不正而舎之也直反復而背之耳若使桓弟而糾兄管仲所輔者正桓奪其國而殺之則管仲與桓乃不可同世之讐也若計其後功而與其事桓聖人之言無乃害義之甚啟萬世反覆不忠之亂乎桓公子糾之事子貢所知也故夫子答之但言其不死為可耳後人當審校其本末然後見義之所當也又曰書齊小白入于齊以國繫者明當立也楊時曰嘗攷子糾與小白未嘗為世子而俱出奔故春秋不書子而書公伐齊納糾齊小白入于齊左氏曰納子糾公榖皆曰納糾其義當以公榖為正以齊繫小白宜有齊者也糾不稱子又不繫之齊者外之不宜有齊者也不宜有齊而入之是為亂而已范祖禹曰齊桓公殺公子糾召忽死之管仲不死又相桓公以霸何哉桓公子糾皆以公子出奔子糾未嘗為世子也桓公先入而得齊非取諸子糾也桓公既入而殺子糾惡則惡矣然納桓公者齊也春秋書公伐齊納糾稱糾而不稱子不當立者也齊小白入于齊以小白繫之齊當立者也又曰齊人取子糾殺之稱子糾所以惡齊也謝湜曰糾小白皆僖公子公為齊立糾而鮑叔之黨欲立小白故公之立糾以至伐齊納焉其納糾也小白拒敵先入小白先入而公及齊大夫之謀由此不集矣糾幼于次不當立糾不稱子以明公之納糾非正也小白長于次當立小白稱齊以明小白之得國為正也小白于次當立其得國正也然春秋不書公子而外之者上不能請王命以令臣民下不能明正統以承社稷惟恃公子族屬與糾爭國終于自立而已故去公子以示當黜書入以示不順王命天下之紀綱也小白一失王命而春秋待之與簒奪者同歸然則公子繼世其可不由王命者哉左氏經書納子糾而先儒以子糾為兄何以知公榖書納糾為是何以知小白于次當立曰管仲之改事桓公也孔子不以為逆則小白以正得位可知矣以糾正當立則子糾管仲之君也小白子糾之仇也使管仲不死君難而北面事讐乃臣之不義不忠者也孔子豈得鄙匹夫之諒而稱管仲之仁哉然則孔子所以稱管仲者以仲之去糾從桓不失乎義也胡安國曰左氏書子糾二傳曰伐齊納糾君子以公榖為正納者不受而强致之稱入者難詞糾不書子者明糾不當立也以小白繫齊者明小白宜有齊也所以然者襄公見殺糾與小白皆以庶子出奔而糾弟也又未嘗為世子按史稱周公誅管蔡以安周齊桓殺其弟以反國是糾幼而小白長其有齊宜矣宜則何以不稱公子内無所承上不禀命故以王法絶之也桓公于王法雖可絶視子糾則當立故管仲相桓為徙義而聖人稱之曰微管仲吾其被髮左袵矣召忽死于子糾為傷勇比諸匹夫匹婦之諒自經于溝瀆而莫之知也秋七月丁酉葬齊襄公謝湜曰賊討故書葬為一國君主而逆倫悖理與禽獸無别不有人禍必有天殃理勢之常也八月庚申及齊師戰于乾時我師敗績程頤曰及其師非卿也公戰諱敗凡言敗績大敗也小小勝負不書謝湜曰小白入齊而齊國君位定矣入齊而齊國靜安則齊人聽命于桓矣方是時魯人猶以納糾為心是以不正伐正而不知及也故乾時之戰我師敗績内不言敗乾時之戰書敗者主兵非公故也胡安國曰内不言敗此其言敗者為與讐戰雖敗亦榮也按左氏戰于乾時公喪戎路傳乗而歸則敗績者公也能與讐戰雖敗亦榮何以不言公貶之也公本忘親釋怨欲納讐人之子謀定其國家不為復讐與之戰也是故沒公以見貶若以復讐舉事則此戰為義戰當書公冠于敗績之上與沙隨之不得見平丘之不與盟為比以示榮矣惟不以復讐戰也是故諱公以重貶其忘親釋怨之罪其義深切著明矣吕祖謙曰魯與齊大夫自春盟至夏方納子糾何其遲如此盖二公子各有黨魯欲調護之所以遲如此又曰齊桓公霸業在春秋渉三公莊閔僖若莊公正是桓公當時初歸經營霸業桓公規模未用管仲後來方用管仲比管仲新得政時事體不同桓公以莊九年入齊即位是時敗魯師是年取管仲歸國而相之管仲雖初入國是時尚新得政若莊公十年此一兩年事未是管仲經營所以與後來不相似大抵管仲圖霸規模緩而不迫看莊公十年前既敗魯師于乾時次年又舉師伐魯長勺之戰為魯所敗到六月齊又與宋次于郎看得涉兩年間三加師于魯規模蹙迫大抵與後不同以此知正緣管仲新得政未得盡施其術不惟三加師于魯規模迫促後面兩為魯敗長勺之戰為魯人三鼓而敗後來郎之次又為公子偃先敗宋師齊師乃還若當時管仲便謀慮計畫無緣得兩敗以此看得管仲規模不惟外面經營諸侯緩而不迫他裏面所以得君得政亦緩而不迫何故前年桓公因鮑叔之言相管仲若是管仲規模促迫時便須諫桓公不可加兵于魯使加兵于魯管仲必紛然建謀出其所長盖管仲初得政當時自有國子髙子政未專出他他且袖手旁觀一兩年以此見管仲得君得政亦緩而不迫自此以後桓公之規模大率不同十三年北杏之會是時管仲全得政且如楚當時憑陵諸國管仲且放二三十年不問直到屈完之盟不戰自屈晉獻公父子憑陵諸國亦放而不問到得後來葵丘之㑹晉侯自來盖管仲不去嵗月間見効常要自家修舉政事兵乗修整本疆則精神折衝所謂崛强不服之國教他自入管仲規模中此其所以為管仲此其所以五霸桓公為盛大抵王之與霸論來王者不計功謀利霸者計功謀利王者不求近功速效霸者求近功速效然而就霸者論之以桓文對説時桓公計功謀利比文公時便少桓公不急近效却做得王者事何故晉文公事業在僖二十八年都做了如侵曹伐衛敗楚朝王聲績赫然震蕩人耳目一年都做盡桓公規模三十餘年尚藏其用功之所以遲速時便是桓文才之髙與下管仲舅犯規模之深與淺以是知晉文不如齊桓舅犯之徒不如管仲九月齊人取子糾殺之程頤曰齊侯死諸公子皆出小白長而當立子糾少亦欲立管仲奉子糾奔魯小白入齊既立仲納子糾以抗小白以少犯長又所不當立義已不順既而小白殺子糾管仲以所事言之則可死以義言之未可死故春秋書齊小白入于齊以國繫者明當立也又書公伐齊納糾去子明不當立也至齊人取子糾殺之此復稱子者罪齊大夫既盟而殺之也程氏雜説曰八年冬齊無知弑其君諸兒此年春齊人殺無知故齊大夫來與公盟立糾小白長糾幼小白當立二公子各有黨公許齊大夫盟故為之伐齊納糾小白拒敵而入故不書歸内諱敗為公諱恥也乾時之戰不諱敗其師微者非公也公伐齊納不正故書納糾而不曰子齊人殺糾而書子者齊大夫既自與魯盟而立之矣又自殺之故書曰齊人取子糾殺之以罪齊也書取則魯亦與焉小白不書公子者上不由天子之命下不受于其君父特以公子之故爭國自立所以貶絶之也若莊公納讐人之子則其惡有不待譏而白矣或曰左氏經書公伐齊納子糾先儒説春秋者亦皆以子糾為正今云不正當何所據曰子貢曰管仲非仁者歟桓公殺公子糾不能死又相之子曰管仲相桓公霸諸侯一匡天下民到于今受其賜微管仲吾其被髮左袵矣豈若匹夫匹婦之為諒也自經于溝瀆而莫之知也以是觀之則可知矣使糾若當立而管仲反面事仇則孔子豈特謂之匹夫匹婦之諒哉惟其始事不正變而之義此夫子所以云爾已矣謝湜曰齊大夫奉糾而立之糾乃齊之子也小白君位已定則齊大夫變而從義以事小白可也以義全子糾而復之使小白不失兄弟之恩可也盡義保之而不得免然後聽命于齊非我之罪也今乃視糾之難棄而不救使齊人至魯殺之是我以糾與齊也故齊人殺糾書取書子罪魯及齊大夫立以為子而其終棄之也胡安國曰取者不義之詞前書納糾不稱子者明不當立也此書殺糾復稱子者明不當殺也或奪或予于義各安春秋精意也仁人之于兄弟不藏怒焉不宿怨焉親愛之而已糾雖爭立越在他國置而勿問可也必請于魯殺之然後快于心其不仁亦甚矣後世以傳讓為名而取國者必殺其主以為一人心防後患意與此同流毒豈不逺哉故孟子曰五霸三王之罪人也仲尼之徒無道桓文之事者冬浚洙謝湜曰政事弗講而浚洙以備齊失之大也胡安國曰固國以保民為本輕用民力妄興大作邦本一搖雖有長江巨川限帶封域洞庭彭蠡河漢之險猶不足憑而況深乎書浚洙見勞民于守國之末務而不知本為後戒也十年春王正月公敗齊師于長勺謝湜曰齊師入境乾時之戰所召也公之納糾也以國則世讐以位則不正以機則緩而後時以謀則淺而敗事以至怨結禍連踰年不息胡安國曰齊師伐魯經不書伐意責魯也詐戰曰敗敗者為主或曰長勺魯地而齊師至此所謂敵加于已不得已而後應者也疑若無罪焉何以見責乎善為國者不師善師者不陣善陣者不戰故行使則有文告之詞而疆塲則有守禦之備至于善陣徳已衰矣而況兵刃相接又以詐謀取勝乎故書魯為主以責之皆已亂之道寡怨之方王者之事也張栻嘗自淮上入奏事髙廟問春秋長勺之戰如何對曰長勺之戰曹劌所論特血氣之勇所以易竭若報父兄之怨雖百鼓不竭王音嘉嘆二月公侵宋謝湜曰北搆禍于齊南結怨于宋三月宋人遷宿謝湜曰宿微國遷之為已附庸胡安國曰其曰遷宿者宿非欲遷為宋人之所遷也懷土常物之大情遷國重事也雖逺害就利去危即安猶或恐沉于衆不肯率從而况迫于横逆非其所欲棄久宅之田里刈新徙之蓬藋道途之勤營築之勞起怨諮傷和氣豈不惻然有隠乎肆行莫之顧也其不仁亦甚矣凡書遷不待貶而惡已見矣夏六月齊師宋師次于郎公敗宋師于乗丘謝湜曰莊公結怨二國故二師入次于郎二師之次于郎也魯之危甚矣公敗宋師國之幸也深攻逺入者其師勞恃衆不戒者其師怠故壯公前敗齊于長勺後敗宋于乗丘曹劌謂彼竭我盈公子偃謂宋師不整信矣胡安國曰齊人輕舉大衆深入他境肆其報復之心誠有罪也魯人若能不用詐謀奉其辭令二國去矣偷得一時之捷而積四鄰之忿此小人之道故次者不以其事勝者不以其理交譏之秋九月荆敗蔡師于莘以蔡侯獻舞歸程氏雜説曰莊十年荆敗蔡師于莘荆始見于經十四年入蔡十六年伐鄭皆止書曰荆荆本子爵僻在蠻夷不能從中國政令居中國爵號王祭不共故夷狄之也莊二十三年書曰荆人來聘于此始能修聘而未能備中國之禮故秪書人二十八年荆伐鄭者猶前志也僖二年書楚人伐鄭至是始改號楚盖自此寖强矣故皆稱人焉然後齊桓之世惟秪書人而不得與中國之㑹盟者為齊桓能制其强也至十有七年齊桓卒楚于是始横十九年則已盟于齊矣二十一年又盟于鹿上用見周衰微夷狄方張耳至秋之㑹則書宋公楚子㑹于盂執宋公以伐宋楚于是乎大張列位于陳蔡之上而書爵矣所以著其强大難制中國不能抗也至冬告捷以威諸侯也聖人復書楚人使冝申來獻貶其爵又書獻所以抑其强爾從是以後有事于中國皆用其爵唯貶而人之者各隨其事以見焉謝湜曰荆之敗蔡師也哀侯無死社稷之義而臣服于荆故荆以哀侯歸國既服則非執之也故書以歸屬于荆則其位已絶于國故書名凡書敗書滅書入以其君歸者春秋皆名以其前無死義之忠後無復國之志故以匹夫名之楚始號荆至此入侵中國獨書荆以其無上下之禮外之也以荆林之伐諸姫而虜其君其不道明故不書侵伐胡安國曰蔡侯何以名絶之也凡書敗書滅書入而以其君歸皆名者為其服為臣虜故絶之也若蔡獻舞潞嬰兒沈嘉許斯頓䍧胡豹曹陽邾益之類是矣國君死社稷正也逃之雖罪猶有恥焉虜甚矣楚人滅夔以夔子歸獨不名者夔子以無罪見討雖國滅身為臣虜其義直其辭初不服也是以獨假之爵而不名也春秋之法諸侯不生名失地則生而名之比于賤者欲使有國之君戰戰兢兢長守富貴無危溢之行也朱熹曰荆楚初書國後進稱人稱爵乃自是他初間不敢驟交于中國故從卑稱後漸大故稱爵冬十月齊師滅譚譚子奔莒程頤曰春秋之法將尊師衆曰某帥師將卑師少曰人將尊師少曰某齊自管仲為政莊十一年而後未常興大衆也其賦于諸侯亦寡矣終管仲之身四十年息養天下厚矣惟救邢稱師譏其次也至于秦晉使之不競而已不强致也是以其功卑而易成謝湜曰齊桓以師滅譚威力盛矣而譚子猶奔譚子心不服齊可知也小國為大國所滅其君力屈而奔者非以不道失國也非以屈節在所棄也以直辭訴王以王命求助邦國則社稷可以復安矣豈可遽以匹夫絶之哉故君以國滅而奔者春秋皆不名所以與小國之興復也春秋崇志節美忠義故志節存忠義著則國雖滅身雖奔而王法與之其義未絶于國故也志節衰忠義廢則爵雖存身雖安而王法棄之其義已絶于國故也國滅故奔不言出胡安國曰滅而書奔責不死位也不書出國亡無所出也國滅自奔而不能守其富貴何以書爵乎已無取滅之罪為横逆所加而力不能勝至于出奔則亦不幸焉爾矣其義盖未絶也按左氏齊侯之出也過譚譚不禮焉及其入也諸侯皆賀譚又不至責其失事大之禮可矣坐此見滅可乎齊師滅譚譚子奔莒楚人滅弦弦子奔黄狄滅温温子奔衛三國所以皆存其爵不比于失地之君而名之也然則吳滅徐徐子章羽奔楚何以獨名按左氏吳伐徐徐子斷其髮攜其夫人以逆吳子既以屈服而後奔豈有興復之志乎獨書名所以絶之也春秋之義雖在于抑强扶弱又責弱者之不自强于為善也故其書法如此爾十有一年春王正月夏五月戊寅公敗宋師于鄑謝湜曰宋怨未解故師又入鄑而公敗之秋宋大水謝湜曰聖人憂世之慮深故鄰國災異之大者亦書胡安國曰凡外災告則書所謂災者害民及物如水火兵戎之冦是也諸侯于四鄰有恤病救急之義則告為得禮而不可以不弔故四國同災許人不弔君子以是知許之先亡也凡志災見春秋有謹天戒恤民隠之心王者之事也冬王姬歸于齊謝湜曰以魯為齊主婚故書不書齊侯來逆絶齊于魯也胡安國曰按周衰王姬嫁于諸侯車服不繫其夫下王后一等禮亦隆矣春秋之義尊君抑臣其書王姬下嫁曷為與列國之女同詞而不異乎曰陽唱而隂和夫先而婦從天理也述天理訓後世則雖以王姬之貴其當執婦道與公侯大夫士庶人之女何以異哉故舜為匹夫妻帝二女而其書曰嬪于虞西周王姬嫁于諸侯亦執婦道成肅雍之徳其詩曰曷不肅雍王姬之車自秦而後尤欲尊君抑臣為治而不得其道至謂列侯尚公主使男事于女夫屈于婦逆隂陽之位故王陽條奏世務指此為失長樂王回亦以其弊至父母不敢畜其子舅姑不敢畜其婦原其意雖欲尊君抑臣為治而使人倫悖于上風俗壞于下又豈所以為治也其流至此然後知春秋書王姬侯女同詞而不異垂訓之義大矣春秋集義卷十三

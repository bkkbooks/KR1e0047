body:
  text: 春秋集義卷二十八宋李明復撰文公七年春公伐邾三月甲戌取須句遂城郚謝湜曰僖公伐邾取須句矣其後須句復入于邾故公又伐邾取須句以其叛歸再取故書日謹其變也邾微國須句小邑以魯之大不能保一須句而有之以其得之非道伐邾未返而又以其人城郚其勞甚矣書遂罪之也郚魯邑杜氏謂備邾難吕祖謙曰須句是伏羲之後滅其國大段不是又曰邾滅須句楚滅六蓼夫須句司太皥之祀六蓼實臯陶之後此皆先王所封諸侯自唐虞三代以至春秋之初千百世綿延而皆不廢絶何故才入春秋之世便見屠戮蓋須句六蓼皆小國所以不廢于春秋之前者蓋向時間有聖賢之君以振作之風聲氣習尚有典刑老成人相與維持故得世守其祀所以雖小而僅存至此先王德澤既已斬絶漸入春秋戰國氣象故先王之諸侯亦不能自存此最見得風聲氣習之大推移習俗之大變革處學者當仔細看到此又須看得天下大勢與戰國漢唐相接夏四月宋公王臣卒宋人殺其大夫謝湜曰昭公初即位勢危國人起而殺大夫以其禍起國人故書人大夫被殺者衆故不書名凡殺書人或以衆棄言之或以國亂言之施于逆惡則衆棄之詞也施于公子大夫則國亂之詞也胡安國曰書宋人者國亂無政非君命而衆人擅殺之也大夫不名義係于殺大夫而其名不足紀也吕祖謙曰宋人殺其大夫是公子固之類戊子晉人及秦人戰于令狐程頥曰晉始逆立公子雍既而悔之故秦興兵以納之晉不謝秦秦納不正皆罪也故稱人晉懼秦之不肯聽已而擊之故書晉及朱熹曰秦襄公以王命攘夷狄報君父之仇故征伐不休而詩人美之康公令狐河曲之戰修私怨逞小忿上無王命下失民心故好攻戰亟用兵而詩人刺之晉先蔑奔秦謝湜曰襄公卒國嗣未立趙盾使先蔑如秦逆公子雍穆嬴日抱太子啼于朝趙盾乃背先蔑立靈公由是晉人以兵禦秦故二國戰于令狐秦敗故先蔑奔秦戰不書侵伐者秦以善至晉人逆而戰之也戰由晉起故以晉人主戰而罪之秦不書敗者秦以兵衛為晉送公子鄰國之義也晉未有改立之命出諭秦國一旦背約攻秦而敗之晉之不道于鄰國其惡大矣不書秦敗不與晉之敗秦也不與晉之敗秦者以著晉人之惡也先蔑奔不書出自外奔秦故也襄公之卒也晉國政出趙盾盾欲立公子雍賈季欲立公子樂其後盾復立太子然襄公卒八月秦方以公子雍至者以國嗣久而後定故也胡安國曰按左氏襄公卒太子幼晉人欲立長君趙孟使先蔑如秦逆公子雍秦康公以師納之襄夫人抱太子以啼于朝曰舍嫡嗣不立而外求君將焉置此諸大夫畏逼乃背先蔑立靈公趙盾將中軍以禦秦潛師夜起敗秦師于令狐先蔑奔秦程氏以為晉不謝秦秦納不正皆罪也故稱人晉懼秦之不肯聽已而擊之是晉人為志乎是戰者也故書及其貶之如此者使後世臣子謹于廢立之際不可忽也治亂存亡係國君之廢立事莫重于此矣而可以有誤乎奕者舉棊不定不勝其耦況置君而可以不定乎朱熹語録或問世人疑左丘明好惡不與聖人同謂其所載事多與經異此則有說且如晉先蔑奔人但謂蔑奔秦耳此乃先蔑立嗣不定故書奔以示貶熹曰是何言語先蔑實是奔秦如何不書奔且書奔謂之示貶不書奔則此事自不見何以為褒是乃于穿鑿上益加穿鑿疑誤後學狄侵我西鄙吕祖謙曰狄侵我西鄙魯之西是齊之東秋八月公㑹諸侯晉大夫盟于扈程頥曰文公怠政事多廢緩既納晉盟而復後至故書往㑹而隱其不及不序諸侯以見不在故明年公子遂再往與晉盟也謝湜曰晉國君位未定二國有令狐之戰公㑹諸侯晉大夫平晉亂也平晉亂所以定靈公也諸侯皆以救難為心終與晉大夫盟以平其亂義事之大也義事諸侯所同志故稱諸侯立靈公非獨盾力晉國衆大夫之力也故扈盟書晉大夫納子糾不能全非獨魯罪齊國衆大夫之罪也故蔇盟書齊大夫胡安國曰諸侯㑹晉趙盾盟于扈為晉侯立也趙盾內専廢置其君外强諸侯為此盟其不名者見大夫之强也諸侯不序見公之不及于㑹也文公怠惰事多廢緩既約晉盟而復後至故隱其不及罪公之不能自强于政治魯自是日益衰矣吕祖謙曰靈公少故也冬徐伐莒謝湜曰徐用夷禮則以夷禮狄之楚用中國禮則以中國君之春秋退惡從善不間內外如此而已公孫敖如莒涖盟謝湜曰左氏謂莒人以徐難來請盟八年春王正月夏四月秋八月戊申天王崩冬十月壬午公子遂㑹晉趙盾盟于衡雍乙酉公子遂㑹雒戎盟于暴謝湜曰公子遂一出而盟兩國再言公子遂非遂事也胡安國曰春秋記約而志詳其書公子遂盟趙盾及雒戎何詞之贅乎曰聖人謹華夷之辨所以明族類别內外也雒邑近在京師而戎人居之無中外矣再稱公子各日其㑹正其名與地以深别之者示中國夷狄終不可雜也自東漢以來乃與戎雜處而不辨晉至于神州陸沈唐亦世有戎狄之亂許翰以為謀國者不知學春秋之過信矣公孫敖如京師不至而復丙戌奔莒謝湜曰敖如京師弔天王喪也上輕王室下棄君命故不至京師遂復魯人欲治其罪故奔莒敖之不敬其罪大不可不討故奔書日謹其出也其復也未反君命而奔故不書出敖救徐盟莒㑹晉侯㑹晉士穀如齊如晉其權勢重矣故其不敬至于上不有其王下不有其君也胡安國曰按左氏公孫敖奔莒從已氏也男女人之大欲存焉寡欲者養心之要欲而不行可以為難矣然欲生于色而縱于淫色出于性目之所視有同美焉不可掩也淫出于氣不持其志則放僻趨蹶無不為矣敖如京師其書不至而復者言敖無入使于周之意惟己氏之欲從也夫以志徇氣肆行淫欲而不能為之帥至于棄其家國出奔而不顧此天下之大戒也春秋謹書其事于敖與何誅使後人為鑒必持其志修窒欲之方也朱熹曰公孫敖如京師不至而復延平李侗云只不至而復便是大不恭又魯更不再使人往皆罪也胡安國只貶它從己氏之過經文元不及此事吕祖謙曰穆伯如周弔喪不至以幣奔莒自他人觀之不書亦可左氏何以載以幣奔莒一句蓋弔喪是公家事娶妻是私家事此以私而廢公當時若以身自逃留幣在則衆介之屬猶可持此幣自往則此禮尚不廢其幣既已隨往則此禮不得致于周故魯人後來所以不容歸葬以其有此罪也螽宋人殺其大夫司馬宋司城來奔程氏學曰七年宋人攻昭公而殺其大夫八年宋人殺其大夫司馬宋司城來奔皆不書名而著其官者死者死于其位去者以其道也蓋昭公始即位不道于其民國人為亂而攻之諸大夫居卿佐之位竭節而死之可也違亂潔身而去之亦可也十有四年宋子哀來何也左氏曰宋高哀為蕭封人以為卿不義宋公而出遂來奔此亂邦不居知其不可仕而去之者故書字以褒之若數子者死生去就不必同要之皆合于義而已如十有五年宋司馬華孫來盟則異于此竊位固寵安食暴君之祿進不能强諫退而不能潔身為昭公來盟于我故書名以見貶孫者名也大夫有罪不得専殺古之制也孟子曰五霸桓公為盛葵丘之㑹諸侯束牲載書而不歃血四命曰無專殺大夫五霸已為三王之罪人然桓公尚克如此况王道之行諸侯敢専殺哉矧罪不得専殺者乎甚矣天下無王禮樂刑政皆出于諸侯故大夫有罪無罪咸専殺之又况國人専殺者歟聖人一切書之以著其擅命暴亂之惡為後世之戒也凡其國殺之則曰某國以明其國之罪也鄭殺其大夫申侯之類是矣其衆人殺之則曰某人以見衆人擅殺而國亂無政也晉人殺其大夫先都之類是矣內殺大夫則曰刺言周官三刺之法刺審其情且不書殺者諱之也諱之者惡甚可知也其大夫全無惡而死其位如宋司馬曹大夫之類則異其文而不名善其人則尤罪其人殺之者矣謝湜曰昭公不道于民宋人作亂以危公室方是時職為卿佐者以社稷為志守位而死之可也以諫不行言不聽致位而去之亦可也故司馬公子卬見殺司城蕩意諸來奔公子卬握節以死可謂能以忠死其位矣蕩意諸效節而出可謂能以義去其君矣死者得致身之忠奔者得去國之義春秋皆著其官而不名善其不失職也大夫國人之望也司馬司城國之股肱也宋人之亂其始也禍及大夫而已禍及大夫而不知治故其禍上及于司馬司城禍及司馬司城而不知治則君之勢位危矣昭公以千乘之君而其終不免宋人之難者其源起于此而已有國家者其于撫御國人可不盡道者哉故大夫司馬昭公被難皆書人著其兆禍之由也司馬兼稱大夫者春秋之法殺書大夫故也司城迫難而出故書奔胡安國曰初宋昭公將去羣公子樂豫以為不可遂舍司馬以讓公子卬則卬固昭公之黨欲専宋而昭公固欲以其弟卬自衛也夫司馬掌兵之官不選衆舉有威望為國人所畏服者使居其任乃欲寵其私昵鮮有不亡者矣公子卬蕩意諸皆以官舉者見主兵者不能其官至于見殺守土者不能其官至于出奔而其君不免失身見弒之禍宜矣九年春毛伯來求金程頤曰家父致命以徴車也故書使來求毛伯風魯以欲金故不云王使謝湜曰公孫敖不至而復毛伯來求金魯之罪也襄王未葬故毛伯來不稱使胡安國曰毛伯天子大夫何以不稱使當喪未君也踰年即位矣何以言未君古者諒隂三年百官總己以聽冢宰夫百官總己以聽則是冢宰獨専國政之時托于王命以號令天下夫豈不可而不稱使春秋之㫖微矣非特謹天下之通喪所以示後世大臣當國秉政不可擅權之戒也跋扈之臣假仗主威脅制中外凡有所行動以詔書從事蓋未有以春秋此義折之耳夫人姜氏如齊謝湜曰杜氏謂歸寧二月叔孫得臣如京師辛丑葬襄王謝湜曰諸侯㑹王葬禮也卿㑹王葬非禮也為其不成禮故止書如京師晉人殺其大夫先都謝湜曰靈公幼政出私室故晉人殺大夫先都吕祖謙曰晉人殺先都梁益耳當時賊殺先克者五人與焉何故先殺先都梁益耳二人蓋是知其罪所以先殺之後來探得箕鄭父士縠蒯得所以殺之三月夫人姜氏至自齊謝湜曰父母在夫人歸寧禮也書至志其得禮也他至不書者為其行不以禮也夫人之至也正則告廟不正則不告因其告而書至則不至者之違禮由此見矣胡安國曰夫人與君敵體同主宗廟之事出必告行反必告至則書于䇿然適他國者或曰享或曰㑹或曰如衆矣未有致之者則其行非禮以不致見其罪也出姜如齊以寧父母于禮得行矣其致者非特以告廟書爾夫人初歸豈其不告為文公越禮故削而不書示誅意之法矣今此書至者又以見小君之重也夫承祭祀以為宗廟主一國之母儀而可以搖動乎出姜至是蓋不安于魯故至而特書以示防微杜漸之意其為後世慮深矣晉人殺其大夫士縠及箕鄭父程氏學曰殺二大夫已上不書及者其事同殺之之志均故也成八年晉殺其大夫趙同趙括晉殺其大夫卻犨卻錡卻至哀四年曺殺其大夫公孫姓公孫霍是也書曰殺其大夫某及某者以某之故而延及于某也若僖二十九年衛殺其大夫元咺及公子瑕元咺訟君為惡君歸則己出君出則己歸信不臣矣而公子瑕不見其辜衛國遷怒而并殺之故書曰及以志専殺之中又有輕重者也文元年晉人殺其大夫士縠縠及箕鄭父襄二十三年陳殺其大夫慶虎及慶寅皆倣此謝湜曰國人殺大夫先都而君不治故又殺大夫士縠箕鄭父鄭父非有大罪以縠被害而其禍及之故書及胡安國曰殺先都士縠國也其稱人以殺者國亂無政衆人擅殺之稱也何以知其非討賊之詞書殺其大夫則知之矣三大夫皆强家也求専晉不得挾私怨以作亂而使賊殺其中軍佐則固有罪矣曷為不去其官當是時晉靈公初立主幼不君政在趙盾而中軍佐者盾之黨也若獄有所歸則此三人者獨無可議從末減乎而皆殺之是大夫専生殺而政不自人主出也故不稱國討不去其官而箕鄭父書及世後世司賞罰者必本忠恕無有黨偏之意其義精矣楚人伐鄭謝湜曰中國衰弱故楚伐鄭吕祖謙曰楚伐鄭鄭及楚平楚侵陳陳及楚平陳鄭皆近楚自靈公年少即位諸國皆歸之公子遂㑹晉人宋人衛人許人救鄭謝湜曰書救鄭善之也書公子遂㑹晉人宋人衛人許人救鄭著諸侯之衰弱也胡安國曰按左氏范山言于楚子曰晉君少不在諸侯北方可圖也楚子師于狼淵以伐鄭則是貪得無故憑陵諸夏之兵也故楚子親將貶而稱人晉宋衛則趙盾華孔皆國卿也何以貶而稱人救而不及楚師欲以懲不恪也晉主夏盟不在諸侯以啓戎心誰之過乎故書救而稱人以罪趙盾之不能折衝消患為夷狄之所窺也夏狄侵齊秋八月曹伯襄卒九月癸酉地震謝湜曰地隂物也至隂不動其體常寧隂過亢失常則震冬楚子使椒來聘謝湜曰楚子始有遣使修聘之禮故楚子來聘與中國同詞椒不氏未賜族胡安國曰楚僣稱王春秋之始獨以號舉夷狄之也中間來聘改而書人漸進之矣至是其君書爵其臣書名而稱使遂與諸侯比者是以中國之禮待之也所謂謹華夷之辨內諸夏而外四夷義安在乎曰吳楚聖賢之後見周之弱王靈不及僣擬名號此以夏而變于夷者也聖人重絶之夫春秋立法謹嚴而宅心忠恕嚴于立法故僣號稱王則深加貶黜比之夷狄以正君臣之義恕以宅心故內雖不使與中國同外亦不使與夷狄等思善悔過向慕中國則進之而不拒此慎用刑重絶人之意也噫春秋之所以為春秋非聖人莫能修之者也吕祖謙曰楚子使越椒來聘執幣傲臣出使他國必先告廟然後出越椒不過恃楚之大輕魯之小其容傲慢而不知非是傲魯乃所以傲其先君故叔仲惠伯謂必滅若敖氏之宗故此見得古之時最重宗廟秦人來歸僖公成風之襚程頤曰過時始至故云來歸雖子母先君後夫人體當然也書秦人不云君使以失禮夷之也言其尚夷也蓋嫡妾之亂自兹而始謝湜曰僖公薨已九年成風薨已五年秦人始來歸襚非禮也秦僻陋邊狄禮法不備故惟書秦人成風僖公妾母也僖公嫡母先殁故魯以夫人禮事之以夫人禮葬之成諡風姓妾母稱諡則其為夫人可知故不書夫人朝廷之義以君為主故襚先僖公胡安國曰秦人歸襚而曰僖公成風者非兼襚也亦猶平王來賵仲子而謂之惠公仲子爾仲子惠公之妾也然則風氏亦莊公之妾曷不書曰來歸莊公成風之襚乎曰寵愛仲子以妾為妻者惠公也故書惠公仲子所以正後世之為人夫者當明夫道不可亂嫡妾之分以卑其身尊崇風氏立為夫人者僖公也故書僖公成風所以正後世之為人子者當明子道不可行僣亂之禮以賤其父聖人垂戒之義明矣朱熹曰僖公成風與東晉簡文鄭太后一也皆所以著妾母之義吕祖謙曰秦人來歸成風之襚左氏此一段氣味深長宜子細看蓋成風已死四五年秦襚方至而此猶曰雖不當事無忘舊好蓋人茍以是而來不問地之逺近情之親疏時之遲速皆感其誠意此是忠厚損怨之道最不可責人此雖送襚之緩然猶勝于不來葬曹共公十年春王三月辛卯臧孫辰卒夏秦伐晉程頤曰晉舍嫡嗣而外求君罪也既而悔之正也秦不顧義理之是非惟以報復為事夷狄之道也謝湜曰秦以夷狄伐晉故書秦胡安國曰說者謂秦伐晉以戎狄書蓋闕文者據左氏少梁北徴之師兩國相攻無他得失言之也然晉取少梁事不經見固未可據秦以狄書者程氏以謂晉舍嫡嗣而外求君罪也既而悔之正矣秦不顧義理是非惟以報復為事則夷狄之道也以此狄秦義固然矣或曰猶有深許晉人悔過能改終不遂非之意故重貶秦伯以見乎楚殺其大夫宜申謝湜曰左氏謂謀弒穆王說誤胡氏曰按左氏宜申與仲歸謀弒穆王而誅則討弒君之賊也曷為稱國以殺又書其官而不曰楚人殺宜申乎曰穆王者即楚世子商臣也而春秋之義微矣吕祖謙曰子西本心不是果要歸死于司敗其意乘楚王不在郢直欲因郢之虛為謀叛爾不意王渚宫見之所以臨時巧作言語以辭于王後來與子家謀弒穆王則此可見來郢之意也故左氏謂懼而辭此是書法自正月不雨至于秋七月謝湜曰文公怠棄民政故不雨再七月亦無懼災之心及蘇子盟于女栗謝湜曰內微者故不書主名蘇子王臣也魯使微者及王臣盟不敬之尤大者也尹子柯陵之盟單子雞澤之盟劉子平丘之盟皆諸侯㑹王臣為盟也列國與王臣先伐先㑹而後盟書同盟以明王臣亦與盟也王人之盟于洮王人之盟于翟泉蘇子之盟于女栗諸侯大夫㑹王臣及王臣為盟也列國與王臣直㑹而盟不書同盟以無伐㑹日月相隔則王臣與盟可知也吕祖謙曰杜預謂蘇子是滅溫之後蘇子要之不必作此蘇子或是他後亦不可知冬狄侵宋楚子蔡侯次于厥貉謝湜曰楚子非事而出將以觀釁書次著楚子之橫胡安國曰楚滅江六平陳與鄭于是乎為伐宋之舉次于厥貉凡伐而次者其次為善次而伐者其次為貶齊師次陘修文告以威敵善之也故上書伐楚以著其美楚次厥貉藏禍心以憑中夏貶之也故下書伐麇以著其罪當是時陳鄭宋皆從楚矣獨書蔡侯何哉鄭失三大夫俟救而不及陳獲公子茷而懼宋方有狄難蓋有不得已者非所欲也蔡無四境之虞則是得已不已志在從夷狄矣故削三國書蔡侯見其棄諸夏之惡也春秋集義卷二十八

body:
  text: 春秋集義卷四十八宋李明復撰定公十有三年春齊侯衛侯次于埀葭謝湜曰埀葭衛地夏築蛇淵囿謝湜曰築囿于郎築囿于蛇淵著其妨民也大搜于比蒲衛公孟彄帥師伐曹謝湜曰曹人不服故再伐曹秋晉趙鞅入于晉陽以叛謝湜曰晉陽趙鞅邑鞅據邑叛故書入胡安國曰按左氏趙鞅謂邯鄲午曰歸我衛貢五百家吾舍諸晉陽午許諾歸告其父兄皆不可趙孟怒遂殺午圍邯鄲午荀寅之甥荀寅士吉射之姻也而相與睦遂伐趙氏鞅奔晉陽晉人圍之趙鞅之入拒范中行也而直書曰叛何也人臣專土與君為市則是篡弒之階堅冰之戒豈無以有己之義乎後世大臣有困於讒間遷延居外不敢釋兵卒以憂死者亦未明人臣之義故爾故直書入于晉陽以叛入者不順之詞叛者不赦之罪吕祖謙曰晉范氏中行與趙氏相攻觀始者作亂之由與後來范中行氏之所以敗趙鞅之所以再入看此曲折斷之一言不過私之一字若致亂之由是當趙鞅欲邯鄲午歸衛貢五百家於晉陽午不從趙孟怒殺午緣此作亂范氏助他所以致亂之由只緣趙氏豐植其私邑私邑強大到得范中行氏所以邯鄲午亦非有公心正緣午是荀寅之甥荀寅又是范吉射之姻親黨更相助到得趙鞅奔晉陽後來韓簡子之徒言於公欲逐荀寅范吉射之徒亦非有正國家之刑其端亦私意乃欲以私愛立梁嬰父為卿故欲逐范氏代其位韓簡子亦與中行文子相惡欲乘間逐之范氏助私黨韓氏報私怨外面若欲振綱紀其實是私以此知晉室之亂舉六卿雖或勝或負或存或亡通是一箇私意為國盡皆私意無一人為公晉安得不亡冬晉荀寅士吉射入于朝歌以叛謝湜曰趙鞅叛晉陽荀寅士吉射叛朝歌權臣不率甚矣晉國之亂可知也胡安國曰按左氏知文韓簡魏襄子與荀寅范吉射相惡將逐荀范言於晉侯曰君命大臣始禍者死載書在河今三臣始禍而獨逐鞅刑不均矣請皆逐之遂奉公以伐二子二子敗奔朝歌晉主夏盟威服天下及大夫專政賄賂公行內外離折示威平丘而齊叛辭請召陵而蔡叛盟于沙鹹而鄭叛次于五氏而衛叛涖于鄭會于夾谷歃于黃而魯叛諸侯叛于外大夫叛于內故奔于晉陽而趙鞅叛入于朝歌而荀寅與士吉射叛以晉國之大天下莫強焉邦分崩而不能守也春秋於晉事或略而不序或賤而稱人或書侵以陋之責亦備矣至是三卿內叛直書于䇿見其效也故臧哀伯曰國家之敗由官邪也官之失德寵賂章也晉卿始禍緣衛貢也樂祁見執獻楊楯也蔡侯從吳荀寅貨也昭公弗納范鞅賂也而晉室自是不復能主盟矣故為國以義不以利春秋之大法在焉見諸行事亦可謂深切著明矣晉趙鞅歸于晉謝湜曰趙鞅韓晉之強宗也趙鞅之叛法所不赦韓魏為鞅請而復之定公不能察治乃以韓魏之請釋其罪復其職還其爵邑使鞅復以無罪歸國晉之國法不行於叛逆之人矣前書叛後書歸罪其赦逆臣也胡安國曰按左氏荀范奔朝歌韓魏以趙氏為請鞅入于絳盟于公宫然則書歸者易詞也韓魏為之請晉侯許之復而寅與吉射去國出奔則無有難之者故其歸為易矣三子之叛其罪一也鞅以有援故得復寅吉射以無助故終叛春秋書鞅歸于晉非與之也以罪晉侯縱失有罪無政刑耳叛逆人臣之大惡始禍晉國之載書既不能致辟于鞅奉行天討以警亂臣又亢不𠂻徇韓魏之請而許之復無政刑矣其能國乎先儒或謂言歸者以地正國也鞅取晉陽之甲以逐君側之惡人則其説誤矣以地正國而可是人主可得而脅人臣擅興無罪以兵諌者真愛其君也使後世賊臣稱兵向闕以誅君側為名而實欲脅君取國者則此説啓之也大失春秋之意也薛弒其君比謝湜曰臣下不安以成凶禍故弒書國胡安國曰稱國以弒者當國大臣之罪也孫復以為舉國之衆皆可誅非矣三晉有國半天下若皆可誅刀鋸不亦濫乎頴川常秩曰孫復之於春秋動輒有罪蓋商鞅之法耳棄灰於道者誅步過六尺者罰其不即人心逺矣王回以是尚秩此善議復者十有四年春衛公叔戍來奔衛趙陽出奔宋謝湜曰靈公不道南子亂國故公叔戍趙陽以欲去夫人之黨得罪出奔胡安國曰公叔戍將去南子之黨夫人訴曰戍將為亂故公叔來奔趙陽北宫結皆戍黨也故亦出奔而靈公無道不能正家以喪其大臣之罪著矣戍又以富見惡於衛侯夫富者怨之府也使戍積而能散以財發身不為貪人之所怨於以保其爵位儻庶幾乎二月辛巳楚公子結陳公孫他人帥師滅頓以頓子牂歸謝湜曰頓日微弱又得罪於楚故頓為楚滅夏衛北宫結來奔謝湜曰結戍之黨故出奔五月於越敗吳于檇李吳子光卒謝湜曰檇李吳地吳將攻越越潛兵入檇李敗之又曰光吳子闔廬胡安國曰按左氏吳伐越勾踐禦之患其整也使罪人三行屬劍於頸吳師屬目因伐之闔閭傷而卒書敗者詐戰也定公五年於越入吳至是敗吳于檇李會黃池之嵗又入吳悉書于史以其告也哀之元年吳子敗越棲勾踐於會稽之上豈獨不告而史䇿不書疑仲尼削之也吳子光卒夫差使人立於庭茍出入必謂己曰而忘越王之殺而父乎則對曰唯不敢忘三年乃報越然則夫椒之戰復父讎也非報怨也春秋削而不書以為常事也其旨微矣吕祖謙曰檇李今之秀州又云吳與越戰越王勾踐禦之陳于檇李勾踐患吳之整也使死士再禽焉不動使罪人三行屬劍於頸而辭曰二軍有治臣姦旗鼓不敏於君之行前不敢逃敢歸死遂自剄也師屬之目越子因而伐之大敗之姑浮以戈擊闔廬闔廬傷將指取其一屨還卒於陘到此吳方為越所敗闔廬傷而死吳之陳所以如此整乃當時申公巫臣孫武之餘教何故他當時適吳舍偏兩之卒於吳教他伍乘之法後來又從孫武教宫人戰陳斬其犯命者則陳法吳人講之精雖闔廬末年尚承餘教遺習以越之剽悍輕易猶畏不敢前以此知用兵不可無法制何故越出竒計變吳人耳目終為所敗蓋兵有正竒正則可效奇則不可效所謂行列卒伍分布之法故可傳到得千變萬化移換耳目則不可教若使巫臣孫武在則必不到陳亂地位無巫臣孫武之臣徒守巫臣孫武之法便到敗處以此知天下之事固有可傳有不可傳者闔閭既敗死其子夫差使人立於庭茍出入必謂己曰夫差而忘越王之殺而父乎其復讎之志甚堅惟其立志之堅所以幾滅越國後來何故為勾踐甘言重幣所誘聽太宰嚭讒臣之説志滿意得終為越滅若以常理論之坐薪嘗膽之時為之則易志滿意得之時持之甚難然觀夫差本源發處其志已不全了所以常使人立於庭出入必謂己是常要人喚省他使其志堅如火之必熱如水之必濕如江河之不可轉移則復讎之念豈有間斷今必待人提起他意思則知他當時工夫巳自有間斷隔絶處了所以終至於志滿意得為越所敗滅學者觀此事最當警戒今學者能親直諒之友朝夕警省亦是大段有志之人然而須以夫差事自警見得人終靠不得志滿意得地位便自見學者做工夫須到不待人地位方堅固公會齊侯衛侯于牽公至自會謝湜曰是時衛有公叔戍之難牽之會著齊不能定衛難也牽衛地吕祖謙曰晉人圍朝歌朝歌是范氏之邑魯衛齊謀范中行氏三國所以來救之者何故一則是晉之衰一則是范中行本主四方之諸侯所以尚有人情三國所以救之看陳寅言昔吾主范氏今子主趙氏此句可見范中行氏內則有三國之助外則有狄師之助何故不勝蓋當時三分只有一分屬范中行氏二分尚在四郊所以難成又看知文子韓簡子魏襄子之徒皆惡范中行氏事見十三年范中行氏雖盛終敵不得四家去秋齊侯宋公會于洮謝湜曰是時宋有公子辰之難洮之會著齊不能清宋難也洮曹地天王使石尚來歸脤謝湜曰石尚天王之士故書名王受神福賴諸侯所致則神福王宜與諸侯共之故天子分俎實不曰賜而謂之歸也古者諸侯以時入朝朝則各以其職來祭故天子祭於宗廟有與諸侯共福之禮與之同其事則必與之同其樂故也周衰諸侯職貢不修祀事不相久矣廟中之賜諸侯何與於此哉敬王乃以脤肉親魯而歸之失禮之大也脤膰以同姓為主所賜非特同姓而已楊時曰行人歸脤以交諸侯之福不必同姓異姓也如王使宰孔賜齊侯胙是已衛世子蒯聵出奔宋謝湜曰左氏謂蒯聵謀害其母出奔而春秋不絶其世子然則蒯聵之禍蓋出於南子之譛也書世子出奔所以著靈公之惡也南子婦德不修甚矣其惡世子而欲去之亦久矣驪姬害晉南子害衛其情一也靈公聽南子之譖不能為世子審察以致出奔故出書世子納書世子所以明蒯聵未失世子之道也楊時曰衛世子蒯聵得罪於靈公而奔宋已而之晉趙氏靈公怨其出奔也謂少子郢曰我將立若為後靈公卒夫人立郢為太子曰此靈公命也郢曰有亡人之子輒在不敢當於是衛人立輒為君昔者公儀仲子之喪舍其孫而立其子子遊問諸孔子孔子曰否立孫則世子而立嫡孫禮也然則郢之讓輒之立正也趙簡子欲入蒯聵而衛人以立郢拒之不得入夫蒯聵得罪於靈公出奔不宜有衛也衛人以輒為君矣則其拒之宜若可然故冉求以為問夫君子居是邦不非其大夫况其國君乎居衛而問衛君宜夫子之不告也故子貢以夷齊問之夫伯夷叔齊孤竹君二子也伯夷兄也叔齊弟也父欲立叔齊而叔齊以伯夷為兄而讓之伯夷以為父命也不受而逃去故國人立其中子而夫子賢之子貢以是知其不為衛君也何以言之蓋為臣而不命於其君為子而不受於其父而有其國義之所不與也雖伯夷為兄叔齊讓之猶弗受也况得罪於其父乎則蒯聵不宜有衛明矣夫人以靈公之命而立郢則郢受之可也而以輒在為辭其庶幾叔齊之義乎然輒之立以蒯聵嘗為世子故也蒯瞶未嘗為世子則郢何辭焉而輒亦何自而立耶故春秋書趙鞅帥師納衛世子蒯瞶于戚書世子所以罪輒也然則蒯聵之入為輒者宜奈何去位從之可也拒之不可也國人拒之而立郢則其義兩得矣説者以謂善兄弟之讓則惡父子之爭可知夫惡父子之爭雖庸夫愚婦知之矣而謂求賜之賢必待問而後知耶失其旨矣尹焞曰衛君父子爭國夷齊兄弟讓位孔子賢夷齊則其不為衛君也可知矣胡安國曰世子國本也以寵南子故不能保世子而使之去國以欲殺南子故不能安其身至於出奔是輕宗廟社稷之所付託而恣行矣春秋兩著其罪故特書世子其義不繫於與蒯瞶之世其國也而靈公無道不能正家以危其國本至使父子相殘毁滅天理之所由著矣張栻曰叔齊之讓伯夷以為伯夷之長當立無兄弟之義而何以為國乎伯夷之不受國以為叔齊之立父命也無父子之義而何以為國乎二人者寧去國而存此矣衛輒之事國人論之以為蒯聵既得罪於先君而出奔而輒受先君之命宗國不可以無主則立輒而拒蒯聵可也曽不知蒯聵父也輒子也父子之義先亡而可一日立乎故子貢以夷齊之事為問方是時夫子在衛輒立之事蓋難言也賜也微其辭以測聖人之旨耳朱熹語録或問子郢不肯立也似不是曰只立輒時只是蒯聵一箇來爭若立他時則又添一箇來爭愈見事多人以千乘之國與之而不肯受他畢竟是看得來惹手難做後不敢做問衛君欲召孔子為政而孔子欲先正名孔子既為之臣復欲去出公亦豈人情曰惟孔子而後可問靈公既逐蒯聵公子郢辭不立衛人立輒以拒蒯聵論理輒合下便不當立不待拒蒯聵而後為不當立也曰固是輒既立蒯聵來爭必矣衛公孟彄出奔鄭謝湜曰彄世子之黨故出奔宋公之弟辰自蕭來奔謝湜曰恃弟之親與國為抗而景公未之絶也故自蕭來奔復書弟大搜于比蒲邾子來會公謝湜曰車徒不足故連嵗大搜邾子懼難會于比蒲城莒父及霄謝湜曰郈與費患其固而墮之莒父及霄患其不固而城之茍惟弗擇忠良而畀之以邑則二邑雖固適足以為叛人之資而已十有五年春王正月邾子來朝鼷鼠食郊牛牛死改卜牛謝湜曰食非一處故不言所食二月辛丑楚子滅胡以胡子豹歸謝湜曰頓子沈子胡子自雞父之敗國滅之兆已形矣其後國勢萎弱相繼以滅故春秋於胡沈二君之死書滅著其取滅之由也胡安國曰按左氏吳之入楚胡子盡俘楚邑之近胡者楚既定又不事楚曰存亡有命事楚何為為是楚滅之夫滅人之國其罪大矣然胡子豹乘楚之弱盡俘其邑之近胡者所謂國必自滅而後人滅之非滅之者獨有罪也國君造命不可委命者既以為有命而又貪生忍辱不死于社稷則是不知命矣書以歸罪豹之不能死位與歸也故楚子書爵而胡子豹名夏五月辛亥郊謝湜曰郊以寅月五月辛亥郊四月辛巳郊著其失時也郊祀失時不敬之大也壬申公薨于高寢鄭罕達帥師伐宋謝湜曰鄭與衛親公孟彄在鄭蒯聵在宋故鄭罕達伐宋齊侯衛侯次于渠蒢謝湜曰齊景衛靈非事出次于外凡三罪其不恤民也邾子來奔喪謝湜曰小國益弱故邾子奔喪於魯秋七月壬申姒氏卒謝湜曰姒氏把女哀公母定公妾哀公未稱君故妾母不稱夫人八月庚辰朔日有食之九月滕子來會葬謝湜曰小國益弱故滕子會葬于魯丁巳葬我君定公雨不克葬戊午日下昃乃克葬謝湜曰葬以永安考妣一物不善則百世不安臣子所宜盡心也慮物必備襄事必慎盡心之至也定公葬有日矣卜以丁巳而葬以戊午葬不得以時成日下昃然後能葬以雨之害也以一國葬一人而其葬不備不慎如此葬事茍簡可知矣書雨不克葬日下昃則日向夕矣非葬之時也日中猶不可而况日下昃乎古者日旦而葬日中而虞日旦而葬敬之至也日中而虞哀之至也辛巳葬定姒謝湜曰母以子貴故仲子非君母則歸賵不稱諡哀公未稱君則定姒卒不稱夫人葬不稱小君胡安國曰公羊曰有子則廟廟則書葬曽子問並有喪則如之何子曰葬先輕而後重其奠也其虞也先重而後輕冬城漆謝湜曰漆邾庶其邑春秋集義卷四十八

body:
  text: 春秋集義卷二十三宋李明復撰僖公二十有二年春公伐邾取須句謝湜曰以邾病須句伐邾公復取須句所謂以燕伐燕其惡均也胡安國曰按左氏須句風姓實司太皥與有濟之祀邾人滅之須句子來奔因成風也公伐邾取須句而反其君焉審如是固得崇明祀保小寡之禮何以書取乎不請于王命而專為母家報怨謀動干戈于邦內擅取人國而反其君以亂易亂非所以為禮也與攻奪者無以異矣夏宋公衛侯許男滕子伐鄭謝湜曰襄公怨鄭為楚用故伐鄭八月丁未及邾人戰于升陘程頥曰公戰也謝湜曰戰于升陘公及邾人戰也不書公與敗諱之也升陘之戰由須句所致曲皆在我故以內為戰主而惡之也胡安國曰邾人以須句故出師公卑邾不設備戰于升陘我師敗績邾人獲公胄縣諸魚門記稱邾婁復之以矢蓋自戰于升陘始也魯既敗績邾亦幾亡輕用師徒害及兩國亦異于誅暴禁亂之兵矣故諱不言公而書及內以諱為貶冬十有一月已已朔宋公及楚人戰于泓宋師敗績程頥語録或問宋襄公不鼓不成列如何曰此愚也既與它戰又却不鼓不成列必待他成列做甚謝湜曰泓之戰不書楚人侵伐者楚來救鄭而襄公與之戰也戰由宋起故以宋人主戰而罪之選賢才緝政治親內睦外以振國綱服楚之道也襄公乃于危難之中逞復仇之怨率破傷之衆以當强楚之鋒襲古人陳迹以待楚之變詐是以衆敗身傷終以取亡前書伐鄭後書戰敗罪其不知反也隕石于宋六鷁退飛過宋異之大者也襄公不知恐懼修省且又輕舉妄動以遂私欲而禍不旋踵及身然則上天變異其可不畏耶泓之敗其為禍大故書日書朔以謹其變胡安國曰泓之戰宋襄公不厄人于險不鼓不成列先儒以謂至仁大義雖文王之戰不能過也而春秋不與何哉物有本末事有終始順事恕施者王政之本也襄公伐齊之喪奉少奪長使齊人有殺無虧之惡有敗績之傷此晉獻公之所以亂其國者罪一也桓公存三亡國以屬諸侯義士猶曰薄德而一㑹虐二國之君罪也曹人不服盍姑省德無闕然後動而興師圍之罪三也凡此三者不仁非義襄公敢行而獨愛重傷與二毛則亦何異盜跖之以分均出後為仁義陳仲子以避兄離母居於陵為亷乎夫計末遺本飾小名妨大德者春秋之所惡也故詞繁不殺而宋公書及以深貶之也二十有三年春齊侯伐宋圍緡謝湜曰楚之敗宋也齊孝公失救之之道且又乘宋之敗伐其國圍其邑惡之大也胡安國曰齊伯國之餘業也宋襄公既敗于泓荆楚之勢益張矣齊侯既無尊中國攘夷狄恤患灾畏簡書之意又乘其弱而伐之此尤義之所不得為者也故書伐國而言圍邑以著其罪然則桓公伐鄭圍新城何以不為貶乎鄭與楚合憑陵中國桓公伐之攘夷狄也宋與楚戰兵敗身傷齊侯伐之殘中夏也其事異矣美惡不嫌同詞夏五月庚寅宋公兹父卒謝湜曰智小而謀大力少而任重未有不終于敗者也襄公以庸暗之才貪逺大之業方其盟于鹿上也志欲合諸侯朝齊楚豈知後之執敗身亡為天下笑哉故君子動必度德進必量力秋楚人伐陳謝湜曰楚得志故伐陳冬十有一月杞子卒程頥曰杞二王後而伯爵疑前世黜之也中間從夷故子之後復稱伯謝湜曰夷狄爵不過子杞伯稱子者為其用夷禮狄之也胡安國曰按左氏杞成公卒書曰子杞夷也杜預以為杞實稱伯而書曰子者成公始行夷禮終其身故仲尼于其卒以文貶之此說是也或曰信斯言是春秋黜陟諸侯爵次以見褒貶不亂名實乎曰春秋固天子之事也而尤謹于華夷之辨中國之所以為中國以禮義也記曰人而無禮雖能言不亦禽獸之心乎魯桓弒篡滕首朝之貶而稱子治其黨也夷不亂華成公變之貶而稱子存諸夏也二十有四年春王正月夏狄伐鄭秋七月冬天王出居于鄭程氏學曰襄王避帶之亂越在諸侯之境書曰天王出居于鄭自取之也王者以天下為家故曰自周無出示無外也春秋之時王者政令僅行于境內才出畿甸即非王有故書曰出聖人之法撥亂世反之正則曰溥天之下莫非王土非諸侯所専故書曰居謝湜曰襄王失治內之道以母弟帶之難越在鄭國之汜書曰天王出居于鄭著王之不能有其國也自內適外曰出居其所有曰居王者以天下為家自諸侯專土地人民而王于天下始有內外之辨故襄王適鄭稱出以明列國非王有也春秋正分義治奸逆列國境土不與諸侯得專故襄王在鄭稱居以明海內皆王土也胡安國曰按左氏鄭人入滑王為滑請鄭不聽命王怒使頽叔出狄師伐鄭而德狄人立其女隗氏為后冨辰諌不聽太叔帶通于隗氏王絀狄女頺叔懼狄之怨已遂奉叔帶以狄師攻王王適鄭處于汜自周無出特書曰出者言其自取之也夫鄭伯不王固有罪矣襄王不知自反念其制命之未順也忍小忿昵懿親以扞外侮而棄德崇奸遂出狄師是用夷制夏如木之植拔其本也不亦傎乎王者以天下為家京師為室而四方歸往猶天之無不覆也東周降于列國既不能家天下矣又毁其室而不保則是寄生之君爾貶而書出以為後戒唐資突厥之兵以伐隋而世有戎夷之禍晉藉契丹之力以取唐而卒有播遷之辱許翰以謂不講于春秋戒襄王之所以出其言信矣而華夷之辨可不謹夫居者宅其所有之稱出而曰居者若曰普天之下莫非王土撥亂反正存天理之正也吕祖謙曰王出適鄭處于汜王既伐鄭至有難又出居于鄭何故蓋鄭是懿親不忘王室從前鄭纍有功于王室只是王自不信他正如唐昭宗之于李克用無事時則伐他及有難則又去依他晉侯夷吾卒謝湜曰晉侯晉惠公魯不㑹葬故不書葬二十有五年春王正月丙午衛侯燬滅邢程氏學曰春秋滅國多矣惟衛侯燬滅邢而生名者滅同姓也禮曰諸侯不生名失地滅同姓名以絶先祖之裔滅骨肉之恩故生以匹夫稱之示王法不容誅也謝湜曰邢衛皆姬姓也衛文公滅邢是自滅其先祀者也絶其親者絶于親王法在所棄絶故書名絶之胡安國曰衛侯何以名滅同姓也春秋之法諸侯不生名滅同姓則名者謂其絶先祖之裔蔑骨肉之恩故生而書名示王法不容誅也聖人與天地合德滅人邦國而絶其祀同姓異姓奚别焉而或名或否何也正道理一而分殊異端二本而無分分殊之弊私勝而失仁無分之罪兼愛而失義春秋之法仁義行而人道立者也可以無差等乎然則晉滅虞楚滅䕫亦同姓也曷為不名曰諸侯滅同姓則名其常也有名有不名例之變也邢雖與狄伐衛而經無譏文者為能救齊也衛人曽不反思而遷怒于邢又遣禮至昆弟往仕焉誘其守而殺之于外與虞公貪璧馬以易鄰國及其身者其情異矣春秋原情定罪而衛燬獨名蓋輕重之權衡也若荆楚則僣號稱王聖人比諸夷狄于滅䕫乎何誅朱熹曰諸侯滅國未嘗書名衛侯燬滅邢說者以為滅同姓之故今經文只隔夏四月癸酉一句便書衛侯燬卒恐是傳寫之誤亦未可知吕祖謙曰衛侯燬滅邢晉亦滅同姓何以不名此何以名蓋此是告魯即書之晉當時不告亦未可知衛文只是與國一事可取要之亦不知大義所在夏四月癸酉衛侯燬卒宋蕩伯姬來逆婦謝湜曰伯姬宋大夫蕩氏妻母為子越境逆婦姑為婦越境來逆著其亂禮也胡安國曰伯姬公女也而配蕩氏其往嫁不見于經者國君不與大夫敵也今來逆婦而史䇿書之見公失禮下主大夫之婚是慢宗廟卑朝廷也姑自逆婦其失明矣宋殺其大夫謝湜曰大夫無罪而死其職者皆不名秋楚人圍陳納頓子于頓程氏學曰凡歸與入而言自某者但挾彼國之勢而其重在于歸入之人凡書納者其重則專在于納者矣蓋王政不綱天下大亂國君世子大夫歸復廢立不由天子之命惟諸侯之强有力者專之皆非所謂天吏而擅命興師概有罪焉然其間罪惡淺深則又各存乎其文矣頓子迫于陳而出奔故楚人圍陳以納之楚人之近義可見也晉人納捷菑于邾弗克納者義弗克也貜且長捷菑不正不正而晉趙盾大興師徒以納捷菑見辭而退義不克故也故盾貶稱人焉楚人入陳納公孫寧儀行父于陳以志楚子納亂臣公伐齊納糾齊髙偃帥師納燕伯于陽晉趙鞅納衛蒯瞶于戚各見本義謝湜曰凡歸入書自某者賴彼國之力為助也歸入之人其罪重助之歸者次之凡納書某國者彼國專以威力納之也主而納之者其罪重見納之人次之歸入納不由王命皆非正也彼善于此則有之矣楚納頓子納之善者也頓子迫陳難棄國奔楚楚人以兵圍陳納頓子使陳不敢為頓難使頓受頓子而君之抑强侯而扶弱主也陳穆公以力脅小國而逐人之君其為惡大楚人乃能反其君而納之得中國持危之義矣書圍陳納頓子善之也雖中國茍為狄行則春秋在所黜雖夷蠻茍為義行則春秋在所取胡安國曰圍陳納頓子也納云者不與納也諸侯失國諸侯納之正也何以不與乎夫陳先代之後不能以禮安靖鄰國保恤寡小中國諸侯又不能修方伯連帥之職而使楚人納之是夷狄仗義正諸夏也故書曰楚人圍陳納頓子于頓其責中國深矣此亦正本自治之意也吕祖謙曰蓋緣前既無功了不欲徒然出因而圍陳納頓子且欲了得一件事歸葬衛文公冬十有二月癸亥公㑹衛子莒慶盟于洮謝湜曰啖氏謂莒慶為魯釋怨二十有六年春王正月己未公㑹莒子衛寧速盟于向謝湜曰三國兩月再盟詩所謂屢盟是也諸侯相與無信雖相結猶以為疑故盟而又盟諸侯有故大夫以君命受盟他國可也大夫㳂君命與諸侯㑹盟啓亂之道也其後列國政在大夫其禍蓋源于此吕祖謙曰齊師侵我西鄙討是二盟也蓋莒是齊屬國魯又近齊以其私盟他所以來討若無關係他非是伯亦自管不得齊人侵我西鄙公追齊師至酅弗及程氏學曰公追齊師至酅弗及酅紀邑後入于齊公逺追齊師越境弗及譏可見矣謝湜曰冦已去矣其去逺矣解甲休兵以需其變可也逐而追之非善計也兵逸者安兵勞者危齊師勢可畏也率衆追之至于越境弗及兵勞師困危道也其衆不亡者特幸而已書齊師著齊之强也書至酅著魯之勞也書弗及著齊師去國之逺也酅紀邑後入于齊齊兵之來也羸兵伏衆故書人其去也兵衆皆出故書師胡安國曰書人書侵又書師罪齊也書追書至酅弗及罪魯也潜師入境曰侵少則稱人衆則稱師前書齊人是見其弱以誘魯也後書齊師是伏其衆以邀魯也其為諼明矣凡書追者在境內則譏其不預追戎于濟西是也在境外則譏其深入追齊師至酅是也酅者齊地至者言逺也弗者遷詞也有畏而弗敢及之也齊魯皆私憤之兵而非正也故交譏之夏齊人伐我北鄙謝湜曰公追齊師入齊境故齊人來伐衛人伐齊謝湜曰左氏謂衛人以洮之盟伐齊胡安國曰衛人報德以怨伐齊之喪助少陵長又遷怒于邢而滅其國不義甚矣公既與其君盟于洮又與其臣盟于向是黨衛也故齊人既侵其西又伐其北齊師固亦非義矣而僖公不能省德自反深思逺慮計安社稷乃乞楚師與齊為敵是以蠻夷殘中國也于義可乎其書公子遂如楚乞師而惡自見矣公子遂如楚乞師謝湜曰國以師為本其材可用其數足用然後制暴服强扞外保內無不可者乞卑詞也凡乞師從不從可用不可用未可必也國以師為本為國而至于乞師危弱之道也其國不危者特幸而已書如楚乞師危之也衆勝寡强勝弱明君猶慎用師而况師不足用乞之他國乎楚不可恃久矣魯欲以楚師制齊乃召夷狄入為中國患也故遂之乞師于楚也一則示削弱之形一則産侵陵之變秋楚人滅䕫以䕫子歸謝湜曰凡滅國以其君歸皆名䕫子獨不名者䕫夷蠻微國辭告不通中國故也胡安國曰春秋滅國以其君歸無有不名者而䕫何以獨不名按左氏䕫子不祀祝融與鬻熊楚人讓之對曰我先君熊摯有疾鬼神弗赦自竄于䕫是以失楚又何祀焉諸侯之祀無過其祖者而䕫祖熊摯是不得祀祝融與鬻熊也而楚反以是滅之非其罪矣故特存其爵而不名也然則楚滅同姓何以不名人而不名春秋待夷狄之體也吕祖謙曰䕫子不祀祝融與鬻熊是楚君之號故凡為楚之君者皆稱熊冬楚人伐宋圍緡公以楚師伐齊取榖公至自伐齊謝湜曰以楚師伐齊以夷狄之衆伐中國也以楚師取穀以奪邑之利示夷狄之衆也召夷狄冦攘中國必始于此矣無晉文復興于後則中國將淪胥為夷也伐齊取榖書楚師著其召禍也胡安國曰楚强魯弱而能用其師進退在已故特書曰以以者不以者也夫背華即夷取人之邑為已有失正甚矣患之起自此始其致危之也二十有七年春杞子來朝謝湜曰杞伯東夷其來朝也衣服儀飾皆雜夷故降爵稱子吕祖謙曰杞本侯爵今貶為子此非春秋所貶亦非時王所黜大抵夷狄無過于子今杞自用夷禮故曰子夏六月庚寅齊侯昭卒秋八月乙未葬齊孝公乙已公子遂帥師入杞謝湜曰春杞子來朝秋公子遂帥師入杞然則杞子之來以難故也以難來朝而魯師猶入其國所謂事之以皮幣犬馬而不得免焉者也冬楚人陳侯蔡侯鄭伯許男圍宋程頥曰楚稱人貶之為合諸侯以圍宋也謝湜曰中國衰微夷蠻得志故楚帥諸侯從楚圍宋則楚為宋患非特圍緡而已自齊桓沒中國空虛楚執宋公敗宋師伐陳伐宋圍陳圍緡合諸侯圍宋中國幾為左袵之地矣楚人序諸侯之上楚子也楚子稱人者抑夷狄之强黜之也黜楚子于上而諸侯棄順效逆猶楚人以危中國其惡不待貶絶而見矣雖然楚人所以陵暴至此者宋襄鹿上之盟啓其禍于前公子遂乞師之役熾其虐于後也胡安國曰楚稱人貶也宋公先代之後作賔王家非有纂弒之惡楚人無故摟諸侯以圍之何名也故黜而稱人以著其罪諸侯信夷狄伐中國獨無貶乎人楚子所以人諸侯也十有二月甲戌公㑹諸侯盟于宋謝湜曰宋服楚故公㑹諸侯為盟地以宋則宋圍已解宋亦與盟可知也釋宋圍而盟楚子也不稱楚子而稱諸侯抑夷狄之强也釋宋公與諸侯之能正楚也釋宋圍而盟義事也諸侯之力也書公㑹諸侯盟于宋與諸侯之能正楚也胡安國曰公與楚結好故往㑹盟其地以宋者宋方見圍無嫌于與盟而公之罪亦著矣春秋集義卷二十三

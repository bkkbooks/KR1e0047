body:
  text: 春秋集義卷四十七宋李明復撰定公七年春王正月夏四月秋齊侯鄭伯盟于鹹齊人執衛行人北宫結以侵衛謝湜曰鄭伯與齊故盟于鹹又曰行人通國之信也執行人以侵其國罪景公之不正也執而非罪侵而非義故貶稱人吕祖謙曰齊鄭盟于鹹此見晉衰齊鄭欲出謀此亦是天下大變四方諸侯一時皆衰亦是時節如此齊侯衛侯盟于沙謝湜曰衛侯畏齊故盟于沙大雩齊國夏帥師伐我西鄙謝湜曰魯侵鄭圍鄆故齊來伐九月大雩冬十月八年春王正月公侵齊公至自侵齊二月公侵齊三月公至自侵齊謝湜曰齊伐我西鄙故公侵齊書侵著其不正也三月之間再出侵齊著其産禍也公室微弱故於鄭於齊侵之而已曹伯露卒夏齊國夏帥師伐我西鄙謝湜曰公再侵齊故齊復來伐公㑹晉師于瓦公至自瓦謝湜曰晉來侵鄭公恃晉為援故出㑹晉師胡安國曰按左氏晉士鞅荀寅救魯則其㑹晉師何也春秋大法雖師次於君而與大夫敵至用大衆則君與大夫皆以師為重而不敢輕也故棐林之㑹不言趙盾而言晉師瓦之㑹言晉師而不書士鞅於以見人臣不可取民有衆專主兵權之意陳氏厚施於齊以移其國季孫盡征於魯以奪其民皆王法所禁也春秋之義行則不得為爾矣秋七月戊辰陳侯栁卒晉士鞅帥師侵鄭遂侵衛謝湜曰以君命帥師侵鄭中道復以師侵衛大夫之専權生事者也侵衛書遂罪士鞅之專且暴也𦵏曹靖公九月𦵏陳懷公季孫斯仲孫何忌帥師侵衛謝湜曰左氏謂晉侵衞故冬衞侯鄭伯盟于曲濮謝湜曰杜氏謂叛晉從祀先公謝湜曰魯以僖公先閔逆祀久矣定公始以昭穆正先公之位而順祀焉書從祀著復正也祀有典禮從則順不從則逆從者順之本也故從為順胡安國曰蜀人馮山曰昭公至是始得從祀於太廟其説是也季氏逐君而制其死生之命公薨乾侯不得終於正寢既薨七月又不得以時歸葬既葬絶其兆域又不得同於先君而在墓道之南至孔子為司冦然後溝而合諸墓則其主雖久未得從昭穆而祔祭宜矣及意如己卒陽虎專季氏將殺季孫斯而亂魯國託於正以售其不正始以昭公之主從祀太廟盖欲著季氏之罪以取媚於國人然其事雖順其情則逆春秋原情制法故不書禘事與日特曰從祀先公於盜竊寳玉大弓之上見事出陽虎而不可掩也其亦深切著明矣盜竊寳玉大弓程氏學曰定八年冬盜竊寳玉大弓九年夏得寳玉大弓寳玉大弓天子所賜先君之分器也藏之於國子孫世世保之不可失墜而為盜所竊國慢無政可知矣故竊之書得之書以志不恭之大也范祖禹曰孔子於陽貨亦不能絶也及其竊寶玉大弓則書之曰盜謝湜曰寶玉大弓先王錫魯分器所謂大寶鎮者也寶玉象徳大弓象武先公以文徳武功受此弓玉以有其國故歴世守而傳之以為國之寶鎮也國之寶鎮盜得而竊焉則人君不能守其國子孫不能保其傳可知矣故寶玉大弓書盜竊著其失守國之道而危之也凡為穿窬而肆害取物者盜之所為也陽貨蓄邪心以攘國寳故書盜九年春王正月夏四月戊申鄭伯蠆卒得寳玉大弓謝湜曰謂之得者以明既失而復得也寶玉大弓先王之所賜先公之所寳非盛徳不能受而傳之也子孫能有其物則國安不能有其物則國危竊之書得之書尊之也胡安國曰榖梁子曰寶玉封圭大弓武王之戎弓周公受賜藏之魯或曰夏后氏之璜封父之繁弱也子孫世守罔敢失墜以昭先祖之徳存肅敬之心耳古者告終易代𢎞璧琬琰天球夷玉兑之戈和之弓埀之竹矢莫不陳列非直為美觀也先王所寶傳及其身能全而歸之則可以免矣魯失其政陪臣擅權雖先公分器猶不能守而盜得竊諸公宫其能國乎故失之書得之書所以譏公與執政之臣見不恭之大也此義行則有天下國家者各知所守之職不敢忽矣又曰春秋於寶玉大弓失之則書於策得之則書於策此二物者未繋存亡何其書法若此之謹也先王分器所當世守而盜得竊之則不恭亦甚矣六月葬鄭獻公秋齊侯衞侯次于五氏謝湜曰五氏晉地罪其非事而出故書次秦伯卒冬𦵏秦哀公十年春王三月及齊平謝湜曰前此魯數侵齊齊數伐魯至孔子為相與齊釋怨相平而齊受之故魯及齊平平一國所願故不稱公暨齊平者彼欲平而我與之平也及齊平者我欲平而彼從我平也孔子之相魯也以徳親懷鄰國講信修睦而二國於此平焉能循其道則雖天下之大可得而平也豈獨一齊國哉宋楚其平起於下故書人齊魯其平起於上故書國夏公㑹齊侯于夾谷公至自夾谷謝湜曰魯自昭公失位魯君不㑹諸侯久矣孔子之相魯也數月之間平兩國之爭定公出㑹齊侯安國尊君撥亂反正於是乎在矣惜乎聖人之不久用於魯也胡安國曰夾谷之㑹孔子相犂彌言於齊侯曰孔丘知禮而無勇若使萊人以兵刼魯侯必得志焉齊侯從之兩君就壇兩相相揖齊人皷譟而起欲以執魯君孔子歴階而升不盡一等而視歸乎齊侯曰兩君相好而裔夷之俘以兵亂之非齊君所以命諸侯也裔不謀夏夷不亂華俘不干盟兵不逼好於神為不祥於徳為愆義於人為失禮齊侯遽止之而屬其臣曰夫人率其君與行古人之道二三子獨率我入非禮之俗使寡人獲罪於魯侯如之何晏子曰小人之謝過也以文君子之謝過也以質君已知過則謝之以質耳於是歸鄆讙龜隂之田仲尼一言威重於三軍亦順於理而已矣故天下莫大於理而强衆不與焉晉趙鞅帥師圍衛謝湜曰士鞅侵衛衛不能服故鞅圍衛齊人來歸鄆讙龜隂田程頤曰齊服義而求歸之故書來歸謝湜曰田不書我者鄆龜讙隂本非魯舊故也歸田書來者非我求之於齊齊人至魯歸之故也徳之悦服人心久矣夾谷之㑹孔子以徳左右其君以禮退裔夷之俘止嘉樂之享以義黜優施之亂正司馬之刑方是時兩君之禮嚴肅順備而不敢偷兩國之衆恭恪震疊而不敢慢文徳武威於此兩立矣故夾谷之㑹方返齊人畏恐服義而歸我以所侵之田也胡安國曰齊人前此嘗歸濟西田矣後此嘗歸讙及闡矣而此獨書來歸何也曰歸者魯請而得之也曰來歸者齊人心服而歸之也定公齊侯㑹于夾谷孔子攝相事具左右司馬以從至于㑹所以禮相見郤裔俘拒兵車之命而罷享禮之設於野由是齊侯歸三邑以謝過故揚子法言曰仲尼用於魯齊人章章歸其侵疆桓公以義責楚而楚人求盟夫子以禮責齊而齊人歸地皆書曰來序績也春秋夫子之筆削自序其績可乎聖人㑹人物於一身萬象異形而同體通古今於一息百王異世而同神於土皆安而無所避也於我皆真而無所妄也其曰天之將喪斯文也後死者不得與於斯文也天之未喪斯文也匡人其如予何是以天自處矣而亦何嫌之有又曰鄆讙龜隂之田本魯田也始失其地不書于策者君辱當諱也不能保其土地人民則不君矣春秋義存君親故特諱而不書以掩魯侯之辱叔孫州仇仲孫何忌帥師圍郈秋叔孫州仇仲孫何忌帥師圍郈謝氏曰郈叔孫氏邑陪臣據邑叛國故二卿圍郈夏圍不克故秋復圍之以二卿之力郈邑至於再圍則郈之强大耦國可知矣故曰並后匹嫡兩政耦國亂之本也胡安國曰郈叔孫氏邑也侯犯以郈叛不書於策書圍郈則叛可知矣再書二卿帥師圍郈則强亦可知矣天子失道征伐自諸侯出而後大夫强諸侯失道征伐自大夫出而後家臣强其逆彌甚則其失彌速故自諸侯出十世希不失矣自大夫出五世希不失矣陪臣執國命三世希不失矣三家專魯為日已久至於家臣爭叛亦其理宜矣春秋制法本忠恕施諸已而不願亦勿施諸人故所惡於上不以使下所惡於下不以事上二三子知傾公室以自張而不知家𨽻之擬其後也凡此類皆據事直書深切著明矣宋樂大心出奔曹宋公子地出奔陳謝湜曰宋景公失御臣之道故左右大臣以大惡相繼出奔冬齊侯衛侯鄭㳺速㑹于安甫謝湜曰㑹于安甫以衛有晉難故也叔孫州仇如齊謝湜曰齊來歸田故州仇如齊宋公之弟辰暨仲佗石彄出奔陳謝湜曰仲佗石彄首惡構亂公子辰不能拒絶而從之故書暨辰縁母弟之寵權勢隆盛以至二卿挾之以亂故書弟胡安國曰按左氏宋公子地有白馬四公以與桓魋地怒抶魋奪之魋懼將走公泣之母弟辰曰子為君禮不過出境君必止子地出奔陳公弗止辰為之請弗聴辰曰是我逐吾兄也吾以國人出君誰與處書曰宋公之弟辰暨仲佗石彄出奔陳其弟云者罪宋公以嬖魋故而失二弟無親親之恩暨云者罪辰以兄故帥其大夫出奔無尊君之義夫暨者不得已之詞又以見仲佗石彄見脅於辰不能自立無大臣之節也十有一年春宋公之弟辰及仲佗石彄公子地自陳入于蕭以叛謝湜曰公子辰恃弟之寵從亂臣之謀入與景公爭國乃辰率亂臣而為之主也故入蕭以辰為首暨者彼為之首而我與之出也及者我為之主而彼從我入也出奔書暨者以逆首歸仲佗石彄而罪之也入蕭書及者以逆首歸宋公之弟辰而罪之也胡安國曰出奔陳則稱暨入于蕭以叛則稱及非不得已之詞得已而不已者也夫事君者可貧可賤可殺而不可使為亂今不得已而輕於去國猶之可也得已而不已而果於叛君則無首從之别其罪一施之故不稱暨而稱及四卿在蕭以叛而大心自曹從之其叛可知矣故不書叛而曰入於蕭入逆詞也書自陳自曹者結鄰國以入叛陳與曹之罪亦著矣吕祖謙曰蕭是大邑莊十二年宋閔公時群公子亦入於蕭今年母弟辰之亂非獨是所掠之地可畏而所謀事之人亦可畏如暨仲佗之徒樂大心凑合得成所以為宋大患夏四月秋宋樂大心自曹入於蕭謝湜曰樂大心公子地與三子同惡相濟者也故公子地自陳從三子入蕭樂大心復自曹入蕭冬及鄭平叔還如鄭涖盟謝湜曰魯六年侵鄭至此釋怨而平又曰以平故為盟吕祖謙曰冬及鄭平始叛晉也當此時晉之屬國皆不屬晉如衛又自去年叛今魯又來平鄭諸侯皆無從晉者十有二年春薛伯定卒夏葬薛襄公叔孫州仇帥師墮郈謝湜曰郈也費也成也三家之邑也魯自宣公以來三家專政邑城過制勢擬國都及三家之微也陪臣恃都邑出為背逆三家復不能制故或以郈叛或以費叛或以成叛以至帥師墮之也書墮郈著都城之害也然則邑有百雉之城家有甲兵之富其終不為國患者鮮矣統御國家者不可不戒也楊時曰漢之有七國未若魯之有三家也孔子墮三都之城而三家無敢不受命者則其取之必有道矣朱熹語録或問孔子仕季氏之義曰此亦自可疑有難説處因言三家後來亦被陪臣撓也要得夫子來整頓孔子却因其機而為之如墮邑之事若漸漸掃除得去其勢亦自削弱可復正也孟氏不肯墮成遂不能成功因説如今且據史傳所載亦多可疑處如魯國司徒司馬司空之官乃是三家世為之不知聖人如何得做司冦又問群弟子皆仕家臣聖人亦不甚責之曰當時列國諸臣皆世其官無揷手處故諸子不擇地而為之耳或又問孔子於季桓子見行可之仕孔子仕於定公而言桓子何也曰當時桓子執國柄定公亦自做主不起孔子之相皆由桓子及桓子受女樂孔子便行矣如陳恒弑齊君孔子沐浴而告魯公又告桓子事勢可見問墮三都季氏何以不怨曰季氏是時自不奈陪臣何故假孔子之力以去之及既墮三都而三桓之勢遂衰所以桓子甚悔臨死謂康子曰使仲尼之去而魯不終始者由我故也正如五代羅紹威不奈魏博衙兵何假朱温之勢以除之既除衙兵而魏博之勢大弱紹威大悔正此類也孔子是時也失了這機㑹不曽做得成衛公孟彄帥師伐曹季孫斯仲孫何忌帥師墮費謝湜曰費季孫氏邑費尤强故二卿帥師墮之胡安國曰按左氏仲由為季氏宰將墮三都於是叔孫氏墮郈季氏將墮費公山不狃叔孫輙帥費人襲魯公與三子入季氏之宫登武子之臺費人攻之入及公側仲尼命申句須樂頎下伐之二子奔齊遂墮費禮曰制國不過千乘都城不過百雉家富不過百乘以此防民諸侯猶有叛者故家不藏甲邑無百雉之城禮所當謹也郈費成者三家之邑政在大夫三卿越禮各固其城公室欲張而不得也三桓既微陪臣擅命憑恃其城數有叛者三家亦不能制也而問於仲尼遂墮三都是謂以禮為國可以為之兆也推而行諸魯國而凖則地方五百里凡侵小而得者必有興滅國繼絶世之義諸侯大夫各謹於禮不以所惡於上者使其下亦不以所惡於下者事其上上下交相順而王政行矣故曰茍有用我者期月而可三年有成吕祖謙曰侯犯以郈叛須看初間都無此縁昭公出奔後魯國大變都無綱紀所以如此又曰孔子為政於魯墮三家都邑考當時本末自有次序所謂三家都邑自常人論之必疑變不可知然考當時事端初不發於仲尼乃仲由為季氏宰發此議又是三家既有此議後來論之却言仲尼不自為謀恐三家萬一不從傷威損重不可復令魯國若使仲由為之從則公室之權自此振不從則不過不從家臣之言仲尼之禮貌未損魯國之威權未沮為此論者亦未免為利害所奪亦未知聖人為政夫子之得邦家所謂立之斯立綏之斯來動之斯和聖人作而萬物覩仲尼在上同此心者孰不懷同此氣者孰不感况仲尼是勇鋭兼人之資感於氣最先者所以為墮都之議而叔孫氏季氏皆從郈與費此二人亦非仲由所能令盖聖人在上他自有所感動仲由特發耳然兩都既墮獨公山弗狃負固而弗服何故比閉固難感者所以雖用兵未克如三苗逆命一般若仲尼終為政於魯則閉固者亦須服又將此事反覆論之當仲尼為政公室之權雖未盡收已不見公室與三家之異昭公時三家與公室相為仇讎到此能與三子入宫登臺當倉卒變亂之時敢如季氏之宫分明見得季氏與國同體了此見聖人感化之功如此秋大雩冬十月癸亥公㑹齊侯盟于黄謝湜曰以平故為盟十有一月丙寅朔日有食之公至自黄十有二月公圍成公至自圍成程氏學曰禮曰制國不過千乘都城不過百雉家富不過百乘以此防民諸侯猶有叛者孔子曰禄之去公室五世矣政逮於大夫四世矣故夫三桓之子孫微矣費也郈也成也三家之邑也政在大夫三家越禮各固其城三桓既微陪臣擅命而恃其城數有叛者故三家亦不能制也乃至屢圍而不克帥師墮之費郈則墮矣成猶强不服是以公圍而不果墮公羊曰孔子行乎季孫三月不違曰家不藏甲邑無百雉之城於是墮郈費斯得其義書此足以見有天下國家者可不慎於禮哉謝湜曰成孟孫氏邑魯將墮三都三卿墮郈墮費矣成猶强難服故公出墮成其墮成也卒於圍之而止書圍成著其不能墮也公不能亦孟孫有中輟之心故也胡安國曰按左氏將墮成公斂處父謂孟孫曰墮成齊人必至于北門且成孟氏之保鄣無成是無孟氏也子偽不知我將不墮書公圍成强也其致危之也仲由為季氏宰孔子為魯司冦而不能墮成何也按是冬公圍成弗克越明年孔子由大司冦攝相事然後誅少正夘與聞國政三月而商賈信於市男女别於途及齊人饋女樂孔子遂行然則圍成之時仲尼雖用事未能專魯國之政也而辯言亂政如少正夘等必肆疑沮於其間矣成雖未墮無與為比亦不能為患使聖人得志行乎魯國以及朞月則不待兵革而自墮矣胡宏曰司馬遷載孔子墮三都之明年由大司冦攝相事夫聖人之仕所以大過人者無他焉夫天之生物隨其分限無不可為而過者無可為而不及者為委吏則必㑹計當為乘田則必畜飬蕃為宰而親民則必制飬生送死之節為司空而正封域則溝合昭公之墓為司冦而治奸亂則誅少正夘而墮三都及成不墮三家之慮變矣故經文不言三家直書曰公聖人色斯舉矣安有明年由大司冦攝相之事所以必知其無者考按經文明年無更敗起廢之事而築囿大蒐絶與墮都之意不侔故也遷載孔子言行不得其真者尤多則未知其所以得實録之名者何故朱熹語録或問墮三都事費郈已墮而成不可墮是不用夫子至於此否曰既不用郤何故圍成當時夫子行乎季孫三月不違則費郈之墮出於不意及公斂處父不肯墮成次第喚醒了叔季二家便做這事不成又齊人以女樂歸之遂行不然當别有處置也又曰孔子相魯欲墮三家至成則為孟氏所覺遂不可墮要之三家孟氏最弱季叔為强强者墮之而弱者反不可墮者强者不覺而弱者覺之故也問成既不可墮夫子如何别無處置了便休曰不久夫子亦去魯矣若使聖人久為之亦須别有道理春秋集義卷四十七

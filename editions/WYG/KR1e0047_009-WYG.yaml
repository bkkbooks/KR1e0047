body:
  text: 春秋集義卷六宋李明復撰桓公程頥曰桓公名允惠公子隱公弟桓王九年即位桓謚也闢土服逺曰桓元年春王正月公即位程頥曰桓公弑君而立不天無王之極也而書春王正月公即位以天道王法正其辠也謝湜曰君為國之大夲即位君之始事位不正不可以守國故春秋元年必書公即位所以正大夲謹始事也諸侯爵位皆先王度其祖考功德而畀之也故子孫繼世必請命於王頒政施教考禮修樂必受命於王所以尊王命而正邦國也自隱公以降列國盟㑹自專法令自出其即位皆受之先君而請命之禮不修君臣之大義廢矣故春秋之初以王法首奪隱公即位而正其惡也奪隱公即位以正其惡而諸侯擅命傳國之罪皆見矣此隱公所以不書即位也文公成公襄公昭公哀公書即位者以明繼正也莊公閔公僖公不書即位者以明繼故也桓公以害隱而立宣公以公子遂害世子而立定公以季氏背昭而立三公書即位者著其自立之罪也然則春秋之法書即位者以繼正也不書即位者以繼故也隱公繼世正也宜書即位而不書者以罪諸侯不臣桓公宣公定公繼世非正也不宜書即位而書者以責臣子不能討逆也胡安國曰元年即位之始年也自是累數雖久而不易此前古人君記事之例春秋祖述為編年法及漢文帝惑方士之言改後元年始亂古制夫在位十有六載矣復稱元年可乎孝武又因事别建年號歴代因之或五六年或四三年或一嵗再更使記注繁蕪莫之勝載夫歴世無窮而美名有盡豈記久明逺可行之法也必欲傳久當以春秋編年為正又曰桓公與聞乎弑而書即位著其弑立之罪深絶之也美惡不嫌同詞或問桓非惠公之嫡子乎當立而未能自立是故隱公攝焉以俟其長而授之位久攝而不歸疑其遂有之也是以至於見弑而惡亦有所分矣春秋曷為深絶桓也曰古者諸侯不再娶於禮無二嫡惠公妃既卒繼室以聲子則是攝行内主之事矣仲子安得為夫人母非夫人則桓乃隱之庶弟安得為嫡子謂當立乎桓不當立則國乃隱公之國其欲授桓乃實讓之非攝也攝讓異乎曰非其有而居之者攝也故周公即政而謂之攝推已所有以與人者讓也故堯舜禪授而謂之讓惠無嫡嗣隱公繼室之子於次居長禮當嗣世其欲授桓所謂推已所有以與人者也豈曰攝之云乎以其實讓而桓乃弑之春秋所以惡桓深絶之也然則公羊所謂桓㓜而貴隱長而卑子以母貴者其説非與曰此狥惠公失禮而為之詞非春秋法也仲子有寵惠公欲以為夫人母愛者子抱惠公欲以桓為適嗣禮之所不得為也禮不得為而惠公縱其邪心而為之隱公又探其邪志而成之公羊又肆為邪説而傳之漢朝又引為邪議而周之夫婦之大倫亂矣春秋明著桓罪深加貶絶備書終始討賊之義以示王法正人倫存天理訓後世不可以邪汨之也朱熹曰書即位者是魯君行即位之禮繼故不書即位者是不行即位之禮若桓公之書即位則是桓公自正其即位之禮耳三月公㑹鄭伯于垂鄭伯以璧假許田程頥曰隱公八年鄭伯使宛來歸祊蓋欲易許田魯受祊而未與許及桓弑立故為㑹而求之復假以璧朝宿之邑先祖受之於先王豈可相易也故諱之曰假諱國惡禮也程氏學曰鄭伯以璧假許田左氏以為易祊田黎淳以隱十一年易許之事破左氏謂田是許之田如何曰左氏説是也既是許之田如何却假之魯隱十一年雖入許許未嘗滅許叔已奉祀也楊時曰宋督弑其君而公成其亂取郜大鼎以歸公弑隱公而鄭伯㑹公于垂以璧假許田則魯之亂鄭伯成之也不書為内諱也夫鄭伯之假田與公之取鼎其求賂一也而書之異辭内外之分然也謝湜曰君薨百官緫已以聽於冡宰三年孝子疾痛在心思慮未能接事故也國有大故然後以義勝恩故三年之喪金革之事有不辟者隱公即位三月而盟于蔑桓即位三月而㑹于垂春秋諸侯無三年哀戚可知也春秋於即位三月書盟書㑹而惡自見矣左氏謂修好于鄭又曰許田魯朝宿之邑也鄭莊公欲易許田其志已見於歸祊矣祊小許田大故歸祊之後五年然後得許田其㑹于垂也又以璧遺魯而請之祊非魯有也許田鄭易而得之也祊非魯有然而於魯稱歸者罪鄭專天子之邑也許田鄭易而得之然而於鄭稱假者不與莊公變天子之封也假暫辭稱假以明復當歸魯胡安國曰許田所以易祊也鄭既歸祊矣又加璧者祊薄於許故也魯山東之國與祊為鄰鄭畿内之邦許田近地也以此易彼各利於國而聖人乃以為惡而隱之獨何歟曰利者人欲之私放於利必至奪攘而後厭義者天理之公正其義則推之天下國家而可行春秋惡易許田孟子極陳利國之害皆拔夲塞源杜簒弑之漸也湯沐之邑朝宿之地先王所錫先祖所受私相貿易而莫之顧是有無君之心而廢朝覲之禮矣是有無親之心而擅弃先祖之地矣故聖人以是為國惡而隱之也其不曰以璧易田而謂之假者夫易則已矣言假則有歸道焉又以見許人改過遷善自新之意非止隱國惡而已也其垂訓之義大矣吕祖謙曰元年鄭伯以璧假許田朝宿湯沐皆天子所賜諸侯之邑然天子諸侯其朝㑹之時如此之衆安得許多邑以與之蓋天子所賜非其大勲勞即王之懿親却非人人而與之如五服之諸侯其來亦自有時耳朝宿之邑在畿内湯沐之邑在方嶽之下想一邑之内亦不多要不過數十家耳又須看鄭人卒易祊田之意初間尚懼王法未敢遽易故以假為言夏四月丁未公及鄭伯盟于越程頥曰桓公欲納鄭好以自安故既與許田又為盟也弑君之人凡民罔弗憝而鄭與之盟以定之其辠大矣謝湜曰公立不正與鄭㑹受鄭璧遺鄭許田及鄭盟以親鄭也胡安國曰垂之㑹鄭為主也故稱㑹越之盟魯志也故稱及鄭人欲得許田以自廣是以為垂之㑹桓公欲結鄭好以自安是以為越之盟夫弑逆之人凡民罔弗憝即孟子所謂不待教命人得而誅之者也而鄭與之盟以定其位是肆人欲滅天理大義遂以澌滅天討無復共行聖人所為懼春秋所以作無俟於貶絶而惡自見矣秋大水程頥曰君修德則和氣應而雨暘若桓行逆德而致隂沴乃其宜也謝湜曰水汎濫異常為大水大水陽氣勝而溢也其損傷民物為害大故書胡安國曰大水者隂逆而與怨氣并之所致也桓行逆德而致隂沴宜矣或問堯之時豈有致之者而曰洚水警予何也曰堯之水非有以致之開闢已來水之行未能得其所歸故堯有憂焉使禹治之然後人得平土而居爾若曰洪水者積雨之所成時晹而熄矣奚待乎九年十有三載之治也山谷之所洩歟自禹功既䟽鑿决排以至于今而其流不滅何也是知天非為堯有洪水之災至禹而後水由地中行爾後世有人為不善感動天變召水溢之災者必引堯為解誤矣冬十月二年春王正月戊申宋督弑其君與夷及其大夫孔父程頥曰桓公無王而書王正月正宋督之罪也弑逆之罪不以王法正之天理滅矣督雖無王而天理术嘗亡也人臣死君難書及以著其節父名也稱大夫不失其官也謝湜曰宋督宋萬不氏未賜族也雖賜族不當書氏逆惡在所誅絶故也孔氏父名孔父死君之難臨大節而不可奪者也可謂忠於其君矣故殤公之被害也書及以顯其忠書大夫以示能死職宋殤公立十年外事攻討兵連不息内有逆臣而不加察外有怨仇而不加慮此督之難所以發於蕭牆也棄内事外者可不戒耶桓月皆不書王二年書王者以王法正督之罪也胡安國曰桓無王而元年書春王正月以天道王法正桓公之罪也桓無王而二年書春王正月以天道王法正宋督之罪也程氏曰弑逆者不以王法正之天理滅矣督雖無王而天理未嘗亡也其説是矣糓梁子以二年書王正與夷之卒其義一爾以為諸侯之卒無所隱痛故書王以正之誤矣按左氏宋殤公立十年十一戰民不堪命孔父為司馬無能改於其德非所謂格君心之非者然君弑死於其難處命不渝亦可以無婗矣父者名也著其節而書及不失官而書大夫是春秋之所賢也賢而名之何也故侍讀劉敞以謂既名其君於上則不字其臣於下此君前臣名禮之大節也督將弑殤公孔父生而存則不可得弑於是乎先攻孔父而後及其君能為有無亦庶幾焉凡亂臣賊子蓄無君之心者必先剪其所忌而後動於惡不能剪其所忌則有終其身而不動也華督欲弑君而憚孔父劉安欲叛漢而憚汲直曹操欲禪位而憚孔融此數君子者義形於色皆足衛宗社而忤邪心姦臣之所以憚也不有君子其能國乎春秋賢孔父示後世人主崇奬節義之臣乃天下之大閑有國之急務也吕祖謙曰左氏序宋督事極好觀其論督有無君之心而後動於惡此左氏識見髙逺處蓋人心各有所主使宋督有尊君之心决不敢為弑逆之事惟此心蕩則縱横放肆無所忌憚蓋督之殺孔父與弑殤公乃為惡之末流其有無君之心乃為惡之根夲聖人所以過位變色入門鞠躬夫豈繁文末節哉蓋所以飬其尊君之心也滕子來朝程頥曰滕夲侯爵後服屬于楚故降稱子夷狄之也首朝桓之罪自見也謝湜曰滕侯爵稱子以其臣屬於楚也四夷君長爵不過子滕侯臣屬於楚稱子黜之也先義後利上賢下力貴信賤詐中國之道也禽獸惟利是嗜而不知義之在所先也惟力是務而不知賢之在所上也惟詐是用而不知信之在所貴也春秋之所以賤楚者以此而已故中國諸侯臣屬於楚則黜之胡安國曰隱末年滕稱侯爵距此三嵗爾乃降而稱子者先儒謂為時王所黜也使時王能黜諸侯春秋豈復作乎又有言其在喪者終春秋之世不復稱侯無是説矣然則云何春秋為誅亂臣討賊子而作法尤嚴於亂賊之黨使人人知亂臣賊子之為大惡而莫之與則無以立於世而莫敢動於惡而簒弑之禍止矣桓公弟弑兄臣弑君天下之大惡凡民罔弗憝也已不能討又先鄰國而朝之是反天理肆人欲與禽獸無異而春秋之所深惡也故降而稱子以正其罪四夷雖大皆曰子其降而稱子外之也或曰非天子不制度不議禮不攷文仲尼豈以匹夫專進退諸侯亂名實哉則將應之曰仲尼固不以匹夫專進退諸侯亂名實矣不曰春秋天子之事乎知我罪我者其惟春秋乎世衰道㣲暴行交作仲尼有聖德無其位不得如黄帝舜禹周公之伐􅃖尤誅四凶戮防風殺管蔡行天子之法於當年也故假魯史用五刑奉天討誅亂賊垂天子之法於後世其事雖殊其理一爾何疑於不敢專進退諸侯以為亂名實哉夫奉天討舉王法以黜諸侯之滅天理廢人倫者此名實所由定也故曰春秋成而亂臣賊子懼李侗語録朱熹問按滕夲侯稱伊川程氏謂服屬於楚故貶稱子熹按是時楚未與中國通滕又逺楚終春秋之世未嘗事楚但為宋役爾不知伊川程氏别有何據又陳蔡諸國後來屬楚者亦未嘗貶爵也胡文定以為為朝桓而貶之以討亂賊之黨此義似勝然滕自此不復稱侯至定公之喪來㑹喪猶稱子夫豈以祖世有罪而并貶其子孫乎然則胡氏之説亦有可疑者不知當以何説為正胡氏又謂凡朝桓者皆貶獨紀侯以咨謀齊難而來志不在於朝桓故再朝皆無貶焉熹竊以為果如此則是義理之正可以危急而弃之也不知春秋之法果如此否二年紀侯來朝左氏作杞字後有入杞㑹成事傳皆有説可據伊川程氏與胡氏依公糓作紀字延平李侗答曰滕子來朝考之春秋夫子凡所書諸侯來朝皆不與其朝也胡文定謂春秋之時諸侯之朝皆無有合於先王之時諸侯之朝皆無有世朝之禮者故書此譏之也滕夲侯稱桓二年來朝稱子者以討亂賊之黨貶於諸家之説義為精先儒又以為時王所黜者胡氏以為果如此則春秋不作矣恐先儒之説非來諭以謂自此終春秋之世不復稱侯豈以祖世有罪而并貶其子孫乎若如此言大叚害理春秋與人改過遷善又善善長惡惡短不應如此是可疑也侗竊以從胡之説於道理為長觀夫子所書討亂之法甚嚴滕不以桓之不義而朝之只在於合黨締交此夷狄也既已貶矣後世子孫碌碌無聞無以自見於時又壤地􅄶小夲一子男之國宋之盟左傳於宋人請滕欲以為私屬則不自强而碌碌於時者久矣自一貶之後夫子再書各㳂一義而發遽又以侯稱之無乃紛紛然殽亂春秋之㫖不明其夲意乎蓋聖人之心必有其善然後進之若無所因是私意也豈聖人之心哉若如此看似於後世之疑不礙道理為通又不知如何春秋所以難看者蓋以常人之心推測聖人未到聖人洒然處豈能無失耶諸俟他日反復面難庶幾或得其㫖又曰伊川程氏之説攷之諸處未見春秋之前服屬於楚事迹更俟尋攷之來喻以謂紀侯來諮謀齊難志不在於朝桓故再朝無貶則是義理之正可以危急而弃之若果如此尤害義理春秋有誅意之説紀侯志不在於朝桓則非滕子之類也列國有急難以義而動又何貶耶朱熹曰向見程沙隨作春秋解只有説滕子來朝一處最好如隱十一年方書滕侯薛侯來朝如何到桓二年便書滕子來朝先軰為説甚多或以為時王所黜故降而書子不知是時時王已不能行黜陟之典就使能黜陟諸侯當時亦不止一滕之可黜或以春秋惡其朝桓特削而書子自此之後滕一向書子豈春秋惡其朝桓而并後代子孫削之乎或以為當喪未君前又不見滕侯卒皆不通之論程沙隨則謂此見得春秋時小國事大國其朝聘貢賦之多寡隨其爵之崇卑滕子之事魯以侯禮見則所共者多故自貶降而以子禮見庶得貢賦省少易供説却恐是如此何故縁後面鄭朝晋云鄭國男也而使從公侯之賦見得鄭夲是男爵後襲用侯伯之禮以交於大國初焉不覺其貢賦之難辦後來益困於此方説出此等話非獨是鄭想當時小國多是如此今程氏春秋亦如此説滕子程是紹興以前文字不知沙隨見此而為之説還是見得此意三月公㑹齊侯陳侯鄭伯于稷以成宋亂程頥曰宋弑君而四國共成定之天下大惡也謝湜曰宋有弑逆之亂為之討賊而肆諸市朝立殤公之後以承社稷諸侯之職也四國之㑹于稷也乃從逆臣華督之謀召公子馮以君其國而以督相之是四國釋宋之亂弗治而反以成之也天下之亂未有大於弑逆者也四國不能討亂而反以成亂惡之大也春秋書成宋亂而四國之惡不待貶黜而見矣去其亂之謂平遂其事之謂成胡安國曰三綱軍國政事之夲人道所由立也三綱正則基於治以興三綱淪則習於亂以亡按春秋華督有不赦之惡魯鄭齊陳同㑹于稷以成其亂受賂而歸而天子不討方伯不征咸自以為利也不知百官象之有大不利焉未幾陳有五父之亂齊有無知之亂鄭有祭仲子突亹儀之亂魯有叔牙慶父般閔之亂數十年間四國舛逆幾至喪亡則以昩於履霜堅氷之戒不能辨之於早也春秋備書于䇿明三綱之重為後世鑒深切著明矣又曰按左氏為賂故立華氏也嘗攷之傳當邾定公之時蓋有弑其父者而定公矍然失席曰是寡人之罪也嘗學斷斯獄矣臣弑君凡在官者殺無赦子弑父凡在官者殺無赦殺其人壞其室洿其宫而豬焉蓋君踰月而後舉爵華督弑君之賊凡民罔不憝也而桓與諸侯㑹而受賂以立華氏使相宋公甚矣故特書其所為而曰成宋亂夫臣為君隱子為父隱禮也此其自言之何桓惡極矣臣子欲盡隱之而不可以欺後世其曰成宋亂而不書立華氏猶為有隱乎耳春秋列㑹未有言其所為者獨此與襄公末年㑹于澶淵各書其事者桓弑隱督弑殤般弑景皆天下大惡聖人所為懼春秋所以作也一則受宋賂而立華氏一則謀宋災而不能討故特書其事以示貶焉然澶淵之㑹既不書魯卿又貶諸國之大夫而稱人此則書公又序諸侯之爵何也澶淵之㑹欲謀宋災而不討弑君之賊雖書曰宋災故而未能表其誅責之意也必深諱魯卿而重貶諸國之大夫然後足以啟問者見是非也稷之㑹前有宋督弑君後有取宋鼎之事書曰成宋亂則其責己明不必諱公與貶諸侯爵次然後見其罪矣張栻曰春秋㑹于稷以成宋亂或訓成為平不必如此説這般公事如何便結絶夏四月取郜大鼎于宋戊申納于太廟程頥曰四國既成宋亂而宋以鼎賂魯齊陳鄭皆有賂魯以為功而受之故書取以成亂之賂器置于周公之廟周公其饗之乎故書納納者弗受而强致也程氏雜説曰宋有弑君之亂諸侯之義所宜共恤督有弑君之惡且凡民罔弗憝况諸侯哉成者平也公㑹齊侯陳侯鄭伯于稷以平之而遂亂受賂納于太廟所謂不待貶絶而惡見者也謝湜曰王鎮大寳器天下所共貴惟聖王能以德服天下而有之故古者藏之于廟以示祖宗能受其獻也郜鼎之賂明則人所惡幽則神所惡内不可以示子孫外不可以示神民凶莫大焉桓公視弑逆大惡安以為常故以得宋大鼎為功而納之祖廟也春秋書取宋大鼎書納于太廟其惡不待貶黜而見矣故臧哀伯曰今滅德立違而寘其賂器於太廟百官象之其又何誅焉大鼎取之宋也書曰郜大鼎者郜不能守而宋取之宋不能守而魯取之然則大鼎無常能守則存不能守則遷故大鼎書主名以為有國者戒也納大鼎書日謹其事也璧大鼎皆保國之器也桓公受鄭璧取宋大鼎皆以得保國之器為榮也無保國之德而恃以保其國失之大也胡安國曰取者得非其有之稱納者不受而强致之謂弑逆之賊不能致討而受其賂器寘於太廟以明示百官是教之習為弑逆悖亂之行也公子牙慶父仲遂意如之惡又何誅焉聖人為此懼而作春秋故直載其事謹書其日垂訓後世使知寵賂之行保邪廢正能敗人之國家也亦示之戒矣吕祖謙曰哀伯之諫取郜鼎其中所言周家宗廟制度固當攷然桓公於弑逆之事猶忍為之哀伯乃諫其取叛臣之鼎是猶不能三年之喪而緦小功之察者也哀伯亦可謂習而不察矣然看哀伯之諫周内史之言須看得天下之人皆習而不察哀伯魯之賢大夫也周内史周之良史也尚不知君臣之大義區區然唯納賂之是諫文辭之是取在賢者猶不知而况下賢者數等而為衆人者乎以此知當時天下之人視弑君殺父以為常矣秋七月杞侯來朝程頥曰凡杞稱侯皆當為紀杞爵非侯文誤也及紀侯大去其國之後紀不復稱侯矣胡安國曰公糓程氏皆以杞為紀弟弑兄臣弑君天下之大惡王與諸侯不奉天討反行朝聘之禮則皆有貶焉所以存天理正人倫也紀侯來朝何獨無貶乎當是時齊欲滅紀紀侯求魯為之援非為桓立而朝之也蔡侯鄭伯㑹于鄧程頥曰始懼楚也謝湜曰左氏謂始懼楚胡安國曰左氏曰始懼楚也其地以國鄧亦與焉楚自西周已為中國患宣王蓋嘗命將南征矣及周東遷僭號稱王慿陵江漢此三國者與之鄰是以懼也後卒滅鄧虜蔡侯而鄭以王室懿親為之服役終春秋之世聖人蓋傷之也夫天下莫大於理莫强於信義循天理惇信義以自守其國家荆楚雖大何懼焉不知夲此地醜德齊莫能相尚則以地之小大力之强弱分勝負矣觀諸侯㑹盟離合之迹而夷夏盛衰之由可攷也觀春秋進退予奪抑揚之㫖則知安中夏待四夷之道矣九月入杞程頥曰將卑師少外則稱人内則止云入某伐某謝湜曰杞侯奔走以事大國而不得免故魯人入杞公及戎盟于唐冬公至自唐程頥曰君出而書至者有三告廟也過時也危之也桓公弑立嘗與鄭齊陳㑹矣皆同為不義及逺與戎盟故危之而書至戎若不如三國之黨惡則討之矣居夷浮海之意也中國既不知義夷狄或能知也又語録或問書至如何曰告廟而書亦有不縁告廟而書者又問隱皆不書至曰告廟之禮不行謝湜曰君行其至必書謹之也古者國君以事而出返必告廟示不敢專也春秋諸侯出入無時㑹盟征伐繼踵不息其至也不復告廟者衆矣春秋因其告廟則書其不告則不書以示不敬也諸侯宗廟社稷之主也政治不以時修祭祀不以時舉臣民不以時省則國事隳矣故魯侯之出春秋謹其至而書之所以為之戒也凡書至八十二觀其所至時月而諸侯委社稷弃人民般樂自縱而久荒于外其失見矣胡安國曰凡為人子者出必告反必面事亡如事存故君行必告廟反必奠而後入禮也出必告行反而告至常何以書或誌其去國踰時之久也或録其㑹盟侵伐之危也或著其黨惡附姦之罪也桓公弑君而立嘗列於中國諸侯之㑹而不書至同惡也今逺與戎盟而書至者危之也程氏所謂居夷浮海之意是矣語不云乎夷狄之有君不如諸夏之亡也春秋集義卷六

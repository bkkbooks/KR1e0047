body:
  text: 春秋集義卷十五宋李明復撰莊公二十年春王二月夫人姜氏如莒謝湜曰比年如莒甚之也胡安國曰十五年夫人姜氏如齊至是再如莒而春秋書者禮義天下之大防也其禁亂之所由生猶防止水之所自來也衛女嫁于諸侯父母終思歸而不得故泉水賦許穆夫人閔衛之亡思歸唁其兄而阻于義故載馳作聖人録于國風以訓後世使知男女之别自逺于禽獸也今夫人如齊以寧其父母而父母已終以寧其兄弟又義不得宗國猶爾而況如莒乎婦人從人者也夫死從子而莊公失子之道不能防閑其母禁亂之所由生故初㑹于禚次享于祝丘又次如齊師又次㑹于防于榖又次如齊又再如莒此以舊坊爲無所用而廢之者也是以至此極觀春秋所書之法則知防閑之道矣夏齊大災程氏學曰人火曰火天火曰災爲害者亦曰災謝湜曰火出爲害乃天降災于人故火焚宫廪皆曰災其爲災大故書大災秋七月冬齊人伐戎謝湜曰戎為中國患久矣合諸侯攘戎狄使犬羊順服而中國安强方伯之事也桓公務廣土地服諸侯以强齊國而已故滅譚滅遂以益封疆伐宋伐郳伐鄭伐魯以振威力至于荆入蔡戎侵魯未嘗以救難之師一過而問焉乃至十年之久然後起而伐戎將何以服四夷强中國哉春秋書齊人伐戎而桓公討戎之不力由此見矣二十有一年春王正月夏五月辛酉鄭伯突卒胡安國曰杜預稱莊公四年鄭伯遇于垂者乃子儀也按春秋突歸于鄭之後出奔蔡入于櫟皆以名書猶繫于爵雖簒而實君雖君而實簒不没其實也忽雖世子其出奔猶不得稱伯以其實不能君也況子儀雖間得立其爲君微矣豈敢輕去國都與諸侯㑹于外乎故知遇于垂者乃厲公也其始終書爵不没其實也亦可以為居正而不能保者之戒矣秋七月戊戌夫人姜氏薨冬十有二月葬鄭厲公二十有二年春王正月肆大眚程頥語録或問肆大眚如何曰大眚而肆之其失可知書言眚災肆赦者言眚則肆之眚是自作之罪故災則赦之災是過失之事故也凡赦何嘗及得善人諸葛亮在蜀十年不赦審此爾又曰舜典曰眚災肆赦臯陶曰宥過無大易曰君子以赦過宥罪呂刑曰五刑之疑有赦五罰之疑有赦斯先王肆赦之道即未聞大眚也肆大眚者元惡大憝俱肆之辭也上廢天討下虧國典縱釋有罪賊虐無辜莫斯爲甚天子尚不可況魯國諸侯而敢專肆哉後世惠姦宄賊良民其泥于此乎殊失春秋之㫖也謝湜曰以不明入罪謂之眚書曰眚災肆赦肆者寛之也赦者釋之也災自外至眚出于人爲故災則赦之眚則肆之而已謂之肆則罪有重輕取其情在可原者而肆之也故先王有肆眚無肆大眚大眚罪之大者書所謂元惡大憝是也元惡大憝皆在所肆則縱姦凶釋冦暴天討不行而善良柔弱之人由此受禍矣將以爲仁反以為害將以爲治反以爲亂豈先王肆眚之意哉春秋書肆大眚著其失也後世以惠姦宄為赦者其源葢出于此失春秋罪魯之意矣胡安國曰肆眚者蕩滌瑕垢之稱也舜典曰眚災肆赦易于解卦曰君子以赦過宥罪呂刑曰五刑之疑有赦五罰之疑有赦周官司刺掌赦宥之法一宥曰不識再宥曰過失三宥曰遺忘一赦曰幼弱再赦曰老耄三赦曰惷愚未聞肆大眚也大眚皆肆則廢天討虧國典縱有罪虐無辜惡人幸以免矣後世有姑息為政數行恩宥惠姦宄賊良民而其弊益滋葢源流于此故諸葛孔明曰治世有大徳不以小惠其為政于蜀軍旅數興而赦不妄下蜀人久而歌思猶周人之思召公也斯得春秋之㫖矣肆眚而曰大眚譏失刑也朱熹語録或問伊川程氏言災自外來眚自内作是否曰看來只一般微有不同耳災是偶然生于彼者眚是過誤致然書曰眚災肆赦春秋曰肆大眚皆以其過誤而赦之也癸丑葬我小君文姜謝湜曰文姜在王法雖當絶然于莊公有子母未絶之恩魯當以夫人之禮葬之故薨葬皆書夫人之義從君為得禮宋共公夫人曰宋共姬是也列國為謚皆私謚也觀文姜私謚稱文而魯國謚禮之失見矣胡安國曰文姜之行甚矣而用小君之禮其無譏乎以書夫人遜于齊不稱姜氏及書哀姜薨于夷齊人以歸攷之則議小君典禮當謹之于始而後可正也文姜已歸為國君母臣子致送終之禮雖欲貶之不可得也陳人殺其公子禦冦謝湜曰桓公葵丘之㑹四命曰無專殺大夫大夫有罪諸侯不得專殺古之制也自邦國擅威福作好惡大夫有罪無罪諸侯皆專殺之諸侯政壊則又有宗族國人起而專殺者矣凡殺稱國以明國之罪也稱國人以著其國亂也故陳殺禦冦書陳人以示國政大壊而下人專殺也書公子以示下人專殺而君之骨肉不得保其身也禦冦宣公子君之嗣也不書世子東宫未正故也國莫尊于君親莫隆于子君之嗣子而國人以凶逆殺焉陳國上下大亂可知矣胡安國曰公子之重視大夫殺而或稱君或稱國或稱人何也稱君者獨出于其君之意而大夫國人有不與焉如晉侯殺其世子申生之類是也稱國者國君夫人與聞其事而不請于天子如鄭殺其大夫申侯之類是也稱人者有二義其一國亂無正衆人擅殺而不出于其君則稱人如陳人殺其公子禦冦之類是也其一弑君之賊人人之所得討背叛之臣國人之所同惡則稱人如衛人殺州吁鄭人殺良霄之類是也攷于傳之所載以觀經之所斷則罪之輕重自見矣呂祖謙曰陳人陳宣公也陳公子完是厲公躍子史記謂厲公佗之子非也當以釋例爲正夏五月秋七月丙申及齊髙傒盟于防程頥曰髙傒上卿魯無使微者與盟之理葢諱公盟始與仇爲婚惡之大也謝湜曰盟于防公欲結昏于齊故也親盟大夫以求婚恥之大也大喪未畢而謀婚惡之大也故防之盟諱不書公其始諱不書公而公之恥惡由此見矣至納幣逆女則直書其實以迹不可隱故也胡安國曰微者名姓不登于史冊髙傒之貴大夫也曷爲就吾之微者盟葢公也其不言公諱與髙傒盟也來議婚結娶仇人女大惡也娶者其為吉下主乎已上主乎宗廟以爲有人之心者宜于此焉變矣公親如齊納幣則不待貶也冬公如齊納幣程頥曰齊疑婚議故公自行納幣後二年方逆齊難之也程氏學曰冬公如齊納幣二十四年夏公如齊逆女秋公至自齊八月丁丑夫人姜氏入者荘公于齊義不共戴天迺娶仇讐之女以奉宗廟母喪未終復忘哀而圖婚親如齊納幣如齊逆女不孝之惡不待貶絶而自見矣夫人姜氏不書至而云入者自外而入不順之辭也言魯為不可受姜氏為不可入也二十有三年春公至自齊謝湜曰禮有親迎無親納幣廢大䘮以圖婚姻娶讎女以事宗廟躬幣禮以黷儀法其惡不待貶絶而見矣荘公即位二十四年而後娶宫闈不正可知也納幣日事也納幣厯時然後返則公之適齊非獨納幣而已祭叔來聘程氏學曰祭叔來聘不言使者原其來意非天子之命爾謝湜曰祭叔天子内臣祭公也王臣外交非禮也祭公比外諸侯以聘禮至魯故春秋奪爵書字貶之也朝聘皆私交也在祭伯則奪其朝在祭叔則奪其爵者葢奪其朝則知其不當朝奪其爵者知其在所黜胡安國曰榖梁子曰其不言使天子之内臣也不正其私交故不與使也祭伯來朝而不言朝祭叔來聘而不言使尹氏王子虎劉卷來訃而不書其爵秩皆所以正人臣之義也人君而明此不容下比之臣人臣而明此不為交私之計黨錮之禍息矣夏公如齊觀社程氏學曰莊公越境觀讎國之社不待譏而惡自見也程頥曰婚議尚疑故公以觀社爲名再往請議後三年方逆葢齊難之胡安國曰荘公將如齊觀社曹劌諫曰齊棄太公之法觀民于社君為是舉而往觀之非故業也天子祀上帝諸侯㑹之受命焉諸侯祀先公卿大夫佐之受事焉不聞諸侯之相㑹祀也君舉必書書而不法後嗣何觀矣呂祖謙曰觀兵是也公至自齊謝湜曰為社稷主而越境觀社于齊非法也觀社日事也觀社厯時然後返則公之適齊非獨觀社而已荆人來聘謝湜曰聘問之禮通于中國故荆進稱人以人道齒之也胡安國曰荆自荘公十年始見于經十四年入蔡十六年伐鄭皆以州舉者惡其猾夏不恭故狄之也至是來聘遂稱人者嘉其慕義自通故進之也朝聘者中國諸侯之事雖蠻夷而能修中國諸侯之事則不念其猾夏不恭而遂進焉見聖人之心樂與人為善矣後世之君能以聖人之心爲心則與天地相似凡變于夷者叛則懲其不恪而威之以刑來則嘉其慕義而接之以禮邇人安逺者服矣春秋謹華夷之辨而荆呉徐越諸夏之變于夷者故書法如此公及齊侯遇于榖蕭叔朝公謝湜曰莊公志在于齊故九月之問三渉齊國既如齊納幣又如齊觀社又與齊侯遇于榖又曰蕭叔中國附庸故書字朝以修禮莊公出游境上而受小國之朝非法之甚也胡安國曰榖齊地蕭叔附庸之君也爲禮必當其物與其所而後可以言禮大夫宗婦覿而用幣則非其物也蕭叔朝公在齊之榖則非其所也嘉禮不野合而朝公于外是委之于野矣故禮非其所君子有不受必反之于正此亦春秋撥亂之意也秋丹桓宫楹程氏學曰宗廟之飾國有彝典而妄肆奢麗加于禰宫亂王制黷先君不恭莫大矣故書曰丹桓宫楹直書其事具文見意也謝湜曰廟飾葢有常制書丹楹著其奢麗也侈宗廟以瀆先君僣宫飾以干王法事親不遵禮法由此見矣冬十有一月曺伯射姑卒十有二月甲寅公㑹齊侯盟于扈程頥曰遇榖盟扈為要結姻好謝湜曰孫氏謂謀納姜氏婚姻聞以徳選矣未聞以盟結之也胡安國曰程氏曰遇于榖盟于扈皆為要結姻好也𫝊稱男子二十而冠冠而列丈夫三十而不娶則非禮也然天子諸侯十五而冠者以娶必先冠而國不可久無儲貳欲人君早有繼體故因以爲節也鰥老而無妻之稱舜方三十未娶而師錫帝堯已曰有鰥在下矣妻帝之二女則不告于父母以為告則不得娶而廢人之大倫堯亦不告而妻焉其欲及時而無過如此也今莊公生于桓之六年至是三十有六載矣以世嫡之正諸侯之貴尚無内主同任社稷之事何也葢為文姜所制使必娶于母家而齊女待年未及故荘公越禮不顧如此其急齊人有疑如此其緩而遇于榖盟于扈要結之也娶夫人奉祭祀為宗廟之主而母言是聽不以大義裁之至于失時不孝甚矣春秋詳書于䇿為後戒也二十有四年春王三月刻桓宫桷謝湜曰既丹宫楹又刻宫桷其華至矣人君不知儉約則巧麗不法有如此者故明君常謹微胡安國曰公將逆姜氏丹桓宫之楹也其桷為盛飾以誇示之此非特有童心而已御孫諫曰儉徳之共也侈惡之大也先君有共徳而君納諸大惡無乃不可乎自常情觀丹楹刻桷疑若小失而春秋詳書于䇿御孫以為大惡何也桓公見殺于齊不能復而盛飾其宫誇示仇人之女乃有亂心廢人倫悖天道而不知正者也御孫知爲大惡而不可盡言春秋謹禮于微正後世人主之心術者也故詳書于䇿斥言桓宫以見惡荘為後世鑒也葬曺荘公夏公如齊逆女秋公至自齊謝湜曰逆讎女以爲夫人非孝也以親迎出而其至不與夫人同歸非正也胡安國曰榖梁子曰親迎常事也不志此其志何也不正其親迎于齊也或曰常事不志詳事不常也親迎可以常乎則其説誤矣所謂常者其事非一有月事之常則視朔是也有時事之常則婚姻納幣逆女至歸之類是也凡此類合禮之常則不志矣其志則于禮不合將以爲戒者也若夫崩薨卒葬即位之類不以禮之合否而皆書此人道始終之大變也其于親迎異矣八月丁丑夫人姜氏入程頥語録或問丁丑夫人姜氏入何故獨書入曰此娶仇女故書入言宗廟不受也謝湜曰哀姜仇人之女也以見祖考祖考弗安以奉宗廟宗廟弗享然則哀姜非魯之婦也荘公外忘不共戴天之讎内㤀疾首痛心之戚備禮取之以爲夫人悖理逆親甚矣故哀姜之至也春秋外而書入以明魯之不當受也胡安國曰何以不致不可見乎宗廟也姜氏齊襄公之女入者不順之辭以宗廟為弗受也婚義以正始爲先而公不與夫人皆至姜氏不從公而入已失夫婦之正弑閔孫邾之亂兆矣莊公不勝其母越禮踰時俟仇人之女薦舍于宗廟以成好合卒使宗嗣不立弑逆相仍㡬至亡國故春秋詳書其事以著荘公不孝之罪戊寅大夫宗婦覿用幣餘見綱領中卷并下卷謝湜曰古者大夫有見小君之禮修臣職也以卑朝尊曰見相見曰覿大夫于夫人有見無覿有執贄無用幣諸侯庭實有幣獻方物也贄則與幣異矣男子以玉帛禽鳥為贄非帛也以象徳也以示執此徳不敢廢也女子以棗栗脯脩為贄非幣也以致敬也以示修此職不敢廢也大夫宗婦皆覿以幣則是相交以財相賂以利也外内相交以財相賂以利而閨門之禮亂矣大夫宗婦覿用幣非禮也胡安國曰禮夫人至大夫郊迎明日執贄以見宗婦大夫之妻也公事曰見私事曰覿見夫人禮也曷為私言之夫人不可見乎宗廟則不可以臨諸臣故以私言之也覿用幣何以書男贄大者玉帛小者禽鳥以章物也女贄不過榛栗棗脩以告䖍也今男女同贄是無别也公子牙慶父之亂兆矣春秋詳書正始之道矣呂祖謙曰公使宗婦覿用幣何休公羊注云禮夫人至大夫皆郊迎明日大夫宗婦皆見故著其明日也大夫妻言宗婦者大夫爲宗子者也大水冬戎侵曺曺羈出奔陳赤歸于曺程氏學曰冬戎侵曺曺羈出奔陳赤歸于曺戎侵曺故羈奔而赤歸制在我故也與桓十一年宋人執鄭祭仲鄭忽出奔衛突歸于鄭略同曺伯射姑卒已踰年而羈猶名者由不能自定其佐故為戎所逐也謝湜曰羈曺世子赤曺公子戎之侵曺也羈微弱不能保位故羈棄國出奔羈之出也赤為戎所納而人心從之故赤歸曺春秋首書戎侵曺而繼以羈出赤歸者以明曺國廢立之命皆制于戎也荘公之卒也羈以世子嗣位已踰年矣稱名不稱爵以其絶于國人也赤以公子入國非正也非正而稱歸以罪羈失人心而國人歸赤也其于羈也稱國以明正去爵以示絶其于赤也去國以明非正稱歸以示得國而羈之喪失君道赤之進不由正于此見矣曺國之命制于戎鄭國之命制于權臣其患一也故權臣暴横而鄭國擅命廢立出于夷狄羈出赤歸是也齊桓倡大義以合諸侯主盟約以令邦國討暴救亂乃其職也今也曺羈危弱而不能定諸戎作難而不能正然則桓公用兵特以强齊而已列國水火之難非所恤也胡安國曰杜預謂羈葢曺世子也曺伯已葬猶不稱爵者以微弱不能君故爲戎所逐爾赤者曺之庶公子歸易詞也宋人執鄭祭仲而忽出突歸權在宋也戎侵曺而羈出赤歸制在戎也使鄭忽曺羈明而能斷雖有宋戎之衆突赤之孽何縁而起以國儲君副不能自定其位于誰責而可故雖以國氏皆不書爵爲居正者之戒郭公謝湜曰郭公葢郭亾文誤為公昔齊桓謂郭為亡國以其好善而不能行惡惡而不能去也然則郭有取亡之道明矣故書郭亡胡安國曰此郭公也義不可曉而先儒或以為郭亡者于𫝊有之齊桓公之郭問父老曰郭何故兦曰以其善善而惡惡也公曰若子之言乃賢君也何至于亡父老曰郭君善善不能用惡惡不能去所以亡也考其時與事謂之郭亡理或然也夫善善而不能用則無貴于知其善惡惡而不能去則無貴于知其惡未之或知者猶有所覬也夫既或知之矣不能行其所知君子所以髙舉逺引小人所以肆行而無忌憚也然則非有能亡郭者郭自亡爾二十有五年春陳侯使女叔來聘謝湜曰女叔命大夫故書字十九年齊陳伐我西鄙今齊與魯親故陳女叔亦來修聘呂祖謙曰陳女叔來聘結陳好也十九年陳伐魯西鄙乃至此始結好須考前後斷絶好處如無只是未曽往來夏五月癸丑衛侯朔卒謝湜曰朔衛惠公魯不㑹葬故不書葬六月辛未朔曰有食之鼓用牲于社謝湜曰聲陽也日食伐鼔所以助陽而攻隂也社土神隂氣之主也日食隂慝之氣掩之也非社之隂氣爲孽也魯人之救變也以社爲隂主于是鼔以攻隂用牲于社以祈神失之逺矣胡安國曰按禮諸侯旅見天子入門不得終禮者四而日食與焉古者固以是爲大變人君所當恐懼修省以答天意而不敢忽也故夏書曰乃季秋月朔辰弗集于房鼔奏鼔嗇夫馳庶人走周官鼓人救日月則詔王鼓太僕凡軍旅田旅賛王鼔救日月亦如之諸侯用幣于社伐鼓于朝退而自責皆恐懼修省以答天意而不敢忽也然則鼓用牲于社何以書譏不鼓于朝而鼓于社又用牲則非禮矣伯姬歸于杞胡安國曰其不言逆何也逆者非卿其姓名不登于史䇿則書歸以志禮之失也大夫來逆名姓已登于史策足以志其失矣猶書歸者以别于大夫之自逆者也猶書歸者紀伯姬是也自逆者莒慶齊髙固是也秋大水鼓用牲于社于門謝湜曰社主土門主出入大水之爲患也魯人欲以聲駭變故鼓欲以土勝水故用牲于社欲以門禦水故用牲于門凡天地之變先王責諸已求諸人而已猶以為未也又以隂陽象類致力乎祈禳祭享之間所以盡救災之道也方是時莊公君道不修國事不治久矣魯人不知所以消變而一切求之祈禳之間其祈禳一切以意而不以禮失救災之道逺矣大水漂蕩可畏而欲以鼓駭之不亦愚乎大水出為國害而欲以社勝之以門禦之不亦惑乎冬公子友如陳謝湜曰友莊公弟以公子為卿故書公子如陳報陳之聘也春秋集義卷十五

body:
  text: 春秋集義卷十七宋李明復撰閔公程頥曰閔公名開莊公子惠王十六年即位閔謚也在國逢難曰閔元年春王正月謝湜曰荘公薨子般遇難其位不得受之先君故不書即位胡安國曰不書即位内無所承上無請命也荘公薨子般卒慶父夫人利閔公之幼而得立焉是内不承國于先君也按周制王哭諸侯則大宗伯爲上相未有諸侯之薨而不告于王者也職喪掌諸侯之喪以國之喪禮涖其禁令序其事凡國有司以王命有事焉則詔賛主人未有諸侯之子主䘮而王不遣使是上不請命于天子也内無所承上不請命故不書即位正人道之大倫也齊人救邢謝湜曰邢小國齊救邢大國之義也胡安國曰凡書救者未有不善之也救在京師則罪列國子突救衛是也救在夷狄則罪諸侯狄救齊呉救陳是也救在逺國則罪四鄰晉陽處父帥師伐楚以救江是也救而不速救者則書所次以罪其慢叔孫豹救晉次于雍榆是也救而不敢救者則書所至以罪其怯齊侯伐我北鄙圍成公救成至遇是也兵者春秋之所甚重衛靈公問陳孔子對曰爼豆之事則嘗聞之矣軍旅之事未之學也獨至于救兵而書法若此聖人之情見矣其稱人將卑師少也夏六月辛酉葬我君莊公謝湜曰國亂故十一月乃葬秋八月公及齊侯盟于落姑謝湜曰左氏謂盟復季友葢閔公之立頼季友維持故公與齊盟而復之呂祖謙曰是時閔公方七八歳安能自㑹如此葢縁國人上下皆惡慶父而賢季友故欲復之如公與齊盟亦國人左右扶持他去雖當時國亂猶能惡慶父而復季友此亦見魯秉周禮處季子來歸程氏雜説曰閔元年秋季子來歸荘公既薨子般被殺魯國方危而慶父未討公子友賢而在齊國人思得以安社稷故公為落姑之盟以請復而來歸書曰季子而不名異其文以嘉之也謝湜曰公子將亂魯而季友以命誅之世子之位將傾而季友以力扶之季友忠于社稷可知也子般遇禍閔公冲幼逆賊未討而内難未寧方是時得季友則社稷可安不得季友則社稷可危觀落姑之盟思得季友以寧魯國則國人倚頼季友之心可見矣故季友之反國也書曰季子嘉之也書曰來歸美之也胡安國曰按左氏盟于落姑請復季友也其曰季子賢之也其曰來歸喜之也自外至者為歸是嘗出奔矣何以不書荘公薨子般弑慶父主兵勢傾公室季子力不能支避難而出奔恥也魯國方危内賊未討國人思得季子以安社稷而落姑之盟以請于齊則是賢也春秋欲没其恥故不書奔欲旌其賢故特稱季子聖人之情見矣隱惡而揚善舜也樂道人之善惡稱人之惡孔子也為尊者諱為親者諱爲賢者諱春秋也明此可以畜納汙之徳樂與人爲善矣其不稱公子見季友自以賢徳為國人所與不縁宗親之故也堯敦九族而急親賢退嚚訟周厚本支而庸旦仲黜蔡鮮義皆在此而親親之殺尊賢之等著矣此義行則内無貴戚任事之私外無棄親用羈之失而國不治者未之有也此春秋待來世之意又曰春秋不與公族大夫專政用事而以親賢為急季子來歸不稱公子者言其自有賢徳為國人所喜不獨縁貴戚之卿此有國家者之所急也朱熹語録或問季友之爲人曰此人亦多可疑諸家多言季友來歸為聖人美之之辭㩀熹看此一句正是著季氏所以專國為禍之基季友之罪與慶父不争多但歸後能平難魯人歸之故如此説況世執魯之大權人自是畏之史官書得如此好孔子因而存此葢以見其執權之漸耳冬齊仲孫來程頥曰冬齊仲孫來左氏紀其事曰齊仲孫湫來省難書曰仲孫嘉之也仲孫歸曰不去慶父魯難未巳公曰若之何而去之對曰難不已將自斃君其待之公曰魯可取乎對曰不可猶秉周禮周禮所以本也君其務寧魯難以親之考之經意為合不曰齊侯使而直曰仲孫來者齊侯使來觀魯而使于我也曰仲孫其字也時荘公新薨嗣子既弑閔公方立慶父猶在國之危也甚矣向使齊取魯易于反掌而仲孫能俾齊侯務寧魯難有全國之功故特書其字以襃之謝湜曰仲孫齊大夫湫其名仲孫其字也齊侯使仲孫來省難有窺魯之心焉仲孫告齊侯以去慶父親有禮因重固有恤魯之心焉方是時閔公幼弱慶父凶逆使桓公揺足于齊則魯國千乗之封不待兵革相交而束手入齊矣仲孫不乗危以幸功不襲災以生變乃能使齊侯寧魯難而親之其安邦全國之功大矣故仲孫之至魯也書仲孫而不名嘉之也直書來顯仲孫惡齊侯也仲孫之出非齊侯使來恤我也齊侯使來聘我也春秋上不書使而仲孫安魯之功由此見矣下不書聘而齊侯窺魯之心由此見矣胡安國曰仲孫齊大夫也其不稱使而曰來者略其君臣之常詞以見桓公使臣不以禮仲孫事君不以忠也按左氏齊侯憂魯使仲孫來省難何以言使臣不以禮也鄰有弑逆則當聲罪戒嚴修方伯職以奉天討而更使計謀之士窺覘虚實有乗亂取國之心則使臣非以禮矣仲孫歸曰不去慶父魯難未巳君其務寧魯難而親之何以言事君不以忠也田恒弑簡公孔子沐浴而朝告于哀公請討焉豈曰齊人方强姑少待之也不勸其君急于討賊而俟其自斃則事君非以忠矣使慶父稔惡閔公再弑則桓公與仲孫始謀不臧之所致爾直書曰齊仲孫來交譏之也胡宏曰二帝三王施仁政定天下盡道而已非有利天下之心也五覇仗義結信摟諸侯奬王室謀以自强大非有正天下之心也五霸桓公為盛忿不懲而滅譚慾不窒而窺魯其心源可考矣雖力行信義豈其如日之晝如月之夜不可離乎使其無死安知其不志驕氣溢而後有失信棄義之事哉惟其執之不敢中道廢是以得成霸者之名爾此孟子之所謂假也今有人假人之器以為用方其用也謂之非己用可乎為己用矣謂之文具而實不從可乎用之未歸以至于没身孰曰非己有乎五覇假信義而未歸則既有之矣其得罪于三王何也以其有爲而為之也此王覇所以分乎二年春王正月齊人遷陽謝湜曰陽微國齊偪而遷之故曰遷陽上尊王室下撫列國天下可合而一諸侯可臣而役也桓公務殖土地為一國私計而已或降鄣或遷陽皆迫而并之非心服也故諸侯或叛或從夷狄或順或逆而不純乎先王之業也夏五月乙酉吉禘于莊公程頥曰天子曰禘諸侯曰祫其禮皆是合祭之義禘從帝禘其祖之所自出之帝以所出之帝為東向之尊其餘合食于其前是為禘也諸侯無所出之帝只是于太祖廟羣廟之主合食是為祫魯所以有禘者只為得用天子禮樂故于春秋之中不見言祫只言禘言大事者即是祫言大事于太廟躋僖公即是合食閔僖二公之義若時祭當言有事吉禘于荘公只是禘祭言吉者以其行之太早也四時之祭有禘之名是禮文交錯張載曰禮不王不禘則知諸侯歳闕一祭為不禘明矣至周則以祠為春以禴為夏宗廟歳六享則二享四祭為六矣諸侯不禘其四享歟故夏商諸侯夏時一祫王制謂礿則不禘禘則不嘗假其名以見時祀之數爾作記者不知文之害意過矣禘于夏周為春夏嘗于夏周為秋冬作記者交舉二氣對互而言耳享嘗云者享為追享朝享禘亦其一耳嘗以配之亦對舉秋冬而言也夏商以禘為時祭如追賞之必在夏也然則夏商天子歳乃五享禘列四祭并祫而五也周改禘為禴則天子享六諸侯不禘又歳闕一祭則亦四而已矣王制所謂天子礿犆祫禘祫嘗祫烝既以禘為時祭則祫可同時而舉所以物薄而犆從舊諸侯礿犆如天子禘一犆一祫言于夏禘之時止于一祭特一祫而已然則不王不禘又著見于此矣下又云嘗祫烝祫則嘗烝且祫無疑矣若周制亦甞闕一時之祭則當云諸侯祠則不禴禴則不甞云又曰禮不王不禘禘字從帝則是推本必至于生物之帝也在古則但推之于所出之帝若言報本則庶人得祭天故聖人制法以禘獨歸之王者不如是人人皆可以祭天祫者合祭羣廟之主禘則既祭及于毁廟雖百世皆祭又禘其所出之祖最為大祭謝湜曰魯禘之失者三諸侯而行禘禮其失一也禘不于太祖而于莊公其失二也二十二月而吉祭其失三也其功大者其禮備其徳盛者其澤逺王者兼天下之奉備萬物之養故親親之仁尊尊之義上達于始祖故禮不王不禘諸侯而行禘禮僣祭之大者也新主入廟則親盡之主入祧新主驟而入廟居䖏弗安親盡之主驟而出廟子孫之心悽惻故先王因設大禘㑹羣主相見于廟而叙昭穆以享之享禮既終新主隨親主入廟親盡之主隨毁廟之主入祧如是而後死生安焉故䘮畢而禘近以奉安新主逺以奉遷親盡之主者也故禘必于太祖之廟禘不于太祖而于荘公失禮之大者也生事畢而死事始䘮事畢而鬼事始哀戚未終而吉事舉焉乃人子無三年之愛于其親也故孝子三年哀慕哭泣上食上飲一以生禮事之二十二月而吉祭忘哀之大者也荘公未可以稱宫廟故不書宫胡安國曰天子曰禘諸侯曰祫其禮皆合祭也禘者禘其所自出之帝為東向之尊其餘皆合食于前此之謂禘諸侯無所出之帝則止于太祖之廟合羣廟之主以食此之謂祫天子禘諸侯祫大夫享庶人薦上下之殺也魯諸侯爾何以有禘成王追念周公有大勲勞于天下賜魯公以天子禮樂使用諸太廟以上祀周公魯于是乎有禘祭春秋之中所以言禘不言祫也然則可乎孔子曰魯之郊禘非禮也周公其衰矣禘言吉者䘮未三年行之太早也于荘公者方祀于寢非宫廟也一舉而三失禮焉春秋之所謹也四時之祭有禘之名葢禮文交錯之失朱熹曰禘天子宗廟之大祭追祭太祖之所自出于太廟而以太祖配之也呂祖謙曰吉禘于荘公禘有兩般有常禘有三年喪畢而後禘㐮十五年晉悼公卒十六年晉人荅魯穆叔云以寡君之未禘祀知是三年䘮畢乃為禘也喪畢而為禘祭如致新死之主于廟也僖八年禘于太廟宣八年有事于太廟皆是常祭秋八月辛丑公薨謝湜曰遇難故不地賊不討故不書葬胡安國按左氏初公𫝊奪卜齮田公不禁慶父使卜齮賊公于武闈魯史舊文必以實書其曰公薨不地者仲尼親筆也觀于刪詩在諸國則變風皆取在魯則獨編史克之頌或問吾黨有直躬者其父攘羊而子證之則曰吾黨之直者異于是父爲子隱子為父隱直在其中矣後世縁此制為五服相容隱之條以綴骨肉之恩春秋有諱義葢如此禮記稱魯之君臣未嘗相弑葢習于經文而不知聖人書薨不地之㫖故云爾然則諱而不言弑也何以傳信于將來曰書薨以示臣子之情不地以存見弑之實何為無以傳信也凡君終必書其所獨至于是弑則没而無所其情厚矣其事亦白矣非聖人能修之乎後世記言之事欲諱國惡則必失其實直書無隱又非臣子所當施之于君父也而春秋之法不傳矣呂祖謙曰共仲使卜齮賊公于武闈閔公見弑雖出于不測亦是季友失照管處九月夫人姜氏孫于邾謝湜曰閔公之死哀姜與知故哀姜避難出奔書孫諱之也哀姜閔公之母也哀姜雖有與知殺子之罪而無危害社稷之心其罪固大矣而義未絶于魯也故其出奔也春秋存其姜氏而未加絶也文姜哀姜王法皆在所治也然文姜以妻得罪于君者也哀姜以母得罪于君者也哀姜之罪與文姜異矣故春秋立法不同男女人倫之本也男女不正則亂生故文姜至不以禮而其終㐮公之難發于齊哀姜入不以禮而其終慶父之難發于魯春秋志其亂禮于前而著其產禍于後所以為天下戒也胡安國曰夫人稱孫聞乎故也不去姓氏降文姜也莊公忘親釋怨無志于復讎春秋深加貶絶一書再書屢書而不諱者以謂三綱人道所由立也忘父子之恩絶君臣之義國人習而不察將以是為常事則亦不知有君之尊有父之親矣莊公行之而不疑大臣順之而不諫百姓安之而無憤疾之心也則人欲必肆天理必滅故叔牙之弑械成于前慶父之無君繼動于後圉人犖卜齮之刃交發于黨氏武闈之間哀姜以國君母與聞乎故而不忌也當是時魯君再弑㡬至亡國其應不亦􅉃乎春秋以復讎為重而書法如此所謂治之于未亂保之于未危不可不察也公子慶父出奔莒謝湜曰慶父通國母弑二君季友力未能討故慶父出奔公羊謂緩追逸賊親親之道誤矣慶父國之大逆慶父雖縊不以國法正其罪而絶之與賊不討同故慶父死不書刺胡安國曰公子出奔譏失賊也閔公立而季子歸何以見弑慶父主兵日久其權未可遽奪也季子執政日淺其謀未得盡行也設以聖人處之期月而已可也季子賢人而當此能必克乎及閔公再弑慶父罪惡貫盈而疾之者愈衆季子忠誠顯著而附之者益多外固强齊之援内協國人之情正邪消長之勢判矣然後夫人不敢安其位慶父不得肆其姦此明為國者不知圖難于其易為大于其細雖有智者亦不能善其後矣世儒或言用魯之衆因齊之力以戮慶父其勢甚易而季子不能故書夫人孫邾慶父奔莒所以深惡其緩不討賊則非也以絳侯勃之果陳平之無悞將相交懽而内有朱虚外連齊楚以制諸呂庸人宜易于反手然太尉已入北軍士皆左袒猶恐不勝未敢誦言誅之也況于慶父巨姦七百里之侯國革車千乗而三十年執其兵柄其植根深矣其耳目廣矣其用物宏矣而以為戮之其勢甚易此未察乎難易遲速之㡬者也經書莊公忘親無復讎之志使百官則而象之亦不知有君父也而又使慶父主兵失馭臣之道是以至此極故書孫邾奔莒為後世之永鑒也呂祖謙曰季友既出魯似無人他何故奔只縁共仲罪大惡極國人不容不得不出觀此亦可見魯秉周禮處冬齊髙子來盟程頥曰髙子來省難然後盟盟未前定也稱髙子善其能䘏魯程氏學曰齊髙子來盟不書名襃之也不稱使者齊侯使來視魯而未定盟髙子至魯而後結盟爾有安危存亡之功故特書子子者男子之美稱所以善之也春秋章善癉惡一字為襃貶非聖人孰能修之此與仲孫來事義略同謝湜曰禍莫大于簒弑危莫大于無君魯國兩遭弑逆其難可謂大矣齊桓職為盟主國為鄰國輔新主以固民心除凶類以消國孽侯伯之職也為齊桓者無恤魯之心也特使髙傒出視魯難而已髙傒至魯然後結盟以定僖公由是大難賴之以息魯國頼之以安其存亡繼絶之功大矣故髙傒之盟于我也書曰髙子嘉之也書來盟不書使以明存魯之功出于髙子也子男子之美稱季友髙傒皆曰子以襃功也般卒之後慶父如齊閔薨之後慶父奔莒齊桓無救魯之心于此見矣仲孫之來髙子之盟皆不言使齊桓無安魯之心于此見矣胡安國曰髙子齊大夫也子者男子之美稱其稱子賢之也何賢乎子荘公薨般卒閔公弑慶父夫人亂乎内魯于是曠年無君齊桓公使將南陽之甲至魯而謀其國其命髙子必曰魯可取則兼其國以廣地魯可存則平其亂以善鄰非有安危繼絶一定不可易之計也髙子至則平魯難定僖公魯人頼焉以為美談至于久而不絶曰猶望髙子也聖人美其明人臣之義得奉使之宜特稱高子以著其善其不曰齊侯使之者權在髙子也十有二月狄入衛謝湜曰荆之伐鄭也齊人救鄭而已未有討荆之伐也狄之伐邢也齊人救邢而已未有討狄之伐也故狄復入衛則其為患非特伐邢而已載馳傷衛懿公為狄人所滅定之方中美衛文公徙居楚丘然則狄之入衛也國人分散衛已滅矣自文公徙居楚丘建城市營宫室而衛國復興則狄未能滅衛而有之故入衛不書滅胡安國曰衛康叔之後葢北州大國狄何以能入乎臣昔嘗謂河南劉奕曰史氏記煩而志寡如班固書載諸王滛亂等事盡削之可也奕曰必若此言仲尼刪詩如墻有茨鶉之奔奔桑中諸篇何以録于國風而不削乎臣不能答後以問延平楊時時曰此載衛為戎狄所滅之因也故在定之方中之前因以是説攷于厯代凡滛亂者未有不至于殺身敗家而亡其國者也然後知古詩垂戒之大而近世有獻議乞于經筵不以國風進讀者殊失聖經之㫖矣鄭棄其師程氏雜説曰鄭詩清人刺文公也髙克好利而不顧其君文公惡而欲逺之不能使髙克將兵而禦狄于境陳其師旅翺翔河上久而不召衆散而歸高克奔陳公子素惡高克進之不以禮文公退之不以道危國亡師之本故作是詩也顧此詩序則鄭棄其師灼然著矣楊時曰閔二年書鄭棄其師觀清人之詩序可見矣文公惡髙克使之將兵禦狄久而不召遂使衆散而歸豈非棄其師乎葢惡其人而使之將兵外之兵何罪故止罪鄭謝湜曰鄭師衆散而歸非師潰也鄭棄之也將庸而委之師師老而無還棄師之道也國以師為本師存則國安師亡則國危師而棄之是棄國也其為患豈特一髙克哉書曰鄭棄以不智罪鄭而危之也胡安國曰按鄭詩清人刺文公也髙克好利而不顧其君文公惡之而不能逺使髙克將兵禦敵于境陳其師旅翺翔河上久而不召衆散而歸高克奔陳公子素惡高克進之不以禮文公退之不以道危國亡師之本故作是詩觀此則鄭棄其師可知矣或曰髙克進不以禮曷不書其出奔以貶克為人臣之戒而獨咎鄭伯何也曰人君擅一國之名寵生殺予奪惟我所制爾故克不臣之罪已著按而誅之可也情狀未明黜而逺之可也愛惜其才以禮馭之可也烏有假以兵權委諸境上坐視其什伍離散而莫之恤乎然則棄師者鄭伯乃以國稱何也二三執政股肱心膂休戚之所同也不能進謀于君協志同力黜逐小人而事至此是謂危而不持顛而不扶則將焉用彼相矣晉出帝時延廣專權諸藩擅命及桑維翰為相出延廣于外一制書所敕者十有五鎮無敢不從者以五季之末維翰能之而鄭國二三執政畏一髙克不能退之以道何政之為書曰鄭棄其師君臣同責也呂祖謙曰鄭人使髙克帥師次于河上他何故次于河上葢當時狄既滅衛聲勢甚大却節次須為防備衛在河此鄭在河南其相去亦甚近春秋集義卷十七

body:
  text: 春秋集義卷三十五宋李明復撰成公程頤曰成公名黑肱宣公子定王十七年即位成諡也安民立政曰成元年春王正月公即位二月辛酉𦵏我君宣公無冰謝湜曰寒氣嚴肅則水凝為冰月建丑而無冰冬傷温也天地之氣應則萬物和天地之氣不應則萬物病故春秋書無冰以明燮理失其道胡安國曰寒極而無冰者恒燠也按洪範傳曰豫恒燠若此政事舒緩紀綱縱弛之象成公幼弱政在三家公室不張其象已見故當固陰沍寒而常燠應之古者日在北陸而藏冰獻羔而啟朝之禄位賔食喪祭冰皆與焉此亦爕調愆伏之一事也今既寒而燠遂廢凌人之職然䇿書所載皆經邦大訓人有微而不登其姓名事有小而不記其本末雨雹冰雪何以悉書天人一理也萬物一氣也觀於隂陽寒暑之變以察其消息盈虚此制治于未亂謹於微之意也每謹於微然後王事備矣三月作丘甲謝湜曰作與建之名甲甸賦也成公初易舊制使丘出甲故書作財用不足故初税畝軍旅不足故作丘甲書初書作皆以著其所起也古者度地以養民度民以養兵一甸之夫凡五百七十六所出長轂一馬四牛十二甲士三步卒七十二而已方是時扞難討暴無不足於用者故民常裕而力有餘兵常足而用不匱後世征討無常干戈四出由是軍旅不足而丘甲所由興也丘甲之法行而民困於兵矣故春秋養兵以甸法為正胡安國曰作丘甲益兵也古者九夫為井四井為邑四邑為丘四丘為甸甸之地方八里旁加一里為成所取於民者出長轂一乗此司馬法一賦之成也為齊難作丘甲益兵備敵重困農民非為國之道其曰作者不宜作也唐太宗問李靖楚廣與周制如何靖曰周制一乗步卒七十二人甲士三人以二十五人為一甲凡三甲共七十五人然則一丘所出十有八人積四丘而具一乗耳今作丘甲者即丘出一甲是一甸之中共百人為兵矣則未知其所作者三甸而增一乗乎每乗而增一甲乎魯至昭公時常蒐于紅革車千乗則計甸而増乗未可知也楚人二廣之法二乗至用百有五十人則魯每乗而增一甲亦未可知也賦雖不同其實皆為益兵其數皆增三之一耳先儒或言甲非人人之所能為又以為丘出甸賦加四倍者誤矣朱熹語録或問都鄙四丘為甸六十四井出車一乗甲士三人步卒七十二人不審鄉遂車賦如何曰鄉遂亦有車但不可見其制六鄉一家出一人排門是兵都鄙七家而出一兵在内者役重而賦輕在外者役輕而賦重六軍只是六鄉之衆六遂不與六遂亦有軍但不可見其數侯國三軍亦只是三郊之衆大國三郊次國二郊小國一郊或説車一乗不止甲士三人步卒七十二人此是輕車用馬馳者更有二十五人將重車在後用牛載糗糧戈甲衣裝見七書如魯頌公徒三萬已具其説或又問侯國亦倣鄉遂都鄙之制否曰鄭氏説侯國用都鄙法然觀魯人三郊三遂及孟子請野九一而助國中什一使自賦則當亦是鄉遂吕祖謙曰丘甲是丘出一甸之賦蓋一甸六十四井出長轂一乗馬四疋牛十二頭甲士三人步卒七十二人計五百十二家七人以上可出一人一丘止十六井計一百二十八人乃三人出一人蓋四倍於常矣司馬法二十五人為一甲一車七十五人正是三甲胡春秋論此已詳但司馬法大率與周禮不同蓋當時更革非一次所以不同也如駟介百乗徒兵千便是不同夏臧孫許及晉侯盟于赤􅁄謝湜曰齊為魯難故胡安國曰初宣公謀以晉人去三桓歸父為是見逐而奔齊矣今季孫當國恨齊人之立宣公納歸父又懼晉侯之或見討也故往結此盟赤􅁄晉地也其稱及魯所欲也盟非春秋所貴而惡屢盟者非惟長亂亦國用民力所難給也成公即位之初方經大故未有施舎已責逮鰥寡赦乏困之事也為齊難既作丘甲矣聞將出楚師又逺與晉尋盟豈固本保邦之道乎書及晉侯盟于赤􅁄非特備齊懼晉蓋三桓懐忿懟君父之心將有事於齊而汲汲欲之者罪可見矣秋王師敗績于茅戎程氏學曰王師敗績于茅戎不言戰者王者至尊天下無敵書曰王師敗績于茅戎自敗也王者不能以義征四方迺徼戎以致敗豈不曰自取之乎聖人立法以垂後世示之以意而已一書王師敗績于茅戎而尊王之義與王自取敗之道咸得而見矣謝湜曰王者無敵於天下其師有征無戰故東面征西夷怨南面征北狄怨定王失此道矣義不足以征戎而以詭道徼戎師不足以服戎而以干戈敵戎此其所以取敗也然則王師之敗非戎能敵王而敗之也其敗乃王自取之而已春秋敗不書戰以明王師無敵也師以自敗為文以明王之自取也王之在鄭也書出以正其失道矣書居則以尊之也王之不利于戎也書敗績以正其失道矣不書戰則以尊之也春秋著時王之失明王徳於天下其法皆如此而已矣胡安國曰程氏曰王師於諸侯不言敗諸侯不可敵王也於外域不言戰外域不能抗王也不可敵不能抗者理也其敵其抗王道之失也桓王伐鄭兵敗身傷而經不書敗存君臣之義立天下之防也劉康公邀戎伐之敗績於徐吳氏而經不書戰辨華夷之分立中國之防也是皆聖人筆削非魯史之舊文也然筆於經者雖以尊君父外域然為義而君父所以尊外域所以服則有道矣桓王不以討賊興師而急於伐鄭康公不以惇信持國而輕於邀戎是失其所以君天下禦四夷之道也書敗績於茅戎者言自敗也其自反亦至矣冬十月二年春齊侯伐我北鄙謝湜曰魯衞曹皆惡齊故齊侯來伐胡安國曰初魯事齊謹甚雖易世而聘會不絶也又與晉侯盟于斷道而後怨隙成再盟於赤􅁄而後伐我北鄙齊侯之興是役非義矣魯人為鞌之戰豈義乎同曰憤兵務相報復而彼此皆無善者則亦不待貶而罪自見矣夏四月丙戌衞孫良夫帥師及齊師戰於新築衞師敗績謝湜曰齊侯伐魯北鄙師之還也衞孫良夫帥師戰之衛師敗焉故新築之戰以孫良夫主戰而罪之胡安國曰齊師侵虐而以衞主此戰何也衞侯初與晉同盟于斷道矣又使世子臧與晉同伐齊矣又使孫良夫石稷將侵齊矣及與齊師遇石稷欲還良夫不可曰以師伐人遇其師而還將謂君何若知不能則如無出今既遇矣不如戰也遂戰于新築故齊師雖侵虐而此戰以衞主之也春秋善解紛貴逺怨而惡以兵刃相接故書法如此六月癸酉季孫行父臧孫許叔孫僑如公孫嬰齊帥師會晉郤克衞孫良夫曹公子首及齊師戰于鞌齊師敗績謝湜曰頃公即位十年初未嘗一與會盟侮盟主病諸侯斷道之盟四國將以伐齊也頃公不知自反且又伐魯北鄙敗衞于新築結怨諸侯甚矣故四國會師攻齊而敗之于鞌晉之敗齊也至欲以蕭同叔子為質使齊之耕者盡東其畝然則諸侯怨齊其深可知也雖然齊為不道晉率諸侯討之義也乃若問罪不明大義不舉務以攻戰為心使齊人至於積尸流血而後已失弔民伐罪之道矣故鞌之戰戰不書伐其戰也以四國主戰而罪之也魯書四大夫帥師罪其逞怨也胡安國曰大國三軍次國二軍魯雖大國而四卿並將是四軍也當此時舊制猶存尺地皆公室之士也一民皆公室之兵也上卿行父與僑如嬰齊各帥一軍會戰而臧孫許如晉乞師又逆晉師為之道本不將兵特往來晉魯兩軍之間與謀議耳成公初立主幼國危為季孫一怒掃境内興師而四卿並出肆其憤欲雖無人乎成公之側有不恤也然後政自季氏出矣將稱元帥略其副屬詞之體也而四卿皆書者豈特為詳内録哉堅氷之戒亦明矣經之大例受伐者為主而此以四國及之者以一笑之微殘民毒衆㡬獲其君而怒猶未殆焚雍門之茨侵車東至海故以四國主之為憤兵之大戒見諸行事深切著明矣又曰鞌之戰齊師敗績遣使致賂若以例言當曰來盟于師春秋特變其文曰及國佐盟于爰婁何也晉人欲以蕭同叔子為質而使齊之封内盡東其畝國佐震怒憤其侵侮請合餘燼背城借一當此時晉郤克以八百乗之衆連魯衞之黨乗戰勝之威屈於一言反與之盟而不能復也聖人特書曰及以明國佐之功以抑郤克之横以示天下後世忠臣義士克敵之方在於曲直不以彊弱分勝負也秋七月齊侯使國佐如師己酉及國佐盟於袁婁謝湜曰齊師敗績於是頃公使國佐以紀甗玉磬與地聽命于師四國乃及國佐為盟齊雖數侵諸國然未若荆楚之暴也四國雖以報怨興師然未若齊桓伐楚之義也故袁婁之盟與召陵之盟其不同逺矣齊侯使國佐如師非齊服我而來也齊以賂求晉而紓厄也及國佐盟非齊以義求盟也晉受齊賂而與之盟也使國佐如師則其盟未定也與來盟於師異矣及國佐盟則盟出於晉也與屈完來盟異矣然則春秋之盟能使敵國自服而來者未有若召陵之美也胡安國曰齊國佐如師與楚屈完來一也然陘之役則曰來盟於師盟于召陵鞌之戰則曰及國佐盟於袁婁何也荆楚暴横慿陵諸夏齊桓公仗義聲罪致討威行江漢之上不待加兵而楚人悦服其書來盟于師者楚人自服而求盟也盟于召陵者桓公退舎禮與之盟也在春秋斯為善矣若夫袁婁則異於是齊雖侵虐未若荆楚之暴也諸國大夫含憤積怒欲雪一笑之恥至於殺人盈野非有擊强扶弱之心國佐如師將以賂免非服之也晉大夫又不以徳命使齊人盡東其畝而以蕭同叔子為質夫蕭同叔子齊君之母也則亦悖矣由是國子不可請合餘燼背城借一揖而去之郤克使魯衞之使以其詞為之請逮乎袁婁而與之盟則汲汲欲盟者晉也故反以晉人及之若此類見曲直之繩墨矣是故制敵莫如仁義天下莫大於理而强有力不與焉亦可謂深切著明矣八月壬午宋公鮑卒庚寅衞侯速卒取汶陽田謝湜曰汶陽田本魯地鞌之敗晉人使齊人反魯侵地而歸之書取以其因攻戰而得之也胡安國曰汶陽之田本魯地也取者得非其有之稱不曰復而謂之取何也恃大國兵力一戰勝齊得其故壤而不請於天王以正疆理則取之不以其道與得非其有奚異乎然則宜奈何攷於建邦土地之圖若在封域之中則先王所錫先祖所受經界世守不可亂矣不然侵小得之春秋固有興滅國繼絶世之義必有處也魯在戰國時地方五百里而孟氏語慎子曰如有王者作在所損乎在所益乎經於復其故田而書取所損益亦可知矣冬楚師鄭師侵衞十有一月公會楚公子嬰齊于蜀程頤曰楚為强盛凌轢中國諸侯茍能固疆圉要結鄰好豈有不能自存之理乃懼而服從與之會異時盟稱人以見其衰弱責諸侯則魯可知矣胡安國曰按左氏魯衞受盟于晉從於伐齊故楚為陽橋之役令尹子重曰師衆而後可於是王卒盡行二國稱師著其衆也侵衞則書侵我師于蜀致賂納質沒而不書非諱也書其重者則莫重乎其以中國諸侯降班失列下與荆蠻之大夫會也季孫行父為國上卿當使其君尊榮其民免於侵凌之患而危辱至此特起於憤忮肆其褊心而不知制之以禮也書曰必有忍其乃有濟懲忿窒欲徳之修也不忮不求行之善也躬自厚而薄責於人逺怨之方也季孫忿忮弗能懲也而辱逮君父不亦憯乎胡宏曰以周公之裔宗卿之嗣至貨賂乞盟其棄禮義人民辱國家也著明矣丙申公及楚人秦人宋人陳人衞人鄭人齊人曹人邾人薛人鄫人盟于蜀謝湜曰楚以四國伐齊故嬰齊率鄭師侵衞將以救齊也嬰齊楚卿帥師者嬰齊也不書嬰齊而書楚師者以著楚國威勢之盛也以楚國威勢之盛故宣公出會嬰齊公及列國大夫皆相率受盟于蜀也蜀之盟嬰齊貶稱人黜荆楚之强也自秦宋至於薛鄫其卿皆貶稱人罪其從楚人也是時晉為盟主諸侯同心附晉則威力固足以制楚而攘之矣魯衞曹邾有斷道之盟臧孫許有􅁄之盟三國復賴晉以敗齊師晉於諸侯固有力矣四國棄信背義不旋踵受盟于夷以至列國大夫紛然四起從之何以振華夏之威哉信義中國之紀綱也諸侯無信義以從大國之晉則中國之紀綱壊矣故列國之卿皆貶而人之所以尊中國也卿貶稱人則公之惡不待貶黜而見矣蜀魯地盟在魯地雖外為主亦書及賔主之辭也嬰齊始稱師以著其强終書人以著其貶中書名以著其人春秋立言之法也胡安國曰盟而魯與必先書公尊内也次書主盟者衆所推也此書公及楚人則知主盟者楚也公子嬰齊秦右説宋華元陳公孫寧衞良夫鄭去疾皆國卿也何以稱人楚僭稱王春秋黜之不齒列國晉雖不競猶主夏盟諸侯茍能任仁賢修政事保固疆圉要結鄰好同心擇義堅事晉室荆楚雖大何畏焉今乃西嚮服從而與之盟不亦恥乎夫召陵城濮之事故府可按也乃是之從亦為不善擇矣經於魯君盟會不信則諱公而不書不臣則諱公而不書蜀之盟棄晉從楚書公不諱何也事同而既貶則從同同正始之義也從荆楚而與盟既諱公於僖十九年齊之盟矣是以於此不諱而人諸國之大夫以見意也三年春王正月公會晉侯宋公衛侯曹伯伐鄭謝湜曰晉討楚鄭侵衞故伐鄭蜀盟之後晉侯伐鄭而四國復從則晉國之力固足以合諸侯而用之也景公能明信義以懐服邦國則楚安有今日之暴哉蜀盟之後繼書晉侯伐鄭與之也先君未𦵏而宋共衞定以成君會伐書爵著其惡也胡安國曰按左氏諸侯伐鄭討邲之役也遂東侵鄭公子偃帥師禦之覆諸鄤敗諸丘輿夫討邲之役則復怨勦民非觀釁也遂東侵則潛師掠境非以律也覆而敗諸則専用詐謀非正勝也度彼叅此皆無善也略而不紀勝負微也晉侯稱爵而以伐書何也初為是役必以鄭之從楚也附荆蠻擾中國則盟主有詞于伐耳宋衞未𦵏曷為稱爵背殯越境以吉禮從金革之事也辛亥𦵏衞穆公二月公至自伐鄭甲子新宫災三日哭程氏學曰三年二月新宫災三日哭春秋宗廟之事得禮者不書凡書者著其失也廟災而哭於禮合矣此何以書乎曰廟災之所以哭者為神靈之所止而遭變焉斯人情之所宜哀也新宫者宣公之宫也不曰宣宫者神主未遷也何以知其然曰丹桓宫楹刻桓宫桷皆舉諡以目之此而曰新宫故知其未遷也宣公喪終當遷于廟宫成而主未入遇災而哭此何禮哉宣公薨至此二十八月緩於遷主兹可知矣言災則不恭之致亦自見矣謝湜曰新宫宣公之宫也桓宫僖宫稱諡宣宫獨曰新宫者以宣公神主未遷也先君三年喪畢主歸於廟宣公薨二十有八月矣主猶未遷蓋可知也宫廟親之神靈所在也宫廟遭變則神靈失其所安孝子所宜致哀也廟災三日哭哀之至也新宫神主未入也新宫遇災則親之神主未有害也神主無害而哭之哀哭不得其道矣書新宫災著其不敬也書三日哭著其非禮也成公之不得於親宣公之不祐於天其義皆見於此矣胡安國曰廟災而哭禮也得禮為常事則何以書緱山劉絢曰新宫者宣宫也不曰宣宫者神主未遷也知然者丹楹刻桷皆稱桓宫此不舉諡故知其未遷也宫成而主未入遇災而哭何禮哉宣公薨至是二十有八月緩於遷主可知矣言災則不恭之致亦自見矣此説據經為合或曰禮稱焚其先人之室則三日哭新宫將以安神主也雖未遷而哭不亦可乎曰先人之室蓋嘗寢於斯食於斯會族屬於斯其居處笑語之所在皆可想也事死如事生故有焚其室則哭之禮也神主未遷而哭於人情何居乙亥𦵏宋文公胡安國曰按左氏文公卒始厚𦵏益車馬重器備君子謂華元樂舉於是乎不臣攷於經未有以驗其厚也數其𦵏之月則信然矣天子七月諸侯五月大夫三月士逾月以隆殺遲速為禮之節不可亂也文公之卒國家安静外無危難曷為越禮逾時逮乎七月而後克襄事哉故知華元樂舉之棄君於惡而益其侈無疑矣夫禮之厚薄稱人情而為之者也宋公在殯而離次出境從金革之事哀戚之情忘矣顧欲厚𦵏其君親此非有所不忍於死者特欲誇耀淫侈無知之人耳世衰道微禮法既壊無以制其侈心至於秦漢之間窮竭民力以事丘隴其禍有不可勝言者春秋據事直書而其失自見此類是也豈不為永戒哉夏公如晉鄭公子去疾帥師伐許公至自晉胡安國曰宣公薨至是三年之喪畢矣宜入朝京師見天子受王命然後歸而即政可也嗣守社稷之重而不朝於周以拜汶陽田之故而往朝於晉其行事亦悖矣此春秋所為作也公行多不致其書公至自晉何其至也必有以矣秋叔孫僑如帥師圍􅁄謝湜曰􅁄汶陽邑至於圍之則取之不以其道故也胡安國曰按左氏取汶陽之田􅁄不服故圍之復故地而民不聽至於命上將用大師環其邑而攻之何也魯於是時初税畝作丘甲税役日益重矣􅁄雖歸故國所以不願為之民也歟成公不知薄税歛輕力役修徳政以來之而肆其兵力雖得之亦必失之矣吕祖謙曰圍􅁄汶陽之地亦縁其他皆服惟􅁄不服所以圍之大雩晉郤克衞孫良夫伐廧咎如謝湜曰廧咎如左氏謂赤狄餘類冬十有一月晉侯使荀庚來聘衞侯使孫良夫來聘丙午及荀庚盟丁未及孫良夫盟謝湜曰公如晉故荀庚來聘公為衞伐鄭故衞孫良夫來聘二卿來聘而又與之盟堅二國之好也聘而後盟我及之盟也非來盟也故二盟皆書及魯與二卿各為盟故盟不同日盟在國則公為主可知故不書公胡安國曰劉敞曰諸侯有聘無盟聘禮也盟非禮也庚與良夫不務引其君當道而生事専命為非禮不信以干先王之典故不繫於國以見其遂事之辱非人臣之操此説然也其言及者公與之盟而不言公見二卿之抗也盟者春秋所惡於惡之中又有惡焉者此類是也鄭伐許程頤曰鄭附於楚一年而再伐許故夷之謝湜曰鄭與楚比一嵗再伐許君臣嗜好皆與狄類矣書鄭狄之也胡安國曰稱國以伐外之也晉楚争鄭鄭兩事焉及邲之役於是乎専意事楚不通中華晉雖加兵終莫之聽也至此一嵗而再伐許甚矣利在于晉則從晉人利在於楚則從楚人而不擇於義之可否以為去就其不見齒於列國宜也况又馮弱犯寡一嵗之中而再動干戈於鄰國不既甚乎春秋之法有敢於為不義者則外之所以懲惡也以為告詞略而從告乃實録耳一字為褒貶義安在也四年春宋公使華元來聘謝湜曰宋共公新即位故三月壬申鄭伯堅卒把伯來朝夏四月甲寅臧孫許卒公如晉謝湜曰公比年如晉以會楚嬰齊及楚人盟于蜀召之也故人君所舉不可不謹𦵏鄭襄公秋公至自晉冬城鄆謝湜曰杜氏謂公欲叛晉為晉備鄭伯伐許程頤曰稱鄭伯見其不復為喪以吉禮從戎謝湜曰先君喪未踰年悼公以成君之禮出伐書爵著其惡也二年之間三伐許著其暴也胡安國曰前此鄭襄公伐許既狄之矣今悼公又伐許乃復稱爵何也喪未逾年以吉禮從金革之事則忘親矣稱爵非美詞所以著其惡也五年春王正月把叔姬來歸謝湜曰失婦道被出故書來歸胡安國曰前書把伯來朝左氏以為歸叔姬也此書把叔姬來歸則出也春秋於内女之歸其録之詳者男女居室人之大倫也男子生而願為之有室女子生而願為之有家父母之心人皆有之而不能為之擇家與室則夫婦之道苦􅁋僻之罪多矣王法所重人倫之本錄之詳以為世戒也仲孫蔑如宋謝湜曰報華元聘夏孫叔僑如會晉荀首于糓謝湜曰糓齊地左氏謂荀首如齊逆女宣伯㑹之然則宣成之世大夫専恣有如此者梁山崩謝湜曰梁山髙大静重不宜傾壊者也梁山崩變之大者也山隂物其體安静積陽薄之則崩不書晉者梁山繫天下休戚非獨晉異故也自後君道日陵大夫日横小國日亡諸侯不知反身修徳則禍患之來有如此者不可不畏也胡安國曰梁山韓國也詩曰奕奕梁山韓侯受命而謂之韓奕者言奕然髙大為韓國之鎮也後為晉所滅而大夫韓氏以為邑書而不繫國者為天下記異是以不言晉也左氏載絳人之語於禮文備矣而未記其實也夫降服乗縵徹樂出次祝幣史詞六者禮之文也古之遭變異而外為此文者必有恐懼修省之心主於内若成湯以六事檢身髙宗克正厥事宣王側身修行欲銷去之是也徒舉其文而無實以先之何足以弭災變乎夫國主山川至於崩竭當時諸侯未聞有戒心而修徳也故自是而後六十年間弑君十有四亡國三十二其應亦憯矣春秋不明著其事應而事應具存其可忽諸秋大水冬十有一月己酉天王崩謝湜曰天王定王十有二月己丑公會晉侯齊侯宋公衞侯鄭伯曹伯邾子把伯同盟于蟲牢程頤曰天王崩而會盟不廢書同見其皆不臣謝湜曰蟲牢鄭地鄭服而從中國故盟于蟲牢蟲牢之盟諸侯之貳於楚者復同心為盟以景公復能主盟而合諸侯也故書同盟胡安國曰按左氏許靈公愬鄭伯于楚鄭伯如楚訟不勝歸而請成于晉盟于蟲牢鄭服也鄭服則何以書同盟天王崩赴告已及在諸侯之䇿矣以所聞先後而奔喪禮也而九國諸侯㑹盟不廢故特書同盟以見其皆不臣春秋惡盟誓於惡之中又有惡焉此類是也六年春王正月公至自㑹二月辛巳立武宫程氏學曰禮王制曰諸侯五廟二昭二穆與太祖之廟而五祭法曰諸侯立五廟一壇一墠曰考廟曰王考廟曰皇考廟皆月祭之顯考廟祖考廟享嘗乃止去祖為壇去壇為墠壇墠有禱焉祭之無禱乃止去墠為鬼然則諸侯宗廟古有彝則毁之不可復立武宫其毁已久而輒立之非禮明矣書立者不當立也定元年立煬宫同謝湜曰諸侯五廟二昭二穆與太祖之廟五凡親廟過則毁之不可復立也毁則歸之祧矣其廟二昭二穆先王酌逺近而為之制盡人子孝思而為之節也過制則亂違節則不可繼然則諸侯廟數止五天下之中制也武宫親已盡矣其毁亦已久矣公復立之非禮也武宫書立以明不當立也胡安國曰武宫武公之宫立武宫非禮也喪事即逺有進而無退宫廟即逺有毁而無立故二昭二穆與太祖而五者諸侯之廟制也曰考廟曰王考廟曰皇考廟皆月祭焉曰顯考廟曰祖考廟享嘗乃止去祖為壇去壇為墠壇墠有禱則祭無禱乃止去墠為鬼諸侯之祭法也武公至是厯世十一其毁已久而輒立焉非即逺有終之意故特書曰立立者不宜立也取鄟謝湜曰鄟附庸國内諱滅故書取胡安國曰鄟微國也書取者滅之也滅而書取為君隱也項亦國也其書滅者以僖公在會季孫所為故直書其事而不隠此春秋尊君抑臣以辨上下謹於微之意也人倫之際差之毫釐繆以千里故仲尼特立此義以示後世臣子使以道事君而無朋附權臣之惡於𫝊有之犯上干主其罪可救乖忤貴臣禍在不測故臣子多不憚人主而畏權臣如漢谷永之徒直攻成帝不以為嫌至於王氏則周旋相比結為死黨而人主不之覺此世世之公患也歸父家遣縁季氏也朝吳出奔因無極也王章殺身忤王鳳也鄴侯寄館避元載也惟殺生在下而人主失其柄是以黨與衆多知有權臣而不知有君父矣使春秋之義得行尊君抑臣以辨上下每謹於微豈有此患哉衞孫良夫帥師侵宋謝湜曰衞侵宋罪其違蟲牢之盟也諸侯違同盟而主盟不能治晉之罪也夏六月邾子來朝謝湜曰以取鄟故來朝公孫嬰齊如晉壬申鄭伯費卒謝湜曰鄭伯鄭悼公魯不會𦵏故不書𦵏秋仲孫蔑叔孫僑如帥師侵宋謝湜曰罪其違同盟胡安國曰魯遣二卿為主將動大衆焉有事於宋而以侵書者潛師侵掠無名之意蓋陋之也於衞孫良夫亦然上三年嘗會宋衛同伐鄭矣次年宋使華元來聘通嗣君矣又次年魯使仲孫蔑報華元矣是年冬鄭伯背楚求成于晉而魯衞與宋又同盟于蟲牢矣今而有事於宋上卿授鉞大衆就行而師出無名可乎故特書侵以罪之也左氏載此師晉命也後二年宋來納幣請伯姬焉則此師為晉而舉非魯志明矣兵戎有國之重事邦家人道之大倫聽命於人不得已焉將能立乎春秋所以罪之也楚公子嬰齊帥師伐鄭冬季孫行父如晉謝湜曰魯懼難故夏嬰齊如晉冬行父如晉吕祖謙曰文子如晉此是重禮而遣上卿往晉欒書帥師救鄭謝湜曰鄭伯受盟蟲牢故嬰齊伐鄭魯衞大夫侵宋而楚大夫伐鄭中國乃楚之不若也晉為盟主楚伐同盟欒書帥師救之義之大者也胡安國曰荆楚僭號稱王聖人屏諸四裔而不赦之大一統以存周使民著於君臣之義也鄭能背楚即晉是改過遷善出幽谷而遷喬木也嬰齊為是帥師又因其喪而伐之不義甚矣經所以深惡之也書卿帥師伐鄭於文無貶詞何以知其深惡楚也下書欒武子帥師救鄭則知之矣凡書救者未有不善之也而伐者之罪著矣按左氏晉楚遇于桑隧軍帥之欲戰者八人武子遂還則無功也亦何善之有曰此春秋之所以善欒書也兩軍相加兵刃既接折馘執俘計功受賞此非仁人之心王者之事故舞干而苗格者舜也因壘而崇降者文也次于陘而屈完服者齊桓也會于蕭魚而鄭不叛者晉悼也武子之能不遷戮而知還也亦庻㡬乎春秋集義卷三十五

body:
  text: 春秋集義卷三十七宋李明復撰成公十有二年春周公出奔晉程氏學曰周公書出奔王子瑕王子朝奔不書出義與天王出居于鄭略同以周室衰弱黍離變為國風號令不行乎天下則畿外皆非王有故始於周公之奔特書曰出以王者無外􅄎天之下莫非王土也故後於子瑕子朝之奔而止書曰奔由天子之令不行於諸侯故逋逃罪戾之人晉楚敢受書之而晉楚之罪亦自昭然矣謝湜曰王畿之外皆非王土故周公奔晉書出天王在鄭書出居以明王室下同列國也周公奔晉書出奔以明王臣下同列國大夫也胡安國曰按左氏周公楚惡恵襄之逼且與伯輿争政不勝怒而出王使劉子復之盟于鄄而入三日復出奔晉夫人主無誠慤之心而下與大臣盟是謂君不君人臣無忠信之實而上與人主盟是謂臣不臣既已要質鬼神以入矣又叛盟失信而出奔則是自絶于天也自周無出而書曰出者見周室衰微刑政號令不行於天下爾夏公會晉侯衞侯于瑣澤秋晉人敗狄于交剛冬十月十有三年春晉侯使郤錡來乞師程頤曰不以王命興諸侯師故書乞謝湜曰征伐自天子則邦國軍兵諸侯所不得擅也小國擅命求師於大國大國擅命取師於小國其罪一也公子遂如楚乞師以小國求之大國者也晉侯使郤錡來乞師以大國取之小國者也師不可乞乞師邦國之専也小國求師大國取師皆書曰乞罪其専也師非所乞乞師卑者之事也晉之大魯之小皆書曰乞著其弱也胡安國曰晉主夏盟行使諸侯徴會討貳誰敢不從以伯主之尊而書曰乞師何也列國疏封雖有大小土地甲兵受之天子不相統屬魯兵非晉所得専也今晉不以王命興諸侯之師故特書曰乞以見其卑大屈損無自反而縮之意矣聖人作春秋無不重内而輕外至於乞師則内外同詞者蓋皆有報怨復讐貪得之心是以如此若夫誅亂臣討賊子請於天王以大義驅之誰不拱手以聽命何至於乞哉噫此聖人所以垂戒後世見諸行事之深切著明者也三月公如京師程頤曰不書朝王因會伐而行也故不成其朝夏五月公自京師遂會晉侯齊侯宋公衞侯鄭伯曹伯邾人滕人伐秦程頤曰以伐秦為遂事明朝為重謝湜曰成公會晉伐秦以道出京師因而朝王書曰公如京師為其不成朝也首書晉來乞師次書公自京師遂會晉侯伐秦以明公如京師非専以朝王行也二百四十二年朝王于京師者成公一人而已又且朝禮不成則天下無朝王之實可知也公子遂之聘也書如京師而不書聘以其遂如晉非専於聘也成公之朝也書如京師而不書朝以其遂會伐秦非専於朝也以朝聘王室為名而其終繼以遂事則魯無朝聘之實於此見矣伐秦書遂著其惡也鄭復從晉故鄭伯會晉伐秦胡安國曰諸侯每嵗侵伐四出未有能修朝覲之禮者今公欲會伐秦道自王都不可越天子而往也故皆朝王而不能成朝禮書曰如京師見諸侯之慢也因會伐而行矣又書公自京師以伐秦為遂事者此仲尼親筆明朝王為重存人臣之禮也古者諸侯即位服喪畢則朝小聘大聘終則朝巡狩于方岳則朝觀春秋所載天王遣使者屢矣十二公之述職蓋闕如也獨此年書公如京師又不能成朝禮不敬莫大焉君臣人道之大倫而至於此極故于是天子當陽諸侯用命之義遂蕩然無有存者孔子懼作春秋或抑或縱或予或奪所以明君臣之義者至矣其義得行則臣必敬於君子必敬於父天理必存人欲必消大倫必正豈曰小補之哉此以伐秦為遂事之意也曹伯廬卒于師秋七月公至自伐秦謝湜曰公如京師本非朝王故公至不以京師冬𦵏曹宣公十有四年春王正月莒子朱卒謝湜曰莒子莒渠丘公魯不會𦵏故不書𦵏夏衞孫林父自晉歸于衞謝湜曰林父賴晉之力衞國釋其罪復其位故其返國書歸故定姜曰大國以為請不許將亡書自晉罪晉之容惡也書歸罪衛之失刑也若蔡季書歸所以正法若林父書歸所以著亂秋叔孫僑如如齊逆女鄭公子喜帥師伐許謝湜曰鄭恃晉故公子喜又伐許九月僑如以夫人婦姜氏至自齊謝湜曰孫稱夫人不稱姜氏絶之也至與入稱姜氏不稱婦姜貶之也女子以姓為氏故或以諡配姓或以婦配姓姓隨之矣則雖不稱氏可也或書婦姜或書婦姜氏其義一也公子遂以夫人至僑如以夫人至皆以夫人繫遂僑如者遂僑如以君命逆夫人故也胡安國曰榖梁曰大夫不以夫人以夫人非正也刺不親迎也僑如之不氏一事而再見者卒名耳然則娶于他邦而道里或逺必親迎乎以封壤則有大小以爵次則有尊卑以道途則有逺邇或迎之於其國或迎之於境土或迎之於所館中禮之節可也冬十月庚寅衞侯臧卒秦伯卒謝湜曰秦伯秦桓公魯不會𦵏故不書𦵏十有五年春王二月𦵏衛定公三月乙巳仲嬰齊卒謝湜曰嬰齊公子遂之子宣公以私恩賜遂為仲氏魯人不絶其族故公子遂公孫嬰齊卒書仲以仲為氏自遂始故也胡安國曰嬰齊者公子遂之子公孫歸父之弟也歸父出奔齊魯人徐傷其無後也於是使嬰齊後之故書曰仲嬰齊此可謂亂昭穆之序失父子之親者以後歸父則弟不可為兄嗣以後襄仲則以父字為氏亦非矣癸丑公會晉侯衞侯鄭伯曹伯宋世子成齊國佐邾人同盟于戚晉侯執曹伯歸于京師程頤曰十三年曹伯卒于師公至自伐秦負芻弑世子自立既三年諸侯與之盟矣方執之稽天討也故書同盟見其既同矣又或問晉侯之執曹伯是否曰曹伯有弑逆之罪即執之是也晉與之同盟而復執之故稱曹伯而不去其爵晉侯不奪爵未至於奪爵也歸自京師則言若無罪而歸罪天王不能行爵賞也凡言歸者易辭以歸者强歸之辭謝湜曰戚之盟鄭復受盟于晉故書同盟曹宣之卒于師也公子負芻殺太子自立子臧不義成公而致其邑戚之會厲公以成公有殺適之罪也於是執而歸於京師去逆治亂以正大義聽命王室以正天刑得侯伯討罪之道矣凡强國擅執諸侯不以有罪無罪皆稱人貶之也惟厲公執曹伯執得其罪又歸于王故執書晉侯善之也凡諸侯無罪見執皆不名以其義不當絶也成公執得其罪不名者以明厲公以貶絶之罪聽于王故也然則曹伯負芻義當絶也義當絶而不絶所以善厲公也曹伯襄衞侯鄭義不當絶也義不當絶而絶所以罪文公也胡安國曰稱侯以執伯討也何以為伯討晉合諸侯伐秦曹宣公卒于師曹人使公子負芻守使公子欣時逆曹伯之喪負芻殺其太子而自立至是晉侯執之又不敢自治而歸于京師使即天刑夫是之謂伯討春秋執諸侯者衆矣未有執得其罪如此者故獨書其爵吕祖謙曰曹宣公從晉侯伐秦卒于師使公子負芻守國使公子欣時逆曹伯之喪公子欣時即臧也負芻與欣時俱曹伯庻子公子欣時逆喪未歸之間負芻殺其太子而自立晉為伯主率諸侯討弑太子之禍執曹成公而歸之京師諸侯將見子臧於王而立之子臧辭曰聖達節次守節下失節遂逃奔宋不肯立後來負芻歸自京師自為曹君大抵學者之患最是勇於義而不能精擇如子臧輕千乗之國視之如弊屣而不肯受固是勇為義然而講學不明擇義不精所以辭受取予之際亦不曉自曹宣公之卒太子是正嫡本當立負芻殺太子而自立其罪當討晉人討簒弑之賊諸侯擇其賢者而立之太子在時子臧固不當立然而既死之後子臧固當受之可也亦當討前日弑君之賊今乃遷延不受反使簒弑之人儼然居一國之上使三綱五常都失序豈是晉人之罪都縁子臧歸潔其身太過輕重隆殺都不分却説聖達節次守節之語觀這一二句便見他講學未盡擇義不精亦皆有病夫所謂節者天降生民民之秉彛不可加損天地聖愚人物同守之不可加損所謂節如文王之聖則曰順帝之則在易則曰乾之為道乃見天則今子臧講學不明郤以七縱八横超乎節之外亦是子臧未曉得帝則民彛處雖有髙世之行難行之操不免所以得罪於君子都是擇義不精之過公至自會夏六月宋公固卒楚子伐鄭謝湜曰鄭伐許又受盟于戚故楚伐鄭秋八月庚辰𦵏宋共公宋華元出奔晉宋華元自晉歸于宋謝湜曰宋共公卒平公㓜弱權臣争執國柄更相攻討故有華元蕩山魚石之亂孫林父自晉歸于衞華元自晉歸于宋其罪一也吕祖謙曰魚石止華元華元欲出奔晉此見得元畏桓族之强所以欲奔晉魚石曰國人與之此見華元有重望在已又有二大功於國故國人懐之萬一華元不反則宋國之人必討五桓之族魚石雖如此猶能知向戍賢魚石能知向戍則必能免禍然終不免何故以此見言之則易為之則難當時魚石歸華元亦是好意元既反後遽逐魚石此是元曲處終不免能計較利害故後來宋之禍始於此要之當時五覇雖强若留在宋時亦不妨况當時魚石之言儘好自魚石世為左師到此元乃易以向戍不用魚氏之族宋殺其大夫山程頤曰去族害公族也程氏學曰宋殺其大夫山山蕩山也蕩山宋公族也乗君之喪作亂以弱公室殺公子肥背其族也是背其族者伐其本也人而無本人道絶矣故去族以示法謝湜曰蕩山公族大夫乗國喪禍弱公室殺公子肥臣之自絶其族者也絶其族者絶於族王法在所棄絶故去族以絶之物以根為本人以宗族為本人而無本則人道絶矣衞之衞侯燬宋之大夫山或書名或去族其惡一也宋魚石出奔楚謝湜曰魚石乃蕩山之黨故奔楚胡安國曰宋六卿魚氏蕩氏向氏鱗氏皆桓族也華氏戴族也華元為右師魚石為左師蕩氏汰而驕共公卒已𦵏蕩澤弱公室殺公子肥華元曰我司君臣之訓而不能正罪大矣不能治官敢賴寵乎乃出奔晉魚石將止之魚府曰元反必討是無桓氏也石曰彼多大勲國人所與不反懼桓氏之無祀於宋也遂自止元於河上元歸使國人攻桓氏殺蕩山出魚石國然後定元之出奔晉與歸于宋皆不省文者著其正也書之重詞之複必有大美惡焉詞繁而不殺所以與之也以不賴寵而出奔以國人與晉皆許之討而後入正可知矣蘇轍謂使元懐禄顧寵重於出奔則不能討此説是也山不書氏背其族也伐其本也人而無本人道絶矣葛藟猶能庇其本根况於人而忍伐其本乎冬十有一月叔孫僑如會晉士燮齊髙無咎宋華元衞孫林父鄭公子鰌邾人會吳于鍾離程頤曰吳益强大求會于諸侯諸侯之衆往而從之故書諸國往與之會以見句吳盛中國衰也時中國病楚故與吳親謝湜曰吳子横慿陵邦國尤重於楚方是時上無明天子下無賢方伯列國皆屈節㑹吳雖齊晉大國其大夫亦往親吳而會之中國陵遲甚矣會吳于鍾離會吳于柤會吳于向吳皆殊會者斥呉人而外之也外呉人所以責諸侯也呉本泰伯之後為太王之昭今雖介在南蠻使率其軄貢通于王朝固與魯衛諸邦俱為同姓之戚乃不此之圖而􅁋名荐食自同强楚此春秋所以斥呉人而外之也胡安國曰吳以號舉夷之也會而殊會外之也殊會有二義會王世子于首止意在尊王室不敢與世子抗也會吳于鍾離于柤于向意在賤夷狄而罪諸侯不能與之敵也夫以太伯至徳是始有吳以族言之則周之伯父也至其後世遂以號舉者以其僭竊稱王不能居中國之爵號耳成襄之間中國無霸齊晉大國亦皆俯首東向而親吳聖人蓋傷之故特殊會可謂深切著明矣許遷于葉謝湜曰許雖偪鄭與民効死守之可也失保國之道而畏難以遷靈公之自弱也與盤庚之遷異矣十有六年春王正月雨木冰謝湜曰隂氣太勝雨著木則成冰隂氣勝而雪常也隂氣太勝而雨木冰非常也胡安國曰雨木冰者雨而木冰也何休曰木者少陽幼君大臣之象冰者凝隂兵之類也冰脅木者君臣將執於兵之徴未㡬而有沙隨苕丘之事天人之際休咎之應焉可誣也而欲盡廢五行傳亦過矣朱熹語録或問春秋成十六年雨木冰榖梁曰雨而木冰也註云介胄之象何休公羊註云木少陽幼君也冰隂凝臣也臣將脅君此乃五行家牽合之説未可信終未見上温下冷之意夏四月辛未滕子卒謝湜曰滕子滕文公魯不會𦵏故不書𦵏鄭公子喜帥師侵宋謝湜曰成公背戚盟出師侵宋前書同盟後書侵宋罪其無信也六月丙寅朔日有食之晉侯使欒黶來乞師程頤曰時以穆姜叔孫僑如將作難故師出後期甲午晦晉侯及楚子鄭伯戰于鄢陵楚子鄭師敗績謝湜曰鄢陵之戰楚師輕窕而鄭成恃楚敵晉故楚子鄭師敗績楚子傷目而退故敗不言師舉重也鄭伯反覆違盟叛晉即楚其罪在所討矣厲公不能明大義以行伐務以攻戰為心故以晉侯主戰而罪之楚不書侵伐者三國之戰其源出於鄭公子喜侵宋故也前書侵宋則二國之敗鄭伯尤為大罪由此見矣胡安國曰不書楚師敗績以其君親集矢於目而身傷為重也當是時兩軍相抗未有勝負之形晉之捷也亦幸焉耳幸非持勝之道范文子所以立於軍門有聖人能内外無患盍釋楚以為外懼之戒乎楚師雖敗其勢益張晉遂怠矣卒有欒氏之譖而誅三郤國内大亂聖人備書以見行事之深切著明也吕祖謙曰鄢陵之戰以兵家曲直論之楚新與晉盟而背之用師是晉直楚曲勝敗之勢顯然可見晉元帥憤然興師却欲討楚獨范文子不欲戰曰若逞吾願諸侯皆叛晉可以逞及臨陣又曰惟聖人能内外無患自非聖人内寧必有外憂欒書之徒徒能外面看晉楚之曲直不能於内看君之昏明説背盟棄好討之必勝不知厲公驕縱遂至於滅亡大抵天下之事有當作而不作惟知義之君子隨時輕重權衡隆殺觀一時之勝敗如射共王中目見得楚之大敗晉師三日館榖見得晉之大勝然楚大敗之後君臣戒懼兢兢守國終始保全厲公一勝之後殺郤錡郤犨郤至又欲殺欒書中行偃君臣相賊然文子雖見之明憂之深立於戎馬之前而言之其拳拳之忠懇懇之意可謂深切而終不救厲公之驕至使祝宗祈死但以不見禍為幸文子之志固亦可哀然亦有可責處文子雖有區區之意養之未充信未孚於人威望不足以壓羣臣是以終無所濟區區於衆邪之間事窮計迫拱手無䇿徒欲避禍而死使其加之講學終無憤争之禍必將見㡬而作或出或處亦不至於徒欲速死後之有志之士規模狹小者可以此為戒楚殺其大夫公子側謝湜曰鄢陵之敗公子側以司馬將中軍故楚以國法殺之秋公會晉侯齊侯衞侯宋華元邾人于沙隨不見公程頤曰晉侯怒公後期故不見公君子正已而無恤乎人魯之後期國難故也晉不見為非矣彼曲我直故不足為恥也程氏學曰夫子於魯事凡可恥者必為之諱禮也其我無失道乃為横逆所加則不諱沙隨之會晉强無義而不見公我何恥焉故直書之而在會諸侯俱有罪也昭十三年同盟于平丘公不與盟義同此謝湜曰會于沙隨謀伐鄭也鄢陵之戰公不出師故晉侯不見公以强令徵師微國晉侯之無義也兩君相會而恃大以却小晉侯之無禮也然則不見公惡不在魯而在晉矣諱國惡目子之禮也君無失道而强國以横逆來加非君惡也非君惡則我國何恥焉故沙隨之會書不見公著晉侯之惡也胡安國曰臣子之於君父揚其美不揚其惡為尊者諱為親者諱禮也聖人假魯史以示王法其於魯事有君臣之義故君弑則書薨易地則書假滅國則書取出奔則書遜屈已而與强國之大夫盟則書及叛盟失信而莫適守則沒公而書會凡此類雖不沒其實示天下之公必隠避其詞以存臣子之禮然則沙隨之會晉不見公是魯侯之大辱深可恥焉者矣曷為直書其事而不諱乎曰春秋伸道不伸邪榮義不榮勢正已而無恤乎人以仁禮存心而不憂横逆之至者也沙隨之會魯有内難師出後期所當恤者晉人聽叔孫僑如之譖怒公而不見曲在晉矣魯侯自反非有背仁棄禮不忠之咎也昔曾子嘗聞大勇於夫子曰自反而縮雖千萬人吾往矣孟子言浩然之氣至大至剛以直養而無害則塞乎天地之間沙隨之不見於公何嫌乎直書而不諱者示天下後世使知大勇浩然之氣所以守身應物如此其垂訓之義大矣吕祖謙曰會于沙隨謀伐鄭鄭自鄢陵之敗後却堅意事楚蓋感當時夷王之傷不肯叛楚直至終鄭伯之死後方從晉公至自會公會尹子晉侯齊國佐邾人伐鄭謝湜曰厲公以王命伐鄭故會尹子尹子諸侯為王卿士者也吕祖謙曰公會尹武公此是王官伯借之以為重曹伯歸自京師程頤曰曹伯不名不稱復歸王未嘗絶其位也自京師王命也程氏學曰十有五年公會晉侯衛侯鄭伯曹伯宋世子成齊國佐邾人于戚晉侯執曹伯歸于京師他執諸侯皆稱人未有書其爵者稱人者執無罪故奪其爵此獨稱侯者執得其罪且不敢自治而歸于京師使即天刑故與其伯討也按十有三年諸侯伐秦曹伯盧卒于師左氏曰曹人使公子負芻守公子欣時逆曹伯之喪秋負芻殺其太子而自立也傳與經意合益足以為證矣奈何周王不能用晉之執寘諸刑典旋使復國失君甚矣故書曰曹伯歸自京師以譏之曹伯不名者未嘗絶也不絶曹伯所以累乎天王也謝湜曰成公身負不可容之大罪晉侯執歸京師方伯之義也天王不加大刑使以無罪復國失順天討逆之道矣故曹國之歸也爵而不名以明天王不絶其位也書自京師以明天王釋亂容逆也蔡季賴陳以歸衞侯賴楚以歸故蔡書自陳歸蔡衞書自楚歸衞曹伯非有所賴也天王赦之而已故曹書歸自京師曹伯雖在京師王不加絶非失國也故書伯歸不書國胡安國曰曹伯不名其位未嘗絶也不絶其位所以累乎天王也其言自京師王命也言天王之釋有罪也善不蒙賞惡不即刑以堯為君舜為臣雖得天下不能一朝居也負芻殺世子而自立不能因晉之執寘諸刑典而使復國則無以為天下之共主矣九月晉人執季孫行父舍之于苕丘程頤曰寘之于苕丘也謝湜曰行父吾國股肱之臣也執而舍之苕丘幽之使不得通也公之會沙隨也晉侯不見公公之會伐鄭也晉人執行父魯以一不出師君則黜而不得進卿則閉而不得通晉之逼辱魯國甚矣書不見書執書舍累其惡而罪之冬十月乙亥叔孫僑如出奔齊謝湜曰杜氏謂僑如欲去季孟國人逐之十有二月乙丑季孫行父及晉郤犨盟于扈謝湜曰晉釋行父故行父及郤犨盟扈之盟晉為盟主盟以行父及郤犨者折晉之强也行父釋不書至者隨公在會被執故也公至自會謝湜曰會而執國卿其惡大故以會至乙酉刺公子偃謝湜曰左氏謂穆姜欲立公子偃行父歸殺之胡安國曰按左氏宣伯通於穆姜欲去季孟而取其室戰于鄢陵之日公將行穆姜送公而使逐二子公以晉難告曰請反而聽命姜怒公子偃公子鉏趨過指之曰女不可是皆君也公待於壊隤申宫儆備設守而後行是以後使孟獻子守于公宫宣伯使告郤犨曰魯侯待于壊隤以待勝者郤犨取貨于宣伯而訴公子晉侯晉侯不見公公會諸侯伐鄭將行姜又命公如初公又申守而行宣伯使告郤犨曰魯之有季孟猶晉之有欒范也政令於是乎成今其謀曰晉政多門不可從也寧事齊楚有亡而已蔑從晉矣若欲得志於魯請止行父而殺之我斃蔑也不然歸必叛晉人執季文子舍于苕丘公還待于鄆使子叔齊伯請季孫于晉郤犨曰茍去仲孫蔑而止季孫行父吾與子國親於公室對曰僑如之情子必聞之矣若去蔑與行父是太棄魯國而罪寡君也若猶不棄使寡君得事晉君則夫二人者魯國社稷之臣也若朝亡之魯必夕亡范文子謂欒武子曰季孫於魯相二君矣妾不衣帛馬不食粟可不謂忠乎信纔慝而棄忠良若諸侯何乃許魯平赦季孫出叔孫僑如而盟之季孫及郤犨盟于扈歸刺公子偃十有七年春衞北宫括帥師侵鄭夏公會尹子單子晉侯齊侯宋公衞侯曹伯邾人伐鄭謝湜曰鄭畏楚未服故衞以師侵鄭晉再以王命合諸侯伐鄭六月乙酉同盟于柯陵謝湜曰柯陵之盟謀復伐鄭也王臣亦與盟故書同盟秋公至自會謝湜曰會尹子伐鄭會尹子單子伐鄭皆以伐事未成故以會至齊髙無咎出奔莒九月辛丑用郊謝湜曰三王之郊一用夏正九月失時甚矣而魯用以郊用者不宜用也三月四月雖失時然猶夏之春也九月夏之秋也天事不敬未有甚於此者也故九月之郊書用郊著其失禮之大也胡安國曰郊之不時未有甚於此者也故特曰用郊用者不宜用也或曰蓋以人享叩其鼻血以薦也古者六畜不相為用况敢用人乎晉侯使荀罃來乞師冬公會單子晉侯宋公衞侯曹伯齊人邾人伐鄭謝湜曰以蕞爾之鄭晉以王命三合諸侯出伐而不能服以强楚為之援也鄭太子為質於楚楚公子成戍鄭夏之伐楚子重師于首止而諸侯還冬之伐楚公子申師于汝上而諸侯還然則諸侯伐鄭不若先楚之為利也能若齊桓修政事輯人民和邦國以王命伐楚而攘之則鄭不待干戈及境而來服矣晉厲公欲為覇主而内無逺謀此中國所以不振也尹子單子會諸侯伐鄭非正也諸侯致尹子單子伐鄭非正也然諸侯不遵王室久矣晉假天子命以王臣伐叛乃孟子所謂彼善於此者也諸侯比年伐鄭秋起兵冬而息夏起兵秋而息冬起兵十有一月而息内外疲苦甚矣孔子所謂吾恐季孫之憂不在顓臾而在蕭墻之内也十有一月公至自伐鄭壬申公孫嬰齊卒于貍脤謝湜曰卿卒于外書地重之也尤氏謂從公伐鄭未至而卒嬰齊恐非叔􅆄子以其不以叔氏十有二月丁巳朔日有食之邾貜且卒謝湜曰邾子邾定公魯不會𦵏故不書𦵏晉殺其大夫郤錡郤犨郤至謝湜曰厲公欲盡去羣大夫而立其左右郤錡郤犨郤至由此被害厲公親昵讒嬖一日而殺三卿取禍之道也殺書國罪其國也楚人滅舒庸十有八年春王正月晉殺其大夫胥童庚申晉弑其君州蒲謝湜曰弑書國舉朝之臣害之也厲公不道數誅大臣由此臣下離心身罹不測故弑稱國以明禍𤼵於國也左右大臣君之股肱手足也人君誅殺無常則股肱手足疑貳不安反為一人冦虐者有之矣有國家者其於撫御羣臣不可不戒也宋人殺其大夫不知治而其終宋人之禍上及於昭晉殺其大夫不知慮其終晉之禍上及於厲故易曰由辨之不早也胡安國曰弑君天下之大罪討賊天下之大刑春秋合於人心而定罪聖人順於天理而用刑固不以大霈釋當誅之賊亦不以大刑加不弑之人然趙盾以不越境而書弑許世子止以不甞藥而書弑鄭歸生以憚老懼讒而書弑楚公子比以不能效死不立而書弑齊陳乞以廢長立幼而書弑晉欒書身為元帥親執厲公於匠麗氏使程滑弑公而以車一乗𦵏之於翼東門之外而春秋稱國以弑其君而不著欒書之名氏何哉仲尼無私與天為一奚獨於趙盾許止歸生楚比陳乞則責之甚備討之甚嚴而於欒武子闊略如此乎學者深求其㫖知聖人誅亂臣討賊子之大要也而後可與言春秋矣朱熹曰胡解晉弑其君州蒲一叚意不分明似是為欒書出脱曾問胡伯逢云厲公無道但當廢之齊殺其大夫國佐謝湜曰髙國専齊久矣髙無咎出奔國佐被殺權臣之不保其終也公如晉謝湜曰悼公新立公修朝禮夏楚子鄭伯伐宋宋魚石復入于彭城謝湜曰魚石以罪奔楚今以楚鄭伐宋入于彭城乃魚石結楚以伐其國恃楚兵力而入為冦敵也復入絶之之甚也魚石外連楚鄭引兵向國雖曰楚鄭所納而志乃欲危社稷背逆之罪大矣入書復入以明在所誅絶也以復入著魚石大罪而楚鄭之惡不待黜責而見矣胡安國曰此伐宋以納魚石其不曰納宋魚石于彭城何也劉敞曰不與納也諸侯失國納之正也諸侯世也大夫失位諸侯納之非正也大夫不世也諸侯托於諸侯禮也大夫託於諸侯非禮也其言復入者已絶而復入惡之甚者宋魚石晉欒盈是也吕祖謙曰宋彭城在南京彭城在徐州二處相近公至自晉晉侯使士匄來聘秋把伯來朝八月邾子來朝築鹿囿謝湜曰築囿以養鹿故稱鹿囿己丑公薨于路寢冬楚人鄭人侵宋晉侯使士魴來乞師十有二月仲孫蔑㑹晉侯宋公衞侯邾子齊崔杼同盟于虚朾謝湜曰諸侯同盟謀救宋也是時宋魚石連楚鄭入彭城楚鄭復興兵侵宋其為宋患大矣病惡恤患諸侯所同欲也虚朾之盟諸侯協謀救宋故書同盟吕祖謙曰會虚朾此是諸侯借兵丁未𦵏我君成公春秋集義卷三十七

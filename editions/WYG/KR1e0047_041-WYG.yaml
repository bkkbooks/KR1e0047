body:
  text: 春秋集義卷三十八宋李明復撰襄公程頤曰襄公名午成公子簡王十四年即位襄諡也因事有功曰襄元年春王正月公即位仲孫蔑會晉欒黶宋華元衞甯殖曹人莒人邾人滕人薛人圍宋彭城謝湜曰楚以兵入魚石于彭城魚石以彭城附楚然則彭城以入楚矣故列國以救難之師為宋討魚石于彭城而圍之圍彭城書宋以明彭城宋之分地也春秋正彭城歸宋以著楚子之罪則列國之圍彭城可謂得討罪之義矣魚石之處彭城宋之大患也釋而不治則宋之宗廟社稷將為魚石所危矣然則彭城之師善之大者也胡安國曰按左氏曰非宋地追書也然則書圍彭城者魯史舊文也曰圍宋彭城者仲尼親筆也楚巳取彭城封魚石戍之三百乗矣則曷為繫之宋楚不得取之宋魚石不得受之楚雖専其地君子不登叛人所以正疆域固封守謹王度也夏晉韓厥帥師伐鄭謝湜曰晉韓厥伐鄭列國大夫出次于鄫備楚而為晉援也然則諸侯惡鄭可知矣胡安國曰楚人釋君而臣是助事已悖矣晉於是乎降彭城以魚石等歸遂伐鄭而諸侯次于鄫此皆放於義而行者也傳書楚子辛救鄭而經不書者鄭本為楚以其君之故親集矢於目是以與楚而不貳也棄中國從荆蠻不能以大義裁之惟私欲之從則鄭無可救之善楚不得有能救之名經所以削之不言救也仲孫蔑會齊崔杼曹人邾人把人次于鄫秋楚公子壬夫帥師侵宋謝湜曰楚師為鄭故侵宋九月辛酉天王崩邾子來朝冬衞侯使公孫剽來聘晉侯使荀罃來聘謝湜曰王室方有大喪邾宣來朝衞獻晉悼遣大夫來聘諸侯無臣子之哀於王室也胡安國曰簡王崩赴告已及藏在諸侯之䇿矣則宜以所聞先後而奔喪今邾子方來修朝禮衞侯晉侯方來修聘事於王喪若越人視秦人之肥瘠曾不與焉而左氏以為禮此何禮乎滕定公薨世子定為三年喪父兄百官皆不欲曰吾宗國魯先君莫之行也喪紀益廢民習於耳目而不察故後世以日易月人子安而行之不知春秋之義無君臣之禮豈不惜哉二年春王正月𦵏簡王鄭師伐宋夏五月庚寅夫人姜氏薨謝湜曰姜氏成公夫人先穆姜卒六月庚辰鄭伯睔卒謝湜曰鄭伯鄭成公魯不會𦵏故不書𦵏晉師宋師衞甯殖侵鄭謝湜曰鄭背晉固有罪矣然乗喪攻國非仁書侵罪之也秋七月仲孫蔑㑹晉荀罃宋華元衞孫林父曹人邾人于戚謝湜曰列國大夫謀鄭己丑𦵏我小君齊姜叔孫豹如宋謝湜曰豹始為卿冬仲孫蔑會晉荀罃齊崔杼守華元衞孫林父曹人邾人滕人薛人小邾人于戚遂城虎牢程頤曰設險所以守國也有虎牢之險而不能守故不繫于鄭責其不能守也謝湜曰僖公恃楚未服故列國據虎牢而城之將以偪鄭也虎牢鄭邑不繫之鄭者列國取虎牢城之則虎牢非鄭所有故也虎牢鄭要害之地也城虎牢而鄭人乃成以力偪其心腹而制之也大夫出疆臨權制變不可中復者然後専之可也非此則大事必請而後行城築大事也上不請命天子下不請命諸侯而輒城虎牢大夫之専命也城虎牢書遂罪其専也胡安國曰虎牢鄭地故稱制邑至漢為成皋今為氾水縣巖險聞於天下猶虞之下陽趙之上黨魏之安邑燕之榆闗吳之西陵蜀之漢樂地有所必據城有所必守而不可以棄焉者也有是險而不能守故不繫於鄭然則據地設險亦所貴乎天險不可升也地險山川丘陵也王公設險以守其國大易之訓也城郭溝池以為固亦君子之所謹也鑿斯池築斯城與民同守孟子之所以語滕君也夫狡焉思啟封疆而争地以戰殺人盈野争城以戰殺人盈城者固非春秋之所貴守天子之土繼先君之世不能設險守國將至於遷潰滅亡亦非聖人之所與故城虎牢而不繫於鄭程氏以為責鄭之不能有也其聖人以待襄世之意小康之事耶朱熹曰鄭之虎牢即漢之成皋也虎牢之下即溱洧之水後又名為氾水吕祖謙曰晉悼公戚之會以鄭從楚故謀討鄭孟獻子請城虎牢以偪鄭知武子善其言遂城虎牢鄭乃服此一叚事雖小最見得悼公所以霸處蓋孟獻子魯國之臣也當戚之會獻城虎牢之謀知武子遂從其言此見悼公之君臣惟善是用初無親竦内外之間孟獻子雖魯之臣言一可用則欣然從之亦見悼公規模稍闊處晉之君臣能用善所以致得孟獻子敢言雖然是如此又須觀孟獻子納忠之由亦縁悼公初即位大率規模足以服諸侯之心且魯君初朝晉歸語把桓公以晉侯之徳是時魯之君臣已心服於晉孟獻子雖不立晉之朝於戚之會便獻城虎牢之謀武子欣然從之又須看獻子所以不外於晉晉亦不外於獻子這兩句須兼看晉之君臣視諸侯為一體此晉之所以霸楚殺其大夫公子申謝湜曰左氏謂公子申偪子重子辛三年春楚公子嬰齊帥師伐吳公如晉謝湜曰齊姜喪未畢出朝失子道也夏四月壬戌公及晉侯盟于長樗公至自晉謝湜曰以朝晉行故以晉至六月公會單子晉侯宋公衞侯鄭伯莒子邾子齊世子光己未同盟于雞澤謝湜曰是會也悼公假王命以合諸侯僖公新聽命於晉故會單子為雞澤盟是盟也王臣亦與盟故書同盟陳侯使袁僑如會戊寅叔孫豹及諸侯之大夫及陳袁僑盟程頤曰楚彊諸侯皆畏之而修盟故書同謝湜曰自鄭背戚盟列國凡四伐鄭再侵鄭不能制鄭而服之及城虎牢然後鄭國恐懼而從雞澤之會王臣主令鄭伯聽命於晉陳雖與楚成公不待徵召亦遣大夫如會從盟書陳袁僑如會以明中國威力之盛也諸侯能以義服鄭如城虎牢則疑貳之國安有不心服者哉諸侯既盟袁僑始至故諸侯大夫及陳袁僑盟總曰諸侯之大夫者陳服而與之諸侯之所同欲故也雞澤之盟鄭伯既受命於前陳侯復請命於後方是時中國威令翕然復振者悼公之力也上書及殊外大夫下書及殊陳袁僑胡安國曰同盟或以為有三例一則王臣預盟而書同二則諸侯同欲而書同三則惡其反覆而書同夫惡其反覆與諸侯同欲而書同信矣王臣預盟而書同義則未安盟于女栗及蘇子也而不書同盟于洮于翟泉會王人也而不書同然則此三盟者正所謂諸侯同欲而書同盟也其同欲奈何同病楚也會于柯陵之嵗夏伐鄭楚人師于首止而諸侯還冬伐鄭楚人師于汝上而諸侯還雞澤之盟陳袁僑如會楚師在繁陽而韓獻子懼平丘之行楚棄疾立復封陳蔡而中國恐是知此三盟者諸侯皆有戒心而修盟故書同不以尹子單子劉子亦預此盟而譏之也夫王臣將命必惇信明義而後可以表正乎天下諸侯守邦必尊王奉法而後可以保其社稷今王臣下與諸侯約誓諸侯亦敢上與王臣要言斯大亂之道也則亦不待書同盟而罪自見矣秋公至自會冬晉荀罃帥師伐許謝湜曰靈公不會雞澤故晉伐許四年春王三月己酉陳侯午卒胡安國曰午者襄公名也孔子作春秋在哀公之世襄公哀公之皇考也曷不諱乎古者死而無諡不以名為諱周人以諡易名於是乎有諱禮故孟子曰諱名不諱姓姓所同也名所獨也然禮律所載則有不諱者夫子兼帝王之道參文質之中而作春秋以法萬世如公薨不地滅國書取出奔稱遜之類所以放其文也莊公名同而書同盟僖公名申而書戊申定公名宋而書宋人之類所以從其質也後世不明此義則有以諱易人之名又有以諱易人之姓者詩書則諱臨文則諱嫌名則諱二名則偏諱愚者違禮以為孝謟者獻侫以為忠忌諱繁名實亂而春秋之法不行矣夏叔孫豹如晉秋七月戊子夫人姒氏薨謝湜曰姒氏成公妾襄公母姒把姓𦵏陳成公八月辛亥𦵏我小君定姒謝湜曰哀姜既薨成風始正出姜既出敬嬴始正齊姜既薨定姒始正妾母之𦵏得從夫人以此而已尊無二上母以子貴故嫡母在則妾母屈而不伸嫡母亡則妾母伸而不屈吕祖謙曰定姒成公妾非襄公適母又曰定姒魯襄公之母季文子魯之正卿定姒薨季文子降殺夫人之禮以從菲薄國君之母薨而無櫬當是時季文子秉一國之政不能成君母之喪他主意要非薄誰能諫止得他若要諫止須是勢均力敵之人如孟孫尚敢廢嫡立庻這一等人又不然其次如臧孫猶似可諫而數子又無一言以及之匠慶不過工人之賤乃能以此責季氏又擅伐蒲圃之檟以成其禮物季孫為已樹六檟於蒲圃他日準備要自已用匠慶請木季孫説道與刼略何異以上卿如此忿辭匠慶一面自斫更不恤他季文子亦不能止禦以知至理所在雖至微賤之臣所守既正雖如正卿之貴有所不能屈此最學者不可不講䆒冬公如晉謝湜曰比年如晉卑弱之道也襄公幼大臣不能輔君以道三卿之罪也陳人圍頓謝湜曰頓恃楚不服陳故陳圍頓五年春公至自晉夏鄭伯使公子𤼵來聘謝湜曰鄭與中國親故公子𤼵來聘叔孫豹鄫世子巫如晉程氏學曰叔孫豹鄫世子巫如晉非聘也左氏曰以成屬鄫注四年左氏傳云公如晉聽政晉侯饗之公請屬鄫杜氏曰前年請屬鄫故將鄫太子巫如晉以成之蓋魯欲屬鄫而鄫欲屬於魯也故不曰及其事未果於成否故不繫事列國有制皆統乎天子而魯鄫私相屬又禀命於强國亂莫甚焉謝湜曰鄫國世子同叔孫豹如晉者魯欲屬鄫鄫欲屬於魯二國同聽命於晉故也列國皆天子所封也變易天子封國不得王命而受之强晉亂之大者也不書及者二國私欲相屬其志同其罪均故也仲孫蔑衞孫林父會吳于善道謝湜曰會不殊衞者二國大夫皆受命於晉故也吕祖謙曰會吳善道此叚須通看晉㡬次會吳不至晉會得吳則分得楚之勢秋大雩楚殺其大夫公子壬夫公會晉侯宋公陳侯衞侯鄭伯曹伯莒子邾子滕子薜伯齊世子光吳人鄫人于戚程頤曰吳來會非為主謝湜曰晉欲統一諸侯故合諸侯會吳于戚是會也陳鄭服從吳亦聽命會之盛者也以吳能從中國政令故進稱人以吳來會于戚故會不殊吳鄫也繋魯故列吳下以鄫人列之諸侯則不與魯之屬鄫也胡安國曰吳何以稱人按左氏吳子使夀越如晉請聽諸侯之好晉人將為之合諸侯使魯衞大夫會吳于善道且告會期然則戚之事乃吳人來會不為主也來會諸侯而不為主則進而稱人諸侯往與之會而主吳則貶而稱國聖人之情見矣春秋之義明矣公至自會冬戌陳謝湜曰以兵守之曰戍戍陳備楚難也救災恤患諸侯之義也陳有外難而魯人戍之得諸侯救患之義矣書戍陳善之也戍陳晉命也諸侯之力也不書諸侯者諸侯心力不齊故也使諸侯同心協力則陳由此安矣又豈有後日之患哉楚公子貞帥師伐陳公會晉侯宋公衞侯鄭伯曹伯齊世子光救陳十有二月公至自救陳程氏學曰五年冬戍陳十年冬戍鄭虎牢魯非王命勤民逺戍戍陳為善戍鄭虎牢為不善何哉陳附中國而楚争之則戍之者義助陳而拒楚師與之可也經曰楚公子貞帥師伐陳公會晉侯宋公衞侯鄭伯曹伯齊世子光救陳斯善可見矣戍鄭虎牢則異於是晉楚争鄭為日滋久鄭之從楚固云不義然未嘗以義服之也二年戚之會遂城虎牢以逼之九年伐之十年伐而復戍焉經曰楚公子貞帥師救鄭則中國諸侯之惡益明矣城不繫鄭者諸侯城已駐師則已非鄭有故耳戍而繫鄭者若曰鄭國分地非諸侯可得制也故還繫之謝湜曰戚之會陳國受盟於晉矣今也楚師犯陳而晉率諸侯救之中國之義也書救陳善之也辛未季孫行父卒謝湜曰行父季友孫以季為氏故書季孫六年春王三月壬午把伯姑容卒夏宋華弱來奔謝湜曰子蕩以弓梏華弱於朝平公以華弱不堪司武逐之秋𦵏把桓公滕子來朝莒人滅鄫謝湜曰鄫屬於魯鄫出會晉以迫莒難故也魯屬鄫而不能保鄫晉會鄫而不能救鄫二國之罪也胡安國曰榖梁子曰莒人滅鄫非滅也立異姓以蒞祭祀滅亡之道也公羊亦云莒女有為鄫夫人者蓋欲立其出也或曰鄫取莒公子為後罪在鄫子不在莒人春秋應以梁亡之例而書鄫亡不當但責莒人也今直罪莒舍鄫何哉曰莒人之以其子為鄫後與黄歇進李園之妹於楚王吕不韋獻邯鄲之姬於秦公子其事雖殊其欲滅人之祀而有其國則一也春秋所以釋鄫而罪莒歟以此防民猶有以韓謐為世嗣昏亂紀度如郭氏者吕祖謙曰莒滅鄫齊滅萊鄫恃其公行賂於魯萊恃其私有賂於齊卒皆見滅以此知其不可有所恃萊雖小國亦不易取齊自是年中圍萊至十二月方滅萊以此見萊亦不専是倚仗夙沙衞冬叔孫豹如邾季孫宿如晉謝湜曰宿行父子行父卒未期而季孫宿出聘大夫之釋喪從事也十有二月齊侯滅萊謝湜曰齊為萊病久矣至是滅萊七年春郯子來朝夏四月三卜郊不從乃免牲小邾子來朝城費謝湜曰費季氏邑季氏専魯故城費家邑過制而不知禁此季氏所以耦國胡安國曰費季氏邑也按左氏南遺為費宰叔仲昭伯為隊正欲善季氏而求媚於南遺謂遺請城費吾多與而役故季氏城費夫文子相三君無衣帛之妾無食粟之馬無藏金玉無重器備則固忠於公室而不顧其所食之私邑也及行父卒宿之不忠遂専魯國之政羣小媚之無故勞民妄興是役季氏益張其後孔子行乎季孫三月不違至於帥師墮費其越禮不度可知矣然則書城費乃履霜堅冰之戒强私家弱公室之萌據事直書而義自見矣用人不唯其賢惟其世豈不殆哉秋季孫宿如衞八月螽冬十月衞侯使孫林父來聘壬戍及孫林父盟楚公子貞帥師圍陳十有二月公會晉侯宋公陳侯衞侯曹伯莒子邾子于鄬謝湜曰會于鄬謀救陳也楚師圍陳三月矣而諸侯方會于鄬以諸侯畏楚出救之緩也不書救陳著其救陳之不力也鄬鄭地鄭伯髠頑如會未見諸侯丙戌卒于鄵謝湜曰諸侯卒名鄭伯如會名者為如會而卒故也楚之圍陳也僖公懼楚又懼晉故鄬之會獨後諸侯書鄭伯如會著其後時也鄭伯以出會後時不為諸侯所見故未見諸侯而卒書未見諸侯著諸侯之不義也鄵鄭地諸侯卒于外書地重之也胡安國曰按鄭僖公三傳皆以為弑而春秋書卒者左氏則曰以瘧疾赴也公羊則曰為中國諱也榖梁夫天下之惡莫大乎弑君聲罪致討大義也而可以偽赴又順其欲而不彰則亂臣賊子免於見討而春秋非傳信之書矣然則弑而書卒公羊以為為中國諱以視左氏偽赴之説為較優疑得聖人之意故習其説者未之察耳夫弑君之賊其惡不待貶絶而自見矣見弑者豈無不善之積以及其身者乎衞桓則以嫡母無寵宋殤則以亟戰疲民齊襄則以行同鳥獸鄭夷則以侮慢大臣蔡固則以滛而不父陳平國則以殺諫臣而通于夏氏楚䖍則以多行無禮奚齊則以嬖孽而國人不之君吳餘祭則以輕近刑人而晉州蒲欲盡去羣大臣而立其左右也若夫鄭僖公則異於是矣晉也者諸夏之盟主也楚也者借王之盗芋也僖公欲從諸侯會于鄬則是貴禮義為中國之君也諸大夫欲背諸夏與荆楚則是敢于黨惡僣亂之臣也以中國之君而見弑於僣亂之臣豈有不善之積以及其身者乎聖人至是傷之甚懼之甚故變文而書曰鄭伯髠頑如會未見諸侯丙戌卒于鄵未見諸侯其曰如會何致其志也諸侯卒于境内不地鄵鄭邑也其曰卒于鄵見其弑而隱之也卒鄭伯逃歸陳侯聖人之㫖微而公榖之義精矣存天理抑人欲之意逺矣陳侯逃歸謝湜曰陳國被圍陳公子黄見執難固大矣然晉合諸侯會陳于鄬有救陳之志也哀公不能效死以從中國責諸侯以捍禦之力戒臣民以死國之義一日背棄列國若匹夫懼難奔逃國君守衞社稷之忠不復見矣書曰逃歸罪其失人君之道也救難之師如解焚溺以死力率諸侯赴楚救陳之道也楚之圍陳也諸侯書會鄬鄭伯書如㑹陳侯書逃歸晉失救陳之道由此見矣其不能保陳可知也胡安國曰榖梁子曰逃義曰逃逃者匹夫之事上二年諸侯戍陳今楚令尹來伐諸侯又救之亦既勤矣為陳侯計者下令國中大申儆備立太子以固守親聽命於諸侯謀禦敵之䇿當是時晉君方明八卿和睦諸侯聽命必能致力於陳矣不此之顧棄儀衞而逃歸此匹夫之事耳夫義路也禮門也輕棄中國惟楚人之懼是不能由是路出入是門故書逃歸以罪之可謂深切著明矣八年春王正月公如晉謝湜曰公懼難故數朝晉夏𦵏鄭僖公謝湜曰僖公書𦵏則鄵之卒非子駟行逆明矣鄭人侵蔡獲蔡公子變謝湜曰蔡楚之屬也鄭不恤楚難既以不道侵蔡又以不道獲其大夫取禍之道也不書戰及敗者非敗掩不備而獲之也故子産曰小國無文徳而有武功禍莫大焉季孫宿會晉侯鄭伯齊人宋人衞人邾人于邢丘謝湜曰邢丘之會以鄭有蔡功而會之也襄公在晉而季孫宿出會晉侯魯國權在季氏故也晉為盟主而尊臣抑君何以率諸侯邢丘晉地胡安國曰蘇轍曰晉悼公修文襄之業改命朝聘之數使諸侯之大夫聽命於會大夫稱人衆詞也朝聘之節儉而有禮衆之所安也臣則以為大夫稱人貶之也昔周公戒成王以繼自今我其立政立事夫不自為政而委於臣下是以國之利器示人而不知寳也朝聘事之大者重頌諸侯而使大夫聽命無乃以姑息愛人而不由徳乎使政在大夫而諸侯失國又豈所以愛之也後此八年溴梁之會悼公初沒諸侯皆在而大夫獨盟君若贅旒夫豈一朝一夕之故哉故邢丘之事魯公在晉而季孫宿㑹見魯之失政也諸侯之大夫貶而稱人謹其始也公至自晉莒人伐我東鄙謝湜曰莒既滅鄫魯侵其西界故莒人來伐莒魯不義其罪一也秋九月大雩冬楚公子貞帥師伐鄭謝湜曰鄭人侵蔡獲蔡公子燮故楚師不旋踵伐鄭公子貞五年伐陳七年圍陳八年伐鄭楚一大夫而列國之師累嵗不能制中國治政不葺可知也悼公欲為霸主而會盟兵革累嵗不得息肩中國人民疲困可知也胡安國曰齊宣王問於孟子曰交鄰國有道乎孟子曰有惟智者為能以小事大故太王事薰鬻勾踐事吳以小事大者畏天者也畏天者保其國鄭介大國之間困强楚之令而欲息肩於晉若能信任仁賢明其刑政經畫財賦以禮法自守而親比四鄰必能保其封境荆楚雖大何畏焉而子耳子國加兵於蔡獲公子燮無故怒楚所謂不修文徳而有武功者也楚人來討不從則力不能敵從之則晉師必至故國人皆喜而子産獨不順焉以晉楚争鄭自兹弗得寧矣是以獲公子燮特書侵蔡以罪之而公子貞來伐鄭及楚平不復書矣平而不書以見鄭之屈服於楚而不信也犧牲玉帛待於境上以待强者而請盟其能國乎晉侯使士匄來聘九年春宋災謝湜曰大火所害者衆故書宋災凡稱災天降之禍而為之災也火隂中之陽也陽氣偏勝則火乗物為災夏季孫宿如晉謝湜曰宿報士匄聘五月辛酉夫人姜氏薨謝湜曰姜氏宣公夫人成公母秋八月癸未𦵏我小君穆姜冬公會晉侯宋公衞侯曹伯莒子邾子滕子薛伯把伯小邾子齊世子光伐鄭十有二月己亥同盟于戲謝湜曰公子貞之伐鄭也鄭子駟請從楚以紓民乃及楚平以鄭從楚故諸侯伐鄭以鄭服故盟于戲戲鄭地也以鄭服而盟故書同盟以小事大惟智與信而已智以行之信以終之完守仗信保國之道也鄭之從晉失此道矣故鄭人困於兵革而不得寧也胡安國曰鄭之見伐於楚子展曰小國無信兵亂日至亡無日矣請完守以老楚仗信以待晉其䇿未為失也而子駟遂及楚盟於是晉師至矣諸侯伐鄭晉人令於列國修器備盛糇糧歸老幼居疾于虎牢肆眚圍鄭鄭人恐乃行成荀偃曰逐圍之以待楚人之救而與之戰不然無成知罃曰許之盟而還師以敝楚吾三分四軍與諸侯之鋭以逆來者於我未病楚不能矣猶愈於戰暴骨以逞不可以争大勞未艾君子勞心小人勞力先王之制也乃許鄭成同盟于戲夫善為國者不師善師者不陣善陣者不戰知武子明於善陣之法以佐晉悼公屢與諸侯伐鄭楚輒救之而不與之戰楚子遂屈得善勝之道矣故下書蕭魚之會以美之楚子伐鄭謝湜曰諸侯之伐鄭也鄭人恐行成以鄭從晉故楚伐鄭方是時鄭能完守以備楚恃信以求晉晉有大援而楚不能加暴於我則小國之難解矣惟鄭二三其徳而内無固守之忠故春秋著其禍而責之也春秋集義卷三十八

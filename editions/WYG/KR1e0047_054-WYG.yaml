body:
  text: 書後六經皆聖人之書也而孔子之門人曰子所雅言詩書執禮皆雅言也而樂不與焉則樂深矣而況易春秋乎哉夫子晩而學易韋編至於三絶嚴之也春秋之作游夏不能措一辭嚴矣哉孟子有見於此曰孔子作春秋而亂臣賊子懼以紀周公膺戎狄之功聖人筆削之嚴使亂臣賊子歴千百世而知懼蓋三代之後一王之法不行而以筆削代賞罰之公也賞罰之權衡非聖人孰能操之乎莽操盜之雄也以春秋而知所懼習焉而不懼則春秋亡矣夷狄之亂華自中國之三綱五常蕩壊始故曰其所由來者漸矣學春秋者當於名分焉求之以防其漸可也自有天地以來要不可使隂侵陽故易與春秋合也本朝諸儒論春秋者多矣濮巖李明復伯勇集濂溪先生以下諸儒所相授受者十六家名曰春秋精義蓋裒講解之辭而言之耳伯勇中原故家文正之後而家於濮濂溪先生嘗仕於濮故山陽度周卿聞其風而起敬鶴峯魏華父悅其道而請益皆濂溪之徒也陽安劉之祖於學則疎而不能博於六經之義則粗而不能精周卿與伯勇甫書使不逺數百里來叩一言其亦謂其皆自孔氏之門也歟因附一言於諸公之後嘉定十四年閏臘之八日

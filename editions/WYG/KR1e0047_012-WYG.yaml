body:
  text: 春秋集義卷九宋李明復撰桓公九年春紀季姜歸扵京師程頥曰書王國之事不可用無王之月故書時而已或曰借如正月日食則如何書之曰書春日食則其義已明也王后之歸天下當有其禮諸侯莫至是不能母天下也故書紀女歸而已程氏學曰季姜王后王后天下之母也所過諸侯之國冝如何而周衰諸侯不臣過魯而無臣子之禮但書紀季姜歸扵京師爾書此而魯罪自顯也謝湜曰王后天下之母也后適諸侯諸侯莫敢有其國其來也出國而迎其去也出國而送禮也周室衰㣲諸侯事主后無臣子之心而送迎之禮皆廢矣扵后之過魯禮容不若王后之尊也乃紀之季姜歸扵京師而已春秋逆稱王后歸稱紀姜而魯國失事王后之道其惡顯矣王后與天王敵體必擇大國賢淑以為配詩曰大邦有子是也今也以小邦季女歸扵京師以紀之㣲耦京師之大其逆也慢而不㳟其歸也卑而不尊非所以配天子也胡安國曰徃逆則稱王后旣歸何以書季姜自逆者而言則當尊崇其匹内主六宫之政使妃妾不得以上僣故從天王所命而稱王后示天下之母儀也自歸者而言則當樛屈逮下使夫人嬪婦皆得進御扵君而無嫉妬之心故從父母所子而稱季姜化天下以婦道也其辭之抑揚上下進退先後各有所當而不相悖皆正始之道王化之基春秋之所謹也京師者衆大之稱夏四月秋七月冬曹伯使其世子射姑來朝程頥曰曹伯有疾不能親行故使其世子來朝春秋之時君疾而使世子出取危亂之道程氏雜説曰元年冬曹伯使其世子射姑來朝十年正月曹伯終生卒然則九年冬曹伯固已有疾而使世子來朝是危道也大位姦之窺也危病邪之伺也世子君之貳也君病而世子出豈不危哉使世子來朝曹伯之非也從曹伯之命以來世子之非交譏之也謝湜曰曹桓公扵疾病之中使世子出朝扵魯者將以求援扵大國也世子君之貳國之本也自古姦人窺伺之釁常起扵國君危病之時曹伯知求援扵外而不知慮患扵内失之大也使世子出朝曹伯之失也從曹伯之命來朝世子之失也國無忠正大臣而君父失防㣲杜患之機世子失視膳守國之道春秋危之胡安國曰按周官典命凢諸侯之嫡子誓扵天子而攝其君則下其君之禮一等未誓則以皮帛繼子男世子固有出㑹朝聘之儀矣然攝其君繼子男謂諸侯朝扵天子有時而不敢後故老疾而使世子攝已事以見天子急述職也諸侯同扵王事則相朝其禮本無時曹伯旣有疾何急扵相朝而使世子攝哉大位姦之窺也危病邪之伺也世子君之貳也君病而儲副出啟窺伺之心危道也當享而射姑歎踰月而終生卒其有疾明矣而使世子來終生之過也世子將欲己乎則方命矣曰孝子盡道以事其親者也不盡道而茍焉以從命為孝又焉得為孝故尸子曰夫已多乎道十年春王正月謝湜曰桓之罪非特不敬王也敗人倫滅天理王道絶矣故桓不書王者十四年雖然王者奉天所為而逹之人也王之道天之理也天理未嘗絶扵人心則王道未嘗絶扵天下故十年十八年復書王十年數之終也十八年桓之終年也二年書王所以存王法十年十八年書王所以明王道然則王道非絶也桓自絶扵王也故董子曰周道非亡也幽厲不由也胡安國曰桓無王今復書王何也十者盈數也天道十年則亦周矣人事十年則亦變矣故易稱守貞者十年而必反傳論逺惡者十年而必棄桓公至是其數已盈冝見誅扵天人矣十年書王紀常理也有習扵糓梁子而不得其傳者見二年書王以為正與夷之卒此年書王而曹伯適薨遂附益之以為正終生之卒誤矣果正諸侯之卒不縁簒弑者陳侯鮑在五年之正月曷不書王以正其卒乎庚申曹伯終生卒謝湜曰曹伯以有疾使其子出朝故世子冬來朝曹伯春正月卒夏五月𦵏曹桓公秋公㑹衞侯扵桃丘弗遇程氏雜説曰公㑹衞侯扵桃丘弗遇罪衞侯之不信也且是冬十二月丙午齊侯衞侯鄭伯來戰扵郎我直彼曲見衞之罪矣謝湜曰桃丘之㑹衞侯違約更與齊鄭故公徃弗遇諸侯相交以信為主内外相親相恤相救相助而疆境無一日之患者皆本扵信而已交不以信而祸患不起者未之有也以千乘之君結隣國之好㑹有期矣而變生扵心諸侯反覆未有甚扵此者也諸侯反覆則祸害隨之矣交際之道其可不慮哉故春秋書弗遇以著衞侯之失信也胡安國曰弗者遷辭惡失信也衞􅀄約魯扵桃丘至是中變而從齊鄭扵是乎有郎之師其戰扵郎直書曰來盟扵惡曹俱奪其爵則桃丘之弗遇也蓋惡衞侯之失信矣桃丘衞地冬十有二月丙午齊侯衞侯鄭伯來戰扵郎程頥曰來戰扵郎三國為主程氏學曰齊侯衞侯鄭伯來戰扵郎春秋之中諸侯加兵扵魯者不為少矣而未有書來戰者此不言侵伐而以來戰為文則彼曲我直義坦然左氏載其事曰我有辭也我則有禮彼反悖道縱欲而以興戎故特曰來戰以甚三國之惡也謝湜曰侯尊伯卑魯以周班後鄭禮也三國以鄭忽私怨興兵衞侯背桃丘之期以與齊鄭彼曲我直可知也郎之戰我非有過也我非犯彼也我非與彼校也而三國以私怨來攻魯之交兵則有義矣春秋獨書三國來戰以明魯之直也明魯之直以罪三國之曲也國祸莫大扵兵兵祸莫大扵戰故春秋戰分主客以正諸侯首祸之惡也鄭為兵主其次在下者孔子復以周班正其失也三國用兵不義其罪已明故不書侵伐胡安國曰春秋加兵扵魯衆矣未有書來戰者此獨不稱侵伐而以來戰為文何也兵㓙器戰危事聖人之所重也誅暴禁亂敵加扵已蓋有不得已而應之者矣未有背道縱欲得已不已而先之者也魯桓弑立天下大惡人之所得討也鄭伯則首盟扵越以定其位齊侯則繼㑹扵稷以濟其姦曽不能修方伯之職駐師境上聲罪致討伸天下之大義也今特以私忿小怨親帥其師戰扵魯境尚為知類也哉此春秋之所必誅而不以聽也故以三國為主而書來戰扵郎鄭人主兵而首齊猶衞州吁主兵而先宋十有一年春正月齊人衞人鄭人盟扵惡曹程氏學曰十年冬十一月齊侯衞侯鄭伯來戰扵郎十一年正月齊人衞人鄭人盟扵惡曹蓋所盟者廼齊侯衞侯鄭伯也書人者貶其爵也惡三國不道興兵復結怨固黨以為此盟前書來者此奪其爵與公㑹衞侯桃丘弗遇事義叅見曲直尤明謝湜曰三國十有二月來戰正月盟扵惡曹然則盟者齊侯衞侯鄭伯也奪爵書人貶之也搆怨連祸兵之大戒其來也旣以不義戰人之境矣其還也又以不義固黨為盟有連祸之心焉故春秋黜之胡安國曰盟㑹皆君臣之禮故㣲者之盟㑹不志扵春秋凢春秋所志必有君與貴大夫居其間者也惡曹之盟即三國之君矣旣不以道興師為郎之戰又結怨固黨為惡曹之盟故前書其爵而以來戰著罪後書此盟而以奪爵示貶夏五月癸未鄭伯寤生卒胡安國曰鄭莊公志殺其弟使餬其口扵四方自以為保國之計得也然身歿未㡬而世嫡出奔庶孽奪正公子五爭兵革不息忽儀舋突之際其祸㦧矣亂之􅀄生也起扵一念之不善後世則而象之至扵兄弟相殘國内大亂民人思保其室家而不得不亦酷乎有國者所以必循天理而不可以私欲滅之也莊公之事可以為永鑒矣秋七月𦵏鄭莊公九月宋人執鄭祭仲突歸扵鄭鄭忽出奔衞程頥曰突不稱公子不可以有國也鄭忽出奔衞忽國氏正也不能有其位故不爵程氏學曰十一年九月宋人執鄭祭仲突歸扵鄭鄭忽出奔衞鄭莊公旣𦵏而忽出奔廼名者絶也何則忽鄭之世嫡不能自固其位以致扵出奔扵詩其迹備見有女同車則刺無大國之助山有扶蘇則刺所美非美然籜兮則刺君弱臣強不唱而和狡童則刺不能與賢人圖事權臣擅命也由忽不能自固進退之權在扵祭仲故宋因而執之出忽而立突突曰歸者易辭也祭仲被執故突歸為無難忽出為已絶也十五年復歸扵鄭乃曰鄭世子忽何也曰扵此尤足以見前之失國也世子者忽之舊也復歸而惟世子之號存則忽已亡其君位可知矣楊時曰鄭人以忽為狂狡之童思大國之正已不以為君也故春秋書曰忽出奔扵衞不書鄭伯不以為君與書鄭伯突出奔扵蔡異矣謝湜曰國有權臣則上下易分生殺廢置惟其所命故宋之改立鄭君也執鄭一祭仲而鄭國君位遷矣春秋首書宋執祭仲而繼以突歸忽出以明鄭國進退之權皆出祭仲也突公子也不以國氏者責其非正也忽君也稱名不稱子以其絶扵國人也鄭莊公之卒也忽以世子嗣位已五月矣政不足以結人心徳不足以保君位美狂狡以為忠良矜小亷以失大援賢人棄外而國命擅扵私門君道㣲弱而倡和行扵叔伯由此命令皆出權臣而其勢與匹夫不異故宋人誘祭仲而執之也突有臣民歸從而忽無左右之助矣由此突反歸國而忽反出奔扵衞也然則突非正也非正而扵入稱歸以咎忽之失人心也忽正也正而扵出稱名以咎忽之失君位也其扵突也去國以明非正稱歸以明得國其扵忽也稱國以明正去爵以示絶而突之進不由正忽之䘮失君道其惡􅂋矣歸内辭入外辭扵歸而稱入扵入而稱歸皆春秋變文以示義也祭仲單伯女叔皆命大夫故稱字公羊以為賢祭仲不稱名誤矣逐君而謂之知權非訓也胡安國曰祭仲鄭相也見執扵宋使出其君而立不正罪較然矣何以不名命大夫也命大夫而稱字非賢之也乃尊王命貴正卿大祭仲之罪以深責之也其意若曰以天子命大夫為諸侯相而執其政柄事權重矣固將下庇其身而上使其君保安富尊榮之位也今乃至扵見執廢絀其君而立其非所立者不亦甚乎任之重者責之深祭仲無所逃其罪矣春秋美惡不嫌同辭突之書名則本非有國由祭仲立之也若忽則以世嫡之正至扵見逐不能立乎其位貴賤之分亡矣凢此類抑揚其辭皆仲尼親筆非國史所能與而先儒或以從赴告而書者則誤矣或曰孔父賢而書名則曰禮之大節也今此則名其君扵下而字其臣扵上何以異乎曰春秋者輕重之權衡也變而不失其正之謂權常而不過扵中之謂正宋殤孔父道其常祭仲昭公語其變惟可與權者其知之矣又曰突不稱公子絶之也小白入扵齊則曰齊小白突歸扵鄭何以不稱鄭突乎以小白繫之齊者明桓公之冝有齊也不以突繫之鄭者正厲公不當立也突不當立何以書歸扵鄭乎春秋書歸有二義一易辭也一順辭也其書入亦有二義一難辭也一逆辭也突以庶奪正固為不順矣然内則權臣許之立外則大國為之援而世子忽之才不能以自固也則其歸無難故糓梁子曰歸易辭也又曰忽以國氏正也出奔而名不能君也攷扵詩有女同車刺無大國之助也山有扶蘇所美非美然也籜兮君弱臣強不唱而和也狡童不能與賢臣圖事權臣擅命也夫以狡童目其君聖人猶録其詩所以見忽之失國亦其自取非獨仲之罪矣或曰詩人刺忽之不昏扵齊至扵見逐欲固其位者必待大國之援乎曰此獨為鄭忽言也如忽之為人茍無大援則不能立爾若夫志士仁人卓然有以自立者進退之權在我矣鄭自五霸之後益以侵削他日子産相焉馳辭執禮以當晉楚至扵壊諸侯之館垣郤逆女之公子扵野皆變其常度以晉楚之強卒莫能屈亦待大國之助乎然則仲見挾忽出奔咸其自取焉耳春秋書法如此欲人自強扵為善也朱熹曰蘇轍解春秋謂其從赴告此説亦是旣書鄭伯突又書鄭世子忽㨿史文而書耳柔㑹宋公陳侯蔡叔盟扵折謝湜曰柔不氏未賜族公㑹宋公扵夫鐘冬十有二月公㑹宋公扵闞謝湜曰夫鐘郕地闞魯地胡安國曰臣與宋公盟扵折君與宋公㑹扵夫鐘扵闞扵虗扵龜皆存而不削何其辭費也曰盟者春秋所惡而屢盟以長亂㑹者諸侯所不得而數㑹以厚疑聖人皆存而不削扵是見屢盟而卒叛數㑹而卒離其事可謂著明矣是故春秋之志在扵天下為公講信修睦不以㑹盟為可恃也十有二年春正月夏六月壬寅公㑹杞侯莒子盟扵曲地謝湜曰左氏謂平杞莒秋七月丁亥公㑹宋公燕人盟扵糓丘謝湜曰左氏謂欲平宋鄭八月壬辰陳侯躍卒謝湜曰陳侯陳厲公魯不㑹𦵏故不書𦵏公㑹宋公扵虗冬十有一月公㑹宋公扵龜謝湜曰左氏謂宋未成故又㑹扵虗㑹扵龜丙戌公㑹鄭伯盟扵武父謝湜曰左氏謂宋公辭平故與鄭伯盟丙戌衞侯晉卒十有二月及鄭師伐宋丁未戰扵宋程氏學曰春秋書戰以戰之者為客受戰者為主以此見聖人深意蓋彼無義來戰則必上告扵天子次告扵方伯近赴扵鄰國不如是而與之戰則聖人所以深責之也若不得已而與戰者則異文以示意來戰扵郎及齊師戰扵乾時之類是也謝湜曰六與宋為盟欲以平鄭扵宋也以宋公辭平由是㑹鄭伯盟武父與鄭師伐宋戰焉宋公辭平宋則有過矣二國忿宋入戰扵宋是又師之暴者也宋之不服也諭以義示以禮懐以徳需其不變然後以王命誅其為亂者焉宋人莫不簞食壺漿以迎王師而戰之祸弭矣豈若二國為宋之祸哉故春秋上書伐宋以罪宋之辭平下書戰扵宋以正二國之不道也來戰扵郎彼來戰扵吾境也戰扵宋我徃戰扵彼國也郎戰由彼宋戰由我魯宋有不校之心故宋郎皆以獨戰為文凢内戰公敗則書戰不書敗以敗為耻也戰不書公諱之也敵敗則書敗不書戰以敗之為耻也敗則書公不諱也伐宋者公也戰則知其為敗矣故諱不書公胡安國曰旣書伐宋又書戰扵宋者責賂扵鄭而無厭屢盟扵魯而無信者宋也二國深其罪以致討故書曰伐夫宋人之罪則固可伐矣取其賂以立督者魯桓也資其力以簒國者鄭突也無諸已然後可以非諸人春秋之義用賢治不肖不以亂易亂也故又書曰戰扵宋來戰者罪在彼戰扵郎是也徃戰者罪在内戰扵宋是也十有三年春二月公㑹紀侯鄭伯己已及齊侯宋公衞侯燕人戰齊師宋師衞師燕師敗績謝湜曰公㑹紀侯鄭伯則紀為兵主可知也公㑹紀侯鄭伯及齊侯宋公衞侯燕人戰則紀為戰主可知也戰不書地戰扵紀也齊有滅紀之志乆矣故四國以師犯紀紀恃魯鄭為援故㑹二國及四國戰扵紀齊大紀小為紀侯者以事大之智事齊可也竭事大之智而不得免以王命諭齊而屈焉可也諭以王命而不得免謹城池􅎖守備與民守之可也今乃恃魯鄭一日之助出與四國交兵失事大之道矣非所以保國也故紀之戰春秋以紀侯為戰主而罪之也兵以義勝兵出無義則雖大不足以勝小齊侯以威勢廹脅小國而不戒小之可虞故四國師衆敗績扵紀三國先㑹後戰需齊之來故也戰重事故書日用兵有克有敗列國大戰二十有三而春秋書敗不書克者蓋不書克所以抑戰功書敗所以為天下戒燕廹夷始通中國故稱人齊五年如紀今又戰扵紀然則齊恃大廹小其罪已明故不書侵伐左氏謂宋多責賂鄭不堪命故以紀魯及四國戰誤矣以其事與經所書違戾故也胡安國曰左氏以為鄭與宋戰公羊以為宋與魯戰糓梁以為紀與齊戰趙子攷㨿經文内兵則以紀為主而先扵鄭外兵則以齊為主而先扵宋獨取糓梁之說蓋齊紀者世讐也齊人合三國以攻紀魯鄭援紀而與戰戰而不地扵紀也不然紀懼滅亡不暇何敢將兵越國助魯鄭以増怨乎齊為無道恃強凌弱此以紀為主何也彼為無道加兵扵已必有引咎責躬之事禮義辨喻之文猶不得免焉則亦固其封疆効死以守上訴諸天子下告諸方伯連帥與鄰國之諸侯其必有伸之者矣不如是而憤然與戰豈已亂之道乎力同度徳動則相時小國讐大國而幸勝焉祸之始也息伐鄭而亡鄭勝蔡而懼蔡敗楚而滅今紀人不度道不量力不徴辭輕與齊戰而為之援者弑君之賊簒國之人也不能保其國自此戰始春秋以紀為主省徳相時自治之意也三月𦵏衞宣公胡安國曰𦵏自内録也旣與衞人戰曷為𦵏宣公怨不棄義怒不廢禮是知古人以𦵏為重也禮䘮在殯孤無外事衞宣未𦵏朔乃即戎已為失禮又不稱子是以吉服從金革之事其為惡大矣凡此類㨿事直書年月具存而惡自見也夏大水秋七月冬十月十有四年春正月公㑹鄭伯扵曹謝湜曰鄭厲公不堪宋求背宋與魯故自武父盟後公與鄭師伐宋與鄭伯㑹紀戰今又㑹扵曹無氷謝湜曰陽氣不歛而温故水不成氷胡安國曰按􅃎風七月周公陳王業之詩也其辭曰二之日鑿氷沖沖三之日納扵陵隂四之日其蚤獻羔祭韭周官凌人之職頒氷扵夏其藏之也固隂沍寒扵是乎取其出之也賔食䘮祭扵是乎用藏之周用之徧亦理隂陽天地之一事也今在仲冬之月燠而無氷則政治縱弛不明之所致也故書扵䇿夫春秋所載皆經邦大訓而書法若此其察扵四時寒暑之變詳矣夏五胡安國曰夏五傳疑也疑而不益見聖人之慎也故其自言曰吾猶及史之闕文也其語人曰多聞闕疑慎言其餘則寡尤或以私意改易古書者有矣蓋亦視此為鍳可也然則春秋何以謂之作曰其義則斷自聖心或筆或削明聖人之大用其事則因舊史有可損而不能益也鄭伯使其弟語來盟謝湜曰來盟者彼來盟扵我也蒞盟者我就盟扵彼也語鄭伯母弟史䇿所載不詳以意逆之蓋與齊侯使弟年同意胡安國曰來盟稱使則前定之盟也其不稱使如楚屈完齊髙子則權在二子盟特未定也諸侯之弟兄例以字通而書名者罪其有寵愛之私非友于之義也吕祖謙曰此公孫之子以王父為氏者故杜注云其後為子人氏秋八月壬申御廪災乙亥嘗謝湜曰御廪君親耕以奉粢盛之廪也御廪天祸而災之桓公之行不為神饗可知也嘗秋祭嘗不以秋非時也因災而嘗非孝也桓公不知感時念親以事祖考乃因廪災之變嘗禮興焉悽愴愛敬之心無復見矣春秋書八月書災嘗著其失禮之大也胡安國曰門觀災而新作則書御廪粢盛之所藏其新必矣何以不書營宫室以宗廟為先重本也御廪災而新則不書常事也以為常事而不書垂教之意深矣知其説者然後知有國之急務為政之後先雖勤扵工築而民不怨勞與妄興土木困民力以自奉者異矣冬十有二月丁已齊侯禄父卒宋人以齊人蔡人衞人陳人伐鄭程氏學曰宋人以齊人蔡人衞人陳人伐鄭以者用也宋人為主乎伐鄭而用齊人蔡人衞人陳人也凡諸侯之國甲兵有制皆統乎天子廼敢私用之與私為之用以伐人之國大亂之道也他書以某師者倣此謝湜曰伐鄭宋為之主其伐鄭假四國之兵而用之故書以以用也古者甲兵其數皆統扵王非諸侯所得私用也故兵無妄舉而征伐之權一出扵上諸侯私假私用則兵出不復有制矣宋人伐鄭書以罪其私用也此國私用之彼國私為之用其罪一也胡安國曰師而曰以者能左右之以行己意也宋怨鄭突之背已故以四國伐鄭魯怨齊人之侵已故以楚師伐齊蔡怨嚢克之拘已故以吳子伐楚蔡弱扵吳魯弱扵楚宋與蔡衞陳敵而弱扵齊乃用其師以行己意故特書曰以列國之兵有制皆統乎天子而敢私用之與私為之用以伐人國大亂之道也故糓梁子曰以者不以者也春秋集義卷九

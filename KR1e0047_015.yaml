body:
  text: 春秋集義卷十二宋李明復撰莊公四年春王二月夫人姜氏享齊侯于祝丘謝湜曰饗兩君相見之禮也饗禮在廟尚敬也夫人出饗齊侯黷禮之大也人無恥畏則無所不為故文姜初㑹齊侯扵禚次饗齊侯扵祝丘胡安國曰享者兩君之禮所以訓恭儉也兩君相見享扵廟中禮也犧象不出門嘉樂不野合非兩君相見又去其國而享諸侯甚矣三月紀伯姬卒程頥曰伯姬卒而紀國亡魯為父母兄弟之國反使齊侯葬之書此所以罪魯是謂文見扵此義起在彼者也或曰齊侯迫逐紀侯取其國而葬其妻義豈在此乎曰齊侯之惡不待貶絶而可知若魯之罪則聖人所以明㣲也謝湜曰先儒謂諸侯絶期無服内女惟諸侯夫人為之服大功故紀伯姬書卒禮者㳂情而為之文也有其情則服㳂而生豈有尊卑之異哉禮期䘮大夫三月不從政天子諸侯以日視朝則無三月廢政之禮故曰期之䘮逹乎大夫三年之䘮逹乎天子禮文不同以此而已先儒因此遂以諸侯絶期無服誤矣禮宗族有罪如其倫之䘮無服然則宗族無罪者諸侯皆為之也書紀伯姬卒則内女之嫁扵公子大夫而諸侯不為之服者其失見矣夏齊侯陳侯鄭伯遇于垂胡安國曰蘓轍曰鄭伯子儀也桓十五年書突出奔蔡忽歸扵鄭是年九月突入扵櫟十七年高渠彌弑忽立子亹十八年齊襄公殺子亹鄭人立子儀莊十四年突使傅瑕弑子儀而入則遇扵垂者子儀也然則鄭有二君可乎春秋有一國而二君者鄭突與儀衛衎與剽是也突衎始終為君子儀君鄭十有四年剽君衛十有一年皆能居者也故春秋因其實而君之然則孰與曰皆不與也突之入以簒衎之出以惡儀剽雖國人所立而突衎在焉非所以為安也故四人者春秋莫適與也皆不沒其實耳君子不幸而處扵此如子臧季札可也不如是則不正為此説者善矣然而鄭伯厲公非子儀也紀侯大去其國程頥語錄曰紀侯大去其國大名責在紀也非齊之罪也齊侯陳侯鄭伯遇扵垂方謀伐之紀侯遂去其國齊師未加而已去故非齊之罪也程氏學曰紀侯大去其國自去也大者紀侯名也生名之著失也按元年齊師遷紀郱鄑郚逼遷其邑志固在扵滅矣然兵未始加乎其國而紀遂不能守故三年秋紀季以􅈶入扵齊至是而紀侯大去其國也夫守天子之土承先祖之祀義莫重焉雖天下無王諸侯不道借使齊以兵臨我猶當率厲臣民申固備禦而為之守不幸而力不足者則亦死之可也惡有使弟以邑入齊而已委國去之哉先儒或擬以太王之事過矣茍有太王之徳民從之如歸市則為之可也彼尚未能效死而勿去何太王之足議哉故曰紀侯大去其國自去也梁亡自亡也鄭棄其師自棄也齊人殱扵遂自殱也四者皆自為之也謝湜曰大紀侯名紀侯去國稱名與寔來稱名同意紀侯奔走以事大國乆矣郱鄑郚見遷􅈶邑不保大國志扵滅紀亦乆矣雖然諸侯為天子守土宗廟社稷人民休戚所繫也竭力以事大國而不得免亦曰厲臣民嚴守備致死國之義以忠守之而已矣豈有懼禍及身而不為守國之計者哉豈有齊兵未涉其都而委國以去者哉紀侯之逼難也内無守國之心外無守國之備乃至季以邑入齊身棄國而出君道絶扵紀矣春秋書紀侯去其國罪其自去也書名罪其失國也太王去邠適岐邠人從之如市而終以有國太王之仁也孟子謂滕文公鑿池築城使民效死勿去諸侯之義也紀侯雖不若衛侯衎蔡侯朱之奔也雖不若蔡侯獻舞潞子嬰兒之臣服大國也然上無太王去邠之仁下無諸侯死社稷之義其扵隕廟社䘮人民其罪一也故名而絶之胡安國曰凡大閲大雩大蒐而謂之大者譏其僣也大無者志倉廪之竭也大去者土地人民儀章器物悉委置之而不頋也或曰以争國為小而不為以去國為大而為之者也夫守天子之土疆承先祖之祭祀義莫重焉委而去之無貶歟曰有國家者以義言之世守也非身之所能為則當效死而勿去以道言之不以其所以養人者害人亦可去而不守扵其二者顧所擇如何爾然則擬諸太王去邠之事可無愧矣曰太王去邠從之者如歸市紀侯去國日以㣲滅則何太王之可擬哉故聖人與其不争而去而不與其去而不存與其不争而去是以異扵失地之君而不名不與其去而不存是故書叔姬歸􅈶而不錄紀侯之卒明其為君之末矣胡宏曰若紀侯者非齊侯無道暴横之甚則能守其國家者也去太王則甚逺亦賢扵其他自取滅亡者矣故聖人書法如此六月乙丑齊侯葬紀伯姬謝湜曰紀國屬齊故伯姬之喪齊侯葬之魯父母之國也魯不能葬而齊侯葬之責魯失親親之道也葬以奉安死者逐其君取其國而為之葬其妻責齊侯葬伯姬之不義也胡安國曰葬不稱齊人而目其君者見齊襄迫逐紀侯使之去國雖夫人在殯而不及葬然後襄公之罪著矣或曰葬之禮也而以為著其罪何也弑魯君滅其婚姻之國而葬其女是猶加刃扵人以手撫之也而可以為禮乎斥言齊侯賤之也或曰惡其詐也如紀似禮存季似義葬伯姬似仁惡似而非者惡莠恐其亂苖也秋七月冬公及齊人狩于禚謝湜曰越國而狩亂之道也既無討難復讐之意且與齊人狩扵禚是與讐國同其樂而不知戚也子則如此何以正其親胡安國曰榖梁子曰齊人者齊侯也其曰人何也卑公之敵所以卑公也何為卑公不復讐而釋怨也父母之讐不共戴天兄弟之讐不與同國九族之讐不同鄉黨朋友之讐不同市朝今莊公扵齊侯不與戴天則無時焉可通也而與之狩是忘親怨非人子矣夫狩者馳騁田獵其為樂不主乎已一為乾豆其事上主乎宗廟以為有人心者宜扵此焉變故稱侯稱人魯公書及以著其罪五年春王正月夏夫人姜氏如齊師謝湜曰孫扵齊猶有畏心焉㑹扵禚饗扵祝丘則無所畏矣曰㑹曰饗猶有恥心焉如齊師則無所恥矣㑹非夫人之事饗又甚焉饗非夫人之事如齊師又甚焉慾之為患大矣慾茍肆焉則其心無所忌憚有如此者然則女子之慾可不制之扵㣲哉胡安國曰師者衆多之地按齊詩載驅刺襄公無禮義盛其車服疾驅扵通道大都與文姜滛之詩也其三章曰汶水湯湯行人彭彭魯道有蕩齊子翺翔彭彭者多貌也其四章曰汶水滔滔行人儦儦魯道有蕩齊子游敖儦儦者衆貎也曰㑹曰享猶為之名也至是如齊師羞惡之心忘矣夫人之行不可復制矣春秋書此以戒後世謹禮扵㣲慮患扵早之意也秋郳犁來來朝程頥曰郳犁來來修朝禮故書曰朝且其後數從中國諸侯之㑹王命以為小邾子葢扵此已能自進扵禮矣僖二十九年春介葛盧來冬介葛盧來襄十八年春白狄來則惟以夷禮不能成朝故直書曰來郳犁來介葛盧夷狄附庸例書名謝湜曰諸侯稱爵附庸之君稱字夷狄附庸稱名郳犁來介葛盧夷狄附庸故書名犁來之朝也能進扵禮故書朝葛盧白狄之朝也以夷俗進見而已未能修朝禮也故書來胡安國曰郳國也犁來名也國何以名夷狄之附庸也中國附庸例書字邾儀父蕭叔是也夷狄附庸例書名郳犁來介葛盧是也能修朝禮故特書曰朝其後王命以為小邾子葢扵此已能自進扵禮矣冬公㑹齊人宋人陳人蔡人伐衛程頥曰諸國稱人違抗王命也貶諸侯則魯在其中矣謝湜曰公㑹四國伐衛納朔四國葢非㣲者四國稱人貶之也王棄衛侯朔以罪而公㑹四國伐衛是違王命也故四國諸侯皆奪爵稱人四國稱人而公之惡見矣内無貶公之道故上書公以見諸侯下書人以示貶胡安國曰榖梁子曰是齊侯宋公也其曰人何也人諸侯所以人公也其人公何也逆王命也桓公十六年衛侯朔出奔齊經書其名者以王命而絶之也又黨有罪以納之故貶而稱人六年春王正月王人子突救衛程頥曰雖㣲稱字王人當尊也程氏學曰王人子突救衛衛侯朔有罪王當絶之而公㑹齊宋陳蔡伐衛以納朔是逆天王之命也王人㣲者例不書字子突救衛而字之是善之也善子突善王命也以王命之尊而得其所絶也齊宋陳蔡興師伐國而公與之同必非㣲者若非其君則卿也書人者貶之也内無貶公之道然王人之救嘉而書字四國之伐貶而稱人公之善惡從可見矣謝湜曰王人㣲者書字善之也諸侯伐衛而王人子突救衛葢天王主公子黔牟也宣公之終也以朔繼守社稷然則朔立正也諸侯之納朔也王主黔牟而出兵救之然則子突救衛王命也諸侯伐衛雖正然王以罪棄衛侯而絶之諸侯所不可違也為諸侯者明直辭伸正義反復進諫以聽王命可也豈可以臣子之見咈君父之意哉故諸侯伐衛皆書人罪諸侯之違王命也王人救衛書子突善子突之遵王命也胡安國曰王人㣲者子突其字也以下士之㣲超從大夫之例而書字者褒救衛也朔䧟其兄使至扵死罪固大矣然其父所立諸侯莫得而治也王治其舊惡而廢之可也又藉諸侯之力抗王命以入國是故四國之君貶而稱人王人之㣲嘉而書字或曰子突王之子弟也用兵大事而委諸子弟使無成功故書人以譏之必若此言是春秋以成敗論事而不計理也使諸侯茍顧順逆之理子突雖㣲自足以申王命矣彼既肆行莫之顧也雖天子親臨將有請從如祝𥅆者況其下乎子突不勝五國使之得入也其亦不幸焉爾矣幸不幸命也守義循理者法也君子行法以俟命故其褒貶如此夏六月衛侯朔入于衛秋公至自伐衛程頥曰朔搆其兄而使至扵死其罪大矣然父立之諸侯莫得而治也王治其舊惡而廢之宜也故書名書入程氏學曰衛侯出奔已名者以王命絶之也今入扵衛名者其位已絶又藉諸侯之力抗天子之命而入國故也王命天也天其可違乎違天逆理故朔終始名以重絶之也謝湜曰朔立正也黔牟之立非正也諸侯伐衛與正去不正也天王棄朔而主黔牟諸侯伐黔牟而主朔惠公入衛背天王而從諸侯也諸侯雖以與王為義然惠公以諸侯抗王則為逆故惠公之返國也書爵以示正書名以示當絶書入以示不當受是故子雖善父命有不可違臣雖正君命有不可逆胡安國曰入有二義一難辭也一逆辭也朔藉諸侯之力連五國之師距王官之㣲者以復歸扵衛其勢宜無難矣而書入者逆王命也春秋大義在扵天下為公選賢與能而不拘大人世及之禮雖以正取國未之貴也況殺其兄又逆王命乎故衛朔書名書入以著其惡王人書字書救以著其善外則諸侯書人内則莊公書至而春秋之情見矣螟冬齊人來歸衛俘謝湜曰伐衛納朔齊為兵首故齊人以衛寶頒魯納朔求賂魯與齊同惡故齊人以衛寶頒魯書歸胡安國曰俘者二傳以為寶按商書稱遂伐三朡俘厥寶玉則俘者正文也寶者葢釋辭也言齊歸衛寶即知四國皆受朔之賂矣春秋特書此事結正諸侯之罪也夫以弟弑君簒居其位上逆天王之命人理所不容矣彼諸侯者豈其弗察而援之甚力則未有以騐其喪心失志迷惑之端也及書齊人歸寶然後知其有欲貨之心而後動扵惡也世衰道㣲暴行交作狥扵貨寶賄賂公行使君臣父子終去仁義懐利以相與不致扵簒弑奪攘則不厭也春秋書此結正諸侯之罪垂戒明矣七年春夫人姜氏㑹齊侯于防夏四月辛邜夜恒星不見夜中星隕如雨謝湜曰陰陽精氣發見扵天為日月五行精氣發見扵天為星日既没而光復明故常星不見五行舛戾失常故星隕隕者非一皆自上而下故星隕如雨胡安國曰恒星者列星也如雨者言衆也人事感扵下則天變動扵上前此者五國連衡旅拒王命後此者齊桓晉文更伯中國政歸盟主而王室遂虚其為法度廢絶威信陵遲之象著矣漢成帝永始中亦有星隕之異而五侯擅權賊莾居攝漢之宗支掃蕩㡬盡天之示人顯矣春秋謹扵天象至矣謝湜曰恒星不見夜明星隠也夜中星隕如雨盖言星隕之多也秋大水無麥苗謝湜曰春秋書大水者七桓荘之世居多何也盖文姜是時屢㑹齊侯内行不修有子如荘公而不能制獨隂為水感召之故有自来矣以致沴戾成象而年穀不稔天人相與之際不誠可畏與胡安國曰書大水畏天災也無麥苗重民命也畏天災重民命見王者之心矣忽天災而不懼輕民命而不圖國之亡無日矣春秋所以謹之也冬夫人姜氏㑹齊侯于榖謝湜曰夫人惡甚扵前故一歳再㑹胡安國曰防魯地也榖齊地也初狩扵禚次享扵祝丘又次如齊師又一歳而再㑹焉其為惡益甚矣明年無知弑諸兒其禍滛之明驗也八年春王正月師次于郎以俟陳人蔡人謝湜曰魯師合陳蔡攻郕陳蔡及期不至故次即以俟其來甲午治兵謝湜曰以陳蔡不至故擇日治兵志扵攻郕故也國君治兵有時事起而後治兵兵不素習故也胡安國曰用大衆曰師次止也伐而次者有整兵慎戰之意其次善之也遂伐楚次扵陘是也救而次者有緩師畏敵之意其次譏之也次扵匡扵聶北扵雍榆是也俟而次者有無名妄動之意次扵郎以俟陳人蔡人是也何俟乎陳蔡而邀之也或曰魯將與陳蔡有事扵鄰國而陳蔡不至故次扵郎以待之也若是皆非義矣其曰次曰俟者深貶之也此治兵扵郎也俟而不至暴師露衆役乆不用則有失伍離次逃亡潰散之虞故復伸明軍法以整齊之其志非善之也譏黷武也夏師及齊師圍郕郕降于齊師秋師還程氏學曰春秋之世諸侯用師衆矣未有所書如此之詳者何則莊公此年之師尤為非義上既不由天子之命復無故而興師自正月至扵郎以俟陳蔡而陳蔡不至可謂無名矣甲午復治兵可謂黷武矣夏師及齊師圍郕郕又不服而降扵齊可謂無義矣厯三時而師還可謂害民矣夫逆天道親仇讐圍同姓勦民力與國不信伐國不服故聖人備書之以見其惡謝湜曰齊亦起師來攻故師及齊師圍郕我為兵主而郕人不服扵我故降扵齊師又曰郕已降齊魯不可復攻故師還莊公用兵扵郕可謂失道矣次師以俟陳蔡而陳蔡不㑹其期以我之出師無名也首興師衆圍郕而郕人聽命扵齊以我之伐國無義也陳蔡不與可以止矣猶以攻郕為事而甲午治兵郕已降齊可以退矣猶以服郕為意而渉秋師還與國不信伐國不服玩兵黷武乆而後已危國之道也胡安國曰書及齊師者親仇讐也圍郕者伐同姓也郕降扵齊師者見伐國無義而不得服也扵是莊公之失著矣書師還譏役乆也按左氏仲慶父請伐齊莊公不可是國君上將親興圍郕之役也然其次其及其還皆不稱公者重衆也春秋正例君將不稱帥師則以君為重今此不稱公又以衆為重何也輕舉大衆妄動乆役俟陳蔡而陳蔡不至圍郕而郕不服厯三時而後還則無名黷武非義害人未有如此之甚也至是師為重矣義繫扵師故不書公以著勞民毒害之罪為後戒也春秋扵王道輕重之權衡此類是也冬十有一月癸未齊無知弑其君諸兒謝湜曰無知僖公母弟年之子也衣服禮秩如適因以作亂然則公孫無知縁公孫之寵而出為大逆者也春秋奪其公孫所以絶其親而誅之也公子公孫恃子孫有繼承之道而肆為逆惡者衆矣故衛州吁黜其公子齊無知黜其公孫所以正大法也所以杜後世子孫争國之心也無知書齊與州吁書衛同意胡安國曰無知曷為不稱公孫而以國氏罪僖公也弑君者無知扵僖公何罪乎不以公孫之道待無知使恃寵而當國也按無知者夷仲年之子年者僖公母弟也私其同母異扵他弟施及其子衣服禮秩如適此亂本也故扵年之來聘特以弟書扵無知之弑不稱公孫著其有寵而當國也垂戒之義明矣古道親親與尊賢並行而不相悖故堯親九族必克明俊徳而後九族睦周封同姓必庸康叔蔡仲而後王室強徒知寵愛親屬而不急扵尊賢使為表儀以明親親之道必有簒弑之禍矣按左氏齊侯㳺扵姑棼遂田扵貝丘徒人費遇賊扵門先入㐲公出而鬭死石之棼如死扵階下是能死節者也春秋重死節之臣而法有特書其不見扵經何也如費等所謂便嬖私暱之臣逄君之惡田獵畢弋而不能修民事使百姓苦之者也與大臣孔父仇牧義形扵色不畏强禦以身死其軄則異矣當是時管仲隰朋鮑叔皆沉扵下僚不見庸也而徒人費石之棼如乃得居左右襄公之所踈逺親信如此故以齊國之强大一也桓公用之則九合諸侯不以兵車由親賢人逺小人所以興也襄公用之不能保其身死扵户下由親小人逺賢人所以亡也此二人雖死扵難與自經扵溝瀆而莫之知者猶不逮焉乃致亂之臣死不償責又何取乎呂祖謙曰看齊襄公湏看得每舉而每得志是其所以速襄公之死觀其當時滛侈無度肆行不道無不得志如一滅紀則紀侯大去其國纔以王人伐衛衛便服纔欲滅郕郕便降至扵欲㑹魯侯則魯侯至欲要姜氏則姜氏至每舉而每如意惟其得志之頻故所以為死期之速宜乎卒䧟無知之禍也春秋集義卷十二

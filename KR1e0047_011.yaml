body:
  text: 春秋集義卷八宋李明復撰桓公六年春正月實來程頥曰五年冬如曹尚為君也故以諸侯書之今不能反國則匹夫也故名之來來魯也忽稱鄭忽明其正也實不稱州州亡其國矣程氏學曰五年淳于公如曹度其國危遂不復六年春自曹來朝書曰實來不復其國也禮曰諸侯不生名失國則名之實者蓋州名也如曹之時未失國則以諸侯之尊而不名至春而來不復其國矣則是匹夫也故名之春秋之義正名而已名正而天下治矣謝湜曰實州公名州公之畏禍及身也自州適曹自曹適魯遂無返國之心左氏謂不復其國是也諸侯不生名失國則名州公之如曹也待以諸侯而不名者以其未失國也其適魯也待以匹夫而名之者以其不復其國也春秋以義正名義絶于民者非其民義絶于國者非其國民非其民國非其國則君道絶矣州公之適魯是也故春秋以匹夫名之而已以其不成朝故不書朝以其失國故不書國胡安國曰按左氏自曹來朝書曰實來不復其國實者州公名也春秋之法諸侯不生名失地滅同姓則名正名經世之本名正而天下定矣或曰諸侯失國而後託于諸侯孟子以為禮也今州公來朝將以諸侯之禮接之乎則春秋乃書其名將以匹夫之賤待之乎孟子乃以託國為禮將何處而可曰周道衰微諸侯放恣強凌弱衆暴寡天子不能正方伯不能治其有壤地𥚹小迫于大國之間而失國是不幸也非其罪也則以諸侯之禮接之可也談子在莒弦子在黃溫子在衛雖失國出奔而春秋不名義可見矣若夫不能修道以正其國或棄賢保佞或驕奢淫縱或用兵暴亂自底滅亡如蔡獻舞邾益曹陽州實之徒皆其自取焉耳則待之以𥘉乃禮之過也觀春秋名與不名則知所以處寓公之禮與強為善自暴棄者之勸戒矣夏四月公㑹紀侯于成程頥曰謀齊難也謝湜曰左氏謂紀來謀齊難也秋八月壬午大閲程頥曰為國之道武備不可廢必于農隙講𨽻保民守國之道也盛夏大閲妨農害人失政之甚無事而為之妄動也有警而為之教之不素何以保其國乎謝湜曰合國之車徒而閲之大閲之禮也兵凶器戰危事無故習之則民有恐心率民從事兵革則民有鬭心故大閲行于冬狩之時民不以兵革為事而兵革之事習于田獵之間內足以安固國家而外足以待不虞之變與八月之閲異矣八月大閲譏其講武于倉卒之間也書八月大閲而魯國兵不預習武不素治其失見矣書日志其謹也知謹其日而不知謹其時所謂棄其大而恤其小也大閲國事故不書公狩書公則以志其盤遊故也胡安國曰大閲簡車馬也周制大司馬中冬大閲教衆庶修戰法獨詳于三時者蓋為農隙故也書八月不時矣以鼓則王執路鼓諸侯執賁鼓以旗則王載太常諸侯載旗以殺則王下大綏諸侯下小綏其禮固亦不同也書大閲非禮矣先王寓軍政于四時之田訓民禦暴其備豫也懼鄭忽畏齊人不因田獵而閲兵車厲農失政甚矣何以保其國乎春秋非特以不時非禮書也乃天未隂雨徹彼桑土綢繆牖户之意蔡人殺陳他程頥曰他殺世子而竊位不能有其國故書曰陳陀陳厲公蔡出也故蔡桓侯殺他而立之他天下之惡人皆得而誅之蔡侯殺之實以私也故書蔡人見殺賊者衆人之公也謝湜曰陳桓公之卒也他殺太子免自立內無君道可以主國以至淫獵于蔡蔡人誘而殺之然則他立踰年不稱爵者以其為匹夫行以匹夫待之而已凡逆賊無內外無貴賤人人皆得殺之然則蔡殺他稱人者以其身有大罪未治以逆賊待之而已春秋他國禍亂不備書一事本末不備書書者皆以決危疑正得失立一王大義以為天下法故蔡殺他書他殺太子免不書胡安國曰他殺太子而代其位至是踰年不成其為君者以賊討也書蔡人以善蔡書陳陀以善陳善蔡者以蔡人知陀之為賊善陳者以陳國不以他為君知其為賊故稱人稱人者討賊之詞也不以為君故稱名稱名者當討之賊也魯桓弒君而鄭伯與之盟宋督弒君而四國納其賂則不知其為賊矣齊商人弒君者及其見殺則稱位蔡般弒父者及其見殺則稱爵是齊蔡國人皆以為君矣聖人于此抑揚豫奪遏人欲于橫流存天理于既滅見諸行事可謂深切著明矣篡弒之賊外則異國皆欲致討而不赦內則國人不以為君而莫之與誰敢動于為惡故曰孔子成春秋而亂臣賊子懼朱熹曰春秋蔡人殺陳陀此是夫子據魯史書之他之弒君𥘉不見于經者亦是魯史無之耳又曰陳他文公之子桓公之弟公疾病殺其太子免而代之公卒而他立明年為蔡人所殺此墓門之詩刺他而追咎先君不能為陀置良師傅以至此也又曰𥘉不曽見有陳陀蹤跡九月丁卯子同生程頥曰冢嫡之生國之大事故書程氏學曰傳曰立子以嫡者三代之逹禮也故有君薨而世子生之禮故曰植遺腹朝委裘而天下不亂由此道也周室衰微禮制大壞名分不明而民志不定是以惟私愛之徇下有長亂之階其禍非一日書子同生聖人所以正國家之大本而防後世之僣亂也子同者桓公之嫡長子也于其始生即書之其位固已定矣然則配嫡奪正之事何緣而生春秋之時魯有桓公之禍王室有子朝之難諸侯之國如此不可勝紀茍知聖人之志大法一定豈至是乎春秋大居正所以為萬世法可不戒哉楊時語録九月丁卯子同生曰子同者正名其為桓公之子也猗嗟之詩序曰人以為齊侯之子其詩曰展我甥兮則明莊公非齊侯之子矣以經考之莊公之生桓公之六年也至十八年始書夫人姜氏遂如齊而左傳因載申繻之諌與桓公適齊之事則前此文姜蓋未嘗如齊也未嘗如齊而人以莊公為齊侯之子春秋安得而不辨乎此春秋所以為别嫌明微也謝湜曰世子國之根本也繼世以嫡立嫡以長天下之大義也古者世子始生接以太牢負以士見之名之其禮皆與衆子不同所以尊之也尊世子所以明其分也世子之分明而君位定矣古者嫡庶異體長幼異等卧赤子朝委裘而天下不亂者以世子之位定于始生之時也子同桓之嫡長子也書子同生所以正其位也于子同始生書之而世子之位定矣春秋之亂嫡長之分不明東宫之位不正或寵庶以陵嫡或私幼以先長其立之也或臨老或臨病或臨薨皆非安國家之道也是以魯有公子慶父之亂宋有公子馮之亂衛有公子州吁之亂周有王子朝之亂方是時嫡長子生而知以世子生之禮尊之者子同一人而已故春秋謹書其生所以窒亂源而固國本也胡安國曰適冢始生即書于䇿與子之法也唐虞禪夏后殷周繼春秋兼帝王之道賢可禪則以天下為公而不拘于世及之禮子可繼則以天下為家而不必于讓國之義萬世之通道也與賢者責于得人與子者定于立嫡傳子以嫡天下之逹禮也故有君薨而世子未生之禮植遺腹朝委裘而天下不亂者以名分素明而民志定也經書子同生所以明與子之法正國家之本防後世配嫡奪正之事垂訓之義大矣此世子也其不曰世子何也天下無生而貴者誓于天子然後為世子朱熹曰按二年秋公子翬如齊逆女九月夫人姜氏至自齊六年九月子同生即莊公也十八年公與夫人如齊齊侯通焉則莊公非齊侯之子明矣以為齊侯之子者蓋傷莊公不能防間文姜失子之道而譏之爾冬紀侯來朝程頥曰紀侯懼齊來朝以求防不能上訴于天子近赴于諸侯和輯其人民效死以守而欲求援于魯桓不能保其國冝矣李侗語録謂紀侯來咨謀齊難志不在于朝桓故再朝無貶則是義理之正可以危急而棄之若果如此尤害義理春秋有誅意之說紀侯志不在于朝桓則非滕子之類也列國有急難以義而動又何貶耶紀侯來朝左氏作杞字後有入杞之事傳皆有說胡氏因公穀作紀字春秋似此之類者多如齊子紏二傳只云納紏伊川乃以二傳為證胡安國曰按左氏傳于郕咨謀齊難也冬來朝請王命以求成于齊也公告不能孟子曰觀近臣以其所為主觀逺臣以其所主主者成敗之機榮辱之本也昭公棄晉主齊至于客死鄭伯逃齊主楚終以乞盟觀其所主而榮辱成敗見矣魯桓者弒君之賊人人之所同惡夫人得而討之也而主之以求援其能國乎然則何以免于貶志不在于朝桓也七年春二月己亥焚咸丘程頥曰古者昆蟲蟄而後火田去莾翳以逐禽獸非竭山林而焚之也咸丘地名云焚咸丘如盡焚其地見其廣之甚也謝湜曰咸丘田獵之地也焚火田也禽獸有須焚田萊而取之者故禮曰昆蟲未蟄不以火田焚咸丘則舉咸丘皆焚之譏盡物也古者天子不合圍諸侯不掩羣示愛也舉咸丘焚之則失先王田獵之道矣胡安國曰咸丘地名也易稱王用三驅在禮天子不合圍諸侯不掩羣夫子釣而不綱弋不射宿皆愛物之意也推此心以及物至于鳥獸若草木裕無淫獵之過矣書焚咸丘所謂焚林而田也夏穀伯綏來朝鄧侯吾離來朝程頥曰臣之弒君天理滅矣冝天下所不容也而反天子聘之諸侯相繼而朝之逆亂乎天道嵗功不能成矣故不書秋冬與四年同曰然則十五年邾人牟人葛人來朝何以書秋冬四年與此明其義矣三國之來别立義也程氏學曰諸侯不生名穀伯鄧侯來朝而名之何也中國附庸例稱字邾儀父蕭叔是也凡外附庸例稱名郳犁來介葛盧來是也榖鄧微弱之國自此蔑然不見于經蓋從是失爵入楚為附庸故于其來朝聖人即以夷狄附庸之例名之謝湜曰春秋介葛盧來書名郳黎來來朝書名外之也穀伯鄧侯中國諸侯也以中國諸侯而臣屬于楚故其來朝也書法特與郳黎來及介葛盧俱稱書名之于中國也絶之于中國責其背夏而之夷也背夏之夷而君君臣臣父父子子夫夫婦婦之理亂矣故孟子曰吾聞用夏變夷未聞變于夷者也左氏謂蔡侯鄭伯懼楚而㑹于鄧巴子使韓服告楚請與鄧為好然則穀鄧為楚附庸可知矣滕侯穀伯鄧侯臣屬于楚一也滕侯臣屬于楚其罪輕穀伯鄧侯臣屬于楚其罪重故一則降其爵以示在所貶一則名其人以示在所絶胡安國曰春秋之法諸侯不生名穀伯鄧侯何以名桓天下之大惡也執之者無禁殺之者無罪穀伯鄧侯越國踰境相繼而來朝即大惡之黨也故特貶而書名與失地滅同姓者比焉經于朝桓者或貶爵或書名或稱人以深絶其黨撥亂之法嚴矣誅止其身而黨之者無罪則人之類不相賊殺為禽獸也幾希四時具然後成嵗故雖無事必書首時今此獨于秋冬闕焉何也立天地之道曰隂陽陽居春夏以養育為事所以生物也隂居秋冬以肅殺為事所以成物也王者繼天而為之子則有刑賞賞以勸善非私與也故五服五章謂之天命刑以懲惡非私怒也故五刑五用謂之天討古者賞以春夏刑以秋冬象天道也桓弟弒兄臣弒君而天討不加焉是陽而無隂嵗功不能成矣故特去秋冬二時以志當世之失刑也獨于四年七年闕焉何也按周制大司馬諸侯而有賊殺其親則正之放弒其君則殘之桓弒隱公而立大司馬九伐之法雖未之舉猶有望也及使冢宰下聘恩禮加焉則天下之望絶矣故四年宰紏書名而去秋冬二時以見天王之不復能用刑也田常弒其君孔子請討之以從大夫之後不敢不告也桓弒隱公而立雖方伯連帥環視而未之恤猶有望也及穀鄧二國自逺來朝則天下諸侯莫有可望者矣故七年穀伯鄧侯各書其名而去秋冬二時以見諸侯之不復能修其職也然則見之行事不亦深切著明矣乎故曰春秋成而亂臣賊子懼八年春正月己卯蒸程頥曰冬蒸非過也書之以見五月又蒸為非禮之甚也程氏學曰春秋祭祀常事不書周正月夏十一月也蒸冬祭合禮而書者為五月夏復蒸見黷也禮曰祭不欲數數則煩煩則不敬宗廟重事祭祀有時乃慢棄彛典黷于先君其罪著矣謝湜曰周雖以建子為正然四時之祭皆用夏時其祭皆以孟月蓋天氣一變孝子感時念親祭禮由是興焉蒸冬祭祭之盛者也蒸為盛祭者秋則物始熟可嘗冬則品物可進者衆故也桓公正月蒸五月又蒸黷祀也正月蒸矣五月而蒸非修時祭也蓋有求于廟而行之胡安國曰按周官大司馬蒸以中冬今魯蒸以春正月其不同何也周書有周月以紀政而其言曰夏數得天百王所同其在商周革命改正示不相㳂至于敬授民時巡狩蒸享猶自夏焉然則司馬仲冬教大閲獻禽以享蒸所謂自夏而魯之蒸祭在春正月見春秋用周正紀魯事也而穀梁子乃曰蒸冬事也春興之志不時也是以閉蟄而蒸為是與周制異矣春秋非以不時志也為再蒸見瀆書也天王使家父來聘程頥曰魯桓公弒立未嘗朝覲而王屢聘之失道之甚也謝湜曰王于諸侯或憂其背叛或畏其侵凌或告難或結好故下聘侯國其數如此家父天子大夫家氏父字渠伯紏名家父不名者春秋或立法于𥘉以起例或變例于終以示義故也胡安國曰下聘弒逆之人而不加貶何也既名冢宰于前其餘無責焉乃同則書重之義以此見春秋任宰相之專而責之備也虞史以人主大臣為一體春秋以天王宰相為一心以為一體故帝庸作歌則曰股肱喜哉元首起哉百工熙哉臯陶𢋫歌則曰元首明哉股肱良哉庶事康哉而垂益九官之徒不與也以為一心故歸賵仲子㑹葬成風則宰咺書名于前而王不稱天于後來聘桓公錫桓公命則宰紏書名以正其始王不稱天以正其終而榮叔家父之徒不與也故人主之職在論相而止矣夏五月丁丑蒸程頥曰正月既蒸矣而非時復蒸者必以前蒸為不備也其瀆亂甚矣謝湜曰桓公以子害父以臣害君逆神大矣逆之而欲其祐之蒸禮雖盛神其饗之乎再書蒸惡之也是故宗廟之祭行其事有禮明其事有義禮行義明然後祖考安祖考安然後子孫受福胡安國曰春秋之文有一句而包數義者有再書而一貶者戎伐凡伯于楚丘以歸之類一句而包數義春正月己卯蒸夏五月丁丑蒸再書而一貶秋伐邾謝湜曰將卑師少故直書伐邾冬十月雨雪謝湜曰陽氣上升而薰蒸則為雨隂氣慘烈則氣凍而為雪十月非極隂之時隂已勝陽故雨雪祭公來遂逆王后于紀程頥曰祭公受命逆后而至魯先行私禮故書來而以逆后為遂事責其不度王命而輕天下之母也又語録曰此祭公受命而卻因過魯遂行朝㑹之禮聖人深罪之故先書其來後書逆后使若以來魯為主而逆后為遂也程氏學曰王臣無外交祭公者王使逆后于紀因至魯而朝焉故聖人所書不與其朝而直曰來且以逆王后為遂事也謝湜曰祭公天子三公祭公來以朝禮來也王使祭公逆后于紀祭公因至魯朝焉不書來朝不與其朝也遂繼事之辭也祭公之出專以王命逆后也既而以外交之禮朝魯而後行則是祭公之心以朝魯為重以逆后為輕以身事為重以君命為輕其不敬大矣春秋首書祭公之來而繼書逆后為遂事罪其不敬也故事君之道不以私心害公心不以家事先國事逆后不稱女者下闕文胡安國曰劉敞曰祭公王之三公也曷為不稱使不與王之使祭公也師𫝊之官坐而論道其任重矣今其來魯乃命魯侯以婚姻之事者也若是則大夫可矣何必三公任之重使之輕故祭公緣此義得專命不報遂行如紀而王以輕使為失祭公以遂行為罪矣此說是也為之節者冝使卿往逆公監之則于禮得矣使祭公命魯主婚姻之事則曰不可卿往而公監之何以可乎命魯輕矣卿往公監之重矣官師從單靖公逆王后于齊劉夏非卿而書靖公合禮則不書故先儒以為使卿逆公監之禮也春秋集義卷八

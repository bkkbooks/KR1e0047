body:
  text: 春秋集義卷四十三宋李明復撰昭公程頥曰昭公名稠襄公子景王四年即位昭謚也容儀恭明曰昭元年春王正月公即位叔孫豹㑹晉趙武楚公子圍齊國弱宋向戍衛齊惡陳公子招蔡公孫歸生鄭罕虎許人曹人于虢謝湜曰晉楚既㑹大夫于宋又㑹大夫于虢大夫相㑹雖曰出於君命然大夫交相固結權勢益重而庇惡容姦皆由此起矣故大夫以罪出奔而列國受而安之者無國無之也招不稱弟者先君子孫仕於國則稱公子公孫變文示義則稱弟胡安國曰此陳侯之弟招也何以不稱弟諸侯之尊弟兄不得以屬通曰公子者其本當稱者也稱弟者因事而特稱之也所以然者諸侯非始封之君則臣諸父昆弟族人不得以其屬戚君也㑹于虢尋宋之盟而經何不書在宋之盟楚先晉歃若曰狎主諸侯則懼晉之先也故圍請讀舊書加于牲上而晉人許之觀其事雖若楚重得志晉少懦矣然春秋不貴修盟晉人以信為本故毎書必先趙武三月取鄆程頥曰乘莒之亂而取之故隠避其辭謝湜曰襄十二年莒人伐我圍台季孫救台遂入鄭趙孟曰莒魯争鄆為日久矣然則鄆本莒邑魯今取之取鄆不書莒者罪魯人以鄆為魯邑而奪之也胡安國曰按左氏季孫宿伐莒取鄆莒人訴於㑹楚告晉曰尋盟未退而魯伐莒瀆齊盟請戮其使有求貨於叔孫豹而為之請者豹弗與曰諸侯之㑹衛社稷也我以貨免魯必受師是禍之也何衛之為雖怨季孫魯國何罪趙孟聞之請於楚曰魯雖有罪其執事不辟難子若免之以勸左右可也莒魯争鄆為日久矣茍無大害於其社稷可無亢也乃免叔孫其不曰伐莒取鄆者乘莒亂而取邑故不悉書為内諱也夏秦伯之弟鍼出奔晉謝湜曰鍼有寵先君如二君於景以致出奔惡出奔景公有千乘之國而不能庇其一弟者失親親之道也若舜然親之使貴愛之使富又使不得有為於其國則又安有母弟出奔之患哉鍼出奔書弟罪秦伯之失兄道也胡安國曰按左氏秦后子有寵於桓如二君於景其母曰弗去懼選鍼遂出奔書此見人君寵愛其子不差以禮是禍之也鍼之適晉其車千乘司馬侯問焉曰子之車盡於此乎對曰此謂多矣若能少此吾何以得見叔齊曰秦公子必歸能知其過必有令圖令圖天所贊也後五年秦伯卒后子歸書曰弟者罪秦伯也夫后子出奔其父禍之而罪秦伯何也春秋以均愛望人父以能友責人兄父母有愛妾猶没身敬之不衰况兄弟乎兄弟翕而後父母順矣故不曰公子而特稱秦伯之弟云六月丁巳邾子華卒晉荀吴帥師敗狄于大鹵謝湜曰左氏謂荀吴毁車崇卒故敗狄胡安國曰大鹵太原也按六月宣王北伐之詩其詞曰薄伐玁狁至于太原而詩人美之者謂不窮追逺討及封境而止也然則太原在禹服之内而狄人來侵攘斥宜矣其過在毁車崇卒以詐誘狄人而敗之非王者之師耳使後世車戰法亡崇尚歩卒争以變詐相尚日趨茍簡皆此等啓之矣書敗狄譏之也秋莒去疾自齊入于莒程頥曰去疾假齊之力以入莒展輿之罪正也故稱莒遂自立無所禀命故不稱公子以自謂公子可立也胡安國曰天下國家定于一吴楚僣號經不書葬土無二王也以忽繫之鄭則􅊳不稱國以小白繫之齊則糾不書子國無二君也展輿乃莒子而去疾曷為又以國氏乎程氏曰去疾假齊之力以入莒討展輿之罪正也其以國氏與去疾之討有罪也此莒之公子曷為不稱公子自謂先公之子可以有國不疑遂立乎其位而無所稟也其書入者難詞也莒展輿出奔吴程頥曰為弑君者所立而以國氏者罪諸侯也虢之㑹雖國亂未預然諸侯與其立矣故欲執叔孫也稱莒展輿見諸侯之與其立也謝湜曰左氏謂展輿因國人弑莒子誤矣展輿盖不與弑故經書莒人莒子之被難也展輿為弑人所立受弑人立展輿之罪也故出奔奪爵稱名展輿雖有罪然非去疾可逐去疾以王命討逆則可以争國逐展輿則不可為去疾者非有臣子討逆之心也特以公子當立恃齊威力起而爭位故返國奪公子稱入入稱自齊責去疾之亂也展輿稱莒以明有國去疾稱莒以明争國胡安國曰展輿莒子也曷為不稱爵為弑君者所立既立乎其位而不能討賊則是與聞乎故也斯不可以有國矣不可以有國則曷為以國氏程氏曰罪諸侯之與其立也虢之㑹展輿無列何以見諸侯之與其立乎莒雖以亂未能預㑹然訴魯取鄆而在㑹者欲執叔孫則知諸侯之與其立矣亦以國氏惡崇亂也朱熹曰莒去疾莒展輿齊陽生恐只據舊史文若謂添一箇字減一箇字便是褒貶熹不敢信叔弓帥師疆鄆田謝湜曰疆鄆田正鄆之疆界也備莒為難故帥師疆之帥師疆鄆田則魯人以不道侵莒封疆可知矣葬邾悼公冬十有一月己酉楚子麋卒胡安國曰按左氏楚令尹圍將聘于鄭未出境聞王有疾而還入問王疾縊而弑之使赴於諸侯應為後之詞曰共王之子圍為長初圍之未動於惡入預夏盟緝蒲為宫設服離衛中國大夫莫不知其有無君之心矣雖以疾赴曷為承偽藏在諸侯之策乎當是時仲尼已生將志于學乃所見之世非祖之所逮聞也又曷為因之而不革乎曰此春秋之所以為春秋非聖人莫能修之者也薨則書薨卒則書卒弑則書弑葬則書葬各紀其實載於簡策國史掌之此史官之所同而凡為史者皆可及也或薨或不薨或卒或不卒或弑或不弑或葬或不葬筆削因革裁自聖心以逹王事此仲尼之所獨而游夏亦不能與焉者也然則郟敖實弑而書卒何歟令尹圍弑君以立中國力所不加而莫能致討則亦已矣至大合諸侯于申與㑹者凡有十三國其臣舉六王二公之事其君用齊桓召陵之禮而宋向戍鄭子産皆諸侯之良也而皆有獻焉不亦傷乎若革其偽赴而正以弑君將恐天下後世以簒弑之賊非獨不必致討又可從之以主㑹盟而無惡矣聖人至此憫之甚懼之甚憫之甚者憫中國之衰微而不能振也懼之甚者懼人欲之横流而不能遏也是故察微顯權輕重而畧其簒弑以扶中國制人欲存天理其立義微矣楚公子比出奔晉謝湜曰左氏謂公子圍弑麋自立右尹公子比出奔晉然經書麋卒則左氏所載誤矣二年春晉侯使韓起來聘吕祖謙曰韓宣子來聘且告為政此一段可見當時君弱臣强之漸春秋時諸侯即位則告政於隣國為其繼先君之政不敢輕其事且欲繼舊好也宣子晉之大夫為政之初乃行諸侯朝聘之禮可見當時禮樂征伐自諸侯出故大夫得以僭諸侯之禮夏叔弓如晉秋鄭殺其大夫公孫黒謝湜曰公孫黒作亂欲去游氏故鄭以國法殺之胡安國曰按左氏鄭駟黒好在人上攻良霄而逐之又與公孫楚争室又將作亂去游氏代其位傷疾作而不果子産使吏數之曰爾有亂心無厭國不女堪專伐伯有而罪一也兄弟争室而罪二也矯君之位而罪三也不速死大刑將至遂縊而尸之黒則有罪而鄭人初畏其强不之討也因其疾而幸勝之則亦云殆矣故稱國以殺累乎上也冬公如晉至河乃復季孫宿如晉程氏學曰凡人君動止有度豈可非禮而行又無故而乃復者盖進退皆非義定三年亦同唯昭二十年公如晉至河有疾乃復州不得已而然矣謝湜曰昭公生十九年猶有童心無人君之儀以慰人心無人心之徳以望隣國是以進不由禮退不由義以千乘之主而取輕於人凡四如晉至河乃復皆以䘮失君道而自取困辱也君位之不保其終由此起矣又曰公如晉不得入季孫如晉得入季孫權重於君故也胡安國曰按左氏晉少姜卒公如晉及河晉侯使士文伯來辭曰非伉儷也請君無辱公還季孫宿遂致服焉舉動人君之大節賢哲量之以行藏其道姦邪窺之以作止其惡四鄰視之以厚薄其情故有國者必謹於禮而後動此守身之本保國之基也禮雖自卑而尊人亦不妄悦人以自辱昭公既不能據經守正失禮而妄動又不能從權適變無故而輕復終於失國出奔客死他境盖始諸此行矣或曰禮者明微正於未動之前可也已至于河而見郤雖欲勿反將得已乎曰以周公之胄千乘之國輕身以修鄰好乃欲郤而不納夫何敢若曰敝邑𥚹小敬事大國惟恐獲戾聞陳無宇見執於中都謂少姜之數於守適信也用是不遑寧處䟦履山川來修弔事今若不獲進見剪為仇讎他國誰敢朝夕在庭修事大之禮乎夫小國之去就從違聴大國之令也若非伉儷齊人請陳無宇之罪何以令之也茍有二命又何以為盟主如此晉人其將謝過之不暇敢不納乎昭公習儀以亟而不明乎禮其反也宜經書公如晉至河乃復季孫宿如晉而昭公失國之因季氏逐君之漸晉人下比之迹不待貶絶而皆見矣三年春王正月丁未滕子原卒夏叔弓如滕五月葬滕成公謝湜曰叔弓㑹葬者以襄公之葬滕子來㑹故也秋小邾子來朝八月大雩冬大雨雹謝湜曰冬非大雨雹之時陽氣猶盛隂氣薄而凝之故為雹北燕伯欵出奔齊謝湜曰失國出奔故名胡安國曰按左氏燕簡公多嬖寵欲去諸大夫而立其寵人燕大夫比以殺公之外嬖公懼奔齊書曰北燕伯欵出奔齊罪之也君雖不君臣不可以不臣燕伯欲去諸大夫固不君矣而大夫相與比以殺其外嬖是威脅其主而出之也與鬻拳之以兵諌無異而獨罪燕伯何哉大夫國君之陪貳以公心選之而不可私也以誠意委之而不可疑也以隆禮待之而不可輕也以直道馭之而不可辱也否則是忽其陪貳以自危矣晉厲公殺三郤立胥童而弑於麗氏漢隐帝殺楊史立郭允明而弑於趙村衛獻公蔑冡卿而信其左右亦奔夷儀久而後復也故人主不尊陪貳而與賤臣圖柄臣者事成則失身而見弑事不成則失國而出奔此有國之大戒也春秋凡見逐於臣者皆以自奔為文正其本之意也而垂戒逺矣四年春王正月大雨雹胡安國曰隂陽之氣和而散則為霜雪雨露不和而散則為戾氣曀霾雹戾氣也隂脅陽臣侵君之象當是時季孫宿襲位世卿將毁中軍專執兵權以弱公室故數月之間再有大變申豐者季氏之孚也不肯端言其事故暴揚於朝歸咎藏冰之失夫山谷之冰藏之也周用之也徧亦古者本末備舉爕調之一事耳謂能使四時無愆伏淒苦之變雷出不震無菑霜雹則亦誣矣意者昭公遇災而懼以禮為國行其政令無失其民雹之災也庶可禦也不然雖得藏冰之道合於豳風七月之詩其將能乎夏楚子蔡侯陳侯鄭伯許男徐子滕子頓子胡子沈子小邾子宋世子佐淮夷㑹于申程頥曰晉平公不在諸侯楚於是强為覇者之事謝湜曰晉平委政大夫中國綱紀大壊故楚靈大合諸侯于申内則宋鄭陳蔡許滕邾外則徐頓胡沈淮夷連車接軫皆受命於楚春秋録申之㑹以明荆蠻之横而中國之衰也胡安國曰申之㑹楚子為主而不殊淮夷是在㑹之諸侯皆貶也其意若何楚䖍弑麋以立而求諸侯於晉晉人許之中國從之執徐子圍朱方遷頼於鄢城竟莫校畏其强盛則曰晉楚唯天所相不可與争滅陳不能救則曰陳亡而楚克有之天道也滅蔡而又不能救則曰天將棄蔡以壅楚盈而降之罰也至使窮凶極惡師潰於訾梁身竄於棘里而縊於申亥人不致討而天自討之是責命于天而以人事為無益而弗為也而可乎弑君之賊在春秋時有臣子討之則衛人殺州吁是也有四隣討之則蔡人殺陳佗是也臣子不能討之於内四隣不能討之於外有與之㑹以定其位則齊侯及魯宣公㑹于平州是也有受其賂以免其討則晉侯及諸國㑹于扈是也然至此極矣則未有不以為賊而又推為盟主相與朝事之以聽順其所為而不敢忤者也故申之㑹不殊淮夷者以在㑹諸侯皆為淮夷之類皆王法之所當斥而不使夏變於夷之意也或曰晉叔向鄭子産宋向戌皆諸侯之良也謀其國至變於夷而不校何哉聖人以天自處賢者聽天所命春秋之法以人合天不任於天以義立命不委於命而宇宙在其手者也故楚麋書卒不革其偽赴於前諸侯㑹申與淮夷累數於後此以恕待人而責備賢者之意其垂訓之義大矣吕祖謙曰楚靈王使椒舉求諸侯於晉當是時晉平公怠惰溺於宴安無諸侯之志其臣亦無奮然有志為宏逺規模楚靈王初欲求諸侯問於子産子産固已料之於先矣言晉君少安不在諸侯則楚强晉弱宜晉之必從楚也然初間靈王使椒舉之求晉侯欲不許司馬侯曰不可晉楚為天所相不可與争君其許之而修徳以待其歸吾猶將事之晉侯又未肯許平公乃言晉有三不殆其何敵之有國險而多馬齊楚多難必待司馬侯反覆調䕶然後許之何晉侯初問未肯許也必待至於再至於三而後許也當時楚方强晉方弱晉自是不能與楚争何故初間尚欲不許盖天下之事人不自量者最多使人而皆知自量則弱自安於弱知此則諸侯何戰奪之有正縁衰世之君不知自量故内有削弱之實而外欲避削弱之名不肯屈意下心以為人役尚欲争虛氣晉君之病正在此向使平公不得司馬侯委曲調䕶亦未必從然晉既不能主諸侯諸侯勢必從楚則以楚之威焰亦必自㑹諸侯矣當是時晉傷威損重多矣幸而頼一司馬侯調䕶許楚之請令諸侯之從楚必竟是因晉侯許之後從之則傷威損重猶未至於極也然司馬侯當時地位不在六卿之列所以其力止如此但就事上面能使晉侯不至於傷威損重若在六卿之列須能輔晉侯思强楚侵陵之恥掃雪奮迅治楚之罪可也楚人執徐子謝湜曰楚子以徐貳於呉故執徐子徐子聽命於㑹而楚子以猜疑執之盖所謂不常其徳者也故貶稱人秋七月楚子蔡侯陳侯許男頓子胡子沈子淮夷伐吴執齊慶封殺之謝湜曰慶封崔杼之黨齊之逆臣也齊不能討而魯受之魯不能討而吴以邑封之楚子率諸侯伐吴以其黨慶封而邑之也諸侯失道大夫專政列國交庇逆臣乆矣楚靈處南蠻之中乃能以討逆伐吴執齊慶封以正其罪使叛臣賊子恐懼于心得方伯討罪之義矣春秋書伐吴書伐慶封善之也慶封繫之齊者以著齊不能討而楚為討之也其位已絶故不稱大夫遂滅頼謝湜曰伐吴討慶封義也滅頼不義也以伐吴之師滅頼楚子之暴也滅頼書遂罪諸侯之不能正楚子也以諸侯之衆而不能一諌楚子諸侯之罪也九月取鄫謝湜曰鄫附庸微國莒滅之魯復取之冬十有二月乙卯叔孫豹卒五年春王正月舍中軍謝湜曰以人數不足故舍中軍舍非毁之也以不可行舍而不為也人民不足以充軍數則雖欲増立中軍終亦必舍之而已矣書舍中軍著三軍之不可作也胡安國曰按左氏舍中軍卑公室也初作三軍三分公室而各有其一及其舍之也四分公室季氏擇二二子各一皆盡征之而貢于公然則三軍作舍皆自三家公不與焉公室益卑而魯國之兵權悉歸于季氏矣兵權有國之司命三綱兵政之本原書其作舍而公孫于齊薨于乾侯定公無正必至之理也已則不臣三綱淪替南蒯叛陽虎專季斯囚而三桓之子孫微矣亦能免乎書曰舍中軍微詞以著其罪也楚殺其大夫屈申謝湜曰左氏謂屈申貳於吴公如晉夏莒牟夷以牟婁及防兹來奔謝湜曰牟婁莒邑防兹莒侵而得之者也防兹書及殊之也牟夷以三邑來奔著其有危莒之心也著牟夷危莒之心所以甚魯人之罪也於邾取田矣庶其又以二邑來奔於莒取鄲取鄫矣牟夷又以三邑來奔魯人并吞隣國其罪可知也胡安國曰邾莒之大夫名姓不登於史策微也牟夷莒大夫曷為以姓氏通重地也以地叛雖賤必書地以名其人終為不義弗可滅矣其書來奔是接我以利而我入其利兩譏之也為國以義不以利如以利則上下交征而國必危矣為已以義不以利如以利則患得患失亦無所不至矣春秋於三叛人雖賤特書其名以懲不義懼淫人為後戒也邑而言及者公羊所謂不以私邑累公邑是也秋七月公至自晉戊辰叔弓帥師敗莒師于蚡泉謝湜曰取鄲取鄫受莒叛邑故莒師來攻不書伐我者魯罪已明故也既取其邑又敗其師罪魯人無悔責之心也秦伯卒謝湜曰秦伯不名史失之冬楚子蔡侯陳侯許男頓子沈子徐人越人伐吴謝湜曰楚子又通越伐吴以越與諸侯相通故稱人胡安國曰越始見經而與徐皆得稱人何也吴以朱方處齊慶封而富於其舊崇惡也楚圍朱方執齊慶封殺之討罪也呉不顧義入棘櫟麻以報朱方之役狄道也楚於是以諸侯伐吴則比吴為善而師亦有名其從之者進而稱人可也或者以詞為主而謂不可云沈子徐越伐吳故特稱人誤矣以不可為文詞而進人於越一字褒貶義安在乎且吴楚徐越雖比於外域而劉敞以為其實不同吴太伯之後也楚祝融之後也徐伯益之後也越大禹之後也其上世皆為元徳顯功通于周室與中國冠帶之君無以異徐始稱王楚後稱王吴越因遂稱王王非諸侯所當稱也故春秋比諸夷狄雖然猶不欲絶其類是以書法之加于四國不與鄋瞞陸渾比推之可逺引之可來此聖人慎絶人亦春秋之意也六年春王正月杞伯益姑卒葬秦景公夏季孫宿如晉葬杞文公宋華合比出奔衛胡安國曰左氏曰宋寺人栁有寵太子佐惡之華合比請殺之栁聞之乃坎用牲埋書而告公曰合比將納亡人之族既盟于北郭矣合使視之有焉遂逐合比於是華亥欲代為右師乃與栁比從為之徴公使代之宋公寵信閽寺殺世適痤而父子之恩絶逐華合比而君臣之義暌刑人之能敗國亡家亦可畏矣猶有任趙髙以亡秦信恭顯十常侍以亡漢寵王守澄田令孜以亡唐而不知鑒覆車之轍者不亦悲夫凡此類直書而義自見矣秋九月大雩楚薳罷帥師伐吴謝湜曰楚自討慶封之後比年再伐吴楚靈之暴也冬叔弓如楚齊侯伐北燕謝湜曰北燕伯以强臣逼逐奔齊齊侯以討逆伐北燕諸侯之義也七年春王正月暨齊平程氏學曰齊欲平而我與之平也齊强魯弱盖國之所願也而曰我與之盖以抑齊之强而伸魯之弱也謝湜曰暨與也兩國之平齊欲平我亦欲平也欲平兩國之所願也以我暨齊者所以抑齊之强也抑齊之强以明魯之所願也暨與一也暨辭尊與辭卑故朋匹相與曰與尊者與卑曰暨胡安國曰我所欲曰及不得巳曰暨當是時昭公結婚强吴外附荆楚其與齊平無汲汲之意乃齊求於魯而許之平也故曰暨至定公八年魯再侵齊結大國之怨見復必矣其與齊平非不得已乃魯求於齊而欲其平也故曰及平者聖人之所貴然或以賄賂而結平或以臣下而擅平或以附暴亂而得平或以侵犯大國而急於平則皆罪也攷其事而輕重見矣三月公如楚謝湜曰冬叔弓如楚三月公如楚公如楚叔弓之罪也叔孫婼如齊涖盟謝湜曰婼如齊涖盟結兩國之平也夏四月甲辰朔日有食之秋八月戊辰衛侯惡卒九月公至自楚冬至十有一月癸未季孫宿卒謝湜曰宿季武子十有二月癸亥葬衛襄公八年春陳侯之弟招殺陳世子偃師謝湜曰陳哀公之疾也公子招志欲圖國於是乘公之疾殺世子偃師兄弟手足之親也親為兄弟而絶兄之世招之大惡也招殺世子書陳侯之弟罪其骨肉相殘也世子社稷之本也乘間窺國招之大逆也招殺偃師書世子罪其圖社稷也自招作亂覆世子由是楚人乘之起而滅陳然則世子繫國安危可知矣哀公内失尊隆世子之道外失訓飬宗族之道崇嬖妾寵孽子以致冡嗣孤弱而母弟有圖國之心所以骨肉起為冦讎而世子不保其身也胡安國曰此公子招特以弟稱者著招慿寵稔惡而陳侯失親親之道也招以公子為司徒乃貴戚之卿親則介弟尊則叔父號令廢立自已而出莫敢干之者也不能援立嫡冢安靖國家而逄君之惡戕殺偃師以致大冦宗社覆没罪固大矣陳侯信愛其弟何以為失親親乎尊賢者親親之本不能擇親之賢者厚加尊寵以表儀公族而殉其私愛施於不令之人以至亡國敗家豈不失親親之道乎其曰陳侯之弟招殺陳世子偃師交貶之也夏四月辛丑陳侯溺卒叔弓如晉楚人執陳行人于徴師殺之謝湜曰陳世子遇難哀公繼卒陳行人以國難告楚楚子以招之亂執陳行人殺之行人以國命通於邦國而已招之亂非行人之罪也執非其執殺非其殺故楚子貶爵稱人陳公子留出奔鄭謝湜曰公子留招之黨以楚殺行人故留懼難出奔秋蒐于紅謝湜曰春田曰蒐蒐以簡車徒也秋蒐非時也以車徒減耗故五年舍中軍八年蒐于紅胡安國曰蒐春事也秋興之則違天時有常所矣其于紅則易地利三家專行公不與焉而兵權在臣下則悖人理此亦直書其事不待貶絶而自見者也凡亂臣之欲竊國命必先為非禮以動民而後上及於君父昭公至是民食於他不恤其所昧於履霜之戒甚矣陳人殺其大夫公子過謝湜曰公子過為國正卿比逆臣以危世子惡之大者也陳國討而殺之得其罪矣殺書人以衆棄之辭加之也大雩冬十月壬午楚師滅陳執陳公子招放之于越殺陳孔奐謝湜曰利人之難而舉師滅陳楚靈之暴也公子招首為逆亂者也孔奂因招而得罪者也楚子假公義以滅陳故其滅陳也放陳公子招殺陳孔奐罪之大者放而不殺罪之小者殺而不容刑誅不法甚矣招書放奐書殺著楚之亂也著楚之亂所以責中國也招書陳公子者著陳不能討而絶之也葬陳哀公謝湜曰哀公國已滅矣春秋書葬者不與楚子滅陳也不與楚子滅陳所以存陳也九年春叔弓㑹楚子于陳謝湜曰楚滅陳中國在所討治而叔弓乃㑹楚子于陳長荆蠻之暴也許遷于夷謝湜曰楚不能固守其國又自葉遷夷盖楚既滅陳許人恐故遷于夷然則葉以鄭遷夷以楚遷夏四月陳災謝湜曰書陳災所以存陳也存陳罪中國之不救也胡安國曰凡外災告則書今楚已滅陳夷於屬縣使穿封戍為公矣必不遣使告於諸侯言亡國之有天災也何以書於魯國之䇿乎當是時叔弓與楚子㑹于陳則目擊其事矣雖彼不來告此不徃弔叔弓使畢而歸語陳故也魯史遂書之耳或曰國史所書必承赴告豈有慿使人之言而載之於史者曰周景王崩有尹單猛朝之變固無赴告矣叔鞅至自京師言王室之亂也春秋承其言遂書于策亦此類耳仲尼作經存而弗革者盖興滅國繼絶世以堯舜三代公天下之心為心異於孤秦罷侯置守欲私一人以自奉者所以歸民心合天徳也榖梁以為存陳得其㫖矣秋仲孫貜如齊謝湜曰齊平之後二國親睦故仲孫貜修聘于齊冬築郎囿謝湜曰築囿以備逸遊也方是時外有强楚可憂内有權臣可慮上有雨雹日食之變下有兵民彫耗之弊捨此不恤而築囿于郎迷之至也然則築郎囿非獨罪其勞民而已十年春王正月夏齊欒施來奔謝湜曰左氏謂欒施嗜酒多怨彊於陳鮑氏故陳鮑攻之出奔秋七月季孫意如叔弓仲孫貜帥師伐莒謝湜曰三卿連師伐莒罪其虐隣國棄民政也胡安國曰前已舍中軍矣曷為猶以三卿並將乎季氏毁中軍四分公室擇其二二家各有其一至是季孫身為主將二子各率一軍為之副則三軍固在其曰舍之者特欲中分魯國之衆為已私耳以為復古則誤矣襄公以來既作三軍地皆三家之土民皆三家之兵每一軍出各將其所屬而公室無與焉是知雖舍中軍而三卿並將舊額固存矣戊子晉侯彪卒九月叔孫婼如晉葬晉平公十有二月甲子宋公成卒十有一年春王二月叔弓如宋葬宋平公夏四月丁巳楚子䖍誘蔡侯般殺之于申楚公子棄疾帥師圍蔡謝湜曰楚靈之殺蔡侯以其有可加之惡也然春秋不以殺逆為功乃以誘而殺之為罪則蔡般之罪與直弑者不同於此見矣故楚靈之殺蔡侯也書誘以罪其詐書名以著其惡又曰楚之誘蔡侯也志在圖國故楚子殺蔡而棄疾以師圖蔡胡安國曰左氏曰楚子在申召蔡侯其大夫曰王貪而無信幣重言甘誘我也不如無徃蔡侯不可楚子伏甲饗般於申執而殺之此討賊也雖誘殺之疑若無罪春秋深惡楚子貶而稱名何也世子般弑其君諸侯與通㑹盟十有三年矣是中國安于弑逆而莫之覺也楚子若以大義倡天下奉詞致討執般於蔡討其弑父之罪而在官者無赦焉討其弑君之罪而在官者無赦焉殘其身瀦其宫室謀於蔡衆置君而去雖古之征暴亂者不越此矣又何惡乎今䖍本心欲圖其國不為討賊舉也而又挾欺毁信重幣甘言詐誘其君執而殺之肆行無道貪得一時流毒於後棄疾以是殺戎蠻商鞅以是紿魏將秦人以是刼懐王傾危成俗天下大亂劉項之際死者十九聖人深惡楚䖍而名之也其慮逺矣後世誅討亂臣者或畏其强或幸其弱不以大義興師至用詭謀詐力徼倖勝之若事之㨗反側皆懼茍其不㨗適足長亂如代宗之圖思明憲宗之紿王弁昧於春秋垂戒之㫖矣五月甲申夫人歸氏薨謝湜曰歸氏襄公妾昭公母胡女歸姓大蒐于比蒲謝湜曰合國車徒而蒐故曰大蒐大蒐將以振武事也八年蒐于紅矣以車徒不足故又大蒐于比蒲師不足用而求之大蒐著其失武備也君有大䘮而國不廢蒐胡安國曰其曰大蒐越禮也君有重䘮國不廢蒐不忌君也三綱軍政之本君執此以馭其下臣執此以事其上政之大本於是乎在君有三年之慼而國不廢一日之蒐則無本矣然則君有重䘮䘮不貳事以簡車徒為非禮也乃有身從金革而無避者獨何歟曰䘮不貳事大比而簡車徒則廢其常可也有門庭之冦而宗廟社稷之存亡係焉必從權制而無避矣伯禽服䘮徐夷並與至于東郊出戰之師與築城之役同日並舉度緩急輕重盖有不得已焉者矣晉王克用薨梁兵壓境而莊宗决勝於夾寨周太祖殂契丹入冦而世宗接戰於髙平若此者君行為顯親非不顧也臣行為愛君非不忌也惟審於緩急輕重之宜斯可矣仲孫貜㑹邾子盟于祲祥秋季孫意如㑹晉韓起齊國弱宋華亥衛北宫佗鄭罕虎曹人杞人于厥憗謝湜曰大夫㑹于厥憗謀救蔡也方是時楚人益强中國益弱故大夫將欲救蔡而卒無成功書㑹不書救罪之也故荀呉曰不能救陳又不能救蔡晉之不能亦可知也為盟主而不恤亡國將焉用之胡安國曰按左氏楚師在蔡晉荀呉曰不能救陳又不救蔡物無以親已為盟主而不恤亡國將焉用之㑹于厥憗謀救蔡也使狐父請蔡于楚弗許文十五年晉靈公帥八國之諸侯盟于扈春秋畧而不序者謀伐齊而不克定其亂也襄公三十年叔孫豹㑹十二國之大夫于澶淵諸侯之大夫皆稱人魯卿諱而不書者視蔡亂而不能討其賊也今楚將滅蔡請于楚而弗許晉之不能亦可知矣曷為諸國猶序而大夫無貶乎扈之盟晉侯受賄弗克而還諸侯畧而不序亡義利之分也澶淵之㑹謀救宋災而不討蔡罪大夫貶而稱人魯卿諱而不書失重輕之别也亡義利之分為不仁失重輕之别為不智今晉與諸侯心欲救蔡而力弗加焉則無惡也凡此見春秋明義利審重輕以恕待人而不求其備矣九月己亥葬我小君齊歸冬十有一月丁酉楚師滅蔡執蔡世子有以歸用之謝湜曰有稱世子有未立也世子書名降諸侯也執以歸非服也用之殺而用之也楚子殺人之君滅人之國絶人之世以國嗣子同之六畜而忍於用之逆天暴物未有甚於此者也楚滅陳滅蔡皆稱師者著楚之强也著楚之强所以責中國也方是時諸侯衰微中國不振由是楚靈肆為暴虐有并吞邦國之心託治罪之義殺陳行人而卒於滅陳託討惡之名誘殺蔡侯而卒於滅蔡其亂則陳之首逆不以即刑其虐則蔡之世子用為六畜諸侯委靡相視而問罪之伐不加於强暴之夷天下將胥為左袵之民矣故春秋著楚之强列楚之罪而責中國也胡安國曰内入國而以其君來外滅國而以其君歸皆服而以之易詞也既書滅蔡矣又書執蔡世子有者世子無降服之狀强執以歸而虐用之也或以為未踰年之君其稱世子者不君靈公故不成其子非也楚䖍殺蔡般棄疾圍其國凡八月而見滅世子在窮迫危懼之中固未暇立乎其位安得以為未踰年之君而稱子也假使立乎其位而般死於楚其䘮未至不歛不葬世子亦不成乎為君矣然世子繼世有國之稱必以此稱蔡有者父母之仇不與共天下與民守國效死不降至於力屈就擒虐用其身而不顧也則有之為世子之道得矣十有二年春齊髙偃帥師納北燕伯于陽謝湜曰燕伯之齊也景公為燕伯伐北燕髙偃帥師納燕伯齊國之大義也循而行之則邦國豈有悖逆之亂哉雖然髙偃能納燕伯于别邑而不能為之討逆臣以反其位非所以定燕伯而安燕國也書納于陽善其志矣而未善其事也燕伯雖失位義未當絶故不名與衛侯入夷儀不名同意三月壬申鄭伯嘉卒夏宋公使華定來聘公如晉至河乃復謝湜曰左氏謂晉人以伐莒辭公五月塟鄭簡公楚殺其大夫成熊秋七月冬十月公子憗出奔齊謝湜曰左氏謂南蒯與憗謀出季平子不克故奔齊楚子伐徐晉伐鮮虞程氏學曰晉伐鮮虞左氏載荀吴偽㑹齊師者假道鮮虞遂入昔陽冬晋伐鮮虞夫惇信明義先王之道也懷利尚詐襄世之行也晉悖先王之道而為襄世之行故書曰晉伐鮮虞以絶之春秋集義卷四十三

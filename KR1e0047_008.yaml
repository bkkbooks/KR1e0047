body:
  text: 春秋集義卷五宋李明復撰隱公八年春宋公衛侯遇于垂程頥曰齊侯將平宋衛於鄭有㑹期宋公以幣請於衛請先相見故遇于垂宋忌鄭之深故與衛卒不成好無諸侯相見之禮故書曰遇謝湜曰清衛邑垂衛地州吁之亂二公遇于清凡伯之難二公遇于垂三月鄭伯使宛來歸祊程頥曰魯有朝宿之邑在王畿之內曰許鄭有朝宿之邑近於魯曰祊時王政不修天子不巡狩魯亦不朝故欲以祊易許各取其近者故宛來歸祊始以祊歸魯來言易也朝宿之邑先祖受之於先王豈可相易也鄭來歸而魯受之其罪均也胡安國曰鄭伯欲以太山之祊易許田前此來輸平者以言請之矣未入地也至是來歸祊者其地既輸矣未易許也周制六年五服一朝故於天子之郊有朝宿之地又六年王乃時巡諸侯各朝于方嶽故於太山之旁有湯沐之邑諸侯於王畿之內方嶽之下皆有是乎成王以周公有大勳勞故特賜之許田為朝宿之地如皆有焉盡天子之郊不足為其地矣宣王以鄭伯母親故特賜之祊田為湯沐之邑如皆有焉盡太山之旁不足為邑矣祊近於魯許鄰於鄭各以其近者相易何以不可乎用是見鄭有無君之心而謂天王不復巡狩矣用是見鄭有無親之心而敢與人以先祖所受之邑矣庚寅我入祊程頥曰入者內弗受也義不可而彊入之也謝湜曰祊鄭祀太山之邑也莊公使宛來歸祊欲以祊易許田也庚寅我入祊魯受祊邑於鄭也鄭不得王命私以封邑與魯魯不得王命私受封邑於鄭二國皆在所治也故鄭以邑畀魯稱歸罪其與之專也魯得邑於鄭稱入罪其取之逆也與之專者鄭以祊為已邑故以歸魯使魯有之也取之逆者其入邑與許叔入許鄭伯入櫟無異故也宛不氏未賜族胡安國曰其言我入祊者祊非我有也入者不順之詞也義不可而强入之也夏六月已亥蔡侯考父卒胡安國曰天王崩告於諸侯則不名諸侯薨以名赴而自别於太上禮也古者死而不諡不以名為諱周人以諡易名於是乎有諱禮故君薨赴於他國則曰寡君不祿敢告執事春秋之時遵用此禮凡赴者皆不以名矣經書其終雖五霸强國齊桓晉文之盛莫不以名者是仲尼筆之也赴不以名而書其名者與魯通也已通而不名者舊史失之爾未通而名者有所證矣故傳此義者記於禮篇曰諸侯不生名夫生則不名死而名之别於太上示君臣尊卑之等蓋禮之中也諸侯薨赴不以名而仲尼革之必以名書變周制矣春秋魯史聖人修之也而孟子謂之作以此類也辛亥宿男卒秋七月庚午宋公齊侯衛侯盟于瓦屋程頥曰宋為主盟與鄭絶也謝湜曰宋公序齊上正王爵也胡安國曰程氏曰宋為主盟與鄭絶也大道隱而家天下然後有誥誓忠信薄而人心疑然後有盟詛盟詛煩而約劑亂然後有交質子至是傾危之俗成民不立矣春秋革薄從忠於參盟書日謹其始也周官設司盟掌盟載之法凡邦國有疑則請盟於㑹同聽命於天子亦聖人待衰世之意爾德又下衰諸侯放恣其屢盟也不待㑹同其私約也不繇天子口血未乾而渝盟者有矣其末至於交質子猶有不信者焉春秋謹參盟善胥命美蕭魚之㑹以信待人而不疑也蓋有志於天下為公之世凡此類亦變周制矣吕祖謙曰春秋之初齊僖公當時謂之小霸見於春秋經傳與諸侯㑹盟征伐稍多這便是霸之始方周未東遷之前未嘗無方伯連帥之職然當時尚禀王命所以不謂之霸到得平王東遷後王者自無總合係屬人心道理諸侯稍有才智自然出來㑹盟此霸之名所以立然僖公所以謂之小霸非性其他政事權謀不可望後來桓文然當時時節亦未能做得所以凡書盟于宋衛告成三國不過三國之盟到得後來齊桓鄭宋盟于惡曹亦不過四國之盟又如齊宋衛燕伐魯時不過是四國蓋春秋之初王綱尚在未至於甚壞及後王室陵替凡㑹盟統天下之諸侯皆在焉以齊一國論之僖公霸業不如桓公以天下之勢論之桓公之時却不如僖公之時何故王道霸業相為消長到得桓公所以大國言齊宋逺國言江黃其餘莫不至霸業盛處便是王道消亡齊僖公所以小霸多是用私意所謂成宋亂又與桓公㑹成魯亂帥師以戰于郎以至班爵不同帥諸侯來戰于郎凡此類皆是私意當時偶然得諸侯此時才智無加於僖公所以略霸八月葬蔡宣公程頥曰速也諸侯五月而葬不及期簡也謝湜曰諸侯五月而葬宣公三月而葬速也過時而葬為不敬先時而葬為不懷不敬不懷非孝也九月辛卯公及莒人盟于浮來程頥曰鄰國之交講信修睦可也安用盟為公屈已與臣盟義弗安也謝湜曰浮來紀邑莒人微者公及微者盟于紀邑自陵之道也胡安國曰莒小國人微者而公與之盟故特言及以譏失禮且明非大夫之罪也易曰謙尊而光卑而不可踰隱公可謂謙矣何以譏之為失禮曰謙亨君子以裒多益寡稱物平施屈千乘之尊下與小國之大夫盟豈稱物平施之謂乎太卑而可踰非謙德矣螟程頥曰為災也民以食為命故有災必書冬十有二月無駭卒程頥曰未賜族書名而已謝湜曰卒而後賜族故不氏無駭公子展之孫其卒也賜族為展氏大夫生而賜族諸侯之失制也觀季友仲遂叔肹卒書氏然後知無駭挾之不氏為正也觀無駭卒不書氏然後知季友仲遂叔肹之氏為非正也胡安國曰無駭書名未賜族也諸侯之子為大夫則稱公子其孫也而為大夫則稱公孫公孫之子與異姓之臣未賜族而身為大夫則稱名無駭挾之類是也已賜族而使之世為大夫則稱氏如仲孫叔孫季孫之類是也古者置卿必求賢德不以世官春秋之初猶為近古故無駭與挾皆書名爾其後官人以世無不賜之族或以字或以諡或以官或以邑而先王之禮亡矣至於三家專魯六卿分晋諸侯失國出奔者相繼職此由也按禮天子寰內諸侯世其祿而不嗣然則諸侯所置大夫嗣其位而不易豈禮也哉觀春秋所書而是非之迹著矣治亂之效明矣吕祖謙曰春秋之初諡族尚少見於魯者如所謂挾如所謂翬如所謂宛如所謂無駭皆不命氏傳世官春秋初東遷蓋大夫官爵甚少以魯一國論之諡族甚少大夫官爵無非賜姓使當時春秋之前有世官所謂鄉舉里選賓興不可行秀民無處安排看得世官只是起於春秋以來九年春天王使南季來聘程頥曰周禮大行人時聘以結諸侯之好王法之行時加聘問以懷諸侯乃常禮也春秋之時諸侯不修臣職朝覲之禮廢王法所當治也不能正典刑而反聘之又不見答失道甚矣謝湜曰天王以聘禮交結邦國故三年之間聘魯者二凡伯天子卿士之有爵者故稱爵南季天子大夫故稱字胡安國曰按周禮行人王者待諸侯有時聘以結好間問以諭志而穀梁子何以獨言聘諸侯非正也古者諸侯於天子比年一小聘三年一大聘五年一朝天子於諸侯不可以若是恝故亦有聘問之禮焉隱公即位九年于此而史䇿不書遣使如周則是未嘗朝也一不朝則貶其爵再不朝則削其地如隱公者貶爵削地可也刑則不舉遣使聘焉其所以為不正乎經書如京師者一朝于王所者二卿大夫如京師者五舉魯一國則天下諸侯怠慢不臣可知也書天王來聘者七鍚命者三賵葬者四則問於他邦及齊晋秦楚之大國又可知矣王之不王如此征伐安得不自諸侯出乎諸侯之不臣者如此政事安得不自大夫出乎君臣上下之分易矣陪臣執國命夷狄制諸夏矣其原皆自天王失威福之柄也春秋於此蓋有不得已焉爾矣三月癸酉大雨震電庚辰大雨雪程頥曰隂陽運動有常而無忒凡失其度皆人為感之也故春秋災異必書漢儒傳其說不逹其理故所言多妄三月大雨震電不時災也大雨雪非常為大亦災也謝湜曰建寅之月陽氣尚微非大雨震電大雨雪之時三月大雨震電大雨雪變之大者也雷聲異常為震書震則又以示上天譴怒之意胡安國曰震雷者陽精之發雨雪者隂氣之凝周三月夏之正月也雷未可以出電未可以見而大震電此陽失節也雷已出電已見則雪不當復降而大雨雪此隂氣縱也夫隂陽運動有常而無忒凡失其度人為之感也今陽失節而隂氣縱公子翬之讒兆矣鍾巫之禍萌矣春秋災異必書雖不言其事應而事應具存惟明於天人相感之際響應之理則見聖人所書之意矣挾卒謝湜曰挾不氏未賜族夏城郎程頥曰書不時也胡安國曰城者禦暴保民之所而城有制役有時大都不過三國之一邑無百雉之城制也魯嘗城費城郈其後復墮焉則越禮而非制矣凡土功龍見而戒事火見而致用水昏正而栽日至而畢時也隱公城中丘城郎而皆以夏則妨農務而非時矣城不踰制役不踰時又當分財用平板幹稱畚築程土物議逺邇略基址揣厚薄仞溝洫具糇糧度有司量功命日不愆于素然後為之可也况失其時制妄興大作無愛飬斯民之意者其罪之輕重見矣秋七月冬公㑹齊侯于防程頥曰謀伐宋也程氏雜說曰古之治時諸侯服天子之命以守疆土以治人民其朝聘有時其出入有度無非禮者也一作無非事也世之亂也王綱不振諸侯無法以自守强凌弱衆暴寡大者則糾合其黨以逞其欲中者則附從不服以救其亡故列國之㑹紛然於天下矣聖人一以王法正之凡書㑹者皆譏也若夫彼善於此惡有輕重則各重乎其事春秋之法與諸侯為㑹則書曰公㑹某侯于某公㑹齊侯于防公㑹齊侯鄭伯于仲丘之類是也內臣㑹諸侯則書曰某㑹某侯于某單伯㑹齊侯宋公衛侯鄭伯于鄄公孫敖㑹晉侯于戚之類是也內臣之辭也其外諸侯相㑹則書曰某侯㑹于某蔡侯鄭伯㑹于鄧齊侯宋公㑹于洮是也唯以國之大小强弱爵之高卑為之次直罪其非王事相㑹聚爾謝湜曰防魯地左氏謂宋不王謀伐宋胡安國曰周官行人曰時㑹以發四方之禁此謂非時而㑹諸侯以禁止天下之不義也列國何為有此名凡書㑹皆譏也謂非王事相㑹聚爾左氏稱宋公不王鄭伯以王命討之使來告命㑹于防謀伐宋也于中丘為師期也亦謂之非王事可乎曰以王命討宋而聽征討之禁於王都雖召陵之舉不是及矣始則私相㑹為謀於防中則私相盟為師期於鄧終則乘敗人而深為利以取二邑歸諸已奉王命討不庭者果如是乎經之書㑹書伐而不異其文以此十年春王二月公㑹齊侯鄭伯于中丘程頥曰為師期也謝湜曰冬㑹于防春㑹于中丘貪逺務而釋近憂圖外功而弛內事取危之道也夏翬帥師㑹齊人鄭人伐宋程頥曰三國先遣將致伐齊鄭稱人非卿也翬不稱公子與四年同程氏雜說曰翬帥師㑹齊人鄭人伐宋六月壬戌公敗宋師于菅辛未取郜辛巳取防伐宋矣又敗宋師于菅浹日之間取其二邑亟之也故書日以謹之胡安國曰翬不氏先期也始而㑹宋以伐鄭固請而行今而㑹鄭以伐宋先期而往不待鍾巫之變知其有無君之心矣夫亂臣賊子積其强惡非一朝一夕之故及權勢已成威行中外雖欲制之其將能乎去其公子以戒兵柄下移制之於未亂也吕祖謙曰觀隱公一卷其間言王處甚多蓋間止有一二年不言耳以此見得王室雖衰當時尚知有王如鄭伯以王命伐宋若此皆是自後言王處極少以此見得又不及隱公時節又曰鄭伯以王命伐宋須看鄭夲志非是為王不過欲報前宋使三國伐鄭之讐耳又須看前王二于虢鄭怨王室至虢為卿士鄭為左卿士其職已在虢下猶且以齊朝周則伐宋之志巳可見六月壬戌公敗宋師于菅程頥曰不言戰而言敗敗者為主彼與戰而此敗之也辛未取郜辛巳取防程頥曰取二邑而有之盜也謝湜曰郜防宋邑伐宋將以討不庭也得邑而舍罪則暴惡在所伐者皆可以利獲免矣何以禁亂法之人哉故兵以利興春秋惡之取邑重事故書日內則書外則不書詳內事也胡安國曰內大惡其詞婉小惡直書而不隱夫諸侯分邑非其有而取之盜也曷不隱乎於取之中猶有重焉者若成公取鄟襄公取邿昭公取鄫皆覆人之邦而絶其祀亦書曰取所謂猶有重焉者此故取郜取防直書而不隱也其不言戰而言敗敗者為主彼與戰而此敗之也皆陳曰戰詐戰曰敗秋宋人衛人入鄭程頥曰鄭勞民以務外而不知守其國故二國入之謝湜曰君以國為夲國以民為夲夲固然後以動則威以征則服若乃勞民以事攻討而內無守備基夲空虛危國之道也春秋書鄭伯鄭人㑹伐於前書宋人衛人入鄭於後而莊公不知安固國夲其失久矣三國乘虛入鄭故不稱伐宋人蔡人衛人伐戴鄭伯伐取之程頥曰宋人衛人入鄭蔡人從之伐戴鄭伯圍戴克之取三師焉戴鄭所與也故三國伐之鄭戴合攻蓋取三國之聚其殘民也甚矣程氏雜說曰取者非其有之以為己邑也滅者覆人之邦絶人之祀其惡尤甚凡取田邑不以內外皆曰取外國唯隱十年宋人蔡人衛人伐戴鄭伯伐取之僖三年徐人取舒二者不絶其祀取以為己附庸也其他皆滅矣內大惡諱凡滅國皆不書若取鄟取邿取鄫之類皆只謂之取而已唯僖十七年夏滅項不諱者非公滅也按僖十六年冬公㑹齊侯宋公陳侯衛侯鄭伯許男邢侯曹伯于淮十七年九月公至自㑹然則夏公不在國滅項非公滅也凡諱者隱公惡也執政之臣滅之曷為而諱哉謝湜曰戴小國鄭國伐戴取之不書滅者取之為已附庸故也三國移師伐戴大國在所救也鄭伯既不能救又因其困伐而取之襲人之暴而逞其虐乘人之危而利其國不義之大者也胡安國曰稱伐稱取兼之也或疑鄭人兵力不能取戴兼三國之師非矣什圍伍攻正也以寡覆衆竒也莊公蓋嘗克假敗王師因州吁而入許能以竒勝可知矣故駐師於郊多方以誤之也四國已鬪起乘其弊一舉而兼取之卞莊子之術也然則可乎孟子曰善戰者服上刑稱伐取者其以鄭莊公殘民之甚當此刑矣冬十月壬午齊人鄭人入郕程頥曰討不㑹伐宋也宋以公子馮在鄭故二國交惡左氏傳云宋公不王鄭伯以王命討之於春秋不見其為王討也王臣不行王師不出矯假以逞私忿耳謝湜曰郕小國五年衛師入郕十年齊人鄭人入郕小國困於水火可知也胡安國曰左氏傳云宋公不王鄭以王命致討而郕人不㑹齊鄭入郕討違王命也程氏謂宋夲以公子馮在鄭故二國交惡春秋不見其為王討也王臣不行王師不出矯假以逞私忿矣此說據經為合若討違王命則不書入矣入者不順之辭也茍以為難辭則齊鄭大國於討郕何難哉十有一年春滕侯薛侯來朝程頥曰諸侯雖有相朝之禮而當時諸侯於天子未嘗朝覲獨相率以朝魯得為禮乎程氏雜說曰周禮行人凡諸侯之邦交嵗相問也中相聘也世相朝也先王制禮所以盡人之情諸侯之於鄰國壤地相接茍無以相與則何以講好而修睦蓋其勢有不得不然哉然或非禮則適所以為亂也王室不綱典制大壞無禮義之交而惟强弱之視或附大而結好或畏威而共命故小國則朝之聘之大國則聘而不朝故來朝于魯者非邾鄫紀薛則郯杞曹滕之類皆小國也魯侯之所如者惟晋齊楚三大國而已聘於魯者則齊晉宋衛陳鄭秦楚之邦魯臣之所如者則唯多大國而或及於小國者矣是以聖人一切書之皆所以示愧諸侯之來魯者則曰朝曰聘所以紀當世之亂蓋不如是則無以正王法其內臣如諸侯非聘則各書其事惟叔孫豹鄫世子巫如晉不繫事而非聘謝湜曰鄰國疆境相交邦事相聨婚姻相通災難相恤於其繼世則許之相朝所以致兩君親睦之恩也春秋相朝則出於小國畏難而為之非鄰國世朝之禮也故齊楚之屬大于魯則魯往朝之而齊楚不至焉方是時宋人蔡人衛人伐戴鄭伯取戴齊人入郕小國受難甚矣故滕薛恐懼朝魯胡安國曰諸侯朝於諸侯禮乎孔子曰邦君為兩君之好有反坫周禮行人凡諸侯之邦交殷相聘世相朝也夫謂之殷則得中而不過謂之世則終諸侯之世而一相朝其為禮亦節矣周衰典制大壞諸侯放恣無禮義之交惟强弱之視以魯事觀焉或來朝不報其禮或屢往而不納以歸無合於中聘世朝之制矣且列國於天子述所職者蓋闕如也而自相朝聘可乎凡大國來聘小國來朝一切書之而不削皆以示譏滕薛二君不特言者又譏旅見也非天子不旅見諸侯偃然受之而不辭亦以見隱公之志荒矣吕祖謙曰滕薛來朝爭長此一假須看得官制滕侯曰我周之卜正也以此見成周盛時諸侯非惟入為王卿士而卜正一官亦皆諸侯為之又曰看隱公一君須知得天下之禍機常萌於盛滿之時隱之季年滕薛來朝爭長而隱公能和之又與鄭伯入許伐宋皆有功魯正是盛滿之時所以羽父之禍實萌於此如秦隋之君莫不皆然前面如此之盛不知持守之道理後不免有所失何故一旦為羽父所殺也此必有因大凡當盛滿之時最要人持守蓋隱公當此之時驕恣自滿而不知戒故不免有篡弒之禍夏公㑹鄭伯于時來程頥曰謀伐許也謝湜曰時來鄭地左氏謂許不共謀伐許秋七月壬午公及齊侯鄭伯入許程頥曰書及內為主非內為主則先書㑹伐後書入也謝湜曰齊人鄭人入郕公及齊侯鄭伯入許皆不書伐者著其以不義入人之國也入許稱及則以謀出於公也許莊公出奔不書滅者不絶其祀也先王以兵止兵以殺止殺春秋以産怨難而已自中丘㑹起其後魯齊鄭伐宋魯取郜防宋衛入鄭宋蔡衛伐戴鄭取戴齊鄭入郕魯齊鄭入許怨搆而不息禍連而不止故曰兵猶火也弗戢將自焚也可不戒哉胡安國曰書㑹則伐許者夲鄭志也書及則入許者公所欲也隱公即位十有一年天王遣使來聘者再而未嘗朝于京師罪一也平王崩不赴喪㑹葬至使武氏子來求賻罪二也禮樂征伐自天子出而擅興兵甲為宋而伐邾為鄭而伐宋罪三也山川土田各有封守上受之天王下傳之先祖而取郜取防入祊易許罪四也今又入人之國而逐其君罪五也凡此五不韙者人臣之大惡而隱公兼有之然則不善之殃豈特始於惠成於桓而隱之積惡亦不可得而掩矣使隱公者為國以禮而自强於善豈有鍾巫之難乎是故春秋所載以人事言則是非善惡之迹設施於前而成敗吉凶之效見於後以天道言則感應之理明矣不可不察也吕祖謙曰鄭入許而不有許此一假看得王綱初解紐諸侯未敢放手滅人國如後之滅霍滅耿滅魏略無顧忌冬十有一月壬辰公薨程頥曰翬譖于桓公而請弒之公祭鍾巫于寪氏翬使賊弒公于寪氏立桓而討寪氏有死者人君終于路寢見卿大夫而終乃正終也薨于燕寢不正其終也薨不書地弒也賊不討不書葬無臣子也謝湜曰公薨翬與桓公弒之也君父大難臣子所不忍言故不書弒君父大故臣子所不敢沒故不書地薨而書地謹其終也不地以見不得其終也葬以奉安死者君弒而賊不討則死者不安於下雖葬猶弗葬也故不書葬以責無臣子也易曰履霜堅冰隂始凝也馴致其道至堅冰也然則禍難之發非一朝一夕其所由來漸矣春秋書翬帥師不書公子以見公子翬不臣之心巳兆於此其罪在所絶也書大雨震電大雨雪以見災變之大人君所當修省也為隱公者輕社廟以事干戈勞力衆以工城築委宫庭以逐盟㑹國有大姦而不知察臣有逆謀而不知慮天有譴告而不知恐權歸於私門而不知制此不測之變所以發於肘腋之間也然則有國家者其禍亂之萌可不鑒之於微哉胡安國曰致隱讓國立不以正惠公之罪也致桓弒君幾不早斷隱公之失也既有讒人交亂其間憂虞之象著矣而曰使營菟裘吾將老焉是猶豫留時辨之不早也其及也宜隱公見弒魯史舊文必以實書其曰公薨者仲尼親筆也古者史官以直為職而不諱國惡仲尼筆削舊史斷自聖心於魯君見弒削而不書者蓋國史一官之守春秋萬世之法其用固不同矣不書弒示臣子於君父有隱避其惡之禮不書地示臣子於君父有不沒其實之忠不書葬示臣子於君父有討賦復仇之義非聖人莫能修謂此類也夫賊不討仇不復而不書葬則服不除寢苫枕戈無時而終事也以此法討罪至嚴矣故曰春秋成而亂臣賊子懼右隱公十有一年書于經者其事七十有六以為經世之典撥亂反正之書百王不易之大法其詳可得聞乎謂一為元則知祖述憲章以體元為人主之職謂周正為春則知立制度改正朔以夏正為可行之時謂正月為王正則知天下之定于一也隱公不書即位則知父子君臣之大倫不可廢也與邾儀父宋人盟而皆書曰及則知以忠信誠慤為先而盟誓不足貴也太叔出奔共而書曰鄭伯克假則知以親愛為主而恩義之輕重不可偏也來賵仲子而冡宰書名則知夫婦人倫之夲而嫡妾之名分不可亂也祭伯朝魯直書曰來則知人臣義無私交而朋黨之原不可長也公子益師書卒則知春秋貴大臣而恩禮之哀榮不可恝也元者何仁是也仁者何心是也餘詳見第一卷元年春下盟于昧而書及公所欲也盟于宿而書及公立而求成焉非若小國之於大國不得已而要盟者後七年為宋而伐邾昧之盟其刑牲歃血果何為也後十年為鄭而伐宋要質鬼神又安在乎比事而觀而盟不足貴亦審矣世衰道泯民彛泯亂若宋殤之於馮也衛侯鄭之於叔武瑕也皆為利爭不勝討也而莊公獨以順母為辭養成假惡夫中也養不中才也養不才故人樂有賢父兄也仁人之於兄弟不藏怒焉不宿怨焉親愛之而已矣象憂亦憂象喜亦喜恩掩義也使吏治其國而象不得有為義勝恩也恩義並立而中持衡焉假雖凶逆焉攸亂此春秋責莊公之意也太宰建邦六典以佐王治邦國者也而承命以賵諸侯之妾不知其不可是為不智知其不可而不言是為不忠不忠不智之人而可以居百寮之長乎故貶而書名賤之也或曰安知咺之不言如其不用何言而不用則辭其位而不居禮也今奉命而來則知其阿諛順㫖無體國愛君之義矣其貶而書名非宰也夫危而不持顛而不扶則將焉用彼相若以其嘗為冡宰不論功罪而曲以禮貌加之非春秋貴相之意矣君子有更相汲引交好以為公小人有互相朋黨比周以為私迹雖同而情異不可不察也祭伯朝魯安知其為私而不與乎隱公之立未嘗請命王法所當治也祭伯為王卿士不能詔王以正典刑而逺來朝之其為阿私審矣故尹氏來訃不稱爵祭叔來聘不言使皆以明人臣之義杜朋黨之原矣大夫書卒見君臣之義也不書葬明尊卑之等也或日或不日著禮貌之義也名而不書氏者身自為卿而非世也其稱公子以貴戚故使為卿也不書官者不請於王而私自命也其有將兵而㑹戰奉使而出疆名姓巳登於史冊如公子翬者而不書卒何也迷國誤朝躬行弒逆則有天討之刑矣公子遂之罪亦同而書卒何也因事之變以明卿卒不繹之禮而義不係於遂也季孫意如無事之變而書卒獨何歟春秋有變例定哀多微辭季氏逐昭公殺務人而立宋若有漢髙帝之公不賞私勞則三家退聽公室張矣定公幸於禍而忘其危誘於利而忘其辱以意如為大夫而不討先君之賊也天理滅矣是故比事以觀其異同可見觸類而長其指意無窮以一年之事考之則二百四十二年之行事皆可見矣以為經世之典撥亂反正之書百王不易之大法豈不信夫春秋集義卷五

body:
  text: 春秋集義卷二十五宋李明復撰僖公三十年春王正月夏狄侵齊胡安國曰左氏曰晉人伐鄭以觀其可攻與否狄間晉之有鄭虞也遂侵齊詩不云乎戎狄是膺荆舒是懲四夷交侵所當攘斥晉文公若移圍鄭之師以伐之則方伯連帥之職修矣上書狄侵齊下書圍鄭此直書其事而義自見也秋衛殺其大夫元咺及公子瑕謝湜曰公子瑕元咺奉以攝國政者也衛成公得返故衛殺元咺及公子瑕元咺身為悖逆以抗君君歸則已出君出則已歸王法所不容者也春秋不以討賊之詞書者咺立叔武奉子瑕皆出晉命衛成以背晉即楚失國人心而咺無危害社稷之惡故元咺之罪雖大國人有弗討之心其殺之也衛以國法殺之而已故殺元咺不書人以罪成公失人心也殺二大夫已上不書及者其事同其惡均故也殺二大夫書及者以此之故而延及于彼也公子瑕攝國事晉命也衛以元咺背君之故而併殺之故殺書及著其非有大罪也衛之禍皆晉為之也故元咺出書衛歸書衛以著咺之專國也出書奔晉歸書自晉以著晉之病衛也晉里克衛元咺雖逆臣然皆以本國大夫得罪故殺書大夫胡安國曰元咺訟君為惡君歸則已出君出則已歸無人臣之禮信有罪矣則稱國以殺而不去其官何也春秋之法躬自厚而薄責于人君子之道辟諸射失諸正鵠反求諸已衛侯之躬毋乃有闕盍亦省德而內自訟乎夫稱國以殺者君與大臣專殺之也衛侯在外其稱國以殺何穀梁子曰待其殺而後入也待其殺而後入是志乎殺咺瑕者也兵莫憯于志鏌鎁為下衛侯未入稱國以殺者此春秋誅意之效也然則大臣何與焉從君于惡而不能止故并罪之也公子瑕未聞有罪而殺之何也元咺立以為君故衛侯忌而殺之也然不與衛剽同者是瑕能拒咺辭其位而而不立也不與陳他同者是瑕能守節不為國人之所惡也故經以公子冠瑕而稱及見瑕無罪事起元咺以咺之故延及于瑕而衛侯忌克專殺濫刑之惡著矣衛侯鄭歸于衛謝湜曰衛侯出奔衛侯見執非有大罪當黜也特以與楚得罪而已故衛侯出奔見執皆不名以示義不當絶也衛侯奔楚凡三月執歸京師凡二年為社稷主而或奔或執失國之惡大矣故衛侯復歸及歸皆名以示不能守國也踐土之㑹叔武以衛子受盟然則叔武已為晉所立衛侯已為晉所絶矣故衛侯自楚歸國稱復歸以罪晉文絶之也晉執衛侯歸之京師王不加黜而終以返國然則衛侯于衛君道未絶也故衛侯得返稱歸以正衛侯義當返國也觀春秋不名于前稱名于後而晉文迫逐衛成衛成屈辱失國其罪由此見矣觀春秋稱復歸于前稱歸于後而晉文已絶衛成衛成未絶于衛其曲直由此見矣胡安國曰衛侯出奔于楚則不名見執于晉則不名今既歸國復有其土地矣何以名之乎不名者責晉文公之以小怨妨大德名之者罪衛侯鄭之以忮害戕本支古者天下為公選賢與能不以為異况于戚屬豈有疑間猜忌之心哉末世隆怨薄恩趨利棄義有國家者恐公族之軋已至于網羅誅殺無以庇其本根而社稷傾覆如六朝者衆矣衛侯始歸而殺叔武再歸而及公子瑕是葛藟之不名而春秋之所惡也故再書其名為後世戒此義茍行則六朝之君或亦少省矣晉人秦人圍鄭謝湜曰左氏謂鄭二于楚故圍鄭德義馭國之大柄也晉文侵曹伐衛皆不以德執曹伯執衛侯皆不以義是以令不行于許而圍許信不行于鄭而圍鄭故王者先德義後兵革垂衣拱手而天下歸之胡安國曰按左氏傳晉侯秦伯圍鄭以其無禮于晉經書晉人秦人者貶之也于秦晉何貶乎初晉公子重耳出亡過鄭文公亦不禮焉為是興師而圍鄭孟子曰有人于此待我以橫逆則君子必自反也我必不仁無禮與不忠歟仁且有禮而忠矣其橫逆猶是也此亦妄人耳而君子蓋終不之校也故行有不得者皆反求諸己而已矣今鄭伯之于晉公子特不能厚將迎贈送之禮而未嘗以橫逆加之也坐此見圍為列國者不亦難乎故晉侯秦伯貶稱人者晉文以私忿勤民動衆圍人之國秦伯惟利為向背從燭之武之言不以義舉也二國結釁連兵暴肯原野自此始矣介人侵蕭謝湜曰介葛盧兩至魯乘蕭無備侵蕭前書來後書侵為邦國不虞者戒也冬天王使宰周公來聘謝湜曰三公兼冢宰故書宰周公公子遂如京師遂如晉謝湜曰諸侯上聘天子禮事之大者也魯之修聘禮非專以王室為事也故公子遂既聘于周又聘于晉王使宰周公來聘魯始遣大夫報聘又且如晉是待王室與小國等夷也故遂之行書如不書聘罪其不成聘也書遂如晉罪其不敬也胡安國曰大夫出疆有以二事出者有以一事出而專繼事者其書皆曰遂公子遂如周及晉與祭公自魯逆王后皆所謂以二事出者也公子結往媵而及齊宋盟則專繼事者也是非得失則存乎其事冢宰上兼三公其職任為至重而來聘于魯天王之禮莫厚焉魯侯既不朝京師而使公子遂往又以二事出夷周室于列國此大不恭之罪履霜堅氷之漸春秋之所誅而不以聽者也則何以無貶乎有不待貶絶而罪惡見者不貶絶以見罪惡三十有一年春取濟西田謝湜曰天子所封田邑而諸侯取之諸侯之罪也凡書取罪其專濟西田汶陽田皆魯地也昔為鄰國所侵而今能復之不謂之復而謂之取者譏其與取他國田邑不異也濟西汶陽魯之舊也明曲直正封疆請之于王而後受之所謂復之以道也若夫恃為已有專以兵力爭奪則與取人之取何以辨哉春秋之義貴直不貴强貴順不貴爭田雖吾本田地雖吾本地行不以直得不以順亦亂之道也胡安國曰公羊曰取之曹也晉侯執曹伯頒其所侵地于諸侯不係國者吾故田也復吾故田而謂之取何也春秋之法不以亂易亂公子遂如晉夏四月四卜郊不從乃免牲猶三望程頥語録問疑卜郊亦非如何曰春秋却有卜郊但卜上辛不吉則卜中辛中辛不吉則便用下辛不可更也古者一年之間祭天甚多春則因民耕種而祈穀夏則恐旱暵而大雩秋則明堂冬則圜丘皆人君為民之心也凡人子不可一日不見父母國君不可一嵗不祭天又問賜周公以天子之禮樂當否曰始亂周公之法度者是賜也人臣安得用天子之禮樂哉成王之賜伯禽之受皆不能無過記曰魯郊非禮也周公其衰聖人嘗譏之矣說者乃云周公有人臣不能為之功業因賜以人臣所不得用之禮樂則妄也人臣豈有不能為之功業哉借使功業有大于周公亦是人臣所當為爾人臣而不當為其誰為之豈不見孟子言事親若曽子可也曽子之孝亦大矣孟子才言可也蓋曰子之事父其孝雖過于曽子畢竟是父母之身做出來豈是分外事若曽子者僅可以免責矣臣子之于君猶子之于父也臣之能立功業者以君之人民也以君之勢位也假如功業大于周公亦是以君之人民勢位做出來而謂人臣所不能為可乎使人臣恃功而懷怏怏之心者必此言矣又曰魯得用天子禮樂使周公在必不肯受故孔子曰周公其衰矣孔子以此為周公之衰是成王之失也又曰魯用天子禮樂成王之賜伯禽之受皆非也其因襲之弊遂使季氏僣八佾三家僣雍徹仲尼于此著之張載曰郊禘非禮周公其衰是周公之法壞也又曰魯之郊禘非禮也夫子固已明言之杞宋則為其二王之後也魯用天子禮樂必是成王之意不敢臣周公即以二王之後待魯然而非周公本意也以成王尊德樂道之心則善矣伯禽不當受故曰魯之郊禘非禮也周公其衰矣又曰家臣僣大夫三桓僣魯魯僣天子推其原皆在成王成王賜伯禽天子禮樂自其時已啓下僣上之階矣范祖禹曰成王賜魯天子禮樂惟用以祀周公于太廟非使魯君亦得而用之也周衰魯僣竊取而用之習以為常三家僣其君故至于用天子之禮其所由來蓋有漸矣侯仲良曰郊社之禮所以事上帝也祀上帝天子之事也宗廟之禮所以祀乎其先也天子諸侯皆有宗廟謂祀乎其先者各有其先也其與顔子不改其樂之意同天子宗廟天子之先也諸侯宗廟諸侯之先也天子有天子祀先之禮諸侯有諸侯祀先之禮故曰宗廟之禮所以祀乎其先也魯侯也以天子祀先之禮祀其先非禮也瀆也不祀乎其先也故孔子曰禘自既灌而往者吾不欲觀之矣灌祭之禮也自首至尾皆非其祀故也禘其帝之所自出魯周公之封也何禘之所自出哉非其物故也謝湜曰冬至祀上帝孟春祈榖于上帝皆郊祭也祭于郊尚斂也故冬至祀上帝謂之郊孟春祈榖亦謂之郊常祀不卜魯卜郊祈榖之祭也祈榖日用辛成物之義也祭卜日致敬也建寅之月耕事將起先王于是祈榖以致豐年其祀先卜上辛上辛不吉卜中辛中辛不吉乃用下辛盡敬之道也牛在滌曰牲敬其物也傷則不可以供牲故稱牛夏四月卜郊非時也卜郊至四非禮也卜郊四則魯人事神無誠敬之心矣四卜郊不從乃免牲失禮之大也郊祀之大者也三望祀之小者也不郊而三望是廢其大而修其小也三望書猶志其失大祀也猶可止之詞也胡安國曰記禮者曰祭帝于郊而百神受職焉魯諸侯何以有郊成王以周公有大勳勞于天下命魯侯世世祀周公以天子之禮樂是故魯君孟春乘大路載弧韣旗十有二旒日月之章祀帝于郊配以后稷天子之禮也以人臣而用天子之禮可乎是成王過賜而魯公伯禽受之非也楊子曰天子之制諸侯庸節節莫差于僣僣莫重于祭祭莫重于地地莫重于天諸侯祀天僣極矣春秋欲削之則無以志其失悉書之則歲事之常有不勝書者是故因禮之變而書于䇿或以卜或以時或以望或以牲或以牛于變之中又有變焉者悉書其事而謂言偃曰魯之郊禘非禮也杞之郊也禹也宋之郊也契也是天子之事守也言杞宋夏殷之後受命于周作賓王家統承先王修其禮物其得行郊祀而配以其祖非列國諸侯之比也是故天子祭天地諸侯祭社稷祝嘏莫敢易其常古易則亂名犯分人道之大經拂矣故曰郊社之禮所以祀上帝也宗廟之禮所以祀乎其先也明乎郊社之禮禘嘗之義治國其如指諸掌乎夫庶人之不得祭五祀大夫之不得祭社稷諸侯之不得祭天地非欲故為等衰蓋不易之定理也知其理之不可易則安于分守無欲僣之心矣為天下國家乎何有古者大事決于卜故洪範稽疑獨以龜為主卜而不從則不郊矣故免牲又曰望祭也有虞氏受終而望因于類巡狩而望因于柴皆天子之事也今魯不郊而望故特書曰猶猶者可以已之詞其言三望何也天子有方望無所不通諸侯非名山大川在其封內者則不祭魯得用重禮視王室則殺故望止于三比諸侯則隆故河海雖不在其封而亦祭焉非諸侯之所得為也胡宏曰魯之郊禘逆祀之大者李侗曰記曰魯之郊禘非禮也周公其衰矣以其難言故春秋皆于郊禘事中之失而書譏魯自在其中朱熹語録或問明堂位一篇是有此否曰看魯人有郊禘也是有此問曰當時周公制禮父為大夫子為士葬以大夫祭以士父為士子為大夫葬以士祭以大夫豈周公制禮使其子亂之子細看來如此說後却說明乎郊祀之禮禘嘗之義治國其如示諸掌乎恐是子思以此譏魯之僣禮熹曰子思自稱武王周公達孝不曽是譏魯曰孔子言魯之郊禘非禮也周公其衰矣孔子尚有此說熹曰後來是如此譏之吕祖謙曰乃免牲穀梁謂免牲為之緇衣熏裳有司𤣥端奉至南郊免牛亦然蓋古者雖不用此物意思不便消散秋七月冬杞伯姬來求婦謝湜曰蕩伯姬越境逆婦杞伯姬越境求婦違禮一也納幣非卿逆女非卿伯姬求婦其禮不正可知也始之不正而欲其終之以正不可得也故杞伯姬或㑹或來或朝子或求婦胡安國曰蕩伯姬來逆婦而書者以公自為之主失其班列書也杞伯姬敵矣其來求婦曷為亦書見婦人之不可與國事也王后之詔命不施于天下夫人之教令不施于境中婚姻大事也杞獨無君乎而夫人主之也故特書于策以為婦人亂正之戒母為子求婦猶曰不可况于他乎此義行無吕武之禍矣狄圍衛十有二月衛遷于帝丘程氏學曰古者王道之行諸侯各安其邦豈至于遷乎邢衛皆以夷狄內侵國破而遷許以介于晉楚强國之間遂至于四遷蔡則迫于楚故遷也謝湜曰狄侵齊晉不能討故圍衛狄圍衛晉不能救故衛避狄遷于帝丘邢衛之遷皆自遷也二國之遷自弱之道也或曰太王何以去豳遷岐曰豳之遷也其民樂衛之遷也其民憂豳之遷也其民安衛之遷也其民危豳之遷也周室以興衛之遷也衛室以弱胡安國曰帝丘東郡濮陽顓頊之虛亦衛地也狄嘗迫逐黎侯寓于衛而衛不能修方伯連師之職戎嘗伐凡伯于楚丘而衛不能救王臣之患其後遂為狄人所滅東徙渡河矣齊桓公攘戎狄封之而衛國忘亡今又為狄所圍其遷于帝丘避難也而中國衰微狄人强盛衛侯不能强于政治晉文無却四夷安諸侯之功莫不見矣呂祖謙曰衛已遷過楚丘了何故又遷帝丘蓋狄自河北敢過河南自河南又漸漸敢過帝丘來三十有二年春王正月夏四月己丑鄭伯捷卒謝湜曰鄭伯鄭文公魯不㑹葬故不書葬衛人侵狄秋衛人及狄盟謝湜曰狄有亂衛人侵狄請盟故衛與狄盟衛中國也中國不能以義討狄而乃乘亂攻狄書侵罪其不正也狄無禮義惟力是恃乃能屈服請盟盟書及殊狄以甚衛人之惡也胡安國曰按左氏稱狄有亂衛人侵狄狄請平焉衛人及狄盟其不地者盟于狄也再書衛人而稱及者所以罪衛也盟㑹中國諸侯之禮衰世之事已非春秋之所貴况于圍困遷徙之餘從而刑牲歃血以要之哉冬十有二月己卯晉侯重耳卒張載曰重耳直而不婉范祖禹曰晉文公心非不善也而所行不正是以為譎朱熹語録或問晉文公之譎奈何曰程子之說密矣然以其說求之本文則未見其有以發晉文之本心而能使後世慎所舉者張子以譎為婉以事實字義求之亦若未安惟胡氏為得之而呂祖謙考之為詳文多不能悉載學者求之左氏之書自可見矣又曰論語論桓文事猶曰師也過商也不及使當時無公西華之問則今之說者必有優劣之分矣呂祖謙曰晉文公之伯不及齊桓之盛齊桓遲之以二十餘年而晉文求之于六七年間須要做盡許多事又曰晉文公事業在僖公二十八年都做了如侵曹伐衛敗楚朝王聲績赫然震蕩人耳目一年都做盡桓公規模三十餘年尚藏其用功之所以遲速時便是桓文才之高與下官仲舅犯規模之深與淺以是知晉文不如齊桓咎犯之徒不如管仲又曰晉文公凡出許多時直到成伯業皆是趙衰狐偃二人為之謀主文公自僖公之二十四年入國至僖二十七年搜于被廬方始命狐偃將上軍狐偃則讓于狐毛而佐之命趙衰為卿則又讓于欒枝先軫若以後世論之二人自入國便合處于高官大職可也何故經涉許多年方命他將上軍及為卿之任他又相遜二人初不曾計較官職以此知二人是腹心宗臣與社稷同休戚初不論職位之高下又有得古之體國之臣但欲成國事不曾計較官職且如齊桓公之相全在管仲仲只為下卿及平戎于王王以上卿之禮享之仲不敢受曰有天子之二守國高在當時國子高子嘗為齊上卿然國高初無功于齊是以讓者是不計較官職之高下漢高祖之興張良實在三傑之列叔孫通初無大功後來立太子使叔孫通為太傅良止為少傅自常人處之必有憤然不平之心凡此皆國之宗臣初不曾計較官職高下専以推賢讓能使之利害相謀是非相參而已又見人材不厭多晉文有子犯亦猶齊桓之有管仲相似一箇伯諸侯之規模皆自子犯出然文公之規模與齊大段不同桓公是三十年工夫方做得成所以優遊文公兩三年盡做得許多事所以急迫桓公雖有兵車之㑹然史無可書之事亦無可喜之功至于文公事業載在典冊粲然可觀如城濮一戰功業森然在目齊桓成伯業却無迹晉文成伯業便有迹桓公伯業緩成文公伯業速就此晉文所以不如齊桓試又舉其大者言之如齊桓之興便去封已滅之衛歸公乘馬凡牛羊豕雞狗門材皆以與衛閔二年救邢復具邢器用而遷之又與城邢其存植亡國如此晉文公于僖二十六年伐衛失國其一國君臣互相屠戮又執曹伯至使其國亂亡方復曹伯桓公封衛遷邢以存亡國文公執曹伯衛侯使其國亂桓公遷邢封衛一舉便得安迹文公復曹衛反使其國家危亂足見文公不如桓公處然不特此初晉文公于僖二十三年欲歸國及鄭鄭文公不為之禮後來於僖之二十八年城濮既勝之後鄭伯使子人九行成於晉晉使欒枝與盟五月文公及鄭伯盟於衛雍凡與鄭盟者冉矣亦可以釋怨至僖三十年復與秦圍鄭看得文公度量不廣未到坦然大度處所以記人之怨而不忘其不及齊桓又如此齊桓九合諸侯一正天下無非尊王室天子亦未嘗親出慰勞若文公踐土之盟河陽之狩兩屈天子之尊蓋周王不畏齊而畏晉天子視齊桓乃忠臣不過一誠實而晉文權謀高大所以畏晉不畏齊也舉天子畏與下畏又見文公不如桓公看得晉文公既種種不如桓公然桓公伯業不繼而文公雖死伯業不絶何故只緣有一件都强如齊桓晉文所以伯業相繼不絶前說管仲一身任事不能為齊求人材而晉專務收人材看得晉國人材之盛皆出於狐趙初間使狐趙將上軍則讓於狐毛而佐之命趙衰為卿則讓於欒枝先軫卻穀死使原軫又自不為卿又讓之晉人材之所以盛緣狐趙之徒倡推賢讓能之風於上一國所以皆有此風至臼季見冀缺於田野之間其夫婦敬相待以賓臼季歸即薦之於文公文公以為下軍大夫以此見非特朝廷如此相遜而田野亦莫不皆然一國所以皆有推賢讓能之風趙衰狐偃實倡之也直至景公時范宣子讓其下皆讓其波流之及直至如此故晉之伯業所以長久桓公之伯業所以不永也三十有三年春王二月秦人入滑謝湜曰秦穆公遣師襲鄭鄭有備故入滑潜師而進故稱入齊侯使國歸父來聘夏四月辛巳晉人及姜戎敗秦師於殽程頥曰晋不稱君居喪附葬不可從戎也忘親背惠其惡甚矣秦為無道越晉踰周以襲人衆所共憤故稱晉人其稱及姜戎亦然范祖禹曰春秋之時姜戎常佐晉征討以中國之師制之使犄角之助而已至於後世則倚戎狄以成功與之共事未有不為患者也謝湜曰秦穆公乘人之虛而潛師以入其國兵之不道未有甚於此者也晉人惡之姜戎惡之故書晉人及姜戎以明衆所同惡也晉襄釋殯興戎虧失子道故貶稱人秦師書敗不書戰不戰而敗之也千里襲國其地險其衆勞其勢危一躡其後未有不亡其衆者也蹇叔可謂先見之明矣穆公信邪言咈忠諌蹈必死之地以徼成功此所以取殽之敗也入者少敗者衆故入稱人敗稱師胡安國曰按書序秦穆公伐鄭晉襄帥師敗諸殽而經書晉人敗秦師於殽是皆仲尼親筆其詞何以異乎書序專取穆公悔過自誓之言止於勸善其辭恕春秋備書秦晉無道用兵之失兼於懲惡其法嚴此所以異也晉襄親將絀不稱君者俯逼葬期忘親背惠墨衰絰而即戎其惡甚矣視秦猶狄其罪云何客人之館而謀其主因人之信已而逞其詐利人之危而襲其國越人之境而不哀其喪叛盟失信以貪勤民而棄其師狄道也夫杞子先軫之謀偷見一時之利徼幸其成自以為功也二君皆過聽焉而貪其利是使為人臣者懷利以事其君為人子者懷利以事其父君臣父子去仁義懷利以相與利之所在則從之矣何有於君父文公之喪僅五月耳墨經從戎大倫滅矣春秋人晉子而狄秦所以立人道存天理也癸已葬晉文公狄侵齊公伐邾取訾婁秋公子遂帥師伐邾謝湜曰夏伐其國取其邑秋又興師伐之著其虐也胡安國曰按左氏公伐邾取訾婁報升陘之役邾人不設備襄仲復伐之此皆不勝忿欲報怨貪得恃强凌弱不義之兵也直書其事而罪自見矣或曰取須句訾婁有為為之也伐邾至於再三念母勤矣夫念母者必當止乎禮義平王不撫其民而逺屯戍乎家詩人刺之夫子録焉僖公以成風之有功於己也越禮以尊其身違義以報其怨殘民動衆取人之邑曾是以為孝乎呂祖謙曰襄仲復伐邾一則是因晉有喪一則緣邾不設備之故晉人敗狄於箕謝湜曰狄潛兵侵晉不戰而敗之箕晉地呂祖謙曰狄侵齊因晉喪也春秋時狄侵中國初間强盛時桓出來整頓一次至此文公一死便因喪乘隙欲侵撓中國至是年冬魯僖公如齊朝且弔有狄師當時諸侯特來弔戎狄以此見得戎狄强盛之甚而是年侵齊亦非小小侵撓也大抵春秋時若非伯主時復出來整一次如何㑹得成中國又曰晉敗狄于箕此是一大戰所以獲白狄之君冬十月公如齊十有二月公至自齊謝湜曰齊歸父來聘故公朝于齊乙巳公薨于小寢胡安國曰左氏曰即安也周制王宫六寢路寢一小寢五君日出而眂朝退適路寢聽政使人眂大夫退然後適小寢釋服是路寢治事之所也而小寢燕息之地也公羊以西宫為小寢或以諸侯有三宫則列國之制蓋降于王其以路寢為正則一爾君終不于路寢則非正矣曾子曰吾得正而斃又何求哉古之人貴于得正乃如此故凡直書而義自見矣隕霜不殺草李梅實程頥曰春秋書隕石霜何故不言石隕霜隕此便見得天人一處又曰雨木氷上溫而下冷隕霜不殺草上冷而下溫謝湜曰隂氣微故夏十月隕霜陽氣勝故霜不殺草李梅實謂之隕霜者寒氣凄冽而隕之也胡安國曰哀公問于仲尼曰春秋記隕霜不殺草何為記之也曰此言可殺也夫宜殺而不殺則李梅冬實天失其道草木猶干犯之而况君乎是故以天道言四時失其序則其施必悖無以統萬象矣以君道言五刑失其用則權必喪無以服萬民矣哀公欲去三桓張公室問杜于宰我古者用命賞于祖不用命戮于社宰我對以使民戰栗蓋勸之斷也仲尼則曰成事不說既往不咎其自與哀公言乃以為可殺何也在聖人則能處變而不失其常在賢者必有小貞吉大貞凶之戒矣其論隕霜殺草則李梅冬實蓋除惡于微慮患于早之意也朱熹曰霜在今之十月則不足怪在周之十月則為異矣晉人陳人鄭人伐許謝湜曰左氏謂許二于楚春秋集義卷二十五

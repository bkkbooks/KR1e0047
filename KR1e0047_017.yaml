body:
  text: 春秋集義卷十四宋李明復撰莊公十有二年春王三月紀叔姬歸于􅈶謝湜曰叔姬無子當歸魯魯不能存故歸􅈶外不能保兄弟內不能保妻妾紀侯之罪也胡安國曰莊公四年紀侯去國叔姬至此始歸于􅈶者紀侯方卒故叔姬至此然後歸爾歸者順詞以宗廟在􅈶歸奉其祀也魯為宗國婦人有來歸之義紀既亡矣不歸于魯所謂全節守義不以亡故虧婦道者也魯人髙其節義恩禮有加焉是故其歸于􅈶其卒其葬史冊悉書夫子修經存而弗削與衛之共姜同垂不朽為後世勸若夏侯令女曹爽之婦也寡居守志父母欲奪而嫁之誓而弗許而曰曹氏全盛之時尚欲保終况今衰亡何以棄之聞者為之感動其聞叔姬之風而興起者乎夏四月秋八月甲午宋萬弒其君捷及其大夫仇牧謝湜曰閔公遇弒仇牧趨君之難以隕其身可謂忠于其君矣故書及以顯其忠書大夫以示能死職人君所與居處游燕不可一非其人隂邪得居其間則雖千乘之君匹夫或得為之難宋萬凶勇之士也凶則蓄禍心勇則無忌憚閔公旦暮與之相親而不知為之戒故一言拂意而不測之變發于蕭牆然則左右近習可以一非其人耶孟子曰禍福無不自己求之者師旅之衆敗乎外大水之變動乎內閔公不知變而又狎比凶人此其所以取不測之禍也胡安國曰君弒而大夫死于其難春秋書之者其所取也大夫死于弒君之難而有不書者故知孔父牧息皆所取也夫仇牧可謂不畏强禦矣然徒殺其身不能執賊無益于事也亦足取乎食焉不避其難義也徒殺其身不能執賊亦足為求利焉而逃其難者之訓矣何名為無益哉夫審事物之重輕者權也權重輕而處之得其宜者義也太宰督亦死于閔公之難削而不書者身有罪也惠伯死于子惡之難亦削而不書非君命也召忽死于子糾之難孔子比于匹夫匹婦之諒自經于溝瀆而莫之知者所事不正也崔杼弒君晏平仲曰人有君而人弒之吾焉得死之而焉得亡之君子不以是罪晏子者齊莊公不為社稷死而晏子非其私昵之臣也若仇牧荀息立乎人之本朝執國之政而君見弒不以其私也雖欲勿死焉得而勿死聖人書而弗削以為求利焉而逃其難者之勸也惟此義不行然後有視棄君猶土梗辨髦曾莫之省而三綱絶矣冬十月宋萬出奔陳謝湜曰閔公遇難已三月矣賊三月未討而又出奔宋無臣子可知也逆賊所不待教而誅也逆賊避難鄰國而陳容之陳無臣子可知也萬未賜族南宫萬之稱號非氏也如東門襄仲是也胡定國曰按左氏宋萬弒閔公于蒙澤奔陳宋人請萬于陳以賂陳人使婦人飲之酒而以犀革裹之宋人醢萬然則賊已討矣曷為不書陳人殺萬而葬閔公乎夫天下之惡一也陳人不以萬為賊而納之又受宋人之賂而使婦人飲之酒是與賊為黨非政刑也特書萬出奔陳而閔公不葬以著陳人與賊為黨之罪而不能正天討其法嚴矣故春秋成而亂臣賊子懼十有三年春齊侯宋人陳人蔡人邾人㑹于北杏程氏學曰㑹者外為主及者內為主將尊師衆則書曰某帥師將卑師衆則書曰師將尊而衆不成師則書某而不書帥師將微師少則直書曰伐曰及外則書人而已戎狄舉號賤之也諸侯稱國狄之也謝湜曰齊桓能任管仲以修國政號令明而賞罰行是以首為北杏之會而四國之衆從之故四國書人胡安國曰桓何以及四國之微者㑹是宋公邾子也然則何以稱人春秋之世以諸侯而主天下㑹盟之政自北杏始其後宋襄晉文楚莊秦穆交主夏盟跡此而為之者也桓非受命之霸諸侯自相推戴以為盟主是無君矣故四國稱人以誅始亂正王法也齊侯稱爵其與之乎上無天子下無方伯有能㑹諸侯安中國而免民于左袵則雖與之可也誅諸侯者正也與桓公者權也或曰桓公始平宋亂遂得諸侯四國稱人言衆與之也夏六月齊人滅遂謝湜曰修政刑明禮義治大睦小以尊王室東周之業由此興矣桓公非有勤王之實也先利後義先力後德并兼土地以為一國私計而已故十年滅談十三年滅遂遂子死于兵亂故不書奔胡安國曰滅國之與見滅罪孰為重取國而書滅奪人土地使不得有其民人毁人宗廟使不得奉其祭祀非至不仁者莫之忍為見滅而書滅亡國之善詞上下之同力也其亦不幸焉爾語有之曰興滅國繼絶世天下之民歸心焉今乃滅人之國而絶其世罪莫重矣齊人滅遂其稱人微者爾凡書滅者不待再貶而惡已見秋七月冬公㑹齊侯盟于柯謝湜曰莊公以納糾不克與齊㑹好不通五年矣齊桓將合諸侯以修霸業故棄怨修好與魯為盟夫捐宿讐結新好使怨耦之人釋怨來盟則桓公講信以待鄰國于柯見之矣胡安國曰始及齊平也世讐而平可乎于傳有之敵惠敵怨不在後嗣魯于襄公有不共戴天之讐當其身則怨不復而主王姬狩于禚㑹伐衛同圍郕納子糾故聖人詳加譏貶以著其忘親之罪今易世矣而桓公始合諸侯安中國攘夷狄尊天子乃欲修怨怒鄰而危其宗社可謂孝乎故長勺之役專以責魯而柯之盟公與齊侯皆書其爵則以為釋怨而平可也或稱齊襄公復九世之讐而春秋賢之信乎以仲尼所書柯之盟其詞無貶則復九世之讐而春秋賢之者妄矣其諸傳者借襄公事以深罪魯莊當其身而釋怨耶十有四年春齊人陳人曹人伐宋胡安國曰宋人背北杏之㑹諸侯伐宋其稱人者將卑師少也齊自管仲得政滅談之後二十年間未常遣大夫為主將未嘗動大衆出侵伐蓋以制用兵而賦于民薄矣故能南摧强楚西抑秦晉天下莫能與之爭也或以為貶齊稱人誤矣夏單伯㑹伐宋謝湜曰宋背北杏之㑹故齊以討叛之義伐之單伯㑹伐以柯之盟也胡安國曰隱公四年諸侯伐鄭翬帥師㑹伐則再舉宋陳蔡衛四國之名今諸侯伐宋而單伯㑹伐不復再舉三國之名何也宋人背北杏之㑹合諸國而伐之者齊桓公也㑹伐者無貶焉故其詞平主謀伐鄭而欲求寵于諸侯以定其位者州吁也㑹之者黨逆賊也故其詞繁而不殺疾之也再舉而列書者甚疾四國之詞也言之不足故再言之而聖人之情見矣吕祖謙曰齊請師于周單伯㑹之是時單伯須帥師以往其出兵多少雖不見于經亦自可以類推如晉平丘之㑹請帥王賦元戎十乘以先啓行以此見得出兵亦不多蓋才是霸者只欲假其名而不資其力不過欲托天子之名非欲賴其兵也秋七月荆入蔡謝湜曰宋有大難陳容逆賊而齊桓弗能治荆蹂踐蔡國而齊桓弗能救其無逺業可知也冬單伯會齊侯宋公衛侯鄭伯于鄄謝湜曰齊桓既服宋故㑹諸侯于鄄十有五年春齊侯宋公陳侯衛侯鄭伯㑹于鄄謝湜曰柯之盟桓公假信以服魯而示天下者也鄄之㑹桓公假義以服宋而示天下者也滅談滅遂以威天下而又以二國信義繼之討叛服二出于一時好惡而不純乎義故荆一執蔡侯一入蔡一伐鄭吕祖謙曰齊始霸齊桓圖霸之條理自宋起蓋二國近齊故也夏夫人姜氏如齊秋宋人齊人邾人伐郳胡安國曰霸者之先諸侯專征也非霸者而先諸侯主兵也此齊桓之師何以序宋下猶未成乎霸也二十七年同盟于幽天下與之然後成乎霸矣鄭人侵宋胡安國曰侵宋之義三傳不同左氏曰有鐘鼓曰伐無鐘鼓曰侵先儒或易其說以為聲罪致討曰伐無名行師曰侵未有以易之也然考諸五經皆稱侵伐在易謙之六五曰利用侵伐征不服也書之太誓曰我武惟揚侵于之疆詩之皇矣曰依其在京侵自阮疆周官大司馬以九伐之法正邦國而曰賊賢害民則伐之負固不服則侵之而以為無名行師可乎然則或曰侵或曰伐何也聲罪致討曰伐潛師掠境曰侵聲罪者鳴鐘擊鼓整衆而行兵法所謂正也潛師者銜枚卧鼓出人不意兵法所謂竒也吕祖謙曰齊既霸了鄭何故敢間之而侵宋此只是齊桓初霸所以如此冬十月十有六年春王正月夏宋人齊人衛人伐鄭秋荆伐鄭冬十有二月㑹齊侯宋公陳侯衛侯鄭伯許男滑伯滕子同盟于幽程頤曰齊桓始霸仗義以盟而魯首畔盟故諱不稱公上無明王下無方伯諸侯交爭齊桓始霸天下與之故書同謝湜曰齊桓大合諸侯諸侯畢㑹公羊書公㑹齊侯是也幽之盟列國皆欲聽于齊故書同盟周衰諸侯無所統一小大弗率相攻相爭久矣桓公特起衰亂之中乃能憑信義修政行令振舉邦法㑹九國同盟于幽使諸侯有所遵守忌憚不敢自肆以至天下爭鬬少衰兵革少息而黔黎得遂其生濟世之功大矣以此尊周室一天下以復文武之業又豈難于力哉惟桓公有勤王之名無勤王之實此功業所以不究也春秋之法王臣與㑹與伐書同盟以明王臣亦與盟也衆國㑹盟書同盟以明小國與大國同欲也幽之盟非齊以力脅小國而為之也非獨鄭以荆難服齊而從之也其盟出于同欲謂之同盟以此而已胡安國曰㑹者公也不書公諱也其諱公何也程氏曰齊桓始霸仗義以盟而魯首叛盟故諱不稱公惡失信也其曰同盟何也程氏曰上無明王下無方伯列國交事桓公始霸天下與之故書同盟志同欲也自古皆有死民無信不立故聖人以信易食答子貢之問君子以信易生重桓王之失春秋之諱公與是盟也豈不以信之重于生與食乎先儒或以不書公者諱與讐盟誤矣果以桓為讐而諱與盟者曷不于柯之盟諱之也又曰有生不可無信聖人以信急于食君子以信重于生按春秋莊公十六年幽之盟魯公在㑹諱而不書者齊侯始霸仗義以盟魯首叛之惡失信也仲尼以此為大惡故諱不書公以為後戒朱熹語録或問魯桓公為齊襄公所殺其子莊公與齊桓公㑹盟春秋何不譏曰凡事貴謀始及要早乘勢做放冷了便做不得如魯莊公之事見讐在面前不曾報得更欲報之于其子非惟事有所不可也自做得無意思了又況齊桓公率諸侯尊周室以義而舉莊公雖欲不赴其盟㑹豈可得哉事又當權箇時勢義理輕重若桓公不是尊王室無事自來召諸侯如此則魯莊不赴可也今桓公名為尊王室若莊公不赴非是叛齊乃叛周也若欲復讐則當襄公殺其父之時莊公當以不共戴天之故告之周天子方伯連帥必以復讐為事殺得襄公而後已如此方快人況桓公自是襄公被殺之後方入國自無箇干涉了曰若莊公能殺襄公復與桓公為會可否曰既殺襄公則自家事已了與桓公為㑹亦何妨但莊公若能殺襄公則九合諸侯一正天下之功將在莊公而不在齊桓矣惟其不能所以只得屈服人也又問魯桓公為齊襄公所殺其子莊公與桓公㑹而不復讐先儒謂春秋不譏是否曰當初只是據事如此寫在如何見譏與不譏當桓公被殺之初便合與理㑹使上有明天子下有賢方伯當上告天子下告方伯興復讐之師只緣周家衰弱無告訴處莊公又無理㑹使自與之主婚以王姬嫁齊及到桓公時又自隔一重了況到此事體又别桓公率諸侯以尊周室莊公安得不去若是不去却不是叛齊乃是叛周或曰使莊公當初自能舉兵殺了襄公還可更赴桓公之㑹否曰他若自能殺襄公他却自㑹做霸主不用去隨桓公若是如此便是這事結絶了邾子克卒謝湜曰邾以王命進為諸侯故書爵十有七年春齊人執鄭詹謝湜曰詹鄭執政大臣鄭伯聽命于齊與齊同盟矣同盟之後齊侯疑鄭而執詹齊侯食幽之盟也齊侯不以至信待邦國也霸者不足以服人之心于此見矣拘而不殺曰執執之將以服之也春秋之亂諸侯擅作刑威以强陵弱而執人之君者有之以上虐下而執人之臣者有之凡執春秋皆奪爵稱人以王法治之也惟晉執曹伯歸京師執得其罪故書晉侯胡安國曰書齊人執鄭詹惡齊之詞也鄭既侵宋又不朝齊詹為執政蓋用事之臣也其見執宜矣而以惡齊何也以責人之心責已則盡道以愛已之心愛人則盡仁此春秋待齊之意也吕祖謙曰齊執鄭詹前年鄭既服齊今何故不朝蓋緣鄭介于齊楚之間才朝齊恐楚又來伐所以不敢來朝齊夏齊人殱于遂謝湜曰齊人被殺無遺故曰殱齊人戍遂遂之四族怨齊者深于是饗戍以酒而盡殺之春秋不以責遂而歸咎于齊者以其禍由齊發也書曰齊人殱于遂罪其自取也紀侯去其國自去也鄭棄其師自棄也梁亡自亡也齊人殱于遂自殱也其禍皆自為也凡禍出于自為者春秋上不以委命下不以責人胡安國曰殱盡也齊滅遂使人戍之遂之餘民飲戍者酒而殺之齊人殱焉春秋書此者見齊人滅遂恃强陵弱非伐罪弔民之師遂人書滅乃亡國之善詞上下之同力也夫以亡國餘民能殱强齊之戍則申胥一身可以存楚楚雖三户可以亡秦固有是理足為强而不義之戒而弱者亦可省身而自立矣秋鄭詹自齊逃來程氏學曰鄭詹自齊逃來詹為鄭卿見執于齊不能自辨以理取直而歸反如匹夫之逃越來他國斯可賤也齊國强大魯與為鄰而受其逋逃是亦取禍之道謝湜曰詹以國卿見執不能辨是非明曲直以解國憂乃若匹夫避難奔逃臣子事君不可奪之節掃地盡矣春秋以逋竊待之而謂之逃賤之也榖梁謂逃義曰逃以詹義當死節而竊去也力不足以勝人久矣以力劫人者可以暫安不可以久固可以暫得不可以久屈故桓公威勢非不盛也其滅遂也遂復殱齊其執詹也詹復逃魯胡安國曰榖梁子曰逃義曰逃逃者匹夫之事詹之見執若其有罪雖死可也儻曰無罪苟見免焉請從惠于㑹使諸侯聞之則不辱君命矣不能以理自明也而反效匹夫之行遁逃苟免越在他國不亦可賤乎特書逃以著其幸免而不知命之罪也齊桓始霸同盟于幽而魯首叛盟受其逋逃虧信義矣書自齊逃來又以非魯也冬多麋謝湜曰麋沴氣所生多則為害凡沴氣所生之物皆害物故和氣致祥乖氣致異胡安國曰麋魯所有也多則為異以其又害稼也故書此亦禹放龍蛇周公逺犀象之意也害稼則及人矣十有八年春王三月日有食之夏公追戎于濟西程頤曰備預不虞武之善經也戎來侵魯不書者不知戎來既去而公追于濟西其無武備甚矣是危道也謝湜曰冦去而逐之曰追不書戎來侵不知也戎潛兵入冦其去也覺而追之備守不嚴甚矣危國之道也故子于既濟思患預防于萃除戎器戒不虞胡安國曰此未有言侵伐者而書追戎是不覺其來已去而追之也為國無武備啓戎心而不知警危道也春秋之意其必未雨而徹桑土閒暇而明政刑秋有􅈮冬十月謝湜曰蜮獸之為人害者也蜮不宜有有則為災冬多麋夏戎至秋有蜮皆政事荒弛所致故書胡安國曰􅈮魯所無也故以有書夫以含沙射人其為物至微矣魯人察之以聞于朝魯史異之以書于䇿何也山隂陸佃曰􅈮隂物也是時莊公上不能防間其母下不能正其身陽淑消而隂慝長矣此惡氣之應其說是也然則簫韶作而鳯凰來儀春秋成而麟出于野何足怪乎春秋書物象之應欲人主之慎所感也世衰道微邪說作正論消小人長善類退天變動于上地變動于下禽獸將食人而不知懼也亦昧于仲尼之意也吕祖謙曰凡春秋書有皆是本地素無忽有焉則書如有蜚有鸜鵒之類是也十有九年春王正月夏四月秋公子結媵陳人之婦于鄄遂及齊侯宋公盟程頤曰鄄之㑹嫁女于陳人結以其庶女媵之因與齊宋盟挈之以往結好大國所以安國息民乃以私事取怒大國故深罪之書其為媵而往盟為遂事又曰此本為媵婦卻遂及諸侯盟聖人罪之之意在遂事也謝湜曰公子結非卿為遂事故書名以宗族之親得用故書公子鄄衛地盟于鄄三國相期也先書于鄄以見結本適陳至鄄乃盟陳人之婦魯女嫁為卿大夫妻者古者卿大夫亦相媵故也與齊侯宋公盟國事也媵于陳結之事也公子結專以君命出盟其出也因以私事媵婦于陳然則結之出以私事為重以國事為輕以媵陳人婦為重以盟三國為輕其憂國不若憂家之急也故春秋首書結媵陳人而繼書鄄盟為遂事罪其不敬也結于鄄遂及三國盟與祭公遂逆王后同意胡安國曰媵賤事陳人微者公子往焉是以所重臨乎禮之輕者也齊侯伯主宋公王者之後盟國之大事者也大夫輒與焉是以所輕當乎禮之重者也禮者不失已亦不失人失已與人冦之招也是故結書公子而曰媵陳人之婦譏其重以失已也齊宋書爵而曰遂譏其輕以失人也遂者專事之詞聘禮大夫受命不受辭出境有可以安社稷利國家則專之可也謂本有此命得以便宜從事特不受專對之辭耳若違命行私雖有利國家安社稷之功使者當以矯制請罪有司當以擅命論刑何者終不可以一時之利亂萬世之法是春秋之㫖也夫人姜氏如莒謝湜曰如齊已非禮如莒又甚矣心不能安其室故也冬齊人宋人陳人伐我西鄙謝湜曰公子結將命出盟猶不足以解齊難故三國伐我西鄙孫氏謂齊帥二國討鄭詹然則魯之所以得過于齊以其受鄭詹也魯與齊鄰國而受其逋逃取禍之道也凡諸侯來伐至國書伐我不至國書伐鄙過辱之事聖人于魯常婉其辭父母之國故也胡安國曰奉詞曰伐其稱人將卑師少也結方與二國盟則其來伐我何也齊桓始霸責魯不恭所謂失已與人以招冦也或以結能為魯設免難之䇿為齊宋畫講好之計身在境外而權其國家為春秋子之故稱公子非矣春秋集義卷十四

body:
  text: 春秋集義卷三十二宋李明復撰宣公九年春王正月公如齊公至自齊謝湜曰母喪如齊不諱者公之惡有大於此故也夏仲孫蔑如京師謝湜曰公如齊仲孫蔑如京師齊强王室弱故也胡安國曰以淺言之屬辭比事春秋教也當歳首月公朝于齊夏使大夫聘於京師此皆比事可攷不待貶絶而惡自見者也宣公享國九年於周纔一往聘其在齊則又再朝矣經於如齊每行必致深罪之也下逮戰國周衰甚矣齊威王往朝于周而天下皆賢之况春秋時乎而宣公不能也故聘覲之禮廢則君臣之位失諸侯之行惡而倍畔侵陵之患起矣此經書君如齊臣周之意而特書王正以表之也齊侯伐萊謝湜曰七年伐萊萊未服故又伐萊秋取根牟謝湜曰杜氏謂根牟東夷國八月滕子卒謝湜曰滕昭公用夷禮故稱子魯不㑹葬故不書葬不日不名史失之九月晉侯宋公衛侯鄭伯曹伯㑹于扈晉荀林父帥師伐陳胡安國曰按左氏討不睦也陳侯不㑹荀林父以諸侯之師伐陳晉侯卒乃還則知經所書者與晉罪陳之詞也㑹于扈以待陳而陳侯不㑹然後林父以諸侯之師伐之也則幾於自反而有禮矣不書諸侯之師而曰林父帥師者在㑹諸侯皆以師聴命而林父兼將之也則其衆輯矣晉主夏盟又嘗救陳所宜與也而惟楚之即夫豈義乎辛酉晉侯黑臀卒于扈謝湜曰扈之㑹以陳與楚謀伐陳也諸侯不出故荀林父帥師伐陳諸侯不振可知也不知制楚而區區伐陳晉之失道也晉侯伐陳未返而卒于㑹卒于㑹書地重之也冬十月癸酉衛侯鄭卒謝湜曰衛侯衛成公魯不㑹葬故不書葬胡安國曰晉成公何以不葬魯不㑹也衛成公何以不葬亦魯不㑹也衛成事晉甚謹而魯宣公獨深嚮齊衛欲為晉致魯故謀黑壤之㑹而特使孫良夫來盟以定之也及㑹于黑壤而晉人止公賂然後免是以扈之㑹皆前日諸侯而魯獨不往二國繼以喪故亦皆不㑹此所謂無其事而闕其文者也或曰二君皆有貶焉故不書葬誤矣魯人不㑹亦無貶乎書卒而以私怨廢禮忘親其罪已見春秋文簡而直視人若日月之無私照也曲生意義失之逺矣宋人圍滕謝湜曰宋人因滕喪圍滕宋人大惡也胡安國曰圍國非將卑師少所能辦也必動大衆而使大夫為主帥明矣然而稱人是貶之也滕既小國又方有喪所宜矜哀弔恤之不暇而用兵革以圍之比事以觀知見貶之罪在不仁矣楚子伐鄭晉郤缺帥師救鄭謝湜曰自鄭從楚侵陳晉與列國伐鄭二侵鄭一自鄭背楚從晉楚人楚子侵鄭伐鄭二胡安國曰楚兵加鄭數矣或稱人或稱爵何也鄭自晉成公初立舍楚而從中國正也楚人為是興師而加鄭不義矣故宣公三年書人書侵罪之也次年鄭公子歸生弑其君諸侯未有聲罪致討者而楚師至焉故特書爵與之也然興師動衆賊則不討惟服鄭之為事則非義舉矣故又次年𫝊稱楚子伐鄭而經書人再貶之也至是稱爵豈與之乎按公羊例君將不言帥師書其重者也至此書爵見其凌暴中華以重兵臨鄭矣何以知其非與之乎曰下書晉郤缺帥師救鄭則知其非與之也由此觀春秋書法皆欲治亂賊之黨謹華夷之辨以一字為褒貶深切著明矣陳殺其大夫洩治謝湜曰靈公君臣宣淫於朝大夫洩治直諫而死冶之死國卿孔寜殺之也不書孔寜者寜之殺直臣也靈公弗能禁大臣弗能争是乃陳國殺之也殺書陳罪其國也靈公昏淫久矣立於朝者皆邪臣也與邪臣竊位以事汙君未嘗有匡救之力也及惡之宣於朝也然後以一言直諫而死其名節不足稱也故冶之死春秋無美詞胡安國曰稱國以殺者君與用事大臣同殺之也稱其大夫則不失官守而殺之者有専輒之罪矣洩冶無罪而書名何也冶以諫殺身者也殺諫臣者必有亡國弑君之禍故書其名為徴舒弑君楚子滅陳之端以垂後戒此所謂係於名而書其名者也比干諫而死子曰商有三仁焉洩冶諫而死何獨無褒詞夫語黙死生當其可而止耳洩冶之盡言無隠不愧乎史魚之直矣方諸比干自靖自獻于先王則未可同日而語也冶雖効忠其猶在宋子哀魯叔肸之後乎故仕于昏亂之朝若異姓者如子哀潔身而去可也其貴戚耶不食其祿如叔肸善矣又曰按春秋書陳殺其大夫洩冶於前而載楚子入陳于後明殺諍臣者必有滅亡之禍不待貶絶而自見者也吕祖謙曰洩冶諫陳靈公當從胡氏説或者邦無道危行言遜冶或未盡所謂危行言遜是下位之人非大夫之事冶是大夫大夫與聞國之政事固亦當諫不得已去之亦可十年春公如齊公至自齊謝湜曰公比年如齊以濟西田故也胡安國曰此亦如齊亦致其至而不書月上九年亦如齊亦致其至而書月者為是年夏使仲孫蔑如京師故特于歲首書王正月以著宣公之罪而君臣名分之際謹嚴如此也歸田以為私恵比於君臣名分之際則大小不侔矣齊人歸我濟西田程頤曰魯修好故歸魯田田魯有也齊非義取之故云歸我不足為善也程氏學曰按元年公㑹齊侯于平州公子遂如齊六月齊人取濟西田公子遂殺子惡而立宣公故以濟西田賂齊而齊人取之至是而歸者公比年朝齊請而得之也夫魯之分地先君受于天子奚可失墜又况負弑君之罪賂以免討乎齊取逆人之賂以貶惡乎故其取其歸皆謹而書之然其他歸田未有言我而此特曰我濟西田者獨此故魯田也若哀八年齊人歸讙及闡定十年來歸鄆讙龜隂田皆魯侵諸侯而得之非周公之本封也既本他國之田故不言我葢以寡暴衆以大侵小而得之者如有王者作則在所予乎在所奪乎聖人所書以正王法耳鄆讙龜陰田特書曰來歸者夾谷之㑹孔子相焉質以禮義齊人自服而來歸故也他只書歸者皆我請而得之也謝湜曰濟西田魯以賂齊者也齊人取我濟西之賂矣至此復以濟西歸我者以公比年如齊請而得之也諸侯土地皆受之天子也擅割擅取其罪一也魯割天子分田以逃逆宣公之大罪也齊取天子分田以容逆恵公之大罪也故取田書歸田復書謹其地也所以著二國之罪也濟西魯之故地也歸稱我以明我之所有也鄆讙龜隂不稱我者其地非魯本封皆魯侵而得之故也非故地則稱歸故地則稱歸我以王法正邦國之封疆也鄆讙書來歸者以彼自服而來也濟西獨書歸者以我請而得之也胡安國曰宣公于齊順其所欲既以女妻其臣又以兵㑹伐萊之舉又每歲往朝于齊廷雖諸侯事天子無是禮也故恵公悦其能順事已而以所取濟西田歸之也歸讙及闡直書曰歸此獨書我者乃相親愛恵遺之意或謂濟西魯之本封故書我則誤矣以柔巽卑屈事人不以其道而得地與悦人之柔巽卑屈事已不以其道而歸其地皆人欲之私而非義矣夏四月丙辰日有食之己巳齊侯元卒齊崔氏出奔衛謝湜曰尹氏武氏崔氏皆以氏世其職者也尹以世權之重赴告外通武以世權之重子攝父職崔以世權之重逼上出奔然則三氏世權之尤甚者也故尹武崔書氏以著内外世卿之患也詩稱尹氏太師然則尹族専國非一日也其氏已著於幽王之時矣胡安國曰按左氏崔杼有寵于恵公高國畏其逼也公卒而逐之奔衛書曰崔氏以族奔也許翰以謂崔杼出而能反反而能肆者以其宗强於此舉氏辨之早也其説得矣所謂譏世卿者非公羊本㫖盖門弟子因尹氏武氏稱世卿而附益之於此耳經有事同而詞異亦有事異而詞同一視之則泥而不通矣公如齊五月公至自齊程氏學曰君行其至必書於法當然也古者諸侯朝㑹有常節出入有常期周衰以後無法而妄行征伐㑹盟紛紛四出棄社稷委人民往往越月踰歲而後得返觀其所書而其亂自著矣然必書其告廟而見於册書者則春秋可得而紀其不告者則史所不載而春秋亦不得而書焉然則不告者尤為非禮亦可知也謝湜曰公立非正且不順其立齊之力也故十年五朝于齊魯人病齊可知也胡安國曰文約而事詳者經也春如齊朝恵公夏如齊奔其喪若是雖不致可也而皆致者甚之也天王之喪不奔欲行郊禮而汲汲於奔齊恵公之喪天王之葬不㑹使㣲者往而公孫歸父㑹齊恵公之葬其不顧君臣上下尊卑之等所謂肆人欲滅天理而無忌憚者也詞繁而不殺聖人之情見矣癸巳陳夏徴舒弑其君平國謝湜曰君不君則臣不臣陳靈之禍是已胡安國曰陳靈公之無道也而稱大夫之名氏以弑何也禍莫大於拒諫而殺直臣忠莫顯於身見殺而其言驗洩冶所為不憚斧鉞盡言於其君者正謂靈公君臣通于夏徴舒之家恐其及禍不忍坐觀故昧死言之靈公不能納又從而殺之卒以見弑而忘其國此萬世之大戒也特書徴舒之名氏以見洩冶忠言之驗靈公見弑之由使有國者必以逺色修身包容狂直開納諫諍為心也以為罪不及民故稱大夫以弑者非經意矣六月宋師伐滕謝湜曰宋嘗圍滕矣滕未服故又伐滕胡安國曰前圍滕稱人刺伐喪也此伐滕稱師譏用衆也宋大國爵上公伯主之餘業力非不足也今鄰有弑逆不能聲罪致討乃用大衆以伐所當矜恤之小邦且滕不事已無乃已徳猶有所闕而滕何尤焉故特稱師以著其罪而汲汲於誅亂臣討賊子之意見矣公孫歸父如齊葬齊恵公謝湜曰公子遂如晉葬晉襄公公孫歸父如齊𦵏齊恵公齊晉皆大國也胡安國曰歸父仲遂之子貴而有寵宣公深徳齊侯之能定其位而又以濟西田歸之也故生則傾身以事之而不辭於屈辱歿則親往奔喪而使貴卿㑹其葬亦不顧天王之禮闕然莫之供也比事考辭義自見矣晉人宋人衛人曹人伐鄭謝湜曰晉郤缺救鄭不力鄭從楚故四國伐鄭胡安國曰按左氏鄭及楚平諸侯伐鄭取成而還其稱人貶也鄭居大國之間從于强令豈其罪乎不能以徳鎮撫而用力争之是謂五十步笑百步庸何愈於楚自是責楚益輕罪在晉矣吕祖謙曰自宣四年以後晉楚交伐鄭㸔上面許多標題處鄭南北兩屬晉楚只是要争鄭此是楚人盛則中國衰此處最要㸔秋天王使王季子來聘謝湜曰季子來聘報仲孫蔑之聘也季子母弟之為大夫者也季子字天子大夫稱字故也王以私恩寵季子故季子繫王言之親逆惡非義也以官私其親非正也胡安國曰公羊傳曰王季子者王之母弟也王有時聘以結諸侯之好禮也宣公享國至是十年不朝于周而比年朝齊不奔王喪而奔齊侯喪不遣貴卿㑹匡王葬而使歸父㑹齊侯之葬縱未舉法勿聘焉猶可也而使王季子來王靈益不振矣自是王聘春秋亦不書矣公孫歸父帥師伐邾取繹謝湜曰伐邾取須句取訾婁矣今又伐邾取繹然則魯之問罪於邾惟以利其田邑而已王法在所黜者也胡安國曰用貴卿為主將舉大衆出征伐不施于亂臣賊子奉天討罪而凌弱侵小近在邦域之中附庸之國是為盜也當此時陳有弑君之亂既來赴告藏在諸侯之策矣曽不是圖而有事于邾不亦傎乎故四國伐鄭貶而稱人魯人伐邾特書取繹以罪之也大水季孫行父如齊冬公孫歸父如齊謝湜曰齊頃公初立行父聘于齊歸父又聘于齊結齊好也一歳之間公兩如齊歸父行父三如齊雖曰以弔聘而出上下煩擾甚矣胡安國曰按左氏行父如齊初聘也歸父如齊邾故也齊侯嗣立宣公親往奔其父喪又使貴卿㑹葬矣若待逾年然後脩聘未晚也而季孫亟行歸父繼往則以宣公君臣不知為國以禮而謂妄説取人之可以免于討也歸父貪于取繹畏齊而往盖理曲則氣必餒矣能無畏乎哉春秋備書而不削以著其罪為後世鑒也齊侯使國佐來聘謝湜曰恵公卒未踰年頃公以成君之禮遣使修聘書爵著其惡也胡安國曰葬之速也大不懐也人未踰年而以君命遣使聘于隣國則哀戚之情忘矣孟子曰養生不足以當大事惟送死可以當大事滕文公五月居廬未有命戒及至顔色之戚哭泣之哀弔者大悦而有願為其氓者盖禮義人心之所同然也齊頃公嗣位之初舉動如此喪師失地幾見執獲豈特婦人笑客之罪哉已失守身之本矣饑謝湜曰大水漂蕩征役煩數故饑春秋以民為本故書饑以恤民命楚子伐鄭謝湜曰四國伐鄭鄭從晉故楚子伐鄭胡安國曰經有詞同而意異者比事以觀斯得之矣九年楚子伐鄭稱爵者貶詞也若曰國君自將恃强壓弱憑陵中夏之稱也知然者以下書晉郤缺帥師救鄭則貶楚可知矣此年楚子伐鄭稱爵者直詞也若曰以實屬辭書其重者而意不以楚為罪也知然者以𫝊書晉士㑹救鄭逐楚師于潁北而經削之則責晉可知矣此類經以𫝊為案者也十有一年春王正月夏楚子陳侯鄭伯盟于辰陵謝湜曰楚莊勢益强盛中國所不能制故陳侯鄭伯出受楚盟二國晉楚所争二國從楚盟于辰陵則楚國衰弱可知也鄭子良曰晉楚不務徳而兵争與其來者可也鄭襄無守死中國之志而大臣無守死中國之謀乃鄭之所以取禍也胡安國曰晉楚争此二國為日久矣今陳鄭背晉從楚盟于辰陵而春秋書之無貶詞者豈與其下喬木而入幽谷乎晉人而不能令則楚人進矣經之大法在誅亂臣討賊子有亂臣則無君有賊子則無父無父無君即大倫等于弁髦人類殄為禽獸雖得天下不能一朝居也今魯與齊方用兵伐莒晉與狄方㑹于攢函而不謀少西氏之逆也而楚人能謀之所謂禮失而求之野夷狄之有君不如諸夏之亡也辰陵之盟所以得書于經而詞無貶乎聖人討賊之意可謂深切著明矣公孫歸父㑹齊人伐莒謝湜曰以二國不能平莒故秋晉侯㑹狄于攢函謝湜曰狄在所攘而反㑹之棄中國不問而㑹狄攢函景公之罪也攢函狄地胡安國曰周禮蕃服世一見無會同分類也書㑹戎㑹狄㑹呉皆外詞也内中國故詳外四夷故畧今中國有亂天王不能討則方伯之責也又不能討則四隣諸侯宜有請矣而魯方㑹齊伐莒晉亦求成于狄是失肩背而養其一指不能三年而緦小功之察不亦傎乎凡此直書其事不待貶絶而義自見者也冬十月楚人殺陳夏徴舒程頤曰人衆詞大惡衆所欲誅也胡安國曰稱人者衆詞也大惡人人之所同惡人人之所同得討其稱楚人殺徴舒諸夏之罪自見矣按左氏𫝊楚子為夏氏亂故謂陳人無動將討於少西氏遂入陳殺徴舒轘諸栗門而經先書殺後書入者與楚子之能討賊故先之也討其賊為義取其國為貪舜跖之相去逺矣其分乃在於善與利耳楚莊以義討賊勇於為善舜之徒也以貪取國急於為利跖之徒也為善與惡特在一念須臾之間而書法如此故春秋傳心之要典不可以不察者也或曰聖人大改過楚雖縣陳能聴申叔時之説而復封陳可謂能改過矣猶書入陳以貶之何也曰楚莊意在滅陳雖復封之然鄉取一人焉以歸謂之夏州而又納其亂臣是制人之上下使不得其君臣之道也晉人以幣如鄭問駟乞之立故子産對曰若寡君之二三臣而晉大夫専制其位是晉之縣鄙也何國之為辭客幣而報其使晉人舍之他國非所當與也而必欲納其亂臣存亡興滅其若是乎仲尼重傷中國深美其有討賊之功故特從末減不稱取陳而書入雖曰與之可矣丁亥楚子入陳納公孫寜儀行父于陳程頤曰誅其罪義也取其國惡也入者不受而彊之也致亂之臣國所不容也故書納謝湜曰夏徴舒陳之大逆也楚子以罪討而殺之諸侯之師未有義于此者也殺書楚人善其得討賊之義也徴舒之罪人人皆欲殺之故也晉主盟之國也陳之亂晉不能討而楚能討之則義舉在楚而不在晉矣雖然楚之討陳也以陳之富因欲縣陳以叔時之諫然後反之書入罪其因人之亂而利之也入惡辭以其為陳病也公孫寜儀行父導君于淫以起亂陷君于危以取亡其罪在所絶也而楚子復納于陳書納罪其黨邪臣也納惡辭以其脅陳而返之也二子不繫之陳絶于陳也春秋不以惡廢善不以善掩惡楚子始正而終邪殺有罪而納有罪故春秋美其義于前而懲其惡于後所以明天王之法也胡安國曰此二臣者從君于昏宣淫于朝誅殺諫臣使其君見弑盖致亂之臣也肆諸市朝與衆同棄然後快于人心今乃詭詞奔楚託于討賊復讎以自脱其罪而楚莊不能察其反覆又使陳人用之是猶人有飲毒而死者幸而復生又强以毒飲之可乎故聖人外此二人于陳而特書曰納納者不受而强納之者也為楚莊者宜奈何瀦徴舒之宫封洩冶之墓尸孔寧儀行父于朝謀于陳衆定其君而去其庶幾乎朱熹曰臣下不匡之刑盖施于邦君大夫之䘮國亡家者君臣一體不得不然如漢廢昌邑王賀則誅其羣臣如宋太祖下嶺南亦誅其亂臣龔澄樞李托之類是也澄樞等實亡劉氏乃飛亷惡來之比誅之自不為寃若昌邑羣臣與賀同惡者固不得不誅其餘止可當古者墨刑之坐耳乃不分等級例行誅殺是則霍光之私意也又如胡安國論楚子納孔儀處事雖不同意亦類此試參考之則知成湯之制官刑正是奉行天討毫髪不差處何疑之有哉春秋集義卷三十二

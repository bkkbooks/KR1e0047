body:
  text: 春秋集義卷十九宋李明復撰僖公四年春王正月公㑹齊侯宋公陳侯衛侯鄭伯許男曹伯侵蔡蔡潰遂伐楚次于陘程頥曰齊桓本侵蔡遂至于楚而伐之責其職貢其行非正也然其所執之事正故人但稱其伐之正而不見其行事之本譎也是以正掩其譎又曰桓公伐楚責包茅雖其心未必尊王而其事則正故正掩其譎又曰伐楚事責之以包茅不貢其名則是若其意豈為楚不勤王然後加兵但欲楚尊齊而不尊周管仲亦莫之詰也若實尊周專封之事豈冝為之故孟子曰五覇假之也言其不以誠為之也程氏學曰孟子曰春秋無義戰彼善於此則有之矣若齊桓伐楚不由王命非所謂為天吏則可以伐之者也然楚蠻夷之國强暴僣逆憑陵中夏桓公能奮十國之威一舉服之而天下不胥為左祍者迺其力也故書曰侵蔡蔡潰遂伐楚次于陘不遽加兵而椘已服矣故書曰楚屈完來盟于師盟于召陵彼自服而來求盟于我也然則伐楚之役召陵之盟于春秋之世可謂善矣如成二年袁婁之盟則異于是齊雖强大數侵諸侯國而未若荆椘之暴諸侯為復私怨而無如桓公之義齊侯使國佐如師非服而來也畏晉之强而賂晉也晉受賂而與之盟我反及彼也故不曰來盟而曰秋七月齊侯使國佐如師己酉及國佐盟于袁婁春秋于王道信輕重之權衡曲直之繩墨也范祖禹曰齊桓公心譎而行正伐椘是也楊時曰桓公責楚以包茅不入固非有夾輔王室之誠心而其事則正矣尹焞曰責包茅不入昭王不反亦謂假仁以行其覇謝湜曰齊之將伐楚也先以八國之師攻蔡兵始渉境而蔡人潰焉以齊桓威勢之盛也蔡之潰也兵震威行遂以八國伐楚其伐楚也兵不速進而次止于陘桓公伐楚正也假攻蔡以伐楚不正也覇者不純乎王雖義事其心不免乎譎故蔡書侵伐楚書遂罪其師行之不由道也蔡楚與國潰人民奔散之詞胡安國曰潛師掠境曰侵侵蔡者奇也聲罪致討曰伐伐楚者正也遂者繼事之詞而有專意次止也椘貢包茅不入王祭不供無以縮酒桓公是徵而楚人服罪師則有名矣孟子何以獨言春秋無義戰也譬諸殺人者或曰人可殺與曰可孰可以殺之曰為士師則可以殺之矣國可伐與曰可孰可以伐之曰為天吏則可以伐之矣楚雖暴横憑陵上國齊不請命擅合諸侯豈所謂為天吏以伐之乎春秋以義正名而樂與人為善以義正名則君臣之分嚴矣書遂伐楚譏其專也樂與人為善茍志于善斯善之矣書次于陘楚屈完來盟于師盟于召陵序其績也又曰春秋重軍旅之事來戰則罪在外齊侯衛侯鄭伯來戰于郎是也往戰則罪在内及鄭師伐宋丁未戰于宋是也獨至齊侯侵蔡伐楚駐師于陘則襃而書次楚子遣使則美而書來何也荆楚暴横憑陵中國鄭在王畿之内數見侵伐微齊侯攘斥胥變而為夷矣此門庭之冦所當懲創不可已焉者也胡宏曰易師左次無咎如齊桓伐楚退師召陵趙充國討先零固守不戰漢髙伐項羽舍滎陽成臯而趨宛葉朱雋討韓忠解圍而後復戰皆左次也朱熹曰據楚當時憑陵中夏僣號稱王其罪大矣如何不理㑹葢一説著此事楚决不肯便服事勢自然住不得故只尋些年代久逺已冷底罪過及他些小不共貢事去問他想他見無大利害决不深較只要得他稍稍退聽便收殺了此亦是器小故才是器小自然無大功業又曰桓文所以有功于王室者葢當時楚最强大時復加兵于鄭鄭則在王畿之内又伐陸渾之戎觀兵周疆其勢與六國不同楚在春秋他國不及其强若非桓文有以遏之則周室為其所并矣張栻曰王覇之分徳與力也以力假仁者以其勢力假仁之事以行之如齊桓責包茅于楚㑹王世子于首止衣裳之㑹不以兵車之類是也又曰春秋無義戰葢不論其得失利害循其本而言之也夫以上征下則有征諸侯不禀命于天子而互相征討動則為不義矣然而彼善于此則有之葢本非盡善也以此而方諸彼則淺深輕重之間有庶幾者耳而其為不義則一也如齊桓公侵蔡伐楚如晉文公城濮之戰在當時其事雖若善至于不禀王命而擅用其師則均為不義而已然則一時諸侯當如之何寡怨息爭睦隣撫衆以歳時承事于宰旅或不幸而為他國之所侵凌理義所在葢不可得而屈也若是則得之矣呂祖謙曰椘之憑陵非一日矣如伐鄭蔡而桓公皆不問桓以荘之十五年伯中國而以僖四年始伐楚葢驟加兵于楚萬一不勝則伯威屈矣故遵時飬晦至于人强威盛而後一舉而臨之則楚無不服又曰齊桓公與管仲為伐楚之役茍直責其不共貢職以討之則適投其病楚必稽首而歸罪矣而君臣過計以不共貢職之罪為不足遂逺求昭王不復之事欲張楚之罪大吾出師之名以葢侵蔡之私抑不知膠舟之禍年逾數百荒忽茫昧不可考質椘安肯帖然坐受其責乎此所以來水濵之侮也使桓公管仲茍止以包茅責楚而不加以昭王之問則言出而楚服矣尚何待進師至陘而僅得其請盟乎又曰齊侯以諸侯之師侵蔡蔡潰遂伐楚齊欲伐楚已經略多年不是因侵蔡後方伐楚本是要伐楚因侵蔡耳夏許男新臣卒謝湜曰上言次于陘下言盟于師許男卒于師不言可知胡安國曰劉敞曰諸侯卒于外者在師則稱師在㑹則稱㑹今許男一無稱者此去師與㑹而復歸其國之驗也召陵地在頴川是以許男復焉古者國君即位而為椑嵗一漆之出疆必載椑卒于師曰師卒于㑹曰㑹正也許男新臣卒非正也其為人君不知命者也不知命則必畏死畏死則必貪生貪生則必亂于理矣而後有容身茍免之恥而後有滛祀非望之惑此説是也夫知死生之説通晝夜之道者亦豈有以異于人哉茍得正而無斃焉則無求矣楚屈完來盟于師盟于召陵謝湜曰師之進次于陘也詰楚有義攘椘有力椘國上下畏服皆欲聽命于齊屈完于是來盟完之來盟楚子遣之也不言使以明上下同欲也桓公服楚以禮故退師盟于召陵召陵之盟非齊迫之也楚人自服而来故書来盟楚為中國病久矣入蔡敗蔡侵鄭伐鄭肆為憑陵中國不絶如綫桓公合諸侯以振華夏之威從簡書以抑僣竊之勢問南征以尊王室責包茅以修王祭兵不血刅師不輿尸干戈一舉而荆蠻稽顙受盟其惠安中國之功大矣故伐楚之師書次于陘善其不以攻戰為事也書屈完來盟善其兵刃不交而楚人來服也書盟于召陵善其服楚有禮而不以兵威也孔子曰管仲相桓公覇諸侯一匡天下微管仲吾其被髮左祍矣由召陵觀之中國得免左祍之患者豈非桓公之力乎故召陵之盟君子美之雖然王者之師仁義而已殺一無罪不為也蔡人與楚為罪輕楚病中國為罪大桓公正楚之罪奉辭出伐可也若乃假蔡伐楚而先以八國犯蔡則蔡人之受患者衆矣豈仁人用兵之意哉故蔡書侵書潰伐楚書遂罪其不正也胡安國曰楚大夫未有以名氏通者其曰屈完進之也其稱楚權在完也來盟于師嘉服義也盟于召陵序桓績也桓公帥九國之師侵蔡而蔡潰伐楚而楚人震恐兵力强矣責包茅之不貢則諾問昭王之不復則辭徼與同好則承以寡君之願語其戰勝攻克則對以用力之難然則桓公退師召陵以禮楚使卒與之盟而不遂伐也于此見齊師雖强桓公能以律用之而不暴椘人已服桓公能以禮下之而不驕庶幾乎王者之事矣春秋之盟于斯為盛而楊子稱之曰齊桓之時緼而春秋美召陵是也呂祖謙曰齊侯陳諸侯之師與楚屈完乗而觀之齊伐楚何故不興師便來敵齊却使屈完何故葢齊是覇主又是節制之師不可輕犯所以先使屈完來觀葢楚是强國所以屈完之對不肯盡服如責包茅則服之責昭王之不反則不服至齊一說到衆戰攻城上屈完便不服遂以徳綏諸侯誰敢不服對其辭終不服以此見楚有人是時子元為令尹亦楚之賢者其才與管仲略相當此對正如司馬仲達對諸葛亮一般齊人執陳轅濤塗謝湜曰執濤塗稱人執不以道貶之也桓公與陳南伐强楚師未還返而執其大夫罪其不恕也諸侯出于陳鄭之間以伐楚其返也陳人欲出東方者以師為之病也不修其師而執濤塗責人者重而求己者輕非恕之道也朱熹曰以執轅濤塗侵曹伐衛之事而視夫東征西怨虞芮質成則人心之服與不服可見秋及江人黄人伐陳程頥曰齊命也謝湜曰杜氏謂受齊命討陳魯為兵主八月公至自伐楚葬許穆公冬十有二月公孫茲帥師㑹齊人宋人衛人鄭人許人曹人侵陳謝湜曰夏齊人執濤塗秋三國伐陳冬七國侵陳齊侯以軍道之故困陳而為之病也合諸侯以問罪所恃者賞刑而已賞刑不當則邦國離心非服人之道也書侵陳罪之也魯獨書師者大兵之後復以師出惡其勞民也胡安國曰揚子法言或問為政有幾曰思斁昔在周公征于東方四國是皇其思矣夫齊桓公欲徑陳陳不果納執轅濤塗其斁矣夫桓公識明而量淺管仲器不足而才有餘方楚之未帖而齊以為憂也致勤于鄭振中夏之威㑹于陽榖敦逺國之信按兵于陘修文告之詞退舍召陵結㑹盟之禮何其念之深禮之謹也存此心以進善則桓有王徳而管氏為王佐矣堯舜性之也湯武身之也五覇假之也久假而不歸烏知其非有惜乎桓文假之不久而遽歸也楚方受盟志已驕溢陳大夫一謀不恊其身見執其國見伐見侵而怒猶未怠也桓徳于是乎衰矣愛人不親反其仁治人不治反其智禮人不答反其敬行有不得者皆反求諸己其身正而天下歸之曽可厚以責人不自反乎原其失在于量淺而器不宏也魏武纔得荆州而張松見忽唐荘宗自矜取汴而髙氏不朝成湯勝夏撫有萬方乃曰兹朕未知獲戾于上下慄慄危懼若將隕于深淵萬方有罪在于一人予一人有罪無以爾萬方人之度量相越豈不逺哉春秋稱人以執罪齊侯也稱侵陳者深責之也故孟子曰仲尼之徒無道桓文之事者管仲曽西之所不為也而子為我願之乎五年春晉侯殺其世子申生謝湜曰獻公惑驪姬之譖世子申生不能自辯縊于新城然則申生之死獻公殺之也世子君之貳國之本也信讒邪而殺世子則是為人之君而滅國本也君道于此絶矣父子之道天性也信䜛邪而殺世子則是為人之父滅天性也父道于此絶矣故申生死書殺書世子以著獻公之惡也甚哉嬖寵之為患也體莫重于世情莫重于子嬖寵得志于内䜛言得行于外則雖其重為吾世其親為吾子人心之所係屬而不可解者亦且視之如冦讎棄之如糞土矣有國家者其于嬖寵可不為之防哉故春秋明申生之死以為天下戒也胡安國曰公羊子曰殺世子母弟直稱君者甚之也申生進不能自明退不能違難愛父以姑息而陥之不義䜛人得志幾至亡國先儒以為小仁大仁之賊也而目晉侯斥殺專罪獻公何也春秋端本清源之書也内寵並后嬖子配嫡亂之本也驪姬寵奚齊卓子嬖亂本成矣尸此者其誰乎是故目晉侯斥殺專罪獻公使後世有欲紊妃妾之名亂嫡庶之位縱人欲滅天理以敗其國家者知所戒焉以此防民猶有以堯母名門使姦臣逆探其意有危皇后太子之心以成巫蠱之禍者朱熹曰申生不辯驪姬看得來亦未是若辯而後走恐其他公子或可免于難呂祖謙曰驪姬之殺申生國語所載甚詳看左氏與國語相為表裏國語載之甚詳本末具備中大夫里克也左氏則載里克謂之中大夫中立之謀國語載之甚詳當時驪姬欲殺申生而立奚齊所憚者尚有里克使優施以酒飲里克欲以優施説之觀優施以言動克言人皆集于逺已獨集于枯是言申生之勢已自摧落不可倚恃里克知言中立其免乎優施曰免當時里克是一箇正人使克能執志不囬則驪姬之計未必行今優施聞里克之語遂告驪姬聞申生之語遂肆行而無忌以國語所載論之所載本末初不同謀殺申生但對優施言然左氏直書中大夫成謀見當時姬憚里克克若能守正不懼殺申生謀必不成克既説中立可以自免驪姬得以肆其謀而無憚雖不須驪姬謀謂之成謀亦可也大抵姦以作亂不必要人成附但則持兩端中立以為無所與于其間則姦人便可以成謀左氏斷之所以歸中大夫之罪到後面一叚使之歸胙于獻公當時驪姬殺申生之謀獻公已自許他了今特造此一叚事為罪名而已然則殺申生不是獻公不知當驪姬譛言之際論來太子合當便行當時太子謂我辭姬必有罪或使之行謂君實不察其罪皆是不知獻公之心然當時太子既是不出言甘心待死是以辦一死在了以正理論之成父之過然而犯逆死罪了已自不是當時合當便即死又却奔歸于所封之邑須當看這一節這箇不是變生倉卒時無措如何申生既能全死尚自當倉卒之變奔歸于邑又不是要恃城郭以作亂以此見處死却易從容就死則難此無他元無工夫但則是小心不忍便至倉卒無措其不近道理亦自可見又曰晉殺太子申生殺太子而告之諸侯如此等是大事當告之諸侯杞伯姬來朝其子謝湜曰子幼而母以其子出朝非禮也父不故而子行父事以朝非法也伯姬驕恣若此以洮之㑹啓之也夏公孫兹如牟謝湜曰牟微國桓十五年牟人來朝公及齊侯宋公陳侯衛侯鄭伯許男曺伯㑹王世子于首止程頥曰世子王之貳不可與諸侯列世子出諸侯㑹之故其辭異程氏學曰王世子天子之貳也以王世子之尊而下㑹諸侯天王失道可知矣此諸侯之卑而敢抗王世子為㑹諸侯不臣可知矣春秋之法尊君而卑臣抑强而扶弱君道弱矣必扶而尊之臣道强矣必抑而卑之豈特懲當世之變亂葢將以明天地之大義也故殊㑹王世子所以示諸侯不可得而抗也九年夏公㑹宰周公齊侯宋子衛侯鄭伯許男曹伯于葵丘天子之宰固亦尊矣然非世子之足擬故祇書在諸侯之上其他三人雖微同此皆所以尊王命也謝湜曰小國服從大國親睦率諸侯以尊王室桓公之職也㑹王世子而不能朝王㑹于首止而不能入見于周桓公無尊周之實也王世子天王之貳也諸侯王室之臣也以王世子下㑹諸侯天王之失道也以諸侯上㑹王世子諸侯之失道也春秋之義不以卑凌尊不以邪拒正所以明君臣之大義也首止之㑹以魯及齊不與齊侯主列國也不與齊侯主列國所以尊君而卑臣也殊㑹王世子不與諸侯抗世子也不與諸侯抗世子所以黜邪而崇正也胡安國曰及以㑹尊之也以王子而下㑹諸侯則凌以諸侯而上與世子㑹則抗春秋抑强臣扶弱主撥亂世反之正特書及以㑹者若曰王世子在是諸侯咸往㑹焉示不可得而抗也後世論其班位有次于三公宰臣之下亦有序乎其上者則將奚正自天王而言欲屈逺其子使次乎其下示謙徳也自臣下而言欲尊敬王世子則序乎其上正分義也天尊地卑而其分定典叙禮秩而其義明使羣臣得申其敬則貴有常尊上下辨矣經書宰周公祗與王人同序于諸侯之上而不得與殊㑹同書此聖人尊君抑臣之㫖也而班位定矣胡宏曰首止之盟義繋于齊桓之㑹王世子而不繫于王世子㑹齊桓朱熹曰春秋書㑹王世子與齊桓公也呂祖謙曰㑹于首止凡太子來與諸侯與㑹後故不可廢又曰㑹于首止胡春秋謹始例論之詳確秋八月諸侯盟于首止程氏學曰齊桓公攘夷狄救中國㑹王世子于首止而諸侯盟于首止春秋之盟斯為善矣故諸侯之所同志而鄭伯獨内棄諸夏外交夷狄上不順王命下不順伯者而逃歸不盟故六年啓諸侯之伐致新城之圍八年寗母之㑹不敢與盟而令世子聽命焉九年王人齊侯等盟于洮而鄭伯乞盟也噫以諸侯之尊始于逃歸而終于乞盟甚乎鄭伯之罪也襄七年陳侯逃歸義同亦棄中夏而從荆楚故也趙子曰凡逃者皆謂義當留而竊去也故榖梁曰逃義曰逃也君臣同辭逃者匹夫之事謝湜曰諸侯盟于首止諸侯盟于葵丘王世子宰周公不盟也齊桓假仁義以尊王室故雖與世子周公為㑹然尊貴世子周公不敢與盟以崇大義也尊王室以崇大義翼戴天子以示大順人心所同欲故稱諸侯胡安國曰無中事復舉諸侯㑹盟同地再言首止者書之重詞之複其中必有大美惡焉首止之盟美之大者也王將以愛易世子桓公有憂之控大國扶小國㑹于首止以定其位太子踐阼是為㐮王一舉而君臣父子之道皆得焉故夫子稱之曰管仲相桓公一匡天下民到于今受其賜微管仲吾其被髮左衽矣中國之為中國以有父子君臣之大倫也一失則爲夷狄矣故曰首止之盟美之大者也鄭伯逃歸不盟謝湜曰㑹王世子以尊周盟諸侯以崇大義春秋㑹盟未有善于此者也鄭文公從夷棄夏以畏楚之心背盟竊歸是以匹夫之行逃中國之義也書曰逃歸賤之也書曰不盟罪其違命也胡安國曰事有惡者不與為幸其善者不與為貶平丘之盟惡也請魯無勤是以為幸故直書曰公不與盟首止之盟善也犯衆不盟是以為貶故特書鄭伯逃歸逃者匹夫之事以諸侯之尊下行匹夫之事雖悔于終病而乞盟如所喪何其書逃歸不盟深貶之也或曰首止之㑹非王志也王惡齊侯定世子而使周公召鄭伯曰吾撫女以從楚可以少安鄭伯喜于王命而畏齊故逃歸不盟然則何罪乎曰春秋道名分尊天王而以大義為主夫義者權名分之中而當其可之謂也諸侯㑹王世子雖衰世之事而春秋與之者是亦變之中也天下之大倫有常有變舜之于父子湯武之于君臣周公之于兄弟皆處其變者也賢者守其常聖人盡其變㑹首止逃鄭伯處父子君臣之變而不失其中也噫此春秋之所以為春秋而非聖人莫能修之者矣呂祖謙曰鄭伯逃歸不盟逃只是潛身而歸欲連師而歸則齊必覺正如髙祖脱鴻門相似楚人滅弦弦子奔黄程氏學曰凢諸侯為人滅其國或見伐而出於己非其罪則于國未冝絶于其奔也則皆不名彼其義未虧故可直于天子而求復也焉可遂絶之哉荘十年齊滅譚譚子奔莒僖五年楚人滅弦弦子奔黄十年狄滅温温子奔衛不言出者國滅無出也二十八年衛侯奔楚是也若昭公三十年呉滅徐徐子章禹奔楚名者彼己服於呉而後奔無興復之志故也桓十五年鄭伯突出奔蔡昭二十三年莒子庚興來奔皆奪正而立者也桓十六年衛侯朔出奔齊以王命絶之也㐮十四年衛侯衎出奔齊昭三十年北燕伯欵出奔齊二十一年蔡侯朱出奔楚皆不能嗣守先業上下乖離國人不君自取播越其位已絶故即名之若哀十年邾子益來奔按此年公伐邾八月己酉入邾以邾子益來八月歸邾子益于邾至是復來奔其爲絶明矣謝湜曰譚子奔莒弦子奔黄温子奔衛皆不名者君有不屈之志邦有可復之道春秋未之絶也九月戊申朔日有食之冬晉人執虞公程氏學曰王道衰微諸侯不道執人之君者有之執人之臣者有之春秋舉天下之法以治之皆奪其爵而曰某人惟成十五年晉侯執曹伯歸于京師執得其罪且歸于王故書晉侯然則其他貶而人者罪亦昭矣其因㑹伐入滅等書執而不曰人者繼上事於文不可更言某人故也如晉侯入曹執曹伯畀宋人得與侯執類乎舉此一事其類可知諸侯無罪為人所執于理何可絶故悉不名惟荘十九年宋人執滕子嬰齊宋既稱人滕子復名者兩俱有罪爾謝湜曰晉獻公襲人之國而執其君惡之大者也凡執諸侯執者皆奪爵稱人見殺者皆不名以執者無道而見執者無可絶之罪也虞公非有大惡加民也以一國君主而見執于人者特以無後慮而已百里奚宫之竒去而虞國空虚虢亡而虞國單弱方是時外無鄰國為之援内無忠臣為之輔虞公措身于國勢若匹夫故獻公還師館虞而虞公見執矣有國家者其可以無藩垣之蔽股肱之助哉書執虞公所以為後世戒也是故非王命而執人為不義為君主而執于人為不智胡安國曰公羊子曰虞人已滅矣其言執何不與滅也滅者亡國之善詞上下之同力矣若夫虞公地之緼于晉久矣晉命行乎虞氏信矣其曰晉人執之者猶衆執獨夫爾貴為天子冨有四海而身為獨夫商紂是也貴為諸侯富有一國而身為獨夫虞公是也其曰公者非存其爵猶下執之之詞也不言以歸驗其為匹夫之實也書滅下陽于始而記執虞公于後可以見棄義趨利瀆貨無厭之能亡國敗家審矣呂祖謙曰晉滅虢當時桓公既為覇主何故聽晉如此縱橫葢當時天下紛亂亦救不得許多頭項最是夷狄極盛所以先去伐狄而次伐楚又何暇伐晉又曰執虞公以媵秦穆姬媵是使賤者為之以此辱之正如石勒使晉帝青衣行酒相類春秋集義卷十九

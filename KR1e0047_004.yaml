body:
  text: 春秋集義卷一宋李明復撰隐公程頤曰隐公名息姑惠公子惠公元妃孟子其弟聲子生隐公隐謚也隐拂不成曰隐元年春王正月程頥曰周正月非春也假天時以立義爾平王之時王道絶矣春秋假周以正王法隐不書即位明大法於始也諸侯之立必由王命隐公自立故不書即位不與其為君也法既立矣諸公書不書義各不同既不受命於天子以先君之命而繼世者則正其始文成襄昭哀是也繼世者既非王命又非先君之命不書即位不正其始也莊閔僖是也桓宣定之書即位桓弑君而立宣受弑賊之立定為逐君者所立皆無王無君何命之受故書其自即位也定之比宣則又有間矣又曰元年標始年耳猶人家長子呼為大郎先儒穿鑿不可用問春秋書王如何曰聖人以王道作經故書王或問杜預以謂周王如何曰聖人假周王以見意又問漢儒以謂王加正月上是正朔出于天子如何曰此乃自然之理不書春王正月將如何書此漢儒惑也又曰諸侯當上奉天時下承王政故春秋曰春王正月明此義則知王與天同大而人道立矣程氏學曰元年者始年也春者天時也月者王之所建也書春王正月者若曰上奉天時下正王朔云爾董仲舒所謂道之大原出于天求端于天是也堯之大政所先者欽若昊天兹可見已王者所行必本於天以正天下而下之奉王政乃所以事天也春秋天子之事故先書曰春王正月然後是非褒貶二百四十二年之事皆天理也張載曰易非止數春秋大義不止在元楊時曰春秋始於隐公其説紛紛無定論孟子有言王者之迹熄而詩亡詩亡然後春秋作據平王之崩在隐公之三年也則隐公即位實在平王之時自幽王為犬戎所滅而平王立於是東遷當是時黍離降而為國風則王者之詩亡矣此春秋所以作也謝湜曰元年君之始年也人君以德覆養天下始於是年與元氣發育萬物不異即位之一年謂之元年正月年之始月也人君以政率天下正天下始於是月故元年之一月謂之正月有德然後有政有年然後有月故聖人以元起年以正起月春天時也正月王之所建也周人以建子為正春秋首書天時而繼以周之王政者以明王者所建夲諸天而達諸人也王者與天同德其所為所行與天同道為父子為君臣為夫婦為兄弟為朋友皆因天理而為之倫者也為冠昏為喪祭為射鄉為食饗皆因天理而為之文者也為治政為教命為法則皆因天理而為之訓者也天之所與則為爵禄為慶賞以致其榮天之所惡則為刑威為削罰以致其辱故王之所為天之所為也王之所行天之所行也欲保國不可以不奉天欲奉天不可以不尊王諸侯事王如天而保國安民之道得於此矣體天而行聖王之事也畏天而行賢王之事也聖與賢其為王一也惟王為能順天惟順天為能配天惟配天為能盖之如天春秋以正繼王以王繼春稱王則謂之天王以此而已胡安國曰元者何仁是也仁者何心是也建立萬法酬酢萬事帥馭萬夫統理萬國皆此心之用也堯舜禹以天下相授堯所以命舜舜亦以命禹首曰人心惟危道心惟㣲周公稱乃考文王惟克厥宅心乃克立兹常事故一心定而萬方服矣春之為夏正何也夫斗指寅然後謂之春建已然後謂之夏故易曰兊正秋也以兊為正秋則坎為正冬明矣今以冬為春則四時易其位春秋正名之書豈其若是哉故程氏謂周正月非春也假天時以立義耳商人以建丑革夏正而不能行之於周周人以建子革商正而不能行之於秦秦人以建亥為正固不可行矣自漢氏改用夏時經歴千載以至於今卒不能易謂為百王不易之大法指此一事可知矣仲尼豈有欺後世哉王正月之定於一何也天無二日土無二王家無二主尊無二上道無二致政無二門故議常經者黜百家尊孔氏諸不在六藝之科者勿使並進此道術之歸於一也言致理者欲令政事皆出中書而變禮樂革制度則流放竄殛之刑隨其後此國政之歸於一也若乃闢私門廢公道各以便宜行事是人自為謬於春秋大一統之義矣餘見綱領上中二卷又曰即位之一年必稱元年者明人君之用也大哉乾元萬物資始天之用也至哉坤元萬物資生地之用也成位乎其中則與天地參故體元者人主之職而調元者宰相之事元即仁也仁人心也春秋深明其用當自貴者始故治國先正其心以正朝廷與百官而逺近莫不一於正矣春秋立文兼述作按舜典紀元日商訓稱元祀此經書元年所謂祖二帝明三王述而不作者也正次王王次春乃立法創制裁自聖心無所述於人者非史冊之舊文矣按左氏曰王周正月周人以建子為嵗首則冬十有一月是也前乎周者以丑為正其書始即位曰惟元祀十有二月則知月不易也後乎周者以亥為正其書始建國曰元年冬十月則知時不易也建子非春亦明矣乃以夏時冠周月何哉聖人語顔回以為邦則曰行夏之時作春秋以經世則曰春王正月此見諸行事之騐也或曰非天子不議禮仲尼有聖德無其位而改正朔可乎曰有是言也不曰春秋天子之事乎以夏時冠月垂法後世以周正紀事示無其位不敢自專也其㫖㣲矣加王於正者公羊言大一統是也國君逾年改元必行告廟之禮國史主記時政必書即位之事而隐公闕焉是仲尼削之也古者諸侯繼世襲封則内必有所承爵位土田受之天子則上必有所禀内不承國於先君上不禀命於天子諸大夫扳已以立而遂立焉是與争亂造端而纂弑所由起也春秋首絀隐公以明大法父子君臣之倫正矣又曰春秋魯史而書王正月先儒以為大一統者天無二日土無二王家無二主尊無二上政無二門此天地之常經古今之通義也故事歸於一則上得所操法不殊方則下知所守而海内定萬物服矣夫欲體元調元而不先知元則不能得其方不得其方則無所用其方故釋之曰元即仁也仁人心也此雖三名其實一物語元則隐語心顯矣如乾卦既曰乾元又曰大和又曰善之長又曰仁曰德此亦一物屢發明耳通天下一氣而主張是者君與相也故又釋之曰春秋深明其用當自貴者始按春秋書法君與臣同與者則以國稱故不分君臣而包舉之曰治國先正其心逺近莫不壹於正人君先正其心則知行仁政然後能體元矣人臣知格君心之非則一正君而國定此調元之效也其曰貴者始謂逺近之壹於正必自此始正其夲之義也秦人以建亥為正伊川程氏指為事之謬者失商周三統之㫖明甚引其説非取之也姑借古史記事之例以證四時之不可易耳以亥為正而書冬十月見時之不易也以丑為正而書十有二月見月之不可易也周人夲以建子為正而書春王正月是四時易其位矣夫春夏秋冬之有定辰猶東西南北之有定所斗指寅然後可以謂之春建已然後可以謂之夏建申然後可以謂之秋建亥然後可以謂之冬猶震之在東離之在南兊之在西坎之在北非播糠眯目則其位不易矣故繫詞曰兊正秋也以兊為正秋則冬為正春午為正夏水為正冬必矣今春秋以周正紀魯事也而以建子為春正月則夏四月乃春分之震秋七月乃夏至之離冬十月乃正秋之兊而四時五行八卦十二辰之位皆易矣春秋正名之書豈其若是哉思其説而不得攷於顔回為邦之問而曰行夏之時察於孟子之言而曰春秋天子之事求於仲尼之説而曰知我罪我者其惟春秋乎觀於先儒之記而曰商變夏周變商春秋變周深究伊川程氏之傳而曰假天時以立義者蓋立此行夏時之義耳任文王之文以天自處而以夏時冠月居周之世為魯之臣而以周正紀事其㫖㣲矣其義精矣故竊以為春秋有改正朔之意無疑也胡宏曰十一月一陽復於地下此周正之所以建子也十二月二陽長於地中此商正之所以建丑也天道至㣲非聖人莫能知建正以昭示天下使天下之為人上者由之而知則能養天下之善於至㣲而不至於夭閼止天下之惡於至㣲而不至於盈積深探其幾推而行之聖人之妙用也知道者於此見天心焉是仁之端也聖人教天下後世之意可謂深切著明矣豈因易代止以新時人耳目而已哉又曰首年之義恐不可泥於一説諸侯奉天子正朔便是一統之義有事於天子之國必用天子之年其國史紀政必自用其年不可亂也當時諸侯紀元乃是實事與後世改元者不同也聖人於元上見義若諸侯無元則亦不成為君矣如元亨利貞乾坤四德在他卦亦有之不可謂乾坤方得有元它卦不得有也易載其理春秋見其用恐義或當亦如此也又曰良心者充於一身通於天地宰制萬事統攝億兆之夲也故孔子作春秋必書元立夲以致大用孟子告諸侯必夲仁術以行王政元即仁也仁人心也朱熹曰春秋傳言元即仁也仁人心也固有此理然不知仁如何却謂之元或問古者改正朔如以建子月為首則謂之正月抑只謂之十一月曰此亦不可考如詩之月數即今之月孟子七八月之間旱乃今之五六月十一月徒杠成十二月輿梁成乃今之九月十月國語夏令曰九月成杠十月成梁即孟子之十一月十二月若以為改月則與孟子春秋相合而與詩書不相合以為不改月則與詩書相合而與春秋孟子不相合如秦元年以十月為首末又有正月又似不改月據今周禮有正月有正嵗則周疑是元改作春正月孟子所謂七八月乃今之五六月所謂十一月十二月乃今之十月九月是周人固已改月矣但天時則不可改故書云秋大熟未穫此即止是今時之秋蓋非申酉之月則未有以見夫嵗之大熟而未穫也以此考之今春秋月數乃魯史之舊文而四時之序則孔子之㣲意程氏所謂假天時以立義者正謂此也若謂周人初不改月則未有明據故胡氏只以商秦二事為證以彼之博洽精勤所取猶止於此則無他可考必矣今乃欲以十月隕霜之異證之恐未足以為不改月之騐也蓋霜在今之十月則不足怪在周之十月則為異矣又何必史書八月然後為異哉况魯史不傳無以必知其然不若只以孟子尚書為據之明且審也若尚有疑則不若且闕之之為愈不必强為之説矣詩中月數又似不曽改如四月維夏六月徂暑之類故熹向者疑其並行也又問子丑寅之建正如何曰此是三陽之月若秦用亥為正直是無謂大抵三代更易須著如此改易一畨又曰三王之正不同周用天正矣而七月之詩月皆以人正為紀何也夏以建寅之月為嵗首是謂人正商以建丑之月為嵗首是謂地正周以建子之月為嵗首是謂天正所謂改正朔者以是月為嵗首爾月固不易也又曰周歴夏商其未有天下之時固用夏商之正朔然其國又自有私紀其時月者故三正皆曽用之也張栻曰世有古今太極一而已太極立則通萬古於於一息㑹中國為一人雖自堯而上六閼逢無紀然上聖惟㣲之心蓋未嘗不周流該徧亘乎無窮而貫於一也是以春秋書元以著其妙周成位乎其中者也大君明斯義則首出庶物天地交泰極裁成輔相之妙矣為人臣而明斯義則有以成身而佐其主矣或問胡安國傳謂元即仁何故與程頥不同栻曰程説如何曰程氏謂元年標始年耳猶長子呼大郎曰元之義不一謂元即仁可也但春秋書元却非此意當從程氏説後聞有人問五峯胡宏元與仁之别曰元天也仁人也元日詩云古史書元意義存春秋掲示更分明人心天理初無欠正夲端原萬善生餘見綱領下不書即位程頥曰魯十二公不書即位者四隐莊閔僖是也書即位者八桓文宣成襄昭定哀是也春秋之義莫重乎端夲正始故即位者尤聖人之所謹也古者諸侯雖繼世然必禀命於天子而後立莫敢專也平王以降天子之命不行於諸侯諸侯之嗣皆專立而無所請命如後文成襄昭哀皆受國於先君而不請命於天子也隐公獨不書即位者入春秋之始聖人即以王法奪之而大義舉矣若文成襄昭哀亦不書乎則與夫内復不受於先君者無以為别故五公書之言猶繼正而有所受之矣莊閔僖皆内無所受上無所承爾於桓宣定三公則著其自立也桓公則弑隐而立宣公則公子遂殺惡及視而立定公則由季氏立之苟不書其即位無以明其自立之罪也楊時曰春秋不書即位者四隐莊閔僖是也諸儒之論紛然莫知所從左氏謂隐公為攝以經考之則隱非攝明矣然三傳皆謂有遜桓之志其果何也尹焞曰隱不書即位程氏謂只是不請於王自立也胡安國曰春秋大居正凡得正而居者天下莫不心悦誠服無所待於號令而歸焉者也自古人君多自旁支入繼大統則不得其正故魯僖公不書即位以少先長則不得其正故魯閔公不書即位未嘗受誓為世子則不得其正故魯莊公不書即位不承國於君親則不得其正故魯隱公不書即位夫即位人君之重事以不得其正而春秋削之端夲正始之義㣲矣餘見綱領中胡宏曰隱公不請王命固不是請王命而有得國之意亦不可若革先君之不義請王命而立宗人之賢者疑亦可也道固多端不可執一也又曰魯惠欲以私愛立桓公隱公承父之志不居其位可矣今既居其位又以讓桓則隱公與有罪矣朱熹曰春秋首不書即位即君臣之事也書仲子嫡庶之分即夫婦之事也書及邾盟即朋友之事也書鄭伯克叚即兄弟之事也一開首人倫便盡在吕祖謙曰隱桓皆非惠公嫡子唯孟子之子方為嫡今孟子既無嫡子則聲子仲子之子皆庶子若論其當立則隱為庶長桓為次隱公當立明矣隱公乃退遜而攝位雖惠公當時欲立桓公而論其大義則不當遜然隐公資質和柔亦自可取杜預謂之遜國之賢君恐或不然三月公及邾儀父盟於蔑程頥曰盟誓以結信出於人情先王所不禁也盟而不信則罪也諸侯交相盟誓亂世之事也凡盟内為主稱及外為主稱㑹在魯地雖外為主亦稱及彼來而及之也兩國已上則稱㑹彼盟而往㑹之也邾附庸國邾子克字儀父附庸之君稱字同王臣也夷狄則稱名降中國也謝湜曰諸侯教命皆受之王而逹之民也禮樂不敢擅出禁令不敢擅行制度不敢擅革臣子之道也春秋之亂列國講好修令不復請命天子而擅相為盟上命由此不行而王綱由此壊矣凡書盟以罪諸侯之專也修德禮明信義正法令大國待小國之道也德禮修而小國懐信義明而小國服法令適宜而小國畏又奚待盟約相要而後恊哉春秋之亂諸侯講好修令不正其夲而刼之以盟誠意由此不明而邦國由此不親矣凡書盟以示諸侯睦鄰之失道也齊桓之盟曰無曲防無遏糴無易世子無以妾為妻如此之類先王以令令之而已有不率則加之以刑又安用盟周衰諸侯各專其地命令不足以相信威力不足以相制故其事則歃血要信質之明神而為盟故興師則為盟結好則為盟解仇固黨則為盟上下以盟相要而盟於是興矣此盟所以紛然見於周之末世也邾中國之附庸也附庸之君未班爵故稱字儀父其字也公欲求好於邾故為蔑之盟書蔑謹其地也内為主稱及外為主稱㑹及者我為主而及彼也其地不以内外我為主則稱及公及邾儀父盟於蔑公及莒人盟於浮來是也蔑魯地浮來紀地故也㑹者彼為主而我往㑹也公㑹齊侯盟於艾公㑹宋公燕人盟於榖丘是也艾齊地榖丘宋地故也其在魯地雖外為主亦稱及賓主之辭也公及齊大夫盟於蔇是也蔇魯地故也雖在魯地二國已上結盟而我往㑹之亦稱㑹二國賓主已定故也公㑹杞侯莒子盟曲池公㑹衛子莒慶盟於洮是也曲池洮魯地故也胡安國曰魯侯爵而其君稱公此臣子之詞春秋從周之文而不革者也我所欲曰及邾者魯之附庸儀父其君之字也何以稱字中國之附庸也王朝大夫例稱字列國之命大夫例稱字諸侯之兄弟例稱字中國之附庸例稱字其常也聖人按是非定褒貶則有例當稱字或黜而書名與當稱人或進而書字其變也常者道之正變者道之權春秋大義公天下以講信修睦為事而刑牲歃血要質鬼神則非所貴也盟有弗獲已者而汲汲欲焉惡隱公之私爾或言褒其首與公盟而書字失之矣吕祖謙曰邾是魯之附庸須看先王自封建諸侯之外又有閑地散在諸侯之國或諸侯之有罪者則削其地以為閑地若諸侯之有功者則以閑地而増封之天子平時各自命王官以掌之如周禮縣師之職是也縣師之職曰掌邦國都鄙之地此則兼掌天下之閑地以緫其目若諸侯之國則又各有其人以掌之春秋之初諸侯尚有未命於王者則知諸侯之國尚有閑地存焉此處皆是古人相維持之意古之閑地多未必盡皆諸侯所有故各設官掌之至秦漢郡縣諸侯亦是相維持之意夏五月鄭伯克叚于鄢程頥曰鄭武公娶于申曰武姜生莊公及叚愛叚欲立之亟請於武公弗許及莊公即位請京使居之謂之京城太叔叚失道而公弗制祭仲諫而公弗聽故詩人譏其小不忍以致大亂也叚完聚繕甲兵具卒乗將襲鄭夫人將啟之公聞其期命子封伐京京叛叚叚入於鄢公伐諸鄢大叔出奔共書曰鄭伯克叚于鄢鄭伯失為君之道無兄弟之義故稱伯而不言弟克勝也言勝見叚之强使之强所以致其惡也不書奔義不繫於奔也程氏學曰詩將仲子刺莊公也不勝其母以害其弟弟失道而公弗制祭仲諫而公弗聽小不忍以致大亂焉叔于田刺莊公也叔處于京繕甲治兵以出於田國人説而歸之大叔于田刺莊公也叔多才而好勇不義而得衆也鄭伯之於叚可謂親愛之乎授之大都而不為之制失道得衆而不為之閑廼曰多行不義必自斃又曰無庸將自及又曰不義不暱厚將崩是稔其惡而志在於殺也故曰鄭伯克叚于鄢克者僅勝之辭也所以見叚之强大不書弟者所以志鄭伯志害其弟無親親之道也楊時曰叚失道由莊公之弗制故詩人以刺莊公而不及叚罪莊公故也其始畏父母諸兄之言所謂小不忍也而卒害之其為言曰多行不義必自斃又曰不義不暱厚將崩其弗制也姑稔其惡而殺之也始曰叔于田卒曰大叔則以見其寖强大也故春秋書曰鄭伯克叚于鄢則克叚者鄭伯而已非國人共棄之也又曰夫叚以不義得衆公弗能制終欲制之畏人之多言則克叚者鄭伯而已非國人所欲也故不稱國討而書曰鄭伯蓋交譏之夫仁人之親愛其弟非徒富貴之而已亦必為之節也富貴而不為之節使之驕慢陵僣以速禍敗則其親愛之也適足以害之爾故詩稱鄭伯不勝其母以害其弟而春秋書曰鄭伯克叚正謂是歟夫克者勝敵之辭孔子曰我戰則克是也以勝敵之辭加之則叚之强可知矣叚之强由辨之不早也謝湜曰親之以恩愛之以義親親之道也鄭莊公之於叔叚也授之以大都畀之以兵革習之以馳騁田獵飬其惡遂其凶使之為驕為逆而已於祭仲之諫也欲其不義以取斃於子封之諫也欲其不義不暱以取崩其處心積慮志於殺之而已兄弟棄親毁愛未有過於此也故莊公之伐叔叚也春秋書曰克叚罪其失親親之道也克兵勝之辭也稱克以示叚之强以示莊公之稔其惡也叚鄭伯之弟也叚不稱弟以示莊公待叚不以弟而絶之也叚以親則弟以位則臣其初非無友順之心也非不可閑之以義防之以法也其失道至於擅都邑興師衆與國為敵而後克者以莊公不制於初也急難相救禍患相恤兄弟之情也莊公置叔叚於危亾之地而不恤其亡是以冦讎待之也親親之恩絶矣叚之禍在兄為可責在弟為可矜故春秋書以克叚罪其絶弟而亡之也是故閨門以恩為主輔以義然後不害恩朝廷以義為主輔以恩然後不害義胡安國曰用兵大事也必君臣合謀而後動則當稱國命公子吕為主帥則當稱將出車二百乗則當稱師三者咸無稱焉而專目鄭伯是罪之在伯也猶以為未足又書曰克叚於鄢克者力勝之詞不稱弟路人也于鄢操之為已蹙矣夫君親無將叚將以弟簒兄以臣伐君必誅之罪也而莊公特不勝其母焉爾曷為縱釋叔叚移於莊公舉法若是失輕重哉曰姜氏當武公存之時常欲立叚矣及公既歿姜以國君嫡母主乎内叚以寵弟多才居乎外國人又悦而歸之恐其將軋已為後患也故授之大邑而不為之所縱使失道以至於亂然後以叛逆討之則國人不敢從姜氏不敢主而大叔屬籍當絶不可復居父母之邦此鄭伯之志也王政以善飬人推其所為使百姓興於仁而不偷也况以惡飬天倫使䧟於罪因以剪之乎春秋推見至隱首誅其意以正人心示天下為公不可以私亂也垂訓之義大矣吕祖謙曰鄭伯克叚此見當時制度漸壊兄弟相戕此皆大變君臣父子是内治制度紀綱是外治内外相維持皆不可欠闕桀紂雖亂止亂一身後来有人天下亦自治至春秋時天下大亂至秦不舉然此亦是無人出來整頓又曰莊姜惡莊公愛共叔叚愛惡兩字乃是事因然莊姜為請制之時已有意據占其地及莊公與京使居之則莊公之意亦可見矣虎牢猶今劍閣天下地勢固多此險要處不可不考祭仲曰都城過百雉國之害也祭仲之諫雖明言其害猶未敢傷兄弟之情大抵兄弟之間外人苟未知其如何則便未敢有離間之語祭仲雖又説蔓難圖其意只仍舊説難制猶未敢明言蓋未見得莊公之意至公説子姑待之觀此辭意可見公子吕便説國不堪貳欲與太叔臣請事之自此詞語忿激殊無兄弟之情當時之人皆不過以利害言莊公初若無此語子吕亦未敢及此然莊公初間亦未有殺弟之心只縁事勢䆮䆮未了遂至於此其曰姜氏欲之者此狠愎者之常語學者能看此叚儘得人情物理如祭仲論都城之制最不可不明如漢論諸侯王過制七國便反正縁當初不知此耳以此知先王之制不可不明又曰左氏序鄭莊公事極有筆力寫其怨端之所以萌良心之所以回皆可見始言亟請於武公亟之一字母子相仇病源在此後面言姜氏欲之焉避害此全無母子之心蓋莊公材畧儘高叔叚已在他掌握中故祭仲之徒愈急而莊公之心愈緩待叚先發而後應之前面命西鄙北鄙貳於已與収貳為已邑莊公都不管且只是放他去到後罪惡貫盈乃遽絶之畧不假借命子封帥師以伐京叚奔鄢公又親帥師以伐鄢公於其未發待之甚緩於其已發追之甚急公之於叚始如處女敵人開户後如脱兎敵不及拒者也然莊公此等計術施於敵國則猶為巧施於骨肉則為忍大凡人於骨肉兄弟分上最不可分彼曲我直纔分一箇彼曲我直便失親親之意觀莊公始者欲害叚而有姜氏欲之焉避害之語則是欲曲在姜氏直在莊公及其欲伐叚而待其惡大亦欲曲在叚直在莊公此所以伐之無辭莊公之心只分曲直兩字殊不知兄弟間豈較曲直纔言彼曲我直彼我對敵便有日相戕賊之害此左氏鋪叙好處以十分筆力寫十分人情又曰寘母大惡天理已絶及其終也因頴考叔開導他一有悔心天理油然而生遂為母子如初且幸自惡而入於善觀莊公封許之言委曲涵養有唐虞三代氣象因入許而曰寡人有弟弗能和恊使餬其口於四方此謂莊公悔之之言不可此謂莊公不情之言亦不可蓋莊公是一箇有才智占勝底人觀他初待叔叚止欲叚曲我直彼惟有歉恐為人所議所以先自説破了依舊是前時養惡之氣習猶未之改至莊十六年厲公之言曰不可使共叔無後於鄭則是共叔嘗有後於鄭矣此言非是虚言正是兄弟不可泯絶處後來果然封他子孫世世食禄而不絶夫共叔之於鄭初無功德及民而有叛逆之惡何為必欲不絶其後也於此須見得非是莊公之悔心正是莊公當初機謀培養䧟叔叚也深至此常常自歉故施恩意於後也亦深使當時只恁地逐叚不用許多機闗䧟穽到此必不然也且如楚懐王之在國荒滛不度夲無德以及人一旦秦人殺之而舉國無有不念之者至於五六年之後猶以是而亡秦只縁秦人毒之太深故國人思之愈切莊公惟其當初下手得毒故後來施得恩意極深蓋兄弟天屬也此正相反之道也春秋集義卷一

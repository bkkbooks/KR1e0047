body:
  text: 春秋集義卷三十九宋李明復撰襄公十年春公會晉侯宋公衛侯曹伯莒子邾子滕子薛伯杞伯小邾子齊世子光會吳于柤程氏學曰成十五年會吳于鍾離襄十年會吳于柤十有四年會吳于向三者殊會吳者聖人罪諸侯而外吳人也蓋天子失政而諸侯亂中國無霸雖晉楚大國亦皆俯首以與吳人會且吳之暴橫馮陵上國尤非楚比故也至哀十三年黃池之會書公會晉侯及吳子者成襄之間中國無霸而諸侯與吳人會然中國猶且為主焉故惟書會吳至此則又非鍾離柤向所可擬也春秋之末中國無伯黃池之會夫差擅強中國愈不能抗而吳子為主焉書吳之爵所以見中國之衰書晉之及所以抑吳人之橫也抑吳人存中國聖人之旨微矣吕祖謙曰會于柤此是中國初與吳會是一件大事最要看夏五月甲午遂滅逼陽謝湜曰吳子夀夢在柤而晉率諸侯會之故曰會吳戚之會彼來會于戚中國為會主也中國為會主則稱吳人以人待之也柤之會此往會于柤吳人為會主也吳人為會主則稱吳外之也外吳所以責諸侯也逼陽妘姓國也會吳將以服吳也因柤之會而遷師以滅逼陽諸侯以不仁不義示外冦而道之也強吳入為中國冦害必始於此矣滅逼陽書遂罪其因會而滅國也罪其因會強吳而示之虐也公至自會楚公子貞鄭公孫輒帥師伐宋謝湜曰公孫輒從楚伐宋以其背晉也戲之盟口血未乾而鄭國背之罪其違同盟也鄭介於晉楚之間事晉則有楚難事楚則有晉難晉楚交兵久矣為鄭計者一心以協中國鑿池築城以備楚修政令輯人民以致效死之守則楚雖暴橫亦不可以為吾之患矣今乃反覆二心晉至則受命從晉楚至則受命從楚子孔為晉計則子駟為楚計子孔欲守盟則子駟欲背盟徒使禍連兵結士不得解甲而安春秋前書同盟後書伐宋著其反覆生禍也晉師伐秦秋莒人伐我東鄙公會晉侯宋公衛侯曹伯莒子邾子齊世子光滕子薛伯把伯小邾子伐鄭謝湜曰鄭從楚伐宋故諸侯伐鄭齊世子光先滕薛以強弱為序也以強弱為序諸侯之亂也冬盜殺鄭公子騑公子發公孫輒程頥曰盜殺三卿不稱大夫失卿職也謝湜曰楚之討侵蔡也子孔子蟜子展欲待晉子駟子國子耳欲從楚然則諸侯伐鄭其禍皆三卿為之也鄭國兵難不息三卿結怨於民者深故微賤之人乘國怨怒而出為三卿之難也輔臣建立國議可以不為逺慮者哉凡微賤之人竊發而為亂春秋謂之盜政刑修舉則盜亡政刑敗亂則盜起三卿國之股肱也盜以蓄怨入殺三卿則鄭之政刑敗亂可知也殺不稱大夫以盜殺之故也胡安國曰按左氏鄭公子騑當國發為司馬輒為司空騑與尉止有爭及為田洫司氏堵氏侯氏子師氏皆喪田故五族聚羣不逞之徒以作亂入西宫殺三卿于朝不稱大夫程氏以為失卿職也卿大夫者國君之陪二政之本也本強則精神折衝聞者偃息談笑而郤敵國之兵勝千里之難者矣乃至於身不能保而盜得殺之於朝安在為陪二乎故削其大夫為當官失職者之鑒也戍鄭虎牢謝湜曰戍鄭虎牢晉命也諸侯為之也不書諸侯者諸侯心力不一故也虎牢不若戍陳之善也陳已背楚矣楚為陳害而諸侯戍之將以安陳也安陳中國之義也上書楚師伐陳而下書諸侯救陳則魯人之戍陳其善可知矣鄭雖有即楚之罪也然諸侯服鄭未嘗以義也或城虎牢逼之或合諸侯伐之或戍虎牢厄之而已戍虎牢將以危鄭也危鄭中國之不義也上書諸侯伐鄭而下書楚師救鄭則魯人之戍鄭虎牢其不善可知矣戍虎牢書鄭者以明虎牢鄭之分地而歸之鄭也以虎牢歸鄭罪諸侯之專虎牢也胡安國曰虎牢之地城不繫鄭者責在鄭也戍而繫鄭者罪諸侯也曷為責鄭設險所以守國有是險而不能設犧牲玉帛待盟境上使其民人不享土利辛苦墊隘無所底告然後請成故城不繫鄭者責其不能有也曷為罪諸侯夫鄭人從楚固云不義然中國所以城之者非欲斷楚之路為鄭蔽也駐師厄險以逼之耳至是伐而復戍焉猶前志也則可謂以義服之乎故戍而繫鄭者若曰鄭國分地受諸天子非列國所得專所以罪諸侯也聖人既以虎牢還繫於鄭又書楚公子貞帥師救鄭諸侯之罪益明矣夫以救許楚所以深罪諸侯不能保鄭肆其陵逼曽荆楚之不若也亦可謂深切著明也哉楚公子貞帥師救鄭謝湜曰救鄭恤之也恤之義也救而恤之為義則戍而病之不義可知矣書楚救鄭所以責諸侯也公至自伐鄭十有一年春王正月作三軍謝湜曰周禮大國三軍次國二軍小國一軍皆因民力多寡厚薄而為之制也多乎此則傷民少乎此則傷國魯雖次國其地皆大國之地自入春秋人民雕耗兵不滿三軍久矣襄公欲為三軍故稱作作興建之名也以兵不足故作丘甲以丘甲不足故作三軍胡安國曰三軍魯之舊也古者大國三軍次國二軍小國一軍魯侯封於曲阜地方數百里天下莫強焉及僖公時能復周公之宇而史克作頌其詩曰公車千乘説者以為大國之賦也又曰公徒三萬説者以為大國之軍也故知三軍魯之舊耳然車而謂之公車則臣下無私乘也徒而謂之公徒則臣下無私民也若有侵伐諸卿更帥以出事畢則將歸於朝車復於甸甲散於丘卒還於邑將皆公家之臣兵皆公家之衆不相繫也文宣以來政在私門襄公幼弱季氏益張廢公室之三軍而三家各有其一季氏盡征焉而舊法亡矣是以謂之作其明年季孫宿救台遂入鄆又其後享范獻子而公臣不能具三耦民不屬公可知矣春秋書其作者以見昭公失國定公無正而兵權不可去公室有天下國家者之所宜鑒也朱熹曰天子六卿故有六軍諸侯三卿故有三軍吕祖謙曰作三軍胡春秋以為魯本三軍想周公受封之初賜之三軍或後來子孫微弱減削不可知或欲減之以避霸國貢稅亦不可知然此作三軍季氏之心最不善孟氏最弱四分其人三分歸公而已取其一叔孫取其二季氏盡征之夏四月四卜郊不從乃不郊謝氏曰免牲以郊事不吉而免之也免牛以牛體不完而免之也然則免牛之為不敬又甚於免牲可知也無牲可免則謂之不郊而不稱牲無牛可免則謂之不郊而不稱牛然則不郊之為不敬又甚於免牛可知也鄭公孫舍之帥師侵宋公會晉侯宋公衛侯曹伯齊世子光莒子邾子滕子薛伯杞伯小邾子伐鄭秋七月己未同盟于亳城北程頥曰鄭服而同盟也隨復從楚伐宋云同見其反覆謝湜曰鄭未服故鄭舍之侵宋以舍之侵宋故諸侯復伐鄭鄭服故盟于亳城北以鄭服而盟故稱同盟亳城鄭地胡安國曰盟于亳城北鄭服而同盟也尋復從楚伐宋故書同盟見其既同而又叛也既同而又叛從子展之謀欲致晉師而後與之也故亳之盟其載書曰或簡兹命明神殛之俾失其民隊命亡氏踣其國家雖渝此盟而不顧也噫慢鬼神至於此極而盟猶足恃乎吕祖謙曰同盟于亳北載書皆大與前戲之書不同毋保姦與留慝同大槩則是毋保藏鄰國之姦惡公至自伐鄭楚子鄭伯伐宋謝湜曰鄭伯從楚伐宋以其背晉也亳北之盟口血未乾而簡公背之罪其違同盟也吕祖謙曰楚鄭伐宋此出于展之謀公會晉侯宋公衛侯曹伯齊世子光莒子邾子滕子薛伯把伯小邾子伐鄭會于蕭魚程頥曰頥讀春秋至蕭魚之會嘆曰至誠之能感人也晉悼公推誠以待反覆之鄭信而不疑鄭伯自是不背晉者二十四年至哉誠之能感人也又曰諸侯數月之間再伐鄭鄭之反覆可知鄭又服而請會不書鄭會謂其不可信也而晉悼公推至誠以待人信之不疑至哉誠之能感人也自此鄭不背晉者二十四年謝湜曰鄭伯從楚伐宋故諸侯復伐鄭伐而會于蕭魚以鄭伯服晉而出會諸侯也悼公以鄭之反覆也二年之間四合諸侯伐鄭大則齊宋魯衛小則曹莒邾滕薛杞莫不順命而從鄭人知楚之不可恃也由是一意歸于中國不待兵革久淹不待誓盟要約以誠意出會諸侯是會也諸侯歸鄭􅤾納斥候禁侵掠是會也以伐事始以會事終是後鄭人不復從楚而干戈休息者二十餘年然則蕭魚之會會之美者也書會于蕭魚善之也胡安國曰程氏曰會于蕭魚鄭又服而請會也不書鄭會謂其不可信也而晉悼公推至誠以待人信鄭不疑禮其囚而歸焉納斥候禁侵掠遣叔肹告于諸侯而鄭自此不復背晉者二十四年至哉誠之能感人也自悼公能謀於魏絳以息民聽於知武子而不與楚戰故三駕而楚不能與之爭雖城濮之績不越是矣吕祖謙曰蕭魚之會是鄭人實服於晉與前後之服晉不同納斥候禁侵掠是鄭以信得示人以不疑晉悼公自蕭魚之會以後雖未全弱畢竟是驕更後來衛之亂不能討伐秦又不肯濟此處皆可見公至自會程頥曰兵不加鄭故書至自會楚人執鄭行人良霄謝湜曰兩國傳命必有行人行人所以通兩國之信也事有不直罪在國不在行人執非其罪也凡執行人皆稱人貶之也鄭之服於晉也以良霄告服于楚楚咎行人而執之楚之罪可見矣冬秦人伐晉十有二年春王三月莒人伐我東鄙圍台謝湜曰莒人伐東鄙屢矣魯不能制故圍台季孫宿帥師救台遂入鄆謝湜曰莒人圍台固有罪矣宿受命救台而違指入鄆大夫之專權生事也入鄆書遂罪其專也救台義也入鄆不義也君以義始而臣以不義終季孫宿之罪也胡安國曰鄆莒邑也遂者生事也入者逆詞也大夫無遂事受命而救台不受命而入鄆惡季孫宿之擅權使公不得有為於其國也或曰古者命將得專制閫外之事有可以安國家利社稷者專之可也曰此為境外言之也台在邦域之中而專行之非有無君之心者不敢為也昭公逐定無正夫豈一朝夕之故哉其所由來者漸矣吕祖謙曰台鄆皆莒地後入魯夏晉侯使士魴來聘秋九月吳子乘卒謝湜曰吳子夀夢會同赴告通於中國故書卒不書葬黜其號也冬楚公子貞帥師侵宋吕祖謙曰秦楚伐宋欲聊以報晉之取鄭公如晉謝湜曰襄公幼弱政出大夫故公數朝晉十有三年春公至自晉夏取邿謝湜曰邿微國秋九月庚辰楚子審卒冬城防謝湜曰楚子楚共也十有四年春王正月季孫宿叔老會晉士丐齊人宋人衛人鄭公孫蠆曹人莒人邾人滕人薛人把人小邾人會吳于向謝湜曰諸侯會吳欲以病楚且諸樊新立故也殊會吳狄之也魯書二卿罪其廢國事也向宋地胡安國曰使舉上客而叔老並書者以內卿行則不得不書矣季孫宿以卿為介而不使之免叔老介於宿而不敢避蓋兩失之雖晉人輕其幣而敬其使於君命使人之體豈為得哉吕祖謙曰范宣子數吳之不德必會諸侯而數之者晉為霸主故欲明大義以示諸侯二月乙未朔日有食之夏四月叔孫豹會晉荀偃齊人宋人衛北宫括鄭公孫蠆曹人莒人邾人滕人薛人杞人小邾人伐秦謝湜曰十年晉師伐秦十一年秦人伐晉秦晉報怨相攻未之息也故晉率列國大夫伐秦晉士丐春會列國大夫會吳晉荀偃夏會列國大夫伐秦諸侯委任大夫益重而列國之權皆大夫專之矣己未衛侯出奔齊謝湜曰獻公出奔公羊稱名是也獻公以不道自取播越其位絶於國以故出奔書名獻公之出孫林父逐之也臣無逐君之道故君雖見逐春秋亦以自奔為文范祖禹曰衛獻公捨大臣而與小臣謀故失國出奔且大臣之所任者大小臣之所任者小而以小謀大以逺謀近此人君偏聽之蔽鮮有不敗事者也胡安國曰按左氏衛寧殖將死語其子曰吾得罪于君名在諸侯之策曰孫林父寧殖出其君夫所謂諸侯之策則列國之史也諸侯則若晉若魯是也史則若晉之乘魯之春秋是也今春秋書衛侯出奔齊而不曰孫林父寧殖出其君者蓋仲尼筆削不同舊史之文也欲知經之大義深考舊文筆削之不同其得之矣或曰孫寧出君衆所同疾史策書之是也聖人曷為掩姦藏惡不暴其罪而以歸咎人主何哉曰臣而逐君其罪已明矣人君擅一國之名寵神之主而民之望也愛之如父母仰之如日月敬之如神明畏之如雷霆何可出也所為見逐無乃肆於民上縱其淫虐以棄天地之性乎故衛衎出奔使祝宗告亡且告無罪而定薑曰有罪若何告無春秋端本清源之書故不書所逐之臣而以自奔為名所以警乎人君者為後世鑒非聖人莫能修之為此類也莒人侵我東鄙秋楚公子貞帥師伐吳謝湜曰自中國會吳吳數為楚害故楚伐吳冬季孫宿會晉士丐宋華閲衛孫林父鄭公孫蠆莒人邾人于戚謝湜曰衛孫林父以臣逼君而晉士丐率大夫會之士丐以大國之力為惡首而黨逆臣也諸侯日微大夫日強以此而已十有五年春宋公使向戍來聘二月己亥及向戍盟于劉劉夏逆王后于齊程氏學曰婚姻者人倫之本王后者天下之母劉夏非三公而逆后是不重人倫之本不尊天下之母禮義何以興而風化何以成乎謝湜曰王后配天子以主宗廟社稷者也其體尊矣以王后之尊而不以三公逆之非所以敬宗廟社稷也王后上以母道育天下下以婦道風天下其體重矣以王后之重而不以三公逆之非所以母天下而育之風天下而勸之也王后書劉夏著王室婚姻之失道也劉夏王國之士故書名胡安國曰劉夏何以不稱使不與天子之使劉夏也婚姻人倫之本王后天下之母劉夏士也而逆后是不重人倫之本而重天下之母矣然則如何使卿往逆公監之禮也官師從單靖公逆王后于齊書劉夏而不書靖公是知卿往逆公監之禮也春秋婚姻得禮者常事不書夏齊侯伐我北鄙圍成公救成至遇季孫宿叔孫豹帥師城成郛程氏學曰齊侯伐我北鄙圖成武備不謹邑城見圍救患當速救成至遇公畏齊而不敢至成也由不能救乃復畏避公之所為可知矣季孫能救故城郛見壞而城也謝湜曰伐我北鄙圍成靈公為魯之難也救成至遇襄公畏齊之強也宿豹帥師城成郛以成郛見壞而城之也邊邑遇難救之不可以緩也至遇不行則魯人無救援之力也此所以成郛為齊所壞而城邑幾危也為千乘主而力不能出救一邑則公之萎蕤不振可知矣秋八月丁巳日有食之邾人伐我南鄙謝湜曰武備不嚴故四鄙為鄰國侵伐冬十有一月癸亥晉侯周卒朱熹曰晉悼公幼年聰惠似周世宗或問晉悼公曰甚次第他才大假髙觀當初人去周迎他時只十四嵗他説幾句話便有操有縱才歸晉做得便别當時厲公弒晉室大段費力及悼公歸來不知如何便被他做得恁地好恰如久雨積隂忽遇大晴光景都别赫然為之一新又問勝桓公否曰儘勝但桓公是白地做起來悼公是見成基址熹嘗謂晉悼公周武帝周世宗三人是一般都做得事都是一做便成及才成又便死了吕祖謙曰厲公既弒悼公初立若論事勢晉自襄公以來權柄浸移臣下至靈公之弒臣下之權漸重到得厲公既弒之後最是難為時節然悼公即位之後自朝廷至於田野曠然大變使復見文公之威儀綱紀此見得悼公得要領處悼公自大夫逆于清原之日先與之定要約凡晉之驕臣皆聳然股栗此亦是正其紀綱此一段正與厲公相反厲公未入之初許賂中大夫惟恐不得入今悼公先與羣臣要約而後肯大抵天下之事須是初時做得是若太阿倒持已授他柄那時如何正得是時悼公即位之始先逐不臣者七人以明君臣之義使威令赫然始命百官施舍已責逮鰥寡振廢滯匡乏困救災患禁淫慝薄賦斂宥罪戾節器用時用民大布曠蕩之澤使霸業復興是知霸業之所以興者一則明要約如悼公初入之言曰二三子用我今日否亦今日如此等言是也二則立威令如逐不臣者七人是也三則布恩惠如施舍已責是也四則定規模如命荀家等使訓卿之子弟恭儉孝悌是也五則舉賢才如六官之長舉不失德已下是也晉悼公之所以霸其規模根本皆在於此又曰晉悼公再修文公之霸業復使晉之威令赫然布於諸侯自襄公厲公未有如悼公者所以後世論晉之霸業必須稱悼公然其問亦有得有失其小處固不足論今則論其大處所謂得之大者向者固已言之至其大失却未有説出晉自厲公以來政事弛墮權移臣下悼公初立方其朝於武宫逐不臣者七人固已能攬權柄使上下知所畏到此為之一新固是得之大若失之大者是何處晉自襄公以後權在臣下世世都如此自襄公時先軫不顧而唾已有臣強之漸後來靈公以下馴至厲公威令在臣下以悼公之霸一時收晉國之權及細考之政在臣下君弱臣強根本之患元不曽除去悼公事不一如十年荀罃為元帥荀偃士丐請伐逼陽罃不能違卒從之及十四年偃為元帥令軍中曰雞鳴而駕塞井夷竈惟余馬首是瞻欒黶很僻從下軍而歸當時此事甚不一自此數事觀之以悼公之明其臣尚如此後六卿遂至分晉在悼公論固如是今則論時深為晉惜自晉傳至悼公出來禍亂萌芽當盡掃去悼公自以在自家粗可以辦事止説目前不能深憂逺慮此是悼公大失後不免至於六卿分晉正如唐宦官之盛敬宗文宗皆不能去此二君柔懦無志固不足論以武宗之英武宣宗之明察反不能去唐家宦官之禍亂根本宦官之固盤根錯節不能盡去但能使之稍戢不為大害而已此所以終不免朱全忠之患武宣唐之賢君二君自可除宦官之禍既不能去後來何緣去得晉自襄公厲公以來都不能去權臣至于悼公亦晉之賢君却都不理會後來如何去得以此見悼公規模狹小雖有違命之臣反將就容養悼公自以為辦事得一時之便不知亂根所在子孫之所深憂惜乎以悼公之明臣強可削而不能削也獻俘反謂夷俘逼陽乃魯之附庸國而謂之夷俘晉自穆襄以來滅耿滅霍滅虞滅虢非不多也皆未嘗隱其名而謂之夷俘悼公君臣稍賢獨知中國自相屠戮之耻遮蓋其名謂之夷俘又不欲盡滅其嗣使內史選其族嗣納諸霍人其賢可見然就此責之既知其罪自當不為乃隱其名上欺先君下欺國人自可見悼公大失所在所以不忍書滅使周內史者可見制度尚在周官內史之職掌八柄曰爵曰賞以封諸侯晉要封逼陽必命周內史此周之官制尚在左氏與周禮源流體統相接春秋集義卷三十九

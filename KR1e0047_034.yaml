body:
  text: 春秋集義卷三十一宋李明復撰宣公三年春王正月郊牛之口傷改卜牛牛死乃不郊猶三望謝湜曰牛在滌曰牲傷則復謂之牛以其不可供牲也聖人事天其敬至矣郊牛口傷牛為鼷鼠食皆即以為牛而不以為牲也聖人於郊一物一事無不致其誠敬之心也有誠敬之心則天事安有不善耶郊牛之口傷養牲不敬也改卜牛牛死不敬之至也牛死乃不郊則天事於此廢矣春秋因其變而書其郊罪魯人失誠敬之心也有牲而不用則曰乃免牲牛不可用則曰乃免牛牛死無牛可免則曰乃不郊胡安國曰乃不郊為牛之口傷改卜牛而牛又死也不然郊矣禮為天王服斬衰周人告喪於魯史䇿已書而未葬也祀帝於郊夫豈其時而或謂不以王事廢天事禮乎春秋以來喪紀浸廢有不奔王喪而逺適他國有不修弔禮而自相聘問固將以是為可舉而不廢也卒至漢文以日易月後世不能復其所由來漸矣春秋備書其義自見矣三望者公羊曰祭太山河海夫天子有天下凡宇宙之内名山大川皆其所主也故得祭天而有方望無所不通諸侯有一國則境外之山川他人所主者而可以望乎季氏旅於泰山冉求不能救而夫子責之者為太山魯侯所主也大夫何與焉季氏不得旅泰山則河海非魯之封内其不得祭亦明矣猶者可已不當為之詞葬匡王胡安國曰四月而葬王室不君其禮畧也微者往㑹魯侯不臣其情慢也或曰宣公親之者也而常事不書非矣崩葬始終之大變豈以是為常事而不書也楚子伐陸渾之戎謝湜曰楚子入中國伐陸渾戎著其盛也胡安國曰夷狄相攻不志此其志何也為陸渾在王都之側戎夏雜處族類之不分也楚又至洛觀兵於周疆問鼎之大小輕重焉故特書於䇿以謹華夷之辨禁猾夏之階夏楚人侵鄭謝湜曰鄭從晉故楚侵鄭胡安國曰按左氏晉侯伐鄭鄭及晉平而經不書者仲尼削之也鄭本以晉靈不君取賂釋賊為不足與似也而往從楚非矣今晉成公初立背僭竊偽邦而歸諸夏則是反之正也春秋大改過許遷善書楚人侵稱者與鄭伯之能反正也故獨著楚人侵掠諸夏之罪爾鄭既見侵於楚則及晉平可知矣秋赤狄侵齊宋師圍曹胡安國曰按左氏宋文公即位盡逐武穆之族二族以曹師伐宋然不書於經者二族以見逐而舉兵非討罪也及宋師圍曹報武氏之亂而經書之者端本清源之意也武穆二族與曹之師奚為至於宋哉不能反躬自治恃衆强以報之兵革何時而息也宋惟有不赦之條莫之治也故書法如此冬十月丙戌鄭伯蘭卒葬鄭穆公四年春王正月公及齊侯平莒及郯莒人不肯公伐莒取向謝湜曰釋二國之怨曰平平莒及郯欲以睦鄰國也莒人不肯平之不得其道也伐莒取向則魯人平莒終於為亂而已諸侯相侵伐相攻争皆以邦國不平致之也能平其不平則相親睦相保衛吉相慶凶相弔患難相恤而侵伐攻争之患息矣平莒及郯善之大者也雖然信不足以得莒人之心也義不足以服莒人之心也其伐國取邑適以益莒之不平而已雖欲以大制小安能使二國之平哉故曰以亂平亂何治之有胡安國曰心不偏黨之謂平以此心平物者物必順以此心平怨者怨必釋惟小人之不能宅心之若是也雖以勢力强之而有不獲成者矣夫以齊魯大國平郯莒小邦宜其降心聴命不待文告之及也然而莒人不肯則以宣公必有所私係失平怨之本耳故書及書取以著其罪及所欲也平者成也取者盜也不肯者心弗允從莫能强之者也以利心圖成雖强大者不能行之於弱小春秋書此戒後世之不知治其本者故行有不得者反求諸已斯可矣吕祖謙曰公及齊平莒郯莒郯皆是徐州地亦相近大凡整理人國當以禮既欲平其國又取其邑何以能治正如見人鬭而欲解紛者見其説之不從而自與為敵秦伯稻卒謝湜曰秦伯秦共公魯不㑹葬故不書葬夏六月乙酉鄭公子歸生弑其君夷謝湜曰弑逆公子宋之謀也書曰公子歸生者歸生國之正卿也歸生茍無不臣之心則公子宋安敢肆為大逆哉春秋推原首惡而歸之歸生以其為國股肱而私縱逆惡晉靈之難不以歸穿而以歸盾鄭靈之難不以主宋而以主歸生所以責輔臣報國之忠也春秋杜患之意微矣賊不討故不書葬胡安國曰首謀弑逆者公子宋也懼譖而從之者歸生也而以歸生為首惡何也夫亂臣賊子欲動其惡而不從者未有能全其身而不死者也季子然問仲由冉求其從之者與子曰弑父與君亦不從也是以死節許二子矣歸生懼譖而從公子宋特無求路不可奪之死節耳書為首惡不亦過乎曰歸生與宋並為大夫乃貴戚之卿同執國政可以不從一也嘗統大師與宋人戰獲其元帥已得兵權可以不從二也聞宋逆謀登時而覺先事誅之猶反手耳夫據殺生之柄仗大義以制人使人聴已猶犬羊之伏於虎也何畏於人懼其見殺而從之也哉計不出此顧以畜老憚殺比方君父歸生之心悖矣故春秋捨公子宋而以弑君之罪歸之為後世鑒若司馬亮沈慶之等茍知此義則能討罪人不至於失身為賊所制矣胡宏曰春秋之義誅國賊者必先誅其黨赤狄侵齊謝湜曰齊不能討赤狄故再侵齊秋公如齊公至自齊胡安國曰君行告至常事不書宣公比年如齊而皆致者危之也夫以簒弑謀于齊而取國以土地賂齊而請㑹以卑屈事齊而求安上不知有天王下有知有方伯惟利交是奉而可保乎高固之事亦殆矣故比年如齊而皆致以戒世之欲利有攸往者惟義之與比為可安耳冬楚子伐鄭謝湜曰楚人侵鄭鄭未服故五年春公如齊夏公至自齊謝湜曰比年如齊以平州之㑹故也秋九月齊高固來逆子叔姬程頤語錄或問齊高固來逆叔姬公穀有子字如何曰子者言是公女其他則娣妹之類也謝湜曰高固逆子叔姬與莒慶逆叔姬同意時君之女稱子胡安國曰按左氏公如齊高固使齊侯止公請叔姬焉書夏公至自齊秋齊高固來逆子叔姬罪宣公也其曰來者以公自為之主稱子者或為别于先公之女也諸侯嫁女於大夫主大夫以與之者為體敵也而公自為之主壓尊毁列卑朝廷慢宗廟矣夫以鄭國𥚹小楚公子圍之貴驕强大來娶於鄭子産辭而却之使館於外欲野賜之幾不得撫有其室而宣公以魯國周公之後逼於高固請婚其女强委禽焉而不能止惟不知以禮為守身之幹是以得此辱也春秋詳書為後世鑒欲人之必謹于禮以定其位不然卑巽妄説不近於禮奚足逺恥辱哉叔孫得臣卒胡安國曰内大夫卒無有不日者以春秋魯史也其或不日則見恩數之畧耳仲遂如齊謀弑子赤叔孫得臣與之偕行在宣公固有援立之私其恩數豈畧而不書日是聖人削之也君臣父子妃妾適庶人道之大倫也方仲遂以殺嫡立庶往謀于齊而與得臣並使也若懵然不知其謀或知之而不能救則將焉用彼相矣春秋治子赤之事専在仲遂以其内交宫禁外結强鄰大惡無所分也而叔孫得臣有同使於齊之罪故特不書日以貶之若曰大夫而不能為有無者不足加以恩數焉耳冬齊高固及子叔姬來謝湜曰大夫非君命非國事不越境高固齊之大夫也秋來逆子叔姬冬及子叔姬來罪其違法也以其非事出境故書來來同高固故書及觀高固不率如此而君失御臣之道可知矣胡安國曰左氏曰反馬也禮嫁女留其送馬不敢自安及廟見成婦遣使反馬則高固親來非禮也又禮女子有行逺父母者歲一歸寜今見逆踰時未易歳也而叔姬亟來亦非禮也故書及書來以著齊罪也大夫適他國必有君命與公事否則禮法之所禁而可犯乎恵公許其臣越禮恣行而莫遏高固委其君踰境自如而不忌則人欲已肆矣凡婚姻常事不書而書此者則以為非常為後世戒也楚人伐鄭謝湜曰楚子伐鄭鄭未服故六年春晉趙盾衛孫免侵陳謝湜曰趙盾晉逆臣晉不能討故與衛孫免侵陳以陳將即楚故也胡安國曰按𫝊稱陳及楚平荀林父伐陳經皆不書者以下書晉衛加兵於陳即陳及楚平可知矣以趙盾孫免書侵則林父無詞可稱亦可知矣愛人不親反其仁治人不治反其智晉常命上將帥師救陳又再與之連兵伐鄭今而即楚無乃於己有闕盍亦自反可也不内省徳遽以兵加之則非義矣故林父不書伐而盾免書侵以正晉人所以主盟非其道也夏四月秋八月螽胡安國曰傳謂螽為穀災虐取於民之效也先是公伐莒取向後再如齊伐萊軍旅數起賦斂既繁戾氣應之矣夫善惡之感萌於心而災祥之應見於事宣公不知捨惡遷善以補前行之愆而用兵不息災異數見年穀不豐國用空乏卒至於改助法而稅民盖自此始矣經於螽螟一物之變必書于䇿示後世天人感應之理不可誣當慎其所感也冬十月七年春衛侯使孫良夫來盟謝湜曰杜氏謂公立衛始修好胡安國曰來盟為前定者嘗有約言矣未足效信而釋疑又相㰱血固結之耳是盟衛欲為晉致魯而魯専事齊初未與晉通也必有疑焉而衛侯任其無咎故遣良夫來為此盟而公卒見辱盟非春秋之所貴義自見矣夏公㑹齊侯伐萊秋公至自伐萊謝湜曰萊小國大旱謝湜曰大旱不雨一也旱則赤日損物故為大旱不雨則雲不為雨也不雨或厯一時或厯數月則書不雨以見為災之久也胡安國曰及者内為志㑹者外為主平莒及郯公所欲也故書及繼以取向即所欲者可知矣伐萊齊志也故書㑹繼以伐致即師行之危亦可知矣公與齊侯俱不務徳合黨連兵恃强凌弱是以為此舉也軍旅之後必有凶年言民以征役怨咨之氣感動天變而旱乾作矣其以大旱書者或不雩或雖雩而不雨也不雩則無恤民憂國之心雩而不雨格天之精意闕矣冬公㑹晉侯宋公衛侯鄭伯曹伯于黑壤謝湜曰黑壤晉地晉成公初㑹諸侯胡安國曰㑹而不得見不以不得見為諱盟而不與盟不以不與盟為諱則曲不在公而主㑹盟者之罪耳與於㑹不與於盟而公有歉焉非主㑹盟者之過也則書㑹不書盟若黑壤是也晉侯之立公既不朝又不使大夫聘而每歳適齊是宣公行有不慊于心而非晉人之咎矣凡不直者臣為君隠子為父隠于以養臣子愛敬之心而不事盟主又以賂免則不直在已矣八年春公至自㑹夏六月公子遂如齊至黃乃復謝湜曰公子遂受命聘齊至黃以疾而復非禮也大夫受命以出雖死以尸將事可也未致君命而復則有廢命之罪矣至黄乃復罪其専也敖書不至遂書至黄者不至則無進意其復以不敬也至黃則有進意其復以疾也不至而復遂返之辭也至黃乃復不可進而後返之辭也然則敖與遂其廢君命一也其為罪則異矣乃反前之詞胡安國曰至黃乃復壅君命也有疾亦不復可乎大夫以君命出聞喪徐行而不返未致事而死以尸將事楚伐呉陳侯使公孫貞子往弔及良而卒將以尸入呉人辭焉上介芉尹盖曰寡君使葢備使弔君之下吏無祿使人逢天之慼大命隕墜絶世于良廢日供積一日遷次今君命逆使人曰無以尸造於門是我寡君之命委于草莽也無乃不可乎呉人不敢辭君子以為知禮乃者無其上之詞其曰復事未畢也辛已有事于太廟仲遂卒于垂胡安國曰有事言時祭此公子遂也曷為書字生而賜氏俾世其官也曷為書卒以事之變卒之也古者諸侯立家大夫卒而賜氏其後尊禮權臣寵遇貴戚而不由其道於是乎有生而賜氏其在魯則季友仲遂是也襄仲殺惡及視援立宣公而宣公深徳之故生而賜氏使世大夫以荅之也經於其卒書族以志變法之端為後世戒朱熹曰諸侯有四時之祫畢竟是祭有不及處方如此如春秋有事于太廟太廟便是羣祧之主皆在其中壬午猶繹萬入去籥程氏學曰八年有事于太廟仲遂卒于垂壬午猶繹萬入去籥非禮也繹者明日又祭也猶者可已而不已也萬入去籥去其有聲者而用其無聲者知其不可為而為之也此與昭十五年有事于武宫同二年不書祭名而止書曰有事者事之失不在祭故也若烝為黷禮吉禘以其不當吉又見魯有禘祭之類則必書名謝湜曰古者哀樂不同日有哀戚之心則不能致其樂有喜樂之心則不能致其哀故也祭吉事也君方祭以喪入告非禮也其告也廢祭則為不敬廢卿佐之喪則為忘哀君於喪祭不得全其事矣辛巳有事于太廟仲遂卒于垂君祭在廟而以哀入告也繹明日又祭也以喪入告則君有哀戚之心而祭不可以終矣壬午猶繹著其忘哀也繹書猶以明可已而不已也萬籥皆舞事也去籥去其有聲者也去其有聲而用其無聲為樂一也萬入去籥知其不可為而為之也遂宣公股肱之臣也以臣子恩之矣而不以臣子哀之失君道也宣公賴遂以立故生賜氏族以世其官卒書遂著其氏也翬遂其罪一也仲遂書卒者春秋貶絶逆臣之罪已見於翬矣至遂書卒則非以錄遂也以遂卒猶繹著魯之失禮也有事祭也不書祭名而書有事者所失在事不在祭故也烝而黷在喪而吉禘則所失在祭故祭書名胡安國曰繹者祭之明日以賓尸也猶者可已之詞萬舞也以其無聲也故入而遂用籥管也以其有聲也故去而不作是謂故知不可存其邪心而不格也禮大夫卒當祭則不告終事而聞則不繹不告者盡肅敬之誠於宗廟不繹者全始終之恩於父子今仲遂國卿也卒而猶繹則失寵遇大臣之禮矣春秋雖隆君抑臣而體貌有加焉則亷陛益尊而臣節礪後世法家専欲隆君而不得其道至以犬馬國人相視大倫滅矣聖人書法如此存君臣之義也吕祖謙曰萬舞二舞之總名也干舞者武舞之别名也籥舞者文舞之别名也文舞又謂之羽舞鄭康成據公羊傳以萬舞為干舞盖公羊釋經之誤也春秋書萬入去籥言文武二舞俱入以仲遂之喪於二舞之中去其有聲者故去籥焉公羊乃以萬舞為武舞則簡兮之詩與商頌何為獨言萬舞而不及文舞耶左氏載考仲子之宫將萬焉婦人之廟亦不應獨用武舞也然則萬舞為二舞之總名明矣戊子夫人嬴氏薨謝湜曰嬴氏文公妾宣公母胡安國曰敬嬴文公妾也何以稱夫人自成風聞季友之繇事友而属其子及僖公得國立以為夫人於是乎嫡妾亂矣春秋於風氏凡始卒四貶之則禘於太廟秦人歸襚榮叔含賵召伯㑹葬去其姓氏不稱夫人王再書而無天是也敬嬴又嬖私事襄仲而屬宣公不待致于太廟援例以立則從同同而無貶矣其意若曰以義起禮為可繼茍出于私情而非義後雖欲正可若何晉師白狄伐秦謝湜曰狄種類非一故有赤狄有白狄晉道白狄為中國患罪之也胡安國曰晉主夏盟糾合諸侯攘夷狄安諸夏乃其職已秦人之怨起自侵崇其曲在晉責己可也既不知自反釋怨修睦以補前過己可咎矣乃復興師動衆㑹戎狄以伐之獨不惡傷其類乎直書于䇿貶自見矣吕祖謙曰報崇之役僖公三十三年郤缺獲白狄子今來平楚人滅舒蓼謝湜曰舒蓼二㣲國胡安國曰按詩稱戎狄是膺荆舒是懲在周公所懲者其自相攻滅中國何與焉然春秋書而不削者是時楚人彊舒蓼及滑汭盟呉越勢益强大將為中國憂而民有被髮左袵之患矣經斯世者當以為懼有攘却之謀而不可忽則聖人之意也朱熹曰春秋末楚地最廣盖自初間并吞諸蠻而有其地如淮南之舒宿亳之蓼皆是初間若不得齊桓管仲看他氣勢定吞周室以此觀之孔子稱管仲之功豈溢美哉吕祖謙曰當楚莊時楚之威北加於中國南被蠻夷所謂盟呉越而還㸔傳所載則與舒絞州蓼相似到得十一二年莊王既殁共王繼之呉始大不憚楚晉申公巫臣乃以乘車教呉楚自此疲於奔命其間争得二三十年莊王時呉越與羣舒之徒同受盟於楚其時可謂㣲弱何故數十年間呉便為害後來至於入郢幾滅楚以此知天下形勢不獨中國與夷狄相為盛衰蠻夷種類亦自相為盛衰何故楚盛時呉越衰到莊王死楚衰呉越盛呉出來威加中國到得夫差墮越却起如漢時匈奴盛方其盛時凡北方所謂氊裘之國無不服匈奴後來匈奴分南北烏丸又盛到烏丸既盛所謂匈奴㣲矣散而處中國如劉元渤海亦列于邊民之間到西晉起海外分崩匈奴左右賢王劉元渤海再起舊時烏丸又㣲了自此五胡迭長始者呉越盛五胡衰氐羌繼之氐羌盛後來符堅衰慕容鮮卑繼之氐羌衰所謂孛頭元命繼之自此更為消長直到唐藩鎮未嘗不相為盛衰論來一消一長是天道不息處秋七月甲子日有食之既冬十月己丑葬我小君敬嬴雨不克葬庚寅日中而克葬謝湜曰雨不克葬葬無雨備也日中而克葬以雨其葬緩也葬人子之大事也卜日而葬敬大事也虞葬同日不忍一日未有所歸也日中虞之時也魯之葬敬嬴也不知雨之在所備也故卜以己丑葬以庚寅葬不得以時成日中然後能葬大事簡慢甚矣葬人子之所自盡也念親不至為不哀慮物不備為不豫葬不及時為不敬不哀不豫不敬為不孝胡安國曰成風薨以夫人葬以小君將祔于廟而始有二夫人也則四貶之以正其事今敬嬴亦薨以夫人葬以小君使祔于廟無貶以正之從同同可也而於宣公元年即以所逆穆姜婦之何也曰婦有姑之詞見敬嬴遂以子貴援例而亟立為夫人也僖公享國八年然後致成風而敬嬴之亟也雖云援例魯君臣之責亦可知矣無貶而書法若此者猶桓宣弑君而書即位耳敬嬴以其子宣公屬諸襄仲殺太子及其母弟雖假手於仲實敬嬴之謀也經書子赤卒夫人姜氏歸于齊其文無貶而讀者有傷切之意焉則以秉彞不可滅也𫝊謂哭而過市市人皆哭敬嬴逆天理拂人心之狀慘矣其於終事雨不克葬著咎徴焉而謂無天道乎此皆直書以見人心與天理之不可誣者也夫喪事即逺有進無退浴于中霤飯于牖下小斂于户内大斂于阼階殯于客位遷于廟袒于庭塴于墓以弔賓則其退有節以虞事則其祭有時不為雨止禮也雨不克葬喪不以制也或曰卜葬先逺日所以避不懐也諸侯相朝與旅見天子入門而雨霑服失容則廢矧送終大事人情所不忍遽者反可冒雨不待成禮而葬乎潦車載簑笠士喪禮也有國家者乃不能為雨備何也且公庭之於墓次其禮意固不同矣不得不可以為恱無財不可以為悦得之為有財古之人皆用焉而不能為之備是儉其親也不亦薄乎故穀梁子曰雨不克葬喪不以制也厚葬古人之所戒而墨之治喪也以薄又君子之所不與故喪事以制春秋之㫖也吕祖謙曰雨不克葬當有備不可過日俟其晴亦可此當大事者所宜慎也城平陽楚師伐陳謝湜曰楚伐陳以陳與晉故也陳即楚則晉衛侵陳陳即晉則楚師伐陳春秋集義卷三十一

body:
  text: 春秋集義卷二十二宋李明復撰僖公十有八年春王正月宋公曹伯衛人邾人伐齊謝湜曰桓公卒國嗣未正公子無虧長孝公幼宋襄伐齊立孝公非正也伐人之喪立非其正非義也吕祖謙曰管仲卒桓公一死五公子便争立葢縁管仲不曽下得正心誠意工夫而桓公亦不知此乃急于一時之功利所以致五公子之禍孔孟所以不肻削就者正恐如此孔子所以稱其小器者正謂此爾又曰公與管仲屬孝公于宋襄公以五公子各有黨論管仲豈不賢于咎犯之徒何故管仲去托宋立世子至桓公一死諸公子便亂此見得齊家法不正自是如此晉之家法正所以其後如此之逺如齊桓夫人六人管仲既有三歸之失豈能正其君此夫子所以有小器之稱夏師救齊謝湜曰齊立無虧正也四國伐齊非正也僖公以四國伐齊非正而出師救之鄰國之義也書救齊善之也五月戊寅宋師及齊師戰于甗齊師敗績程頥曰書宋及曲在宋也奉少以奪長其罪大矣齊師敗績書敗責齊臣也謝湜曰四國伐齊不正齊人有詞不服三國皆已退矣宋襄必欲立孝公而獨以師攻齊乃至殺公子無虧而後已然則甗之戰曲皆在宋故以宋師主戰而罪之也齊國君主未定出戰于䘮亂之中故敗績凡戰皆以被伐之國為戰主以戰由被伐者欲戰所致也以被伐者主戰而罪之乃春秋明微之意也甗之戰反以行伐之國主戰者以宋襄以不正伐正以不道伐喪獨無退師之心故也胡安國曰伐齊之䘮奉少奪長其罪大故其責詳書師救齊者善魯也救者善則伐者惡矣凡書救者未有不善之也書狄救齊者許狄也許夷狄則罪諸夏矣許之曷為不稱人深著中國諸侯之罪也凡伐者為客受伐者為主今齊受伐以宋為主者曲在宋也凡師直為壯曲為老書齊師敗績者責齊臣也或曰桓公管仲嘗屬孝公于宋襄公以為世子矣則何以不可立乎曰不能制命雖天王欲撫鄭伯以從楚春秋猶以大義裁之而不與也桓公君臣乃欲以私愛亂長幼之莭其可哉獨不見宣王與仲甫争魯侯戲括之事其後如之何也春秋深罪宋公大義明矣狄救齊程氏學曰夷狄救中國則中國之衰而諸侯惡甚可知矣十七年齊侯小白卒十八年春宋曹衛邾伐之五月宋又戰焉齊新有䘮而諸侯加兵不道如此狄乃能行義以兵救之聖人哀中國無王諸侯怙亂㓕義夷狄之不若也二十八年晉侯伐曺衛而楚救之襄十年諸侯伐鄭戌虎牢而楚公子貞帥師救之義亦類此若哀十年吴救陳則著楚之罪而傷中國之不振也謝湜曰四國伐齊宋以戰敗齊其不道甚矣方是時中國無持危之義狄乃知齊直宋曲而出兵救之是禮義之地反夷狄之不若也書狄救齊傷中國之不振也師救齊狄救齊善之也救者善則伐者不正可知矣秋八月丁亥𦵏齊桓公謝湜曰桓公為天下盟主四十餘年死之日師敗國危而同盟之國莫有出力為之援者伯者不得人心可知也以制服天下為心而不知正公室以防内難死之日五公子争立宋襄以兵伐國乃至九月始𦵏而社稷幾至淪亡伯者内無逺識可知也胡安國曰桓公九合諸侯不以兵車威令加乎四海幾于改物雖名方伯實行天子之事然而不能慎終如始付託非人柩方在殯四鄰謀動其國家而莫之恤至于九月而後𦵏以此見功利之在人淺矣春秋明道正義不急近功不規小利于齊桓晉文之事有所貶而無過褒以此冬邢人狄人伐衛謝湜曰邢人引狄為中國患先邢人罪其招患也狄隨中國侵伐盟㑹皆稱人胡安國曰狄稱人進之也慕義而來進之可也以夷狄伐衛而進之可乎伐衛所以救齊也衛嘗亾滅東徙渡河無所控告齊桓公攘戎狄而封之使衛國忘亡誰之賜也桓公方没不念舊德欲厚報之遽伐其喪亦太甚矣以直報怨聖人之公也以怨報怨天下之私也以德報怨寛身之仁也以怨報德刑戮之民也至是人理亡矣桓公攘夷狄安中國免民于左袵諸侯不念其賜而于衛為尤先書狄救齊以著中國諸侯之罪再書狄人伐衛所以見救齊伐衛之善功近而德逺矣十有九年春王三月宋人執滕子嬰齊謝湜曰杜氏謂宋公以㑹召諸侯執滕子凡諸侯被執罪未至絶皆不名滕子稱名者盖有可絶之罪也宋襄執滕子雖以罪然不以王命執諸侯惡之大者故宋貶稱人而滕子稱名胡安國曰執之是非决于稱人與稱爵而見執者則以名與不名知其罪之在也經書見執于人者悉皆不名而滕子獨名是亦有罪焉耳夫以齊桓之盛九合諸侯不以兵車雖江黄逺國猶相繼來盟而滕介齊宋之間不與衣裳之㑹者三十有七年及宋襄繼起又不尊事大國其見執則有由矣書名著其罪也茍為有罪其見執固宜宋何以稱人不得為伯討乎執雖以罪不歸于京師則稱人惡其專也歸于京師而執非其罪則稱人惡其濫也夏六月宋公曹人邾人盟于曹南謝湜曰宋襄内無逺畧而欲隆伯業以紹齊桓于是首為曹南之盟從之者曹人邾人而已諸侯不服可知也與北杏之㑹異矣鄫子㑹盟于邾己酉邾人執鄫子用之謝湜曰鄫子不及曹南盟故㑹宋公盟于邾淫祠有以人祭者邾執鄫子用之謂若畜産殺而用之也象人用之猶曰不可而况執人而用之乎邾之盟宋為盟主然則用鄫子宋之命也春秋獨責邾子而貶之也襄公肆為不道其罪不待貶黜而見矣邾文公固宜守義諌争堅執不從豈可畏大國之威而助之為虐哉故宋襄盟用鄫子而春秋惟責邾人鄫子失國不名者强國以畜産待鄫子而春秋尊鄫子以諸侯而不名所以深責强國也吕祖謙曰宋公使邾文公用鄫子于次睢之社欲以屬東夷葢東夷畏鬼宋襄公因其風俗而用之以祭又虐其國君而使之畏服葢其無道而至此如後之不禽二毛而失之太弱今用鄫子于社又失之太暴何其無斟酌如此秋宋人圍曹謝湜曰曹人雖受盟曹南然襄公不道曹人不服故宋人圍曹小國猶且弗服而至于圍之則大國不從可知矣胡安國曰盟于曹南口血未乾今復圍曹者討不服也愛人不親反其仁治人不治反其智襄公不能内自省德而急于合諸侯執嬰齊非伯討不足以示威盟曹南非同志不足以示信卒于兵敗身傷不知反求諸已欲速見小利之過也漢景削七國而吴楚叛東都疾横議而黨錮興唐文宗切于除奸而訓注用故子夏為莒父宰問政子曰無欲速無見小利欲速則不逹見小利則大事不成經書襄公不越數端而知其操心之若此者仲尼筆削推見至隠如化工賦像并其情不得遯焉非特畫筆之肖其形耳故春秋者化工也非畫筆也衛人伐邢謝湜曰邢人引狄伐衛故衛伐邢吕祖謙曰衛侯伐邢師興而雨縁邢無道衛人怨恨之深至師興適然而雨今邢方無道諸侯無伯是當時人不以宋襄公為伯冬㑹陳人蔡人楚人鄭人盟于齊謝湜曰宋襄以不正伐齊以威執滕子以虐用鄫子以廹脅圍曺諸侯失道未有甚于此者也故内外離心五國㑹盟于齊故左氏謂陳穆公請修好于諸侯以無忘齊桓之德胡安國曰盟㑹皆君之禮也微者盟㑹不志乎春秋凡所志者必有君與貴大夫居其間也然則為此盟者乃公與陳蔡楚鄭之君或其大夫矣曷為内則没公外則人諸侯與其大夫諱是盟也楚人之得與中國㑹盟自此始也莊公十年荆敗蔡師始見于經其後入蔡伐鄭皆以號舉夷狄之也僖公元年改而稱楚經亦書人于是乎寖强矣然終桓公世皆止書人而不得與中國盟㑹者以齊修伯業能制其强故也桓公既没中國無伯鄭伯首朝于楚其後遂為此盟故春秋没公人陳蔡諸侯而以鄭列其下葢深罪之也又二年復盟于鹿上至㑹于盂遂執宋公以伐宋而楚于是乎大張列位于陳蔡之上而書爵矣聖人書此豈與之乎所以著夷狄之强傷中國之衰莫能抗也故深諱此盟一以外夷狄二以惡諸侯之失道三以謹盟㑹之始也吕祖謙曰陳穆公請修好于諸侯以無忘齊桓之德齊在當時亦不有功于陳只是遮䕶得他所以如此此見宋襄公暴虐已甚若孝公稍能自立亦可以繼伯當時人心已自屬于齊梁亡程氏學曰紀侯大去其國梁亡鄭棄其師齊人殱于遂郭亡之類郭事實不明如上四者是一類事也國君守社稷雖死守之可也齊侯陳侯鄭伯方遇于垂紀侯遂去其國豈齊之罪哉聖人不言齊㓕之者罪紀侯輕去社稷也謝湜曰國亂自亡非人亡之故曰梁亡左氏謂亟城弗處民罷弗堪榖梁謂湎于酒淫于色皆取亡之道也胡安國曰陸淳曰秦肆其暴取人之國沒而不書其義安在曰乘人之危惡易見也滅人之國罪易知也自取亡滅者其事微矣春秋之作聖人所以明微也梁本侯國魚爛而亡何哉易曰天行健君子以自强不息古者諸侯朝修其業令晝攷其國職夕省其典刑夜儆其百工無使慆淫而後即安故克勤于邦荒度土功者禹也慄慄危懼檢身若不及者湯也自朝至于日中昃不遑暇食用咸和萬民者文王也凡有國家者土地雖廣人民雖衆兵甲雖多城郭雖固而不能自强于政治則日危月削如火消膏以至滅亡而莫覺也而况好土功輕民力湎于酒淫于色心昏而出惡政者乎其亡可立而待矣又曰梁伯溝宫以為冦至秦遂取梁而春秋書其自亡不著秦人滅國之罪何也諸侯守在四鄰自溝其宫亦太逼矣聖人筆削之大意警乎有國家者亦至矣二十年春新作南門謝湜曰延廐因舊而餙之故言新南門改而建立焉故言新作新作南門譏其侈舊制也胡安國曰言新者有故也言作者創始也其曰南門者南非一門也庫門天子臯門雉門天子應門書新作南門譏用民力于所不當為也魯人為長府閔子騫曰仍舊貫如之何何必改作孔子曰夫人不言言必有中春秋凡用民力得其時制者猶書于䇿以見勞民為重事而况輕用于所不當為者乎然僖公嘗修泮宫復閟宫矣奚斯董其役史克頌其事而經不書者宫廟以事其祖考學校以教國之子弟二者為國之先務雖用民力不可廢也其垂戒之意深矣夏郜子來朝謝湜曰郜姬姓國五月乙巳西宫灾謝湜曰西宫公别宫春新作南門夏西宫灾然則宫室過制者不可不戒也鄭人入滑秋齊人狄人盟于邢謝湜曰邢憂衛難故㑹齊人狄人為盟吕祖謙曰齊狄于邢為邢謀衛難也不知齊狄有何情好葢十八年邢狄曺伐衛此是黨與齊亦曽遷邢冬楚人伐隨吕祖謙曰隨以漢東諸侯叛楚漢東之國隨為大二十有一年春狄侵衛謝湜曰狄為邢侵衛宋人齊人楚人盟于鹿上謝湜曰鹿上宋地齊楚大國宋人欲合諸侯為盟主故先㑹二國為盟鹿上之盟詩所謂無禮義而求大功不修德而求諸侯孟子所謂以若所為求若所欲猶縁木求魚殆有甚焉者也故公子目夷曰小國争盟禍也吕祖謙曰宋人為鹿上之盟以求諸侯于楚宋襄公欲伯乃求楚所㑹之諸侯葢楚子有意執襄公所以許他如昭公四年楚求諸侯于晉皆此例也又曰齊晉所以伯皆先弱楚葢楚與中國其勢不兩立惟齊晉能攘夷狄尊中國此所以成伯業桓公有葵丘之㑹以弱楚晉文有城濮之戰以服楚所以子子孫孫服晉且宋襄本不足以與五伯之列人見他亦曽㑹諸侯故列之于五伯夫宋襄尚且不識伯者題目伯者欲尊周㑹諸侯大要在擯楚葢楚與中國相為消長宋襄欲成伯業反求諸侯于楚便不能攘夷狄尊中國與齊晉皆異此伯業所以不成宜其見辱于楚也然宋襄公之終始此一卷大可見若去事迹上看無縁看得出觀其初用鄫子于次睢之社那時之暴虐雖桀紂不過如此及其泓之戰不禽二毛其慈仁又如此若以事上看甚難曉若以理推之其仁其暴雖不同其失則一此皆是襄公一箇昏暗處惟其暗于前故欲徼一時之福而用鄫子于次睢之社惟其暗于後故泥古之陳言而不禽二毛自取敗亡之禍以理論之宋襄之所為不過一箇暗字所以求諸侯于楚使其稍知事體必不如此所以終于此而亡也夏大旱謝湜曰旱非一方所損者衆故書大旱秋宋公楚子陳侯蔡侯鄭伯許男曺伯㑹于盂執宋公以伐宋程頥曰宋率諸侯為㑹蠻夷執㑹主而諸侯莫違故以同執書之謝湜曰襄公内無悦服諸侯之道外無制禦諸侯之備擅一己之見召强楚入境以合諸侯取危之道也故㑹事未終反為楚子囚執以伐其國其為宋禍大矣書執宋公伐宋罪其無逺大之謀而貪逺大之功也執宋公楚子之暴也不書楚子者五國諸侯同其惡也楚為不道諸侯固宜守義不從今乃坐視夷狄執辱中國君長而上下無力諌之心將何以抑强夷而尊中國哉故襄公之被執也春秋以諸侯與楚同惡而罪之也宋公不名罪未絶于國也盂之㑹楚始與中國行㑹禮故楚稱爵而位列陳蔡上著其强也盂宋地胡安國曰執宋公者楚子也何以不言楚子執之分惡于諸侯也諸侯皆在㑹而蠻夷執其㑹主拱手以聽而莫之敢違其不勇于為義亦甚矣故特列楚子于陳蔡之上而以同執為文夫以楚之强豈能勝秦五國之衆何弱于趙然澠池之㑹藺相如一奮其氣威信敵國秦雖虎狼猶不敢動況以五國之君而不能得志于荆楚乎宋以乘車之㑹徃而楚伏兵車以執之則宋直楚曲其義已明雖以匹夫自反而縮猶不可屈矧南面之君也哉然春秋為賢者諱宋公見執不少隐之何也夫盟主者所以合天下之諸侯攘戎狄尊王室者也宋公欲繼齊桓之烈而與楚盟㑹豈攘戎狄尊王室之義乎故人宋公于鹿上之盟而盂之㑹直書其事而不隠所以深貶之者也吕祖謙曰諸侯㑹宋公于盂楚與中國㑹盟不為不多皆是遣人來楚子未嘗親徃雖齊桓之强盛許多時欲服楚亦未嘗得他親來春秋二百四十二年惟此一㑹楚子親來何也盖楚子意欲執宋公却先自來㑹正如石勒要執王濬先來朝一般冬公伐邾謝湜曰邾人將滅須句故伐邾楚人使宜申來獻㨗謝湜曰楚子使宜申以宋㨗遺魯將以耀其功而振其威也楚子貶稱人者罪其以夷狄執中國之君也軍㨗書來獻抑夷狄之强也不書宋捷不使楚㨗于宋也㑹書爵獻㨗書人以示奪爵而人之也胡安國曰不曰來獻宋㨗為魯諱也諸侯從楚伐宋而魯獨不與故楚來獻㨗以脅魯為魯計者拒其使而不受可也請于天王而討之可也宋公先代之後作賔王家方修盟㑹而伏兵車執之于壇坫之上又以軍獲遺獻諸侯其横逆甚矣拒其使而不受聲其罪而致討不患無詞魯于是時曽不能申大義以攘荆楚尊中國故不曰宋捷特為魯諱之也十有二月癸丑公㑹諸侯盟于薄釋宋公謝湜曰釋宋公楚子之義也不書楚子者六國諸侯同其善也楚子執宋公伐宋其勢暴矣然不肆豺狼之欲而終釋宋公者諸侯維持之力也故宋公之執也既以諸侯與楚同罪而罪之矣及宋公之釋也又以諸侯與楚同善而與之焉楚為一惡不獨罪楚又以罪諸侯楚為一善不獨與楚又以與諸侯所以責諸侯之制夷狄也襄公為宗廟社稷人民主始也諸侯㑹于盂若罪人執之于㑹終也諸侯盟于薄若罪人釋之于盟其危辱之大至此者皆以不量力不度德取之而已有國家者其動可不戒耶釋宋公義事諸侯所同欲故稱諸侯胡安國曰㑹不書其所為獨㑹于稷書成宋亂者為受郜鼎立華督也㑹于澶淵言宋灾故者為𦵏蔡侯不討般也盟不書所為而盟于薄言釋宋公者宋方主㑹而楚人執而伐之以其俘獲來遺是楚人反為中國主盟禽獸將逼人而食之矣此正天下之大變春秋之所謹也魯既不能申大義以抑其强暴使宋公見釋出自天王與中國而頋與歃血要言求楚子以釋之是操縱大權自蠻夷出其事已傎患矣故書㑹書盟書釋皆不言楚子為魯諱以深貶之也榖梁謂不與楚專釋是已或以為嘉我公之救患誤矣又曰執襄公者蠻夷也而春秋不書者分惡于諸侯也其年冬釋宋公釋之者諸侯也而春秋不書歸善于魯君也胡宏曰昔宋公為楚所執及楚子釋之孔子筆削春秋乃曰諸侯盟于薄釋宋公不許夷狄之人制中國之命也春秋集義卷二十二

body:
  text: 春秋集義卷三十宋李眀復撰宣公程頤曰宣公名倭文公子子赤庶兄匡王五年即位宣謚也善問周達曰宣元年春王正月公即位謝湜曰宣公之立上不受之天子下不受之先君書即位著其自立也胡安國曰宣公為弑君者所立受之而不討賊是亦聞乎弑也故如其意焉而書即位以著其自立之罪而不嫌于同詞美一也有小大則褒詞異惡一也有小大則貶詞異一美一惡無嫌于同公子遂如齊逆女謝湜曰大喪而逆女其惡不待貶絶而見矣公即位而逆女將以結援于齊也納幣非卿故不書公子遂魯逆臣王法在所絶也稱公子以宣公親之也翬稱公子遂稱公子而桓與聞逆宣受逆臣立其惡著矣胡安國曰魯秉周禮喪未朞年遣卿逆女何亟乎太子赤齊出也仲遂殺子赤及母弟而立宣公懼于見討故結婚于齊為自安計越典禮而逆之如此其亟而不顧者必敬嬴仲遂請齊立接之始謀也其後滕文公定為三年喪父兄百官皆不欲曰吾宗國魯先君莫之行也喪紀浸廢夫豈一朝一夕之故自文宣莫之行矣此所謂不待貶絶而罪惡見者也三月遂以夫人婦姜至自齊程頤曰脫氏字謝湜曰遂不稱公子一事再見者卒名故也逆夫人至稱以者逆女君命故也婦姜不稱氏者以婦配姓則不氏亦猶以謚配姓則不氏也女子以姓為本言婦姜而不言氏非褒貶之法也公子公孫宗族之親也春秋時皆以臣禮仕于國以親言之則有尊卑之序也然則公室子孫逆女以卑者行則順以尊者行則逆胡安國曰有不待貶絶而罪惡見者不貶絶以見惡夫人與有罪焉則待貶而後見故不稱氏夫人其如何知惡無禮如野有死麕能以禮自防如草蟲愆期有待如歸妹之九四則可免矣凡稱婦者其詞雖同立義則異逆婦姜于齊病文公也以婦姜至自齊責敬嬴也敬嬴嬖妾私事襄仲以其子屬之殺世適兄弟出主君夫人援成風故事即以子貴為國君母斬焉在衰服之中請婚納婦而其罪隠而未見也故因夫人至特稱婦姜以顯之此乃春秋推見至隠著妾母當國用事為後世鑒者也槩指為有姑之詞而不察其㫖則精義隠矣朱熹曰遂以夫人婦姜至自齊恐是當時史官所書知此葢為如今魯史不存無以知何者是舊文何者是聖人筆削如何得見聖人之意夏季孫行父如齊謝湜曰左氏謂請㑹于齊胡安國曰經書行父如齊而不言其故謂納賂以請㑹者𫝊也經有不待𫝊而著者比事以觀斯得矣下書公㑹齊侯于平州則知此㑹行父請之也又書齊人取濟西田則知其請盖以賂也雖微𫝊其事著矣諸侯立卿為公室輔猶屋之有楹也而謀國如此亦不待貶而惡自見者也不然以行父之勤勞恭儉相三君而無私積必能以其君顯名與晏嬰等矣晉放其大夫胥甲父于衛程氏學曰晉放其大夫胥甲父于衛哀三年蔡人放其大夫公孫獵于呉諸侯専放大夫可乎唯罪輕于専殺耳君之卿佐是謂股肱股肱或虧何痛如之謝湜曰放屏棄之詞放驩兠於崇山是也誅罰王之事也諸侯擅命其上専殺大夫其次専放大夫書放胥甲父罪之也古者大臣有罪放之幽逺之地者擯之不使得為民病也衛晉之鄰也以甲父不忠于晉而放之于衛是以晉之禍移之于鄰國也書放甲父于衛著其失也舜之四刑放重于流竄重於放殛重于竄胡安國曰放猶羈置毋去其所比于専殺者其罪薄乎云爾或以為近正非矣大夫當官既不請于天子而自命以為有罪又不告于司寇而擅刑猶不逺于正乎秦晉戰于河曲撓臾駢之謀者趙穿也若討其不用命則當以穿為首止治軍門之呼偕貶可也而獨放胥甲父則以趙盾當國穿其族子而盾庇之也桃園之罪其志固形于此矣故稱國以放見晉政之在私門而成上侵為後戒也吕祖謙曰放胥甲父于衛河曲之戰趙穿與胥甲父俱敗軍謀何故獨放甲父此見趙宣子私意處當時所以不便誅他時正為是親不敢行法耳此莫是自文公以來開此端隙魏犫與顛頡俱爇曹負羈之宫而文公止殺顛頡然文公猶是國君趙盾乃人臣豈可徇私意而行法乎此所以成趙穿弑靈公之事公㑹齊侯于平州謝湜曰平州齊地左氏謂定公位胡安國曰按左氏曰㑹于平州以定公位魯宣簒立逾年舉國臣子既從之矣若之何位猶未定而有待于平州之㑹也春秋以來弑君簒國者已列于諸侯之㑹則不復致討故曹人以此請負芻于晉夫簒弑之賊毁滅天理無所容于天地之間身無存歿時無古今其罪不得赦也以列于㑹而不復討是視倫紀為弁髦棄人類為禽獸此仲尼所為懼春秋所以作也然欲定其位者魯公宜稱及齊而曰㑹者討賊之法也凡討亂臣賊子必深絶其黨而後為惡者孤矣公子遂如齊胡安國曰宣公簒立之罪仲遂主謀為首惡初請于齊遂為上客而並書介使者罪叔孫得臣不能為有無亦從之也大夫有以死争者矣然削而不書以叔仲恵伯死非君命失其所也遂及行父則一再見于經矣如齊拜成雖削之可也又再書于䇿者于以著其始終成就弑立之謀以戒後世人臣或内交宫禁以固其寵或外結藩鎮以為之援至于殺生廢置皆出其手而人主不悟者其慮深矣凡此皆直書于䇿而義自見者也六月齊人取濟西田程頤曰宣公不義得國賂齊以求助齊受之以助不義故書取不義不能保其土故不云我非為彼彊取故不諱不能有而失者皆諱謝湜曰宣公懼大國見討故以濟西田賂齊春秋以齊人取我田為文者罪齊侯受賂容逆也罪齊侯受賂容逆而魯國之惡見矣貶齊侯故書人公子遂如齊子卒公子遂如齊齊人取濟西田然則殺適立庶皆公子遂結齊而為之也胡安國曰魯人致賂以免討而書齊人取田者所以著齊罪春秋討賊尤嚴于利其為惡而助之者所以孤其黨夫齊魯鄰國盟主之餘業也子惡弑出姜歸而宣公立不能聲罪致討務寧魯難首與之㑹是利其為惡而助之也弑君簒國人道所不容而貨賂公行免于諸侯之討則倫紀等于弁髦人類滅為禽獸其禍乃自不知以義為利而以利之可以為利而為之也孟氏為梁王極言利國者必至于弑奪而後厭盖得經書取田之意舉法如此然後人知保義棄利亂臣賊子孤立無徒而亂少弭矣吕祖謙曰齊人取濟西之田濟西田初是曹故地晉文公取之以分與魯今魯又賂齊只是交割前日請㑹之賂秋邾子來朝楚子鄭人侵陳遂侵宋胡安國曰楚書爵而人鄭者貶之也鄭伯本以宋人弑君晉不能討受賂而還以此罪晉為不足與也遂受盟于楚今乃附楚以亟病中國何義乎書侵陳遂侵宋者以見潛師掠境肆為侵暴非能聲宋罪而討之也既正此師為不義然後中國之師可舉矣吕祖謙曰楚侵陳遂侵宋陳與宋相近晉趙盾帥師救陳胡安國曰鄭在王畿之内而附蠻夷陳先代帝王之後而見侵逼此門庭之宼利用禦之者也晉救陳則存諸夏攘夷狄之師故特褒而書救凡書救者未有不善之也如解倒懸如救民于塗炭之中知此義則知春秋書用兵之意矣𫝊稱師救陳宋經不書宋此非闕文乃聖人削之也前方以不能討宋上卿貶而稱人諸侯㑹而不序今若書救宋則典刑紊矣宋公陳侯衛侯曹伯㑹晉師于棐林伐鄭謝湜曰鄭穆公從楚病中國故貶書人楚子鄭人攻陳宋書侵著其不道也侵宋書遂著其暴横也書趙盾救陳善之也書宋公陳侯衛侯曹伯㑹晉師伐鄭著諸侯疾鄭之深也棐林鄭地晉師至棐林而諸侯㑹之諸侯皆欲伐鄭故也胡安國曰列數諸侯而㑹晉趙盾穀梁子以為大趙盾之事以其大之也故曰師此説非也春秋立法君為重而大夫與師其體敵列數諸侯於帥師之下而又書大夫之名氏則臣疑于君而不可以為訓其曰㑹晉師此乃謹禮于微之意也其立義精矣棐林鄭地也前者地而後伐以為疑詞此其地則以著其美者一美一惡無嫌於同冬晉趙穿帥師侵崇謝湜曰崇秦與國盾方救陳伐鄭穿又侵崇晉國權出趙氏故也胡安國曰崇在西土秦所與也晉欲求成于秦不以大義動之而伐其與國則為諼已甚比諸伐楚以救江異矣而𫝊謂設此謀者趙穿也意者趙穿已有逆心欲得兵權託于伐國以用其衆乎不然何謀之迂而當國者亦不裁正而從之也穿之名姓自登史䇿弑君于桃園而上卿以志同受惡其端又見于此書侵以見所以求成者非其道矣晉人宋人伐鄭胡安國曰宋人弑君既列于㑹在春秋衰世已免於諸侯之討矣論春秋王法則其罪固在法所不赦也而晉人與之合兵伐鄭是謂以燕伐燕庸愈乎其書晉人宋人非將卑師少盖貶而人之也以貶書伐者若曰聲罪致討而已有瑕則何以伐人矣二年春王二月壬子宋華元帥師及鄭公子歸生帥師戰于大棘宋師敗績獲宋華元程氏學曰鄭獲宋華元生也呉獲陳夏死也不當論其生死盖存之殺之皆在得之之後故不當論于此如其義則獲人之君與其卿及其見獲者之罪皆可知矣其間曲直之義則各存乎其文若韓之戰不書秦伐而曰晉及秦伯戰于韓獲晉侯則曲在晉自可見也謝湜曰前冬宋人伐鄭今春二國戰于大棘然則大棘之戰由宋華元好戰致之也故以華元主戰而罪之師曲在宋可知也華元逞一朝之怨進不由義出不量敵乃至師衆大敗而身獲于人書獲宋華元著大夫好戰之禍也胡安國曰兩軍接刃主將見獲其負明矣又書師敗績詞不贅乎此明大夫雖貴與師等也故將尊師少稱將不稱師師衆將卑稱師不稱將將尊師衆並書于策者示人君不可輕役大衆又重將帥之選其義深矣或曰元帥三軍之司命而輕重若是班乎自行師而言則以元帥為司命自有國而言則以得衆為邦本鄭使高克將兵禦敵于境欲逺克也而不恤其師楚以六卒實從得臣恐喪師也而不恤其將故經以棄師罪鄭以殺其大夫責楚明此義然後知王者之道輕重之權衡矣秦師伐晉謝湜曰晉趙穿侵崇故秦師伐晉胡安國曰按左氏以報崇也遂圍焦晉用大師于崇乃趙穿私意而無名也故書侵秦人為是興師而報晉則問其無名之罪也故書伐世豈有欲求成于强國而侵其所與可以得成者乎穿之情見矣宣子當國算無遺䇿獨懵于此哉其從之也而盾之情亦見矣春秋書事筆削因革必有以也一侵一伐而不書圍焦所以誅晉卿上侵之意其所由來者漸矣夏晉人宋衛人陳人侵鄭謝湜曰鄭敗宋師獲宋華元故四國侵鄭胡安國曰按左氏晉趙盾及諸侯之師侵鄭以報大棘之役初鄭歸生受命于楚以伐宋經不書伐而以宋華元主大棘之戰者盖楚人有詞于宋矣師之老壯在曲直晉主夏盟盾既當國合諸侯之師何畏乎楚何避乎鬭椒然力非不足而去之者以理曲也故卿不氏而稱人師書侵而不言伐易於訟卦之象曰君子作事謀始始而不謀將至于興師動衆有不能定者也晉惟取賂釋宋而不討至以中國之大不能服鄭不競于楚可不慎乎春秋行事必正其本為末流之若此也其垂戒明矣秋九月乙丑晉趙盾弑其君夷臯程頤語錄或問晉趙盾弑其君夷臯聖人不言趙穿何也曰此春秋大義趙穿手弑其君人誰不知盾之罪非春秋書之更無人知也仲尼曰惜也越境乃免此句要人㑹得若出而反不討賊也則不免除出境遂不反乃可免也范祖禹曰古者官守其職史書善惡君相不與焉故齊太史兄弟三人死于崔杼而卒不没其罪此姦臣賊子所以懼也後世人君得以觀史而宰相監修欲其直筆不亦難乎司馬遷有言曰文史星厯近乎卜祝之間盖止於執簡記事直書其實而已非如春秋有褒貶賞罰之文也後之為史者務褒貶而忘事實失其職矣人君任臣以職而宰相不與史事則善惡庶乎其可信也謝湜曰弑逆趙穿為之也書曰趙盾者穿盾之族也晉國之權皆歸于盾盾茍無不臣之心則穿安敢肆為大逆哉今也入諫不聴亡不越境聞難而反反不討賊然則穿之逆盾之由也春秋推原首惡而歸之趙盾所以為萬世法也自星孛北斗之後齊有商人齊人之難宋有宋人之難莒有莒國之難晉有趙盾之難其禍大且衆矣然則天變之大可不戒耶賊不討故不書葬胡安國曰趙穿手弑其君董狐歸獄于盾其斷盾之獄詞曰子為正卿亡不越境反不討賊以是書斷而盾也受其惡而不敢辭仲尼因其法而不之革其義云何曰正卿當國任事之臣也國事莫酷于君見弑不于其身而誰責乎亡而越境謂去國而不還也然後君臣之義絶反而討賊謂復讎而不釋也然後臣子之事終不然是盾偽出而實聞乎故也假令不與聞者而縱賊不討是有今將之心而意欲穿之成乎弑矣惡莫慘乎意今以此罪盾乃閑臣子之邪心而謹其漸也盾雖欲辭而不受可乎以高貴鄉公之事觀焉抽戈者成濟倡謀者賈充而當國者司馬昭也為天吏者將原司馬昭之心而誅之乎亦將致辟成濟而足也故陳泰曰惟斬賈充可以少謝天下耳昭問其次意在濟也泰欲進此直指昭也然則趙穿弑君而盾為首惡春秋之大義明矣微夫子推見至隠垂法後世亂臣賊子皆以詭計獲免而至愚無知如史太鄧扈樂之徒皆蒙歸獄而受戮焉君臣父子不相夷以至于禽獸也幾希故曰春秋成而亂臣賊子懼朱熹曰左𫝊是有多少難信處如趙盾一事後人費萬千説話與出脱其實此事甚分明如司馬昭之弑高貴鄉公他終不成親自下手必有抽戈用命如賈充成濟之徒如曰司馬公養汝等正為今日之事無所問也看左𫝊載靈公欲殺趙盾今日要殺殺不得明日要殺殺不得只是一箇人君要殺一臣最易為力恁地殺不得也是他大段强了今來許多説話自是後來三晉既得政撰造掩覆反有不可得而掩者矣物來若不能明事至若不能辨是吾心大段昏在又曰初靈公要殺盾盾所以走出趙穿便弑公想是他本意如此然則此罪首合是誰做吕祖謙曰趙穿攻靈公于桃園太史既如此書時諸侯之國史皆從此書然當時趙盾亦不為無意使盾無意時反討賊也又縱使趙穿追公子黑臀看前時盾説棄人用犬之句已自有無君之心觀太史言子為正卿亡不越境反不討賊非子而誰屬可見宣子弑君分明孔子曰董狐古之良史也書法不隠趙宣子古之良大夫也為法受惡惜也越境乃免此恐非夫子之言不然恐記有差訛如為法受惡此句亦未見得惜也越境乃免一句恐未必如此豈有弑君之後纔出境便可免其罪宣子既不能討賊而又使趙穿逆成公此見其弑君甚分明然齊崔杼殺齊太史而盾不殺董狐此亦見其得處又曰趙穿弑靈公董狐直筆書之曰趙盾弑其君盖弑雖是趙穿其情實為趙盾出去了弑盖盾平日所與親厚者惟穿耳穿為盾之出故敢行弑君之逆此雖是穿弑君實為盾弑何故見得是盾弑以穿既弑君之後盾歸既不討其弑君之賊反使穿逆公子黑臀于周而立之則盾親厚穿之情無所逃矣冬十月乙亥天王崩春秋集義卷三十

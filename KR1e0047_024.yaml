body:
  text: 春秋集義卷二十一宋李明復撰僖公十有二年春王三月庚午日有食之夏楚人滅黃謝湜曰黃人嘗受盟于齊矣及楚之伐黃也齊不救故楚滅黃書貫之盟陽榖之㑹于前書伐黃滅黃于後齊桓方伯之職不修見矣黃子不書奔死于兵難故也無志莭可稱故不書胡安國曰春秋滅人之國其罪則一而見滅之君其例有三以歸者既無死難之莭又無克復之志貪生畏死甘就執辱其罪為重許斯頓牂之類是也出奔者雖不死于社禝有興復之望焉託于諸侯猶得寓禮其罪為輕弦子溫子之類是也若夫國滅死于其位是得正而斃焉者矣于禮為合于時為不幸若江黃二國是也其書滅者見夷狄之強罪諸夏之弱責方伯連帥之不修其職使小國賢君困于强暴不得其所公羊子所謂亡國之善詞上下之同力者也吕祖謙曰十二年楚滅黃楚自召陵之後只一年又來伐黃何故蓋當時天王撫鄭從楚楚有所恃所以敢放肆入中國秋七月冬十有二月丁丑陳侯杵臼卒十有三年春狄侵衛謝湜曰狄嘗伐邢入衛伐晉滅溫今又侵衛夏四月葬陳宣公公㑹齊侯宋公陳侯衛侯鄭伯許男曹伯于鹹謝湜曰鹹衛地狄侵衛故㑹于鹹秋九月大雩謝湜曰雩以八月九月尤失時故書月以志其怠冬公子友如齊謝湜曰修聘禮十有四年春諸侯城緣陵謝湜曰緣陵杞邑杞病楚遷于緣陵諸侯為杞城之不書城杞杞未遷也不書杞緣陵以諸侯視緣陵猶己國之事而城之也救灾恤鄰義之大者諸侯所同欲故書諸侯城楚丘善諸侯同衛之患也故楚丘不書衛城緣陵善諸侯同杞之患也故緣陵不書杞城邢二國城之而已楚丘則諸侯各以役至其心力猶未齊也伐楚之後桓公威震令行緣陵之役小大同心逺近畢至諸侯義事未有美于此者也故至緣陵稱諸侯胡安國曰齊桓公城三國而書詞不同城楚丘則沒諸侯而不書城緣陵則書諸侯而不序城邢則再序三國之師何也邢以自遷為文故再列三師而書城邢者美其得救患分灾之義無封國之嫌也淮夷病杞諸侯㑹于鹹城緣陵而遷杞焉則其事專矣故前目後凡直書諸侯而不序也衛為狄滅東徙渡河野處漕邑桓公使公子無虧戍以甲士歸其祭服乘馬凡為國之用其力尤勤其功尤大其事尤專而春秋責之尤重曰城楚丘而不書諸侯正王法也是故以功言之則楚丘為大以義言之則城邢為美春秋之法明其道不計其功正其義不謀其利者也詳著城邢之師深沒楚丘之迹貴王賤伯羞稱桓文以正待人之體也明此則知曾西不為管仲深畏仲由之說矣吕祖謙曰十四年諸侯城緣陵而遷杞遷杞便與遷邢不同此見齊桓公葵丘㑹後驕心生凡事皆不如前夏六月季姬及鄫子遇于防使鄫子來朝程氏學曰季姬及鄫子遇于防使鄫子來朝十五年季姬歸于鄫前此雖經不見季姬之事然以理度之蓋嘗既嫁而絶復遇于防使鄫子來朝而後歸耳其譏則具文可以見也謝湜曰季姬鄫子以遇禮成姻黷禮之大者也防之遇季姬之志鄫子來朝季姬之欲書遇著其不正也書及書使著其首亂也隂乘陽邪敗正小制大魯國正家之道大壞矣胡安國曰春秋內女適人者明有所從則係諸國若杞伯姬是也其未適人者欲有所别則書其字若子叔姬是也季姬書字而未係諸國其女而非婦亦明矣及者內為志內女而外與諸侯遇譏魯也朝不言使言使非正鄫子國君而季姬使之朝病鄫也魯秉周禮男女之際豈其若是之甚乎蓋魯公鍾愛其女使自擇配故得與鄫子遇于防而遂以季姬歸之耳孟光之德有伯鸞之賢變而不失禮之正則猶可矣不然非所以為愛而厚其别也故稱及稱遇稱使罪魯與鄫以正男女之禮為後世戒也秋八月辛卯沙鹿崩謝湜曰沙鹿山名屬晉山安靜堅固山崩異之大者故書胡安國曰沙鹿晉地也卜偃曰朞年必有大咎國幾亡詩稱百川沸騰山冡崒崩言西周之將亡也書沙鹿崩于前書獲晉侯于後雖不指其事應而事應具存此春秋畏物之反常為異使人恐懼修省之意也其垂戒明矣狄侵鄭冬蔡侯肸卒謝湜曰蔡侯蔡穆公魯不㑹葬故不書葬十有五年春王正月公如齊謝湜曰齊强魯弱故再朝于齊楚人伐徐謝湜曰徐即諸夏故楚伐徐三月公㑹齊侯宋公陳侯衛侯鄭伯許男曹伯盟于牡丘遂次于匡公孫敖帥師及諸侯之大夫救徐謝湜曰桓公㑹諸侯盟于牡丘將以救徐也既盟而衆次于匡止而不進也大夫帥師以出諸侯不自行也救難之師如解焚溺緩而不急則失救之道桓之救徐也八國已受盟矣其終也諸侯止而不進大夫帥師以出其救難不力可知書遂書次書大夫罪其救徐之緩也為鄰國謀而不盡其心為不忠視人危急而遷延不進為不仁大者止而小者行為不義三者齊桓失救之道也然則遂救許遂之善者也以其進也遂次于匡遂之不善者也以其止也胡安國曰楚都于郢距徐亦逺而舉兵伐徐暴橫憑凌之罪著矣徐在山東與齊密邇以封境言之不可以不速救以形勢言之非有餽糧越險之難也今書盟于牡丘見諸侯救患之不協矣書次于匡見伯主號令之不嚴矣書大夫帥師而諸侯不行見桓德益衰而禦夷狄安中國之志怠矣凡兵而書救未有不善之也救而書次則尤罪其當速而故緩失用師之義矣中庸曰至誠無息不息則久春秋謹始卒欲有國者敦不息之誠也始勤而終怠則不能久而無以固其國矣夏五月日有食之吕祖謙曰或有食于朔或有食于晦秋七月齊師曹師伐厲謝湜曰杜氏謂厲楚與國吕祖謙曰厲今隨州也南北時厲為重鎮八月螽謝湜曰螽越月則書時不越月則書月九月公至自㑹季姬歸于鄫己卯晦震夷伯之廟程頤曰大扺春秋所書皆天人響應有致之之道如石隕于宋而言隕石如夷伯之廟震而言震夷伯之廟此天應之也但以淺狹之見以為無應其實皆應之然漢儒推灾異皆牽合不足信儒者見此因盡廢之謝湜曰夷伯魯大夫夷諡伯字魯卿惟單伯夷伯為天子命卿故書字廟以尊德故卿大夫立廟以事其先慝惡之人使之居廟以享血食天之所惡也夷伯蓋有慝惡于魯而子孫猶以宗廟事之然則雷震其廟乃天惡夷伯而殛之也故春秋因其震而書之以示天戒焉書日書晦謹天變也地曰地震廟曰震廟何也地以震為異廟以震之示譴故也胡安國曰震者雷電擊夷伯之廟也不曰夷伯之廟震而曰震夷伯之廟者天應之也天人相感之際微矣夷伯者魯大夫也大夫既卒不名穀梁以為因此見天子至于士皆有廟天子七諸侯五大夫三士二故德厚者流光德薄者流卑是以貴始德之本也始封必為祖冬宋人伐曹謝湜曰牡丘之㑹口血未乾而宋人伐曹惡之也楚人敗徐于婁林謝湜曰婁林徐地諸侯救徐不力楚入婁林敗徐徐用夷禮故狄之十有一月壬戌晉侯及秦伯戰于韓獲晉侯謝湜曰晉使韓簡視師復曰出因其資入用其寵饑食其粟三施而無報是以來也公使請戰然則韓之戰由惠公搆禍所致故以晉侯主戰而罪之也不書秦伯伐晉者曲在晉其罪已明故也惠公背施讎恩任己輕敵愎忠諌咈人心六者取亡之道也是以貴為一國之主師衆未敗而身獲于人書獲晉侯以為人君取亡者之戒也胡安國曰秦伯伐晉而經不書伐専罪晉也獲晉侯以歸而經不書歸免秦伯也書伐書及者秦晉俱有罪而以及為主書獲書歸者兩俱有罪而以歸為甚今此専罪晉侯之背施幸灾貪愛怒鄰而恕秦伯也然則秦戰義乎春秋無義戰彼善于此則有之矣其不言師敗績何也君獲不言師敗績君重于師也大夫戰而見獲必書師敗績師與大夫敵也君為重師次之大夫敵春秋之法也與孟子之言何以異孟子為時君牛羊用人莫之恤也故以民為貴君為輕春秋正名定分為萬世法故以君為重師次之堯以天下命舜舜亦以命禹必稱元后為先此經世大常而仲尼蓋祖述之者也吕祖謙曰秦伯與晉韓原之戰秦晉之曲直其理固甚明然當時所以為晉謀國所親者如所謂虢射慶鄭之徒剛很自勇之人然當時趣得亂成實是慶鄭慶鄭是一箇剛很自勇之人以不用命與晉惠公相激所以致敗今則所可恨者蓋于慶鄭尤有可恨處使他當時若是愚而無知一向很僻固無可恨觀他前靣所言其論也多正為謀也多審其所可見者前論秦乞糴于晉晉人弗與慶鄭曰背施無親幸灾不仁貪愛不祥怒鄰不義後來論馬見惠公乘小駟慶鄭曰古者大事必乘其産生其水土而知其人心則看論馬曲折如此推此兩端論之慶鄭于事理之間不為不諳練以理論之如論秦乞糴當時是非曲直所在慶鄭皆能知則可以謀王體斷國論後之論又知曲折則可以議戎政既是如此當時可惜専以很戾壞了蓋緣他氣不勝志故致得如此然晉侯所以敗有慶鄭不能用固是如此然亦非晉侯不能用慶鄭慶鄭自以很戾不能用其材耳學者治心養氣須當下十分工夫看慶鄭于是非邪正之理論馬之曲折事務無有不曽講者今却如此蓋緣慶鄭不知治心養氣之工夫學者于治心養氣不可不知其先後十有六年春王正月戊申朔隕石于宋五是月六鷁退飛過宋都程頥曰隕石于宋自空凝結而隕六鷁退飛倒逆飛必有氣驅之也如此等皆是異事故書之又曰隕石無種種于氣麟亦無種亦氣化厥初生民亦如是又曰春秋書隕石霜何故不言石隕霜隕此便見得天人一處謝湜曰陽氣藴積寒氣薄而凝之則為雹陰氣藴積溫氣薄而燠之則為石五石自空而降若惡夫宋隕石而害之也其為異大矣書日書朔當嵗之始謹其變也書五謹其數也星曰星隕石曰隕石者星以隕為異石以隕之示譴故也福善禍惡天之常理灾異之來皆緣政治故夷伯廟震書曰震夷伯之廟者以天惡夷伯而震之也石隕于宋書曰隕石于宋者以天禍宋公而隕之也謂之廟震則廟自震而已謂之石隕則石自隕而已天事何與于人哉故春秋每因天變推天意以示譴戒使賢君觀之可以知天庸君觀之亦以自警又曰沴氣積于空中鷁飛為沴氣所閼故退飛書六謹其數書宋都謹其地政治舛于下而微禽逆于上故書六鷁退飛之異胡安國曰隕石自空凝結而隕也退飛有氣逆驅而飛也石隕鷁飛而得其數與名在春秋時凡有國者察于物象之變亦審矣此宋異也何以書于魯史亦見當時諸國有非所當告者矣何以不削乎聖人因灾異以明天人感應之理而著之于經垂戒後世如石隕于宋而書曰隕石此天應之也和氣致祥乖氣致異人事感于下則天變應于上茍知其故恐懼修省變可消矣宋襄公以亡國之餘欲圖伯業五石隕六鷁退飛不自省其德也後五年有盂之執又明年有泓之敗天之示人顯矣聖人所書之義明矣可不察哉三月壬申公子季友卒謝湜曰季公子友字也魯以公子友有社稷功故生賜以氏俾世其職友卒書氏志魯之變法也然則魯卿生而賜氏自季友始也胡安國曰季者其字也友者其名也大夫卒而書名而曷為稱字聞諸師曰春秋時魯卿有生而賜氏者季友仲遂是也生而賜氏者何命之為世卿也季子忠賢在僖公有翼戴之勤襄仲弒逆在宣公有援立之力此二君者不勝私情欲以異賞報之也故皆生而賜氏俾世其官經于其卒各以氏書者志變法亂紀之端貽權臣竊命之禍其垂戒逺矣夏四月丙申鄫季姬卒謝湜曰鄫季姬十四年遇于防十五年歸十六年卒魯女惟嫁為諸侯夫人則公為之服失親親之道胡安國曰內女嫁于諸侯則尊同尊同則記其卒記其卒則必記其葬然而有不記者此筆削之㫖非可以例求者也宋伯姬在家為淑女既嫁為賢婦死于義而不回此行之超絶卓異者既書其葬又載其諡僖公鍾愛季姬使自擇配季姬不能自克以禮恃愛而行雖書其卒因奪其葬所以謹夫婦之道正人倫之統明王教之始也以此防民猶有嫁殤立廟舉朝素衣親臨袒載如魏明帝之厚其女者秋七月甲子公孫兹卒謝湜曰公孫兹叔牙子一帥師一如牟冬十有二月公㑹齊侯宋公陳侯衛侯鄭伯許男邢侯曹伯于淮謝湜曰左氏謂東略蓋楚人滅弦滅黃伐徐敗徐其勢益强故齊桓大㑹諸侯于淮謀楚也吕祖謙曰僖公中卷正是桓公末年伯業漸漸衰處故號令紀綱到此與前日甚不同淮之㑹謀鄫舉城鄫一段便見得役人病夜登丘而呼曰齊有亂不果城而還夫以桓公節制之盛初時一箇服楚遷邢封衛㑹諸侯投之所向無不如意及至末年欲做一件事也做不得同一桓公也何故昔强今弱如此蓋自葵丘之㑹志得意滿自放縱故伯業漸衰且如晉文公之季年諸侯朝晉衛成公不朝乃使孔達侵鄭不能使諸侯畏威自至于用兵亦是伯業衰處大抵伯業皆如此至王道却不然伯業初間固有可喜處到得末年往往易衰觀桓文可知此亦見力之不如德然桓公末年城一小國而役人如此蓋是時管仲已死惑于內寵志慮昏蔽故前輩謂齊桓公中主管仲輔之則治竪刁易牙開方輔之則亂此言極是十有七年春齊人徐人伐英氏謝湜曰英楚與屬英非國故稱氏徐從中國故稱人大㑹諸侯將以謀楚也齊與徐以人伐英氏而已桓公無東略之志可知也夏滅項程頥曰滅人之國􅖄惡大矣在君則當諱故魯滅國書取滅項君在㑹季孫所為也故不諱謝湜曰春秋內滅國皆不書諱之也滅項書者非公滅也公不在國而大夫滅也凡諱以隱君惡大夫滅國不諱著臣子之惡也凡取國亦滅也鄭伯取戴徐人取舒外滅國也謂之取者不絶其祀取之為附庸也取鄟取邿取鄫內滅國也謂之取者諱國惡也胡安國曰按左氏淮之㑹公有諸侯之事未歸而取項齊人以為討而止公然則滅項者魯也二傳以為桓公滅之孰信乎考于經未有書外滅而不言國者如齊師滅談是也亦未有書內取而直言魯者如取鄟取邿取鄫是也由此知項為魯滅無疑矣然聖人于魯事有君臣之義凡大惡必隱避其詞而為之諱今此滅項其惡大矣曷不諱乎曰事有隱諱臣子施之于君父者也故成公之取鄟襄公之取邿與昭公之取鄫皆不言滅而書取程氏以為在君則諱是也若夫滅項則僖公在㑹季孫所為耳執政之臣擅權為惡而不與之諱此春秋尊君抑臣不為朋黨比周之意也秋夫人姜氏㑹齊侯于卞謝湜曰卞魯邑齊侯自淮還師而夫人出㑹焉習陽榖之恣也九月公至自㑹冬十有二月乙亥齊侯小白卒程皓曰得天理之正極人倫之至者堯舜之道也用其私心依仁義之偏者伯者之事也王道如砥本乎人情出乎禮義若履大路而行無復回曲伯者崎嶇反側于曲徑之中而卒不可與入堯舜之道故誠心而王則王矣假之以伯則伯矣二者其道不同在審其初而已易所謂差若毫釐謬以千里其初不可不審也故治天下者必先立其志志立則邪說不能移異端不能惑故力進于道而莫之禦也茍以伯者之心而求王道之成是衒石以為玉也故仲尼之徒無道桓文而曽西恥比管仲者義所不由也况下于伯者哉程頥曰齊桓公正掩其譎正者行其事耳非大正也亦猶管仲之仁止以事功而言也張載曰小白直而不婉范祖禹曰齊桓公心非不譎也而所行復正是以為正尹焞曰仲尼之徒無道桓文之事者以其不務本而求末故也又曰桓公尚在五伯中為盛者也胡宏曰齊亦公侯之地耳管仲得政遂能强大伯諸侯何也守信不二行法無私舉用賢材開闢言路不藉樹畜務富民財不大興兵務舒民力仗尊王之義㑹于首止天子憚其正而王室之亂消寧魯難誅哀姜公道伸而諸侯服盟于召陵禮荆楚而中國之義立封衛楚丘城邢夷儀遷杞緣陵而夷狄不得肆此其所以九合諸侯虎視中原之大略也其去戎狄也逺矣故孔子曰如其仁如其仁若夫伐魯國以殺子糾而父子兄弟之恩薄五大夫立頽出天王不能奔命而君臣之義虧魯晉宋有弒君之賊而不能討也陳有殺適立庶之亂而不能正也鄭有兄弟爭國之禍而不能正也以病燕則伐北戎山戎以包茅不貢則南伐楚以不從于己則伐宋伐鄭執陳轅濤塗厚自封殖滅談滅遂降鄣遷陽處已如是何以服人于是北則晉專冀方西則秦專雍土南則荆楚强橫滅弦滅黃圍許伐徐而終不退聽也原其失皆由不知天理之本而馳心于功利之域故無以得天下心而功烈如彼其卑也其去王也逺矣故孟子曰管仲曽西之所不為也而子謂我願之乎又曰齊桓之所以有始而無終者大本不正也使其果有匡天下之志而不求自利則管子者天下之才也當以見諸天王上言文武之勤中述成康之盛下陳今日之衰微蓋自幽王滅于西戎秦人力戰取豐鎬平王東遷于成周虞虢魏芮皆畿內諸侯乘亂各據土宇王畿中斷無西偏矣使齊桓管仲入贊天王正畿田以修王略謹五禮以齊諸侯整六軍以膺夷狄則周室赫然中興而王化行矣惜乎齊桓管仲不知出此而溺于飲宴袵席之間也朱熹曰桓公雖譎却是直拔去其譎易知如晉文都是藏頭沒尾吕祖謙曰齊桓公自葵丘盟後大槩寖衰又曰管敬仲卒五公子皆求立齊之伯業到此便衰這裏却有兩說一則管仲不能為齊求人二乃孝公無志不能繼桓之業所謂用管仲以興進竪刁以敗如晉文雖死至于悼公時猶能繼文公之業緣晉文雖死有狐趙之徒風聲氣習相與扶持孝公初無此般人故興衰之不同然陳穆公欲修桓公之好以此知齊之德在諸侯使孝公有志而能振奮乘此機㑹繼齊桓之道其復興伯業甚易然而不能者雖是管仲當時不能用人亦是孝公無志及宋襄㑹諸侯便俯首㑹之其後宋敗便興師伐之大抵欺善怕惡畏强凌弱非是伯者事業此所以不能復齊桓之業可深為孝公惜且如晉文成伯所謂伐原示之信大搜示之禮皆積漸成伯業孝公有桓公見成規模反不能成伯業論此深為孝公惜也此固可為孝公惜然而管仲為桓公之大臣全不能立些根本以薦引賢人而在其國徒能以一身盡忠而事君更不能謀身後事但區區屬孝公于宋襄故終無益也春秋集義卷二十一

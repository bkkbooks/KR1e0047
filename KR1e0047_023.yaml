body:
  text: 春秋集義卷二十宋李明復撰僖公六年春王正月夏公㑹齊侯宋公陳侯衛侯曹伯伐鄭圍新城謝湜曰文公逃首止之盟故六國伐鄭鄭未服故圍新城盟則違命至於逃伐則距命至於圍著文公背中華産國禍也胡安國曰齊自召陵之後兵服四夷威動諸夏今合六國之師圍新造之邑冝若扼槁然圍而不舉有遺力者矣及楚人攻許即解新城之圍移師救許是又得討罪分災救急之義也故特書曰楚人圍許諸侯遂救許凡書救者未有不善之也其曰遂救許善之尤者也善之尤則何以致久也秋楚人圍許諸侯遂救許謝湜曰諸侯伐鄭諸侯也楚之圍許也諸侯自鄭反兵救許得救之道也書遂善之也楚以夷狄伐中國而諸侯救之義事之大者諸侯所同志故稱諸侯冬公至自伐鄭謝湜曰伐鄭本志故至以伐鄭七年春齊人伐鄭謝湜曰鄭未服故齊又伐鄭夏小邾子來朝謝湜曰郳犁來夷狄附庸能從中國諸侯王命為小邾之别封故曰小邾鄭殺其大夫申侯謝湜曰殺大夫稱國罪其國也凢殺大夫不以有罪無罪皆書罪其專殺也左氏謂鄭殺申侯以説于齊葢申侯常有寵于楚文王其後奔鄭然則以鄭即楚申侯之謀也故齊之伐鄭也鄭國歸罪申侯而殺之大夫之圖事其可以不慮乎哉胡安國曰將卑師少稱人聲罪致討曰伐鄭伯背華即夷南與楚合而未離也桓公復治之孔叔言於其君請下齊而救國鄭伯曰吾知其所由來矣姑少待我於是殺申侯以説乎齊稱國以殺者罪累上也不知自反内忌聽䜛而擅殺其大夫信失刑矣如申侯者其見殺何也專利而不厭則足以殺其身而已矣呂祖謙曰觀鄭申侯之䧟陳轅濤塗濤塗之怨申侯深矣及陳轅宣仲勸申侯美城其賜邑而申侯卒以見殺夫宣仲之怨申侯申侯非不知之視仇讎之言不啻如親密卒為所䧟而殺其身何也葢人心不可有所倚申侯之心一倚乎利但只見利之為美而有以動乎其心故雖仇讎之言樂然聽而行之皆不見其為機謀䧟穽也秋七月公㑹齊侯宋公陳世子欵鄭世子華盟于寗毋謝湜曰孫氏謂齊人伐鄭未巳鄭伯懼先使世子受盟呂祖謙曰鄭太子華請去三族這一叚見得管仲猶有三代氣象其曰君綏之以徳加之以訓辭而討鄭豈敢不懼若總其罪人以臨之鄭有辭矣此等言語葢甞聞先生長者之餘論矣惜其急于功利俯首以就桓公自小了惟其嘗與聞先生長者之餘論故時出其所聞實有過人者如前此諫齊侯伐邢所云畏此簡書此等言語時時規正得桓公一兩叚若淺論之則管仲時有三代氣象固甚可喜責備論之管仲不能大其規模反俯首以就桓公一箇狹小規模亦甚可惜管仲之相桓公大抵務在正名辨分觀其王使宰孔賜齊侯胙管仲則教桓公以天威不違顔咫尺敢不下拜不敢慢天子之命觀王以上卿之禮享管仲則辭以有天子二守國髙在而不敢越周班爵禄之制至于舅犯之相晉文則不然齊桓專在於扶名分晉文則適以壊名分如以諸侯而請天子之隧㐮王以危言拒之而始不敢葢仲則曽聞先生長者之餘論故所以輔桓公者猶有三代之遺制至于舅犯之徒未嘗聞先生長者之議論徒知力之可以請隧召王而不知義之不可視仲為如何故孟子曰桓公之於管仲學焉而後臣之猶著得一箇學字至其後如晉文之有舅犯楚莊王之有孫叔敖晉平公之有趙文子則皆無此一字矣曹伯班卒公子友如齊謝湜曰修聘禮冬葬曹昭公八年春王正月公㑹王人齊侯宋公衛侯許男曹伯陳世子欵盟于洮鄭伯乞盟謝湜曰洮之盟王人在㑹齊侯欲以服鄭也諸侯與王人同列而盟與首止之盟異矣王人雖微王命所在諸侯不可先之以爵要之以事也春秋尊王人於上而諸侯同盟之罪見矣明信義以率邦國王臣之事也王臣下盟諸侯王臣之失道也惇信義以承王室諸侯之事也諸侯上盟王臣諸侯之失道也又曰乞卑下之詞也寗母之㑹鄭世子雖受盟鄭伯猶懼見討故請盟于洮書曰乞盟賤之也首止之盟盟之善者也攘夷蠻安中國尊王室諸侯之所同志也文公獨以貳楚之心背盟以至啟諸侯之伐召新城之圍及其禍連不解也以世子受盟于寗母以卑辭屈禮求盟于洮可謂失事大之道矣為宗廟社稷主而其始也若賤者負罪而逃盟其終也若賤者哀告而乞盟人君之徳侯伯之體替矣春秋前盟書逃後盟書乞所以著其屈辱所以罪其不智也胡安國曰王人下士也内臣之微者莫微于下士外臣之貴者莫貴于方伯公侯今以下士之微序乎方伯公侯之上外輕内重不亦偏乎春秋之法内臣以私事出朝者直書曰來以私好出聘者不稱其使以私情出訃者止録其名不以其貴故尊之也以王命行者雖下士之微序乎方伯公侯之上不以其賤故輕之也然則班列之髙下不在乎内外特繫乎王命爾聖人之情見矣尊君之義明矣乞者卑遜自屈之詞欲與是盟而未知其得與否也始而逃歸今則乞盟於以見舉動人君之大節不可不慎也又曰春秋王人不書姓氏者葢下士爾而序於方伯連帥之上以此見聖人尊王室抑諸侯之意矣夏狄伐晉謝湜曰狄益强故伐晉秋七月禘于太廟用致夫人程頥語録或問禘于太廟用致夫人是哀姜否曰文姜也文姜與桓公如齊終啟弑桓之惡其罪大矣故聖人于其遜于齊致于廟皆書曰夫人而去其姜氏以見大義與國人已絶矣然弑桓之惡文姜實不知但縁文姜而啟耳荘公母子之情則不絶故書夫人焉文姜遜齊只稱夫人此禘致于廟亦只稱夫人是文姜明矣此最是聖人用法致嚴處可以見子母之義程氏學曰八年七月禘于太廟用致夫人夫人文姜也文姜之罪于王法為當誅于子為未絶至于祔廟以從先祀于義何所安乎是以厯荘逾閔未致于廟逮今僖公越禮而行因禘而致之於廟聖人書以著其非盖文姜之罪不减於哀姜哀姜殺之于夷文姜獨得祔於姑乎武闈之賊哀姜與共仲通謀拉幹之毒安見文姜非與諸兒同謀乎謝湜曰禘自始祖而降皆以昭穆叙列夫人木主葢各祔于其君之廟四時有事于廟則夫人配享三年大禘則君夫人木主皆㑹于太廟先考而上以父子序昭穆于外位先妣而上以姑婦序昭穆于内位文姜得罪于魯厯荘逾閔木主未祔故僖公欲夫人列于昭穆則用禘禮以致之也書用以見不宜用也書致以見夫人入廟之難也文姜母恩雖未絶于子然在桓公爲仇讎在王法為大逆其在廟也怫祖考之心黷神明之享叙之昭穆非所宜也僖公用不冝用之禮以致不可以致之夫人失孝子事親之道矣春秋書用致夫人著其失禮也文姜于魯大義已在所絶故遜于齊致于廟皆黜姜氏獨稱夫人胡安國曰按禮大禘升歌清廟下而管象朱干玉戚以舞大武八佾以舞大夏此天子之禮樂也踐其位則行其禮奏其樂故雝禘太祖周頌也而其詩曰相維辟公天子穆穆周公人臣不踐其位魯侯國而用天子禮亂名犯分莫大乎是故夫子志之曰郊社之禮所以事上帝也宗廟之禮所以祀乎其先也魯侯國而以王禮祀太廟是誣偽不誠而非所以事乎其先矣故夫子傷之曰禘自既灌而往者吾不欲觀之矣夫灌以降神乃祭之始而已不欲觀是自始至終皆非禮矣用者不冝用也致者不冝致也夫人者風氏也初成風聞季友之繇遂事之而屬僖公焉故季子立之公賜季子汶陽之田及費又生而命之氏俾世其卿而私門强矣於成風則舉大事于始祖之廟立以為夫人而嫡妾亂矣以私勞寵其臣而卑公室以私恩崇其母而輕宗廟皆越禮之罪也經書夫人而不稱姓氏其貶深矣朱熹曰春秋書禘于太廟用致夫人又不知禘于太廟其禮如何太廟是周公之廟漢儒有謂魯亦有文王廟左氏載鄭祖厲王諸侯不敢祖天子而當時越禮如此故公廟設于私家皆無理㑹處又問諸侯礿則不禘一叚是歳朝天子廢一時祭曰春秋朝㑹無節豈止一歳廢一時而已哉不然則或有世子或大臣居守豈不可以攝事冬十有二月丁未天王崩謝湜曰天王周惠王九年春王正月丁丑宋公御説卒謝湜曰宋公宋桓公魯不㑹葬故不書葬夏公㑹宰周公齊侯宋子衛侯鄭伯許男曹伯于葵丘程頥曰天子之宰與世子禮異謝湜曰宰周公天子三公周采地天子大夫稱字故三公稱爵宰周公勢亦尊矣然非王世子比故宰周公雖序諸侯上不若王世子之殊㑹也喪以哀戚為主故喪無外主魯侯伯禽葢有爲為之也春秋諸侯國無大故而廢人子之哀以與㑹盟征伐者衆矣有喪未踰年逼于强國牽制而猶以喪禮行者葵丘之㑹宋㐮公稱子洮之盟衛成公稱子温之㑹陳共公稱子召陵之㑹陳懐公稱子是也書子所以著其失也有先君方葬以成君之禮結好興兵者齊頃公使國佐來聘鄭悼公伐許是也削爵所以著其惡也有喪雖踰年先君未葬以成君之禮出戰出伐者衞惠公與齊宋燕㑹紀侯鄭伯戰宋共公衛定公與晉侯曹伯伐鄭是也書爵所以著其惡也若夫晉文在殯㐮公貪利肆逆以出兵邀秦師其惡尤大故貶而人之書曰晉人及姜戎敗秦師于殽是也胡安國曰宰周公者以冢宰兼三公也古者三公無其人則以六卿之有道者上兼師保之任冢宰或闕亦以三公下行端揆之職禹自司空進宅百揆又曰作朕股肱耳目是以宰臣上兼師保之任也周公為師又曰位冢宰正百工是以三公下行端揆之職也所以然者三公與王坐而論道固難其人而冢宰揆百官均四海亦不易處也夫以冢宰兼三公其職任重而不殊㑹之何也人臣則有進退之節出入均勞之義非王世子貴有常尊之可比矣秋七月乙酉伯姬卒謝湜曰未適人故不稱國許嫁笄而字則以成人之喪待之不復殤也九月戊辰諸侯盟于葵丘程順曰云諸侯盟見宰孔不與范祖禹曰王道衰諸侯失職五覇假仁義之名擅威福之柄興師動衆不禀王命述職之禮廢而不修責之以三王之道是為罪人矣然而申五禁以令諸侯猶有尊王之名按春秋榖梁傳僖公九年葵丘之㑹陳牲而不殺讀書加乎牲上明天子之禁此桓公之所以覇也所謂誅不孝無以妾為妻者修身正家莫大於此尊賢育才則賢者在位能者在職敬老慈幼無忘賔旅則鰥寡孤獨各得其所賔者如歸其家旅者願出其路也士無世官者不使禄去公室也周尹氏立王子朝魯季氏逐昭公世官之患也官事無攝者書所謂無曠庶官也取士必得者立賢無方也無專殺大夫者不以私怒加誅戮也無曲防者榖梁所謂無壅泉不得曲為隄防以専小利也無遏糴者鄰國有災義所當恤晉惠公忘秦伯之施其禍可知也無有封而不告者不以私恩擅爵賞也凡我同盟之人既盟之後言歸于好無構怨也葵丘之㑹皆天下至公大義春秋之所樂道者也謝湜曰葵丘之盟盟之善者也孟子謂誅不孝無易世子尊賢育才敬老慈幼之類是也上明先王禁令下修列國訓戒諸侯載書不歃血莫敢違法以軌于正邦國亦庶幾于治矣故葵丘之㑹君子美之公羊謂震而矜之叛者九國誤矣雖然服楚之後一㑹王人㑹宰周公而卒不能一朝京師桓公之罪也胡安國曰㑹盟同地再言葵丘何也書之重詞之複其中必有大美惡焉葵丘之盟美之大者也初命曰誅不孝無易樹子無以妾為妻再命曰尊賢育才以彰有徳三命曰敬老慈幼無忘賔旅四命曰士無世官官事無攝取士必得無專殺大夫五命曰無曲防無遏糴無有封而不告曰凢我同盟之人既盟之後言歸于好以是為盡禁矣諸侯咸喻乎桓公之志葢束牲載書而不歃血也是故㑹盟同地而再言葵丘美之也觀孟子所載此盟初命之詞則知桓公翼戴襄王之事信矣張栻曰舉五覇之盛無若齊桓葵丘之五禁葢亦假仁義而言者而孟子時諸侯雖有此五禁亦皆犯之故以為五覇之罪人也雖然有五覇為三王之罪人則有諸侯為五覇之罪人矣有諸侯為五覇之罪人則有大夫為諸侯之罪人矣何者理固爾也有明君者出本于三王之法以為治則㧞本塞源不得罪于天下矣又曰召陵之盟仗王室之事以責楚可謂義矣而執轅濤塗之舉旋踵而起葵丘之㑹讀書加于牲上而不歃血可謂信矣震而矜之叛者九國此皆歸之遽者也若使其久假而不歸亦豈不美乎呂祖謙曰左傳載葵丘之㑹隱其五命而止曰凢我同盟既盟言歸于好以孟子五命之事觀之見得左氏愛仲之深而于桓公之過皆隱而不書如内政之類皆是桓雖為覇主而于五命之戒亦未免有所犯故左氏特隱之所以使後世不知桓公躬言之而躬自蹈之也觀孟子左氏之言其意豈不盡見孟子之言出于無心故無所隱左氏之言拘于有愛故欲隱其過然左氏在春秋亦可謂之賢大夫若子産叔向皆其徒也諸侯束牲載書而不歃血是諸侯之牲束是備而不用此見齊桓威信兼著此只是仍舊舉盟時禮數故牲皆不殺初命曰誅不孝無易樹子無以妾為妻此皆是桓公命諸侯之詞即是君臣父子夫婦之三綱當時有管仲在所以曉得此誅不孝是楚世子商臣弑君之類是也易樹子是晉獻公殺申生立奚齊之類是也無以妾為妻即桓公如夫人者六人衞姬鄭姬之類是也再命曰尊賢育才以章有徳賢是成徳者故所以尊之才是有而未成者須要保護之如唐元稹本自可取因由宦官遂見退黜被貶之後平日亷恥遂喪章有徳是土地開田野治養老尊賢底人三命曰敬老慈㓜無忘賔旅敬老只諸侯自敬其國之老者慈幼亦只欲諸侯撫其國之幼者賔旅是國之大事如國語所載周之秩官有曰敵國賔至闗尹以告行理以節逆之候人為導卿出郊勞門尹除門宗祝執祀司里授館司徒具徒司空視塗司冦詰奸虞人入材甸人積薪火師監燎水師監濯膳宰致饔廪人獻餼司馬陳芻工人展車百官以物至賔入如歸是故小大莫不懐愛其貴國之賔至則以班加一等益䖍至于王使則皆官正涖事上卿監之若王巡狩則君親監之四命曰士無世官官事無攝取士必得無專殺大夫上三句摠是一事士是入仕為官者世官見得當時大夫已世襲多了桓公已自無整頓處所以只説士且舉小者言之士既世官其位必有虚曠桓公又恐復用他子弟以權攝又戒諸侯曰官事無攝士既無世官其子弟又無攝則其為士者必取其賢才而用之取士必得又須是果得賢者方可葢桓公與他改了條貫所以如此戒他如晉惠公殺慶鄭及殺里克之類是也五命曰無曲防正如戰國策所載西周欲為稲東周不下水戒他不得曲相防遏無遏糴葢北方多是販米於隣國無得止遏他無有封而不告如齊封衛晉封曲沃皆是此類凢封國諸侯不當專當須上告于天王然後封今之大夫今之諸侯之罪人也諸侯之所以為三王之罪人也者皆由其大夫長逢其惡所以故曰今之大夫今之諸侯之罪人也又曰宰孔不與盟盟者自不信而後有盟葢不敢以不信待天子之使甲子晉侯詭諸卒謝湜曰晉侯晉獻公魯不㑹葬故不書葬冬晉里克殺其君之子奚齊謝湜曰公子奚齊嬖人之子也獻公廢嫡立庶世子申生以無罪死重耳夷吾以無罪出乃命大夫荀息立奚齊奚齊不正其立非國人之所欲也奚齊雖書曰君之子以明奚齊獨君意立之也雖然立奚齊獻公之命也里克志欲立正當與大臣諫之於初可也奚齊不可以主社稷當與顧命大臣明大義以告宗廟而後更立可也獻公既死君命定矣而又奚齊未有大惡克以廢立自任擅殺奚齊是以臣子抗先君之命也里克之亂書曰殺君之子以罪里克之逆也春秋于奚齊稱君之子而獻公立庶之惡由此見矣於君之子稱殺而里克犯命之惡由此見矣然則君命雖重行不以正則咈人心臣志雖正行不以順則淪逆惡是故以正行命者君之道也以順行正者臣之道也胡安國曰榖梁子曰其君之子云者國人不子也不正其殺申生而立之也人君擅一國之名寵為其所子則當子矣國人何為不子也民至愚而神是非善惡靡不明且公也其所子而弗子者莫能使人弗之子也非所子而子之者莫能使人之亦子也周幽王嘗黜太子冝臼子伯服矣而犬戎殺其身晉獻公亦殺世子申生立奚齊矣而大臣殺其子詩不云乎天生蒸民有物有則民之秉彛好是懿徳此言天理根扵人心雖以私欲滅之而有不可滅也春秋書此以明獻公之罪抑人欲之私示天理之公為後世戒其義大矣以此防民猶有欲易太子而立趙王如意致夫人之為人彘者呂祖謙曰里克將殺奚齊先告荀息里克既欲殺奚齊何故却先説與荀息葢息亦不是無能之人觀其取虞虢亦不可謂無謀其託孤受遺不可謂無權盖當時縁民心渙散衆意不屬于奚齊卓子荀息所以不能如其志里克所以先告之者亦見得當時風俗尚厚十年春王正月公如齊謝湜曰公始朝齊狄滅温温子奔衛謝湜曰戎狄散居中國各為一族不與中國雜處狄滅温中國之狄也晉里克弑其君卓及其大夫荀息謝湜曰奚齊遇難荀息守君命復立奚齊弟卓荀息顧命大臣也卓以顧命大臣之所立至于今其嗣立已踰年矣春秋待之以君以其君位已定也卓之難荀息不食其言以身死之可謂忠于其君矣故書及以顯其忠書大夫以示能死職獻公之終也重耳於次為長立重耳義也立奚齊立卓非義也奚齊既死里克以卓為不可立與羣臣以大義爭之於初可也羣臣曰不可國人曰不可顧命大臣猶且蔽執不從雖以大義殛之可也卓立已踰年非有大罪于國而克又以獨見殺之大者也句有闕字故里克上無安國之忠而下有殺君之逆也荀息受命先君至死不變可謂忠孝之士矣然内無經國逺謀外無保國大計既不能以直道正嗣位于獻公之前又不能改失從義以定嗣位于後孔子謂臨大節而不可奪者荀息有之矣語之以安國家利社稷則未也胡安國曰國人不君奚齊卓子而曰里克殺其君卓何也是里克君之也克者世子申生之傅也驪姬將殺世子而難里克使優施飲之酒而告之以其故里克聽其謀及欲以中立自免稱疾不朝居三旬而難作是謂持禄容身速獻公殺嫡立庶之禍者故成其臣之名以正其殺逆之罪克雖辭而不受其可得乎使克明于大臣之義據經廷諍以動其君執節不貳固太子以擕其黨多為之故以變其志其濟則國之福也其不濟則死于其職亦無慊矣人臣所明者義于功不貴幸而成所立者節於死不貴幸而免欲以中立自免自謂智矣而終亦不能免等死耳不死于世子而死于弑君其亦不知命之蔽哉語曰不知命無以為君子也為人臣而不知春秋之義者必䧟于簒弑誅死之罪克之謂矣荀息者奚齊卓子之傅也君弑而免于難書及所以著其節書大夫不失其官也于荀息何取焉若息者可謂不食其言矣或曰息既從君于昏不食其言庸足取乎世衰道微人愛其情私相疑貳以成傾危之俗至于刑牲歃血要質鬼神猶不能固其約也孰有可以托六尺之孤寄百里之命臨大節而不可奪如息者哉自古皆有死民無信不立故聖人以信易食而君子以信易生息不食言其可少乎朱熹語録或問春秋書晉殺其大夫荀息是取之否曰荀息亦未見有可取者但始終一節死君之難亦可耳後又書晉殺其大夫里克者不以殺君之罪討之也然克之罪則在中矣今左傳中却不見其事國語中所載甚詳又問里克丕鄭荀息三人當晉獻公欲廢太子荀息不能諫此固不是丕鄭謂從君之義不阿其惑所見甚正里克謂雖不識義亦不阿好便是在那中立止天下無中立底事自家若排得他退便排退他若奈何不得便是死他只是要求生避死故許他中立不知許了驪姬中立他事便了止如隋髙祖簒周韋孝寛初甚不平一見衆人被殺了他便降反教隋公添做幾件不好底事荀息固是不是只是他辦得一死亦難事或云里克當獻公在日不能救正及後來又却殺了奚齊曰此等事直是難説獻公在日與他説未必聽怎生奈何得他後來亦用理㑹只是不合殺了他又問胡氏以荀息為可以托六尺之孤寄百里之命臨大節而不可奪如何曰荀息便是不可以托孤寄命了問聖人書荀息與孔父仇牧同辭何也曰聖人也且是要存得箇君臣大義夏齊侯許男伐北戎謝湜曰北戎欲病許故與許男伐北戎晉殺其大夫里克謝湜曰里克殺君之子弑其君及顧命忠臣春秋不以討賊之辭書者獻公殺正而立不正廢長而立幼以奚齊及卓繼位皆非國人所欲也故里克之罪雖大國人有弗怨之心其殺之也非衆討而棄之也惠公以國法殺之而已故晉殺里克不書人罪獻公失人心也胡安國曰里克弑二君與一大夫不以討賊之詞書者惠公殺之不以其罪也殺之不以其罪奈何里克所為弑為重耳也夷吾曰是又將殺我也則謂克曰爾既殺夫二孺子矣又將圖寡人為爾君者不亦病乎里克對曰不有廢也君何以興欲加之罪何患無辭臣聞命矣伏劒而死若惠公既立而謂克曰先君命大夫為世子傅世子死非其罪而大夫不知恤若奚齊者既有先君之命矣而大夫又殺之以及卓大夫雖殺之獨不念先君之命乎則克必再拜而死不復有言矣惠公乃曰又將圖寡人是殺之不以其罪也故稱國以殺而不去其官朱熹曰晉里克事只以春秋所書未見其是非國語載驪姬隂説里克之妻其後里克守不定遂有中立之説他當時只難里克里克若不變太子可安由是觀之里克之罪明矣後來殺奚齊卓子亦是快國人之意且與申生伸寃如春秋所書多有不可曉如里克等事只當時人已自不知孰是孰非況後世乎秋七月冬大雨雪謝湜曰雨雪異常故書大十有一年春晉殺其大夫丕鄭父謝湜曰丕鄭父與里克作亂謀納文公胡安國曰按左氏丕鄭言於秦伯請出晉君則鄭有罪矣曷為稱國以殺而不去其官惠公以私意殺里克故其黨皆懼鄭之有此謀由殺里克致之也春秋以大義公天下為誅賞故書法如此其稱國者兼罪用事大夫不能格君心之非至于多忌濫刑危其國也夏公及夫人姜氏㑹齊侯于陽謝湜曰夫人聲姜也僖公目覩文哀之不制而不知察患于微失閑家之道矣書陽榖之㑹著其襲亂也胡安國曰襄陵許翰曰先乎陽榖之㑹為大雨雪後乎陽榖之㑹為大雩僖賢君不能以禮佐齊桓儆其怠忽而更與之俱肆于寵樂是以見戒于天如此以公夫人陽榖之㑹觀之齊桓霸業怠矣故楚人伐黄不能救秋八月大雩冬楚人伐黄謝湜曰黄恃齊不共楚職且弦子嘗奔黄得罪于楚胡安國曰按榖梁子曰貫之盟管敬仲言于桓公江黄逺而近楚楚為利之國也若伐而不能救則無以宗諸侯矣公不聽遂與之盟管仲死楚伐江滅黄桓公不能救故君子閔之也逺國慕義背夷即華所謂出自幽谷遷于喬木春秋之所取也被兵守城更厯三時告命已至而援師不出則失救患分災攘夷狄安中國之義矣滅弦滅温皆不書伐滅黄而必書者罪桓公既與㑹盟而又不能救也春秋集義卷二十

body:
  text: 春秋集義卷二十九宋李明復撰文公十有一年春楚子伐麇謝湜曰麇微國夏叔仲彭生會晉卻缺于承匡謝湜曰文公以後政出大夫故公子遂盟晉趙盾叔仲彭生會晉卻缺秋曹伯來朝吕祖謙曰諸侯即位來朝亦自有禮文公即位來朝蓋曹與魯相近非必遍天下諸侯公子遂如宋狄侵齊冬十月甲午叔孫得臣敗狄于鹹謝湜曰鹹魯地狄既侵齊又潛入魯境故得臣敗狄于鹹胡安國曰左氏稱此長狄也而劉氏以為非夫春秋正名之書其稱狄也或曰狄或曰白狄或曰赤狄其稱戎也或曰戎或曰山戎或曰薑戎或曰陸渾之戎不别其種類書之于策後亦無所考矣十有二年春王正月郕伯來奔杞伯來朝謝湜曰舍夷禮故復稱伯二月庚子子叔姬卒謝湜曰叔姬文公女未嫁而卒謂之子叔姬以明時君之女也女子許嫁笄而字死則以成人之喪送之禮也夏楚人圍巢謝湜曰巢微國秋滕子來朝謝湜曰滕侯臣屬于楚故稱子夷狄爵不過子故也秦伯使術來聘謝湜曰秦康公始遣使來修聘禮故聘與中國同辭吕祖謙曰秦西乞術來聘襄仲辭玉魯之辭秦蓋是晉與國所以辭者不與其伐晉也冬十有二月戊午晉人秦人戰于河曲程頤曰凡戰皆以主人及客秦曲故不云晉及謝湜曰戰書及所以别先後明曲直也河曲戰不書及者其惡均其罪同也秦晉自殽役以後肆忿報怨凡四伐三戰而兵革不息生民之受禍者衆矣故春秋惡其兩曲而一罪之不書敗者勝敗未分而退胡安國曰秦伯親將晉上卿趙盾禦之其稱人何為令狐之役故也秦納不正遂非積忿晉不謝秦潛師禦之是以暴兵連禍至此極也凡戰皆以主人及客者處己之道寡怨之方王者之事其不書晉及何也前年秦師來伐晉不言戰者晉已服也故狄秦而免晉今又為此役則秦曲甚矣故不以晉為主惟動大衆從秦師不奉辭令以止之也故貶而稱人此輕重之權衡也吕祖謙曰河曲河之曲不必如公羊説季孫行父帥師城諸及鄆謝湜曰二邑皆在國鄙鄆又莒魯所爭行父懼外難故帥師城之鄆書及著其土功不一也十有三年春王正月夏五月壬午陳侯朔卒邾子蘧蒢卒自正月不雨至于秋七月大室屋壞程氏學曰觀春秋中文公事宗廟最為不謹遂有大室屋壞之變天人之際可不畏哉謝湜曰大室大廟之室也總稱曰廟指神所居曰室廟中餘屋壞猶曰不可而况于室屋乎室屋壞則神失其所居矣孝子之念親也思其居處笑語志意將見其所為齋者色不忘目聲不絶耳心志嗜欲不忘諸心將見其所為祭者孝思之至也文公簡棄廟事乃至大祖室屋摧壞而神不得以安寧其遺忘祖宗極矣尚何孝思之有哉緩于主速于大事躋僖以亂昭穆棄閏而廟不告月皆不敬之大也故大室大祖所居歲時奉安之所也其終亦有屋壞之變則子事之隳頽神心之疾怨皆于此見矣胡安國曰譏久不修也何以知久乎自正月不雨則無壞道也不雨凡七月而先君之廟壞不恭甚矣凡此皆志文公怠慢不謹事宗廟以致魯國衰削之由垂戒切矣冬公如晉衛侯會公于沓謝湜曰沓之會衛侯來會故書會公左氏謂衛侯請平于晉狄侵衛謝湜曰狄自文公七年以來侵魯侵齊侵宋侵衛纍歲不息宣子曰隨會在秦賈季在狄難日至矣然則狄數侵中國亦以狐射姑出奔在狄故也觀春秋所書而狄之為患其微旨見矣十有二月己丑公及晉侯盟謝湜曰公即位十年凡三如晉一及晉處父盟再及晉侯盟公還自晉鄭伯會公于棐謝湜曰棐鄭地棐之會左氏謂鄭伯請平于晉公會彼為主而我往會也會公我為主而彼來會也然則二會因二國欲之請平而公為主以會之也其往也衛侯會之于沓其還也鄭伯會之于棐一出而一朝二會著其不恤民也十有四年春王正月公至自晉邾人伐我南鄙叔彭生帥師伐邾謝湜曰公嘗伐邾取須句邾伐我南鄙以須句故也叔彭生討邾來伐故帥師伐邾夏五月乙亥齊侯潘卒謝湜曰齊侯齊昭公魯不會葬故不書葬六月公會宋公陳侯衛侯鄭伯許男曹伯晉趙盾癸酉同盟于新城程頤曰諸侯始會議合而後盟盟者志同故書同同懼楚也謝湜曰新城之盟晉為盟主大夫不可先諸侯故晉趙盾敘曹伯下盟書日謹之也凡盟小國與大國同欲則書同盟衛侯會公于沓請平于晉鄭伯會公于棐請平于晉然則新城之盟衛鄭之所同願也故書同盟垂隴之盟晉士縠會諸侯盟新城之盟晉趙盾會諸侯盟晉國政出大夫可知也士縠會諸侯盟其後晉殺士縠趙盾會諸侯盟其後趙盾背其君大夫専權未有不為患者也胡安國曰同盟于新城同外楚也其曰同者志諸侯同欲非強之也而宋公陳侯鄭伯在焉則知楚次厥貉三國雖從有弗獲己者削而不書蓋恕之也蔡不與盟果有背華即夷之實也夷考晉楚行事未有以大相逺也而春秋豫奪如此者荆楚僣王若與同好陵蔑中華君臣之義滅矣可不謹乎秋七月有星孛入于北斗謝湜曰孛悖逆之稱有星光芒不順陵犯北斗故書孛其光芒侵北斗魁中故書入隂精發見于天為星氣不軌則星有孛者胡安國曰孛者惡氣所生暗亂不明之貌也入于北斗者斗有環域天之三辰綱紀星也宋先代之後齊晉天子方伯中國紀綱彗者所以除舊布新也禎祥妖孽隨其所感先事而著後三年宋弒昭公又二年齊弒懿公又二年晉弒靈公此三君者皆違道失德而死于亂符叔服之言天之示人顯矣史之有占明矣吕祖謙曰此是入于北斗之環域蓋北斗是天之紀綱之星宋齊晉天下綱紀之國孛入于北斗所以見得宋齊晉皆有亂胡春秋論得極好公至自會謝湜曰冬如晉春至自晉夏會晉秋至晉人納捷災于邾弗克納謝湜曰邾文公二子貜且齊出捷災晉出貜且元妃子于次長邾立貜且正也貜且即位已踰年矣趙盾以捷災晉出欲以晉國之力納捷災為君晉之強邾之所不能抗也晉車八百乘邾人所不能禦也盾之納捷災也邾人辭以一言之義而晉之八百乘不得進而還正可以易不正不正不可以易正故也然則力不勝義久矣可以服暴強可以詰姦慝可以却師衆天下之義也用兵者可不由義乎哉捷災不書公子罪其非正也趙盾貶稱人罪其以庶奪嫡也納書弗克著其進不由義也胡安國曰邾文公元妃齊薑生定公二妃晉姬生捷災文公卒邾人立定公捷災奔晉趙盾以諸侯之師八百乘納捷災于邾邾人辭曰齊出貜且長宣子曰非吾力不能納也義實不爾克也引師而去之故君子善之而書曰弗克納也在易同人之九四曰乘其墉弗克攻吉象曰乘其墉義弗克也其吉則困而反則也其趙盾之謂矣聖人以改過為大過而不改將文過以遂非則有怙終之刑過而能悔不二過而逺罪則有遷善之美其曰弗克納見私欲不行可以為難矣然則何以稱人大夫而置諸侯非也聞義能徙故為之諱內以諱為貶外以諱為善吕祖謙曰晉趙盾以諸侯之師八百乘納捷災于邾向來城濮之戰七百乘却是晉國所有之兵至此八百乘蓋非止晉國之兵亦取于諸侯耳盾之欲納捷災始是盾見得不甚分明後來能頓改過亦自可取九月甲申公孫敖卒于齊謝湜曰公孫敖叛命而出義已絶于魯矣魯不加討且又立其嗣歸其喪故書卒齊公子商人弒其君舍謝湜曰舍未踰年稱君以明舍之為君也君薨世子柩前嗣立君父之位定矣號則稱子一年不可二君故也齊穆公卒子舍立國人皆北面為臣舍之君位定矣公子商人驟施聚士將以求國以舍立未踰年不以成君視舍而害之故舍之遇難春秋特以成君書之以正商人弒逆之罪也正商人之罪以為天下逆惡之戒也春秋立例于初以示法變例于終以起義郕太子未即位稱伯齊嗣子舍未踰年稱君皆變例以明微者也賊不討舍不葬故不書葬商人稱公子與楚商臣稱世子同意胡安國曰州吁弒君則以國氏商人獨稱公子何也以國氏者纍及乎上稱公子者誅止其身夫州吁寵愛有匹嫡奪正之漸莊公養成其惡莫之禁至于弒逆則有以致之矣故曰以國氏者纍及乎上按左氏魯叔姬妃齊昭公生舍叔姬無寵舍無威商人心知其孤危寡恃可以取而代也于是驟施于國而多聚士然則商人弒逆出于其身之所為而非昭公有以致之也故曰稱公子者誅止其身舍未踰年而成之為君者榖梁子曰成舍之為君所以重商人之弒也吕祖謙曰齊商人弒舍舍無威以母之無寵亦不見重于其子宋子哀來奔謝湜曰蕭封人子哀宋以為卿不義宋公而出此大夫之不事汙君不居亂邦潔身而去者也列國大夫以卑辱以庸昧以過惡得罪而去者衆矣子哀獨以高節辟亂來奔春秋字而不名貴之也宋大夫司馬以忠死其位者也宋司城以義去其君者也宋子哀潔而不纍于祿者也三子者死生去就雖不同其歸皆適于義而已臣子之節著于亂世而可以風勸天下者未有美于此者也胡安國曰宋昭公無道高哀為蕭封人以為卿不義宋公而出遂來奔書曰子哀貴之也易曰幾者動之微吉之先見者也君子見幾而作不俟終日宋子哀有焉昔微子去紂列于三仁之首哀不立于危亂之邦而春秋書字謂能貴愛其身以存道也若偷生避禍而去國出奔亦何取之有冬單伯如齊齊人執單伯謝湜曰單伯季孫意如叔孫婼皆魯卿卿佐國命所係為鄰國所執其憂危大故執書至書重之也單伯以弔喪如齊懿公不道執之胡安國曰齊君舍魯之甥也商人弒舍固忌魯矣魯使單伯如齊齊人意欲辱魯故執子叔姬而誣之以罪不稱行人公羊所謂以己執之者也吕祖謙曰齊人執單伯此是王室之衰弱齊君無道之甚齊人執子叔姬程氏學曰齊人執子叔姬十五年齊人來歸子叔姬子叔姬妃齊昭公生舍昭公卒舍即位公子商人弒君之惡已顯而執叔姬之事聖人不獨罪商人也齊人不討賊俱北面事之又致執其君母齊之人均有罪焉故曰齊人執子叔姬執之書其歸不得也謝湜曰子叔姬適齊昭公生舍舍即位公子商人弒舍又執子叔姬商人弒逆之惡顯矣齊人不能討國賊反以臣禮事之叔姬之欲歸魯也又使商人執君之母而囚之叔姬之執齊人均有大罪故執書齊人罪之也齊人衆辭執叔姬書人與諸侯執公卿書人異矣叔姬有母道于齊不稱夫人以著商人絶之也凡內女適諸侯不書歸者或公未即位女已行故胡安國曰子叔姬者齊君舍之母也弒其君執其母皆商人所為而以為齊人執之何也商人弒君之罪已顯而齊人黨賊之惡未彰商人驟施于國而多聚士是以財誘齊國之人而濟其惡也齊人懷商人之私惠忘君父之大倫弒其君而不能討執其母而莫之救則是舉國之人皆有不赦之罪也假有人焉正色而立于朝誰敢致難其君而不顧乎故聖人書曰齊人執子叔姬所以窮逆賊之黨與而治之也其討罪之旨嚴矣故曰春秋成而亂臣賊子懼十有五年春季孫行父如晉三月宋司馬華孫來盟謝湜曰書官而不名貴之也書官而名貶之也司馬見殺不名善其能死職也司城出奔不名善其能去職也華孫書官書名則與此異矣安暴君之朝食汙君之祿進無直諫之忠退無潔身之義姦邪同寵為昭公以國事來盟書華孫貶之也書司馬著其失職也華氏孫名左氏以為字誤矣來不稱使者昭公國亂無政華孫為宋來盟故也胡安國曰司馬主兵之官稱華孫者自督弒殤公諸侯受賂失賊不討使秉宋政及其後世繼掌兵權春秋之所禁者故傳載其承命亞族之詞而經書曰宋司馬華孫來盟其曰華孫猶季孫叔孫仲孫臧孫之類不書名者義不係于名也不稱使以是専行為無君矣孟子曰所謂故國非謂其有喬木有世臣之謂也春秋此義其欲後世以賢者之類功臣之胄為世臣然後委之以政乎夏曹伯來朝謝湜曰為齊難故來朝齊人歸公孫敖之喪謝湜曰敖卒于齊魯人許反其喪齊人之以敖喪至也以魯人釋其罪而反之故書歸以惠叔請于齊而得之故不書來法以正國刑以治罪法不行于宗族刑不加于大惡魯之失道也胡安國曰公孫敖慶父之後行又醜矣出奔他國其卒與喪歸皆書于䇿者許翰以為文伯惠叔二子之哀誠無已也故魯人從其請國史記其事仲尼因而不革者以敖著教也易曰有子考無咎周公命蔡仲曰爾尚蓋前人之愆六月辛丑朔日有食之鼓用牲于社謝湜曰莊公文公不知所以救災故鼓用牲于社單伯至自齊謝湜曰卿至不書降于君也單伯季孫意如叔孫婼皆以被執得至故書胡安國曰單伯天子之命大夫也故逆王姬會伐宋使于齊皆書其字而不名與意如婼異者無所書而不專王命謹臣禮也晉卻缺帥師伐蔡戊申入蔡謝湜曰卻缺以師伐蔡蔡人不服于是以師入蔡伐以治罪而已蔡不與盟蔡侯之過也師入其國則蔡人受害者衆矣伐蔡書入罪卻缺之暴也兵衆入國其為患大書日謹其變秋齊人侵我西鄙謝湜曰執單伯執子叔姬侵我西鄙懿公之不道也以逆得以逆守賊臣之取禍也吕祖謙曰齊人伐我西鄙一則是執叔姬恨以王使來請一則是弒君後恐諸侯來討季孫行父如晉謝湜曰行父春如晉秋又如晉以齊故冬十有一月諸侯盟于扈程頤曰魯以備齊不在會故不序又稱諸侯者衆辭見衆國無能為也此盟為齊亂也謝湜曰公子商人弒齊君執君母病魯而執其卿害魯而侵其鄙逆惡之大者也晉靈會八國諸侯盟于扈謀伐齊也齊人賂晉不克而還討逆定亂義事也諸侯所同欲也晉受賂中止諸侯弗能正諸侯所同罪也故扈之盟總稱諸侯公不與盟齊難故也胡安國曰盟于扈者晉侯宋公衛蔡陳鄭曹許八國之君也何以不序略之也春秋于夷狄君臣同詞而不分爵號説者以為略之也八國曷為略之等于夷狄乎齊人弒君不能致討受賂而退奚以賢于狄矣不曰晉人會諸侯盟于扈而曰諸侯盟者分惡于諸侯也陳恆弒其君孔子沐浴而朝告于哀公請討之弒君之賊夫人之所得討也而况于諸侯乎况于鄰國乎略諸侯而不序以其欲討齊罪而復不能也况于鄰壤初不與盟會者乎魯君之罪亦可知矣吕祖謙曰晉盟諸侯于扈謀伐齊齊賂晉而還至十六年魯賂齊此亦見春秋時風俗皆以賄賂為尚自入春秋受賂亦未曽無之只是未若此之甚其大略可見十有二月齊人來歸子叔姬謝湜曰子叔姬齊君母不書夫人商人絶之也忿而執之絶而歸之商人之罪也臣子不能討賊治罪而從之齊人之罪也歸叔姬罪在齊人故書來胡安國曰不言齊子叔姬來歸而曰齊人來歸子叔姬者見子叔姬無罪齊人自絶而歸之爾春秋深罪齊人以商人為君而不知其惡故其執叔姬與弒其君商人皆稱齊人深責之也吕祖謙曰齊人來歸子叔姬齊執叔姬公羊以為單伯淫叔姬蓋公穀只是經生不識朝廷大事其間詞或鄙俚其中説經旨與理處甚明又不可不仔細看蓋緣他傳得子夏學所以識得此不比左氏是國史所以識得朝廷大要齊侯侵我西鄙遂伐曹入其郛謝湜曰懿公初以不道侵魯繼以遷怒伐曹曹人不服又以兵入其郛兵之暴亂甚矣書侵書入罪之也書遂著其橫也郛外城入其郛者曹人守城齊師乘其郛而入之也十有六年春季孫行父會齊侯于陽榖齊侯弗及盟程氏學曰季孫行父會齊侯于陽榖齊侯弗及盟齊魯先既約盟而公不往乃使季孫行父會故齊侯弗及盟也夫齊強魯弱公違約不自下而抗大國以取怒危道也謝湜曰齊再侵魯魯為請盟其盟也公不能往而行父出會于是齊侯不與為盟懿公暴橫不率久矣陽穀之會文公遣大夫出盟大國至使失歡于齊非保國之道也將以保國而反以危國書弗克盟危之也危之著文公之倦于政也陽穀齊地夏五月公四不視朔程氏學曰古者頒告朔于邦國諸侯受而藏之祖廟每月朔朝于廟告而行之然則朝廟者謂告月也文公慢棄天時不尊王朔以閏月附月之餘怠而不告猶朝于廟舍其本而行其末耳左氏曰閏月不告朔非禮也若公四不視朔則尤甚矣謝湜曰告朔以朔政告之廟視朔視朔政而聽之文公之倦政也其始不告朔而已終則不視朔焉其始閏不告朔而已終則四不視朔焉一月之政係于朔朔政不視則國之政事不復聽治矣朔政不視至于四月則視朔之禮自是不復行矣書四不視朔以明朔禮之廢也胡安國曰天子頒朔于諸侯諸侯每月奉以告廟出視朝政文公四不視朔公羊子以為疾也不言疾自是公無疾不視朔也此見聖人所書之意若後復視朔者必于此書公有疾與昭公如晉之事比矣文公厭政備見于經閏不告朔不視無雨不閔會同不與廟壞不修作主不時事神治民之怠也則其心放而不知求久矣六月戊辰公子遂及齊侯盟于郪邱謝湜曰陽穀之會齊侯弗及行父盟魯不可以與齊抗乃使公子遂以賂請盟故二國盟于郪邱郪邱之盟齊為盟主盟以魯大夫及齊侯者抑齊之強也抑齊之強者責其以賂屈魯而盟也郪邱齊地秋八月辛未夫人薑氏薨謝湜曰薑氏僖公夫人毁泉臺謝湜曰上之所為下之所效國君舉動不可以不慎也物之不足疑情之不足信者明君弗惑也興之無利于民廢之無損于民者明君弗為也故災變妖孽之來不以邪説亂其心不以無稽之言二其聽反身修德以應之而已泉臺魯之舊也魯人以蛇出泉宫夫人繼殁由是惡泉臺而毁之惑之大者也川谷有妖咎不在川谷宫室有妖妖不在宫室惑蛇妖毁泉臺繆舉之大也禍福不以理推吉凶不以事考死生不以聽命壞先君建立以弭一日不足信之妖非明君之舉也何以為天下後世法哉書毁泉臺罪其不明也胡安國曰先祖為之非矣然臺之存毁非安危治之之所係也雖勿居可也而必毁之是暴揚其失有輕先祖之心此履霜之漸弒父與君之萌春秋之所謹也故書楚人秦人巴人滅庸謝湜曰楚子西通巴人北通秦人故滅庸胡安國曰楚大飢戎與麇濮交伐之而庸人幸其弱帥羣蠻以叛楚此取滅之道也楚人謀徙于阪高蒍賈曰不可我能往寇亦能往不如伐庸亦見其謀國之善矣故列書三國而楚不稱師減楚之罪詞也吕祖謙曰庸人帥羣蠻以叛楚麇人率百濮聚于選將伐楚是時楚不先伐麇而先伐庸者何故蓋當時病根在庸其倡率羣蠻以攻楚者皆是庸故先伐庸也是以楚之為計使廬人七遇皆北所以示其甚弱之勢而使庸人見之以為不足與戰遂不設戰備庸人既敗則羣蠻皆散卒難與合以攻楚所以如此者必欲滅庸而後已若病根不去則終亦為患矣冬十有一月宋人弒其君杵臼謝湜曰昭公無道上下離心由是國人起而害焉故弒書宋人然則人心忿怨而君不受禍者未之有也大夫司馬以無罪見殺司城子哀以辟難出奔國之忠良或死或去而姦邪險惡擅命得君如是而人君無股肱手足之助矣此昭公之難所以發于宋人也宋自雨螽以後公室禍亂相繼不息至于如此天人之際其相與可不畏哉賊不討故不書葬胡安國曰此襄夫人使甸殺之也而書宋人者昭公無道國人之所欲弒也君無道而弒之可乎諸侯殺其大夫雖當于罪若不歸諸司寇猶有専殺之嫌以為不臣矣况于北面歸戴奉之以為君也昭公無道聖人以弒君之罪歸宋人者以明三綱人道之大倫君臣之義不可廢也然則有土之君可以肆于民上而無誅乎諸侯無道天子方伯在焉臣子國人其何居死于其職而明于去就從違之義斯可矣蕩意諸亦死職春秋削之不得班于孔父仇牧荀息何也二子間其君而見殺春秋之所取也意諸知國人將弒其君而不能止知昭公之將見殺而不能正坐待其及而死之所謂匹夫匹婦自經于溝瀆而莫之知也奚得與死于其職者比乎聖人所以獨取高哀之去而書字以褒之也吕祖謙曰宋人弒其君杵臼凡書國人不名言某人弒君皆君無道十有七年春晉人衛人陳人鄭人伐宋程頤曰行天討而成其亂失天職也故不卿之謝湜曰晉荀林父衛孔達陳公孫寧鄭石楚伐宋討逆之師也逆亂未治乃立公子鮑而還師莫大于行義義莫大于討逆將以行義討逆而其終反成宋亂故大夫皆貶稱人胡安國曰列國之卿其君所與共天位治天職者宋有弒君之亂欲行天討而伐宋乃其職也復不能討而成其亂是不足為國卿失其職矣故皆貶而稱人大夫帥師稱名氏賤者稱人其稱人賤之也陳恆弒簡公孔子請討曰以吾從大夫之後不敢不告也夏四月癸亥葬我小君聲薑謝湜曰成風僖公妾母聲薑文公嫡母齊侯伐我西鄙六月癸未公及齊侯盟于穀謝湜曰公子遂雖盟郪邱齊猶以師伐我公于是至穀為盟穀之盟齊為盟主盟以公及齊侯者抑齊之強也抑齊之強者責其以師逼魯而盟也諸侯會于扈謝湜曰會于扈將以平宋也亂臣賊子討而治之諸侯之所志也既會而卒無成功諸侯之所同罪也故扈之會總稱諸侯胡安國曰宋昭公雖為無道人臣將而必誅春秋正宋人為弒君之罪所以明人道之大倫也故大夫無沐浴之請則貶而稱人諸侯無討賊之功則略而不序不然是廢君臣之義人欲肆而天理滅矣故曰春秋成而亂臣賊子懼秋公至自穀冬公子遂如齊謝湜曰左氏謂拜穀盟十有八年春王二月丁丑公薨于臺下謝湜曰薨書臺下則宴遊無節可知朱熹曰一毫不正則有纍于其生故春秋書公薨必謹其地學者要當知古人所以嚴于終如此秦伯罃卒謝湜曰秦伯秦穆公赴告通于中國故書卒魯不會葬故不書葬夏五月戊戌齊人弒其君商人謝湜曰懿公雖逆臣齊人北面臣之矣故弒書君國人起而害之故弒書人懿公得位四年外執魯卿內執君母侵人之鄙伐人之國入人之郛其暴虐不道極矣故國人作難而死于僕乘之手也胡安國曰按左氏齊懿公即位刖邴歜之父而使歜僕納閻職之妻而使職驂乘二人者實弒公然則于法宜書曰盜而特變其詞以為齊人何也亂臣賊子之動于惡必有利其所為而與之者人人不利其所為而莫之與則孤危獨立無以濟其惡篡弒之謀熄矣惟利其所為而與之者衆是以能濟其惡天下胥為禽獸而莫之遏也公子商人驟施于國而多聚士盡其家而貸于公有司是以財誘齊國之人也齊人貪公子一時之私施不顧君臣萬世之大倫弒其國君則靦面以為之臣而不能討執其君母則拱手以聽其所為而不能救故于懿公見殺特不書盜反以弒君之罪歸諸齊人以誅亂賊之黨弭篡弒之漸所謂拔本塞源懲禍亂之所由也故曰春秋成而亂臣賊子懼六月癸酉葬我君文公秋公子遂叔孫得臣如齊謝湜曰公子遂以立公請于齊故二卿同出書二卿著遂之専也胡安國曰使舉上客將稱元帥此春秋立文之常體也其有變文書介副者欲以起問者見事情也子赤夫人之子今卒于弒不著其實是為國諱惡無以傳信于將來而春秋之大義隱矣故上書大夫並使下書夫人歸于齊中曰子卒則見禍亂邪謀發于奉使之日而公子遂弒立其君之罪著矣冬十月子卒謝湜曰子文公嫡子赤公薨子赤繼立公子遂以敬嬴之寵害子赤立宣公子被害不書諱之也不名先君已葬故也文公之為國也主不知建而後時廟不知敬而室壞閏不告月朔不四視其怠棄國政甚矣方是時日食于上地震于下雨不降星孛而逆尚不知恐懼自反外失制權臣內失正嗣位嬖孽寵幸而嫡子孤危故公子遂難作蕭墻而子赤受其患也天人之際可不畏邪胡安國曰諸侯在喪稱子繼世不忍當也既葬不名終人子之事也踰年稱君緣民臣之心也子卒何以不日遇弒不忍言也既葬而不名不名而遇弒者不日以見其弒子赤是也踰年而稱君稱君而遇弒者不地以見其弒閔公是也何以知其賊乎上書大夫並使下書子卒夫人歸則知罪之在公子遂矣孫于邾出奔莒則知罪之在夫人與慶父矣繼世之恩終事之重情文之節隱惡之禮記事之信誅亂臣討賊子之義亦備矣夫人薑氏歸于齊謝湜曰薑氏文公夫人赤之母也子被害故夫人歸齊公子遂殺嫡立庶臣子不知討治乃至魯之君母棄絶而歸魯國之罪也公子遂如楚如齊如晉入把伐邾救鄭盟晉趙盾盟雒戎盟齊侯其權重矣故其不道至于殺國嗣子絶母夫人一國莫敢制也胡安國曰書夫人則知其正書薑氏則知其非見絶于先君書歸于齊則知其無罪異于孫于邾者而魯國臣子殺嫡立庶敬嬴宣公不能事主君存嫡母其罪不書而並見矣季孫行父如齊謝湜曰春秋御臣之道欲制于微宣公新立故行父如齊莒弒其君庶其謝湜曰弒稱國舉朝為之難也莒紀公多行無禮于國臣下不安禍由此起故弒書莒左氏謂太子僕因國人誤矣春秋集義卷二十九

body:
  text: 春秋集義卷十六宋李明復撰莊公二十有六年春公伐戎夏公至自伐戎謝湜曰戎為魯病故公伐戎曹殺其大夫謝湜曰凡大夫無罪而死者唯書大夫不書名大夫君之股肱也書大夫以見其有股肱之力也大夫有股肱之力而不以其罪殺之君之過也君不以罪殺大夫而輔臣不能諫大臣不能救國之罪也故書國以罪其國胡安國曰稱國以殺者國君大夫與謀其事不請于天子而擅殺之也義繫于殺則止書其官曺殺其大夫宋人殺其大夫是也義繫于人則兼書其名氏楚殺其大夫得臣陳殺其大夫洩冶之類是也然殺大夫而曰大夫與謀其事何也與謀其事者用事之大夫也是殺者不得于君之大夫也所謂義繫于殺者罪在于專殺而見殺者之是非有不足紀也故止書其官而不録其名氏也古者諸侯之卿大夫士命于天子而諸侯不敢專命也其有罪則請于天子而諸侯不敢專殺也及春秋時國無小大卿大夫士皆專命之而不以告于王朝有罪無罪皆專殺之而不以歸于司寇無王甚矣五伯三王之罪人而葵丘之㑹猶曰無專殺大夫故春秋明書于策備天子之禁也凡諸侯之大夫方其正交中華㑹盟征伐雖齊晉上卿止錄其名氏至于見殺雖曺莒小國亦書其官或抑或揚或奪或與聖人之大用也明此然後可以司賞罰之權矣秋公㑹宋人齊人伐徐謝湜曰詩曰濯征徐國書曰徐戎並興徐戎類也徐爲宋病故齊魯為宋伐徐胡安國曰按書伯禽嘗征徐戎則戎在徐州之域為魯患舊矣是年春公伐戎秋公伐徐者必戎與徐合兵表裏為魯國之患也故雖齊宋將卑師少而公獨親行其不致者役不淹時而齊宋同㑹則無危殆之憂冬十有二月癸亥朔日有食之二十有七年春公㑹杞伯姬于洮謝湜曰伯姬魯女洮魯地女有歸寧于國無出㑹于境洮之㑹在魯有敗禮之愆在杞失正家之道胡安國曰左氏曰㑹于洮非事也天子非展義不巡狩諸侯非民事不舉卿非君命不越境伯姬莊公之女非事而特㑹于洮愛其女之過而不能節之以禮此春秋之所禁也惟不節之以禮然後有使自擇配如僖公之于季姬典訓亡矣夏六月公㑹齊侯宋公陳侯鄭伯同盟于幽程頥曰同志而盟非率之也謝湜曰鄭文公背楚復與諸侯同心故稱同盟明年荆伐鄭公㑹二國救鄭然則鄭苦于楚欲與中國同盟可知也胡安國曰同盟之例有惡其反覆而書同盟有諸侯同欲而書同盟此盟鄭伯之所欲而書同盟者也凡盟皆小國受命于大國不得已而從焉者也其有小國願與之盟非出于勉强者則書同盟所以志同欲也前此鄭伯嘗貳于齊矣至是齊桓强盛有霸中國攘夷狄之勢諸侯皆歸之鄭伯于是焉有畏服之心其得與于盟所欲也故特書同榖梁子所謂于是而後授之諸侯是也其授之諸侯得衆也視他盟為愈矣呂祖謙曰同盟于幽陳鄭始服于齊此處最要看葢前服楚故也秋公子友如陳葬原仲程氏雜説曰公子友如陳葬原仲人臣之禮無外交大夫非君命不越境公子友違王制委國事私㑹他國大夫之葬其譏可見也謝湜曰諸侯相葬禮也列國大夫相葬非禮也人臣無境外之交卿非君命不越境公子友以私事出境葬大夫其專命僣制不待貶絶而自見矣胡安國曰公子友如陳葬原仲私行也人臣之禮無私交大夫非君命不越境何以通季子之私行而無貶乎曰春秋端本之書也京師諸夏之表也祭伯以寰内諸侯而來朝祭叔以王朝大夫而來聘尹氏以天子三公來告其䘮誣上行私表不正矣是故季子違王制委國事越境而㑹葬齊髙固莒慶以大夫即魯而圖婚其後陳荘子死赴䘮于魯魯人欲勿哭繆公召縣子而問之曰古者大夫束脩之問不出境雖欲哭之焉得而哭諸今之大夫交政于中國雖欲勿哭焉得而勿哭末流可知矣春秋深貶王臣以明始亂備書諸國大夫無譏焉則以著効也凡此皆其正本之意楊時語録或問陳莊子死赴于魯縣子謂繆公哭之而曰有愛而哭之有畏而哭之夫哭之也以畏何也曰以言世有然也非古之禮也若古之大夫則束脩之問不出境故生無相問其死也何赴告之有哉後世國亂而君昏為臣者交政于中國故生則同盟死則赴告非禮也故春秋書之所以著其罪也呂祖謙曰卿非君命不越境如季友如陳葬原仲非也冬杞伯姬來謝湜曰夫人父母在則歸寧殁則使卿故衛女思歸寧而不得作詩以自見也伯姬非歸寧也其至魯非禮也故直書來女子之性縱之則驕伯姬爲杞國婦而㑹之于洮失防閑之道矣然則姬違禮驕恣皆荘公兆之也胡安國曰左氏曰歸寧也禮父母在嵗一歸寧若歸而合禮則常事不書其曰杞伯姬來者不當來也女子有行逺父母兄弟春㑹于洮矣冬又歸魯故知其不當來也來而必書春秋于男女往來之際嚴矣莒慶來逆叔姬程氏學曰莒慶來逆叔姬人臣之禮無外交故大夫非君命不越境以莒慶國卿而與魯為婚是外交也不書逆女而云逆叔姬以别卿為君逆也不書歸者以累乎魯也宣五年齊髙固及子叔姬來非禮尤甚謝湜曰慶不氏未賜族莒慶以國卿婚于魯臣子以私事交于諸侯也臣子外交而大夫犯分干政之患由此熾矣故公子友葬原仲于陳莒慶逆叔姬不書女以别卿爲君逆也女適大夫不書歸者不與其外交絶之也胡安國曰莒慶莒大夫也叔姬莊公女也何以稱字大夫自逆則稱字爲其君逆則稱女尊卑之别也何以書諸侯嫁女于大夫而公自主之非禮也杞伯來朝謝湜曰伯姬在魯故杞伯亦來朝也稱伯非侯爵也公㑹齊侯于城濮謝湜曰城濮衛地杜氏謂將討衛二十有八年春王三月甲寅齊人伐衛衛人及齊人戰衞人敗績又見綱領下程氏學曰春秋之義微顯闡幽者謂是類也齊人伐國之罪其文可見而衛人與戰之罪不變文不足以明之何者彼以不道加諸我已當持義而不戰上可以訴諸天子下可以告于諸侯或備其疆場折之文辭斯亦可矣奚爲忽然興師遽與之戰哉是謂以桀攻桀何較曲直乎故聖人特書曰及所以明微也謝湜曰齊人伐衛以衛有可伐之罪也衛人有辭不服故與齊人戰焉衛人力不勝齊故敗績桓公威力可謂盛矣然伐國不以道則雖小國有至舉兵相敵終于卒伍敗衂而後退焉者也故孟子曰以力假仁者覇以力服人者非心服也桓公以仁義用兵特假之而已安能使人心服哉故齊人之伐衛也上書伐下書戰以著衛人無服齊之心也觀衛人心不服齊而齊桓無服衛之德由此見矣春秋戰分主客戰而為主者其罪大戰而為客者其罪輕以戰由主起故也齊人以兵來伐我茍直焉以義辨吾之直而勿與之校可也謹邊陲嚴備守需其變而勿與之争可也上訴天王下告列國求為之助則解其危可也若夫不恤民命而以戰為心則助反在我而不在人罪反在此而不在彼矣然則春秋以齊人主伐而以衛人主戰者以明兩國之戰由衛人欲戰所致也戰之為禍大矣原野厭人之肉川谷流人之血皆戰之由也故仁者之兵有征無戰邦國有罪以兵誅罪而已服則舍焉未嘗以戰為事也邦國有亂以兵定亂而民順則止焉未嘗以戰爲事也用兵而至于戰者皆好功嗜殺而輕民命也故春秋以大罪歸于首戰之人胡安國曰春秋紀兵及者為主齊人舉兵而伐衛衛人見伐而受兵則以衛及之何也按左氏衛嘗伐周立子頹至是王使召伯廖賜齊侯命且請伐衛則齊人舉兵乃奉王命聲衛立子頹之罪以討之也為衛計者誠有是罪則當請歸司冦服刑可也若惠徼康叔不泯其社稷使得自新亦惟命則可以免矣今不徴詞請罪而上逆王命下拒方伯之師直與交戰則是衛人爲志乎此戰故以衛主之也戰不言伐伐不言日而書日者戰之日也見齊人奉詞伐罪方以是日至而衛人不請其故直以是日與之戰所以深疾之也而聖人之情見矣齊稱人將卑師少也呂祖謙曰王賜齊侯命使伐衛周所以衰者只縁此齊亦未肯十分著力只是略應命耳又曰取賂而還桓公做事管仲亦有調護不得處夏四月丁未邾子瑣卒秋荆伐鄭公㑹齊人宋人救鄭謝湜曰文公與諸侯同盟故荆伐鄭聘稱人進之也伐復稱荆狄之也蠻夷凌犯中國久矣天子不能制方伯不能却小國困于水火亦久矣方是時荆以不仁伐鄭而三國能出力救之三國與鄭同盟而復能與之同患小國有息肩之地矣書救鄭善之也胡安國曰按左氏楚令尹子元無故以車六百乗伐鄭入自純門是陵弱暴寡之師也故以州舉狄之也鄭人將奔桐丘諸侯救之楚師夜遁是得救急恤鄰之義也故書救鄭善之也齊宋稱人將卑師少桓公主兵攘夷安夏之事見矣冬築郿程頥曰春秋土功之事無大小莫不書之其意止欲人君重民之力也又曰春秋凡用民力必書其所興作不時害義固為罪也雖時且義必書見勞民爲重事也後之人君知此義則重于用民力也謝湜曰凡土功築髙墉曰城築基築垣牆曰築郿非獨城而已故稱築胡安國曰郿邑也凡用功大曰城小曰築故館則書築臺則書築囿則書築郿邑而書築者創作邑也其志不視歳之豐凶而輕用民力于其所不必爲也則非人君之心矣大無麥禾謝湜曰無麥苖言稼無麥禾言食内外倉廩困乏故大無麥禾無麥苖以大水無麥禾以用度無節不知圖國用審歳計故及冬乏食而後知何休謂秋水所傷誤矣荘公即位二十八年興師者十二㑹盟者九若狩禚納幣觀社皆非事而出境者也若丹楹刻桶築郿皆非法而興工者也費用可謂不節矣出之而不知計之用之而不知節之故築郿之後麥禾不足以周一歲之備也胡安國曰麥熟于夏禾成在秋而書于冬者荘公惟宫室臺榭是崇是飾費用浸廣調度不充有司㑹計嵗入之多寡虚實然後知倉廩之竭也故于嵗杪而書曰大無麥禾大無者倉廩皆竭之詞也古者三年耕餘一年之食九年耕餘三年之食今荘公享國二十八年當有九年之積而虚竭如此所謂寄生之君也民事古人所急食者飬民之本不敦其本而肆侈心何以為國故下書臧孫告糴以病公而戒來世為國之不知務也臧孫辰告糴于齊謝湜曰告卑辭也凡告有從有不從其得未可必也國以食為本為國而至于告糴危道也内有窘急之憂外有陵削之形其國不危者特幸而已書告糴危之也水旱之變天時所不免也先王豫防以待其變故雖水旱而不能為之患也無水旱螽螟而至于告糴則魯之不善為國可知矣古者冡宰制國用必于歲之抄用地小大視年豐耗量入以爲出三年耕必有一年之蓄九年耕必有三年之蓄又豈有告糴之困哉胡安國曰劉敞曰不言如齊告糴而曰告糴于齊言如齊則其詞緩告糴于齊則其情急所以譏大臣任國事治名而不治實之蔽也魯人悦其名而以急病讓夷為功君子責其實而以不能務農重榖節用愛人爲罪二十有九年春新延廐謝湜曰廐以安馬而已亦惡舊而新之荘公好治宫室可知也冬方告糴而春又興工民困之不憂廐陋之為恤與孔子問傷人不問馬異矣胡安國曰言新者有故也何以書昔韓昭侯作髙門屈宜曰不時所謂時者非時日也人固有利不利時前年秦拔宜陽今年旱君不以此時恤民之急而顧益奢此所謂時絀舉羸者也故榖梁子曰古之君人者必時視民之所勤民勤于力則功築罕民勤于財則貢賦少民勤于食則百事廢矣大無麥禾告糴于齊冬築郿春新延廐以其用民力為已悉矣夏鄭人侵許秋有蜚謝湜曰何休謂臭惡之蟲南方暑氣所生然則蜚不宜有則爲災冬十有二月紀叔姬卒謝湜曰叔姬卒于􅈶公爲之服故書卒前書歸􅈶後書卒志魯不能安叔姬也胡安國曰紀已滅矣其卒之何見紀侯去國終不能自立異于古公亶父之去故特書叔姬卒而不卒紀侯以明其不争而去則可能使其民從而不釋則微矣城諸及防謝湜曰諸防二邑諸役纔已防役又興書及著其不恤民力也凡土功茍害于民雖時勿興可也左氏以為書時誤矣三十年春王正月夏次于成謝湜曰非事宿兵于境故書次秋七月齊人降鄣程氏學曰齊人降鄣鄣微弱小國齊肆其强力脅而服之也不書鄣降而曰齊人降鄣者以齊之强故罪之深以鄣之弱故責之薄也春秋之義抑强扶弱而已若郕降于齊師則義在責魯故云爾謝湜曰郕降郕人服齊而降之也降鄣齊人逼鄣而降之也降者在郕故曰郕降降者在齊故曰降鄣書曰降鄣而不曰鄣降者非齊之强閔鄣之弱也其降也責齊不責鄣而春秋抑强扶弱之義見矣取國遷國皆滅也徐人取舒宋人遷宿齊人降鄣不書滅者取之遷之降之以為附庸而未絶其祀也胡安國曰降者脅服之辭前書郕降于齊師意責魯也此言齊人降鄣專罪齊也鄣者紀之附庸微乎微者也齊人不道肆其强力脅使降附不書鄣降而曰降鄣者以齊人之强故罪之深以鄣之微故責之薄春秋之法扶弱抑强明道義也覇者之政以强臨弱急事功也故曰五覇三王之罪人仲尼之徒無道桓文之事者八月癸亥葬紀叔姬謝湜曰紀叔姬之卒魯哀叔姬而葬之故書葬死能葬之而生不能安之以其有親親之心而無親親之道也紀被難魯不能救而紀侯去國叔姬窮無所託魯不能存而叔姬歸􅈶魯無親親之道可知矣胡安國曰滅國不葬此何以葬賢叔姬也紀侯既卒不歸宗國而歸于􅈶所謂秉節守義不以事故而暌婦道者也故繫之于紀而録其卒葬先儒謂賢而得書是也賢而得書所以為後世勸九月庚午朔日有食之鼓用牲于社冬公反齊侯遇于魯濟謝湜曰夏次于成冬遇于魯濟著其非事勞民故也呂祖謙曰謀山戎也以其病燕故也山戎在周為玁狁在漢為匈奴在唐為突厥燕是北燕即今燕山南府齊人伐山戎謝湜曰山戎病燕齊越千里出兵伐之得攘戎之義也胡安國曰齊人者齊侯也其稱人譏伐戎也自管仲得政至是二十年未嘗命大夫為主將亦未嘗興大衆出侵伐故魯荘十一年而後凡用兵皆稱人者以將卑師少耳此安知其非將卑師少而獨以為齊侯何也以來獻戎㨗稱齊侯則知之矣夫北戎病燕職貢不至桓公内無因國外無從諸侯越千里之險為燕闢地可謂能修方伯連帥之職何以譏之乎桓不務徳勤兵逺伐不正王法以議其罪則將開後世之君勞中國而事外夷舍近政而貴逺略困吾民之力争不毛之地其患有不勝言者故特貶而稱人以為好武功而不修文徳者之戒也然則伐楚之役何以美之其謂退師召陵責以大義不務兵交而强楚自服乎觀此可以見聖人强本治内柔服逺人之意矣又曰古者不以蠻夷弊中國春秋内諸夏而外四夷齊侯伐山戎為燕闢地貶而書人者勤逺略也三十有一年春築臺于郎謝湜曰宫室苑囿不足以遂游觀之樂故築臺于郎胡安國曰何以書厲民也天子有靈臺以侯天地諸侯有時臺以候四時去國築臺于逺而不縁占候是爲游觀之所厲民以自樂也厲民自樂而不與民同樂則民欲與之偕亡雖有臺其能獨樂乎夏四月薛伯卒築臺于薛六月齊侯來獻戎㨗程氏學曰齊伐山戎得其㨗齊侯躬來誇示以威我而聖人書曰來獻者抑之也强者抑之弱者扶之春秋大公之義也僖二十一年楚人使宜申來獻㨗義與此同楚子稱人者尤以蠻夷始盛伐中國而誇其捷故貶而人之謝湜曰軍事以㨗爲功故勝敵為捷詩曰一月三㨗是已以功告上爲獻獻臣子之禮也詩曰在泮獻功是已齊之克山戎也齊侯躬以戎㨗耀魯將以震動小國而威之也春秋退抑齊侯而書曰來獻黜其强也黜其强者不與大國以威陵諸侯也齊大國也來獻戎㨗卑者之事也以卑者屈辱齊侯而春秋抑强扶弱之心見矣夫搆禍邀功使生民䧟于荼毒以好戰者為之患也沮直害忠使柔良困于沉溺以恃强者為之患也故春秋紀兵不美戰功其為道也不與强凌弱胡安國曰軍獲曰㨗凡諸侯有四夷之功則獻于王王以警于夷中國則否諸侯不相遺俘獻者下奉上之詞齊伐山戎以其所得躬來誇示書來獻者抑之也後世宰臣有不賞邊功以沮外徼生事之人得春秋抑戎捷之意呂祖謙曰獻㨗有二如㐮八年邢丘之㑹鄭獲司馬燮獻㨗于晉此謂獻囚之謂㨗二十五年鄭伐陳子産數俘而出此謂獻其功而不獻俘如齊獻㨗是獻其俘也公羊以為威魯恐不如此秋築臺于秦謝湜曰害民以興土功耗財以供不急放心以事盤游作非法以遺後世乃一歳三築臺而後已荘公之過也冬不雨程頥曰一嵗三築臺明年春城小榖故冬書不雨閔之深也謝湜曰不雨亦旱也謂之不雨者逺近傒雨咨嗟之辭也冬民種需雨之時天不為雨逺近咨嗟今乃土功不息而民事不以為念書不雨著荘公無恤民之心也謂之不雨者以明人事感動隂陽而天不為雨也前書三築臺後書不雨則天之不雨出于人事感動隂陽亦可見矣三十有二年春城小榖謝湜曰小榖管仲私邑城小榖齊之事也齊之事而魯人爲管仲城之不書齊譏公以齊國之事為己國之事也冬不雨可憂而春猶以他國城築為事公無恤民之心甚矣夏宋公齊侯遇于梁丘謝湜曰遇無敵主故春秋因遇以正王爵秋七月癸巳公子牙卒謝湜曰牙以公子爲公室患稱公子著其骨肉相殘也世子未立牙欲廢子立弟季友不以國法肆之市朝而以君命命之飲酖而死親親之道也故書卒胡安國曰牙有無將之心而季子殺之其不言刺者公羊以為善之也季子殺母弟何善爾誅不得避兄君臣之義也曷為不直誅而酖之使託若以疾然親親之道也陸淳曰季子恩義俱立變而得中夫子書其自卒以示無譏也得之矣呂祖謙曰季友殺牙而不殺慶父何故葢兄弟之間既殺一人已是甚不得已安可又殺慶父葢殺叔牙者但欲孤其黨爾八月癸亥公薨于路寢謝湜曰公薨必書其所謹凶變也遇弑則不地故也荘公宣公成公薨于路寢正也僖公薨于小寢文公薨于臺下㐮公薨于楚宫定公薨于髙寢不正也隱公閔公不地以明不得其死也桓公薨于齊以明遇禍于齊也昭公薨于乾侯以明客死于晉也路寢一人之正寢也世子朝夕視膳之地也卿大夫宗族問安之所也國君考終于正寢則姦邪隂嬖無覬覦窺伺之心而邪謀息矣故曰薨于路寢正也胡安國曰趙氏曰君終必于正寢就公卿也大位姦之窺也危病邪之伺也若蔽于隱是女子小人得行其志矣然則荘公世嫡承國不為不貴周公之後奄有龜蒙不為不强即位三十有二年不為不久薨于路寢不為不正而嗣子受禍幾至亡國何也大倫不明而宗嗣不定兵柄不分而主威不立免其身幸矣冬十月己未般卒又見綱領中謝湜曰嗣子立未踰年其位猶統于先君死則書卒不書地降成君也稱子不稱君一年不可二君故也未葬則名父前子名故也既葬則不名君道已伸故也子被弑不書諱之也荘公驕侈怠荒久矣上有星日可憂之變下有蜚蜮不虞之異方是時不知恐懼自省以求庶政乃有無名之次不義之圍非正之法非法之如非禮之遇加以勞民動衆工役累嵗不休失先王克謹天戒之意矣故前則喪師敗績于齊後則叔牙慶父之難起而世子不得保其身繼以閔公遇禍而社稷幾至危亡然則有國家者豈可不以畏天為意者耶胡安國曰初公築臺臨黨氏見孟任生子般焉般甞鞭圉人犖公薨般即位次于黨氏慶父使犖賊般成季奔陳立閔公昔舜不告而娶恐廢人之大倫以懟父母君子以爲猶告也荘公過時越禮謬于易基乾坤詩始闗雎大舜不告而娶之義甚矣而子般乃孟任之所出也胡能有定乎雖享國日久獲終路寢而嗣子見弑幾至亡國有國者可不以為戒哉呂祖謙曰共仲賊子般古人重于立家法亦非徒然魯自文姜以來家法不正生出許多禍亂弑桓般閔三君殺叔牙慶父二卿及哀姜一婦人皆因其淫亂至此如圉人之戯女公子荘公視以為常相習以成風而不以為事公曰不如殺之既為君自可殺之何必使他人殺之以見其昏弱之如此以文姜之事觀之見得曲禮内則皆非繁辭公子慶父如齊謝湜曰閔公雖立季友出奔魯國權出慶父故慶父結好于齊胡安國曰子般之卒慶父弑也宜書出奔其曰如齊見慶父主兵自恣國人不能制也昔成王將終命大臣相康王方是時掌親兵者太公望之子伋也宰臣召奭命仲桓南宫毛取二干戈虎賁百人于伋以逆嗣子伋雖掌兵未有宰臣之命不敢發也召公雖制命非二諸侯將命以往伋亦不承也兵權散主不偏屬于一人可知矣今荘公幼年即位專以兵權授之慶父嵗月既久威行中外其流至此故于餘丘法不當書而聖人特書慶父帥師以志得兵之始而卒書公薨子般卒慶父如齊以見其出入自如無敢討之者以示後世其垂戒之義明且逺矣狄伐邢謝湜曰中國徳威不振故狄為邢難呂祖謙曰桓公始霸之初狄滅衛又伐邢見得當當時外服憑陵中國如此之甚向非桓公封衛遷邢則中夏之淪胥正不知伊于胡底孔子所以于桓之覇多與詞也豈獨漢陽諸姬盡於强楚哉春秋集義卷十六

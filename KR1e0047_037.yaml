body:
  text: 春秋集義卷三十四宋李明復撰宣公十有五年春公孫歸父會楚子于宋謝湜曰楚圍宋歷三時而兵未解魯人懼難故歸父會楚子于宋楚強不討而又會之宋危不救而又益之諸侯之罪也胡安國曰楚子不假道於宋以啓釁端而圍之陵蔑中華甚矣諸侯縱不能畏簡書攘僣亂存先代之後嚴兵固圉以為聲援猶之可也乃以周公之裔千乘之國謀其不免至於薦賄不亦鄙乎若此類聖人不徒筆之於經也比事以觀則知當日治亂盛衰之由春秋經世之略矣朱熹語録宣公十五年公孫歸父會楚子于宋夏五月宋人及楚人平春秋之責宋鄭正以其叛中國而從荆蠻耳中國諱言此事故學者不敢正言今猶守而不變此不知時務之過也罪其二霸亦非春秋意豈率天下諸侯以從三王之罪人哉特罪其叛中國耳吕祖謙曰楚在宋此亦自邲之敗驕皆不自知覺夏五月宋人及楚人平程氏學曰王道之行諸侯各以法守則何憾而平哉由列國紛亂交相戰伐故有憾有憾則有平也宣十五年宋人及楚人平宋及之也定十年及齊平十有一年及鄭平我及之也謝湜曰釋其爭憾曰平宋服楚而楚受之二國於此和焉故書平宋之見圍凡九月其告急於晉也外無隻輪匹馬之援內有柝骸易子之變宋人知怨之不可以結也故請和於楚以求平楚人知忿之不可以恃也故受宋之和而與之平二國之平衆之所同欲也故宋及楚皆稱人晉主盟之國也邦國之爭晉不能平而楚能平之則義行在楚而不在晉矣書楚殺徴舒書宋及楚平罪中國楚之不若也楚為平主而書先宋人者平由宋起故以宋人主平而善之也自宋及楚平兩國免攻爭之患而宋國賴此以安書宋人及楚人平善之也公羊以稱人為貶失春秋之意矣平非盟也不書盟以平為重故也胡安國曰此華元子反二國之卿其稱人何貶也春秋賤欺詐惡侵伐二卿不愛其情釋怨解紛使宋無亡國之憂楚無滅國之罪功亦大矣宜在所褒何以貶也善則稱君過則稱已則民作忠今二卿自以情實私相告語取必於上以成平國之功而其君不與知焉非人臣之義也世衰道微暴行交作君有聽於臣父有聽於子夫有聽於婦中國有聽於外域仲尼所以懼春秋所以作也故平以解紛雖其所欲而平者在下則大倫紊矣聖人明其道不計其功故褒貶如此然則臣而有安國家利社稷者専之不可乎曰専之而可者謂境外也子反在君之側無奏報之難幾會之失奚急於平而専之若是哉或曰子反攘善則知其罪矣華元救國急難而紓其情實何尤焉夫宋先代之後武王所封以備三恪橫見侵逼非有可滅之罪也若以大義責之曰子為上卿不能恤小助桀為虐陵我郊保圍我城郭欲滅我社稷縱子得之何面目見中華之士乎使子反果忠楚莊果賢必為義動退師止衆結盟而反矣何必輕見情實蹈不測之險乎後世羊陸效其所為交歡邊境而議者以為非純臣也知春秋之法矣六月癸卯晉師滅赤狄潞氏以潞子嬰兒歸謝湜曰潞子失國臣服於晉故書名潞赤狄别種種各有氏故稱潞氏潞氏狄中微國也潞子猶以失國書名以中國之法治之也天子死社稷國君死宗廟大夫死衆士死制義也胡安國曰其稱日謹之也上卿為主將略而稱師者著其暴也滅而舉號及氏者減見滅之罪著滅者之甚不仁也潞嬰兒不死社稷比於中國而書爵者免嬰兒之責詞也然則攘外裔安諸夏非耶徐夷並興東郊不開伯禽征之玁狁孔熾侵鎬及方宣王伐之楚人侵鄭近在王畿齊侯攘之皆門庭之冦不可縱而莫禦者也雖禦之亦不極其兵力殄滅之無遺育也今赤狄未嘗侵掠晉境非門庭之冦而恃強暴以滅之其不仁甚矣春秋所以責晉而略狄也又有異焉者夫伐國之要討其罪人斯止矣按左氏潞子夫人晉景公之姊也酆舒為政而殺之又傷潞子之目則酆舒者罪之尤也為晉計者執酆舒轘諸市立黎侯安定潞子改紀其政而返則諸狄服疆域安矣今乃利狄之土滅潞氏以其君歸何義乎春秋所以責晉而略狄也朱熹曰上黨即今潞州春秋赤狄潞氏即其地也以其地極髙與天為黨故曰上黨秦人伐晉謝湜曰自晉道狄伐秦秦人闕文王札子殺召伯毛伯程氏學曰王札子殺召伯毛伯王之卿士而王札子殺之周衰天子失政刑其亂甚矣謝湜曰王札子王子弟之為大夫者也王以私恩寵札子故札子繫王言之召伯毛伯王之卿士也王之卿士而札子殺之札子之亂國也天王在上而札子一日殺二伯定王之失道也誅賞國之紀綱也誅賞出於臣下而王不問則國之紀綱壞矣故春秋之道雖親有罪在所不恕雖仇有善在所不廢胡安國曰王臣有書字而言子者王季子是也有書字而繫名者王子虎是也此稱王札子者穀梁以為當上之詞也其為當上之詞者矯王命以殺之也為天下主者天也繼天者君也君之所司者命也為人臣而侵其君之命則不臣為人君而假其臣以命則不君君不君臣不臣天下所以傾也邢侯専殺雍子於朝叔向以殺人不忌為賊請施邢侯君子以為義王札子之罪當服此刑而天王不能施之無政刑矣何以保其國而不替乎秋螽胡安國曰人事感於此則物變應於彼宣公為國虛內以事外去實而務華煩於朝會聘問賂遺之末而不知務其本者也故戾氣應之六年螽七年旱十年大水十有三年又螽十有五年復螽府庫匱倉廪竭調度不給而言利尅民之事起矣仲孫蔑會齊髙固于無婁謝湜曰公孫歸父仲孫蔑比年會齊著大夫出入之數也胡安國曰禮之始失也諸侯非王事而自相會也無以正之不自天子出矣然後諸侯與大夫會又無以正之然後大夫與大夫會禮亦不自諸侯出矣田氏篡齊六卿分晉三家専魯理固然也不能辨於早後雖欲正之其將能乎初稅畝謝湜曰什一取民天下之中正也宣公始有稅畝之法故曰初公田之外又取私田計畝而稅之故曰稅畝古者國有常事財有常出故取民不過什一而已後世事倍於古不啻數十財出經用之外不可勝計由是什一不足而加之稅畝也稅畝之法行而魯國困矣故春秋取民以什一為正胡安國曰孟子曰耕者助而不稅則天下之農皆悅而願耕於其野矣書初稅畝者譏宣公廢助法而用稅也殷制公田為助助者藉也周因其法為徹徹者通也其實皆什一也古者上下相親上之於下則曰駿發爾私終三十里惟恐民食之不給也下之於上則曰雨我公田遂及我私惟恐公田之不善也故助法行而頌聲作矣世衰道微上下交惡民惟私家之利而不竭力以奉公上惟邦財之入而不惻怛以利下水旱凶災相繼而起公田之入薄矣所以廢助法而稅畝乎初者志變法之始也其後作丘甲用田賦至於二猶不足則皆宣公啓之也故曰作法於涼其弊猶貪作法於貪弊將若何有國家者必欲克守成法而不變其必先務本乎朱熹曰魯自宣公稅畝又逐畝什取其一則通為什二矣冬蝝生謝湜曰蝝螽子冬非蝝生育之時冬而蝝生異之大也秋則為田害冬則螽死矣今又蝝生災之大也書蝝生著其為異為災也胡安國曰始生曰蝝既大曰螽秋螽未息冬又生子災重及民也而詳志之如此者急民事謹天災仁人之心王者之務也遇天災而不懼忽民事而不修而又為繁政重賦以感之國之危無日矣吕祖謙曰蝝生是嵗本飢所幸得蝝是冬月生不為物害飢謝湜曰上則稅畝奪其食下則螽蝝賊其稼故飢杜氏謂幸其冬生不為物害誤矣人君代天牧民民一阻飢牧民者之罪也嵗凶而飢猶曰不可又况身為虐政使民受飢者乎胡安國曰春秋飢嵗多矣書於經者三而宣公獨有其二何也古者三年耕餘一年之蓄九年耕餘三年之食雖有凶旱民無菜色是嵗雖螽蝝而遽至於飢者宣公為國務華去實虛內事外煩於朝會聘問賂遺之末而不敦其本府庫竭矣倉廪匱矣水旱螽蝝天降飢饉亦無以振業貧乏矣經所以獨兩書飢以示後世為國者不可不敦本也十有六年春王正月晉人滅赤狄甲氏及留吁謝湜曰甲氏赤狄别種留吁又一種君不書死於兵難之中故也昔武王克商庸蜀羌茅微盧彭濮莫莫不與聞牧野之誓茍能大無外之謨保而有之則逺方之國皆吾股肱就使以為不可用先王綏有德接有禮迎來送往治亂持危亦使之各遂其生而已又曷常以殺滅為事哉赤狄其種非一也晉人并赤狄三種而滅之赤狄種類盡矣書滅潞氏書甲氏及滅留吁罪其不仁也胡安國曰按左氏董是役者士會也上將主兵其稱人貶詞也甲氏潞之遺種留吁其殘邑也春秋于外裔攘斥之不使亂中夏則止矣伯禽征徐夷東郊既開而止宣王伐玁狁至於太原而止武侯征戎瀘服其渠帥而止必欲盡殄滅之無遺種豈仁人之心王者之事乎士會所以貶而稱人也夏成周宣榭火謝湜曰宣榭宣王所為之榭也成周守備不嚴故火發宣榭書火著王室之怠也宫室非法非制火則書災以明天降之災也宫室合於典禮火則書火以明火備不嚴也若陳災宋災之類則以政治舛戾招之也故左氏曰人火曰火天火曰災胡安國曰成周天子之東都宣榭宣王之廟也按吕大臨考古圗有􅌏敦者稱王格于宣榭呼內史䇿命􅌏是知宣榭者宣王之廟也古者爵有德祿有功必於太廟示不敢専也榭者射堂之制其堂無室以便射事故凡無室者皆謂之榭宣王之廟謂之榭者其廟制如榭也宣榭火何以書以宗廟之重書之也貴戚擅殺大臣而天子不討王室不復能中興矣人火之天所以見戒乎秋郯伯姬來歸謝湜曰郯伯姬來歸把叔姬來歸被出而來歸也女子以夫為家以嫁為歸生死與之同而不可改者也率身不謹而被出來歸辱之大者也書郯伯姬把叔姬來歸著其失婦道也著其失婦道以明魯之失閨訓也女子一於夫而已義無再適者也不得於夫而出則終身由此棄矣然則保姆之訓可以不嚴歟齊人來歸子叔姬齊人絶而歸之也郯伯姬把叔姬來歸伯姬叔姬自絶而歸也胡安國曰按左氏郯伯姬來歸出也內女出書之䇿者男女居室人之大倫也婚姻之禮廢則夫婦之道苦淫辟之罪多矣復相棄背喪其配耦氓之詩所以刺衛日以衰薄室家相棄中谷有蓷所以閔周易敘咸恆為下經首春秋內女出夫人歸凡男女之際詳書于䇿所以正人倫之本也其旨微矣冬大有年謝湜曰宣而大有年異之大也飢而大有年幸之大也胡安國曰程氏曰大有年記異也旱乾水溢飢饉薦臻者災也山崩地震慧孛飛流者異也景星甘露醴泉芝草百穀順成者祥也大有年上瑞也何以為記異乎凡災異慶祥皆人為所感而天以其類應之者也人事順於下則天氣和於上宣公弒立逆理亂倫水旱螽蝝飢饉之變相繼而作史不絶書宜也獨於是冬乃大有年所以為異乎夫有年大有年一耳古史書之則為祥仲尼筆之則為異此言外微旨非聖人莫能修之者也十有七年春王正月庚子許男錫我卒丁未蔡侯申卒夏葬許昭公葬蔡文公胡安國曰日卒書名赴而得禮記之祥也葬而不月其略在內宣公為國務華而無忠信誠慤之心計利而不知禮義邦交之實哀死送終獨厚於齊而利害不切其身者皆闕如也大則薄其君親次則忽於盟主又其次若秦若衛若滕雖來告訃怠於禮而不會也比事以觀義自見矣六月癸卯日有食之己未公會晉侯衛侯曹伯邾子同盟于斷道程頤曰諸國同心欲伐齊故書同盟謝湜曰齊頃不道魯衛曹皆欲伐齊故斷道之盟書同盟胡安國曰書同盟者志同欲也大國率之小國畏威而從命非同欲也小國訴之大國勉強而應焉非同欲也若斷道之盟諸侯同心謀欲伐齊釋其憤怒非有不得已而要之者也或以為會同天子之事築宫為壇設方明如方嶽之盟故書同疑其説之誤矣秋公至自會冬十有一月壬午公弟叔肸卒謝湜曰叔肸以寵弟得政為卿書公弟著其寵也書叔肸著其氏也仲叔季三桓子孫之氏也友以寧國之功遂以援立之力肸以母弟之寵魯皆生賜族氏以世其官先王選賢之法壞矣其卒也書季友書仲遂書叔肸著其兆亂也胡安國曰稱弟得弟道也稱字賢也何賢乎叔肸宣弒而非之也非之則胡為不去也兄弟無絶道故雖非之而不去也與之財則曰我足矣終身不食宣公之祿君子以是為通恩也論情可以明親親言義可以厲不軌所以取貴乎春秋書曰子弟而稱字以表之也公子為正大夫而書卒貴也不為大夫而特書卒賢也或以為叔肸寵弟在宣公有私親之愛故生而賜氏俾世其卿與季友仲遂比則其説誤矣誠使叔肸有寵生而賜氏則貴戚用事之卿豈有不見於經者齊年鄭語在外之見於經者季友仲遂在內之見於經者勢必與聞政事執國命矣况宣公之時煩於聘問會朝之禮遂蔑季孫歸父交於鄰國衆矣而獨叔肸不與焉其非生而賜氏俾世其卿亦明矣十有八年春晉侯衛世子臧伐齊謝湜曰衛穆公失訓世子之道故世子臧會晉伐齊國君善惡習自世子為世子而從事兵革其後不以攻戰為事者寡矣衛書世子著其失職也世子仁不仁繫天下治亂故春秋崇世子以正國綱胡安國曰保國以禮為本者也齊頃公不謹於禮自已致冦所謂人必自伐而後人伐之矣諸侯上卿皆執國命取必於其君以行其克伐怨欲之私故盟於斷道師于陽穀大戰于鞍逞其志而後止春秋詳書于䇿見伐與伐者之罪皆可以為鑒矣公伐把夏四月秋七月邾人戕鄫子于鄫謝湜曰戕殘賊而殺之也戕之為害尤為不仁非特殺之而已諸侯皆南面之尊也或用之或戕之王法在所黜故奪爵稱人胡安國曰戕者殘賊而殺之也于鄫者刺臣子不能救君難也外域無城郭宫室百官有司單車使者直造其國中執其君長者則有之矣中國則重門繫柝簾陛等威侍衛守禦之嚴奚至於坐使其君為邾人殘賊殺之而莫禦乎邾人蓋嘗執鄫子用之則不共戴天之世讎也既不能復又使邾人得造其國都而戕殺其君曰于鄫者所以深責鄫之臣子至此極也吕祖謙曰邾人戕鄫子于鄫邾却與鄫是鄰國鄫又小於邾故邾常欺鄫向來時襄公執鄫子于次睢之社易得放手只緣前時有此事後來所以如此不然其他國則無此甲戍楚子旅卒范祖禹曰春秋吳楚之君不稱王所以存周室也謝湜曰楚莊赴告之禮通於中國故書卒吳楚僭號稱王故二國生稱子以中國爵命治之也死不書葬黜其號也故禮曰春秋不稱楚越之王喪恐民之惑也胡安國曰楚僭稱王降而稱子者是仲尼筆之其不書葬者恐民之惑而避其號是仲尼削之也若楚若吳若徐皆自王降而稱子若滕自侯降而稱子若把自伯降而稱子四裔雖大皆曰子其降而稱子者外之也或謂春秋不擅進退諸侯亂名實則非矣述天理正人倫此名實所由定也奚名為亂哉公孫歸父如晉胡安國曰宣公因齊得國故刻意事之雖易世猶未怠也及頃公不能謹禮怒晉魯上卿而卻克當國決䇿討之晉方強盛齊少懦矣於是背齊而事晉其於邦交以利為嚮背無忠信誠慤之心者也按左氏歸父欲去三桓以張公室與公謀而聘於晉欲以晉人去之夫輕於背與國易於謀大家而不知其本未有能成而無悔也然則公室不可張乎務引其君當道正心以正朝廷禮樂刑政自已出也其庶幾乎必欲倚外援以去之是去疥瘍而得腹心之疾也庸愈哉冬十月壬戍公薨于路寢歸父還自晉至笙遂奔齊謝湜曰歸父仲遂之子也遂害子赤立宣公歸父怙公之寵久矣公之薨也魯人怨仲逐東門氏歸父至笙聞變不返國奔齊人臣奉命以出雖死守節不變君雖薨必以命復之而後已歸父之還也聞君喪不奔不復君命而出茍利其身而不顧其職其不恭大矣故奔齊書遂罪其無君也還已反其至之辭公羊以還為善誤矣自外奔故不書出胡安國曰仲尼稱孟莊子之孝其不改父之臣與父之政是難能也又曰三年無改於父之道可謂孝矣夫仁人孝子於其父之臣非有大不可如晉悼公於夷羊五之屬以存始終進退之禮而不遽也歸父以君命出使未返而君薨在聘禮有執圭復命于殯之文升自西階子臣皆哭情亦戚矣今宣公猶未殯而東門氏逐忍乎哉書曰歸父還自晉者已畢事之詞也至笙遂奔齊者罪成公君臣死君而忘父逐之亟也穀梁子曰捐殯而奔其父之使者是亦奔父也得經意矣君薨家遣方寸宜亦亂而造次顛沛不失禮焉非志於仁者弗能也詞繁而不殺歸父之善自著矣比事以觀則見當國者有無君之心此春秋所以作不可不察也春秋集義卷三十四

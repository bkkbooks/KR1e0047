body:
  text: 春秋集義卷四十六宋李明復撰定公程頤曰定公名宋襄公子昭公弟恭王十一年即位定諡也安民大慮曰定元年春王謝湜曰即位之元年不書正月者以魯之嗣君未立故也頒正朔以正天下天王之事也承天王正朔以正一國諸侯之事也定公未立則不書正月不與季氏承王正也胡安國曰元年必書正月謹始也定何以無正月昭公薨於乾侯不得正其終定公制在權臣不得正其始魯於是曠年無君春秋欲謹之而不可也季氏廢太子衍及務人而立公子宋宋者昭公之弟其主社稷非先君所命而專受之於意如者也故不書正月見魯國無君定公無正主人習其讀而問其傳則未知己之有罪焉耳三月晉人執宋仲幾于京師謝湜曰諸侯城成周善之大者也宋仲幾違命不受功執之以治其罪義也雖然專執大夫於天王之側而不以王命治之不敬之大也故晉卿貶爵稱人胡安國曰按左氏諸侯㑹城成周宋仲幾不受功曰滕薛郳吾役也為是執之則有罪矣書晉人執仲幾於京師則貶詞也以王事討有罪何貶乎按周官司𨽻掌凡囚執人之事屬於司冦凡諸侯之獄訟定以邦典凡卿大夫之獄訟斷以邦法則大司冦之職也不告諸司冦而執人於天子之側故雖以王事討有罪猶貶凡此類皆篡弒之萌履霜之漸執而書其地謹之也每謹於初而禍亂熄矣夏六月癸亥公之喪至自乾侯戊辰公即位謝湜曰定公昭公弟公子宋也定公之立制在季氏故喪至六日而後即位季氏魯之大逆也定公以公弟受賊臣之立惡之大者書即位著其自立也胡安國曰昭公之薨已越葬期猶未得返至於六月癸亥然後喪至而定之即位乃在是月之戊辰蓋遲速進退為意如所制不得専也以周書顧命考之成王之崩在四月乙丑宰臣太保即於是日命仲桓南宫毛俾爰齊侯吕伋以二千戈虎賁百人逆王世子釗於南門之外延入翼室宅憂為天下主不待崇朝而後定也今昭公喪至在葬期之後公子宋自壞隤先入猶未得立是知為意如所制不得以時定非謂正棺乎兩楹之間故定公之即位不可不察也夫即位大事也宗嗣先定則變故不生蓋代君享國而主其祭宜戚宜懼一失機㑹或萌窺伺之心至於生變則為不孝矣古人所以貴於早定國家之本也今昭公之薨定公之即位春秋詳書于䇿非為後法乃見諸行事為永鑒矣秋七月癸巳葬我君昭公謝湜曰昭公雖死於外與隱閔遇難不殊春秋書葬者罪魯國不以季氏為逆也季氏吾君之仇也出其君而魯國莫之討也君死於外而魯國莫之疾也定公受其位而安之臣子受其葬而安之君臣之義廢矣書昭公之葬所以罪魯國之安季氏也春秋賊不討君不書葬昭公書葬則變例於終以起義也九月大雩立煬宫謝湜曰煬公伯禽子廟毁久矣復以私意立之非禮也宗廟之禮其逺近以年其進退以義非其退而退之為不懷非其進而進之為不敬胡安國曰焬公伯禽之子其曰立者不宜立也喪事即逺有進而無退宫廟即逺有毁而無立胡宏曰煬公至是十九世是祧主也其不可立宫明甚所以立之者季氏以少子當魯國祭祀自專廢立自恣重賂足以結四鄰私恩足以收百姓所懼神怒或降之罰耳故有禱於煬公而立宫也聖人筆之使後人考其世尋其由則季氏誣神之罪著而禮制不至遂亂矣冬十月隕霜殺菽謝湜曰建酉之月霜已栗烈菽不勝霜故隕霜殺菽草害稼菽養人十二月霜不殺草異之大者也十月霜殺菽災之大者也胡安國曰穀梁子曰菽舉重也未可以殺而殺舉重可殺而不殺舉輕其象則刑罰不中之應二年春王正月夏五月壬辰雉門及兩觀災謝湜曰宫室過制天之所不與然則雉門及兩觀災乃天惡其僭而災之也秋楚人伐吳冬十月新作雉門及兩觀謝湜曰雉門兩觀為火所壞故魯人於此新作焉門闕之災以僭制也魯人乘災變之後復以僭制為之不知畏天者也雉門兩觀書新作書及惡其不知變也延廄因舊而葺之故書新南門雉門兩觀則去舊而為之故書新桓宫僖宫之類作不復書者以災不由僭故也胡安國曰書新作譏借王制而不能革也雉門象魏之門其外為庫門而臯門在庫門之外其內為應門而路門在應門之內是天子之五門也僖公嘗修泮宫復閟宫非不用民力而春秋不書新作南門則獨書者南非一門也必有不當為者子家駒以設兩觀為僭天子是非諸侯之制明矣夫撥亂反正者必本諸身身正者物必正春秋於僭君必書者必正之意也使定公遇災而懼革其僭禮三家陪臣其敢僭諸侯執國命乎習舊而不知以為非何以禁季氏之脅其主矣三年春王正月公如晉至河乃復程頤曰意如上不請於天子而立定公故晉怒而公往朝焉晉辭公而復故明年因㑹而請盟謝湜曰季氏强盛公室微弱故公初朝晉晉人辭之皆季氏交結晉室之罪也二月辛卯邾子穿卒夏四月秋葬邾莊公冬仲孫何忌及邾子盟于拔四年春王二月癸巳陳侯吳卒三月公㑹劉子晉侯宋公蔡侯衛侯陳子鄭伯許男曹伯莒子邾子頓子胡子滕子薛伯把伯小邾子齊國夏于召陵侵楚程頤曰楚恃强侵諸侯晉請於天子伐之而不能明暴其罪以行天討無功而還故書侵以罪之謝湜曰楚子納尹氏王子朝病蔡拘蔡侯其罪在所討也晉定公以王命合諸侯于召陵將以伐楚也然諸侯不能明大義以伐有罪乃以冦暴之師侵之而已可以正楚而服之哉召陵之㑹書侵楚罪諸侯之不正也胡安國曰按左氏傳書伐而經書侵楚者楚為無道憑陵諸夏為一裘一馬拘唐蔡二君三年而後遣蔡侯既歸請師於晉晉人請命於周大合諸侯天子之元老在焉若能暴明其罪恭行天討庶幾王者之師齊桓晉文之功褊矣有荀寅者求貨於蔡侯弗得遂辭蔡人晉由是失諸侯無功而還書曰侵楚陋之也吕祖謙曰是時晉雖無盟主之實其承襲世業尚有盟主之虛名所以蔡侯赴訴於晉當時晉之不為盟主也久矣晉於此當因蔡之怒以奉王命㑹諸侯之師以討楚則城濮之功可以再立文公之霸業可以再興晉既不能與蔡救患方且求貨於蔡侯自此晉失霸蔡被子常求貨無厭見晉尚稱霸主所以赴訴今晉之執政又求貨於蔡侯是脫子常於楚又見子常於晉他到這裏事窮計迫安得不歸命於吳夏四月庚辰蔡公孫姓帥師滅沈以沈子嘉歸殺之謝湜曰沈不㑹召陵沈人之失也滅其國以其君歸既歸而殺之蔡公孫姓之虐也將討不仁而反為不仁將討不義而反為不義前書侵楚後書滅沈召陵之師暴亂不法其惡見矣胡安國曰沈人不㑹於召陵晉人使蔡伐之書滅沈罪公孫姓也書以歸罪沈子嘉也書殺之罪蔡侯也奉辭致討而覆其邦家為敵所執不死於位皆不仁矣所惡於前無以先後出乎爾者反乎爾者也蔡侯視楚猶沈視蔡也昭公拘於郢三年而後反非以國小而弱乎沈雖不㑹召陵未有大罪惡也而恃强殺之甚矣能無公孫翩之及哉宋以曹伯陽歸蔡以沈子嘉歸皆殺之也而或書或不書其不書者賤而略之也五月公及諸侯盟于臯鼬程頤曰公以不獲於晉故因㑹而求盟則此盟公意也故書公及謝湜曰晉卑魯君久矣朝則辭之盟則退之臯鼬之盟定公得與盟書公及諸侯所以抑晉而伸魯也是盟也諸侯不與劉子同盟尊王臣也尊王臣諸侯同其善故盟稱諸侯胡安國曰定公之立上不請於天王下不告於方伯而受國於季孫意如故三年朝晉至河而復今㑹諸侯求為此盟書公及者內為志也召陵之㑹必序不序十有八國之諸侯則無以見侵楚之陋臯鼬之盟序與不序非義所係則以凡舉可也杞伯成卒于㑹謝湜曰方用師則書卒于師師退而盟則書卒于㑹不當㑹不當師則書地六月葬陳惠公許遷于容城謝湜曰許又自白羽遷容城國無定處民無定守故自葉至容城凡四遷秋七月公至自㑹劉卷卒謝湜曰王臣以赴告之禮交於列國非禮也劉子卷奪爵貶之也葬把悼公楚人圍蔡謝湜曰蔡滅沈故楚圍蔡晉士鞅衛孔圍帥師伐鮮虞葬劉文公謝湜曰王臣卒魯以外諸侯㑹葬非禮也冬十有一月庚午蔡侯以吳子及楚人戰于柏舉楚師敗績楚囊瓦出奔鄭謝湜曰楚人病蔡久矣蔡之求伐楚也既以其子元與其大夫之子為質於晉又以其子乾與其大夫之子為質於吳楚人怨深於蔡可知也吳楚相為仇讎久矣柏舉之戰吳人願致其力故蔡雖微弱蔡侯能役吳子而用之也吳稱子著其强也楚稱人著其惡也蔡與吳稱以示其得吳之死力也晉侯以蔡之難假王命大合諸侯將以伐楚也然召陵之㑹以冦盜侵之而已未能聲楚之罪而服之也蔡侯獨以吳子之力乃能一戰楚師而敗之以至楚人震懼囊瓦出奔然則列國討罪反不若吳人制楚之暴也召陵書侵楚柏舉書師敗績罪中國之衰也胡安國曰吳何以稱子善伐楚解蔡圍也荆楚暴橫盟主不能致其討天王不得逹其命長惡不悛復興師而圍蔡王法所當討而不赦也吳能自卑聽蔡侯之義以逹天子之命興師救蔡戰于柏舉大敗楚師成伯討之功善矣晉主夏盟中國所仰若嘉穀之望雨也有請於晉如彼其難吳國天下莫强焉非諸侯之所能以也有請於吳如此其易故召陵之㑹大合諸侯而書侵楚柏舉之戰蔡用吳師特書曰以者深罪晉人保利棄義難於救蔡也然則何以不言救乎救大矣闔閭子胥宰嚭皆懷謀楚之心蔡人往請㑹逢其適非有救災恤鄰從簡書憂中國之實也聖人道大德宏樂與人為善故因其從蔡特進而書爵囊瓦貪以敗國又不能死可賤甚矣故記其出奔特貶而稱人春秋之情見矣朱熹曰吳之所以得破楚也是楚平以後日就衰削又恰限使得伍子胥如此先又有申公巫臣往吳教之射御戰陳這兩人所以不向齊晉那邊去也是見得齊晉都破壞了兼那時如闔閭夫差勾踐幾人皆是南蠻中之豪傑庚辰吳入郢謝湜曰吳之敗楚也吳已制楚之暴矣以義正楚而服之中國之道也入其國夷其宫徙其器撻其墓則其暴又甚於楚入郢稱吳狄之也險之不可負也久矣楚人恃江山之固自以為若磐石之安也然吳自柏舉一勝十日遂入郢都有國者不可不戒也胡安國曰及楚人戰則稱爵入郢則舉其號何也君舍於其君之室大夫舍於大夫之室狄道也聖人誰毁誰譽救災恤鄰則進而書爵非有心於與之順天命也乘約肆淫則黜而舉號非有心於貶之奉天討也伐國者固將拯民於水火之中而鳩集之耳殺其父兄係其子弟毁其宗廟遷其重器而亂男女之配也如水益深如火益熱則善小而惡大功不足以掩之矣聖人心無毁譽如鏡之無妍醜也因事物善惡施於褒貶焉不期公而自公爾明此義然後可司賞罰之權得春秋之法矣吕祖謙曰吳之伐楚所以入郢幾於滅楚論其源流固有自來自子常為令尹貪冒信讒所以致亡之道固非在於交戰之日然當時所以致敗所以速亡蓋自有說當吳伐楚自豫章與楚夾漢左司馬戍謂子常曰子㳂漢而與之上下我悉方城外以毁其舟還塞大隧直轅冥厄子濟漢而伐之我自後擊之必大敗之司馬說令尹與之上下欵楚人兵不能與戰司馬之謀要得子常禦吳人於前司馬以奇兵繞出吳之後使子常聽之則伍員孫武亦無應楚之䇿勝敗未可知然子常所以敗正緣史皇謂子常楚人惡子而好司馬若司馬毁吳舟於淮塞城口而入是獨克吳也子必速戰不然不免乃濟漢而陳然所以喪師幾亡國全在此子常平日固失人心國勢已危使其委心聽司馬之謀勝敗尚未可知亦未至於亡國惟其私心疾忌謂楚惡已而好司馬怕司馬有功不使之先戰所以敗子常於國家危如纍卵之時尚且忌賢疾能恐他人有功不恤國家之安危此其所以亡大抵看古今亂亡之由無不由立朝之臣以私意忌克所以看史皇謂子常子必速戰不然不免諷味他這幾句楚安得不亡以此一段看秦漢之後五代以前所以亡國同出一轍往往皆此心當時子常背司馬之約先戰屢戰屢敗至於柏舉之戰楚師大敗子常奔鄭吳自此入郢當時史皇獻謀不用以其乘廣死楚之幾亡生於楚人惡子而好司馬之一言雖區區能死不過匹夫匹婦自經於溝瀆之諒本不足論看史皇之言半正半邪初間與子常說楚人惡子而好司馬數句便是李林甫盧把一等人便是李林甫盧杞所說之語子常欲奔史皇曰安求其事難而逃之將何所入子必死之到得子常不用他言出奔鄭他便自死於軍後靣一段便是張巡顔杲卿一等人便是張巡顔杲卿口裏說話何故史皇之為人半正半邪此段終至於自死也不是大段姦僞底人尚自知恥畏義這箇人平日不曽克私意於愛憎勝負之間消磨未盡前靣教子常奪司馬之功致於亡楚看他後靣死於軍本是一箇知恥畏義底人緣他愛憎勝負之間不曾克私意論其罪考其實與李林甫盧把罪一等可為學者深戒看後靣狥社稷也緣平日不克私意所以至此何况未有史皇之畏義於愛憎勝負安得不十分消磨學者須切近看這般事五年春王三月辛未朔日有食之夏歸粟于蔡謝湜曰患難相救禍災相恤荒歉相賙諸侯之更事也故蔡饑而魯遺之粟曰歸於越入吳謝湜曰於越越之别封也吳知郢之利在前而不知越之患在後故吳子涉千里之險入郢於越乘一朝之釁入吳空內務外有國之大患也故楚人棄國圍蔡而吳入郢吳人棄國圍楚而越入吳六月丙申季孫意如卒范祖禹曰禮樂征伐自諸侯出者十世天子希不失其天下者矣自大夫出者五世諸侯希不失其國者矣陪臣執國命者三世大夫希有不失其家者矣天子有天下諸侯有國大夫有家必久而後失之力有小大德有厚薄其理然也蓋周自昭王考其世短道微至幽王而七十世矣魯自宣公三家始强季氏自武子至桓子制於家臣四世矣希不失者不必皆如之其大略不過此矣謝湜曰桓公之年書公子翬宣公之年書公子遂定公之年書季孫意如以著三公之逆也意如書卒罪魯國不以意如為逆而討之也春秋卿逆不書卒意如書卒則變例於終以起義也胡安國曰內大夫有罪見討則不書卒公子翬是也仲遂殺惡及視罪與翬同而書卒者以事之變卒之也意如何以書卒見定公不討逐君之賊以為大夫全終始之禮也定公雖受國於季氏茍有叔孫婼之見不賞私勞致辟意如以明君臣之義則三綱可正公室强矣今茍於利而忘其讎三綱滅公室益侵陪臣執命宜矣故意如卒主人習其讀而問其傳則未知己之有罪焉耳吕祖謙曰陽貨自平子疾專政及平子卒囚季桓子以陪臣之微秉一國之政論季氏是强家大族在平子時親逐君非不強何故身死未幾便為陪臣據其家如此之速因是說道天下無道則禮樂征伐自諸侯出又降而自大夫出又降而自陪臣出僭亂之萌既開彼此相倣天下之大勢都如此須又自就著實處看魯之權所以在大夫者何故正緣有慶父襄仲之難所殺者三君季友與季文子有定君之功自此專權因成弒君之亂此權所以在大夫季氏之權所以在陪臣何故蓋季平子所以能逐君外則諸侯從之內則國人服之豈平子一手一足所能自致皆是家臣强悍勇知之人為之爪牙摶擊於外乃可如陽貨者實宣力焉於是假借長飬他惟恐他惡不强但知崇奬他而不知其利在前其毒在後及昭公死定公立季氏長養容縱家臣之禍方出來蒲圃之亂幾亡其所以不亡者僅於一髮天下事利於一時之便其後未有不反為所害者譬如要得放縱肆欲之人服丹藥相似後來血氣既衰未有不為癰為疽反以喪其軀者當時雖得他不義後來為其不義所敗古之君子言必慮其所終行必稽其所蔽蓋為此也秋七月壬子叔孫不敢卒冬晉士鞅帥師圍鮮虞謝湜曰伐而不服故圍之六年春王正月癸亥鄭遊速帥師滅許以許男斯歸謝湜曰許自易都避難凡四遷形勢日削不可以為國故鄭滅許二月公侵鄭公至自侵鄭謝湜曰鄭滅許故公侵鄭夏季孫斯仲孫何忌如晉謝湜曰二卿出聘罪其不率也秋晉人執宋行人樂祁犂謝湜曰宋行人以國事通於晉宋國有過非行人之罪也故晉侯稱人胡安國曰稱人以執非伯討也祁犂聘于晉主趙簡子飲酒焉獻楊楯六十范趙方惡其宰曰昔吾主范氏今子主趙氏是賈禍也范獻子果怒言於晉侯曰以君命越疆未致使而私飲酒不敬二君不可不討也乃執樂祁執非無名何以非伯討也使范趙方睦皆有獻焉則弗執之矣執異國行人出於列卿私意威福之柄移矣三卿分晉而靖公廢為家人豈一朝一夕之故哉吕祖謙曰宋樂祁言於景公曰諸侯唯我事晉今不使往晉其憾矣樂祁告其宰陳寅寅曰必使子往子立其後而行料得晉政多門必遇其禍樂祁用其言見溷而行及祁到晉果如陳寅之言為范宣子所執終不得歸看這一段事當時陳寅之謀也自精密此不足論因此可論天下大勢考左氏所載本末可以視春秋天下大勢若是桓文以前諸侯多見於左氏所載凡見於征伐㑹盟之間皆諸侯自相為謀蓋當時之政自諸侯出故也自雞澤湨梁之㑹大夫専盟全不見諸侯言語宋之一㑹多是趙武等說話大夫之事多見於傳蓋當時之政自大夫出故也及春秋末後一節陪臣執政如陽貨如梁懷如公山不狃北宫氏之宰如樂祁陳寅是時家臣事迹言語多見於傳蓋當時之政自陪臣出故也以三者觀天下大勢可見政在諸侯縱天子失權然猶可言政在大夫縱諸侯失權尚可整頓到得陪臣名字見於書傳當時大勢亦自可知冬城中城季孫斯仲孫何忌帥師圍鄆謝湜曰鄆二於齊故圍鄆季桓子專政孟懿子為輔故如晉圍鄆書二卿春秋集義卷四十六

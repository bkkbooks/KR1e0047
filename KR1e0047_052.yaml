body:
  text: 春秋集義卷四十九宋李明復撰哀公元年春王正月公即位程頤曰哀公名蔣定公子恭王二十六年即位哀謚也恭仁短折曰哀楚子陳侯隨侯許男圍蔡謝湜曰許已為鄭屬邑矣隨楚圍蔡復書許男者不與鄭之滅許也胡安國曰按左氏曰報栢舉也蔡人男女以辨使疆于江汝之間夫男女以辨則是降也疆于江汝則遷其國也而獨書圍蔡何也蔡嘗以呉師入郢昭王奔隨壞宗廟徙陳器撻平王之墓矣至是楚國復寜帥師圍蔡降其衆遷其國而春秋書之畧者見蔡宜得報而楚子復讎之事可恕也聖人本無怨而怨出於不怨故議讎之輕重有至於不與共戴天者今楚人禍及宗廟辱逮父母若包羞忍耻而不能一洒之則不可以有國而天理滅矣故特書圍蔡而稱爵恕楚之罪詞也鼷鼠食郊牛改卜牛夏四月辛巳郊謝湜曰事天以誠敬為主惟誠敬為能動天故也古者牲用犢器用陶匏掃地而祭以誠為主也魯之郊或四五卜或以四月五月或以九月或牛之口傷或鼠食牛角或鼠食牛或牛死或免牲或免牛或不郊其不敬至矣此天所以惡之而變起於郊也若夫精誠足以感自然之情清明足以通自然之徳掃地則歆之矣又奚有魯郊之變哉胡安國曰鼷鼠食郊牛改卜牛志不敬也夏四月郊書不時也四卜非禮五卜强也全曰牲傷曰牛已牛矣其尚卜免之何也嘗置之上帝矣故卜而後免之不敢専也昔者周公郊祀后稷以配天此成王諒陰之時位冢宰攝國政行天子之事也魯何以得郊成王追念周公有大勲勞於天下而欲尊魯故賜以重祭得郊禘大雩然則可乎孔子曰魯之郊禘非禮也周公其衰矣欲尊魯而賜以人臣不得用之禮樂豈所以康周公也哉天子祭天地諸侯祭社稷大夫祭五祀庶人祭其祖此定禮也今魯得郊以為常事春秋欲削而不書則無以見其失禮盡書之乎則有不勝書者故聖人因其失禮之中又有失焉者則書於䇿所謂由性命而發言也聖人奚容心哉因事而書以誌其失為後世戒其垂訓之義大矣秋齊侯衛侯伐晉謝湜曰晉欲納蒯聵故二國伐晉冬仲孫何忌帥師伐邾謝湜曰邾子來㑹來朝來奔喪猶不免難以魯之所欲者邾之土地也書伐邾著魯之不道也二年春王二月季孫斯叔孫州仇仲孫何忌帥師伐邾取漷東田及沂西田謝湜曰以邾微國而三卿帥師伐之以田故也邾人入田以求免難故取漷東沂西田書取罪其不義也書漷東沂西謹邾之分地也取漷東猶未足於是又取沂西書及沂西罪其無厭也癸巳叔孫州仇仲孫何忌及邾子盟于句繹謝湜曰脅其地而盟其君盟之不義者也胡安國曰曷為列書三卿哀公得國不張公室三卿並將魯衆悉行伐國取地以盟其君而已不與焉適越之辱兆矣定公之薨邾子來奔喪事魯恭矣而不免於見伐徒自辱焉不知以禮為國之故也邾在邦域之中不加矜恤而諸卿相繼伐之既取其田而又强與之盟不知以義睦隣之故也故詳書以著其罪三人伐則曷為二人盟盟者各盟其所得也莫强乎季孫何獨無得乎季氏四分公室有其二昭公伐意如叔孫氏救意如而昭公孫陽虎囚桓子孟孫氏救桓子而陽虎奔今得邾田盖季氏以歸二家而不取也夏四月丙子衛侯元卒滕子來朝晉趙鞅帥師納衛世子蒯聵于戚程頤曰蒯聵得罪於父不得復立輙亦不得背其父而不與共國委於所可立使不失君之社稷而身從父則義矣又曰孔子聞衛亂曰柴也其來由其死矣二者盖皆適於孔悝受命立輙若納蒯聵則失職與輙拒父則不義如輙避位則拒蒯聵也如輙拒父則奉身而退可也故子路欲勸孔悝無與於此忠於所事也而孔悝既被脅矣此子路不得不死然燔臺之事則過於勇暴也又或問左氏言子路助衛輙觀其學已升堂肯如是否曰子路非助輙只為孔悝䧟於不義欲救之耳盖蒯聵不用君父之命而自立强盟孔悝孔悝不合從之故也子路當時可免難否曰不可免楊時語録或問夫子為衛君子貢自以意對可也何必更以夷齊為問曰向嘗解此一叚亦未盡蒯聵得罪先君而輙乃先君之命此其可疑又與夷齊事頗相類故以問也當是時聵以父爭輙便合避位國人擇宗室之賢者立之乃善又問伯夷當初若還立時如何曰伯夷不得罪於先君又問子路事孔悝死得是否曰亦是若使孔子為之則如之何曰它當自有處也又問方聵爭之時勸輙避位不從則去之如何曰可子路先亦勸孔悝不可與其事只是失之太遲若使子貢問衛君孔子必不答居是邦不非其大夫况君乎聵輙事史記兩處出當以衛世家為正謝湜曰蒯聵未絶於衛故稱世子輙以君命拒父故晉趙鞅納蒯聵於戚王父之命不可違也蒯聵以親則父也以位則世子也以義則未絶於國也為衛國計者使輙先以君命即位次以父恩遜位輙既受位而後辭則上不違先君顧屬之命下不傷父子先後之倫衛之大事兩順而不逆矣失此道至使輙以子拒父而趙鞅有納世子之師故蒯聵納稱世子以責衛之臣子也胡安國曰世子不言納位其所固有國其所宜君謂之儲副則無所事乎納矣凢公子出奔復而得國者其順且易則曰歸有奉焉則曰自其難也則曰入不稱納矣况世子哉今趙鞅帥師以蒯聵復國而書納者見蒯聵無道為國之所不受也國人不受而稱世子者罪衛人之拒之也所以然者縁蒯聵出奔靈公未嘗有命廢之而立他子及公卒大臣又未嘗謀於國人數蒯聵之罪選公子之賢者以主其國乃從輙之所欲而君之以子拒父此其所以稱世子也人莫不愛其親而志於殺莫不敬其父而忘其喪莫不慈其其子欲其子之富且貴也而奪其位蒯聵之於天理逆矣何疑於廢黜然父雖不父子不可以不子輙乃據國而與之爭可乎故特係納衛世子蒯聵於戚於趙鞅帥師之下而鞅不知義靈公與衛國大臣不能早正國家之本以致禍亂其罪皆見矣胡宏曰蒯聵無父出奔稱世子者罪其佻謀非常至於出奔失世子之道也趙鞅納之而稱世子者罪大臣輔輙而拒父也蒯聵無父輙亦無父天下豈有無父之人而可以事宗廟社稷為人上者哉故孔子為政於衛則必具靈公父子祖孫之本末上告於天王下告於方伯乞立公子郢然後人倫明天理順無父之人不得肆名正而國家定矣朱熹曰孔子若仕於衛必先正其君臣父子之名如蒯聵不當立輙亦不當立當去輙而别立君以拒蒯聵晉趙鞅欲立蒯聵聖人出時必須大與他剖判一畨教他知箇是與不是或問論道理固是去輙使國人自拒蒯聵以事情論之晉人正主蒯聵勢足以壓衛聖人如何請於天子請於方伯天子既自不奈何方伯又是晉自做如何得曰道理自是合如此了聖人出來須自能使晉不為蒯聵或因問如請討陳恒之事也只是據道理不論事情曰如這一兩件大事可惜聖人做不透若做得透使三綱五常既壞而復興千條萬目自此而更新聖人年七十四嵗拳拳之心終做不成張栻曰衛輙之事國人論之以為蒯聵既得罪於先君而出奔而輙受先君之命宗國不可以無主則立輙而拒蒯聵可也曾不知蒯聵父也輙子也父子之義先亡而可一日立乎故子貢以夷齊之事為問方是時夫子在衛輙立之事蓋難言也賜也微其辭以測聖人之㫖可謂善為辭者矣秋八月甲戌晉趙鞅帥師及鄭罕逹帥師戰于鐡鄭師敗績謝湜曰罕逹為衛來討蒯聵趙鞅為蒯聵來討罕逹故二師交戰於鐵鄭非晉敵故鄭師敗績鐵衛地杜氏謂戚城南是也左氏所載誤矣冬十月葬衛靈公十有一月蔡遷于州來蔡殺其大夫公子駟謝湜曰州來呉所滅小國也蔡懼楚故遷于州來不能保國而遷國以避難罪其失守土之道也以小事大智之事也蔡公孫姓帥師滅沈蔡侯以呉子敗楚師失事大之道矣然則遷於州來蔡人之自取也胡安國曰州來呉所滅也蔡雖請遷於呉而中悔呉人如蔡納聘而師畢入蔡侯告大夫殺公子駟以説哭而遷墓如此則實呉人之所遷也而經以自遷為文何也楚既降蔡使疆於江汝蔡人聴命而還師矣復背楚請遷於呉而又自悔也其謀之不臧甚矣夫遷國大事也盤庚五遷利害甚明衆猶胥怨不適有居至於丁寜反覆播告之修而後定也今蔡介於呉楚二大國之間背楚誑呉及其事急又委罪於執政其誰之咎也故經以自遷為文而殺公子駟則書大夫而稱國言君與用事大臣擅殺之也故公孫獵則書大夫而稱人言國亂無政衆人擅放之也駟與獵其以請遷於呉為非者乎而委之罪以説誰敢有復盡忠而與謀其國者哉三年春齊國夏衛石曼姑帥師圍戚謝湜曰魚石晉為宋討也宋事以晉首兵者善晉以諸侯討逆也蒯聵齊為衛討也衛事以齊首兵者不以子討父也晉圍彭城書宋者正彭城歸於宋也齊圍戚不書衛者不以子制父也父子人之大倫也大倫不正則人道墮矣此春秋所以謹之也胡安國曰按左氏靈公遊於郊公子郢御公曰余無子將立汝對曰郢不足以辱社稷君其改圖君夫人在堂三揖在下君命祗辱靈公卒夫人曰命公子郢為太子君命也對曰郢異於他子且君没於吾手若有郢必聞且亡人之子輙在乃立輙以拒蒯聵蒯聵前稱世子者所以深罪輙之見立不辭而拒其父也輙若可立則蒯聵為未絶未絶則是世子尚在而可以拒乎主兵者衛也何以序齊為首罪齊人與衛之為惡而黨之也公孫文仲主兵伐鄭而序宋為首以誅殤公石曼姑主兵圍戚而序齊為首以誅國夏訓天下後世討亂臣賊子之法也古者孫從祖又孫氏王父之字考於廟制昭常為昭穆常為穆不以父命辭王父命禮也輙雖由嫡孫得立然非有靈公之命安得云受之王父辭父命哉故冉有謂子貢曰夫子為衛君乎子貢曰諾吾將問之入曰伯夷叔齊何人也曰古之賢人也怨乎曰求仁而得仁又何怨出曰夫子不為也伯夷以父命為尊而遜其弟叔齊以天倫為重而讓其兄仲尼以為求仁而得仁者也然則為輙者奈何宜辭於國曰若以父為有罪將從王父之命則有社稷之鎮公子在我焉得為君以為無罪則國乃世子之所有也天下豈有無父之國哉而使我立乎其位如此則言順而事成矣是故輙辭其位以避父則衛之臣子拒蒯聵而輔之可也輙利其位以拒父則衛之臣子舍爵禄而去之可也烏有父不慈子不孝爭利其國滅天理而可為者乎夏四月甲午地震五月辛夘桓宫僖宫災謝湜曰桓宫僖宫當毁不毁而天災及之此天人之際其應甚於影響者也故逆則災生順則福至天人之常理也胡安國曰桓僖親盡矣其宫何以存季氏者出於桓立於僖世專魯國之政其諸以是為悦而不毁歟何以不稱及等也稱及則祖有尊卑矣或謂祖有功宗有徳所以勸也則如之何曰孝子慈孫事其祖考仁也或七廟或五廟自是以衰禮也奚問其功徳之有無也必若此言是子孫得選擇其祖宗而尊事之矣豈理也哉吕祖謙曰桓僖災季氏出自桓公後僖在當時稱賢君魯躋之於閔公之上季孫斯叔孫州仇帥師城啟陽謝湜曰貪土田以致冦城邊邑以備難故比年凡四城宋樂髠帥師伐曹秋七月丙子季孫斯卒蔡人放其大夫公孫獵于呉謝湜曰放稱人著公孫獵得罪於國人也獵茍不忠於蔡而放之於呉乃以蔡之禍養之於强夷也失政莫大焉冬十月癸夘秦伯卒叔孫州仇仲孫何忌帥師圍邾謝湜曰脅其地盟其君句繹之血未乾而又帥師圍邾魯國之罪也來㑹來朝來奔喪猶不免伐取漷沂田受繹盟猶不免圍小國困於水火甚矣四年春王二月庚戌盜殺蔡侯申謝湜曰盜殺蔡侯書殺不書君者盜不可責以君臣之義故也以國君之尊而盜起殺之朝無屏衛國無政刑可知也刑人與盜皆人倫所不齒也朝無屏衛國無政刑則盜與刑人出為至尊仇敵其可不戒邪蔡昭既以國遷而又殺大夫公子駟放大夫公子獵方是時大夫離貳人民憂危故盜乘其亂起而為逆也然則昭公國遷州來而身死於盜皆其危弱取之也胡安國曰按左氏蔡侯將如呉諸大夫恐其又遷也公孫翩逐而射之卒然則翩非微者其以盜稱何也蔡侯背楚誑呉又委罪於執政其謀國如是則信義俱亡禮文並棄無以守身而自衛夫人得而害之矣故變文書盜以警有國之君也翩弑君而畧其名氏姓與霍皆翩之黨稱國以殺而不去其官者二公孫蓋常謀國不使其君至於是而弗見庸者也故書法如此而或者以翩非微者而稱盜蘇轍以謂求名而不得非矣天下豈有欲求弑之名春秋又惜此名而不與者哉蔡公孫辰出奔呉謝湜曰杜氏謂背君之黨葬秦恵公宋人執小邾子謝湜曰小邾子微弱强國不以諸侯待之乆矣執小邾子不名者以諸侯之禮尊之也以諸侯尊之所以罪强國之執也晉執邾子邾執鄫子雖失國皆不名其義一也夏蔡殺其大夫公孫姓公孫霍謝湜曰杜氏謂背君之黨晉人執戎蠻子赤歸于楚謝湜曰楚圍蠻氏戎蠻子奔晉隂地則赤已失國矣故晉執戎蠻子書名晉為楚擅執諸侯且不歸於京師而歸於楚是以楚為邦國主而歸之也晉侯書人貶之也書歸於楚罪其背王室而臣僣亂也胡安國曰楚圍蠻氏蠻子赤奔晉楚謂晉曰晉楚有盟好惡同之若將不廢則寡人之願也不然將通於少習以聴命趙鞅曰晉國未寜安能惡楚必速與之乃詐執蠻子以畀楚師其曰晉人云者罪之也蠻子赤何以名戎蠻也無罪見執亦書名外之也文公執曹伯則曰畀宋人今此曷云歸於楚歸於楚者猶曰京師楚也晉主夏盟為日久矣不競至此春秋所惡城西郛謝湜曰城西郛以備晉也天下有道守在四裔魯城西郛取卑之道也六月辛丑亳社災程頤曰觀書者亦須要知得隨文害義如書曰湯既勝夏欲遷其社不可既處湯為聖人聖人不容有妄舉若湯始欲遷社衆議以為不可而不遷則是湯先有妄舉也不可者湯不可之也湯以為國既亡則社自當遷以為遷之不若不遷之愈故但屋之屋之則與遷之無以異既為亡國之社則自王城至國都皆有之使為戒也故春秋書亳社災然則魯有亳社屋之故有火災此制計之必始於湯也程氏學曰湯既勝夏欲遷其社不可聖人所欲不踰矩既欲遷社而又以為不可欲遷是則不可為非矣不可是則欲遷為非矣然則聖人亦有過乎曰非也聖人無過夫亡國之社遷之禮也湯存之以為後世戒故曰欲遷則不可也記曰喪國之社屋之不受天陽也又曰亳社災然則皆自湯之不遷故也謝湜曰商受暴虐國滅世絶所存惟亡國之社而已今亦遇禍而災則天之厭商可知也亳社書災所以為不道者之戒也國以社為主故有國必有社國亡則社不靈故亡國之社屋之不使上逹也秋八月甲寅滕子結卒冬十有二月葬蔡昭公謝湜曰凢諸侯遇害於外或為盜所殺則賊雖未獲臣子之恩得伸故書葬葬滕頃公五年春城毗夏齊侯伐宋晉趙鞅帥師伐衛謝湜曰蒯聵未入衛故鞅伐衛秋九月癸酉齊侯杵臼卒冬叔還如齊閏月葬齊景公謝湜曰喪不數閏計期故也葬則數閏可也月足則葬事可成故也六年春城邾瑕晉趙鞅帥師伐鮮虞呉伐陳夏齊國夏及高張來奔謝湜曰景公疾使國高立孺子荼公卒陳乞為亂故國夏高張來奔荼之立國夏為謀主其禍連及高張故奔書及叔還㑹呉于柤秋七月庚寅楚子軫卒謝湜曰軫楚昭也胡宏曰楚國敗壞於嚢瓦創夷於呉幾至滅亡昭王之所以復國而益安强者皆公子申之謀也或問申於孔子子曰彼哉彼哉聖人度量𢎞逺而責人以恕何獨於子西如此乎按楚之先鬻熊為文王師以封於楚而熊通越禮僭號聖人黜之等於荆蠻文莊而後與中國並駕齊驅聖人進之同於諸夏逮昭王之時中國衰微諸侯放恣大夫暴横無可告語者而昭王獨發大論皆當於道若左右得其人其進未可量也惜也子西得君之專執政之久曽不能輔之變楚俗匡天下瞢瞢然守舊規而已故仲尼責之如此齊陽生入于齊齊陳乞弑其君荼程頤曰稱陽生見景公廢長立少以啓亂也謝湜曰陽生之入陳乞召之也立陽生遷孺子陳乞之命也由此上下易位而齊君被難於姦㓙之手矣齊國廢立之權皆出於乞故荼之禍以首惡歸陳乞而罪之也陽生上不由王命下不由君命以公子入而爭國其罪在所絶也奪公子稱人著陽生之惡也國夏為國正卿不知早正太子以安國本倉卒立孺子於先君疾病之時何以杜姦臣覬覦之患哉此陽生之禍所以發於陳乞也胡安國曰陽生曷為不稱公子非先君之子也為人子者無以有已則以父母之心為心者景公命荼世其國已則簒荼而自立是自絕於先君豈復得為先君之子也不稱公子誅不子也陽生不子則曷為繫之齊春秋端本之書也正其本則事理陽生之不子也其誰使之然也不有廢長立少以啓亂者乎故齊景公問政於孔子孔子對曰君君臣臣父父子子君不君則臣不臣父不父則子不子以陽生繫齊者著亂之所由生也然而弑荼者陽生與朱毛也曷為書陳乞初景公謂陳乞吾欲立荼如何對曰所樂乎為君者欲立之則立之不欲立則不立也君如欲立則臣請立之陽生謂乞曰吾聞子蓋將不欲立我也對曰千乘之主將廢正而立不正必殺正者吾不立子者所以生子也與之玉節而走之魯景公死荼立陳乞使人迎陽生寘諸家召諸大夫而示之曰此君也諸大夫知乞有備不得已逡巡北面再拜而君之爾故里克中立不免殺身之刑陳乞獻諛終被弑君之罪是皆不明春秋之義䧟於大惡而不知者也冬仲孫何忌帥師伐邾宋向巢帥師伐曹七年春宋皇瑗帥師侵鄭晉魏曼多帥師侵衛夏公㑹呉于鄫謝湜曰六年㑹呉於柤七年㑹呉於鄫魯之畏呉甚矣非保國之道也秋公伐邾八月己酉入邾以邾子益來程氏學曰荆敗蔡師於莘以蔡侯獻舞歸晉師滅赤狄潞氏以潞子嬰兒歸公入邾以邾子益來之類書敗書滅書入而以其君皆名者為其服而以之歸也唯楚師滅䕫以䕫子歸不名者逺方小國魯史有所不能知不可得而紀故也以沈子嘉歸殺之則蔡人之不道尤不容誅矣以邾子益來獨不曰歸者以我而言内外異辭文體然耳謝湜曰伐其國入其都虜其君魯之不道也邾子益名者以其屈辱無興復之志也胡安國曰春秋隠君之惡故滅國書取婉以成章而不失其實也恃强陵弱無故伐人而入其國處其宫晝夜掠以其君來獻於亳社囚於負瑕此天下之惡也呉師為是克東陽齊人為是取吾二邑辱國亦甚矣何以備書於䇿而不諱乎聖人道隆而徳大人之有惡務去之而不積也則不念其惡而進之矣以邾子益來惡也歸邾子益於邾是知其為惡能去之而不積也故書以邾子來而不諱者欲見後書歸邾子之為能去其惡而與之也聖人之情見矣明此然後可以操賞罰之權不明乎此以操賞罰之權而能濟者鮮矣宋人圍曹冬鄭駟𢎞帥師救曹謝湜曰樂髠帥師伐曹向巢帥師伐曹宋人圍曹曹之病宋乆矣大國無一為之援而鄭能帥師救之善之也春秋集義卷四十九

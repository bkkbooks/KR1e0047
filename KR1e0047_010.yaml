body:
  text: 春秋集義卷七宋李明復撰桓公三年春正月公㑹齊侯于嬴程頥曰桓公弒君而立元年書王以王法正其罪也二年宋督弒君以王法正其罪也三年不書見桓之無王也㑹齊侯于嬴成昏于齊也謝湜曰左氏謂成昏于齊胡安國曰桓公三年而後經不書王有以為周不頒厯者昭公末年王室有子朝之亂豈暇頒歷而經皆書王非不頒厯明矣又有以為此闕文者安得一公之內凡十四年皆不書王其非闕文亦明矣然則云何桓公弒君而立至于今三年而諸侯之喪事畢矣是入見受命于天子之時也而王朝之司馬不施殘執之刑鄰國之大夫不聞有沐浴之請魯之臣子義不戴天反北靣事讐魯莫之恥使亂臣賊子肆其凶逆無所忌憚人之大倫滅矣故自是而後不書王者桓公無王與天王之失政而不王也桓公無王而歸罪于天子可乎齊景公問政子曰君君臣臣父父子子君不君則臣不臣父不父則子不子夏齊侯衛侯胥命於蒲程頥曰二國為㑹約言相命而不為盟詛近於理也故善之程氏雜說曰凡書盟者皆私相疑二而妄為歃血要言之事唯此年胥命於蒲則以誠相命爾古者王道之行諸侯各以法守何相命之有然論其世也則謂之近正不亦宜乎楊時曰胥命蓋葵丘之㑹束牲載書而不歃血而有五命之類是也齊衛敵國莫為命主故曰胥命也至治之時諸侯述職以聽天子之命而已何胥命之有哉然葵丘之㑹不書命何也蓋五霸桓公為盛以葵丘之㑹實為命主不書命蓋不與其擅命也謝湜曰命王之事也二國胥命非正也雖然聖王不作久矣諸侯小大猜疑盟約並起公正之道衰而信義不復見矣方是時二國以書相命而不以歃血為盟有貴信之心焉可謂近正矣春秋書其胥命善之也蒲之命必有主之者謂之胥命不與諸侯得專也故穀梁曰其以相言之不以齊侯命衛侯也胡安國曰公羊曰胥命者相命也相命近正也古者不盟結言而退人變其情私相疑二以成傾危之俗其所由來漸矣有能相命而言諭豈不獨為近正乎故特起胥命之文於此有取焉聖人以信易食答子貢之問君子以信易生重桓王之失信去則民不立矣故荀卿言春秋善胥命六月公㑹杞侯於郕程頥曰桓公篡立無嵗不與諸侯盟㑹結外援以自固也秋七月壬辰朔日有食之既程頥曰既盡也食盡為異大也楊時曰日有食之穀梁曰吐者外壤食者內壤闕然不見其壤有食之者言有物食之也夫日月之變有常數焉此巧厯所窮也而春秋書以為異者蓋先王克謹天戒因以正嚴厥事則日月有變豈徒然哉必有以也故書日有食之而其辭若有食之者蓋所以歸咎于人事而不以常數為不足畏也謝湜曰隂陽相刑猶水火相克故隂之氣勝則奄日既者杜氏謂正相當而相奄間疏也胡安國曰七月壬辰朔日有食之既穀梁曰既盡也言日言朔食正朔也言朔不言日食朔也言日不言朔食晦日也不言日不言朔夜食也何以知其夜食曰王者朝日王者朝日則何以知其夜食乎日始出而有虧傷之處未之復也則知其食於夜矣日者衆陽之宗人君之象而有食之既則其為變大矣先儒以為荆楚僣號鄭拒王師之應又曰古者人君南靣向明而治蓋取諸離離為日至明之象也日食常數耳春秋每食必書何也日者人君之表茍有食之則暗而不明矣臣子背君父則暗而不明妾婦秉夫權則暗而不明故春秋每食必書所以為南靣之大戒也朱熹曰日有食之此則繫乎人事之感蓋臣子背君父妾婦乘其夫小人凌君子夷狄侵中國所感如是則隂盛陽微而日為之食矣是以聖人於春秋每食必書而詩人亦以為醜也公子翬如齊逆女程頥曰翬于隱世不稱公子隱之賊也桓世稱公子桓之黨也卿逆夫人于禮為稱翬雖尊屬當官而行亦無嫌謝湜曰翬弒逆之人也終隱之世書翬以其罪在所絶也桓之世書公子以其比而得國復以公子親之也翬卒不書絶之也姦臣以大惡行乎亂世而刑戮不及其身者春秋以法誅之所以著其罪于天下也桓公以私恩親翬于前而春秋以一王之法誅翬于後桓公同為弒逆其惡著矣胡安國曰娶妻必親迎禮之正也若夫邦君以爵則有尊卑以國則有小大以道途則有逺邇或迎之于境上或迎之于所館禮之節也紀侯于魯以小大言則親之者也而使履繻來魯侯于齊以逺邇言則親之者也而使公子翬往是不重大昏之禮失其節矣故書九月齊侯送姜氏于歡公㑹齊侯于歡程頥曰齊侯出疆送女公㑹之皆非義也夫人姜氏至自齊程頥曰見于廟也程氏學曰齊之送公之逆俱非禮也不言翬以至者公㑹之于歡也文姜穆姜齊姜夫人皆書于法當爾國之大事也謝湜曰先王制禮有恩有義女適人而父母送之恩也父送不出門母送不出闕門義也然則公女之嫁于敵國也以卿大夫奉幣以致君命而已諸侯越疆送之非禮也公之昏于齊也其始也親㑹齊侯于嬴以成之其終也親㑹齊侯于歡以受之瀆昏莫大焉夫婦人倫之本也夫婦之道䙝而不敬則亂生有國者不可不慎也故孔子曰大昏萬世之嗣也可不重乎胡安國曰古者昏禮必親迎則授受之義明後世親迎之禮廢于是有父母兄弟越境而送其女者以公子翬往逆則既輕矣為齊侯來乃逆而㑹之于歡是公之行其重在齊侯而不在姜氏豈禮也哉不言以至者既得見乎公也不能防間于是乎在敝笱之刺兆矣禮者所以别嫌明微制治于未亂不可不謹也娶夫人國之大事故詳冬齊侯使其弟年來聘程頥曰致夫人也弟義見隱七年謝湜曰左氏謂致夫人有年程頥曰書有年紀異也人事順于下則天氣和于上桓弒君而立逆天理亂人倫天地之氣為之繆戻水旱凶災乃其宜也今乃有年故書其異宣公為弒君者所立其惡有間故大有年則書之謝湜曰桓之世書有年宣之世書大有年志異也志幸也行之惡莫大于桓宣桓而有年宣而大有年異之大者也國以民為本民以食為命桓而有年宣而大有年幸之大者也胡安國曰舊史災異與慶􅖤並記故有年大有年得見于經若舊史不記聖人亦不能附益之也然十二公多厯年所有務農重穀閔雨而書雨者豈無豐年而不見于經是仲尼于他公皆削之矣獨桓有年宣大有年則存而弗削者緣此二公獲罪于天宜得水旱凶災之譴今乃有年則是反常也故以為異特存耳然則天道亦僭乎桓宣享國十有八年獨此年書有年他年之歉可知也而天理不差信矣此一事也在不修春秋則為慶􅖤夫子修之則為變異是聖人因魯史舊文能立興王之新法也故史文如畫筆經文如化工嘗以是觀非聖人莫能修之審矣有年大有年自先儒說經者多列于慶瑞之門至程氏發明奧㫖然後以為記異此得于言意之表者也四年春正月公狩于郎程頥曰公出動衆皆當書于郎逺也謝湜曰夏之冬狩之時也周以建子為正則狩冝以夏之季冬正月出狩非時也君道先德而後刑好生而惡殺嵗首布德行惠之時也正月出狩是以刑殺為先也先王狩禮行于近郊非獨以禽獸為事也因以習武事因以除田害因以享祖考焉出狩于郎是以逸逰為事也與先王之狩異矣胡安國曰何以書譏逺也戎祀國之大事狩所以講大事也用民以訓軍旅所以示之武而威天下取物以祭宗廟所以示之孝而順天下故中春教振旅遂以搜中夏教茇舍遂以苗中秋教治兵遂以獮中冬教大閲遂以狩然不時則傷農不地則害物田狩之地如鄭有原圃秦有具囿皆常所也違其常所犯害民物而百姓苦之則將聞車馬之音見羽旄之美舉疾首蹙頞而相告可不謹乎以非其地而必書是春秋謹于微之意也每謹于微然後王德全矣夏天王使宰渠伯紏來聘程頥曰桓公弒其君而立天子不能治天下莫能討而王使其宰聘之示加尊寵天理滅矣人道亡矣書天王言當奉天矣而其為如此名紏尊卑貴賤之義亡也人理既滅天運乖矣隂陽失序嵗功不能成矣故不具四時謝湜曰刑賞國之大典也賞不遺善然後善者興刑不遺惡然後惡者沮善者興惡者沮而上下不治者未之有也王室聘禮所以省諸侯而致其恩也桓公臣子之大逆者也臣民在所殛王法在所棄不可與同天下者也平王以聘禮加桓公而省視焉是以恩好寵逆臣而親之也天王者執刑賞以馭邦國者也天討不行于大逆而反以恩好親焉刑賞于此亂矣故春秋書天王來聘以示桓王親逆臣而瀆大典也其來聘也貶宰渠伯紏而名之以示相桓王之失道也宰輔相之官也輔相王室者貶而稱名則天王之失見矣名王臣以示聘之非宜則春秋之疾姦而討逆尊國本而振王綱其意顯矣渠氏伯紏名與宰喧書名同意胡安國曰宰冢宰也渠氏伯爵紏其名也王朝公卿書爵大夫書字上士中士書名下士書人例也紏位六卿之長降從中士之例而書名貶也于紏何貶乎在周制大司馬九伐之法諸侯而賊殺其親則正之放弒其君則殘之桓公之行當此二者舍曰不討而又聘焉失天職矣操刑賞之柄以馭下者王也論刑賞之法以詔王者宰也宰以六典治邦國故以經邦國則有治典以安邦國則有教典以平邦國則有政典以詰邦國則有刑典治教政刑而謂之典明此天下之大常也太宰所掌而獨謂之建以此典太宰之所定也乃為亂首承命以聘弒君之賊乎故特貶而書名以見宰之非宰也聘于弒君之賊而名其宰則桓公殁王使榮叔來錫命矣榮叔何以書字而不名也始而來聘冢宰書名以見貶終而追錫王不稱天以示譏其義備矣夫咺賵仲子紏聘桓公其事皆三綱之所繫也然咺獨書官紏兼稱爵何也如咺者豈初得政猶未受封而紏則或以諸侯入相或既相而已封者乎漢初命相必擇列侯為之後用公孫因相而得封蓋欲效古重其任也任之重則責益深矣嫡妾之分君臣之義天下之大倫無所輕重紏以既封故兼稱爵見春秋責相之意也無秋冬程頥語録或問桓元年冬十月下無事四年七年無秋冬如何曰聖人作經備四時也如桓不道背逆天理故不書秋冬春秋只有兩處如此皆言其無天理也尹焞語録或問桓公天道不成不記于元年而記于此何也曰因天王使宰渠伯紏來聘記之尤有深意朱熹曰不書秋冬史闕文也魯桓之弒天王之不能討罪惡自著何待于去秋冬而後見乎五年春正月甲戌己丑陳侯鮑卒程頥曰下文闕謝湜曰再日脫文夏齊侯鄭伯如紀程頥曰齊侯鄭伯朝于紀欲以襲之紀人知之齊為諸侯而欲為賊于鄰國不道之甚鄭伯助之其罪均矣謝湜曰春秋外朝內書朝著其朝以志其亂也內朝外書如貶其朝以正其亂也外諸侯相朝皆不書齊侯鄭伯如紀非朝也責其恃大虐小也州公如曹非朝也責其畏禍離國也夫惡萌于微者春秋在所發禍藏于隱者春秋在所慮紀小國非有大惡當治也非有危難當救也齊鄭大國非以鄰國之好朝紀也非以侵伐之難入紀也然則二公之如欲以謀紀而已春秋書齊鄭如紀而二國窺伺紀侯之心由此見矣胡安國曰按左氏齊鄭朝紀欲以襲之紀人知之夫如者朝辭也尊不朝乎卑大不朝乎小紀之為紀微乎微者也齊在東州尊則方伯鄭亦大國也並驅而朝紀乃懷詐緩之謀欲以襲之而不虞紀人之覺也其志憯矣此外相如爾何以書紀人主魯故來告其事魯史承告故備書于䇿夫子修經存而不削者以小國恃大國之安靖而已乃包藏禍心以圖之亦異于興滅國繼絶世之義矣故存而不削以著齊人滅紀之罪明紀侯去國之由劉敞意林所謂聖人誅意之故是也天王使仍叔之子來聘程頥曰古之授任稱其才德故無世官周衰官人以世故卿大夫之子代其父任事仍叔受命來聘而使其子代行也謝湜曰仍叔天子大夫也其子未命已代父行聘于魯書仍叔之子責世卿也尹氏武氏稱氏仍叔稱字者以世權未若尹武之重也王有鄭難故又遣使來聘胡安國曰仍叔之子云者譏世官非公選也帝王不以私愛害公選故仕者世祿而不世官任之不以其賢也不惟任之不以賢使之不以其能也卿大夫子弟以兄父故而見使則非公選而政由是敗矣上世有自野耕釣渭擢居輔相而人莫不以為冝伊陟象賢復相太戊丁公世美入掌兵權不以世故疑之也崇伯殛死禹作司空蔡叔既囚仲為卿士亦不以其父故廢之也惟其公而已矣及周之衰小人得政視朝廷官爵為己私援引親黨分據要途施及童稚賢人退處于篳門身老而不用公道不行然後夷狄侵凌國家傾覆雖有智者不能善其後矣春秋書武氏仍叔之子云者戒後世人主徇大臣私意而用其子弟之弱者居公選之地以敗亂其國家欲其深省之也朱熹曰春秋有書大王者有書王者此皆難曉或以為王不稱天貶之熹謂若書天王其罪自見矣葬陳桓公謝湜曰國亂日月不詳城祝丘謝湜曰杜氏謂齊鄭將襲紀故城秋蔡人衛人陳人從王伐鄭程頥曰王奪鄭伯政鄭伯不朝王以諸侯伐鄭鄭伯禦之戰于繻葛王卒大敗王師于諸侯不書敗諸侯不可敵王也于夷狄不書戰夷狄不能抗王也此理也其敵其抗王道之失也程氏學曰周衰諸侯背叛莫有尊王而從命者唯此年王蔡衛陳人伐鄭而聖人書曰蔡人衛人陳人從王伐鄭所以明君臣之大義君行而臣從之正也或曰蔡衛陳皆稱人微者乎曰雖使卿行茍不命于天子者若從王則亦不得以名舉尊而厭卑亦云冝矣謝湜曰君行而臣從君臣之大義也人君總天下之大以言則行以動則濟者以臣子致事君之義也周衰諸侯不遵王命久矣桓王之伐鄭也三國乃能為王出兵以討不庭勤王之道矣春秋書曰從王所以明君臣之大義也以君臣大義書三國從王而大國之不能從王其罪見矣三國出兵蓋卿行也鄭莊公以手足之親出為王室讐敵諸侯所冝致伐也三國雖以卿出而侯伯無躬親夾輔之勳三國從王書人而諸侯事王不盡忠力其失見矣列國之卿非命卿也其從王不以名稱以示非王命也非王命者不以為卿所以尊王也胡安國曰按左氏王奪鄭伯政鄭伯不朝王以諸侯伐鄭鄭伯禦之戰于繻葛王卒大敗春秋書王必稱天者所章則天命也所用則天討也王奪鄭伯政而怒其不朝以諸侯伐焉非天討也故不稱天或曰鄭伯不朝惡得為無罪曰桓公弒君而自立宋督弒君而得政天下大惡人理所不容也則遣使來聘而莫之討鄭伯不朝貶其爵可也何為憤怒自將以攻之也移此師以加宋魯誰曰非天討乎春秋天子之事述天理而時措之也既譏天王以端本矣三國以兵㑹伐則言從王者又以明君臣之義也君行而臣從正也戰于繻葛而不書戰王卒大敗而不書者又以存天下之防也三綱軍政之本聖人寓軍政于春秋而書法若此皆裁自聖心非國史所能與也大雩程頥曰成王尊周公故賜魯重祭得郊禘大雩大雩雩于上帝用盛樂也諸侯雩于境內之山川以成王之賜魯公之受皆失道也故夫子曰魯之郊禘非禮也周公其衰矣大雩嵗之常祀不能皆書也故因其非時則書之遇旱災則非時而雩書之所以見其非禮且志旱也郊禘亦因事而書又曰雩及上帝以見魯不當為與書郊者同義張載禮樂說或問雩禜有益無益于水旱是何無益祭祀之義同也古者天子雩于上帝諸侯雩于山川水旱既其氣運使然祈禱之禮復何用耶祈禱者蓋示其意民患若此不可視之若無事譬如人之有疾者其為之祈禱皆是意不過卒歸無益也故曰丘之禱久矣謝湜曰天子祭天有四冬至郊孟春祈穀孟夏大雩季秋明堂是也諸侯不得祭天祈穀行于社稷雩禮行于境內之山川而已雩祈雨之祭也大雩祭天而雩天子之禮也夏百穀需雨之時故雩以孟夏秋大雩失天時也然則大雩書僣也秋大雩書怠也孟子曰民事不可緩也魯雩以秋而人君無恤農之誠由此見矣胡安國曰大雩者雩于上帝用盛樂也諸侯雩于境內之山川爾魯諸侯而郊禘大雩欲悉書于䇿則有不勝書故雩祭則因旱以書而特謂之大郊禘亦因事以書而義自見此皆國史所不能與君子以謂性命之文是也諸侯不得祭天地大夫不得祭山川士庶人不敢以他人祖禰祭于己之寢禮也故季氏旅于泰山子曰嗚呼曽謂泰山不如林放乎明乎春秋所書郊禘大雩之義則知聖人治國如指諸掌之說矣吕祖謙曰雩有二有常雩有旱雩釋例謂建已之月乃純陽用事之月懼有旱故先祭此嵗時之雩也上辛大雩季辛又雩此旱而雩也旱而所雩之神則周禮所謂天子雩上帝諸侯以下雩上公嵗時所雩之神則月令所謂為民祈祀山川百源大雩帝用盛樂乃命百縣雩祀百辟卿士有益于民者以祈穀實是矣雩呼嗟求雨之祭也雩帝謂為壇南方之旁雩五精之帝配以先帝也自鞀鞸至祝敔皆作成樂凡他雩用歌舞而已螽程頥曰蝗也既旱又蝗饑不在書也謝湜曰螽蝗類隂陽沴氣所生冬州公如曹程頥曰州公嘗為王三公故稱公不能保其國去如曹遂不復謝湜曰諸侯以王命主社稷撫人民其有難也明忠信嚴守備與民以死守之保國之義也州公以小國間于大國度其國危而不能守也乃至不畏王命不恤社稷人民私以一身避難適曹然則州公非以鄰國之好朝曹也非以大國兵加其國奔曹也其行欲以免禍而已春秋書曰如曹而州公不能保守一國其惡見矣胡安國曰按左氏淳于公如曹度其國危遂不復天子三公稱公者王者之後稱公州公諸侯而稱公者昔畢髙以父師而保釐東土衛武以列國而入相于周蓋與後世出入均勞之意同此其所以稱公也外相如不書此何以書將有其末故先録其本春秋集義卷七

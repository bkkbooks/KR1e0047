body:
  text: 春秋集義卷五十宋李明復撰哀公八年春王正月宋公入曹以曹伯陽歸謝湜曰圍其國入其都乃至虜其君而後已景公之罪也胡安國曰此滅曹也曷為不言滅滅者亡國之善詞上下之同力也曹伯陽好田弋鄙人公孫強獲白雁獻之且言田弋之説因訪政事大説之強言霸説於曹伯因背晉而好宋宋人伐之晉人不救書宋公入曹以曹伯陽歸而削其見滅之實猶虞之亡書晉人執虞公而不言滅也春秋輕重之權衡故書法若此有國者妄聽辨言以亂舊政自取滅亡之禍可以鑒矣吕祖謙曰宋滅曹晉文公初間要滅何故不克今宋何故便克此亦是春秋之末亦緣公孫強不修政事民心易離所以克之易吳伐我謝湜曰吳以邾子為討故伐我我以兵劫人君而吳以兵加我國其禍皆魯取之也胡安國曰吳為邾故興師伐魯兵加國都而盟于城下經書伐我不言四鄙及與吳盟者諱之也來戰於郎直書不諱盟於城下何諱之深也楚人圍宋易子而食析骸而㸑亦云急矣欲盟城下則曰有以國斃不能從也晉師從齊齊侯致賂晉人不可國佐對曰子若不許請合餘燼背城借一敝邑之幸亦云從也遂盟於袁婁而春秋與之今魯未及虧不能少待遂有城下之盟是棄國也夫棄國者其能國乎使有華元國佐之臣則不至此矣故春秋不言四鄙及與吳盟者欲見其實而深諱之以為後世謀國之士不能以禮義自強偷生惜死至於侵削陵遲而不知耻者之戒也夏齊人取歡及闡謝湜曰齊人以邾子為討故取我二邑取不書來者我以邑賂齊而齊取之也取歡猶未足故又取闡書及著其得二邑而後已也歸邾子益于邾程頤曰內失邑不書君辱當諱也不得保其土地民人是不君也已與之彼以非義而受則書取此與濟西田是也魯入邾而以其君來致齊怒吳伐故賂齊以説之吕祖謙曰齊侯使如吳請師將以伐我乃歸邾子此是魯歸邾子蓋向來邾曽被魯囚之負瑕今齊來伐魯故魯所以歸之秋七月冬十有二月癸亥把伯過卒齊人歸歡及闡程頤曰不云我田既歸邾子亦歸其田非以為惠也謝湜曰魯歸邾子於邾故齊復歸我二邑既歸歡又歸闡歸不書來闡書及以我固求之而後得也我兼邾則齊取我邑我棄邾則齊歸我邑不守天子分地而輒以兵力爭地爭城王法皆在所誅者也胡安國曰按左氏邾子益齊出也魯以益來則齊人取歡及闡又如吳請師而怒猶未怠也以此見國君造惡不悛則四鄰謀取其國家莫能保矣歸邾子益於邾則齊人歸歡及闡又辭師於吳而德猶未泯也以此見國君去惡而不積則四鄰不侵其封境而自安矣曰以曰取者逆詞也曰歸者順詞也去逆效順息爭休兵齊無取地之罪魯無失地之辱以此見遷善之優改過之大而春秋不諱入邾以邾子益來者以明歸益於邾之能掩其前惡而美之也九年春王二月葬把僖公宋皇瑗帥師取鄭師于雍丘謝湜曰鄭師將伐宋屯於雍丘宋皇瑗圍其壘扼其要全師覆而有之書取鄭師著其禍之大也鄭罕達伐宋宋皇瑗侵鄭宋圍曹鄭救曹宋鄭結怨久矣故皇瑗悉力取雍丘之師罕逹悉力取嵒之師夏楚人伐陳謝湜曰陳即楚故吳伐陳陳即吳故楚伐陳秋宋公伐鄭冬十月謝湜曰皇瑗既取鄭師故宋公乘虛伐鄭十年春王二月邾子益來奔謝湜曰隱公雖獲歸國不能固有其位故復來奔公會吳伐齊謝湜曰會強吳伐鄰國非保國之道也吕祖謙曰吳子使來警師伐齊蓋齊以魯故請師伐吳繼而却辭吳而與魯和故吳之伐齊所以特地却教魯來同伐三月戊戌齊侯陽生卒胡安國曰按左氏公會吳伐齊齊人弒悼公赴于師春秋不著齊人弒君之罪而以卒書者亦猶鄭伯髠頑弒而書卒公羊傳以為春秋為中國諱是也其存天理之意微矣魯人入邾以其君來罪也齊侯為是取歡及闡如吳請師討之也魯人悔懼歸益於邾是知其罪而能改也齊侯為是歸歡及闡又辭師於吳是變之正也夫變之正者禮義之所在中國之君也吳人欲遂前言而背違正理是亂也齊之臣子不能將順上及其君此天下大變常理之所無也故沒其見弒之禍而以卒書其旨深矣春秋弒君大惡不待貶絶而自見也君而見弒豈無不善之積以及其身乎若夫悼公變而克正則無不善之積矣故以卒書而滅其見弒春秋之義所謂為中國諱此類是也而存天理之意微矣夏宋人伐鄭謝湜曰景公伐鄭未得志故宋人又伐鄭晉趙鞅帥師侵齊謝湜曰鞅乘喪侵國罪之也五月公至自伐齊葬齊悼公衛公孟彄自齊歸于衛謝湜曰公孟彄以世子之禍出奔今以齊力還國書歸明其無大罪也薛伯夷卒秋葬薛惠公冬楚公子結帥師伐陳吳救陳謝湜曰吳楚爭陳久矣楚伐之吳救之罪中國之不振也胡安國曰春秋惡首亂善解紛自誅亂臣討賊子之外凡書救者未有不善之也救在王室則罪諸侯子突救衛是也救在逺國則罪四鄰晉陽處父救江是也救在外域則罪中國楚公子貞救鄭狄救齊吳救陳是也吳雖蠻夷之國來會於戚則進而書人矣使季札聘則又進而書子矣救而果善曷為獨以號舉而不進之也其以號舉而不進之者深著楚罪而傷中國之衰也陳者有虞之後嘗為楚滅而僅存耳今又無故興師肆行侵伐而列國諸侯縱其暴橫不能修方伯連帥之職而吳能救之故獨以號舉深著楚罪而傷中國之衰也子欲居九夷乘桴浮海而曰夷狄之有君不如諸夏之亡也其書吳救陳之意乎十有一年春齊國書帥師伐我謝湜曰魯會吳伐齊故齊國書伐我凡諸侯來伐不至國都則書某鄙至國都則書伐我所書皆婉其辭以父母國故也胡安國曰諸侯來伐無有不書四鄙者今齊師及清涉泗非有城下之盟可諱之辱亦書伐我何也傅説復於高宗曰惟甲胄起戎惟干戈省厥躬者自反之謂也自反而縮則為壯自反而不縮則為老師之老壯在曲直曲直自我而不係乎人者乎邾子齊之甥魯嘗入邾以其君來齊人為是取歡及闡又辭吳師直在齊矣魯人何名會吳伐之也故春秋之記斯師特曰伐我者欲省致師之由而躬自厚也垂訓之義大矣夏陳轅頗出奔鄭五月公會吳伐齊甲戌齊國書帥師及吳戰于艾陵齊師敗績獲齊國書謝湜曰吳之來伐也全兵民戰守備屈之以義而勿與交兵則齊可以坐困強吳而却之矣今則不然師衆伐魯方還民未息肩士未解甲加以諸侯大夫皆有畏心而國書肆一朝之忿與吳戰於艾陵以至師敗身獲為國大殃故艾陵之師以國書主戰而罪之也魯勢微弱故吳之伐齊也公與伐不與戰秋七月辛酉滕子虞母卒冬十有一月葬滕隱公衛世叔齊出奔宋十有二年春用田賦謝湜曰取以兵法而不計田先王之賦也哀公以國用不足乃計田所出而取賦焉計田所出而取賦則兵法於此廢矣書用田賦以明非正也宣公初稅畝成公作丘甲哀公猶病不足而復以田賦則田賦又重於宣之稅畝成之丘甲可知矣用有節則雖丘賦將有餘用無節則雖田賦將不足不正其本而求其末未有見其能濟者也古者民欲其富牛欲其蕃民欲富故丘法公田百畝八家皆私百畝牛欲蕃故丘法出馬一匹牛三頭胡安國曰哀公問於有若曰年飢用不足如之何有若對曰盍徹乎曰二吾猶不足如之何其徹也曰百姓足君孰與不足百姓不足君孰與足古者公田什一助而不稅魯自宣公初稅畝後世遂以為常而不復矣至是二猶不足故又以田賦也夫先王制土籍田以力而砥其逺邇賦里以入而量其有無里壥也謂商賈所居之區域今用田賦軍旅之征非矣田以出粟為主而足食賦以出軍為主而足兵周制宅不毛者有里布無職事者征夫家漆林之稅二十而五則弛力薄征當以農民為急而增賦竭作不使末業者獨幸而免也今二猶不足而用田賦是重用農民而削其本何以國書曰用田賦用者不宜用也近世議弛商賈之征達於時政者欲先省國用首寬農民後及商賈知春秋譏田賦之意矣朱熹曰哀公十二年用田賦冉有時為季氏宰考之國語蓋嘗以此事訪於夫子而卒莫之救以冉有為宰之時而季氏之賦倍他日此夫子所以有聚斂附益之歎又曰齊魯初來氣象已自不同看太公自是與周公别到桓公管仲出來又不遵守齊之初政郤全然變易了一向盡在功利上魯却只是放倒了畢竟先世之遺意尚存如哀公用田賦猶使人來問孔子他若以田賦為是更何暇問惟其知得前人底是所以來問若桓公管仲郤無這意思自道他底是了一向做去不顧張栻曰冉求之事論語蓋嘗載之與孟子所載互相發也論語則正其聚斂之名孟子則推明其無能改於其德之罪夫冉有之聚斂果若後世頭會箕斂以媚其上之為乎殆不然也以左氏春秋考之哀公十一年季孫以田賦使訪諸孔子孔子不對而私於冉有曰君子之行也度於禮施取其厚事舉其中斂從其薄如是則以丘亦足若不度於禮而貪冒無厭則雖以田賦將又不足且季孫若欲行而法則周公之典在若欲茍而行又何訪焉弗聽明年正月用田賦用田賦者履畝而賦之也意者賦粟倍他日其謂是與然則此季孫之為也而遽以為求之罪若是之深乎蓋季氏為魯卿專制其上為日久矣一國之人知有季氏而不知有魯君也求之為宰所當明君臣之義以正救之俾革其為以事公室則求之責也今既不能使之改於其德而季氏廢法以厚取求又從而順從莫之能救則求之罪深矣故論語正其聚斂之名而孟子又推明其無能改於其德之罪然後聖人鳴鼓而攻之之意昭然矣吕祖謙曰田賦古者田出粟里出賦凡春秋所説賦只言商賈但只一等要之農亦是出二等今季氏又使之田又出賦往往大略是如此其精細不可得知夏五月甲辰孟子卒范祖禹曰天地定位而有君臣紀綱人倫故聖人謹之以為民之防也昭公之行不可掩也在夫子則當諱於陳司敗何有焉夫子引為已過所以存君臣也謝湜曰孟子昭公夫人謂之孟子以其同姓也既不可言夫人姬氏薨不書葬諱之也其曰孟子卒不成其為夫人也凡臣子為魯諱者其過惡皆由諱顯聖人之旨微矣胡安國曰孟子吳女昭公之夫人其曰孟子云者諱取同姓也禮取妻不取同姓買妾不知其姓則卜之厚男女之别也同姓從宗合族屬異姓主名治際會名著而男女有别矣四世而緦服五世而袒免殺同姓也六世親屬竭矣其庶姓别於上戚單於下婚姻可以通乎綴之以姓而弗别合之以食而弗殊雖百世而婚姻不通周道然也昭公不謹於禮欲結好強吳以去三家之權忍取同姓以混男女之别不命於天子以弱其配不見於廟不書於䇿以廢其常典禮之大本喪矣其失國也宜故陳司敗問昭公知禮乎孔子曰知禮子退揖巫馬期而進之曰吾聞君子不黨君子亦黨乎君娶於吳謂同姓謂之吳孟子君而知禮孰不知禮巫馬期以告子曰丘也幸茍有過人必知之書孟子卒雖曰為君隱而實亦不可掩矣朱熹語録或問昭公娶同姓之事若天王舉法行罪何如對曰此非昭公固為之也當時吳盛強中國無霸主以齊既不能令又不受命涕出而女於吳若昭公亦是藉其勢不得已之故非貪其色而然也天王舉法行罪固不免亦須原情自有處置况不曰孟姬而曰吳孟子則昭公亦已自知其非矣公會吳于槖臯秋公會衛侯宋皇瑗于鄖宋向巢帥師伐鄭謝湜曰宋皇瑗侵鄭取鄭師宋人伐鄭兵可以息矣向巢又帥師伐鄭罪其逞怨窮兵也冬十有二月螽謝湜曰冬傷溫故昆蟲宜蟄而螽異之甚也十有三年春鄭罕達帥師取宋師于嵒謝湜曰宋師伐鄭屯于嵒鄭罕逹扼其師而陷之書宋師著其禍之大也鄭師不戒入宋雍丘而宋皇瑗取之宋師不戒入鄭嵒邑而鄭罕達取之用兵寡謀則有至全師覆沒而不反者可不畏耶夏許男成卒公會晉侯及吳子于黃池謝湜曰黃池之會吳為會主故吳子稱爵以示吳之強也鍾離柤向之會皆殊會吳者以中國主會也以中國主會故殊吳人而外之也黃池之會以晉及吳者以吳人主會故先晉後吳而抑之也此主會則外之彼主會則抑之聖人尊中國懲冦亂其心見於此矣吳自鍾離以來惟稱吳外之也柏舉之戰黃池之會稱爵著其強也聘稱爵進之也胡安國曰黃池衛地其言及者會兩伯之詞也春秋內中國而外諸夷吳人主會其先晉紀常也春秋蕃服雖大皆曰子吳僭王矣其稱子正名也以會兩伯之詞而言及者先吳則拂經而失序列書則泯實而傳疑特書曰及順天地之經著盟會之實又以見吳人之強而抑其橫也定公以來晉失霸業不主夏盟夫差暴橫勢傾上國自稱周室於已為長蓋泰伯之後以族屬言則伯父也而黃池之會聖人書法如此者訓後世治中國御外域之道也明此義則知漢宣帝待單于位在諸侯王上蕭傳之議非矣唐高祖稱臣於突厥倚以為助劉文靖之䇿失矣况於以父事之如石晉者將欲保國而免其侵暴可乎或曰茍不為此至於亡國則如之何曰存亡者天也得失者人也不可逆者理也以人勝天則事有在我者矣必若顛倒冠履而得天下其能一朝居乎故春秋撥亂反正之書不可以廢焉者也吕祖謙曰黃池是今京西路此是二國爭霸當時為之兩霸楚公子申帥師伐陳於越入吳謝湜曰夫差慨然有經營北方之志而不顧蕭牆一日之禍故黃池之會方與晉國爭先而於越伺隙入吳有國者不可不戒也故子胥曰越在我心腹之疾也得志於齊猶獲石田無所用之胡安國曰吳自柏舉以來憑陵中國黃池之會遂主夏盟可謂強矣而春秋繼書於越入吳所謂因事屬詞垂戒後世而見深切著明之義也曽子曰戒之戒之出乎爾者反乎爾老氏曰佳兵不祥之器其事好還夫以力勝人者人亦以力勝之矣吳嘗破越遂有輕楚之心及其破楚又有驕齊之志既勝齊師復與晉人爭長自謂莫之敵也而越已入其國都矣吳侵中國而越滅之越又不鑒而楚滅之楚又不鑒而秦滅之秦又不鑒而􅗛滅之老氏曽子其言豈欺也哉春秋初書於越入吳在柏舉之後再書於越入吳在黃池之後皆因事屬詞垂戒後世不待貶絶而見深切著明之義也而可廢乎秋公至自會晉魏曼多帥師侵衛謝湜曰蒯聵未歸國故曼多再侵衛葬許元公九月螽冬十有一月有星孛于東方謝湜曰非獨陵犯一宫故書東方盜殺陳夏區夫謝湜曰區夫為盜所殺故不稱大夫十有二月螽十有四年春西狩獲麟程頤語録或曰麟乃和氣所致然春秋之時有之其應安在曰天地之氣豈可如此間别乎如聖人之生亦天地交感五行之秀乃生孔子尚生於戰國無足怪者而况麟乎孔子為此麟出非時如已生不得其時故感焉而作春秋或者謂不然答曰春秋不害感麟而作然麟不出春秋亦必作孔子之意蓋有素矣因是一事則有感而作故其書之成則以終固必有發端者然也如伏羲八卦因見河圖洛書設無河圖洛書八卦亦須畫或言絶筆後王者可革命大非也孔子時惟可尊周孟子時方可革命時季然也前一日不可後一日不可又曰始隱周之衰也終麟感之始也世衰道不行有述作之意舊矣但因麟而發耳麟不出春秋亦須作也又問獲麟後却有二年經不知如何曰是孔門弟子所續當時謂必能盡得聖人作經意又再三考究極有失作經意處楊時曰獲麟不言地不使麟以地獲不書公不使麟以公得謝湜曰麟太平之仁獸也王道盛和氣洽則麟為之出物之常理也孔子感麟出之非時傷太平之不見於是因魯史作春秋所以明一王之法也觀西狩之麟而聖王所以興隆政治和同民物其道形於此矣故孔子有感於中而逹其道於春秋也樂莫美於韶獸莫美於麟禽莫美於鳳文莫美於圖孔子當衰亂之中聞韶而歎覩麟而悲思鳳鳥河圖喟然為之嗟傷聖人念治之心深且篤矣故春秋二百四十二年王道之紀綱其文因獲麟而作其書復以獲麟而終也然則麟不出春秋其不作乎曰立言以道世聖人之心也雖然聖人之言必有所因而發也河出圖洛出書聖人畫八卦西狩獲麟聖人作春秋其義一也胡安國曰河出圖洛出書而八卦畫簫韶作春秋成而鳳麟至事應雖殊其理一也易曰大人者先天而天弗違後天而奉天時舜孔子先天者也先天而天弗違志一之動氣也有見乎此者則曰文成而麟至無見乎此者以為妖妄而近誣周南關雎之化王者之風而麟之趾關雎之應也召南鵲巢之德先公之教而騶虞鵲巢之應也世衰道微暴行交作臣弒其君者有之子弒其父者有之夫子為是作春秋明王道正人倫氣志天人交相感勝之際深矣制作之文成而麟至宜矣商王恭默思道帝賚良弼得於傅巖周公欲以身代其兄植璧秉圭而武王疾愈啓金縢之䇿天乃反風出罪已之言熒惑退舍至於勇夫志士精誠所格上致日星之應召物産之祥蓋有之矣况聖人之心感物而動見於行事以遺天下與來世哉簫韶九奏鳯儀於庭魯史成經麟出於野亦常理矣詩以正情書以制事禮以成行樂以飬和易以明變垂教亦備矣則曷為作春秋子曰我欲載之空言不如見之於行事之深切著明也知我者其惟春秋乎何以約乎魯史子曰我欲觀夏道是故之把不足徵也我欲觀周道幽厲傷之舍魯何適矣何以始乎隱公三綱淪九法斁天下無復有王也何以絶筆於獲麟其以天道終乎聖人之於天道命也有性焉君子不謂命也是故春秋天子之事聖人之用撥亂反正之書考諸三王而不繆建諸天地而不悖質諸鬼神而無疑百世以俟聖人而不惑其於格物修身齊家治國施諸天下無所求而不得亦無所處而不當何莫學夫春秋故君子誠有樂乎此也由仲尼至於孟子百有餘嵗若顔子曽子則見而知之若孟子則聞而知之由孟子而來至於今千有餘嵗矣其書未亡其出於人心者猶在蓋有不得已焉耳則亦有不已已焉耳矣又曰止於獲麟而以天道終焉比於關雎之應而能事畢矣朱熹曰吾不復夢見周公自是箇徵兆如此當聖人志慮未衰天意難定八分猶有兩分運轉故做得周公事遂夢見之非以思慮也要之聖人精神血氣與時運相流通到鳳不至圖不出明王不興其徵兆自是如此胡安國謂絶筆於獲麟為志一則動氣意思説得也甚好但以熹觀之生出一箇物事為人所斃多少不好是亦一徵兆也又或問孔子當周衰時可以有為否曰聖人無有不可為之事只恐權柄不入手若得權柄在手則兵隨印轉將逐符行近觀左氏傳至定哀時儘有可做底事問固是聖人無不可為之事不知有不可為之時否曰便是聖人無不可為之時若時節變了聖人又自處之不同又問孔子當周衰時豈不知當時之君必不能用己曰聖人却無此心豈有逆料人君能用我與否又云到得後來説吾不復夢見周公與鳳鳥不至河不出圖吾已矣夫聖人亦自知其不可為但不知此等話是幾時説據陳恆弒君孔子沐浴而朝請討之時是獲麟之嵗那時聖人猶欲有為也獲麟在魯哀公十四年十六年孔子卒又曰孔子年三十五而昭公奔齊魯亂於是適齊為昭子家臣以通乎景公有聞韶問政二事公欲封以尼溪之田晏嬰不可公惑之有季孟吾老之語孔子遂行反乎魯年四十二而定公立季氏強僭其臣陽貨作亂專政故孔子不仕而退修詩書禮樂弟子彌衆九年孔子年五十公山不狃以費畔季氏召孔子欲往而卒不行有答子路東周語定公以孔子為中都宰一年四方則之遂為司空又為大司冦十年相定公會齊侯於夾谷齊人歸魯侵地十二年使仲由為季氏宰墮三都收其甲兵孟氏不肯墮成圍之不克十四年孔子年五十六攝行相事誅少正卯與聞國政三月魯國大治齊人歸女樂以沮之季桓子受之郊又不致膰俎於大夫孔子行魯世家以此以上皆為十二年事適衛主於子路妻兄顏濁鄒家孟子作顏讎由適陳過匡匡人以為陽虎而拘之有顔淵後及文王既沒之語既解還衛主蘧伯玉家見南子有矢子路及未見好德之語去適宋司馬桓魋欲殺之有天生德語及微服過宋事又去適陳主司城貞子家居三嵗而反於衛靈公不能用有三年有成之語晉趙氏家臣佛肹以中牟畔召孔子孔子欲往亦不果有答子路堅白語及荷蕢過門事將西見趙簡子至河而反又主遽伯玉家靈公問陳不對而行復如陳據論語則絶糧當在此時季桓子卒遺言謂康子必召孔子其臣止之康子乃召冉求史記以論語歸與之歎為在此時又以孟子所記歎詞為主司城貞子時語疑不然蓋語孟所記本皆此一時而所記有異同耳孔子如蔡及葉有葉公問答子路不對沮溺耦耕荷蓧丈人等事史記云於是楚昭王使人聘孔子孔子將往拜禮而陳蔡大夫發徒圍之故孔子絶糧於陳蔡之間有愠見及告子貢一貫之語按是時陳蔡臣服於楚若楚王來聘孔子陳蔡大夫安敢圍之且據論語絶糧當在去衛如陳之時楚昭王將以書社地封孔子令尹子西不可乃止史記云書社地七百里恐無此理時則有接輿之歌又反乎衛時靈公已卒衛君輒欲得孔子為政有魯衛兄弟及答子貢夷齊子路正名之語而冉求為季氏將與齊戰有功康子乃召孔子而孔子歸魯實哀公之十一年而孔子年六十八矣有對哀公及康子語然魯終不能用孔子孔子亦不求仕乃敘書傳禮記有杞宋損益從周等語刪詩正樂有語太師及樂正之語序易彖繫象説卦文言有假我數年之語弟子蓋三千焉身通六藝者七十二人弟子顔回最賢蚤死後唯曽參得傳孔子之道十四年魯西狩獲麟有莫我知之歎孔子作春秋有知我罪我等語論語請討陳恆事亦在是年吕祖謙大事記周敬王三十九年春魯人獲麟孔子作春秋春秋集義卷五十

body:
  text: 春秋集義綱領卷中宋李明復撰朱熹曰春秋皆亂世之事而聖人一切裁之以天理又曰春秋雖云孔子作如曰其事則齊桓晉文其文則史亦只是寫出魯史只是中間須有改更春秋難㸔熹平生所以不敢說如何知得上面那是魯史舊文那是聖人改底字若道是聖人不改聖人又何不只用魯史更作春秋做甚如曰其義則丘竊取之矣又曰知我者其惟春秋乎罪我者其惟春秋乎又公榖傳云其辭則丘有罪焉這是多少擔負又或問伊川程氏春秋序引夫子答顔子為邦之語為顔子嘗聞春秋大法何也曰此不是孔子將春秋向顔子說蓋三代制作極備矣孔子更不可復作故告以四代禮樂只是集百王不易之大法其作春秋善者取之惡者誅之意只是如此故伊川程子引以為様耳孔子尊周孟子不尊周如冬裘夏葛饑食渇飲時措之宜異爾孔孟易地則皆然問詩止於陳靈而後孔子作春秋者何如曰詩亡之本義不可知矣無以考其得失然恐謂雅亡或近之也又曰上古之書莫尊於易中古後書莫大於春秋然此二書皆未易㸔今人不理會二書便入穿鑿若要讀此二書且理會大義易則尊陽抑隂進君子而退小人明消息盈虚之理春秋則尊王賤霸内中國而外夷狄明君臣上下之分又曰孔子作春秋是大段忍不得問春秋曰春秋熹便不敢似諸公道聖人於一字半字上定去取聖人只是存得那事在要見當時治亂興衰如一部左傳載得許多事也未知是與不是但是道理也是如此今且把來參考見得其初王政不行天下皆無統屬及五伯出如此扶持方有統屬便見得禮樂征伐自諸候出到後來五伯之政又衰而政又自大夫出到孔子時皇帝王伯之道掃地故孔子作春秋據當時事書之教人見得事是如此人安知是用舊史與不用而今說此字是孔子作此字是舊文如何見得去何處勘驗况好惡自易見如葵丘之會召陵之師踐土之盟自是好本末自别如後來五伯既衰後如湨梁之盟之屬大夫出來與諸侯會自是差異自是不好而今堅要去一字兩字上討意如王人子突救衛這是衛當救當時是有箇子突孔子從而存得他箇名字而今諸公郤道王人本不書字緣其救衛故書字又何必如此說如孟子說臣弑其君者有之子弑其父者有之孔子懼作春秋此說得極是春秋只是如此春秋無義戰彼善於此則有之大槩亦自可見不如他諸公所說如此書便是予奪甚至於日月上也說道有予奪又問文定公據孟子春秋天子之事一句作骨如此則是聖人有意誅賞曰文定是如此説道理也是如此但聖人只是書之使後世因此去考見得道理如何便為是如何便為不是若說聖人當時之意說他當如此便書此一字他當如彼便書彼一字則恐不然又問今欲㸔春秋且將胡安國說為正如何曰便是他亦有太過處蘇轍教人只讀左傳只是他春秋亦自分曉且如公與夫人如齊畢竟是理會甚事自可見叉如季氏逐昭公畢竟因甚如此今人理會得一箇義理後將他事來處置合於義理者是不合義理者為非亦有謂之是而未盡善者亦有謂之不是而彼善於此者且如讀史記便見得秦之所以亡漢之所以興及至後來劉之所以得項之所以失不難判斷只是春秋郤精細他都不説破教後人自將義理去折衷延平李氏於春秋工夫未及下手而棄去蓋亦以心志凋殘不堪記憶此書雖云本根天理然實與人事貫通若不稽考事迹參以諸儒之說亦未易明也故未及請其說然嘗備聞其一二以為春秋一事各是發明一例如㸔風水移步換形但以今人之心求聖人之意未到聖人灑然處不能無失耳此亦可見其發明之大㫖也古史之體可見者書春秋而已春秋編年通紀以見事之先後書則每事别紀以具事之首尾意者當時史官既以編年紀事至於大者則又採合而别記之若二典所記上下百有餘年而武成金縢諸篇其所記或更數月或歴數年其間豈無異事蓋必已具於編年之史而今不復見矣故左氏於春秋既依經以作傳復為國語二十餘篇國别事殊或越數十年而遂卒其事蓋亦近書體以相錯綜云爾又曰左氏說得春秋有七八分問孔子作春秋空言無補亂臣賊子何緣便懼且何足為春秋之治孟子集注所云如此曰非說當時便一治只是存得箇治法使此道理光明燦爛有能舉而行之為治不難當時史書掌於史官想人不得見及孔子取而筆削之而其義大明孔子亦何曾果有意說用某字使人知勸用某字使人知懼用某字有甚微詞奥義使人曉不得只以褒貶榮辱人不過如今之史書直書其事善者惡者了然在目觀之者知所懲勸故亂臣賊子有所畏懼而不犯耳近世說春秋者太巧皆失聖人之意問孔子所書辭嚴義簡若非三傳詳著事迹亦曉他筆削不得曰想得孔子作書時事迹皆在門人弟子皆曉得聖人筆削之意三家懼其久而泯没也始皆筆之於書流傳既久是以不無訛謬然孔子已自直書在其中如云夫人姜氏會齊侯于某公與夫人姜氏會齊侯于某公薨于齊公之喪至自齊夫人孫于齊此等顯然在目雖無𫝊亦可曉且如楚子侵中國得齊桓公遏之使不得侵齊桓公死又得晉文公遏之如横流泛濫硬做隄防不然中國為渰浸必矣此等義何難曉問讀春秋之法曰如他法只是据經所書之事迹而準折之以先王之道某是某非某人是底猶有未是處不是底又有彼善於此處自將道理折衷便見如㸔史記秦之所以失如何漢之所以得如何楚漢交争楚何以亡漢何以興其所以為是非得失成敗盛衰者何故只將自家平日講明底道理去折衷㸔便見㸔春秋亦如此只是聖人言語細宻要人仔細勘量考索耳孔子七十歲方繫易作春秋易本隠以之顯春秋推見至隠易與春秋天人之道也易以形而上者說出在那形而下者去春秋以形而下者說上那形而上者去或說春秋云不當以褒貶㸔聖人只備錄是非使人自見如克段之書而兄弟之義自見如蔑之書而私盟之罪自見來賵仲子便自見得以天王之尊下賵諸侯之妾聖人以公平正大之心何嘗規規於褒貶曰只是中間不可以一例說自有曉不得處且道如翬帥師之類是如何曰未賜族如挾柔無駭之類到莊以後郤不待賜而諸侯自予之曰便是這般所在那裏見得這是賜那是未賜三𫝊惟左氏近之而今㸔春秋初時天王尚略略有戰伐之屬到後來都無及到定哀之後更不說著然其初只是諸侯出來抗衡到後來諸侯不奈何便又被大夫出來做及大夫稍稍做不奈何時又被陪臣出來做這便似唐之藩鎮模様其初是節度使抗衡後來牙將孔目官虞候之類皆殺節度使出來做當時被他出來握天下之權後便更無奈何這自是其勢必如此如夫子說禮樂征伐自天子出一段這箇說得極分曉春秋大㫖其可見者誅亂臣討賊子内中國外夷狄貴王賤伯而已未必如先儒所言字字有義也想孔子當時只是要備二三百年間之事故取史文寫在這裏何嘗云某事用某法某事用某例如書會盟侵伐大意不過見諸侯擅興自肆耳書郊禘大意不過見魯僭禮耳至如三卜四卜牛傷牛死是失禮之中又失禮也如書不郊猶三望是不必望而猶望也如書仲遂卒猶繹是不必繹而猶繹也如此等義却自分明近世如蘇氏吕氏郤㸔得平問伊川程先生春秋序後條曰四代之禮樂此是經世之大法春秋之書亦經世之大法也然四代之禮樂是以善者為法春秋是以不善者為戒又問孔子有取乎五霸豈非時措從宜曰是又曰觀其予五霸其中便有奪底意思又曰十二公時各不同如隠桓時王室新東號令不行天下都星散無王莊僖之時桓文造伯政自諸侯出天下始有統一宣公時楚莊方盛强夷狄主盟中國諸侯親齊者亦皆朝楚朝晉者亦皆朝楚及成公之世悼公出來整頓楚始退去既而吳越又强入來争伯定哀之朝政自大夫出魯三家晉六卿齊田氏宋華向放肆意志終春秋世更不奈何張栻曰春秋明天理遏人欲以示萬世有國家者之大法故曰天子之事又謂知我罪我者其惟春秋乎蓋知之則以為聖人繼天心而立人極有不可已者不知則以為専斷二百四十二年之行事或云僣矣又曰春秋之作其事之大者不過齊桓晉文其文則因魯之舊然其義則聖人有取乎此蓋一句一字之間所以存天理遏人欲撥亂反正示王者之法於將來也方其未經聖人筆削固魯國之史耳及乎聖人有取焉則情見乎辭乃史外𫝊心之要典也故孔子曰其義則丘竊取之矣又云春秋即事而明天理窮理之要也觀此書取其大義數十斷為定論而詳味其抑揚予奪輕重之宜則有以權萬變矣或讀春秋通㫖謂春秋史外𫝊心之要典王正月者心之體也伊川所謂一哉王心箕子無偏無黨是也嘆其妙讀及儀父宋人盟心之妄克段心之賊歸仲子賵心之邪祭伯來心之貳益師卒而不日心之慢曰心却無許多事也成春秋而亂臣賊子懼者亂臣賊子之情偽畢見而討絶之法著焉施於萬世更無所遁其迹故也又曰學者要須先明王霸之辨而後可論治體王霸之辨莫明於孟子大扺王者之政皆無所為而為之霸者則莫非有為而然也無所為者天理義之公也有所為者人欲利之私也故左氏所載齊桓晉文之事其間豈無可喜者要莫非有所為而然攷其迹而其心術之所存固不可掩也吕祖謙曰觀春秋見聖人以禮杜亂名義之間凜乎其不可紊誠欲使是非善惡明白故其辭所以微而顯婉而辨若只是為匹夫而作則定不如此微婉既如此則能使上之人善惡昭明如齊桓晉文當時不知其為假仁也惟春秋書之則知其所以譎季氏之强當時不敢言其非也惟春秋書之則知其所以僭所謂上之人能使昭明不是上之人能使春秋之法明何故春秋之作其法便自昭昭不待上之人使之明也故孔子曰我欲載之空言不如見諸行事之深切著明也春秋便是行事五霸之霸王政衰則霸者出王政修明則安得有霸夏伯昆吾商伯大彭豕韋周伯齊桓晉文此是三代之伯春秋之伯齊桓晉文秦穆楚莊宋襄不足以與霸或者以勾踐與五伯之例論諸家得失程頥曰春秋何為而作哉其王道之不可行乎孟子有言曰春秋天子之事也去聖踰逺諸儒紛紛家執異論人為私說互相彈射甚於仇讎開元秘書言春秋者蓋七百餘家矣然聖人之法得者至寡至於棄經任𫝊雜以符緯膠固不通使聖人之心鬰然而不顯吁可痛也獨唐陸淳得啖先生趙夫子而師之講求其學積三十年始大光瑩絶出於諸家外雖未能盡聖作之藴然其闢異端開正途功亦大矣惜夫其書之粹者在乎集𫝊而世微其𫝊矣今所存者請槩言其一二亦可觀其道之所至焉春秋之法大者在乎侵伐戰取圍入執殺盟會如聘禘郊烝嘗歸復入納灾異賦役焉然諸家之論前予後奪未見其能一也其間書侵者五十七伐者二百一十三書圍者四十四入者二十七聖人之意其詳其備也如是豈苟然哉蓋誅其禍亂之道爾彼豈有是哉徒隨其事而傳之三傳往往從而美之者有矣未有一言發明聖人誅之之心者也獨陸君用啖氏之說曰春秋紀師何無曲直之辭曰一之也不一則禍亂之門闢矣若夫其差之甚者則在乎其文矣此則見聖人絶惡之源原情之法此表裏之論也其餘若盟會其法皆用是也禘郊之議詭譎殊狀左氏之𫝊畧而不解公榖之論泥而失真何杜之流汛汛其間爾陸氏之學獨能斥先儒之失明諸侯之僭謂禘為王者之祭明郊非周公之志皆足以見其所存之博大得聖師救禍亂明上下之心也餘若書鄭伯之克為克下之辭明君臣之義異乎所謂如二君與能殺者屑屑之論矣書次于郎則言非有俟而次則已將為賊爾防兵亂之源殊乎所謂過信次止者區區之談矣發言侵言伐之例則曰無名行師與稱罪致討之異逺乎濶略之言賊害之語矣且取邑之條則曰力得之不是其専奪異乎不用師徒不宜取之之淺矣其餘稱將帥紀名紀氏之類亦皆度越於諸家逺甚㫖意之衆莫可歴數要其歸以聖人之道公不以已得他見而立異故其所得也深噫聖門之學吾不得而見焉幸得見其幾者矣或問程頥曰左傳可信否曰不可全信信其可信者耳問公榖如何曰又次于左氏左氏即是丘明否曰𫝊中無丘明字不可考朱熹曰春秋之書且据左氏當天下大亂聖人自據其實而書之其是非得失則付諸後世公論蓋有言外之意若必於一字一辭之間求褒貶所在竊恐不然又曰春秋本是明道正誼之書今人只較齊晉伯業優劣反成謀利大義都晦了且如今人做義只做得齊桓晉文優劣論又曰正誼不謀利明道不計功尊王賤霸内諸夏外夷狄此春秋之大㫖不可不知也㸔春秋且須㸔左氏首尾意思通貫方能略見聖人筆削與當時事之大意又曰春秋難理會公榖甚不好然又有甚好處如序隠公遜國宋宣公遜其姪處甚好何休注甚謬春秋制度大綱左傳較可據公榖較難慿胡文定義理正當問左丘明非𫝊春秋者耶曰未可知也啖趙陸氏辨之於纂例詳矣程子蓋因其說而范吕楊氏則因以為當世之人也先友鄧著作考之氏姓書曰此人蓋左丘姓而明名傳春秋者乃左氏耳左氏傳是一博記人做只是以世俗見識斷當世事皆功利之說公榖雖陋亦有是處但皆得於傳聞多訛謬左氏之文及於三家滅知伯故通鑑始於威烈王二十三年蓋繼春秋也左氏歌詩恐是當時文飾左氏說禮皆是周末衰亂不經之禮無足取者或云如陳鍼子送女先配後祖一段更是不分曉古時豈曾有此禮曰便是他記禮皆差熹嘗言左氏不是儒者只是曉事該博會做文章之人若公榖二子却是不曉事底儒者故其說道理及禮制處不甚語得鄭重或因舉所斷孔父謂其義形於色仇牧謂其不畏强禦荀息謂其不食言最是說得好曰然或云以祭仲廢君為行權衛輒拒父為尊祖都是不是曰是他不曉事底見識只知道有所謂嫡孫承重之義便道孫可以代祖而不知子不可以不父其父又曰公榖想得皆是齊魯間儒其所著之書恐有所傳授但皆雜以己意所以多差舛有合道理者疑是聖人之舊左傳君子曰最無意思朱熹曰春秋傳例多不可信聖人記事安有許多義例又問胡文定春秋曰胡氏春秋大義正但春秋自難理會如左氏猶有淺陋處問於二禮書春秋未有說何也熹曰春秋是當時實事孔子書之後世諸儒學未至而各立己意正横渠張載所謂非理明義精而治之故其說多鑿是也惟伊川程氏以為經世之大法得其㫖矣然其間極有無定當難處置今不若且存取胡氏本子與後世㸔縱未能盡得之然不中不逺矣宋氏春秋駮議其說以左親受經於仲尼以公羊榖梁為道聴途說之學以唐啖趙陸淳為狂懵其集𫝊纂例皆竊左杜之說辯則辯矣抑有可疑者如隠公不書即位左氏以為攝也春秋既正名隠公為諸侯矣會盟征伐莫不稱公又削其即位以為攝則是名不正也昔者周公嘗攝政矣考諸詩書成王則稱王周公則稱公未嘗易其名位而以周公為王也名不正則言不順言不順則事不成春秋豈其若是哉此可疑者一也宰咺歸賵左以為於惠公則贈死不及尸於仲子則豫凶事也仲子猶存生而來賵周徳雖衰不應至此極此其可疑者二也二年冬夫人子氏薨杜氏以為隠公讓桓為太子成其母喪以赴諸侯故經於此稱夫人經既正名仲子為夫人矣六年考仲子之宫又不稱夫人子氏之宫何也前則夫人之後則妾之何春秋之名實變亂無常如此乎其可疑者三也四年夏君氏卒左氏以為聲子也不稱夫人故不言葬不書姓為公故曰君氏定姒亦非夫人而得葬則於例不通為子故削其母之姓而特曰君氏於理無說其可疑者四也隠公薨不葬左氏以為不成喪也按翬使賊弑公而討寪氏有死者固欲掩其弑君之迹歸獄于寪氏矣豈更令其喪禮不成以自暴耶此其可疑者五也左氏果受經於仲尼不應是非如此之謬也榖梁子則以為隠公之欲與桓讓也夫人子氏薨者隠之妻也公羊子則以尹氏卒譏世卿也隠不書葬賊未討也疑得春秋之㫖也故言三𫝊得失未有若啖氏之精者其言曰左氏比於二𫝊其功最髙博采諸家叙事尤備能令後代頗見本末因以求意經文可知二傳傳經宻於左氏榖梁意精公羊詞辨但守文堅滯或至矛盾不近聖人夷曠之體其言三家得失可謂公矣故愚於序中有取於啖趙三家者為其所得之多亦不敢以為盡也若為宋氏駮議指為狂懵竊恐其言之過耳陸伯沖宗師啖趙著微㫖三卷多得春秋要義宋氏以公榖但廣演左義徒為繁文以啖陸竊杜征南註為之冗說則未曉也且以從上一事明之如隠公元年春王正月不書即位左氏則直以惠公為再娶以仲子為夫人以桓為嫡子以隠公之居位攝也榖梁子則以惠公之欲與桓邪也既勝其邪心以與隠矣探先君之邪志而遂以與桓則是成父之惡也故隠之讓桓不正也其說與左氏正相反矣安得言但廣演左義為繁文而已乎啖氏則又曰言古者諸侯一娶九女元妃卒則次妃攝行内事無再娶之文故仲子非夫人桓公非嫡子惠公之欲與桓是虧禮而遺禍也此又榖梁子之所未發者安得指為冗說考尋經文當以左氏為非以榖梁啖說為是夫人存則以氏繫姓以姓繫號夫人殁則以諡繫號以姓繫諡若夫存不稱號殁不稱諡單舉姓字者妾耳元年歸仲子之賵六年書考仲子之宫以姓繫字不稱號諡則知諸侯不再娶仲子非夫人矣隠二年夫人子氏薨謂桓之母者誤矣夫非所有而據之者攝也推已所有以與人者讓也仲予果夫人桓公果嫡子則國乃其國也隠何得久攝而不歸也隠不奉桓為君而自立乎其位則是簒也桓公殺之乃非弑君其惡亦少減矣春秋亦不應深絶之今乃於隠不書葬桓不書王冢宰下聘而稱其名諸侯來朝而降其爵榮叔錫命去天王以深絶之也則知桓公非嫡子矣其於隠有長幼之序無貴賤之别矣隠公自當有國而非攝矣其欲與桓而不書即位當名為讓矣推此一事其他可知春秋集義綱領卷中

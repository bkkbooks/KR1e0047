body:
  text: 春秋集義卷十八宋李明復撰僖公程頥曰僖公名申莊公子閔公庶兄惠王十八年即位僖謚也小心畏忌曰僖元年春王正月謝湜曰閔公遇難其位不得受之先君故不書即位季友不死子般閔公之難不能速討逆賊固有責矣然去叔牙奉子般以正國嗣立僖公逐慶父以安社稷友之力也胡安國曰不書即位内無所承上不請命也閔公薨夫人孫于邾慶父出奔莒公于是焉以成風所屬而季子立之内無所承也嗣子定位于初喪而魯使不告于周明年正位改元而周使亦不至于魯又明年服喪已畢而不見於京師上不請命也承國于先君者父子之倫請命于天王者君臣之義今僖公内無所承上不請命不書即位正王法也是故有四海而即天王之位者受之于天者也有一國而即諸侯之位者受之于王者也受之于天者必奉若天道而後能保天下受之于王者必謹守王度而後能保國齊師宋師曹師次于聶北救邢程頥曰齊未嘗興大衆此稱師責其衆可救而徒次以為聲援致邢之不保其國也或問程頥邢衛為狄所滅齊桓公攘戎狄而封之當時夷狄横而中國微桓公獨能如此故孔子曰微管仲吾其被髪左袵矣為其功如此也觀晉室之亂劉石猖獗于中原當是時只爲無一管仲故顛沛如此然則管仲之功後世誠難及也曰若以後世論之其功不可謂不大自王道觀之則不足以為大也今人只爲見管仲有此故莫敢輕議不知孔孟有為規模自别見得孔孟作處則管仲自小曰孔孟如何曰必也以天保以上治内以采薇以下治外雖有夷狄安得遽至中原乎如小雅盡廢則政事所以自治者俱亡四夷安得而不交侵程氏學曰齊師宋師曹師次于聶北救邢言救邢謂其志于義也言次于聶北以見其不及事故夏六月邢遷于夷儀其不及事尤可見矣齊師宋師曹師城邢其志于義尤可見矣春秋之時諸侯交亂争地以戰殺人盈野爭城以戰殺人盈城又況于蠻夷猾夏者哉然而天子不能正方伯不能討當是之際有能奔命而救之者雖行師不出于天子未合于王道之正而權事度情亦云善矣可不與之哉凡書救者皆善之也其間輕重襃貶則各存乎其文矣胡安國曰三國稱師見兵力之有餘也聶北書次以譏救邢之不速也春秋大義伐而書次其次為善遂伐楚次于陘美之也救而書次其次為貶救邢次于聶北譏之也聖人之情見矣故救患分災于禮為急而好攻戰樂殺人者于罪為大又曰春秋以用兵侵伐為戒獨至于救患分災惟恐次止遷延而欲其速也故伐而書次者其次為善次于陘美之也救而書次者其次為貶次于聶北譏之也以此見聖人之情矣呂祖謙曰諸侯救邢初間狄伐邢齊已救了今何故又救邢盖初間救邢之時狄人雖退却去伐衛衛與邢相近狄既滅衛後遂乗滅國之威又去伐邢所以桓公帥諸侯之師再去救邢然不便去救邢却次于聶北而又不速進師者何故葢桓公是覇主夷狄與中國相為盛衰勝負于此乎分萬一小敗狄人便自此來侵中國此不得不謹所以未敢輕發直待邢潰是突圍而出方敢乗其勢亂而救之又曰齊桓公始覇之初狄滅衛又伐邢見得當時夷狄凌中國如此之甚向非齊桓之覇封衛遷邢則中國㡬何而不淪胥為夷狄此孔子所以有微管仲吾其被髮左袵之嘆也夏六月邢遷于夷儀齊師宋師曹師城邢謝湜曰邢有狄難諸侯帥師救之邢遷夷儀諸侯帥師城之邦國之義也雖然以三國師衆之盛可以攻狄而攘之矣次于聶北而後進焉則其救邢緩而不急也救難如救溺緩而不急則失救之道矣邢之受禍如在水火之中也三國次于境上至于六月不進而狄無退心師至其國則邢人已為兵刃之血矣故邢迫危亡以至遷于夷儀邢之遷三國緩師之過也與其次而後救不若不次之為善也與其遷而後城不若不遷之為善也力足以討暴折難而遷延後時故聶北之師書救書城以著其善書次書遷以著其惡胡安國曰書邢遷于夷儀見齊師次止緩不及事然邢以自遷為文而再書齊師宋師曹師城邢者美桓公志義卒有救患之功也不以王命興師亦聖人之所與乎中國衰微夷狄猾夏天子不能正至于遷徙奔亡諸侯有能救而存之則救而存之可也以王命興師者正能救而與之者權秋七月戊辰夫人姜氏薨于夷齊人以歸謝湜曰夷齊地哀姜薨于夷齊桓取而殺之也齊人以歸者以哀姜之喪歸于齊也哀姜之得罪也以母與知殺子而已義未絶于魯也哀姜之罪天王在所治為天吏者可得而誅也桓公父母之國也宜以親親之恩為之隱也以罪討而殺之非父母國之道也身未絶于魯而齊人以歸非父母國之義也殺非其殺歸非其歸齊失正也哀姜出奔書曰夫人姜氏孫于邾為之諱其奔也其見殺也書曰夫人姜氏薨于夷為之諱其殺也其喪至也書曰夫人氏之喪至自齊其葬也書曰葬我小君哀姜觀春秋所書則哀姜于魯可知矣胡安國曰夫人薨不地其曰薨于夷何也桓公召而殺之也其曰齊人以歸者以其喪歸于魯也齊為盟主義得舉法是覇者之所以行乎諸侯也既誅其人又歸其喪何居魯欲拒而勿受乎則子無讐母之義受而葬之乎己絶者復得享小君之禮典刑紊矣故特書以歸而不曰歸夫人之喪以者不以者也楚人伐鄭謝湜曰楚入春秋爵號不通中國故荘公之世楚惟稱荆至其一來修䀻始進稱人僖公初政令與中國相通荆始改號稱楚自此用兵侵伐皆進稱人方是時楚雖益熾齊桓能制其强故終桓之世楚惟稱人而不與中國㑹盟及桓之殁也其權勢與中國相抗始以人㑹列國盟于齊又以人㑹列國盟于鹿上至盂之㑹執宋公伐宋楚遂書爵而位列陳蔡上以示楚日强大而中國不能制也自是楚見于經皆與中國並故君則稱爵卿則稱名其官稱大夫其爵稱公子衆則稱師微則稱人或人以示貶或名以示絶赴告之禮行而書卒書名聘問之禮詳而書卿書使以楚之禮法皆循中國故也胡安國曰楚稱人寖强也荘公十年敗蔡師虜獻舞固己强矣然獨舉其號者始見于經則本其僣竊之罪正其夷狄之名著王法也二十三年來聘嘉其慕義乃以人書二十八年伐鄭惡其猾夏復以號舉至是又伐鄭也亦書人者豈許其伐國而人之乎㑹中華執盟主朝諸侯長齊晉其所由來者漸矣八月公㑹齊侯宋公鄭伯曹伯邾人于檉謝湜曰左氏謂謀救鄭檉宋地九月公敗邾師于偃謝湜曰哀姜之死魯人歸怨于邾故公敗邾師胡安國曰檉之㑹謀救鄭而公與邾人咸與焉則是志同而謀協也今既㑹邾人于檉又敗邾師于偃于此責公無攘夷狄安中國之誠矣凡此皆直書其事而義自見也詐戰曰敗敗之者為主冬十月壬午公子友帥師敗莒師于酈獲莒挐謝湜曰慶父魯之逆臣莒人以慶父之賂興師不義之大也出不以義進不量力故公子友敗莒師獲莒拏莒大夫之帥師者也大夫師敗而身獲于人不智之大也書獲罪之也列國大夫皆王臣也以戰為事而獲人之卿公子友之罪也度徳量力用師之道也不義不智而身獲于人莒拏之罪也酈之敗曲在莒已明故不書伐胡安國曰按公羊慶父走莒莒人逐之將由乎齊齊人不納却反舍于汶水之上奚斯入請不可而死莒人曰吾已得子之賊以求賂乎魯魯人弗與為是興師而來伐然則罪在莒也而以季友主此戰何也抑鋒止鋭喻以辭命使知不縮而引去則善矣今至于兵刃既接又用詐謀擒其主將此强國之事非王者之師春秋之志故以季友為主而書敗獲責之備也十有二月丁巳夫人氏之喪至自齊謝湜曰齊人以姜之尸歸僖公請而葬之書至自齊著齊之惡也不稱姜杜氏謂之闕文是也以為貶絶亦不當書氏且夫人之罪未在所絶故也胡安國曰夫人與弑二君幾于亡國大義已絶不可復入宗廟矣書孫于邾薨于夷者絶哀姜也書齊人以歸夫人氏之喪至自齊者譏桓公也不稱姓者殺于齊不去氏者受于魯張栻語録或論哀姜之孫不去姜氏者將以别于文姜也然般閔再弑魯國幾亡其禍亦慘矣子雖不可以讐毋以先君治之夫豈不可故夫人喪至自齊也因告至于廟遂去其姓猶存其氏者終有别于文姜也所謂毫釐有所必計者也呂祖謙曰君子以齊人之殺哀姜也為己甚矣哀姜于魯大義絶論來魯之臣子當正罪討之于未立君之前若閔公既立之後亦難討之齊則不當殺魯不敢殺所以取而殺之二年春王正月城楚丘楊時曰齊桓公攘戎狄而封衛未嘗請命于天子而專封之也故春秋書城楚丘而不言其封衛葢無取焉然則木𤓰美桓公孔子何以取之曰木𤓰之詩衛人之詩也衛為狄所㓕桓公救而封之其恩豈可忘也欲厚報之不亦冝乎在衛人之義不得不以為美其取之也以衛人之義而已若春秋褒貶示天下之公故無取謝湜曰楚丘衛邑衛為狄所滅野處漕邑諸侯為之城楚丘而封焉楚丘不書衛善魯人視楚丘猶己國之事而城之也諸侯救災恤隣義也勞民以供鄰役非義也城楚丘諸侯之事也魯為之城義也故魯城楚丘不書衛善其視衛之患如己國之患也城小榖齊之事也魯為之城非義也故魯城小榖不書齊議其以齊之事為己國之事也衛之出于漕也詩稱齊桓公攘戎狄而封之然則城楚丘齊之功諸侯之力也不書諸侯者齊桓以威率諸侯而城之諸侯心力未齊故也城不書諸侯而齊桓未能悦服諸侯由此見矣城邢邢既危而後安之者也城楚丘衛既亡而後存之者也邢危而後安之衛亡而後存之雖有安存之力已失安存之道矣故齊桓攘戎狄保邦國雖若安邢存衛春秋皆不美其功也前書狄入衛後書城楚丘則春秋不美齊桓其心見矣夷儀邢已遷故城書邢楚丘衛未遷故城不書衛胡安國曰楚丘衛邑桓公帥諸侯城之而封衛也不書桓公不與諸侯專封也木𤓰美桓公而夫子録之意豈異乎不與專封正王法也木𤓰有取焉善衛人之情也曷為善之報者天下之利以徳報徳則民有所勸矣城楚丘略而不書城邢詞繁而不殺何也按周制凡封國大宗伯賔司几筵設黼扆内史作冊命是天子大權非諸侯所得擅而行之者也衛人渡河野處漕邑許穆夫人閔其亡而載馳賦文公徙居楚丘而後百姓悦則其國固嘗亡滅而不存矣城楚丘是擅天子之大權而封國也邢遷于夷儀經以白遷為文則其遷出于己意其國未嘗滅也諸侯城邢是謂同惡相恤以從簡書故詞繁而不殺美救患也桓公封衛而衛國忘亡其有功于中華甚大為利于衛人甚博冝有美詞以揚其事今乃微之若此者正其義不謀其利明其道不計其功略小惠存大節春秋之法也故曰五覇三王之罪人仲尼之徒無道桓文之事者朱熹曰春秋闕地呂祖謙曰封邢如何却在遷邢之後葢狄滅衛後盤旋邢衛之間桓公下手未得所以逐狄之緩待狄都退後方城楚丘其勢是如此夏五月辛巳葬我小君哀姜虞師晉師滅下陽程頥曰虞假道而助晉伐虢虢之亡虞實為之故以虞為主下陽邑也虢之亡因此故先書虞程氏學曰虞師晉師滅下陽晉主乎伐虢而虞為首何也受賂假道以師同伐虢故以虞為首也下陽虢邑也邑不言取而云滅者趙氏謂虢因而亡也不于滅而書之著虞罪也此義明矣葢不為道則晉不得逞下陽既喪而虢遂滅矣聖人所書微㫖可見也謝湜曰下陽虢之塞邑也邑不言滅下陽謂之滅者下陽入晉而虢因以亡故下陽書滅以著虢滅之由也著虢滅之由所以罪虞也伐虢晉獻公之謀也然晉師得至于虢以虞為道晉師得取下陽以虞為主然則虢亡皆起于虞故下陽之難以虞先晉而首其惡也虢同姓之國也虞晉滅虢不名者方下陽之亡虢實未滅故也虞公貪暴君之賂而假之道合兩國㑹焉胡安國曰按孟子晉人以垂棘之璧與屈産之乗假道于虞以伐虢宫之竒諫百里奚不諫然則晉人造意以虞首惡何也貪得重賂遂其强暴以滅兄弟之國以及其身而亡其社稷所以為首乎春秋聖人律令也觀此義可以見法矣唐髙祖賜其臣長孫無忌金寳繒錦欲以立武昭儀雖無忌終不順㫖君子猶譏其役于利而不反君賜也矧受他人之賂遂其强暴者乎國而曰滅下陽邑爾其書滅何也下陽虞虢之塞邑猶秦有潼闗蜀有劍嶺皆國之門户也潼劒不守則秦蜀破下陽既舉而虞虢亡矣春秋此義以天下為家以城郭溝池為固以山川丘陵為險設之以守國而待暴客者也其衰世之意耶呂祖謙曰此一事知宫之竒之諫必不聽知虞之必可假知虢之必可亡料敵如見自是觀之晉國智謀之士如息者亦自有數至于傅奚齊此叚全不能知却不能先為保護之計何料敵如是之審謀國如是之疎葢息本非就自身上做工夫專以億度揣摩為事故有著不著處又曰晉荀息何故知虞有宫之竒葢荀息是獻公謀臣平日欲經營諸國亦曽下工夫所以知得言其懦不能强諫葢他國雖有謀臣若是昏闇之人則不能知此非止得宫之竒之為人亦是知得虞之情性所以説冀一叚以誇大之秋九月齊侯宋公江人黄人盟于貫胡安國曰按左氏盟于貫服江黄也荆楚天下莫强焉江黄者其東方之與國也二國來定盟則楚人失其右臂樂毅下齊先結韓趙孔明伐魏申好江東雖武王牧野之師亦誓友邦逺及庸蜀彭濮八國之人共為犄角之勢也桓公此盟其服荆楚之慮周矣其攘夷狄免民于左袵之義著矣盟雖春秋所惡然諸侯皆在獨言逺國者許是盟也呂祖謙曰先理㑹小者却去理㑹楚冬十月不雨楚人侵鄭呂祖謙曰齊楚何故欲爭鄭葢鄭介乎兩間齊得鄭則齊强楚得鄭則楚强三年春王正月不雨夏四月不雨胡安國曰榖梁子曰不雨者勤雨也毎時而一書閔雨也閔雨有志乎民者也厯時而總書不憂雨也不憂雨者無志乎民者也按詩稱僖公儉以足用寛以愛民務農重榖則誠賢君也其有志乎民審矣故冬不雨而書春不雨而書夏不雨而書以著其勤也文公以練祭則緩于作主以宗廟則太室屋壊以賦政則四不視朔以邦交則三不㑹盟其無志乎民亦審矣故自十有二月不雨至于秋七月而書自正月不雨至于秋七月而書以著其慢也徐人取舒六月雨胡安國曰雨云者喜雨也閔雨與民同其憂喜雨與民同其樂此君國子民之道也觀此義則知春秋有懼天災恤民隱之意遇天災而不懼視民隱而不恤自樂其樂而不與民同也國之亡無日矣秋齊侯宋公江人黄人㑹于陽榖胡安國曰按左氏謀伐楚也或曰侵蔡次陘之師諸侯皆在江黄獨不與焉則安知其為謀伐楚乎曰兵有聚而為正亦有分而為竒諸侯之師同次于陘所謂聚而為正也江人黄人各守其地所謂分而為竒也次陘大衆厚集其陣聲罪致討以震中國之威江人黄人各守其境按兵不動以為八國之援此克敵制勝之謀也退于召陵而盟禮定循海以歸而濤塗執然後及江人黄人伐陳則知侵蔡次陘而二國不㑹自為犄角之勢明矣此大㑹而未言者善是謀也冬公子友如齊涖盟謝湜曰齊將伐楚故季友適齊涖盟涖盟者我往受盟于彼也來盟者彼來受盟于我也盟在彼而我往臨之故書涖楚人伐鄭謝湜曰楚三年再伐鄭一侵鄭春秋集義卷十八

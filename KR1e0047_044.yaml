body:
  text: 春秋集義卷四十一宋李明復撰㐮公二十有四年春孫叔豹如晉仲孫羯帥師侵齊謝湜曰齊侯伐晉故魯師侵齊救而次為不仁出師而侵為不義夏楚子伐呉秋七月甲子朔日有食之既齊崔杼帥師伐莒謝湜曰君襲之臣伐之非伐莒之道也大水八月己巳朔日有食之公㑹晉侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子于夷儀謝湜曰齊侯背盟不道甚矣㑹于夷儀將以伐齊也冬楚子蔡侯陳侯許男伐鄭謝湜曰三國從楚故自陳侯逃歸以來不與㑹盟公至自㑹陳鍼宜咎出奔楚叔孫豹如京師大饑謝湜曰所至乏食為大饑大水一傷秋稼而國無蓄積故大饑胡安國曰古者救災之政若國凶荒或𤼵廪以賑之或移粟以通用或徙民以就食或為粥溢以救餓莩或興工作以聚失業之人緩刑舍禁弛力薄征索鬼神除盗賊弛射侯而不燕置廷道而不修殺禮物而不備雖有旱乾水溢民無菜色所以備之者如此其至是年秋有隂沴之災而冬大饑盖所以賑業之者有不備矣故書之以為戒二十有五年春齊崔杼帥師伐我北鄙謝湜曰仲孫羯侵齊故崔杼伐我北鄙夏五月乙亥齊崔杼弑其君光范祖禹曰古者官守其職史書善惡君相不與焉故齊太史兄弟三人死於崔杼而卒不没其罪此奸臣賊子所以懼也後世人君得觀史而宰相監修欲其直筆不亦難乎謝湜曰崔杼以世卿専國久矣是以難其君若難匹夫羣臣惟知聴命於崔而不知有君也春秋前書崔氏其禍基於此矣然則世卿之禍可不戒哉莊公淫妖色黷武事委政權臣而棄身於姦人之室君道於此替矣然則杼之難雖曰臣之逆也亦君自取之而已賊不討故不書葬胡安國曰齊莊公見弑賈舉州綽等十人皆死之而不得以死節稱何也所謂死節者以義事君責難陳善有所從違而不茍者是也雖在屬車後乘必不肯同入崔氏之宫矣若此十人者獨以勇力聞皆逄君之惡從君於昏亂而莊公嬖之者死非其所比諸匹夫匹婦自經於溝瀆而莫之知者猶不逮也晏平仲曰君民者豈以陵民社稷是主臣君者豈為其口實社稷是飬故君為社稷死則死之為社稷亡則亡之若為已死而為已亡非其私昵誰敢任之此十人者真其私暱任此宜矣雖殺身不償責安得以死節許之哉公㑹晉侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯把伯小邾子于夷儀謝湜曰齊有崔杼弑逆之亂㑹于夷儀以討齊也胡安國曰諸侯㑹于夷儀將以討齊齊使隰鉏請成慶封如師男女以班賂晉侯以宗器樂器自六正五吏三十帥三軍之大夫百官之正長師旅及處守者皆有賂晉侯許之夫晉本為報朝歌之役來討及㑹夷儀既聞崔杼之弑則宜下令三軍建而復斾聲於齊人問莊公之故執崔杼以戮之謀於齊衆置君以定其國示天討之義則方伯連帥之職修矣今乃知賊不討而受其賂則是與之同情也故春秋治之如下文所貶云六月壬子鄭公孫舍之帥師入陳秋八月己巳諸侯同盟于重丘謝湜曰盟于重丘將以討齊之逆也討逆諸侯之同志故稱諸侯其盟諸侯所同欲故稱同盟諸侯志在定亂善之大也然卒不能討治大逆而尸之市朝則諸侯之所同罪亦見矣然則重兵之盟書諸侯書同盟既以著其善又以著其惡胡安國曰崔杼既弑其君矣晉侯受其賂而許之成故盟于重丘特書曰同公至自㑹衛侯入于夷儀謝湜曰衛立公孫剽主衛則夷儀已非獻有矣書入以示獻公之失國也以臣逐君林父之逆也立剽衛人之擅命也獻公既絶於國然而於國有不可絶之義也其入也爵而不名以示獻公之不當絶也衎入夷儀不名與鄭伯突入櫟異矣胡安國曰鄭伯突入于櫟衛侯入于夷儀其入則一或名或不名者鄭伯奪正以立而國人君之諸侯助之不知其義不可以有國也故特書其名著王法以絶之衛侯蔑其冡卿失國出奔固不為無罪矣然有世叔儀以守有母弟鱄以出或撫其内或營其外有歸道焉則其義猶未絶也故止書其爵而不名寗喜弑剽復歸于衛然後書名此聖人俟其改過遷善不輕絶人之意曽子曰夫子之道忠恕而已此類是也楚屈建帥師滅舒鳩謝湜曰舒鳩楚屬國冬鄭公孫夏帥師伐陳十有二月呉子遏伐楚門于巢卒謝湜曰呉子伐楚名者為伐楚而卒故也門于巢攻巢之門也呉子以身當巢門故巢人射而殺之為一國君主而見殺于門乃呉子取之而已其死書卒不書殺罪其自取也凡國君自取禍患而遇害者春秋不以罪人責君之自保也胡安國曰巢南國也其言門于巢卒者呉子將伐楚引師至巢入其門巢人射諸城上矢中呉子而卒非呉子之自輕而見殺也古者入境必假道過門必釋甲入國則不馳或曰古者大國過小邑小邑必飾城而請罪亦非巢之輕以一矢相加不餙城而請罪也二十有六年春王二月辛卯衛寗喜弑其君剽謝湜曰衎之奔也孫林父寗殖立剽以主衛衛之政令出於剽者十有三年寗喜北面臣之久矣然則寗喜之君也衎之入也寗喜又以子鮮之命攻剽而殺之其殺剽非以社稷為心也特以固寵而已剽之立雖非命且非順春秋書君書弑者正剽為喜之君以著喜之逆也受其命則為之君食其禄則為之臣北面事之矣而後害之逆之大也孫林父寗殖逐衎而立剽寗喜殺剽而復衎其罪一也胡安國喜甞受命於其父使納獻公以免逐君之惡衛侯出入皆以爵稱於義未絶而剽以公孫非次而立又未有説焉則喜之罪應末減矣亦以弑其君書何也奕者舉棋不定不勝其耦况置君乎於衎則殖也出之喜也納之於剽則殖也立之喜也弑之是奕棋之不若也不思其終亦甚矣故聖人特正其為弑君之罪示天下後世使知謹於廢立之際而不敢忽也霍光以大義廢昌邑立宣帝猶有言其罪者而朝廷加肅况私意耶范粲桓彛之徒殺身不顧君子所以深取之者知春秋之㫖矣衛孫林父入于戚以叛謝湜曰獻公將反林父專邑背國有危害社稷之心入戚書叛著其逆也甲午衛侯衎復歸於衛程氏學曰凡曰歸曰復歸曰入曰復入大抵歸者易辭入者難辭且言自外也復歸者謂其既絶而復歸復入者謂其已絶而復入若夫善惡之志輕重之義則不可以一槩求各繫其事也蓋歸者不必盡善以其内外有援故歸為易入者不必盡惡以其内外有難故入為難惟復入者則皆甚其惡矣他皆可以例求之謝湜曰衎之出非有大罪剽既弑則國乃其國故其返國書歸以其播越失國故書名以其已絶而得歸故書復歸諸侯雖無大惡茍不能保國而出則其位絶矣故衛侯出奔名復歸名以正獻公之罪也諸侯雖失位茍無暴逆大惡則其義之未絶也臣子有討難之忠則君位復矣衛侯入夷儀不名以正衛國之罪也胡安國曰按左氏孫林父以戚如晉書曰入于戚以叛著其據土背君之罪也臣之禄君實有焉專禄以周旋戮也衛侯出奔齊入于夷儀皆以爵稱今既復歸而得國矣乃書其名何也人之有徳慧術智者甞存乎疢疾衛侯淹恤在外十有二年困於心衡於慮久矣此生於憂患之時而一旦得國失信無刑猶夫人也則是困而弗革雖復得國猶非其國也此見春秋俟人改過之深而責人自棄之重欲其强於為善之意也夏晉侯使荀呉來聘公㑹晉人鄭良霄宋人曹人于澶淵謝湜曰晉人主㑹故先鄭良霄良霄國卿故先宋人衛有孫林父寗喜之亂澶淵之㑹釋衛二大逆而不即討五國之罪也秋宋公殺其世子痤謝湜曰晉獻公以驪姬之譛殺世子申生宋平公以伊戾之譛殺世子痤皆自絶其世者也内有嬖妾寵孽外有邪臣險士則雖世子之親且重讒言日進而父子之恩離矣有國者不可不戒也胡安國曰殺世子母弟直書君者甚之也宋寺人伊戾為太子内師無寵譛於宋公而殺之則賊世子痤者寺人矣而獨甚宋公何哉譛言之得行也必有嬖妾配嫡以惑其心又有小人欲結内援者以為之助然後愛惡一移父子夫婦之間不能相保者衆矣尸此者其誰乎晉獻之殺申生宋公之殺痤直稱君者春秋正其本之意晉人執衛寗喜謝湜曰寗喜弑君之賊也晉國執而不殺者執不以其罪也孫林父寗喜其罪一也喜之弑剽也林父為叛于戚晉之執喜以其背林父而非以其害君也釋二逆不治而執逆臣以助逆臣失伯討之義矣晉侯奪爵書人貶之也八月壬午許男寗卒于楚冬楚子蔡侯陳侯伐鄭謝湜曰楚子與三國伐鄭鄭不從故又與陳蔡伐鄭葬許靈公二十有七年春齊侯使慶封來聘謝湜曰齊景公初修好于魯夏叔孫豹㑹晉趙武楚屈建蔡公孫歸生衛石惡陳孔奐鄭良霄許人曹人于宋謝湜曰宋之㑹晉楚及列國大夫皆與盟二國初以恩好相通也自㑹宋以後大夫權勢益重而㑹盟之事率大夫為之矣其積習之漸非一日也衛殺其大夫寗喜謝湜曰公孫剽孫寗所立也喜為之臣則剽為之君矣喜殺剽加以逆詞者以正剽之為喜君也剽以逆臣逐君而立王法所當絶也豈衛人所宜臣事哉衛殺喜不加以討賊辭者以正剽之非衛君也晉立奚齊卓子衛立公孫剽立非其立皆失人心故晉殺里克衛殺寗喜皆不稱人其義一也胡安國曰寗喜既坐弑君之罪矣不以討賊之詞何也初衛侯使與喜言茍反政由寗氏祭則寡人寗氏納之衛侯復國患寗喜之專也公孫免餘請殺之曰微寗子不及此吾與之言矣對曰臣殺之君勿與知乃攻寗氏殺喜尸諸朝子鮮曰逐我者出納我者死賞罰無章何以勸沮君失其信而國無刑不亦難乎故稱國以殺而不去其官衛侯之弟鱄出奔晉謝湜曰鱄出奔稱弟罪獻公之不能全其弟也承母之命而不㤀其兄致臣之忠以成其事可謂有弟之道矣獻公誅殺非義失信而無刑以弟之力復國而其終使弟不食衛粟而奔非所以睦宗族也弟而出奔則公之難與共處由此見矣胡安國曰衛侯之入使鱄與寗喜約言既殺寗喜鱄病失言遂出奔晉託於木門不鄉衛國而坐木門大夫勸之仕不可曰仕而廢其事罪也從之所以昭吾出也吾不可以立于人之朝矣終身不仕其稱弟罪衛侯也糓梁子曰鱄之去合乎春秋秋七月辛巳豹及諸侯之大夫盟于宋謝湜曰宋之盟晉為盟主楚亦從盟晉楚交盟則邦國有息肩之地矣故盟稱諸侯之大夫以諸侯同欲故也胡安國曰此一地也曷為再言宋書之重詞之複其中必有大美惡焉宋之盟合左師欲弭諸侯之兵以為名而楚屈建請楚晉之從交相見自是中國諸侯南向而朝楚及申之㑹而楚子以簒弑之賊大合十有一國之衆而用齊桓召陵之禮宋左師鄭子産皆獻禮焉宋世子佐以後至遂辭而不見伐呉滅頼無敢違者聖人至是哀人倫之滅傷中國之衰而其事自宋之盟始也故㑹盟同地而再言宋者貶之也或者乃以宋之盟中國不出荆蠻不入玉帛之使交乎天下以尊周室為晉趙武楚屈建之力而善此盟也其説誤矣吕祖謙曰晉楚交相見夷夏自此不分弭兵雖是一時省事又生出一件事又曰宋向戌欲合晉楚之成以弭兵左氏書曰欲弭諸侯之兵以為名左氏説得極好最得法觀左氏書以為名三字便見向戍之弭兵非是果欲息民欲求息民之名耳當時大國惟晉與楚向戍善於趙文子又善於令尹子木晉楚既從諸小國自不得不赴故卒成弭兵之一事其後向戍挾弭兵之事又書左師請賞公與之邑六十則向戍弭兵之意非果欲息天下之民平諸侯之争區區為一已之利而已上而為名下而為利左氏於前書弭兵為名既有以誅其心於後則記其請邑之事又有以指其實左氏真有書法則戍弭兵之謀其心固可知矣當時子罕之言猶有可論者以事而論弭兵以為名利固可罪及其以邑示子罕子罕削而投之左師便辭邑向戍欲攻司城左師曰夫子存我徳莫大焉又可攻乎其初固可罪至此而能悔亦可嘉又須㸔弭兵事全生靈之命息戰争之禍固善然惟聖人能内外無患自非聖人内寧必有外憂此意正與孟子入則無法家拂士之意同又如本朝李文靖沆為相時當時南北皆未寧或至旰食羽檄旦至廟堂王文正公沂以為憂嘆曰我輩安能坐致太平得優游無事耶文靖公曰少有憂勤足為警戒參政謂今日多事萬一邊鄙既寧竊恐朝廷事反多於今日參政自將見之其後澶淵既盟之後及北虜講和西戎納欵而東封西祀搜講墜典靡有暇日丁謂王欽若諸公相繼更進迭用天下紛紛果符文靖之言子罕之言亦沆之意冬十有二月乙亥朔日有食之春秋集義卷四十一

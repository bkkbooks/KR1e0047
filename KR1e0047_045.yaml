body:
  text: 春秋集義卷四十二宋李明復撰襄公二十有八年春無冰夏衛石惡出奔晉謝湜曰石惡寧氏之黨故出奔邾子來朝秋八月大雩仲孫羯如晉冬齊慶封來奔謝湜曰慶封崔杼之黨嗜酒荒淫齊大夫以莊公之難攻之而出十有一月公如楚謝湜曰晉楚會盟荆蠻得志故公朝楚十有二月甲寅天王崩謝湜曰天王靈王胡氏曰甲寅天王崩乙未楚子昭卒相距四十二日則閏月之驗也然不以閏書見喪服之不數閏也齊景公葬書閏月則明殺恩之非禮也乙未楚子昭卒謝湜曰昭楚康也二十有九年春王正月公在楚程氏學曰杜氏雖知公在外闕朝正之禮者多而特為左氏解紛公之如楚固非常但書公如楚義已自見若公在楚則聖人之旨乃不在此按二十有八年十有一月公如楚十有二月甲寅天王崩乙未楚子昭卒公不篤君臣之義以奔天王之喪而徇外裔之強以俟楚子之葬久留于楚逮夏乃歸故聖人特於朝正之時書公所而其義昭然矣謝湜曰奔喪事之大也稽留以終楚葬而王室喪告不奔人臣之道廢矣朝正禮之大也朝正之敬行於楚而不行於親人子之道廢矣正月嵗之始也為社稷人民主而正月之吉棄身逺夷人君之道廢矣三者襄公之過也王正月書公在楚而公之過惡皆見矣胡安國曰嵗之首月公如他國者有矣此獨書公在楚者外為荆蠻所制以俟其葬而不得歸內為強臣所逼欲擅其國而不敢入故特書所在以存君也按左氏楚人使公親禭夏四月送楚子葬至于西門之外還及方城季武子取卞以自封使公冶告曰聞守卞者將叛臣帥師徒以討既得之矣公曰欲而言叛祗見疏也吾不可以入矣將適諸侯有賦式微者乃歸故特於嵗首朝正之時而書曰公在楚後世臣子戴天履地視君父之危且困者必有天威不違顔咫尺食坐見於羮墻之意而不以頃刻忘也此義一行豈敢有顧其身與妻子與其家而不恤國朋附權臣以圖富貴而背其君者乎夏五月公至自楚謝湜曰公留于楚七月庚午衛侯衎卒閽弒吳子餘祭謝湜曰吳人伐越獲俘以為閽然則閽人刑也刑人仇讎也吳子為社稷主其體尊矣失於防微杜患而出入褻近怨仇故一閽之微出為吳子之難也閽與盜皆凶人不可責以君臣之義故吳子蔡侯遇害皆不稱君胡氏曰穀梁子曰閽門者寺人也不稱名姓閽不得齊於人不稱其君閽不得君其君也禮不使無恥不近刑人不狎敵不邇怨賤人非所貴也貴人非所刑也刑人非所近也舉至賤而加之吳子吳子近刑人也閽弒吳子餘祭仇之也左氏以為伐越獲俘焉以為閽使守舟吳子觀舟閽以刀弒之亦邇怨之失也又曰閽寺通傳內外以一身兼僕妾之職可謂賤矣春秋書閽弒吳子不稱君者言閽寺之賤不使得君吳子也仲孫羯會晉荀盈齊髙止宋華定衛世叔儀鄭公孫段曹人莒人滕人薛人小邾人城杞謝湜曰杞危不能自守列國大夫為杞城之諸侯之義也齊桓盛時城邢城緣陵出於諸侯今也城杞出於大夫大夫專事而諸侯之權替矣胡安國曰晉平公杞出也故合諸侯之大夫以城杞古之建國立家者必親九族然有父族而後及母族有母族而後及妻族此葛藟之詩所為次也晉主夏盟令行中國平公不能修文襄悼公之業尊奬王室恤宗周之闕而夏肄是屏輕棄諸姬可謂知本乎平王惟不撫其民而逺屯戍于母家周人怨思焉揚之水所以降為國風不得列于雅也城杞之役亦不待貶絶而可見矣晉侯使士鞅來聘杞子來盟謝湜曰列國城杞故杞子來盟用夷禮故稱子吳子使札來聘程氏學曰札者何吳公子札也何以不稱公子貶也札何以貶辭而生亂者札為之也吳子夀夢有子四長曰遏次曰餘祭次曰夷末次則季札也夀夢欲立季札札辭不可而立遏緣先君夀夢之志於其卒也有命授弟餘祭約傳以次必致國於季札而已餘祭卒弟夷末立夷末卒欲授國於札札宜受命以安社稷而徇匹夫之節辭位以逃夷末之子僚於是代立公子光者遏之子也以謂父兄弟相傳必立季子季子即不受國則光當立乃弒僚而代之是吳之亂札實為之也故春秋因札來聘去公子以示貶焉謝湜曰吳聘禮行於中國故聘與中國同辭公子札不稱公子者貶之也夀夢四子以兄弟相傳先君之志也遏長餘祭夷末季札其次也至夷末以國授札札以匹夫小節辭位出逃由是遏之子光肆逆爭國而夷末之子僚不保其終然則吳之亂札為之也春秋因札之聘而黜其公子所以著其貶也然則公子大夫為公子而不稱公子有氏族而不稱氏族者皆春秋以大義貶之也胡安國曰札者吳之公子何以不稱公子貶也辭國而生亂者札為之也故因其來聘而貶之示法焉按吳子夀夢有子四人長曰諸樊次曰餘祭次曰夷末札其季子也夀夢賢季札欲立以為嗣札辭不可然後立諸樊諸樊既除喪則致國於季子季子又辭而去之諸樊乃舍其子而立弟約以次傳必及季子故諸樊卒而餘祭立餘祭卒而夷末立夷末卒則季子宜受命以安社稷成父兄之志矣乃徇匹夫之介節辭位以逃夷末之子僚僚既立諸樊之子光曰先君所以不與子國而與弟者凡為季子爾將從先君之命歟則季子宜有國也如不從先君之命則我宜立僚烏得為君於是使專諸刺僚而致國乎季子季子不受去之延陵終身不入吳國故曰季子辭國以生亂因其來聘而貶之示法焉或謂子貢問於孔子曰伯夷叔齊何人也曰古之賢人也怨乎曰求仁而得仁又何怨子貢以先聖賢夷齊知其惡衛輒之爭而不為也季子辭位獨不為賢而奚貶乎曰叔齊之德不越伯夷孤竹舍長而立糿私意也諸樊兄弟父子無及季札之賢者其父兄所為眷眷而欲立札公心也以其私意故夷齊讓國為得仁而先聖之所賢以其公心故季子辭位為生亂而春秋之所貶茍比而同之過矣或曰世衰道微暴行交作臣篡其君者有之子篡其父者有之季子於是焉而辭位則將使聞其風者貪夫亷爭夫讓而篡弒奪攘之禍損矣其於名教豈不有補何貶之深也曰春秋逹節而不守者也昔太伯奔吳而不反季歷嗣位而不辭武王繼統受命作周亦不以配天之業讓伯邑考官天下也彼王僚無季歷之賢武王之聖而季子為太伯之讓豈至德乎使爭弒禍興覆師喪國其誰階之也若季子之辭位守節立名全身自牧則可矣槩諸聖王之道則過矣中庸曰道之不明不行也我知之矣季子所謂賢且智過而不得其中者使由於季歷武王之義其肯附子臧之節而不受乎惜其擇乎中庸失時措之宜爾此仲尼所以因其辭國生亂而貶之也或曰吳子使札與楚子使椒秦伯使術一例爾吳楚之國秦介僣亂之間其禮未同於中夏故使人之來皆略之而札何以獨為貶乎曰春秋多變例聖筆有特書荆楚無大夫而屈完書族王朝下士以人通而子突書字諸侯公子以名著而季友書子母弟之無列者不登其姓名而叔肸書氏皆賢而特書者也季札讓國天下賢之若仲尼亦賢季札必依此例或以字或以氏或以公子特書之矣今乃略以名紀此與楚椒秦術之流無異稱焉是知仲尼不以其讓國為賢而貶之也噫世之君子盛稱季札之賢於讓國之際以為禮之大節不可亂也公子喜時春秋猶賢其後世於季札則何獨貶之深也曰仲尼於季子望之深矣責之備矣惟與天地同德而逹乎時中然後能與於此非聖人莫能修之豈不信夫朱熹語録或問伯夷叔齊之讓使無中子則二子不成委先君之國而棄之必有當立者曰程氏説叔齊當立看來立叔齊雖以父命然終非正禮恐只當立伯夷或曰伯夷終不肯立奈何曰若國有賢大臣則必請於天子而立之不問伯夷情願矣看來二子立得都不安但以正理論之則伯夷分數稍優耳胡文定春秋解論這一段也好説吳季札讓國事聖人不取之牽引四五事為證所以經只書吳子使札來聘此何異於楚子使椒來聘之事即但稱名則聖人貶之深矣但近世説春秋者皆太巧不知果然否也又曰札讓不立又不為立賢而去卒有殺僚之亂故聖人於其來聘書曰吳子使札來聘去其公子言其不得為公子也秋九月葬衛獻公齊髙止出奔北燕謝湜曰崔杼肆逆慶封奔魯髙止奔北燕大臣不率可知冬仲孫羯如晉三十年春王正月楚子使薳罷來聘夏四月蔡世子般弒其君固謝湜曰蔡世子般書弒蓋與許世子止書弒同意故蔡景公書弒又書葬五月甲午宋災宋伯姬卒謝湜曰宋災伯姬卒伯姬守禮而卒於火也伯姬以婦人之義傅保不在宵不下堂遂逮火而死伯姬之婦道闕文胡安國曰穀梁子曰取卒之日加之災上者見以災卒也伯姬之舍失火左右曰夫人少避火乎曰婦人之義傅姆不在宵不下堂遂逮乎火而死婦人以貞為行者也伯姬之婦道盡矣詳其事賢伯姬也易曰恆其德貞婦人吉夫子凶而或以為共姬女而不婦非也世衰道微暴行交作女德不貞婦道不明能全其節守死不回見於春秋者宋伯姬耳聖人冠以夫諡書於春秋曰葬宋共姬以著其賢行勵天下之婦道也天王殺其弟佞夫謝湜曰佞夫非有背逆之罪也景王以儋括之亂以私意疑佞夫而殺之故佞夫見殺稱弟著天王失兄之道也兄弟手足之親也以天王之大而恩之所庇不能及手足之親則德之在人可知矣王子瑕奔晉謝湜曰佞夫以非罪見殺故王子瑕奔晉溥天莫非王土故瑕奔晉書出以明王室之衰也王子瑕奔晉王子朝奔楚不書出以明王室之尊也明其衰所以責王國正其尊所以責諸侯始之以衰而責王國終之以尊而責諸侯春秋之序也秋七月叔弓如宋葬宋共姬謝湜曰宋共姬公室女婦之賢者也魯以叔弓會葬嘉之也春秋以夫諡稱其姬褒之也其姬為女為婦可謂賢矣其嫁也宋公孫夀納幣魯季孫行父致女晉人衛人齊人來媵以其賢而昏禮之厚也其終也以死守義而卒於災以卿送死而共其事以夫配諡而彰其德以其賢而喪禮之厚也方是時關雎之化不修漢女之行不聞賢妃正女之節卓然見於亂世者共姬一人而已此春秋所以賢其懿行而褒之也鄭良霄出奔許自許入于鄭鄭人殺良霄謝湜曰良霄以汰侈構禍出奔其還也結許之力興兵入鄭其入也介于襄庫伐舊北門此構亂以危社稷者也入稱自許以明罪在所討也殺稱人以衆棄之辭誅之也入逆辭也以他國兵力逼君而入則罪在所絶可知矣胡安國曰按左氏良霄汰侈嗜酒諸大夫皆惡之而與公孫黑爭黑因其醉伐之良霄奔許自許襲鄭以伐公門弗勝死于羊肆不言復入者其位未絶也若宋魚石若晉欒盈去國三年其稱復入位已絶矣不言叛者將以滅國非直叛也若華亥之入南里宋辰之入蕭其書叛者皆據土背君以自保未有滅國之謀也不言殺其大夫者非其大夫矣討賊之詞也冬十月葬蔡景公謝湜曰君弒賊不討不書葬景公書葬者蓋蔡般之弒與許世子止弒相類傳者以為真弒誤矣楚子之將滅蔡也內懷姦心外假公義以譎詐誘蔡般而殺之使般有不可容之大逆則春秋於此絶之矣然般之見殺也生名楚子虔以彰其惡則般之得罪於親蓋與真弒者異矣然則前書景公葬後名楚子虔乃春秋明微以别蔡般之罪也晉人齊人宋人衛人鄭人曹人莒人邾人滕人薛人杞人小邾人會於澶淵宋災故程氏學曰左氏曰為宋災故諸侯之大夫會以謀歸宋財既而無歸於宋故不書其人不書魯大夫諱之也夫王道之所尚者義與信也卿為尊爵所以貴於世者為其能行信義也澶淵之會本以救災恤患而行雖未能如古以王命施惠亦可以謂之義矣既而背義食言無歸宋財貶爵稱人以見其罪也謝湜曰災患相恤之謂義始終不易之謂信邦國所恃者義與信而已義足以為信足以守則邦國之事何求而不獲何行而不至哉宋災難之大者也澶淵之會列國將以救宋災也可謂有憂患相恤之至矣既而小大信義不立無歸宋財國卿負國大夫何以致邦國之安利哉卿皆奪爵稱人賤之也會事書曰宋災故而不曰救宋災著其不能救也宋亦稱人罪其不能辨也列國會盟侵伐莫不有事其事尤重者春秋又且書之救災恤患以安鄰國諸侯之義無大於此故澶淵書宋災故取財受賂以黨逆臣諸侯之惡無大於此故特書以成宋亂胡安國曰春秋大法君弒而賊不討則不書葬况世子之於君父乎蔡景公何以獨書葬遍刺天下之諸侯也葬送之禮在春秋時視人情之疏密而為之者也有嘗同盟卒而不赴者有雖同姓赴而不會者則以哀死而致穟為輕弔生而歸賻為重必矣今蔡世子般弒其君藏在諸侯之策而往會其葬是恩義情禮之篤於世子般不以為賊而討之也人之所以異於禽獸者非以兩足而立行也以其有父子之親君臣之義耳世子弒君是所謂禽獸之不若也而不知討豈不廢人倫滅天理乎故春秋大法君弒賊不討則不書葬而蔡景公特書葬者聖人深痛其所為遍刺天下之諸侯也魯隱宋殤之賊不討則不書葬蔡景公賊亦不討而特書葬猶閔僖二公不承國於先君則不書即位桓宣篡弒以立而反書之也何以知聖人罪諸侯之意如此乎以下文書會于澶淵宋災故而貶其大夫則知之矣二百四十二年之間列會亦衆而未有言其所為者此獨言其所為何遍刺天下之大夫也大夫以智帥人者也智者無不知當務之為急不能三年之喪而緦小功之察放飯流啜而問無齒決是之謂不知務蔡世子般弒其君天下之大變人理所不容也則會其葬而不討宋國有災小事也則合十二國之大夫更宋之喪而歸其財則可謂知務乎陳恆弒簡公孔子沐浴而朝告於哀公請討之公曰告夫三子者子曰以吾從大夫之後不敢不告也之三子告不可子曰以吾從大夫之後不敢不告也叔孫豹晉趙武而下皆諸侯上卿執國之政者也三綱國政之本至於淪絶無父與君是禽獸也禽獸逼人雖得天下弗能一朝處矣昔者伯禹過門而不入放龍蛇也周公坐而俟旦驅猛獸也今世子弒君三綱淪絶禽獸逼人則與之同羣而不恤有國者不戒于火自亡其財茍其來告弔之可也則合十二國之大夫駐於澶淵而謀更其所喪尚為知類也乎夫蔡之亂其猶人身有腹心之疾而宋之災譬諸桐梓猶雞犬也謀宋災而不恤蔡之亂奚啻於飬桐梓求雞犬不顧其身有腹心危疾而不知療者哉以為未之察也可謂不知茍察此而不謀則亦不仁矣是故諸國之大夫貶而稱人魯卿諱而不書又特言會之所為以垂戒後世其欲人之自别於禽獸之害也可謂深切著明矣或曰夫穆叔趙孟向戍子皮皆諸侯之良也而所謀若是何也世衰道微邪説交作以利害謀國家而不知本於仁義也久矣是以至此極孔子所為懼春秋所以作乎朱熹曰程子所謂春秋大義數十炳如日月者如成宋亂宋災故之類乃是聖人直著誅貶自是分明三十有一年春王正月夏六月辛巳公薨于楚宫謝湜曰公如楚故薨于其宫秋九月癸巳子野卒謝湜曰襄公薨子野繼立以哀毁而卒襄公未葬故名降成君故不薨不地胡安國曰子般子赤弒而書卒子野過毁亦書卒何以别乎曰閔公內無所承不書即位則子般之弒可知下書夫人薑氏歸于齊上書公子遂叔孫得臣如齊赤之卒也隱而不日則子赤之弒可知與子野異矣子野有命立昭公故穆叔雖不欲而不能止也己亥仲孫羯卒冬十月滕子來會葬謝湜曰奔喪會葬臣子之禮也諸侯於王室無奔喪會葬之事而邾滕反行於強國書滕子邾子奔喪會葬而諸侯之惡見矣癸酉葬我君襄公十有一月莒人弒其君密州程頥曰莒子虐國人弒之而立展輿展輿非親弒也故書國人謝湜曰犁比公虐國人患之上下忿怨以成大禍故弒書莒人左氏謂展輿因國人以攻莒子誤矣胡安國曰經以傳為案傳有乖繆則信經而棄傳可也若密州之事是矣左氏稱莒子生去疾及展輿既立展輿又廢之莒子虐國人患之展輿因國人以攻莒子弒之乃立信斯言則子弒其父矣而春秋有不書乎故趙子謂其文當曰展輿因國人之攻莒子弒之乃立而後來傳寫誤為以字爾左氏博通諸史敘事尤詳能令後人得見本末因以求意經文可知而門弟子轉相傳授日月既久浸失本真如書晉趙盾許世子止等事詳考傳之所載以求經之大義可也而傳不可疑如莒人弒其君密州獨依經之所書以證傳之繆誤可也而傳不可信盡以為可疑而廢傳則無以知其事之本末盡以為可信而任傳則經之宏意大旨或泥而不通矣要在學者詳考而精擇之可也春秋集義卷四十二

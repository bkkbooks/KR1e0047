body:
  text: 春秋集義卷四十五宋李明復撰昭公二十有二年春齊侯伐莒謝湜曰齊高發伐莒莒未服故齊侯伐莒宋華亥向寧華定自宋南里出奔楚謝湜曰書自宋南里出奔楚罪宋不能討賊也三卿自陳入宋南里今又自宋南里奔楚逆臣暴橫甚矣著逆臣暴橫責宋之無臣子也胡安國曰華向誘殺羣公子又劫其君取其太子母弟為質又借吳楚以為外援入據其國都以叛此必誅不赦之罪也宋宜竭力必討之於內諸侯宜協心必救之於外楚子宜執叛臣之使而戮之於境今楚人釋君而臣是助諸侯之戍怠於救患固請逸賊而宋又從之則皆罪也故晉荀吳齊苑何忌衛公子朝曹大夫皆略而不書其曰自宋南里者譏宋之縱釋有罪不能致討出奔楚者不待貶絶而亢不𠂻奬亂人之惡自見矣大搜于昌間謝湜曰比蒲大搜矣以車徒不足故又大搜于昌間于紅于比蒲于昌間著其搜無常地也胡安國曰昭公之時凡三書搜或以非其時或以非其地而大意在權臣專行公不與也三綱軍政之本古者春搜夏苖秋獮冬狩皆於農隙以講事而所主者明貴賤辨等列順少長習威儀則皆納民於軌物而非馳射擊刺之末矣是故觀于有莘少長有禮知可用也而文公遂伯臨于洛陽袒而發喪為義帝也而漢祖遂王今魯國其君則設兩觀乘大輅其臣則八佾舞於庭旅太山以雍徹其宰則據大都執國命而軍政之本亡矣何以搜為此春秋所書為後世戒之意也夏四月乙丑天王崩六月叔鞅如京師葬景王謝湜曰鞅叔弓子王室亂謝湜曰太子天下之本也建儲立嫡所以正太子之位也太子之位正則嫡庶之分明而爭亂之源塞矣古者朝委裘而天下不亂者此道素明也王子猛王之嫡子也王子朝王之庶子也猛以嫡當繼而王不正其位朝以庶怙寵而王不制其失以至儲宫不定而姦臣異心故景王之葬方畢而王室爭立之亂作矣劉單以公義輔正而尊猛尹氏以私心黨庶而尊朝內外出入戰鬬五年而後定春秋書王室亂以明亂自景王為之也胡安國曰何言乎王室亂王者以天下為家則以京師為室京師者本也周公作立政曰迪惟有夏乃有室大競其作鴟梟詩以遺成王亦曰既取我子無毁我室皆指京師言之也以京師為室王畿為堂諸夏為庭户四裔為藩籬治外者先自內治逺者先自近本亂而末治者否矣景王寵愛子朝使孽子配嫡以本亂者其言王室譏國本之不正也本正而天下定矣唐虞公天下則相禪而與賢三代家天下則相繼而與子春秋兼帝王之道可公也則以達節為權故季札辭國貶而稱名可家也則以居正為大故莊公始生即書於䇿鄭突歸而不氏以國陽生入而得係於齊此皆正本以及天下之義也其義茍行無易樹子王室豈有亂離之禍乎春秋書子同生於前而記王室亂於後其為來世法戒明矣劉子單子以王猛居于皇胡安國曰凡稱以者不以者也師而曰以能左右之也地而曰以能取與之也人而曰以能生死之也尊不以乎卑貴不以乎賤大不以乎小劉蚠單旗臣也曷為能以王猛乎猛無寵於景王不能自定其位制在劉單其曰以者能廢立之也按左氏景王太子壽以昭十五年卒至是八年矣猛與丐皆其母弟禮無疑於當立然久而未立者王愛庶子朝欲立以為嗣未果而王崩故諸大臣競立君諸王子爭欲立以正則有猛以寵則有朝猛雖正而無寵其威不足以懾羣下朝雖寵而不正其分不足以服人心二子廢立皆恃大臣彊弱而後定者也故特稱曰以而景王之弱其後嗣輕其宗社之罪亦著矣易曰王居無咎稱居於皇者明其有土當得位之稱也秋劉子單子以王猛入于王城胡安國曰猛未踰年何以稱王示當立也既當立矣何以稱名明嗣君也曰王猛者見居尊得正又以别乎諸王子也君前臣名劉單不名而王名不嫌於倒置乎曰君前臣名常禮也禮當其變臣有不名名其君而不嫌者矣王不當稱未踰年而稱王名不當稱立為君而稱猛皆禮之變也惟可與權者能知其變而不越乎道之中再書劉子單子之以王何也春秋詞繁而不殺者必有美惡焉劉子單子蓋挾天子以令諸侯而專國柄者也書而未足故再書于䇿以著上下舛逆為後世之深戒也冬十月王子猛卒謝湜曰王猛稱王以明猛當立為王也稱名以明國亂猛未得立也劉單奉王猛居皇奉王猛入王城書以明猛之進退繫二子也書居于皇以明猛之失其所也書入于王城以明猛之未得國也猛之死書王子以未踰年之君待之也書名書卒以明君位未定也劉子單子以立正為心可謂忠於王室矣然下不能合師旅以除逆惡上不能伸社稷大義以正王位乃以王子乘間入于王城然終於不得其志而卒故王城書入責二子無定難之材也瀍水東西城皆曰成周王所居城則為王城朱熹曰既書王猛又書王子猛皆不可曉十有二月癸酉朔日有食之二十有三年春王正月叔孫婼如晉癸丑叔鞅卒晉人執我行人叔孫婼謝湜曰邾人以魯難告而晉人執我行人非行人之罪也故晉執婼書行人晉人圍郊謝湜曰杜氏謂郊子朝所得邑胡安國曰按左氏晉籍談荀躒帥師軍于侯氏箕遺樂徴濟師軍其東南正月二師圍郊郊子朝邑也既不書大夫之名氏又不稱師而曰晉人微之也所謂以其事而微之者也當是時天子蒙塵晉為方伯不奔問官守省視器具徐遣大夫往焉勤王尊主之義若是乎書晉人圍郊而罪自見矣夏六月蔡侯東國卒于楚謝湜曰東國蓋朝楚而卒秋七月莒子庚輿來奔謝湜曰庚輿虐而好劒茍鑄劒必試諸人故國人難之出奔胡安國曰左氏曰庚輿虐而好劒茍鑄劒必試諸人國人患之又將叛齊烏存帥國人逐之庚輿來奔齊人納郊公三代之得失天下仁與不仁而已矣茍無仁心甚則身殺國亡不甚則身危國削庚輿免死道左而出奔於魯幸耳入國不書而書其出奔惡之也郊公出入皆不書微之也所謂以其人而微之者也微之為義或以位或以人或以事春秋書法逹王事名氏不登於史册若此類亦衆矣戊辰吳敗頓胡沈蔡陳許之師于雞父胡子髠沈子逞滅獲陳夏齧程氏學曰不言吳殺而云滅者為其自取之也為諸侯不能以義自守乃役屬於楚為吳所取而死之是取滅之道也君死而云滅者小國悉師以行一敗而俱亡故云爾謝湜曰六國興師皆楚令也頓胡沈為主蔡陳許從之故頓胡沈居先六國皆以國稱者以其役屬於楚外之也胡子沈子以自滅為文者罪其自取也小國不知執義自守茍順强令而為兵首使强吳敗而殺之取滅之道也敗而殺之而謂之滅者胡子沈子悉衆以出上書名自取亡滅之道也敗不書戰者戰陳未成列而敗之六國之出也吳敗其師隕其君獲其臣以歸因此國滅其為患大矣春秋書敗滅書獲所以為小國戒也胡安國曰吳伐州來楚令尹帥師及諸侯之師與吳戰曷為不書楚令尹既喪楚師已熸六國先敗楚師遂奔是以不書楚也諸侯之師曷為略而不序頓胡沈則其君自將蔡陳許則大夫帥師言戰則未陳也言敗績則或滅或獲其事亦不同也故總言吳人以詐取勝於前而以君與大夫序六國於後胡沈書爵書名書滅者二國之君幼而狂不能以禮自守役屬於楚悉師以出一敗而身與衆俱亡也其曰胡子髠沈子逞滅者若曰非有能滅之者咸其自取焉耳亦猶梁亡自亡也鄭棄其師自棄也齊人殱于遂自殱也或曰滅或曰獲别君臣也君死曰滅胡子髠沈子逞是也生得曰獲秦晉戰于韓原獲晉侯是也大夫生死皆曰獲鄭獲宋華元生也吳獲陳夏齧死也書其敗不以國分而以君大夫為序書其死不以事同而以君臣為别皆所以辨上下定民志雖顛沛必於是也其義行而亂自息矣天王居于狄泉尹氏立王子朝范祖禹曰尹氏立王子朝季氏逐昭公世官之患也謝湜曰王子猛卒母弟王子丐立敬王是也敬王即位踰年尹氏作亂未已故敬王播越在外尹氏擅立子朝書天王居狄泉以著天王所在也書尹氏立王子朝以著尹氏大逆也子朝非正也其立非周人所欲也尹氏立之而已子朝書立以明立非其立也尹書氏以明世卿為王室患也胡安國曰立者不冝立也王猛當立而未能立故稱大臣以之而不言立敬王當立又能立矣故直稱居于狄泉而不言立子朝庶孽奪正以賤妨貴基亂周室不當立者也故特稱立而目尹氏尹氏天子之卿也王朝公卿書爵而變文稱氏者見世卿之擅權亂國為後戒也或曰稱氏者時以氏稱之也詩云王謂尹氏此大雅美宣王詩也亦譏世卿歟為此說者誤矣詩人主文而不以害意有美而或過有刺而或深以意逆之可也春秋所書或稱爵或稱字或稱名或稱氏或稱子或稱人名分所由正是非所由定禮義所由出皆斷自聖心游夏不能與也狥時之所稱而稱之豈其然乎八月乙未地震冬公如晉至河有疾乃復謝湜曰公如晉數矣惟此書有疾則餘皆以晉辭之而復也胡安國曰昭公兩朝于晉而一見止五如晉而四不得入焉今此書有疾乃復殺恥也以周公之胄千乘之君執幣帛修兩君之好而不見納斯亦可恥矣有恥而後能知憤知憤而後能自强自强而後能為善為善而後能立身身立而後能行其政令保其國家矣昭公內則受制於權臣外則見陵於方伯此正憂患疢疾有德慧智術保生免死之時也而安於屈辱甘處微弱無憤恥自强之心其失國出奔死於境外其自取之哉二十有四年春王二月丙戌仲孫貜卒叔孫婼至自晉胡安國曰大夫執而致則名此獨書其姓氏何賢之也叔孫婼以禮立身而不屈於强國以忠事主而不順於强臣此社稷之衛魯之良大夫也使昭公稍有動心忍性强於為善之意舉國以聽豈其死於乾侯觀意如之稽顙於昭子叔孫之以逐君責意如其事可見矣及意如有異志而昭子使祝宗祈死所謂知其無可奈何安之若命者故婼至自晉特以姓氏書其死也公雖在外而特書日以卒之所以表其節為後世勸也夏五月乙未朔日有食之秋八月大雩丁酉杞伯郁釐卒冬吳滅巢謝湜曰巢本微國後屬楚故書滅胡安國曰巢楚之附庸實邑之也書吳入州來著凌楚之漸書吳滅巢著入郢之漸四鄰封境之守既不能制則封境震矣四境國都之守既不能保則國都危矣故沈尹戌以此為亡郢之始也春秋內失地不書明此為有國之大罪外取滅皆書明見取滅者之不能有其土地人民則不君矣故諸侯之寶三以土地為首葬把平公二十有五年春叔孫婼如宋夏叔詣㑹晉趙鞅宋樂大心衛北宫喜鄭游吉曹人邾人滕人薛人小邾人于黃父謝湜曰左氏謂謀王室胡安國曰按左氏鄭子太叔如晉范獻子曰若王室何對曰王室之不寧大國之憂晉之恥也吾子其早圖之獻子懼乃徴㑹於諸侯㑹于黃父謀王室也趙簡子令諸侯之大夫輸王粟具戌人將納王夫以王猛之無寵單旗劉蚠之屢敗敬王初立子朝之衆召伯奐南宫嚚甘桓公之黨疑若多助之在朝也然㑹于黃父凡十國而諸侯之大夫無異議焉是知邪不勝正久矣猶有寵愛庶孽配適奪正至於滅亡而不寤者不知幽王晉獻之父子亦何足效哉然則黃父之㑹王事也而無美辭何王室不靖亦惟友邦冡君克修厥職以綏定王都非異人任亦何美之有免於譏貶足矣此春秋以正待人之體也後世以濫賞報臣子所當為之事為臣子者亦受而不辭失此義矣有鸜鵒來巢謝湜曰來巢來國中為巢也鸜鵒野鳥其居避人鸜鵒來巢國中異之大也方是時魯國綱紀廢壞公室政治荒蕪久矣然則鸜鵒自野來巢亦其有以召之也昔無今有故以有為文胡安國曰傳曰鸜鵒不踰濟濟水東北㑹于汶魯在汶南其所無也故書曰有巢者去穴而巢隂居陽位臣逐君象也鸜鵒宜穴處於下而巢居於上季孫宜臣順於家而主祭於國反常為異之兆能以德消則無其應矣或曰此公子宋有國之祥也秋七月上辛大雩季辛又雩謝湜曰祭祀尚敬蒸而又蒸雩而又雩皆黷祭也一月而兩雩故於雩書又著其非禮也胡安國曰左氏以再雩為旱甚聖人書此者以志禦災之非道而區區於禱祠之末也昭公之時雨雹地震四見於經旱乾為虐相繼而起有鸜鵒來巢異之甚也季辛又雩災之甚也考諸列位則國有人焉觀諸天時則猶有眷顧之心未終棄也若反身修德信用忠賢災異之來必可禦矣昔高宗肜日雉升鼎耳異亦甚矣聽於祖已克正厥事故能嘉靖殷邦享國長久宣王之時旱魃藴隆災亦甚矣側身修行遇災而懼故能興衰撥亂王化復行此皆以人勝天以德消變之驗也昭公至是猶不知畏罔克自省而求於禱祀之末將能勝乎故特書此以為後世鑒九月己亥公孫于齊次于陽州胡安國曰內出奔稱孫隱也次于陽州待齊命也昭公欲伐季氏子家子曰季氏得民已久君無多辱公不從意如登臺而請待於沂上以察罪弗許請囚于費弗許請以五乘亡弗許子家子曰君其許之政自之出久矣隱民多取食焉為之徒者衆矣日入慝作弗可知也弗聽叔孫氏之司馬陷西北隅以入孟氏殺郈昭伯遂伐公徒公與臧孫如墓謀遂行以君伐臣曷為不勝魯自東門遂殺嫡立庶魯君於是乎失政祿去公室政在季氏於此君也四公矣作三軍盡征其一舍中軍兼有其二民賦入於其家半矣受命救台也遂入鄆帥師取卞也不以聞軍政在其手專矣行父片言而東門氏逐南蒯一動而公子愸奔魯之群臣亦無敢忠於公室而獻謀者所謂屯難之時也在易屯之六五曰屯其膏小貞吉大貞凶象曰屯其膏施未光也昭公不明乎消息盈虛之理正身率德擇任忠賢待時馴致不忍一朝之忿求逞其私欲而以群小謀之其及也宜矣齊侯唁公于野井謝湜曰季氏專國久矣欲除其患不可以不漸也昭公智不足以圖之也權不足以御之也乃以小人之慮倉卒攻而去之欲其不陷危亡難矣故公之逐季氏也反為季氏所逐而失位出奔書孫于齊著昭公謀術之踈也昭公以微弱失位鄰國所當救也意如以背逆出君鄰國所當討也救而討之鄰國之義也景公黨逆棄順黨臣棄君反使意如安處于內而昭公野次于外其相恤也以惻怛之言慰之而已亦何補於吾君哉書次於陽州書唁於野井責景公滅鄰國之義也陽州齊邑井齊地也胡安國曰唁者弔也生事曰唁死事曰弔齊侯唁公於野井以遇禮相見孔子曰其禮與其詞足觀矣然則何以失國而不反乎禮有本末正身治人禮之本也威儀文詞禮之末也昭公喪齊歸無戚容而不顧娶孟子為夫人而不命政令在家而不能取有子家子之賢而不能用而屑屑焉習儀以亟能有國乎雖齊侯來唁其禮與詞是矣而方伯連帥之職則未修也又豈所以為禮哉其言曰自莒疆以西請致千社將率敝賦以從而子家子曰失魯而以千社為臣誰與之立且齊君無信不如早之晉書曰唁公亦明其無納公之實譏之也冬十月戊辰叔孫婼卒十有一月己亥宋公佐卒于曲棘謝湜曰曲棘宋地胡安國曰按左氏宋元公為公故如晉卒于曲棘曲棘宋地也宋元之夫人曹氏生子妻意如或謂曹氏勿與魯將逐之曹氏告元公公告樂祁祁曰與之如是魯君必出無民而能逞其志者未之有也魯君失民久矣然則宋元意如之外舅也不此之顧而求欲納公是以正倫恤患為心而不匿其私親之惡者也其賢於當時諸侯逺矣故雖卒于封內而特書其地以别之也十有二月齊侯取鄆謝湜曰鄆魯邑齊侯取鄆以為公所而居之也齊侯以鄆居公而謂之取者以魯地皆非公有故也孫書公以明昭公未絶于魯也明其未絶于魯所以罪意如之逆也鄆書取以明昭公已絶于魯也明其已絶于魯所以罪公之失國也胡安國曰鄆魯邑也直書齊侯取之何也齊不自取而為公取鄆使居之也昭公出奔經書次于陽州見公於魯未絶而季氏逐君為不臣及書齊侯取鄆則見公已絶於魯而逐於季氏為不君君者有其土地人民以奉宗廟之典籍者也已不能有而他人是保則不君矣春秋之義欲為君盡君道為臣盡臣道各守其職而不渝也昭公失君道季氏為亂臣各渝其職而不守矣其為後世戒深切著明矣二十有六年春王正月葬宋元公三月公至自齊居于鄆程氏學曰公至自齊居于鄆昭公出奔書曰公孫于齊次于陽州齊侯唁公于野井聖人書此者示昭公于魯未為絶也所以罪季氏以臣逐君也至於齊侯取鄆則見公已絶於魯矣鄆魯邑公不能有而齊侯取以居公所以罪昭公不能保社稷而見逐於其臣也昭公失君道季氏為亂臣君不君臣不臣此魯之所以亂也君君臣臣而天下治况魯國哉謝湜曰齊侯取鄆居公故公居于鄆唁之矣而不能為之討賊居之矣而不能為之復國齊侯之罪也公雖失國在外魯國君臣之義未之絶也書至書居所以存君也敬王居狄泉尹氏之罪也王在狄泉書居存天王也昭公居鄆季氏之罪也公在鄆書居存國君也明君臣春秋之義也君臣上下之分明而天下之大本正矣胡安國曰居者有其土地人民之稱也昭公失國出奔而稱居於鄆者存一國之防也襄王已出而稱居於鄭敬王未入而稱居於狄泉者存天下之防也天子之於天下率土之濱莫非王臣非諸侯所敢擅也諸侯之於封國四境之內莫非其土非大夫所得專也故諸侯避舍以待巡守而大夫專邑是謂叛君曰居於鄆其為防也至矣夏公圍成謝湜曰成魯邑境內皆非公有故公欲取成則圍之一邑而至於圍之則昭公不得人心由此見矣胡安國曰成者孟氏之邑左氏曰齊侯將納公命無受魯貨申豐適齊貨梁丘據據受之言於齊侯曰羣臣不盡力于魯君者非不能事君也據有異焉宋元公為魯君如晉卒于曲棘叔孫昭子求納其君無疾而死不知天之棄魯耶抑君有罪於鬼神故及此也若使羣臣從魯君以卜師有濟也而繼焉茲無敵矣齊侯從之使公子鉏帥師從公圍成不書齊師者景公怵於邪說為義不終故微之也書公圍成則季氏之不臣昭公之不君齊侯之不能修方伯連帥之職其罪咸具矣秋公㑹齊侯莒子邾子把伯盟于鄟陵謝湜曰盟于鄟陵謀納公也唁于野井盟于鄟陵而卒無討叛之師齊侯之罪也公至自㑹居于鄆九月庚申楚子居卒謝湜曰居楚平王冬十月天王入于成周謝湜曰大臣不能誅子朝清王室以逆天王使天王犯難以入書入于成周罪王臣討賊之緩也周國統曰成周書成周以明天王復國也方敬王之返也子朝猶據國在內故復國以入言之左氏謂召伯盈先逐子朝而後王入成周誤矣襄王書出敬王書入皆春秋變文以示義者也胡安國曰左氏曰晉知躒趙鞅帥師納王入于成周使成公般戍周而還不曰入于京師者京師衆大之稱不可繫之入也其曰成周云者黍離而次不列於雅降為國風之意而景王寵愛庶孽弱其世適之罪著矣尹氏召伯毛伯以王子朝奔楚謝湜曰子朝之亂皆權臣為之也子朝之立也尹氏主之子朝之奔也尹氏召伯毛伯左右之故前書尹氏立子朝後書尹氏召伯毛伯以子朝奔楚所以著權臣之亂也尹氏首為禍惡而召伯毛伯相繼從之故奔楚然後書二伯胡安國曰取國有五利寵居一焉子朝有寵於景王為之黨者衆矣卒不能立至於奔楚何也是非有出於人之本心者不可以私愛是亦不可以私惡非卒歸於公而止矣景王寵愛子朝將期於見是而天下不以為是踈薄子猛將期於見非而天下卒不以為非徒設此心兩棄之也庶孽憑寵為群小之所宗而人心不附適子恃正人心之所嚮而群小不從故伯服雖殺而平王亦不能復宗周之盛申生已死而奚齊卓子亦不能勝里克之兵是兩棄之也景王不鑒覆車王猛子朝之際危亦甚矣春秋詳書為後世戒可謂深切著明也哉二十有七年春公如齊公至自齊居于鄆夏四月吳弒其君僚謝湜曰吳公子光肆逆而歸罪於吳者乃春秋變例於終以起義者也公子光出害君親其罪所宜速討也立君之朝食君之祿者無一人出力以報其君使寇讎安處君位而卿大夫皆北靣臣之背上負德衆矣然則吳君遇難乃舉朝之臣害之也故弒書吳以罪其國胡安國曰此公子光使專諸弒之而稱國何也吳子壽夢有四子長諸樊次餘祭次夷昧次季札光諸樊之子也僚夷昧之子也諸樊兄弟以次相及必欲致國於季子而季子終不受則國宜之光者也僚烏得為君故稱國以弒而不歸獄於光其稱國以弒者吳大臣之罪也大臣任大事事莫大於置君矣故君存而國本定君終而嗣子立社稷嘉靖人無間言此秉政大臣之任伊召之所以安商周孔明之所以定劉漢也若廢立進退出於羣小閽寺而當國大臣不與焉用彼相矣此春秋歸罪大臣稱國弒君之意其徑世之慮深矣吕祖謙曰吳公子光弒其君僚考左氏所載本末公子光固不能無罪然吳王亦不知根本之虛因楚喪而伐楚賢者國之望使公子掩餘公子燭庸伐潛用兵於外而季子又使之聘於上國遂至于晉以觀諸侯之强弱一時親近之臣皆安頓在外故公子光得窺伺間隙得行其謀而作亂吳王不知根本之虛處大抵為國之根本莫大於親賢兩字有親則可以藩屏王室有賢則鎮重朝廷雖有姦賊不敢覬今則吳王親如掩餘燭庸則使之帥師圍潛賢如季子則使之出聘於外此公子光所以成篡弒之禍使數子皆在王之左右安得至此公子光包藏禍心固已久矣此方得逞其志大抵篡弒之臣乘間投隙因不足論所可罪者吳子也向使不知公子光之姦愈信為腹心如此則是不覺不悟不足深罪觀公子光伏甲享王之時吳王亦自知其謀觀其使甲坐于道及其門門階户席皆王之親當時設備如此其嚴然終不免於禍是明知其謀而明陷於禍吳王既明知其有篡弒之心須當兢兢業業遵養時晦於此上做工夫既不曾於此上做工夫而親信之臣如掩餘燭庸季子之徒不當使之在外數子既在外故公子光得以弒之安得不致篡弒之禍以此觀之則罪不專在公子光實吳王之罪楚殺其大夫郤宛謝湜曰左氏謂費無極譖而害之秋晉士鞅宋樂祁犂衛北宫喜曹人邾人滕人㑹于扈謝湜曰左謂謀納公胡安國曰按左氏扈之㑹令戍周且謀納公也宋衛皆利納公固請之士鞅取貨於季孫謂樂祁北宫喜曰魯君守齊三年而無成季氏甚得其民淮夷與之有十年之備有齊楚之援有堅守之心有列國之權而弗敢宣也事君如在國鞅以為難二子皆圖國者也而欲納魯君請從二子以圍魯無成死之二子懼皆辭乃辭小國而以難復之十五年諸侯盟于扈將為魯討齊齊侯賂之而不克討故在㑹諸侯略而不序今此謀納公亦以賂故不克納而諸國之大夫皆序何也曰利於納公者宋衛之大夫也受賂而不欲納公者獨范鞅主之耳又况戍周之令行乎所以列序而不略也以此見聖人取捨之大情而輕重審矣冬十月曹伯午卒邾快來奔謝湜曰邾大夫凡三叛出奔皆以魯為主以其受鄰國逋逃而安之也公如齊公至自齊居于鄆二十有八年春王三月葬曹悼公公如晉次于乾侯謝湜曰次于陽州不得入於齊也次于乾侯不得入於晉也近則見輕于齊逺則見輕于晉其憂危至矣晉主盟之國也魯君以難告若在水火之中也頃公坐視魯君水火之難棄而不恤非所以正邦國也書次于乾侯罪頃公失主盟之道也乾侯晉邑夏四月丙戌鄭伯寧卒六月葬鄭定公秋七月癸巳滕子寧卒冬葬滕悼公二十有九年春公至自乾侯居于鄆謝湜曰晉侯未見公故以乾侯至齊侯使高張來唁公程氏學曰昭公至自齊居于鄆三至自㑹居于鄆一至自乾侯居于鄆一書至書居所以存君也公播越于外不獲其所而魯國君臣之義其可絶乎春秋之道明君臣者也君臣之道明而天下安且治矣書曰公在乾侯亦與此同意謝湜曰恤之而不能救之不可謂之德唁于野井使高張來唁罪其無救難之實也胡安國曰遣使來唁淺事也亦書于經者罪齊侯不能修方伯連帥之職也昔狄人迫逐黎侯黎侯寓于衛衛人弗恤黎之臣子勸其君以歸而賦式微其一章曰微君之故者以事求人而人不有其事是謂微君之故若昭公見逐出奔而齊莫之討淹恤日久而齊莫之納微君之故矣其二章曰微君之躬者以身下人而人不有其身是謂微君之躬若齊侯設禮以享而使宰獻遣使來唁而稱主君微君之躬矣諸侯失國託於諸侯禮也諸侯失國諸侯納之正也齊之先世嘗主夏盟而太公受先王五侯九伯之命矣魯為鄰境甥舅之國也昭公朝夕立於其朝曽不能陳師境上討意如逐君之罪而遣使唁公豈得禮乎公如晉次于乾侯謝湜曰晉辭之矣又如晉次于乾侯窘迫之至也夏四月庚子叔詣卒秋七月冬十月鄆潰謝湜曰適齊齊弗禮適晉晉弗受以羇旅之迹託于晉之乾侯君權掃地盡矣鄆人憂季氏之為患也於是上下莫相保守而一邑之衆潰焉以千乘之君而卒無尺土之託一民之輔者權臣為之難也胡安國曰民逃其上曰潰自是昭公削迹於魯尺地一民皆非其有矣公之出奔處鄆四年民不見德亡無愛徵至於潰散豈非昏迷不反自納於罟獲陷阱之中其從者又皆艾殺其民視如土芥其下不堪所以潰歟然則去宗廟社稷出奔而猶不惕然恐懼期改過以補前行之愆也自棄甚矣欲不亡得乎噫故書以為後世戒三十年春王正月公在乾侯程氏學曰公在乾侯存君也君失其所在於乾侯而不得歸故因其朝正之時而書公所在則存君父罪臣子譏諸侯之意皆可具見也謝湜曰鄆潰公不得反而客于乾侯正月書公所在存君父也存君父所以責臣子也胡安國曰公去社稷於今五年每嵗首月不書公者在魯四封之內則無適而非其所也至是鄆潰客寄乾侯非其所矣嵗首必書公之所在者蓋以存君不與季氏之専國而罪臣子譏諸侯之意具矣唐武后廢遷中宗革命自立史臣列於本紀欲著其罪而君子以為非春秋之法其言曰天下者唐之天下中宗受之於其父武后安得絶先君之世復繫嗣君之年黜武氏之號自以為竊取春秋之義信矣夏六月庚辰晉侯去疾卒秋八月葬晉頃公冬十有二月吳滅徐徐子章羽奔楚程氏學曰齊師滅談談子奔莒楚人滅弦弦子奔黃狄滅溫溫子奔衛國滅君奔皆不名者春秋之世强凌弱衆暴寡而滅人之國其君力有不勝而奔者於其國義未絶也何則彼實無罪而為橫逆所加固可以上訴諸天子下告諸侯然則其理可伸而其邦可復矣焉可遽絶之哉唯昭三十年吳滅徐徐子章羽奔楚獨名傳以既服矣而後奔楚以經義例考之為信彼既降矣安有興復之志乎故名之以著其絶也奔不書出國滅無出故耳謝湜曰春秋國滅君奔皆不名獨徐子章羽名者為其已臣於吳而後奔也奔而不名者取其有興復之志也屈辱為臣則興復之志亡矣故徐子之奔也書名以著其絶胡安國曰春秋國滅而君出奔者皆存其爵而不名為無可滅之罪特為橫逆所加耳獨徐子章羽奔而書名者章羽斷其髮携其夫人以逆吳子已無興復之志矣以此見春秋大義雖在於抑强扶弱又責弱者之必自强於為善也三十有一年春王正月公在乾侯范祖禹曰季氏出其君魯無君者八年春秋每嵗必書公之所在及其居乾侯也正月必書曰公在乾侯不與季氏之專國也季孫意如㑹晉荀躒于適歷謝湜曰意如魯之大逆也大國不能為之力討又使大夫㑹焉何以為亂臣賊子之戒哉然則意如身負大罪乃敢偃焉自肆而無所忌憚者以晉大夫為之援也胡安國曰左氏曰晉侯將以師納公士鞅曰若召季孫而不來則信不臣矣然後伐之若何晉人召季孫鞅使私焉曰子必來我受其無咎意如出君不事專有魯國晉實主盟不能致討而寵以㑹禮不亦悖哉或曰季孫事君如在國未知其罪而君伐之是昭公之過也則非矣行貨齊晉使不納公禱於煬官求君不入及其復也猶欲絶其兆域加之惡諡安在乎事君如在國猶曰未知其罪乎齊晉不能誅亂禁姦悖君臣之義不知其從自及也陸淳以為逐君之臣晉不之罪而反與為㑹書曰意如㑹晉荀躒于適歷晉侯之為盟主可見矣荀躒之為人臣可知矣此不待貶絶而罪惡見者也得春秋所書之意矣夏四月丁巳薛伯穀卒晉侯使荀躒唁公于乾侯謝湜曰賊臣不討而荀躒㑹之危君不救而荀躒唁之何以撥魯國之亂而反之正哉齊晉皆大國也力足以誅逆而不為之誅勢足以解危而不為之解此春秋所以責二國之唁也秋葬薛獻公冬黑肱以濫來奔謝湜曰黑肱邾大夫不書邾杜氏謂闕文十有二月辛亥朔日有食之三十有二年春王正月公在乾侯取闞謝湜曰公旅寄乾侯久矣非有兵力可以得邑也所以取闞者魯人以闞與公而公取之也書取闞著其微弱也闞魯微邑夏吳伐越秋七月冬仲孫何忌㑹晉韓不信齊高張宋仲幾衛世叔申鄭國參曹人莒人薛人把人小邾人城成周謝湜曰諸侯不勤王事久矣當王室危弱之時列國乃能從王命城成周以安王室善之大者也書城成周善之也胡安國曰天子有道守在四裔今至於城王都可以不書乎不曰城京師而曰城成周者京師衆大之稱成周地名也與列國等矣吕祖謙曰自王子朝之亂諸侯戍周到此敬王謀於晉晉為之城成周當時人心未定所恃者城郭而已今范獻子魏獻子謀與其戍周不如城之天子實云雖有後事晉勿與知可也他是晉秉政大臣自相謀如此以事迹上看晉人合諸大夫以城成周定其高低厚薄以令諸侯自共王事以春秋之末晉之衰諸侯能如此已是間見之時看晉執政不要去迹上看須看其執政之相謀雖有後事晉勿與知可也做此城成周一段事自此天子之事都不要管天下事這般一段大段要看自周之衰五霸扶持王室固是無誠心欲借王室以求寵於諸侯何故到春秋之末雖五霸亦無尚有王澤未盡略知有王室在到得王澤欲盡僅有毫髮之存王不能因振奮再張王室此一段事以略言之做一番不管所以謀雖有後事晉勿與知可也晉一國之心如此若以天下大勢論見得周所以不復振處何故當時人心九分在私止有一分在王室以一分做十分事為周城了事王室之心便亡蓋緣此一番用盡豈特范獻子魏獻子之過為周王者所當增修國政保護愛飬生起諸侯尊王之心反不審天下之大勢令城其城諸侯尊王室之心皆亡此周所以衰十有二月己未公薨于乾侯謝湜曰薨于乾侯著其客死于外也魯國政在季氏四世矣民知季氏不知有君昭公大事未知所處而遽以干戈討不可制之權臣故意如方登臺請罪而公徒釋甲皆無戰心及其出也齊弗見禮晉弗見受鄟陵之盟扈之㑹二國姦臣反為季氏援助而內無討亂之臣昭公屢年次于野卒乎無一人之援而死于乾侯此可不為之悲乎哉故史墨曰為君慎名與器不可以假人胡安國曰諸侯失國出奔者衆矣鄭伯突為祭仲所逐而出奔入于櫟而復國衛侯衎為孫寧所逐而出奔入于夷儀而復國昭公在外八年卒以客死為天下笑何也祭仲雖專而世權不重於季氏衛侯失國猶夫人也而有推挽之者所以雖失而復得也魯自季友受費以為上卿至于意如專執國命四世矣其臣皆季氏之孚也其民皆季氏之獲也而昭公有一子家駒言不見聽計不行也不得復國宜矣故春秋詳録其所為後世之戒公雖失國然每嵗之首月必書公在乾侯誅意如也書齊侯取鄆公圍成鄆潰絶昭公也為人臣者觀每嵗必書公所在必不敢萌跋扈不臣之心為人君者觀春秋所書圍成鄆潰知社稷之無常奉也亦必少警矣嗚呼可謂深切著明矣胡宏曰九五屯其膏小貞吉大貞凶象曰屯其膏施未光也魯昭公當三桓强盛祿去公室之時以人則皆季氏之人以政則皆季氏之政君位雖存而威權去已不足以有為欲恩澤下流難矣屯其膏屯膏凝結而不流者也然則宜奈何自小而以漸正之使恩澤浸潤加於百姓仁心仁聞著於天下則有吉如唐武宗憲宗是魯昭不知出此舉兵攻之欲奪數世之權於一旦恩澤未孚民莫之與以致失國出奔客死他所凶矣吕祖謙曰魯昭公當時不能堪季氏之强暴陵弱公室不勝一朝之忿舉兵伐季氏至於失其國身死於外自當時觀之不過言魯失民數世一旦輕舉妄動固不可若如此說昭公便須委首聽命於强族可也輕舉妄動以喪社稷固昭公之可罪然當時使俯首聽於強族亦豈是承周公伯禽付託之意但季氏雖强然考當時事勢亦自有可乘之隙昭公智不足以知此費季氏腹心之地季氏不能自固根本南蒯以費叛腹心內潰季氏討之三四年不服間隙孰過於此昭公若乘此機㑹正一國之紀綱收公室之權當時又有子家駒精忠逺識與之圖國舉兵以伐之季氏必敗大抵投機之㑹固有間不容髮者今也季氏討費數年之久亦一大機㑹也而昭公不能知當可為之時不為及季氏既服費復强之後反驅市人以戰宜於失國待他威勢再强方且委靡不以為意始謀討季氏亦已晚矣此其所以反為季氏所陵而身死於外也春秋集義卷四十五

body:
  text: 春秋集義卷二十七宋李明復撰文公三年春王正月叔孫得臣㑹晉人宋人陳人衛人鄭人伐沈沈潰程氏學曰滕文公問孟子曰齊人將築薛吾甚恐如之何則可孟子曰是謀非吾所能及也無已則有一焉鑿斯池也築斯城也與民守之効死而民弗去則是可為也由此觀之則諸侯守邦豈可致民之潰哉一被侵伐而民散君之不能可知矣蔡潰莒潰沈潰之類皆是也謝湜曰沈微國潰奔散之詞與民守國効死而民弗去諸侯之職也一遇大國侵伐而國人潰焉君之不仁其民民之不死其上可知矣晉無懐服小國之道故伐沈沈無効死勿去之民故沈潰沈潰蔡潰莒潰其義一也胡安國曰按左氏伐沈以其服于楚也沈潰民逃其上也五國皆稱人將非命卿也沈在汝南平輿縣北未嘗與中國㑹盟而南服于楚師入其境而民人逃散雖非義舉比于報復私怨之兵則有間矣故其詞無褒貶凡此類欲示後世用師者知權而本之以正也夏五月王子虎卒謝湜曰王子虎天子大夫王叔文公也王臣以赴告之禮通于邦國故奪爵書名不以外諸侯之禮待之也胡安國曰王子虎不書爵譏之也天子内臣無外交或曰禮稱情而為之節文者也叔服新使乎我則宜有恩禮矣仲尼脱驂于舊館雖卒叔服可也夫脫驂于舊館惡夫涕之無從而為之非禮之經也天子内臣無外交而以新使乎我致恩禮焉是以私情害公義失輕重之權矣秦人伐晉程頤曰結怨連禍殘民以逞晉人畏之而不出秦人極其忿而後悔過聖人望其能終改耳謝湜曰晉以四國伐秦故秦復伐晉楊時曰或曰書之終秦誓以見聖人之樂人悔過也故凡過而能悔者取其悔而不追其過可也今有殺人而被刑者臨刑而曰吾惟殺人以至此也仁者于此亦必哀而取之曰書之有秦費二誓以誌帝王之誥命于是絶故也其大意則言有國者不可廢誓于誓之中其事又有可取者則如秦之罪已而不責人是也若曰取其悔而已不咎其過其既悔而有過也亦不當罪乎聖人以恕待人于人之悔也嘉之可也如以悔為是而不問其改與不改則改過者鮮矣故君子之取人也取其改不取其悔且殺人至于被刑而自狀其過蓋傷其死之不善也使殺人而不必死其肯悔乎殽之戰不敗則秦自以為功矣何以知之以濟河之師知之也濟河之師何義哉胡安國曰按左氏秦伯伐晉濟河焚舟封殽尸而還其稱人何也聖人作易以懲忿室欲為損卦之象其詞曰損徳之修也春秋諸侯之知徳者鮮矣穆公初聽杞子之請違蹇叔之言其名為貪兵是欲而不能窒也及敗于殽歸作秦誓庶幾能改將窒其欲矣復起彭衙之師殽函之役其名為忿兵是忿而不能懲也今又濟河取郊人之稱斯師也何義哉晉人畏秦而不出穆公逞其忿而後悔自是見伐不報始能踐自誓之言矣是故于此貶而稱人備責之也吕祖謙曰秦穆懲殽之敗仍用孟明增修國政竟刷大恥夫子驟列其悔過之誓于二帝三王之後者抑有意焉一悔可以破百非一善可以滌百惡秦穆在春秋中朝譏暮貶左瑕右玷雖擢髪不足以數其罪及入于書則温然粹然不見微隙是典謨誥誓之秦穆而非復春秋之秦穆也聖人之勸深矣自時厥後晉有邲之敗齊有鞌之敗楚有鄢陵之敗其餘敗軍者未易槩舉如秦之懲敗而悔過者則無聞焉此書之所以止于秦也繼秦穆而有悔過自誓之舉則夫子之序書詎終于秦耶秋楚人圍江謝湜曰江即晉故楚圍江雨螽于宋謝湜曰螽衆多自上而下故曰雨螽螽田原沴氣所生雨螽空中沴氣所生雨螽于宋宋國政治不和所致故也冬公如晉十有二月己巳公及晉侯盟謝湜曰公再朝于晉故晉侯與之盟比年再朝再盟晉之不道文之不立可知也吕祖謙曰晉人懼其無禮于公請改盟魯是守禮義之國不比其他國魯一失之則他國皆失又曰晉國盛時雖有一二事不是卒未見其害蓋天下畏其强不敢與之較故襄子雖以大夫之卑盟國君之尊魯之君臣熟視亦不敢較至于改盟魯亦惟命是聽在當時雖未見其害馴致襄世平公襲其迹而為之欲改衛盟衛即叛而不從遂至兵連禍結數年不解正縁襄子做得樣子不是此所以後世蹈之有其害也晉陽處父帥師伐楚以救江謝湜曰楚人圍江晉陽處父伐楚以解江圍其志善矣然江微國其去楚逺越千里聲楚之罪而救之其勢不相接其力不相及非救江之道也胡安國曰以者不以之也救江善矣其書以何楚嘗伐鄭矣齊桓公逺結江黃合九國之師于召陵然後伐鄭之謀罷又嘗圍宋矣晉文公許復曹衛㑹四國之師于城濮然後圍宋之役解今冮國小而弱非能與宋鄭比楚人圍之必不待徹四境屯戍守禦之衆與宿衛盡行也當是時楚有覆載不容之罪晉主夏盟宜合諸侯聲罪致討命秦甲出武闗齊以東兵畧陳蔡而南處父等軍方城之外楚必震恐而江圍自解矣計不出此乃獨遣一軍逺攻强國豈能濟乎故書伐楚以救江言救江雖善而所以救之者非其道矣此春秋紀用兵之法也吕祖謙曰楚師圍江晉先僕伐楚以救江晉如何不便救江先去伐楚蓋晉是伯主不得不備禮去救他非是十分要救他使告于周王叔桓公只是欲假天子之勢想王師之行亦不多陽處父只是偏師如何伐得楚故次年楚滅江四年春公至自晉夏逆婦姜于齊程頤曰納幣在喪中與喪婚同也稱婦姜已成婦也不稱夫人不可為小君奉宗廟也不書逆者雖卿亦失其職矣或問夏逆婦姜于齊何故便書婦曰此是文公在喪服將滿之時納幣故聖人于其逆時便成之為婦罪其居喪而娶也春秋微顯闡幽乃在于此處凡事分明可見者聖人更不微文以見意只直書而已如桓三年及宣元年逆女皆分明在喪服中成婚故只書逆女也文公則但在喪服納幣至逆女却在四年聖人欲顯其居喪納幣之罪故書婦姜便成之為婦也其意言雖至四年方逆女其實與喪婚同也程氏學曰先儒謂國君必親迎以使大夫為非禮據文王親迎于渭以質之也夫婦人倫之本固天地之大義也然諸侯有社稷有民人茍必迎于他邦而所娶之國或道里之逺則將綿厯日月曠廢國家之治恐于理不必然矣御輪之禮若施于所館豈曰不宜何必越國而行哉且文王之迎太姒惟曰于渭不聞于莘造周之地蓋未逺于周邦且文王當是時未知其已為諸侯否也至于詩書韓侯迎止于蹶之里則蹶為王卿士若韓侯因朝覲至周而迎不亦宜乎然則逆夫人使卿未為不重也婚姻者人道之始故曰女之行國之大事也謹書之而得失見矣謝湜曰公使大夫迎姜氏為夫人逆者非卿故不名至不告廟故不書至夫人上配國君其體尊矣逆不以卿至不告廟不欽之大也凡夫人逆則為女至而告廟則為婦女在父母家之稱也婦從夫之稱也故春秋逆稱女至稱婦文姜婦行已虧哀姜讐女皆不可以奉宗廟故文姜至稱姜氏哀姜入稱姜氏皆不以婦姜待之也文公之結婚也以既禫為喪終以納幣為未成禮葢不知納幣則婦禮已成禫而納幣則為喪娶故逆稱婦姜以明婦禮成于納幣也婦禮成于納幣則文公禫而納幣其惡由此見矣稱女則係齊稱婦則係魯故女則以齊逆之婦則逆之于齊也春秋之義顯者微之使深幽者闡之使明以禫為喪終以納幣為未成婦其違禮隠矣春秋逆即稱婦所以闡幽而明微也胡安國曰逆皆稱女以未成婦而女者在父母家之所稱也往逆而稱婦入國不書至何哉此春秋誅意之效也禫制未終思念娶事是不忘哀而居約矣方逆也而已成為婦未至也而如在國中原其意而誅之也不稱夫人姜氏者亦與有貶焉婦人不専行何以與有貶父母與有罪也文公不知敬其伉儷違禮而行使國亂子弑齊人不能鍳微知著冒禮而往使其女不允于魯皆失于不正其始之過也夫婦之際人倫之首禮不可不謹也故交貶之以為後鑒狄侵齊秋楚人滅江謝湜曰處父失救之道故楚滅江晉侯伐秦程頥曰秦逞忿而伐晉晉畏而避之其見報乃常情也秦至此能悔過矣故不復報晉聖人取其能遷善也稱晉侯不復加譏見秦宜得報而自悔不復修怨乃其善也謝湜曰殽役之後秦晉怨結禍連兵革不息胡安國曰晉人三敗秦師見報乃常情耳而穆公濟河焚舟則貶而稱人秦取王官及郊未至結怨如晉師之甚也襄公又報之于常情過矣而得稱爵何也聖人以常情待晉襄而以王事責秦穆所以異乎襄公忘親背恵大破秦師敗狄伐許怒魯侯之不朝也而以無禮施之是専尚威力先事加人莫知省徳而後動也今又報秦不足罪矣穆公初敗于殽悔過自誓增修徳政宜若過而知悔悔而能改又有濟河之役則非誓言之意所以備責之也然晉襄見伐而報猶無譏焉秦穆至是見伐而不報善可知矣不譏晉侯所以深善秦春秋大改過嘉釋怨王者之事也故仲尼定書列秦誓于百篇之末以見悔過能改而不責人雖聖賢誥命不越此矣朱熹曰胡氏謂書晉侯為以常情待晉襄書秦人為以王事責秦穆恐未必如此須是己之心果與聖人之心神交心契始可斷它所書之㫖不然則未易言也程子所謂微詞隠義時措從宜者為難知耳冬十有一月壬寅夫人風氏薨程頥曰自成風已後妾母稱夫人嫡妾亂矣仲子始僭尚未敢同嫡也謝湜曰風氏莊公妾僖公妾母文公妾祖母胡安國曰風氏僖公之母莊公妾也而稱夫人自是嫡妾亂矣語曰邦君之妻邦人稱之曰君夫人稱諸異邦曰寡小君葢敵體之稱也若夫妾媵則非敵矣其生亦以夫人之名稱號之其殁亦以夫人之禮卒葬之非所以正其分也以妾媵為夫人徒欲尊寵其所愛而不虞卑其身以妾母為夫人徒欲崇貴其所生而不虞賤其父畢其身則失位賤其父則無本越禮至是不亦悖乎夫禮庶子為君為其母無服不敢貳尊者也春秋于成風記其卒葬各以實書不為異詞者謹禮之所由變也五年春王正月王使榮叔歸含且賵程頥曰天子成妾為母夫人亂倫之甚失天理矣不稱天義已明稱叔存理也王使召伯來㑹葬天子以妾母同嫡亂天理故不稱天聖人于此尤謹其戒謝湜曰王使榮叔含賵妾母天王之失道也魯請而後歸之故不書來三月而後歸含既𦵏而後㑹葬皆非禮也胡安國曰珠玉曰含車馬曰賵含且賵者厚禮妾母也不稱天王者弗克若天也春秋係王于天以定其名號者所履則天位也所治則天職也所勑而惇之者則天之所敘也所自而庸之者則天之所秩也所賞所刑者則天之所命而天之所討也夫婦人倫之本王法所尤謹者今成風以妾僭嫡王不能正又使大夫歸含賵焉而成之為夫人則王法廢人倫亂矣是謂弗克若天而悖其道非小失耳故特不稱天以謹之也吕祖謙曰車馬曰賵古人以祭器銘鼎為寶以車馬為貨當時車馬最易貨如今人金玉相似顔路請子之車以為之槨不是便把他車做槨只是賣車為槨見得車馬是易貨的物三月辛亥葬我小君成風謝湜曰母以子貴妾之為君母者也母雖妾子為君則禮宜致隆親母之道也妾母雖貴嫡母在上則位有等降其體屈而不伸故妾母之禮嫡母在則以妾母事之嫡母殁則以夫人事之生以夫人事則死以夫人葬尊母之義也雖然其生也入廟不稱夫人其死也不為服不合葬不祔廟所以正嫡妾之分也成風文公之妾祖母也嫡祖母殁則文公以夫人事之可也故成風卒書薨薨書夫人葬書小君王使召伯來㑹葬謝湜曰妾母雖為夫人其死為心喪不為服蓋服則告廟有嫡母在則妾夫人不可以稱于宗廟故也赴告雖通王室王室不當以夫人之禮待之尊妾母孝子之私恩正嫡妾先王之大義故也成風魯之妾母也天王使王臣歸賵歸含來㑹葬逆天之大也歸仲子賵稱天王以明王者當若天道也歸成風含賵稱王㑹成風葬稱王以明周王弗克若天也憲天理物王之徳也臣不能相之于始王不能若之于終由是所為背天而天道不復見矣故王之寵妾而尊之也始則名其宰終則去其天始名其宰者以宰不能相王于始也終去其天者以王不能若天于終也胡安國曰仲子雖賵非恵公之嫡也春秋之初尚以為疑故别為立宫而羽數特異此雖非禮之正然不袝于姑猶有辨焉至是成風書葬乃有二夫人袝廟而亂倫易紀無復辨矣故禮之失自成風始也王臣下聘桓公冢宰書名示貶而大夫再聘則無譏焉或以為從同也或以為同則書王也成風薨王使榮叔歸含且賵既不稱天矣乃使召伯來㑹葬又與貶焉何也歸含且賵施于妾母已稠叠矣又使卿來㑹葬恩數有加焉是將袝之于廟也而致禮于成風盡矣賵一也含賵而又葬則其事益隆亂人倫廢王法甚矣再不稱天者聖人于此尤謹其戒而不敢略也吕祖謙曰召昭公來㑹葬禮也此禮不是周公禮經如今州縣條例相似但當時為禮耳夏公孫敖如晉秦人入鄀謝湜曰鄀貳于楚故秋楚人滅六謝湜曰六即東夷故吕祖謙曰臧文仲聞六與蓼滅六蓼是臯陶後唐堯時封文仲是舊時人識得此等事見其經許多時尚在此一旦滅了所以深嗟不然亡國亦多何獨嘆此二國想當時文籍尚具在至今淮上六安縣有臯陶塜左氏言使聖賢之後見滅于東夷當考冬十月甲申許男業卒六年春葬許僖公夏季孫行父如陳吕祖謙曰季文子聘于陳且娶焉季文子須要娶于陳者何故葢緣叔牙與原仲自有舊如季友如陳送原仲葬可見秋季孫行父如晉謝湜曰行父季友孫八月乙亥晉侯驩卒冬十月公子遂如晉葬晉襄公謝湜曰晉大國故公子遂㑹葬吕祖謙曰襄仲如晉葬襄公襄仲是卿出從諸侯葬此是霸者之制晉殺其大夫陽處父晉狐射姑出奔狄謝湜曰射姑狐偃子賈季也襄公使射姑將中軍陽處父以射姑不可將進諫于君而以趙盾易之射姑怨處父之易其班也専以私忿殺之處父國之大夫也射姑以私忿専殺大夫而晉國不能討然則處父受禍乃晉國殺之而已故殺書晉以罪其國胡安國曰公羊子曰晉殺其大夫陽處父則狐射姑曷為出奔也射姑殺也射姑殺則其稱國以殺何君漏言也易曰不出户庭无咎何謂也子曰亂之所生則言語以為階君不宻則失臣臣不宻則失身幾事不宻則害成是以君子謹宻而不出也凡書殺者在上則稱君在下則稱氏在衆則稱人在微者則稱盜君與臣同殺則稱國今殺處父者射姑耳君獨以漏言故亦與殺焉所以為後世戒也或以處父為侵官將相大臣非其人百官有司失其職在位者當拱黙自全隂聽人主之所為至于顛危而不救則將焉用彼相乎率天下臣子為持祿容身不忠之行以誤朝迷國者必此侵官之説夫閏月不告月猶朝于廟楊時曰告朔者諸侯所以稟命于君親謝湜曰不告月不告朔也告月必以朔故也天子頒朔政于邦國諸侯受而藏之祖廟至朔則告廟而行之然則朔宜朝朔政宜告政月必朝廟告朔示不敢専敬之至也文公怠于為政以閏非正月故始不告月月以紀時也月禮不修則時政不明時政不明則民事不治矣閏不告月亂之道也書月不書朔以示閏亦歳之月也朝廟以告朔也廢朔而朝廟舍其本而修其末也猶可止之詞也朝廟書猶志其失大本也朞三百六旬有六日以閏月定四時成歳閏歳之餘日也先王用以正時用以成歳然則閏與正月皆隂陽消息之候也榖梁謂天子不以告朔喪事不數失之逺矣胡安國曰不告月者不告朔也告朔則曷為不言朔也因月之虧盈而置閏是主乎月而有閏也故不言朔而言月占天時則以星授民事則以節候寒暑之至則以氣百官修其政于朝庻民服其事于野則主乎是焉爾矣閏不可廢乎曰迎日推䇿則有其數轉璣觀衡則有其象歸竒于扐以象閏數也斗指兩辰之間象也象數者天理也非人所能為也故以定時成歲者唐典也以詔王居門終月者周制也班告朔于邦國不以是為附月之餘而弗之數也猶朝于廟者幸其不已之詞子貢欲去告朔之餼羊子曰爾愛其羊我愛其禮吕祖謙曰不告閏朔如閏月所當做之事皆廢弛了此是棄時政說者以為文公作事遲緩春秋集義卷二十七

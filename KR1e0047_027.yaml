body:
  text: 春秋集義卷二十四宋李明復撰僖公二十有八年春晉侯侵曹晉侯伐衛程氏學曰晉侯侵曹晉侯伐衛再書晉侯者甚晉侯之惡也孔子曰晉文公譎而不正齊桓公正而不譎齊桓晉文俱有攘楚之功但究觀聖人所書之迹則譎正之論渙然矣謝湜曰曹衛楚與國晉文公欲制楚寧宋故首激楚侵曹次激楚伐衛再書晉侯甚晉侯用兵之譎也胡安國曰按左氏初公子重耳之出亡也曹衛皆不禮焉至是侵曹伐衛再稱晉侯者譏復怨也春秋之時用兵者非懷私復怨則利人土地爾詩云百爾君子不知德行不忮不求何用不臧不忮則能窒忿不求則能窒欲然後貪憤之兵亡矣或曰曹衛背華即夷于是乎致討奚為不可曰楚人摟諸侯以圍宋陳蔡鄭許舉兵而同會魯公與會而同盟楚雖得曹新昏于衛然其君不在會其師不與圍以方諸國不猶愈乎又况衛已請盟而晉人弗之許也書曰必有忍乃其有濟有容德乃大文公能忍于奄豎里鳬須矣何獨不能忍于曹衛乎再稱晉侯者甚之也下書楚人救衛則譏晉深矣春秋責備賢者而樂與人改過故衛已請盟不當拒而絶之也朱熹語録或問王霸之别曰以力假仁者不知仁之在已而假之也以德行仁者則其仁在我而惟所行矣以執轅濤塗侵曹伐衛之事而視夫東征西怨虞芮質成者則人心之服與不服可見或問晉文公譎而不正諸家多把召王為晉文之譎集注謂伐衛以致楚師而隂謀以取勝這説為通曰晉文舉事多是不肯就正做去晉文用兵便是戰國孫吳氣習公子買戍衛不卒戍刺之謝湜曰內殺大夫書刺諱之也言以周官三刺之法審其情也魯使公子買戍衛以防晉難也晉人威勢雖盛使買以死守之可也力不能抗則仲直辭明正義聽命于晉可也晉之伐衛也魯國懼難乃至不卒戍事而殺買以説于晉不忠之大也捍患禦難保人民安社稷所恃者忠而已內不忠于其臣外不忠于其鄰不可以為國故買之戍衛也書不卒戍書刺著買之不忠也胡安國曰按左氏買為楚戍衛楚人救衛不克公懼于晉殺買以説焉謂楚人不卒戍也內殺大夫稱刺者若曰刺審其情與衆棄之而專毅之罪則一耳周官有三刺一刺曰訊羣臣再刺曰訊羣吏三刺曰訊萬民刺未有書其故者而以不卒戍刺之則知買為無罪矣孟子曰無罪而殺士則大夫可以去無罪而戮民則士可以徙今乃殺無罪之士將以苟説于強國于是乎不君矣故特書其故以貶也楚人救衛謝湜曰衛恃楚距晉故楚人救衛三月丙午晉侯入曹執曹伯畀宋人謝湜曰凡執諸侯及大夫皆奪爵稱人晉侯因入書執而不曰人者文繼上事不可復稱某人故也晉文之侵曹也曹人不服故文公入曹執共公以畀宋人楚嘗伐宋圍宋曹嘗與楚執宋公然則以共公畀宋將以激楚也入其國執其君執不以罪而以激楚執之不以歸王而以畀宋書執曹伯著其服人以力也書畀宋人著其譎而不正也諸侯失國名晉人執曹伯不以罪且曹伯不服義不當絶故不名胡安國曰古者覿文匿武修其訓典序成而不至于是乎有攻伐之兵故孟子謂萬章曰子以為有王者作將比今之諸侯而誅之乎其教之不改而後誅之乎曹伯嬴者未狎晉政莫知所承晉文不修詞令遽入其國既執其君又分其田暴矣欲致楚師與之戰而以曹伯畀宋人譎矣雖一戰勝楚遂主夏盟舉動不中于禮亦多矣徒亂人上下之分無君臣之禮其功雖髙道不足尚也故曰五伯三王之罪人仲尼之徒無道桓文之事者夏四月己巳晉侯齊師宋師秦師及楚人戰于城濮楚師敗績范祖禹曰齊桓公九合諸侯一正天下晉文公尊周室定襄王敗楚師于城濮遂伯諸侯齊桓晉文五伯之盛者也謝湜曰城濮之戰不書楚人侵伐者楚來救衛而晉文與之戰也城濮之戰戰之善者也文公即位四年選才任能和輯民庶搜被廬作三軍國可謂治矣齊侯宋公秦伯以師聽命而從得天下之力可謂衆矣是以奮然特起于中國萎㽔之後覆強楚勢若振稿而齊桓之烈復見于時自是夷蠻不敢出為冦盜而生民賴是以蘇惠安之功大矣故曰城濮之戰戰之善者也雖然春秋之法不以善掩過不以得恕失其功大者其責備城濮之師固有攘狄之功矣然致楚而敗之不若召陵伐楚之為善也戰而克楚不若召陵不戰而服之為善也故城濮敗不書伐責其討罪不明也戰以晉為主責其以攻戰為事也楚以夷狄抗中國故子王貶稱人胡安國曰楚稱人貶也戰而言及主乎是戰者也當此時晉師避楚三舍請戰者得臣也而經之書及何以在晉得臣雖從晉師然初告于晉曰請復衛侯而封曹臣亦釋宋之圍是未有必戰之意也又先軫獻謀許復曹衛以携其黨拘宛春以激其怒而後得臣之意決矣故楚雖請戰而及在晉侯誅其意也荆楚恃強憑凌諸夏滅黃而伯主不能恤敗徐于婁林而諸大夫不能救執中國盟主而在會者不敢與之爭今又戍穀逼齊合兵圍宋戰勝中國威動天下非有城濮之敗則民其被髮左袵宜有美詞稱揚其績而春秋所書如此其略何也仁人明其道不計其功正其義不謀其利文公一戰勝楚遂主夏盟以功利言則髙矣語道義則三王之罪人也知此説則曽西不為管仲而仲尼孟子雖老于行而不悔其有以夫朱熹曰楚地最廣今之襄漢皆是儘是強大齊晉若不更伯楚必吞周而有天下緣它極強大所以齊桓晉文責之皆是沒緊要的事桓公豈不欲將僣王猾夏之事責之但恐無收煞故只得如此至如晉文城濮之戰依舊委曲還他許多禮數亦如桓公之意然此處亦足以見先王不忍戕民之意未泯也設使桓文所以責之者不少假借他定不肯復兵連禍結何時而已到得戰國斬首動是數萬無復先王之意矣楚殺其大夫得臣謝湜曰得臣剛愎自用勇于必戰楚子畏晉欲還而得臣傲忽無退志故城濮之敗歸罪得臣而殺之得臣不氏未賜族胡安國曰按左氏晉師既克曹衛楚子入居于申使申叔去榖使子玉去宋曰晉侯在外十九年而果得晉國險阻艱難備嘗之矣民之情偽盡知之矣天假之年而除其害其可廢乎子玉使伯棼請戰楚子怒少與之師惟西廣東宫與若敖之六卒實從之而不止也子玉從晉師文公退三舍辟之楚衆欲止子玉不可戰于城濮楚師敗績夫得臣信有罪矣而楚子知其不可敵不能使之勿敵而少與之師又以一敗殺之是以師為重而棄其將以與之也是晉再克而楚再敗也故稱國以殺而不去其官以仲尼書鄭葉其師與楚得臣之事觀之可為來世之永鑒矣衛侯出奔楚謝湜曰楚敗晉文迫衛故衛成懼難奔楚衛成失國不名者以示義不當絶胡安國曰諸侯夫國出奔未有不名者衛侯何以不名著文公之罪也衛侯失守社稷背華即夷于文公何罪乎衛之禍文公為之也初齊晉盟于斂盂衛侯請盟晉人不許是塞其向善之心雖欲自新改轍而其道無由也髙帝一封雍齒而功臣不競世祖燒棄文書而反側悉安使文公釋怨許衛結盟南向諸侯棄楚而歸晉矣忿不思難惟怨是圖必使衛侯竄身無所奔于荆蠻歸于京師兄弟相殘君臣交訟誰之咎也夫心不外者乃能統大衆智不鑿者乃能處大事文公欲主夏盟取威定伯而舉動煩撓若不勝任者惟鑿智自私而心不廣也春秋于衛侯失國出奔不以其罪名之而重文公之咎蓋端本議刑責備賢者之意也五月癸丑公會晉侯齊侯宋公蔡侯鄭伯衛子莒子盟于踐土程頥曰晉文公欲率諸侯以朝王也懼其不能而召王就見之又見其召王之罪而不明其欲朝之本心是以譎而掩其正也聖人伐其心迹顯晉文勤王之志且使後世之君知所行之不正則無以明其心當慎其所行也謝湜曰晉文却強楚尊王室諸侯皆聽命于晉故八國會踐土為盟陳雖與楚以王命之重諸侯畢至穆公不待徴召亦如會從盟書陳侯如會以示人心樂于從王也使文公有尊周之實則王室安有不興者哉衛子成公弟叔武晉文既逐成公乃立叔武主衛叔武稱子以未踰年君目之也成公義不絶于國文公私忿逐衛侯立衛子非正也書衛子罪其專廢立也胡安國曰踐土之會天王下勞晉侯削而不書何也周室東遷所存者號與祭耳其實不及一小國之諸侯晉文之爵雖曰侯伯而號令天下幾于改物實行天子之事此春秋之名實也與其名存實亡猶愈于名實俱亡是故天王下勞晉侯于踐土則削而不書去其實以全名所謂君道也父道也晉侯以臣召君則書天王狩于河陽正其名以統實所謂臣道也子道也而天下之大倫尚存而不滅矣衛侯奔楚不書名者未絶其位也叔武受盟而稱衛子者立以為君也此見聖人深罪晉文報怨行私專權自恣廢置諸侯之意吕祖謙曰作王宫于踐土晉作王宫于踐土何故不往京師朝王却教襄王出來蓋當時所畏惟楚晉先敗楚聲勢動天下故襄王亦自出來况前時圍溫圍原已是有此事了若又去則溫原必畏其民必奔散矣此所以不可入京師正如李克用兩鎮不敢入朝相似陳侯如會公朝于王所程頥曰古者諸侯以時朝聘于天子天子以時聘問于諸侯故上下交泰尊卑有禮而天下治春秋之世王室微弱諸侯莫有事君以禮者矣以二百四十二年之間書公如京師者一公朝于王所者二而已且所書成公十有三年春晉侯使卻錡來乞師三月公如京師夏五月公自京師遂會晉侯伐秦秋七月公至自伐秦蓋成公之行實會晉伐秦因道京師而名曰朝王聖人于魯事有君臣之義嘗遷就而為之詞然不書曰朝且考其前後所書亦以見意也僖公二十八年天王勞晉侯于踐土晉侯召天王于河陽兩書公朝于王所不書諸侯而獨書公又曰朝于王所則不成朝可知矣魯既無朝王之禮而臣如京師者又止有五書不曰聘則不成聘亦可知矣僖三十年公子遂之行復遂如晉非專使也天王使宰周公來聘而使遂往又遂如晉不敬莫大焉魯之于王皆不足以成朝聘之禮而天王使使來聘者反有七焉王者微弱諸侯不臣舉魯一國則天下諸侯可見也謝湜曰天王所在曰王所踐土之會襄王往勞文公晉為王築宫踐土因率諸侯朝焉故踐土稱王所踐土密邇王室朝于王所而不于京師文公失事王之道也故踐土之會王亦在焉王不書尊天王也朝書王所著公失朝禮也朝不書諸侯不與諸侯之成朝也周自平王微弱列國朝聘不通于京師故二百四十二年之間公朝于王所者二公如京師者一卿如京師者五而巳踐土則因王在會而修朝禮焉溫則召王于河陽而修朝禮焉二朝皆不書諸侯為其非朝禮之正也成公一朝于京師則書如不書朝為其不成朝也卿五聘于京師則書如不書聘為其不成聘也朝非朝聘非聘諸侯不臣之罪見矣胡安國曰朝不言所言所非其所也朝于廟禮也于外非禮也有虞氏五載一巡守羣后四朝周制十有二年王乃時巡諸侯各朝于方嶽亦何必于京師于廟然後為禮乎古者天子巡狩于四方有常時諸侯朝于方嶽有常所其宫室道途可以預修故民不勞其共給調度可以預備故國不費今天王下勞晉侯公朝于王所則非其時與地矣自秦而後巡遊無度至有長吏以倉卒不辦被誅民庶以煩勞不給生厭蓋春秋之義不行故也然則天子在是可以不朝乎天子在是而諸侯就朝禮之變也春秋不以諸侯就朝為非而以王所非其所為貶正其本之意也六月衛侯鄭自楚復歸于衛謝湜曰成公逼難不能以死守位而棄國出奔其出也晉文立叔武以主社稷其位已絶于衛矣故自楚歸國書名書復歸晉文假大義復私忿逐人之君而立其臣逐人之兄而立其弟非道也故成公出奔不名以示不當絶返國稱名稱復歸以示絶于國上明義不當絶下明已絶于國而晉文棄絶成公不以其道其罪見矣成公賴楚之力以歸左氏謂晉復衛侯非也胡安國曰衛侯失國出奔則不名復歸得國何以名殺叔武也叔武者衛侯之弟也晉文公有憾于衛侯而不釋怨于是逐衛侯立叔武叔武辭立而他人立則恐衛侯之不得反也于是已立乎其位始反衛侯衛侯得反而疑其弟則曰叔武篡我元咺爭之曰叔武無罪衛侯不信其言終殺叔武是不念鞠子哀而以爭國為心亂民彝滅天理其為罪大矣此其所以名也元咺由是走之晉而訟其君然衛侯初歸則稱復再歸何以不稱復乎春秋立法甚嚴而待人以恕鄭之初歸雖殺叔武既名之矣猶意其或出于誤而能革也是以稱復及其再歸又殺元咺及公子瑕則是終以爭國為心長惡不悛無自艾之意矣是以不稱復其曰歸于衛者易詞也諸侯嗣故稱復者繼之也不稱復者絶之也而國非其國矣衛元咺出奔晉謝湜曰元咺以晉命立叔武主衛成公自楚復歸前驅入殺叔武故元咺奔晉吕祖謙曰元咺出奔晉此是要去訟衛侯初間衛侯殺其子角咺不廢命此一處能忍最賢于人至第二來迫他便忍不得此蓋緣衛侯不明之甚然元咺于此時能忍得亦非細事此是人之所難處大抵工夫當做得到陳侯欵卒謝湜曰陳侯蓋自會返國而卒魯不會葬故不書葬秋杞伯姬來謝湜曰非歸寧故直書來公子遂如齊冬公會晉侯齊侯宋公蔡侯鄭伯陳子莒子邾子秦人于溫天王狩于河陽程頥曰晉文公實有勤王之心而不知召王之為不順故譎掩其正程氏學曰河陽之行非巡狩也晉文召之也而聖人特書天王狩于河陽所以伸天子之勢抑晉侯之不臣也若踐土之會王亦在焉惟公朝于王所而不書王之來何也曰踐土之事天王實勞晉侯然王有巡狩之名晉無召君之迹非如河陽之行反道害義故特書言狩者足以見其不成狩也春秋之義所以明微嗚呼抑強扶弱尊王而黜諸侯非聖人誰能修之楊時曰晉文公召王以諸侯見而春秋書曰天王狩于河陽蓋不與其召也又書曰公朝于王所言諸侯自朝于王蓋不與其以也范祖禹曰晉文公心正而行譎召王是也文公心非不善也而所行不正是以為譎謝湜曰晉文會諸侯朝王于溫由是王至河陽然則河陽之行非狩也晉文召之也春秋書曰天王狩于河陽所以伸天王之尊也伸天王之尊所以罪晉文之不臣也踐土之事襄王實勞晉文故踐土書公朝王所而已以其無召君之迹也河陽則以臣召君不可以訓故河陽以天王自狩為文以其滅君臣之義也河陽與溫一也指邑故言溫指狩地故言河陽胡安國曰按左氏晉侯召王以諸侯見仲尼曰以臣召君不可以訓故書曰天王狩于河陽以尊周而全晉也啖助謂以常禮言之晉侯召君名義之罪人也其可訓乎若原其自嫌之心嘉其尊王之意則請王之狩忠亦至焉故夫子特書狩于河陽所謂原情為制以譏變禮者也夫踐土之會王實自往非晉罪也故為王諱之又為晉解之于以見春秋忠恕也吕祖謙曰齊桓九合諸侯一正天下無非尊王室天子亦未嘗親出慰勞若文公踐土之盟河陽之狩兩屈天子之尊蓋周王不畏齊而畏晉天子視齊桓乃忠臣不過一誠實而晉文權謀髙大所以畏晉不畏齊也舉天子畏與不畏又見文公不如桓公壬申公朝于王所謝湜曰朝于京師正也書朝于王所罪其不正也諸侯皆朝正也朝書公不書諸侯罪其不成朝也朝書公所以紀其迹朝不書諸侯所以黜其亂孔子曰晉文公譎而不正齊桓公正而不譎桓公會王世子會宰周公未嘗有朝王之心也然伐楚責王祭不共首止葵丘之會不與王世子宰周公盟迹則正矣此孔子所以言其不譎也文公會諸侯朝于踐土會諸侯朝于溫蓋以朝王為心也然就踐土為宫以朝召王于河陽以修朝禮迹則譎矣此孔子所以言不正也文公以朝王為心善矣然以一失所舉遂陷大惡諸侯舉事其可不慮耶晉人執衛侯歸之于京師謝湜曰衛成復歸殺衛子叔武大夫元咺以叔武訟于晉故晉文執衛侯執衛侯稱人貶之也成公背晉與楚固有過矣然文公未有虐民大罪也非有不可容之大惡也晉文遽以兵威逼而絶之其出奔也即以衛子為君其復歸也即以元咺之訟執之衛子主國非正也元咺訟君非忠也逐人之君而立其臣黨人之臣而執其君失方伯治罪之義矣雖曰執而歸王何以服諸侯之心哉故成公雖失國其出奔不名見執復不名以示義不當絶也師于京師直詞也歸之于京師不得已之詞也觀其詞而曲直之理存乎其中矣諸侯為害不大者先王責以禮懷以德須其不改然後加刑豈若晉文以兵伐之以勢奔之以力執之耶衛元咺自晉復歸于衛謝湜曰元咺以臣訟君衛之大逆也晉文不道使咺復以臣子歸國書復歸明其罪大已絶于國為天吏者在所誅絶也自晉侯伐衛君以逐臣見執臣以訟君復歸使君臣相抗更主衛國誅釋廢置之柄亂矣書元咺自晉復歸所以深責晉文也胡安國曰其言歸之于者執不以正之詞也古者君臣無獄諸侯不専殺為臣執君故衛侯不名而元咺稱復大夫不世其稱復絶之也自晉者晉有奉焉因其力也歸者易詞以文公為之主故其歸無難而方伯之罪亦明矣是以執而稱人不得為伯討也諸侯遂圍許謝湜曰晉文以尊周之命率諸侯朝王臣子之大義也許獨違命不從罪在所治故諸侯自會以兵圍之書遂圍許善諸侯得討叛之義也討叛尊王人心所同欲故稱諸侯胡安國曰諸侯比再會天子再至皆朝于王所而許獨不會以其不臣也故諸侯圍許按古者巡狩諸侯各朝于方嶽今法天子行幸三百里內亦皆問起居許距河陽踐土近矣而可以不會乎其稱遂繼事之詞也吕祖謙曰諸侯圍許許何故不與踐土之盟溫之會蓋許近楚曹伯襄復歸于曹遂會諸侯圍許謝湜曰曹共公歸晉文釋之也共公非有大罪當黜晉以楚故執之以畀宋人共公之拘于宋也其位已絶于曹矣然則共公義不當絶而晉文絶之也故共公見執不名以示義不當絶也歸國稱名稱復歸以示晉文絶之也正其不當絶于前著其已絶于後晉文棄絶共公不以其道其罪見矣晉文之圍許也以王命討叛諸侯服從故共公得復之後即以兵會諸侯圍許書曹伯遂會諸侯以見共公不敢即楚也共公與楚久矣圍許之役心不即楚而遂會諸侯則人心樂于從王可知矣衛侯出奔不名歸國稱名稱復歸曹伯見執不名歸國稱名稱復歸其義一也元咺在所誅絶而晉文與之書復歸以明罪大當絶也曹共衛成在所容恕而晉文棄之書復歸以明絶之非義也誅釋國之大柄也誅釋不由公義而能使天下歸服者鮮矣晉文以王命舉十國討許而至于圍之則許人心不服晉可知也胡安國曰曹伯襄何以名其歸之道非所以歸也晉侯有疾使其豎侯獳貨筮史曰以曹為解晉侯恐于是反曹伯夫以賂得國而春秋名之比于失地滅同姓之罪以此知聖人嚴于義利之别以正性命之理其説行而天下定矣豈曰小補之哉二十有九年春介葛盧來謝湜曰葛盧夷狄附庸故書名介葛盧白狄皆不能修朝禮故書來公至自圍許夏六月會王人晉人宋人齊人陳人蔡人秦人盟于翟泉程頥曰晉文連年會盟皆在王畿之側而此盟復迫王城又與王人盟強迫甚矣故諱公諸侯貶稱人惡也程氏學曰洮之盟公會王人不諱而翟泉之盟諱之何也又王子虎晉狐偃宋公孫固齊國歸父陳轅濤塗秦小子憖皆貶稱人何哉夫諸侯失道上與王人盟其罪固已著矣然未若翟泉近在王都之側而諸侯大夫敢抗天子之卿以歃血要言其不臣甚矣王子虎亦下與諸侯大夫同盟失禮亦甚矣故聖人一皆人之然則公之惡可不為之諱乎外則貶之內則諱之而春秋惡惡之意尤可見矣謝湜曰列國大夫上抗天子之卿而盟大夫之犯上也天子之卿下齒列國大夫而盟王臣之瀆禮也故王子虎晉狐偃及諸國大夫皆貶稱人正大典也會王子虎公會之也公不書諱之也外則貶之內則諱之公之惡由此著矣翟泉周地諸侯與王人盟猶不可而况于大夫乎洮盟逺于王都猶曰不可而况于翟泉乎然則洮之盟未若翟泉之密邇王都也諸侯之會王人未若大夫盟天子之卿也胡安國曰按左氏公會王子虎晉狐偃宋公孫固齊國歸父陳轅濤塗秦小子憖盟于翟泉則皆列國之貴大夫與王子而公與會也其貶而稱人諱不書公何也翟泉近在洛陽王城之內而王子虎于此下與列國盟是謂上替諸侯大夫入天子之境雖貴曰士而于此上盟王子虎是謂下陵而無君之心著矣故以為大惡諱公而不書諸國之卿貶稱人而王子亦與焉者此正本之義也秋大雨雹謝湜曰盛陽之氣蒸而為雨寒隂薄之則凝而為雹胡安國曰正蒙曰凡隂氣凝聚陽在內者不得出則奮擊而為雷霆陽在外者不得入則周旋不舍而為風和而散則為霜雪雨露不和而散則為戾氣曀霾隂常散緩受交于陽則風雨調寒暑正雹者戾氣也隂脅陽臣侵君之象當是時僖公即位日久季氏世卿公子遂專權政在大夫萌于此矣冬介葛盧來謝湜曰左氏謂未見公故復來春秋集義卷二十四

body:
  text: 春秋集義卷四十宋李明復撰襄公十有六年春王正月葬晉悼公三月公㑹晉侯宋公衛侯鄭伯曹伯莒子邾子薜伯把伯小邾子于溴梁戊寅大夫盟謝湜曰平公新立㑹諸侯盟于溴梁繼先君之烈也大喪未畢而出㑹諸侯則其惡不待貶而見矣袁僑之盟非諸侯盟宋之盟諸侯不在㑹故盟稱諸侯之大夫溴梁之盟諸侯在㑹而大夫受命為盟故盟稱大夫胡安國曰牡丘之㑹諸侯既次于匡則書曰公孫敖帥師及諸侯之大夫救徐雞澤之㑹諸侯既盟而陳侯使袁僑如㑹則書曰叔孫豹及諸侯之大夫及陳袁僑盟今溴梁之㑹諸侯皆在是若欲使大夫盟者則宜書魯卿及諸侯之大夫盟可也而獨書大夫何也諸侯政失大夫皆不臣也上二年春正月㑹于向十有四國之大夫也夏四月㑹伐秦十有三國之大夫也冬㑹于戚七國之大夫也此三㑹皆國之大事也而使大夫專之而諸侯皆不與焉是列國之君不自為政弗躬弗親禮樂征伐已自大夫出矣况悼公既殁晉平初立無先公之明也君若贅旒而大夫張亦宜矣豈一朝一夕之故哉善惡積於至微而不可掩常情忽於未兆而不預謀荀偃怒大夫盟而晉靖公廢趙藉韓䖍魏斯為諸侯之勢見矣有國者謹於禮而不敢忽此春秋以待後世之意也吕祖謙曰人君即位之初便可占知終身之昏明治亂之由晉平公繼悼公之後恃晉國之少安放於奢侈溺於宴安觀其即位之初使羊舌肸為太傅張君臣為中軍司馬祁奚韓襄欒盈士鞅為公族大夫虞丘書為乘馬御改服修官蒸于曲沃警守而下㑹于溴梁平公固是無知其初即位能用許多人何故後來衰弱須看他承悼公之後典刑法度尚在略有可觀固是平公之力亦皆是悼公之餘平公即位之初規模便與悼公别了且悼公即位之初政事用之一國上下煥然一新其初如此後來蕭魚既㑹之後早是漸衰况平公即位之初規模已不如悼公賴悼公之舊政遺法尚在慿藉扶持平穩安帖至數十年而平公又漸漸昏墮以此知霸業之衰亦可占知於即位之初其後之霸主强弱昏明治亂亦基於此晉人執莒子邾子以歸謝湜曰二國雖為魯難然非有罪惡及民也溴梁之會二國受盟非違命也平公首令諸侯而不以其罪執邾莒失政刑矣晉侯奪爵書人貶之也二子罪非在所絶也執以歸則非屈辱於晉也故雖失位不名齊侯伐我北鄙夏公至自㑹五月甲子地震叔老㑹鄭伯晉荀偃衛寧殖宋人伐許謝湜曰許不與中國㑹盟故列國伐許秋齊侯伐我北鄙圍成謝湜曰齊侯難魯不已故再圍成大雩冬叔孫豹如晉十有七年春王二月庚午邾子牼卒謝湜曰不書卒於晉晉人復釋之故也宋人伐陳謝湜曰陳自七年逃歸未與中國㑹盟夏衛石買帥師伐曹秋齊侯伐我北鄙圍桃髙厚帥師伐我北鄙圍防謝湜曰三年之中五伐我北鄙四圍我屬邑兵之暴亂者也九月大雩宋華臣出奔陳謝湜曰君書出奔罪其失國臣書出奔罪君不能治冬邾人伐我南鄙謝湜曰邾人又伐南鄙魯之結怨鄰國亦可知也十有八年春白狄來謝湜曰白狄以夷禮來朝不成朝禮故直書來胡安國曰劉敞曰夷狄於中國無事焉其於天子世一見則諸侯雖善其交際不得而通也是以春秋亦不與其朝不與其朝者懲淫慝一內外也周公致太平越裳氏重九譯而獻其白雉公曰君子德不及焉不享其贄此乃天子而讓也况列國之君乎守藩之臣乎夏晉人執衛行人石買謝湜曰以衛不直而執之則罪不在行人以買伐曹而執之則不當執於行人秋齊師伐我北鄙謝湜曰五伐四圍猶復起師冬十月公㑹晉侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子同圍齊程頥曰書同圍見諸侯之惡齊程氏學曰凡侵伐圍入之類未有言同者獨此書同圍何哉曰背盟肆暴數伐鄰國諸侯共疾而圍之啖子曰諸侯同心圍齊特曰同圍是也十有九年盟于祝柯亦同心故也謝湜曰齊魯鄰國也齊侯怙險負衆六伐魯北鄙四圍魯成邑諸侯背盟棄好肆害虐鄰未有過於此者也兵以好惡為主衆所好者衆欲助衆所惡者衆欲去齊之不道諸侯惡之甚矣故十有二國同心伐齊而圍之也書同圍齊以明諸侯疾齊之深也胡安國曰凡侵伐圍入未有書同者而獨於此書同圍齊何也齊環背盟棄好陵虐神主肆其暴橫數伐鄰國觀加兵於魯則可見矣諸侯所共惡疾故同心而圍之也同心圍齊其以伐致何也見齊環無道宜得惡疾大諸侯之伐而免其圍齊之罪詞也春秋於此有沮橫逆抑强暴之意孟子曰國必自伐而後人伐之自作孽不可逭其齊侯環之謂矣尚誰懟哉曹伯負芻卒于師謝湜曰諸侯有社稷人民之重卒書于師謹之也楚公子午帥師伐鄭十有九年春王正月諸侯盟于祝柯謝湜曰諸侯既圍齊於是盟於祝柯盟曰大毋侵小為齊故也同圍齊義事也諸侯所同欲也善其同圍齊故盟稱諸侯晉人執邾子謝湜曰邾子非以罪在所絶見執故不名溴梁既盟之後晉人執莒子邾子祝柯既盟之後晉又執邾子為天下盟主而首犯盟約非以信諸侯也公至自伐齊謝湜曰以伐至圍者以明以義伐齊與不道圍人之國者異也取邾田自漷水謝湜曰邾小國也其伐我南鄙正以疆界不明故圍齊之後晉人執其君魯人取其田春秋正其曲直而田稱邾邾田書取則疆界不明曲乃在魯而不在邾矣邾田自漷水著其取田之多也圍齊義也取邾田不義也以義討齊之暴復以不義侵邾之疆以亂繼亂而已故晉執邾子書人邾以田與魯書取所以正其亂也季孫宿如晉葬曹成公夏衛孫林父帥師伐齊秋七月辛卯齊侯環卒晉士丐帥師侵齊至穀聞齊侯卒乃還程氏學曰十九年晉士丐侵齊至穀聞齊侯卒乃還善之也天下無王諸侯擅命征伐各自已出利人之難以成其私故伐人之喪者比比而士丐乃有惻隱之心恕人之患還師不侵豈不善乎雖然專命乃還書法亦見其譏穀梁曰為士丐者宜奈何宜墠帷而歸命乎介士丐若能如是其善何以加乎謝湜曰諸侯暴橫侵伐久矣利人之難乘人之危興兵以濟其欲者國國皆是也士丐受命侵齊師已至穀矣其聞齊之喪也以不伐喪之義退師而還大夫居暴亂之中而能以恤人之患為心者也春秋録其聞喪而還善之也晉出師無名不伐喪兵之大義士丐雖不待君命還師然其還也上無損於國下無損於忠得臨權適變之宜矣然則還不書遂者與其還而不罪其專也雖然為士丐者又能以一介反命于君則臣子之善備矣胡安國曰穀齊地也還者終事之詞古之為師不伐喪大夫以君命出境有可以安國家利社稷者則專之可也世衰道微暴行交作利人之難以成其私欲者衆矣士丐乃有惻隱之心聞齊侯卒而還不亦善乎或曰君不尸小事臣不專大名為士丐者宜墠帷而歸命乎介則非矣使士丐未出晉境如是焉可也已至齊地則進退在士丐矣猶欲墠帷而歸命乎介則非古者命將不從中覆專制境外之意而况喪必不可伐非進退可疑而待請者故至穀聞齊侯卒乃還善之也朱熹曰春秋分明處如晉士丐侵齊至穀聞齊侯卒乃還此分明是與之也八月丙辰仲孫蔑卒齊殺其大夫髙厚鄭殺其大夫公子嘉謝湜曰齊髙厚得罪於齊鄭公子嘉得罪於鄭殺書國皆以國法當殺故也胡安國曰按左氏初盜殺鄭三卿於西宫之朝公子嘉知而不言既又欲起楚師以去諸大夫故楚人伐鄭至于純門而返至是嘉之為政也專國人患之乃討西宫之難與純門之師子展子西率國人殺嘉而分其室不稱鄭人者嘉則有罪矣而子展子西不能正以王法肆諸市朝與衆同棄乃利其室而分之有私意焉故稱國以殺而不去其官此春秋原情定罪之意冬葬齊靈公城西郛叔孫豹㑹晉士丐于柯城武城謝湜曰城西郛城武城皆以備齊齊猶未協故也二十年春王正月辛亥仲孫速㑹莒人盟于向謝湜曰魯及莒平故盟于向夏六月庚申公㑹晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子滕子薛伯杞伯小邾子盟于澶淵謝湜曰齊與晉平故盟于澶淵秋公至自㑹仲孫速帥師伐邾謝湜曰澶淵之盟仲孫速首犯盟約伐邾罪之也蔡殺其大夫公子燮蔡公子履出奔楚謝湜曰左氏謂公子燮欲背楚之晉履其母弟胡安國曰按左氏初蔡文侯欲事晉曰先君與於踐土之盟晉不可棄且兄弟也畏楚不能行而卒楚人使蔡無常公子燮來從先君以利蔡謀國之合於義者也國人乃不順焉而殺燮此何罪矣故稱國而不去其官公子履其母弟也進不能正國退不能逺害懼禍而奔從於荆楚書者罪之也陳侯之弟黃出奔楚謝湜曰公子黃出奔稱弟罪哀公之不能全其弟也親莫親於兄弟不以讒邪二之則手足固矣哀公以慶虎之譛疑其弟而奔之非親親之道也叔老如齊冬十月丙辰朔日有食之季孫宿如宋二十有一年春王正月公如晉邾庶其以漆閭丘來奔謝湜曰庶其以邑叛來奔而魯受之其惡不待貶而見矣澶淵既盟之後既犯盟約伐邾又犯盟約納邾庶其魯人之失信也納叛非所以安吾國失信非所以服鄰國故臧武仲曰子召外盜而失禮焉何以詰吾盜胡安國曰庶其邾大夫也春秋小國之大夫不書其姓氏微也以其事接我則書其姓氏謹之也莒慶以大夫即魯而圖婚接我不以禮者也邾庶其以地叛其君而來奔接我不以義者也以欲敗禮則身必危以利棄義則國必亂春秋禮義之大宗故小國之大夫接我以利欲則特書其姓氏謹之也漆一邑閭丘一邑而不言及者庶其之私邑所受於君而食之者此叛臣何以不書叛書名書地而竊邑叛君之罪見矣夫棄外域從諸夏其慕義之心疑可與也然有據城以求援者君子猶以為不可受而况鄰國乎書來奔而魯受叛臣納其地之罪亦見矣夏公至自晉秋晉欒盈出奔楚謝湜曰欒盈以好施多士為范氏所逐故出奔楚九月庚戌朔日有食之冬十月庚辰朔日有食之曹伯來朝公㑹晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子于商任二十有二年春王正月公至自㑹夏四月秋七月辛酉叔老卒冬公㑹晉侯齊侯宋公衛侯鄭伯曹伯莒子邾子薛伯杞伯小邾子于沙隨謝湜曰欒盈晉之權臣其奔楚也平公懼盈為亂故再㑹諸侯將以伐欒盈也胡安國曰按左氏㑹于商任錮欒氏也㑹于沙隨復錮欒氏也古者大夫去國君不掃其社稷不繫纍其子弟不收其田邑使人𨗳之出疆又先之於其所往勑五典厚人倫也晉不念欒氏世勳而逐盈又將復執之而命諸侯無得納焉則亦過也楚逐申公巫臣子反請以重幣錮之楚子曰止彼若能利國家雖重幣晉將可乎若無益於晉晉將棄之何勞錮焉其賢於商任沙隨之謀逺矣公至自會楚殺其大夫公子追舒謝湜曰追舒寵小人生國患故楚以國法殺之胡宏曰有子曰君子務本本立而道生孝弟也者其為仁之本歟按公子追舒非有大逆之罪退之可也而王必欲殺之則非矣為棄疾者進宜陳使臣之禮以諌王退宜陳事君之禮以諌父諌於王而王不聽則竊負父而去之可也諌於父而父不聽則號泣而隨之可也諌於王與父皆不聽焉則請後祖廟而以身代父死可也烏有閔默恬然不動其心坐待王殺其父然後死之者以為子則不孝以為臣則不忠噫大道不明是以人至此極而莫覺莫悟也故愚論之以示為仁之道焉而春秋書楚殺其大夫公子追舒不罪棄疾者大夫者人君之股肱心膂也公子者宗室之枝葉庇蔭也而輕殺之所以罪楚君也棄疾殺其父矣豈必待貶絶而後見其惡哉二十有三年春王二月癸酉朔日有食之三月乙巳杞伯丐卒夏邾畀我來奔謝湜曰庶其以邑來奔矣畀我又以罪來奔所謂為邾之逋逃淵藪也魯無政矣葬杞孝公陳殺其大夫慶虎及慶寅謝湜曰慶虎得罪於國其禍連及慶寅殺書及以著刑誅之濫也孔父之及以君之禍而連及其臣也慶盈之及以臣之禍而連及其親也胡安國曰按左氏慶虎無道求專陳國暴蔑其君畏公子黃之逼而訴諸楚曰與蔡司馬同謀楚人以為討公子黃奔楚訴之二慶以陳叛楚屈建圍陳殺二慶夫人君擅一國之利勢使權臣暴蔑其身而不能逺欲去其親而不能保譛訴之於大國而不能辨至因楚人之力然後能克則非君人之道也故二慶之死稱國以殺公子黃之出特以弟書者譏歸陳侯也凡此皆春秋端本之意陳侯之弟黃自楚歸于陳謝湜曰公子黃雖賴楚力以歸然黃非有罪惡於國書弟著其不失弟道也然則出稱弟所以責其兄歸稱弟所以明其弟晉欒盈復入于晉入于曲沃謝湜曰欒盈之奔也晉國既失討治又失備禦故盈帥曲沃之甲入晉以師敗故入于曲沃復入絶之辭也欒盈擅以家邑甲衆引兵入國雖曰入討范氏志乃欲危社稷背逆之罪大矣入書復入以明在所誅絶也宋魚石晉欒盈鄭良霄其罪一也魚石不稱所自者以楚子伐宋見之也欒盈不稱所自者以其內恃曲沃也故魚石欒盈以復入著其罪也良霄不稱復入者以自許著其罪也霄以他國兵力逼君以入則罪在所絶可知矣胡安國曰欒氏晉室之世臣故盈雖出奔猶繫於晉復入者甚逆之辭為其既絶而復入也曲沃者所食之地當是時權寵之臣各以利誘其下使為之用至於殺身而不避莫知有君臣之分者也故閒語欒孺子者則或泣或歎以為得主而為之死猶不死也盈從之遂入絳乘公門若非天棄欒氏又有范鞅之謀晉亦殆矣原其失在於錮之甚急使無所容於天地之間是以至此極春秋備書之以見人而不仁疾之已甚亂也其為後世鑒豈不深切著明也哉吕祖謙曰欒盈奔楚初無大罪范宣子直以其勢位逼已兩不相容而逐之盈亡之後自楚適齊自齊入郛幾危晉室盈之罪固不可逃然考其所至之由而宣子之罪尤大當時宣子逐盈之勢甚迫以楚錮之使無容身駐足之地所以激成欒盈之禍宣子雖先逐欒盈晉亦從此衰夫晉以堂堂之大國逐一亡大夫東西南北任其所之可也何至勤天下之諸侯見得霸業不競故諸侯得以輕侮晉室而至於失諸侯也古者大夫出疆三年不反然後收其田里欒盈無大罪乃合諸侯使無所容於天地之間其勢無聊安得而不亂所以作亂非其本心使宣子疾之不如此之甚欒盈亦不至如此罪在宣子不可專罪盈然雖就盈身上論亦不能無罪自欒書弒厲公其勢已炙手可熱繼以欒黶驕狠侈虐上無君下無同列以欒書之强又繼之以黶之虐欒氏之門如烈火炎炎可畏盈於此繼祖父之業正當恐懼修省尚恐不濟郤又如何用箕遺黃淵嘉父等人以固其黨使其如楚文子自毁其家以紓楚國之難尚未能免郤招許多人如以水濟水以火濟火其勢方炎正滿盈之後不能自損抑又郤如此此雖宣子之罪而縱風止炎抱薪救火遂致滅欒氏之門實欒盈之罪也又曰晉欒盈得罪於晉遂出奔齊自齊復入舊邑帥曲沃之甲以晝入絳夫晉以堂堂之大國范宣子為政不設武備而使叛臣得白晝以兵而入於國都當時晉國之社稷不亡若綴旒然向使因欒氏之隙諸侯從而乘之則晉之不亡者幾希宣子秉政而致此蓋緣他倚靠外面裏面都不曾謹封疆明斥堠使持兵直入國都幾亡社稷與其外面號令諸侯何如自家謹守封疆宣子初當盈奔在外時非是不知戒觀其兩次大合諸侯以重錮欒氏宣子自以為諸侯决不受欒氏矣他只管去外面理㑹裏面備都懈怠了及盈既入曲沃宣子都不知前面更無一夫之禦蓋緣只去外面理㑹然當時處這大亂當此大變粗能支持致敗欒氏存晉社稷者其謀皆出於樂王鮒欒氏之入也宣子倉皇無計桓子教之以奉君走固宫及教之以欒氏所得惟魏氏而可强取使當時不從桓子奉君之謀則欒氏之勢殆未可禦不從强取魏氏之謀則魏舒以佐悼公之智而助欒氏未易可去桓子必欲郤而取之所以能終敗欒氏其功亦大矣然看得桓子之功固有力於晉亦所以為晉之害桓子在晉一嬖臣也安晉之謀不出於晉之士大夫而出于嬖幸之桓子則晉君豈不輕視士大夫而益重嬖臣之寵乎故使嬖臣之權愈重而晉之社稷愈不振而霸業愈衰者士大夫之過也秋齊侯伐衛遂伐晉謝湜曰莊公自衛伐晉乘晉欒盈之難而為冦也伐晉書遂罪其不正也㑹晉盟于澶淵而復背其盟莊公之失信也八月叔孫豹帥師救晉次於雍榆程氏學曰晉有欒盈之難重以齊侯之伐魯命豹帥師救之斯義事也豹乃怠棄君命不恤同姓之憂次于雍榆卒不克救豹罪明矣謝湜曰欒盈叛晉於內齊侯伐晉於外魯命帥師救之義之大者也叔孫豹不急盟主之難而以師止于雍榆罪之大者也書救所以善魯也書次所以責豹也救邢先次後救者罪其救之緩也救晉先救後次者罪其廢命不行也己卯仲孫速卒冬十月乙亥臧孫紇出奔邾謝湜曰紇事其主不以道故犯門斬關而奔晉人殺欒盈謝湜曰殺稱人討逆之辭也衛元喧寧喜雖逆臣然以本國大夫得罪故其死稱大夫晉欒盈鄭良霄以罪出奔本國皆絶其位故其死不稱大夫齊侯襲莒謝湜曰輕行掩不備曰襲以兵襲國冦盜之兵也恥莫大焉晉有難而伐之莒無故而襲之黨叛臣伐盟主襲鄰國齊莊之君德喪矣非所以保國也春秋集義卷四十

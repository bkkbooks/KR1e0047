body:
  text: 春秋集義卷四宋李明復撰隱公五年春公矢魚于棠又馮氏説見綱領下程頥曰諸侯非王事民事不逺出逺出觀魚非道也程氏學曰公矢魚于棠左氏曰非禮也且言逺地也夫隱公慢棄國政逺事逸遊譏可知矣謝湜曰古者蒐苖獮狩非獨以禽獸為事也軍旅之法寓焉征伐之事行焉故先王舉動無非事者田獵以閲車徒巡狩以察邦國春秋遊豫以省耕歛若夫觀魚特游觀而已在事為非事在禮為非禮在法為非法春秋直書觀魚而諸侯出不以事舉動不以禮法其失見矣故臧僖伯諫曰凡物不足以講大事其材不足以備器用則君不舉焉若夫山林川澤之實器用之資皂𨽻之事官司之守非君所及也胡安國曰齊景公問於晏子曰吾欲觀于轉附朝舞遵海而南放于琅邪吾何修而可以比于先王觀也晏子曰天子適諸侯曰巡狩巡所守也諸侯朝于天子曰述職述所職也無非事者春省耕而補不足秋省歛而助不給是故諸侯非王事則不出非民事則不出今隱公慢棄國政逺事逸遊僖伯之忠言不見納亦已矣又從而為之辭是縱欲而不能自克之以禮也能無鍾巫之及乎特書觀魚譏之也朱熹語録或説公矢魚于棠云矢如臯陶矢厥謨之矢熹曰今據左傳有曰則君不射則矢魚當是將弓矢射之如漢武帝親射江中蛟之類何以見得夫子作春秋征只書征伐只書伐不曽恁地下一箇字如何陳魚不只寫作陳魚却要下箇矢字則甚遂往陳魚而觀之這一句却是左氏自説據他上文則無此意夏四月葬衛桓公程頥曰衛亂是以緩稱桓見國人私謐也魯往㑹故書送終大事也必就正寢不歿于婦人之手曽子易簀而歿豈茍然乎死而加之不正之謐知忠者肯為乎謝湜曰賊討而葬則亡者安焉故書葬胡安國曰衛亂是以緩魯往㑹故書聖人存而弗削者弑逆之賊討矣諡者行之跡所以紀實德垂勸戒也名之曰幽厲雖孝子慈孫百世不能改失位而見弑何以為桓列爵惟五皆王命也衛夲侯爵何以稱公見臣子不請於王而私自諡爾程氏曰正終大事也必於正寢而不歿於婦人之子豈茍然乎死而加之不正之諡知忠孝者不忍為也春秋於邦君薨正以王法而書來至於葬則從其私諡而稱公或革或因前以貶不臣順之諸侯後以罪不忠孝之臣子詞顯而義㣲皆所以遏人慾存天理大居正也秋衛師入郕程頥曰晋乗亂得立不思安國保民之道以尊王為先居䘮為重乃興戎修怨入人之國書其失道也謝湜曰州吁之亂十有一月而後定衛人不得息肩久矣宣公新政不知緝政洽和人民而興動大衆報怨於郕危國之道也胡安國曰稱師者紀其用衆而立義不同有矜其盛而稱師者如齊師宋師曹師城邢之類是也有著其暴而稱師楚滅陳蔡公子棄疾主兵而曰楚師之類是也有惡其無名不義而稱師次于郎以俟陳蔡及齊圍郕之類是也衛宣繼州吁暴亂之後不施德政固夲恤民而毒衆臨戎入人之國失君道矣書衛師入郕著其暴也九月考仲子之宫程頥曰諸侯無再娶仲子不得為夫人春秋之初尚以為疑故别宫以祀之考始成而祀也書以見無禮成王賜魯用天子禮樂祀周公後世遂羣廟皆用仲子别宫故不敢同羣廟而用六羽也書初獻見前此用八之僣也仲尼以魯之郊禘為周公之道衰用天子之禮祀周公成王之過也或問考仲子之宫非歟曰聖人之意又在下一句見初獻六羽也言初獻則知前此八羽也又曰考仲子之宫初獻六羽仲子妾宫考之非禮初獻六羽言魯素嘗用八佾以成仲子宫而始獻六羽僭天子禮樂可知也魯僭天子禮樂非一日之積也成王過賜伯禽過受也夲用之周公之廟也已為非禮後世遂為諸公之廟皆僭用焉故孔子毎因事而書之以正天下之大典也胡安國曰考者始成而祀其稱仲子者惠公欲以愛妾為夫人隱公欲以庶弟為嫡子聖人以為諸侯不再娶於禮無二嫡孟子入惠公之廟仲子無祭享之所為别立宫以祀之非禮也故因其來賵而正名之曰仲子之賵因其考宫而正名之曰仲子之宫而夫人衆妾之分定矣隱公攝讓之實辨矣桓公簒弑之罪昭矣生則以氏繫姓以姓繫號殁則以諡繫號以姓繫謚者夫人也存不稱號歿不稱謚單舉姓字者妾也凡宫廟非志災失禮則不書朱熹曰考仲子之宫是别立廟初獻六羽謝湜曰六羽諸侯所用之舞也魯用天子八佾久矣仲子之考宫也隱公以諸侯六羽獻之春秋因其復用侯禮也書曰初獻六羽以明得禮之正也以明魯國僭用天子禮樂非一日也昔者成王追念周公之功命魯世祀周公以天子禮樂伯禽承成王之命而受之天子禮樂非人臣所得用也然則魯之大禮在成王為不當賜在伯禽為不當受成王違禮賜之伯禽違禮受之非正也在周公之廟已非正矣後世㳂習其事而諸公之廟亦用焉僭之大者也君臣上下天下之大分也先王車服器用之間皆以升降為之節所以嚴其分也一失之不正一僭之不治則上下之分不明而兩政耦國之患起矣故六羽書初獻所以明久僭而正大典也妾惟君毋然後立廟祔于妾祖姑胡安國曰初獻六羽者始用六佾也不謂之佾而曰羽者干羽之揔稱也羽以象文德干以象武功婦人無武事則獨奏文樂故謂之羽而不曰佾也初者事之始魯僭天子之禮樂舊矣是成王過賜而伯禽受之非也用於太廟以祀周公已為非禮其後羣公皆僭用焉仲子以别宫故不敢同羣廟而降用六羽書初獻者明前此用八之僭也諸侯僭於上大夫僭於下故其末流季氏八佾舞於庭而三家者以雍徹上下無復辨矣聖人因事而書以正天下之大典也吕祖謙曰公問羽數於衆仲夫士卑不當用舞權衡論之是矣公羊亦無士舞之説然亦未可遽以左傳為不是蓋周家七百八年間禮之更改亦不一次當時傳聞自有不同近世立法亦變更不一權衡曰衆仲云士二佾所謂士者特牲少牢皆士禮也無用舞之儀安得二佾而施之乎周禮舞師凡小祭祀則不興舞小祭祀者王服𤣥冕之祭也王服𤣥冕不興舞士服𤣥冕反舞之乎且𤣥冕又非士所當服者如公羊天子八佾諸公六諸侯四則士亦無舞矣邾人鄭人伐宋程頥曰宋人取邾田邾人告于鄭曰請君釋憾於宋敝邑為道邾人鄭人伐宋先邾邾為主也謝湜曰用兵以主兵為首邾先鄭主兵故也左氏謂宋取邾田邾人告于鄭伐宋胡安國曰按左氏宋人取邾田邾人告於鄭曰請君釋憾於宋敝邑為道則主兵者邾也故書附庸小國而序乎鄭之上凡班序上下以國之小大從禮之常也而盟㑹征伐以主者先因事之變也然則衛州吁告于宋以伐鄭事與此同而聖人以宋為主者何此春秋撥亂之大法也凡誅亂臣討賊子必深絶其黨螟程頥曰書螟書螽皆為災也國之大事故書謝湜曰螟虫之食苖者螟螣之屬皆隂陽沴氣所生故隂陽不和則螟螟出則為苖害胡安國曰蟲食苖心曰螟食葉曰螣食節曰賊食根曰蟊國以民為夲民以食為先詩云螟螣害稼也春秋書螟記災也聖人以是為國之大事也故書而近世王安石乃稱為人牧者不必論奏災傷之事亦獨何哉甚矣其不講於聖人之經以欺當年而誤天下與來世也張栻語録或問隱公春秋書螟曰蟲食苖心曰螟是時公子翬已專兵權其亂兆矣隱公冥然莫知也故螟應之曰肯堂謂只是記災異不必如此説冬十月辛巳公子彄卒謝湜曰彄孝公子字子臧謚僖伯其後臧氏胡安國曰按左氏臧僖伯卒公曰叔父有憾於寡人寡人弗敢忘葬之加一等以公羊三世考之則所傳聞之世也而書日見恩禮之厚明矣公將如棠觀魚者僖伯諫而不聽則稱疾不從可謂忠臣矣葬之加一等夫是之謂稱然隱公不敢忘其忠而不能聽其言與郭公善善而不能用至於亡國一也其及宜矣宋人伐鄭圍長葛程頥曰伐國而圍邑肆其暴也謝湜曰宋人之伐鄭也攻長葛而圍之志於奪邑而取之也攻城圍邑以復仇怨皆暴國之兵也鄭為邾伐宋故宋報怨伐鄭胡安國曰圍者環其城邑絶其往來之使禁其樵採之途城守不下至於經年而不解誅亂臣討賊子可也長葛鄭邑何罪乎書圍於此而書取於後宋人之惡彰也六年春鄭人來渝平程頥語録或問鄭人來渝平左氏曰更成也國君輕變其平反復可罪又問終隱之世何以不相侵伐曰不相侵伐固足稱然輕變平非國君之道又曰鄭人來渝平魯先與鄭和至是鄭人來渝平變前之平也書曰鄭人來渝平以罪鄭又曰魯與鄭舊修好既而廹於宋衛遂與之同伐鄭故鄭來絶交渝平變其平也匹夫且不肯失信於人為國君而負約可羞之甚也謝湜曰小國争朝大國交聘非事而㑹相要而盟皆起於邦國不平而為之也肆害相侵執信相伐逞暴而圍不服而戰皆起於邦國不平而為之也上下内外皆平則邦國無事矣故春秋以平為善渝平之書罪鄭人失信於鄰國也渝平書來罪魯人招怨於鄰國也魯入春秋與鄭無争至是變前之平則以翬㑹伐鄭故也胡安國曰輸者納也平者成也鄭人曷為納成于魯以利相給解怨釋仇離宋魯之黨也公之未立與鄭人戰於狐壤止焉元年及宋人盟于宿四年遇于清其秋㑹伐鄭即宋魯為黨與鄭有舊怨明矣五年鄭人伐宋入其郛宋來告命魯欲救之使者失辭公怒而止其冬宋人伐鄭圍長葛鄭伯知其適有用間可乗之隙也是以來納成耳然則善之乎曰平者解怨釋仇固所善也輸平者以利相結則貶矣曷為知其相結之以利也後此鄭伯使宛來歸祊而魯入其地㑹鄭人伐宋得郜及防而魯又取其二邑是以輸平者以利相結乃貶之也諸侯修睦以蕃王室所主者義爾苟為以利使為人臣者懐利以事其君諸侯必曰何以利吾國大夫必曰何以利吾家士庶人曰何以利吾身上下交征利不至於簒弑奪攘則不厭矣故特稱輸平以明有國者必正其義不謀其利杜亡國敗家之夲也朱熹曰春秋鄭人來渝平渝變也蓋魯先與宋好鄭人郤來渝平謂變渝舊盟以從新好也公糓作輸平胡文定謂以物而求平也恐不然但言輸則渝之義自在其中如秦詛楚文公云變輸盟刺若字義則是如此其文意則只是渝字也夏五月辛酉公㑹齊侯盟于艾程頥曰始平于齊也謝湜曰公始與齊僖為盟秋七月程頥曰無事書首月天時王月備而後成嵗也謝湜曰杜氏謂雖無事書首月具四時以成嵗胡安國曰四德備而後為乾故易曰乾元亨利貞一德不備則乾道熄矣四時具而後成嵗故春秋雖無事首時過則書一時不具則嵗功虧矣既書時又書月時天時也月王月也書時又書月見天人之理合也易不云乎君子行此四德者故曰乾元亨利貞若夫上下異致天人殊觀聖學不傳而春秋之義隱矣冬宋人取長葛程頥曰宋人之圍長葛嵗且周矣其虐民無道之甚而天子弗治方伯弗征鄭視其民之危困而不能保有赴訴卒喪其邑亦可辠也宋之彊取不可勝誅矣謝湜曰伐鄭而圍其邑圍其邑而取之宋之罪也胡安國曰宋人恃强圍邑久役大衆取非所有其罪著矣在王朝不能施紏伐之威在列國不能修連帥之職鄭人土地天子所命先祖所受不能保有而失之也是上無天王下無方伯而鄭亦無君也宋人强取以王法言不可勝誅以天理言不善之積著矣初穆公屬國於與夷使其子馮出居于鄭殤公既立忌馮而伐鄭不亦逆天理乎春秋序宋主兵以殤公之罪重也明年鄭人報宋序邾於首以鄭伯之罪輕也至是宋又以兵伐鄭而圍其邑肆行暴虐不善之積已著而不可解矣其見弑於亂臣豈一朝一夕之故哉凡此類皆直書于䇿按其行事善惡之應可考而知天理之不誣者也七年春王三月叔姬歸于紀程頥曰伯姬為紀夫人叔姬其娣也待年於家今始歸娣歸不書憫其無終也程氏學曰叔姬伯姬之媵也伯姬二年歸于紀而叔姬至此歸者待年於父母國也古者諸侯一娶九女所以定名分而懲亂原若不格之同時而使得繼行則源源而來將無紀極何以為禮足致家道之乖故書以見譏謝湜曰叔姬伯姬之娣伯姬二年歸紀叔姬至此始歸者待年於父母之國也古者諸侯一娶九女所以廣繼續也多乎此則過於奢寡乎此則過於約其數以九者先王酌中制而為之典禮也叔姬書者示魯不能存之於終也胡安國曰叔姬伯姬之娣非夫人也則何以書古者諸侯一娶九女必格之同時者所以定名分窒亂源也今叔姬待年於宗國不與嫡俱行則非禮之常所以書也眉山蘇轍以謂書叔姬賢之也若賢不得書必貴而後書則是以位而蔑德也小國無大夫至於接我則書位是不可以廢事也位不可以廢事而獨可以廢賢乎如叔姬不歸于宗國而歸于酅以全婦道賢可知矣賢而得書亦春秋之法也滕侯卒程頥曰不名史闕也謝湜曰諸侯卒而不名者以其名不見於冊故也魯不㑹葬故不書葬胡安國曰滕侯書卒何以不葬怠於禮弱其君而不葬者滕侯宿男之類是也古者邦交有常制不以國之强弱而有謹慢也不以情之踈宻而有厚薄也春秋之時則異於是晋北國也楚南邦也地非同盟而親往俟其葬滕鄰國境也宿同盟也訃告雖及而魯不之恤豈非以其壤地𥚹小乎怠於禮而不往弱其君而不㑹無其事而闕其文此魯史之舊也聖人無加損焉存其卒闕其葬義自見矣卒自外録不卒非外也葬自内録不葬非内也朱熹曰魯君書薨外諸侯書卒薨者臣子之辭以卒為貶辭者恐亦非是夏城中丘程頥曰為民立君所以飬之也飬民之道在愛其力民力足則生養遂生養遂則教化行而風俗美故為政以民力為重也春秋凡用民力必書其所作興不時害義固為罪也雖時且義必書見勞民為重事也後之人君知此義則知謹重於用民矣然有用民力之大而不書者為教之意深矣僖公修泮宫復閟宫非不用民力然而不書二者興廢復古之大事為國之先務如是而用民力乃所當用也人君知此義則知為政之先後重輕矣凡書城者完舊也書築創始也城中丘使民不以時非人君之心也謝湜曰國以人力為夲人力不完則民事妨於下國事妨於上上下不給而國夲虚矣凡城時不時善不善皆書重人力也重人力以示土功之不可不重也城而時猶在所慮而况城而不時者乎城而善猶在所慮而况城而不善者乎國以政治為夲仁義不足以結民心法制不足以齊民力則城雖固適為冦盜之資而已故明君以城保國闇君以城危國然則政之不修而城之是務非保國之道也書城中丘而隱公棄内務外其失見矣胡安國曰程氏曰為民立君所以養之也養民之道在愛其力民力足則生養遂教化行風俗美故為政以民力為重也春秋凡用民必書其所興作不時害義固為罪矣雖時且義亦書見勞民為重事也人君而知此義則知慎重於用民力矣凡書城者完舊也書築者創始也城中丘使民不以時非人君之心也齊侯使其弟年來聘程頥曰凡不稱公子而稱弟者或責失兄弟之義或罪其以弟之愛而寵任之過左氏公羊傳皆曰年齊僖公之母弟先儒母弟之説蓋縁禮文有立嫡子同母弟之説其曰同母弟蓋謂嫡爾非以同母為加親也若以同母為加親是不知人理近於禽道也天下不明斯義也久矣僖公愛年其子尚禮秩如嫡卒致簒弑之禍書弟見其以弟之愛而寵任之過也桓三年同程氏學曰諸侯之子稱公子故君之兄弟亦稱公子者先公之子也其有變文而書兄弟者皆有義焉君於兄弟有親親之愛而不可偏施親親天下之公義偏施一人之私情背公而狥私則適足以啟姦謀而長亂階矣年齊僖公之同母弟也以私於同母之愛寵厚異於他弟故終致無知之亂僖公為之也是以於年之聘特書曰弟桓三年義亦同謝湜曰諸侯之子稱公子諸侯兄弟亦稱公子者先公之子也年僖公同母弟也不稱公子而稱弟者僖公以母弟寵年而尊之也親親之道其厚薄有常制其隆殺有常禮不可過也爵過則僭禄過則侈行於宗室而親戚干政之患起矣僖公私同母之愛寵年異於他弟以至公孫無知衣服禮秩如適無知所以終為背逆者出於寵年過制也春秋於年聘書弟而僖公以母弟兆亂其源見於此矣胡安國曰兄弟先公之子不稱公子貶也書盟書帥師而稱兄弟者罪其有寵愛之私書出奔書歸而稱兄弟者責其薄友愛之義攷於事而春秋之情可見矣年者齊僖公母弟也程氏謂先儒説母弟者蓋縁禮有立嫡子同母弟之文其曰同母蓋為嫡爾非以為加親也此義不明久矣僖公私其同母寵愛異於他弟施及其子猶與適等而襄公絀之遂成簒弑之禍故聖人於年來聘特變文書弟以示貶焉鄭語來盟黑背帥師皆罪其私也書云于弟弗念天顯乃弗克恭厥兄兄亦不念鞠子哀大不友于弟天惟與我民彛大泯亂陳光奔楚而稱弟不念鞠子哀矣盜殺衛縶而稱兄其亦不念天顯矣秦鍼宋辰皆責其薄也仁人於兄弟絶偏係之私篤友恭之義人倫正而天理存其春秋以訓天下與來世之意也秋公伐邾程頥曰左氏傳為宋討也擅興甲兵為人而伐之非義之甚也謝湜曰邾鄰國元年公及儀父盟七年公伐邾盟不足以取信鄰國可知也胡安國曰奉辭致討曰伐按左氏公伐邾為宋討也宋人先取邾田故邾人入其郛魯與儀父則元年盟於昩矣邾人何罪可聲特託為辭説以伐之耳經之書伐非主兵者皆有言可執見伐者皆有罪可討也傳曰欲加之罪何患無辭魯為宋討非義甚矣而稱伐邾所謂欲加之罪者也而不知渝昩之盟不待貶而自見矣冬天王使凡伯來聘戎伐之于楚丘以歸程頥曰周禮時聘以結諸侯之好諸侯不修臣職而聘之非王體也戎伐凡伯于楚丘以歸初戎朝于周發幣於公卿凡伯弗賓王使凡伯來聘戎伐之于楚丘以歸楚丘衛地伐見其以衆天子之使道由於衛而戎得以衆伐之衛不能衛其辠可知言以歸則非執凡伯有失節之罪程氏學曰戎伐天子之使其罪不言而著書曰于楚丘則見衛不救王臣之患曰以歸則非執也以罪凡伯不死位也春秋有一句而合數義者類如此謝湜曰聘禮天子以親邦國以禮士諸侯以省天子以結鄰好周之盛時諸侯以時聘于天子天子以時聘于諸侯故上下内外一心而天下治春秋天王下聘則出於王室㣲弱而為之非行人時聘之禮也故魯未嘗入聘于周而王使卿來聘于魯又曰凡伯天子之使也戎舉大衆伐凡伯王室之辱也王臣將命于外諸侯所當欽也欽王臣所以尊王室也戎以伐事難凡伯于楚丘其為勢盛其為患大衛宣公坐視王室危辱不救使王臣䧟歿於戎春秋以楚丘謹其地而衛國之罪著矣以歸非執也凡伯臣服於戎也稱以歸罪凡伯無死位之忠也諸侯失國則名凡伯失位不名者不與夷狄之屈王臣也不與夷狄屈王臣以病諸侯之不能救也戎犬羊之屬也其往來中國若踐無人之境豈戎之不可制哉皆中國召之而已故潛之㑹唐之盟春秋罪之於前矣胡安國曰國而曰伐此一人而曰伐見其以徒衆也楚丘衛地以歸易詞也于楚丘者罪衛不救王臣之患以歸者罪凡伯失節不能死於位也周之秩官敵國賓至闗尹以告候人為道司徒具徒司冦詰姦佃人積薪火師監燎其貴國之賓至則以班加一等益䖍至於王吏則皆官正涖事今凡伯承王命以為過賓於衛而戎得而伐之以歸是蔑先王之官而無君父也故旄丘録於國風見衛不能修方伯之職也戎伐凡伯于楚丘以歸見衛不救王臣之患也為狄所㓕則有由矣春秋集義卷四
